<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML ROAD — Offline ML Learning System</title>
  <style>
    :root {
      --bg: #020609;
      --bg2: #050e14;
      --bg3: #091419;
      --border: #0d2a33;
      --border2: #1a4a5e;
      --cyan: #00e5ff;
      --cyan2: #00b8d9;
      --red: #ff4655;
      --green: #00ff9d;
      --orange: #ff9f43;
      --purple: #9b4dff;
      --text: #c8e8f0;
      --text2: #4a8a9e;
      --dim: #1e4a5a;
      --sw: 272px;
      --hh: 56px;
      --font: 'Segoe UI Variable', 'Segoe UI', 'Trebuchet MS', sans-serif;
      --mono: 'SFMono-Regular', 'Consolas', 'Menlo', 'Liberation Mono', monospace
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font);
      background:
        linear-gradient(rgba(0,229,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.018) 1px, transparent 1px),
        radial-gradient(ellipse at 10% 0%, #00e5ff0f 0%, transparent 45%),
        radial-gradient(ellipse at 90% 5%, #9b4dff0a 0%, transparent 38%),
        var(--bg);
      background-size: 44px 44px, 44px 44px, 100% 100%, 100% 100%, 100% 100%;
      color: var(--text);
      line-height: 1.7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--cyan2);
      border-radius: 2px
    }

    /* HEADER */
    #hdr {
      height: var(--hh);
      background: var(--bg2);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 100
    }

    #hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: .5
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex-shrink: 0
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border: 1px solid var(--cyan);
      border-radius: 0;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      box-shadow: 0 0 10px #00e5ff30, inset 0 0 8px #00e5ff10;
      letter-spacing: -1px
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 14px #00e5ff55;
      letter-spacing: 3px
    }

    .logo-sub {
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      line-height: 1;
      margin-top: 2px
    }

    .srch {
      position: relative
    }

    .sb-srch {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border)
    }

    .srch-pre {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      pointer-events: none;
      opacity: .6;
      white-space: nowrap
    }

    #si {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 12px 7px 90px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color .2s
    }

    #si::placeholder {
      color: var(--dim)
    }

    #si:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px #00e5ff28
    }

    #sr {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      z-index: 220;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 32px #00000090, 0 0 20px #00e5ff08
    }

    #sr.vis {
      display: block
    }

    .sri {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s
    }

    .sri:hover {
      background: var(--bg3)
    }

    .sri:last-child {
      border-bottom: none
    }

    .sri-t {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      margin-bottom: 2px
    }

    .sri-s {
      font-size: 10px;
      color: var(--cyan2);
      font-family: var(--mono);
      letter-spacing: 1px;
      opacity: .7
    }

    .srh {
      color: var(--cyan);
      font-weight: 700;
      text-shadow: 0 0 6px #00e5ff60
    }

    .sr0 {
      padding: 16px;
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      font-family: var(--mono)
    }

    .mbtn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-left: auto
    }

    .mbtn:hover {
      border-color: var(--cyan);
      color: var(--cyan)
    }

    /* LAYOUT */
    .lay {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* SIDEBAR */
    #sb {
      width: var(--sw);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: left .3s ease
    }

    .sbh {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .sbh-lbl,
    .sbh-t {
      display: none
    }

    .sbh2 {
      padding: 10px 14px 9px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #00e5ff04
    }

    .sbh2::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 5px var(--cyan);
      flex-shrink: 0
    }

    .sbh2-t {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: .7
    }

    .sbnav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 16px
    }

    .sb-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #00e5ff04
    }

    .sb-tab {
      flex: 1;
      padding: 11px 12px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5a8a98;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s, background .15s, box-shadow .15s
    }

    .sb-tab:last-child { border-right: none }

    .sb-tab.act {
      color: var(--cyan);
      background: #00e5ff0a;
      box-shadow: inset 0 -2px 0 var(--cyan)
    }

    .sb-tab:hover:not(.act) { color: #9fd8e8 }

    .sb-empty {
      padding: 36px 20px;
      color: #5a8a98;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      text-align: center
    }

    .sb-empty-icon {
      font-size: 22px;
      color: var(--cyan);
      opacity: .35;
      margin-bottom: 14px;
      letter-spacing: 4px
    }

    .sb-empty-hint {
      margin-top: 10px;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: #3a5a68;
      text-transform: uppercase
    }

    .sov {
      display: none;
      position: fixed;
      inset: 0;
      top: var(--hh);
      background: rgba(0, 0, 0, .6);
      z-index: 85
    }

    .sov.vis {
      display: block
    }

    /* HOME ITEM */
    .hi {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      margin-bottom: 4px;
      border-left: 2px solid transparent
    }

    .hi:hover {
      background: var(--bg3)
    }

    .hi.act {
      border-left-color: var(--cyan);
      background: #00e5ff08
    }

    .hi-ic {
      color: var(--cyan);
      font-size: 14px
    }

    .hi-t {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      letter-spacing: .5px
    }

    .hi.act .hi-t {
      color: var(--cyan)
    }

    /* SECTION GROUP */
    .sg {
      margin-bottom: 4px
    }

    .sgh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: background .15s
    }

    .sgh:hover {
      background: #091820
    }

    .sga {
      font-size: 9px;
      color: var(--text2);
      transition: transform .2s;
      flex-shrink: 0
    }

    .sg.open .sga {
      transform: rotate(90deg)
    }

    .sgn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid
    }

    /* section accent colours */
    .sgn-c1 {
      color: #00e5ff;
      background: #00e5ff14;
      border-color: #00e5ff40
    }

    .sgn-c2 {
      color: #00cfb4;
      background: #00cfb414;
      border-color: #00cfb440
    }

    .sgn-c3 {
      color: #00ff9d;
      background: #00ff9d14;
      border-color: #00ff9d40
    }

    .sgn-c4 {
      color: #ff9f43;
      background: #ff9f4314;
      border-color: #ff9f4340
    }

    .sgn-c5 {
      color: #ff4655;
      background: #ff465514;
      border-color: #ff465540
    }

    .sgn-c6 {
      color: #9b4dff;
      background: #9b4dff14;
      border-color: #9b4dff40
    }

    .sgn-c7 {
      color: #e0a0ff;
      background: #e0a0ff14;
      border-color: #e0a0ff40
    }

    .sgn-c8 {
      color: #7eb8ff;
      background: #7eb8ff14;
      border-color: #7eb8ff40
    }

    /* Per-section accent colors: section name */
    .sg.sec-c1 .sgname { color: #00e5ff }
    .sg.sec-c2 .sgname { color: #00cfb4 }
    .sg.sec-c3 .sgname { color: #00ff9d }
    .sg.sec-c4 .sgname { color: #ff9f43 }
    .sg.sec-c5 .sgname { color: #ff4655 }
    .sg.sec-c6 .sgname { color: #9b4dff }
    .sg.sec-c7 .sgname { color: #e0a0ff }
    .sg.sec-c8 .sgname { color: #7eb8ff }
    .sg.sec-c9 .sgname { color: #ffc857 }
    .sg.sec-locked .sgname { color: #2a6070 !important }

    /* Per-section accent colors: active lesson */
    .sg.sec-c1 .li.act { background: #00e5ff08; border-left-color: #00e5ff }
    .sg.sec-c1 .li.act .li-n { color: #00e5ff }
    .sg.sec-c1 .li.act .li-t { color: var(--text) }
    .sg.sec-c1 .li.act::after { background: #00e5ff; box-shadow: 0 0 8px #00e5ff }

    .sg.sec-c2 .li.act { background: #00cfb408; border-left-color: #00cfb4 }
    .sg.sec-c2 .li.act .li-n { color: #00cfb4 }
    .sg.sec-c2 .li.act .li-t { color: var(--text) }
    .sg.sec-c2 .li.act::after { background: #00cfb4; box-shadow: 0 0 8px #00cfb4 }

    .sg.sec-c3 .li.act { background: #00ff9d08; border-left-color: #00ff9d }
    .sg.sec-c3 .li.act .li-n { color: #00ff9d }
    .sg.sec-c3 .li.act .li-t { color: var(--text) }
    .sg.sec-c3 .li.act::after { background: #00ff9d; box-shadow: 0 0 8px #00ff9d }

    .sg.sec-c4 .li.act { background: #ff9f4308; border-left-color: #ff9f43 }
    .sg.sec-c4 .li.act .li-n { color: #ff9f43 }
    .sg.sec-c4 .li.act .li-t { color: var(--text) }
    .sg.sec-c4 .li.act::after { background: #ff9f43; box-shadow: 0 0 8px #ff9f43 }

    .sg.sec-c5 .li.act { background: #ff465508; border-left-color: #ff4655 }
    .sg.sec-c5 .li.act .li-n { color: #ff4655 }
    .sg.sec-c5 .li.act .li-t { color: var(--text) }
    .sg.sec-c5 .li.act::after { background: #ff4655; box-shadow: 0 0 8px #ff4655 }

    .sg.sec-c6 .li.act { background: #9b4dff08; border-left-color: #9b4dff }
    .sg.sec-c6 .li.act .li-n { color: #9b4dff }
    .sg.sec-c6 .li.act .li-t { color: var(--text) }
    .sg.sec-c6 .li.act::after { background: #9b4dff; box-shadow: 0 0 8px #9b4dff }

    .sg.sec-c7 .li.act { background: #e0a0ff08; border-left-color: #e0a0ff }
    .sg.sec-c7 .li.act .li-n { color: #e0a0ff }
    .sg.sec-c7 .li.act .li-t { color: var(--text) }
    .sg.sec-c7 .li.act::after { background: #e0a0ff; box-shadow: 0 0 8px #e0a0ff }

    .sg.sec-c8 .li.act { background: #7eb8ff08; border-left-color: #7eb8ff }
    .sg.sec-c8 .li.act .li-n { color: #7eb8ff }
    .sg.sec-c8 .li.act .li-t { color: var(--text) }
    .sg.sec-c8 .li.act::after { background: #7eb8ff; box-shadow: 0 0 8px #7eb8ff }
    .sg.sec-c9 .li.act { background: #ffc85708; border-left-color: #ffc857 }
    .sg.sec-c9 .li.act .li-n { color: #ffc857 }
    .sg.sec-c9 .li.act .li-t { color: var(--text) }
    .sg.sec-c9 .li.act::after { background: #ffc857; box-shadow: 0 0 8px #ffc857 }

    .sgname {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .3px;
      color: #a8d8e8;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .sg.sec-locked .sgname {
      color: #2a6070
    }

    .sg-lk {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--dim);
      opacity: .5;
      flex-shrink: 0;
      border: 1px solid var(--border);
      padding: 1px 4px;
      text-transform: uppercase
    }

    .ll {
      display: none;
      padding: 0 0 4px
    }

    .sg.open .ll {
      display: block
    }

    .li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 28px;
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent;
      position: relative
    }

    .li:hover {
      background: var(--bg3)
    }

    .li.act {
      background: #00e5ff08;
      border-left-color: var(--cyan)
    }

    .li.act::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 14px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      border-radius: 0
    }

    .li-n {
      font-family: var(--mono);
      font-size: 11px;
      color: #1e5a6e;
      flex-shrink: 0;
      width: 20px
    }

    .li.act .li-n {
      color: var(--cyan)
    }

    .li-t {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .2px;
      color: #6aa8be;
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .li.act .li-t {
      color: var(--text)
    }

    .li.lk .li-n,
    .li.lk .li-t {
      color: #1a4050;
      opacity: .8
    }

    .li-lk {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--dim);
      opacity: .5;
      flex-shrink: 0;
      border: 1px solid var(--border);
      padding: 1px 4px;
      text-transform: uppercase
    }

    .li-ok {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      color: #00e5ff;
      opacity: .45;
      flex-shrink: 0;
      border: 1px solid #00e5ff28;
      padding: 1px 4px;
      text-transform: uppercase
    }

    /* MAIN */
    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative
    }

    #main::before {
      content: '';
      position: fixed;
      top: var(--hh);
      left: var(--sw);
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 229, 255, .022) 3px,
        rgba(0, 229, 255, .022) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .ci {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 32px 24px;
      position: relative;
      z-index: 1
    }

    /* BREADCRUMBS */
    .bc {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 24px;
      flex-wrap: wrap
    }

    .bc span,
    .bc a {
      color: var(--text2);
      text-decoration: none;
      cursor: pointer;
      transition: color .15s
    }

    .bc a:hover {
      color: var(--cyan)
    }

    .bc .sep {
      color: var(--dim)
    }

    .bc .cur {
      color: var(--cyan)
    }

    /* HOME */
    .hero {
      padding: 20px 0 0;
      position: relative
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -32px;
      right: -32px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, #00e5ff0d 0%, transparent 70%);
      pointer-events: none
    }

    /* terminal boot panel */
    .hboot {
      background: var(--bg2);
      border: 1px solid var(--border2);
      max-width: 760px;
      margin: 0 auto 18px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px))
    }

    .hboot::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #00e5ff06 0%, transparent 50%);
      pointer-events: none
    }

    .hboot-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      background: #00e5ff06
    }

    .hboot-dot {
      width: 8px;
      height: 8px;
      border: 1px solid var(--cyan);
      background: var(--cyan);
      opacity: .6
    }

    .hboot-dot2 {
      width: 8px;
      height: 8px;
      border: 1px solid var(--red);
      background: var(--red);
      opacity: .5
    }

    .hboot-dot3 {
      width: 8px;
      height: 8px;
      border: 1px solid var(--dim);
      opacity: .4
    }

    .hboot-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      margin-left: 4px
    }

    .hboot-body {
      padding: 20px 24px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center
    }

    .hascii {
      font-family: var(--mono);
      font-size: clamp(22px, 4.5vw, 46px);
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 20px #00e5ff50, 0 0 50px #00e5ff20;
      letter-spacing: 4px;
      line-height: 1;
      animation: glitch 6s infinite
    }

    .hascii-sub {
      font-family: var(--mono);
      font-size: clamp(8px, 1.2vw, 11px);
      color: var(--text2);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: .8
    }

    .hascii-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: .7
    }

    .hsys {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.8;
      border-left: 1px solid var(--border2);
      padding-left: 18px;
      min-width: 160px
    }

    .hsys-row {
      display: flex;
      gap: 6px;
      white-space: nowrap
    }

    .hsys-k {
      color: var(--text2);
      letter-spacing: 1px;
      font-size: 10px
    }

    .hsys-v {
      color: var(--cyan);
      font-size: 10px
    }

    .hsys-v.ok {
      color: var(--green)
    }

    .hsys-v.dim {
      color: var(--dim)
    }

    .hmarq {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: #00e5ff04;
      overflow: hidden;
      margin: 0 auto 16px;
      max-width: 760px
    }

    .hmarq-b {
      margin-top: 10px;
      margin-bottom: 0
    }

    .hmarq-tr {
      display: flex;
      width: max-content;
      animation: marq 30s linear infinite
    }

    .hmarq-b .hmarq-tr {
      animation-direction: reverse;
      animation-duration: 36s
    }

    .hmarq-tx {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      padding: 6px 10px;
      white-space: nowrap;
      opacity: .7
    }

    .hdesc {
      font-size: 14px;
      color: #7ab8cc;
      max-width: 600px;
      line-height: 1.7;
      margin: 16px auto 0;
      font-family: var(--mono);
      text-align: center
    }
    .hdesc p { margin: 0 0 8px }
    .hstart-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s
    }
    .hstart-btn:hover {
      background: var(--cyan);
      color: #000
    }

    .hsecs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px
    }

    .hsc {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px))
    }

    .hsc:hover {
      border-color: var(--border2);
      background: #081318
    }

    .hsc::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 2px;
      height: 100%
    }

    .hsc-c1::before { background: #00e5ff; box-shadow: 0 0 8px #00e5ff }
    .hsc:hover.hsc-c1 { border-color: #00e5ff55; box-shadow: 0 0 16px #00e5ff0a }
    .hsc-c2::before { background: #00cfb4; box-shadow: 0 0 8px #00cfb4 }
    .hsc:hover.hsc-c2 { border-color: #00cfb455 }
    .hsc-c3::before { background: #00ff9d; box-shadow: 0 0 8px #00ff9d }
    .hsc:hover.hsc-c3 { border-color: #00ff9d55 }
    .hsc-c4::before { background: var(--orange); box-shadow: 0 0 8px var(--orange) }
    .hsc:hover.hsc-c4 { border-color: #ff9f4355 }
    .hsc-c5::before { background: var(--red); box-shadow: 0 0 8px var(--red) }
    .hsc:hover.hsc-c5 { border-color: #ff465555 }
    .hsc-c6::before { background: var(--purple); box-shadow: 0 0 8px var(--purple) }
    .hsc:hover.hsc-c6 { border-color: #9b4dff55 }
    .hsc-c7::before { background: #e0a0ff; box-shadow: 0 0 8px #e0a0ff }
    .hsc:hover.hsc-c7 { border-color: #e0a0ff55 }
    .hsc-c8::before { background: #7eb8ff; box-shadow: 0 0 8px #7eb8ff }
    .hsc:hover.hsc-c8 { border-color: #7eb8ff55 }

    .hsc.hsc-locked {
      opacity: .38;
      cursor: default
    }

    .hsc.hsc-locked:hover {
      transform: none;
      box-shadow: none;
      border-color: var(--border);
      background: var(--bg2)
    }

    .hscn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .hsc-c1 .hscn { color: #00e5ff }
    .hsc-c2 .hscn { color: #00cfb4 }
    .hsc-c3 .hscn { color: #00ff9d }
    .hsc-c4 .hscn { color: var(--orange) }
    .hsc-c5 .hscn { color: var(--red) }
    .hsc-c6 .hscn { color: var(--purple) }
    .hsc-c7 .hscn { color: #e0a0ff }
    .hsc-c8 .hscn { color: #7eb8ff }
    .hsc.hsc-locked .hscn { color: var(--dim) }

    .hsct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3
    }

    .hsc.hsc-locked .hsct {
      color: var(--dim)
    }

    .hscd {
      font-size: 11px;
      color: var(--text2);
      font-family: var(--mono)
    }

    .hscls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .hscl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px 6px
    }

    /* COMMUNITY HUD */
    .commblock {
      margin-top: 16px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 0;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px))
    }

    .commblock-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      background: #00e5ff06
    }

    .commblock-hdr-dot {
      width: 6px;
      height: 6px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    .commblock-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .commlinks {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      padding: 10px 12px;
      justify-content: stretch
    }

    .cl {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 8px 14px;
      transition: all .15s;
      text-align: center;
      flex: 1 1 150px;
      margin: 3px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .cl::before {
      content: '>';
      font-family: var(--mono);
      color: var(--cyan);
      opacity: .4;
      font-size: 10px
    }

    .cl:hover {
      background: #00e5ff08;
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px #00e5ff10
    }

    .cl:hover::before {
      opacity: 1
    }

    /* LESSON */
    .lhdr {
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
      position: relative;
      padding-left: 16px;
      border-left: 2px solid var(--cyan);
      box-shadow: -4px 0 12px #00e5ff08
    }

    .lhdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan)
    }

    .lmeta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: .8;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .lmeta::before {
      content: '>';
      color: var(--cyan);
      opacity: .5
    }

    .ltitle {
      font-family: var(--mono);
      font-size: clamp(18px, 2.8vw, 26px);
      font-weight: 700;
      color: #d8f0f8;
      line-height: 1.2
    }

    /* MARKDOWN */
    .lc h1 {
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 700;
      color: #d8f0f8;
      margin: 32px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2)
    }

    .lc h1::before {
      content: '// ';
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      opacity: .7
    }

    .lc h2 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--cyan);
      margin: 24px 0 10px;
      letter-spacing: .5px
    }

    .lc h2::before {
      content: '# ';
      opacity: .5;
      font-family: var(--mono)
    }

    .lc h3 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: #8acde0;
      margin: 18px 0 8px
    }

    .lc h3::before {
      content: '## ';
      color: var(--cyan2);
      font-family: var(--mono);
      font-size: 11px;
      opacity: .5
    }

    .lc h4 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin: 14px 0 6px
    }

    .lc p {
      font-size: 15px;
      color: #9ec8d8;
      line-height: 1.82;
      margin-bottom: 13px
    }

    .lc strong {
      color: #d8f0f8;
      font-weight: 700
    }

    .lc em {
      color: var(--orange);
      font-style: italic
    }

    .lc ul,
    .lc ol {
      margin: 10px 0 14px 22px
    }

    .lc li {
      font-size: 15px;
      color: #9ec8d8;
      line-height: 1.72;
      margin-bottom: 3px
    }

    .lc ul li::marker {
      color: var(--cyan2)
    }

    .lc ol li::marker {
      color: var(--cyan);
      font-family: var(--mono)
    }

    .lc blockquote {
      background: #00e5ff06;
      border-left: 2px solid var(--cyan);
      padding: 12px 18px;
      margin: 18px 0;
      box-shadow: -4px 0 12px #00e5ff08
    }

    .lc blockquote p {
      color: #8acde0;
      font-style: normal;
      font-family: var(--mono);
      font-size: 13px;
      margin: 0
    }

    .lc blockquote strong {
      color: var(--cyan)
    }

    code.ic {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      background: #00ff9d0c;
      border: 1px solid #00ff9d30;
      padding: 1px 6px
    }

    .cb {
      background: #030a0d;
      border: 1px solid var(--border2);
      border-left: 2px solid var(--cyan);
      margin: 14px 0;
      overflow: hidden;
      position: relative;
      box-shadow: -4px 0 14px #00e5ff0a
    }

    .cb::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      opacity: .4
    }

    .cbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      background: #00e5ff08;
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .cbl::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      display: inline-block;
      flex-shrink: 0
    }

    .cb pre {
      padding: 16px;
      overflow-x: auto
    }

    .cb code {
      font-family: var(--mono);
      font-size: 13px;
      color: #7fe8b8;
      line-height: 1.65;
      white-space: pre
    }

    .cb-copy {
      position: absolute;
      top: 7px;
      right: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      transition: .18s ease;
      z-index: 2
    }

    .cb-copy:hover {
      color: var(--cyan);
      border-color: var(--cyan);
      box-shadow: 0 0 8px #00e5ff30;
      background: #00e5ff08
    }

    .cb-copy.done {
      color: var(--green);
      border-color: #00ff9d60;
      background: #00ff9d08
    }

    .tw {
      overflow-x: auto;
      margin: 14px 0
    }

    .lc table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    .lc th {
      background: #00e5ff08;
      color: var(--cyan);
      border: 1px solid var(--border2);
      padding: 8px 12px;
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .lc td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      color: #9ec8d8;
      vertical-align: top;
      font-size: 13px
    }

    .lc tr:nth-child(even) td {
      background: #00e5ff04
    }

    .lc td code,
    .lc th code {
      font-family: var(--mono);
      color: var(--green);
      font-size: 12px
    }

    .lc hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
      position: relative
    }

    .lc hr::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 50px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    a.nl {
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px solid #00e5ff30;
      transition: all .15s
    }

    a.nl:hover {
      color: #fff;
      border-bottom-color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan)
    }

    /* PREV/NEXT */
    .lnav {
      display: flex;
      gap: 12px;
      margin-top: 44px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap
    }

    .nb {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 12px 18px;
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      flex: 1;
      min-width: 180px;
      font-family: var(--mono)
    }

    .nb:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: #00e5ff06;
      box-shadow: 0 0 12px #00e5ff10
    }

    .nb.pr {
      justify-content: flex-start
    }

    .nb.nx {
      justify-content: flex-end
    }

    .nb-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 2px;
      display: block;
      text-transform: uppercase
    }

    .nb:hover .nb-lbl {
      color: var(--cyan2)
    }

    .nb-t {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      max-width: 200px
    }

    /* LOCKED LESSON */
    .lock-panel {
      text-align: center;
      padding: 80px 32px;
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .lock-icon {
      font-size: 40px;
      margin-bottom: 20px;
      opacity: .15;
      line-height: 1
    }

    .lock-num {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text2);
      margin-bottom: 14px;
      opacity: .5
    }

    .lock-title {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--dim);
      margin-bottom: 22px;
      line-height: 1.3
    }

    .lock-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
      border: 1px solid var(--border);
      padding: 8px 20px;
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .lock-dot {
      width: 6px;
      height: 6px;
      background: var(--dim)
    }

    /* STATUS */
    .stbar {
      flex-shrink: 0;
      height: 22px;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 18px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      position: relative
    }

    .stbar::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 120px;
      height: 1px;
      background: var(--cyan);
      opacity: .3
    }

    .stitem {
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase
    }

    .stitem-ok {
      color: #2a6878
    }

    .stitem-hi {
      color: var(--cyan);
      opacity: .7
    }

    .stdot {
      width: 5px;
      height: 5px;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {
      0%, 100% { opacity: 1 }
      50% { opacity: .4 }
    }

    /* RESPONSIVE */
    @media(max-width:768px) {
      .mbtn {
        display: block
      }

      .srch {
        max-width: 200px
      }

      #sb {
        position: fixed;
        left: -100%;
        top: var(--hh);
        height: calc(100vh - var(--hh));
        width: 84%;
        max-width: 300px;
        z-index: 90
      }

      #sb.open {
        left: 0
      }

      #main::before {
        left: 0
      }

      .ci {
        padding: 20px 16px 56px
      }

      .htitle {
        font-size: 32px
      }

      .sb-srch {
        padding: 10px 10px 8px
      }

      .lnav {
        flex-direction: column
      }

      .nb {
        min-width: 0
      }

      .logo-sub {
        display: none
      }
    }

    @media(max-width:480px) {
      .logo-text {
        font-size: 13px
      }
    }

    @keyframes glitch {
      0%, 92%, 100% {
        text-shadow: 0 0 20px #00e5ff55, 0 0 50px #00e5ff22;
        transform: none
      }
      93% {
        text-shadow: 2px 0 6px var(--red), -2px 0 6px var(--cyan);
        transform: translateX(1px) skewX(-1deg)
      }
      94% {
        text-shadow: -2px 0 6px var(--red), 2px 0 6px var(--cyan);
        transform: translateX(-1px) skewX(1deg)
      }
      95% {
        text-shadow: 0 0 20px #00e5ff55, 0 0 50px #00e5ff22;
        transform: none
      }
    }

    @keyframes marq {
      0% {
        transform: translateX(0)
      }
      100% {
        transform: translateX(-50%)
      }
    }

    /* ═══════ RIGHT PANEL ═══════ */
    #rp {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg2);
      border-left: 1px solid var(--border2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .25s ease;
      position: relative
    }

    #rp.rp-hidden {
      width: 0;
      border-left: none;
      overflow: hidden
    }

    #rp::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,229,255,.012) 3px,
        rgba(0,229,255,.012) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .rp-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border2);
      background: #00e5ff06;
      flex-shrink: 0;
      position: relative;
      z-index: 1
    }

    .rp-hdr-dot {
      width: 5px;
      height: 5px;
      background: var(--purple);
      box-shadow: 0 0 6px var(--purple);
      flex-shrink: 0
    }

    .rp-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--purple);
      text-transform: uppercase;
      flex: 1
    }

    .rp-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      transition: .15s
    }

    .rp-close:hover {
      border-color: var(--red);
      color: var(--red)
    }

    .rp-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;

# 01. Что такое машинное обучение простыми словами

## Зачем это нужно

Машинное обучение используют там, где сложно заранее описать все правила вручную.
Например:

- рекомендовать фильмы;
- распознавать спам;
- предсказывать цену квартиры;
- находить похожие товары;
- понимать речь;
- распознавать объекты на фото.

В таких задачах проще показать системе много примеров, чем пытаться вручную расписать все возможные ситуации.

## Простая интуиция

Обычная программа работает по заранее написанным условиям. Например:

```
если температура выше 38 → показать предупреждение
```

Машинное обучение работает иначе. Мы не прописываем все правила вручную. Мы даём системе примеры, а она сама ищет закономерности.

Простой пример: чтобы научиться отличать кошек от собак, системе показывают много изображений кошек и собак. Постепенно она начинает замечать отличия и применять это к новым картинкам.

## Что это такое

**Машинное обучение** — это подход, при котором программа учится на данных и потом использует найденные закономерности для новых случаев.

Проще: модель смотрит на примеры, замечает связи и делает предсказание.

Важно: модель не «понимает» мир как человек. Она ищет статистические закономерности в данных.

## Как это работает

1. Собираем примеры.
2. Показываем их модели.
3. Модель ищет закономерности.
4. Проверяем, насколько хорошо она справляется.
5. Используем модель на новых данных.

Например, если модель видела много квартир с разной площадью, районом и ценой, она может научиться примерно предсказывать цену новой квартиры.

## Простой пример

Допустим, мы хотим предсказывать цену квартиры. У нас есть примеры:

```
35 м², окраина → 6 млн
50 м², центр  → 12 млн
70 м², центр  → 17 млн
```

Модель смотрит на эти примеры и замечает:

- большая площадь часто связана с большей ценой;
- центр обычно дороже окраины;
- разные признаки вместе влияют на результат.

После обучения ей можно показать новую квартиру:

```
55 м², центр → ?
```

И модель попробует предсказать цену.

## Как это связано с ML

Этот урок — точка входа. Дальше мы отдельно разберём:

- что такое модель;
- что она получает на вход;
- что она должна предсказать;
- как устроены данные;
- как проверять качество;
- почему модель может ошибаться.

Сейчас главное понять базовую идею: ML нужен не для магии, а для поиска закономерностей в данных.

## Практика

1. Что делает машинное обучение: получает готовые правила или учится на примерах?
2. Почему для машинного обучения нужны данные?
3. Представь сервис с фильмами. Что он может попробовать предсказывать с помощью ML?
4. Почему модель может ошибаться на новых примерах?
5. Если нужно показать предупреждение при температуре выше 38 градусов, нужен ли здесь ML или достаточно простого условия?

## Краткий итог

- Машинное обучение учится на примерах.
- Модель ищет закономерности в данных.
- После обучения модель может делать предсказания для новых случаев.
- ML полезен там, где сложно заранее описать все ситуации вручную.
- Модель не понимает мир как человек, а работает со связями в данных.

# 03. Модель: input → output

## Зачем это нужно

Любую ML-задачу можно описать простой схемой:

```
input → model → output
```

Это помогает сразу понять:

- что мы даём модели на вход;
- что модель должна вернуть на выходе;
- какую задачу мы вообще решаем.

Без этой схемы легко запутаться ещё до обучения модели.

## Простая интуиция

Модель можно представить как преобразователь. Она получает данные об объекте и возвращает результат. Например:

```
данные о квартире → модель → предсказанная цена
```

Пока не важно, как именно модель работает внутри. На этом этапе важно понять главное: что подаём на вход и что хотим получить на выходе.

## Что это такое

**Модель** — это алгоритм, который учится находить связь между входными данными и результатом. После обучения модель может получать новые данные и делать предсказание.

**Input** — то, что модель получает на вход. Это могут быть:

- данные о квартире;
- текст письма;
- изображение;
- история действий пользователя.

**Output** — то, что модель возвращает. Это может быть:

- цена;
- класс;
- вероятность;
- рекомендация;
- текстовый ответ.

## Как это работает

1. Формулируем задачу.
2. Передаём модели input — данные об объекте.
3. Модель обрабатывает эти данные.
4. На выходе получаем output — предсказание.
5. Сравниваем предсказание с реальным ответом, чтобы понять, насколько модель справилась.

Важно: output модели — это не факт. Это предположение модели на основе данных, которые она увидела.

## Простой пример

Задача: предсказать цену квартиры.

Input:

```
площадь: 55 м²
комнат: 2
этаж: 7
район: центр
```

Output:

```
предсказанная цена: 10.8 млн
```

Модель не гарантирует, что квартира точно стоит `10.8 млн`. Она делает предсказание на основе похожих примеров, которые видела раньше.

## Как это связано с ML

Схема `input → model → output` лежит в основе любой ML-задачи. Разные задачи отличаются тем, какой output мы хотим получить.

Иногда модель должна вернуть число:

```
цена квартиры
```

Иногда — выбрать вариант:

```
спам / не спам
```

Иногда — предложить объект:

```
фильм, товар или музыку
```

Поэтому перед обучением важно зафиксировать: что модель получает на вход и что должна вернуть на выходе.

## Практика

1. В задаче «спам / не спам» что будет input, а что output?
2. В задаче «предсказать цену квартиры» что модель получает на вход и что должна выдать на выходе?
3. Почему output модели — это предсказание, а не точный факт?
4. Придумай одну задачу, где модель должна вернуть число.
5. Сервис рекомендует пользователю фильм. Что здесь может быть input, а что output?

## Краткий итог

- Любую ML-задачу можно описать схемой `input → model → output`.
- Input — данные, которые модель получает на вход.
- Output — результат, который модель возвращает.
- Output модели — это предсказание, а не гарантия.
- Перед обучением нужно понять, что модель получает и что должна предсказать.

# 04. X, y, признаки и target

## Зачем это нужно

Это фундамент всего ML. Без понимания X и y будет путаница в моделях, коде, метриках и даже в постановке задачи. Разобравшись здесь один раз, вы будете понимать что происходит в любом ML-коде.

## Простая интуиция

X и y — не оси координат, как в школе. В ML: X — это то, что модель видит на входе; y — это то, что модель должна предсказать. Как угадывание: вам говорят характеристики человека (X), а вы должны назвать его зарплату (y).

## Что это такое

**Признаки (features, X)** — характеристики объекта, которые модель использует для обучения. Например: опыт работы, уровень английского, возраст.

**Target (y)** — то, что модель должна предсказать. Например: зарплата, цена квартиры, спам или не спам.

В таблице X — это все колонки кроме одной, y — эта одна колонка с ответами.

## Как это работает

Есть таблица с данными о соискателях:

| experience_years | english_level | salary |
|-----------------|---------------|--------|
| 1 | 2 | 70000 |
| 2 | 3 | 90000 |
| 3 | 4 | 120000 |

Здесь:
- X = колонки `experience_years` и `english_level`
- y = колонка `salary`

Модель учится на этих данных и потом может предсказать зарплату для нового человека, зная только его опыт и уровень английского.

## Простой пример

```python
X = df[["experience_years", "english_level"]]
y = df["salary"]
```

Если `salary` — число, это регрессия. Если нужно предсказать класс (`junior / middle / senior`) — это классификация.

## Как это связано с ML

Нельзя обучать и проверять модель на одних данных — она просто запомнит ответы. Поэтому данные делят на train (обучение) и test (честная проверка). Цель ML — не запомнить примеры, а уметь предсказывать на новых данных.

## Практика

1. В примере с зарплатой какие колонки относятся к X, а какая колонка — к y?
2. Для задачи «предсказать цену квартиры» что может быть X, а что будет y?
3. Почему target нельзя добавлять внутрь X?
4. Есть данные о фильмах — `genre`, `duration`, `year`, `rating`. Если модель должна предсказывать `rating`, что будет X, а что y?
5. Объясни своими словами: чем признаки отличаются от target?

## Краткий итог

- X — таблица признаков (вход модели).
- y — колонка с правильными ответами (target).
- Признаки описывают объект, target — то, что предсказываем.
- Данные делятся на train и test для честной оценки.
- Число в target → регрессия; класс в target → классификация.
</script>

# 01. DataFrame в Python для ML

## Зачем это нужно

Почти любая ML-задача начинается с данных в табличном виде: CSV-файл, выгрузка из SQL, Excel. В Python для работы с таблицами используют `pandas` и его основную структуру — DataFrame.

## Простая интуиция

DataFrame — это таблица, как в Excel. Каждая строка — один объект (один клиент, одна квартира, одна транзакция). Каждая колонка — одно свойство объекта (возраст, площадь, цена). Это главное правило: строка = объект, колонка = свойство.

## Что это такое

**DataFrame** — это таблица данных в Python (библиотека pandas). Строки — объекты, колонки — их атрибуты. Из DataFrame мы выделяем X (признаки) и y (target) для обучения модели.

## Как это работает

Создать DataFrame и посмотреть на него:

```python
import pandas as pd

df = pd.DataFrame({
    "experience_years": [1, 2, 3, 4],
    "english_level": [2, 3, 4, 4],
    "salary": [70000, 90000, 120000, 150000]
})

print(df.head())   # первые строки
print(df.shape)    # (4, 3) — 4 строки, 3 колонки
```

Выделить X и y:

```python
X = df[["experience_years", "english_level"]]
y = df["salary"]
```

Важно: одна колонка — `df["salary"]`, несколько колонок — `df[["col1", "col2"]]`.

## Простой пример

| experience_years | english_level | salary |
|-----------------|---------------|--------|
| 1 | 2 | 70000 |
| 2 | 3 | 90000 |
| 3 | 4 | 120000 |

Три строки = три объекта (кандидата). Три колонки = три свойства. Первые две — признаки (X), третья — target (y).

## Как это связано с ML

DataFrame — стандартная рабочая форма данных до обучения модели. В большинстве учебных и практических ML-задач данные сначала удобно готовить именно в DataFrame.

## Практика

1. В DataFrame что обычно означает одна строка, а что означает одна колонка?
2. Почему перед обучением модели важно сначала посмотреть на данные через `df.head()`?
3. Есть таблица с колонками `age`, `city`, `orders_count`, `bought`. Если `bought` — это target, какие колонки попадут в X?
4. Чем отличается `df["salary"]` от `df[["salary"]]`?
5. Ты открыл CSV-файл и видишь 10 000 строк и 12 колонок. Что ты проверишь первым перед обучением модели?

## Краткий итог

- DataFrame — таблица данных в Python (pandas).
- Строка = один объект, колонка = одно свойство.
- `df.head()`, `df.shape`, `df.columns` — базовые команды для первого взгляда.
- Из DataFrame выделяем X и y: `X = df[["col1", "col2"]]`, `y = df["target"]`.
- Сначала смотри на данные — потом обучай модель.

# 02. Pandas на практике

## Зачем это нужно

Pandas — основной инструмент работы с данными в Python. Прежде чем обучать модель, нужно уметь смотреть на данные: выбирать нужные колонки, фильтровать строки, искать странные значения.

## Простая интуиция

Pandas — это как Excel, но в коде. Три главных действия: выбрать колонки (как SELECT в SQL), отфильтровать строки (как WHERE), посмотреть на структуру (сколько строк, какие типы).

## Что это такое

Pandas — библиотека Python для работы с табличными данными. В уроке 04 мы создали DataFrame — теперь научимся с ним работать.

## Как это работает

```python
import pandas as pd

df = pd.DataFrame({
    "age": [25, 31, 28, 40],
    "city": ["Berlin", "Hamburg", "Berlin", "Munich"],
    "bought": [1, 0, 1, 0]
})

# Смотрим на структуру
df.head()        # первые 5 строк
df.columns       # названия колонок
df.shape         # (4, 3) — 4 строки, 3 колонки

# Выбираем колонки
df["age"]                  # одна колонка (Series)
df[["age", "city"]]        # несколько колонок (DataFrame)

# Фильтруем строки
df[df["age"] > 30]
df[df["city"] == "Berlin"]
df[(df["city"] == "Berlin") & (df["age"] > 26)]  # AND — используй &, не and
```

Важно: при нескольких условиях каждое берём в скобки, `&` вместо `and`, `|` вместо `or`.

## Простой пример

Выделить X и y:

```python
X = df[["age", "city"]]
y = df["bought"]
```

Это аналог SQL: `SELECT age, city FROM df WHERE ... → X`; `SELECT bought → y`.

## Как это связано с ML

Pandas — рабочая среда для первичного анализа данных (EDA). Прежде чем обучать модель, нужно посмотреть: какие колонки есть, нет ли пропусков, не попала ли в X колонка target.

## Практика

1. Какие три команды Pandas используют для первого взгляда на структуру DataFrame?

3. Есть DataFrame с колонками `age`, `city`, `orders`, `bought`. Напишите фильтр, который оставляет только строки, где `city == "Berlin"` и `age < 30`.
4. В уроке 03 мы узнали, что X — это матрица признаков, а y — целевая переменная. Как выделить X и y из DataFrame `df[["age", "city", "orders", "bought"]]`, если `bought` — это target?
5. У вас есть DataFrame с 500 строками. Вы хотите убедиться, что колонка `bought` не попала в X. Какой командой Pandas вы это проверите?

## Краткий итог

- `df.head()`, `df.shape`, `df.columns` — первый взгляд на данные.
- Одна колонка: `df["col"]`, несколько: `df[["col1", "col2"]]`.
- Фильтрация: `df[df["col"] > value]`, несколько условий через `&` и `|`.
- Сначала изучи данные — только потом думай о модели.

# 03. Типы данных в Pandas

## Зачем это нужно

Не все колонки можно сразу отдать модели. Строки, пропуски, даты — это всё требует обработки. Понять типы данных заранее — значит избежать ошибок при обучении.

## Простая интуиция

Pandas хранит данные с указанием типа: это число, строка или пропуск. Модель чаще всего ожидает числа. Строка `"Berlin"` — не число. Пустое значение `NaN` — тоже не число. Поэтому до обучения нужно проверить, что лежит в каждой колонке.

## Что это такое

Основные типы в pandas:
- `int64`, `float64` — числа (модели работают напрямую)
- `object` — строки или смешанные данные (нужна обработка)
- `bool` — True/False
- `NaN` / `None` — пропуски (многие модели не умеют их обрабатывать)

Важно: число `25` и строка `"25"` — разные вещи. Pandas может хранить их по-разному.

## Как это работает

```python
import pandas as pd

df = pd.DataFrame({
    "age": [25, 31, None],
    "city": ["Berlin", "Hamburg", "Berlin"],
    "salary": [70000, 90000, 120000]
})

df.dtypes        # типы колонок
df.info()        # общая информация + сколько непустых значений
df.isna().sum()  # сколько пропусков в каждой колонке
```

## Простой пример

Запускаем `df.dtypes` и видим: `age` — float64 (из-за None), `city` — object, `salary` — int64. Отсюда сразу видно: `city` нужно кодировать, `age` нужно обработать пропуск.

## Как это связано с ML

Проверка типов — первый шаг перед Feature Engineering. Даже красиво выглядящая таблица может содержать строки вместо чисел или скрытые пропуски. Это всё влияет на обучение модели.

## Практика

1. Какие три команды Pandas позволяют проверить типы колонок и найти пропуски?
2. `df.dtypes` показывает, что колонка `age` имеет тип `object`. Что это, вероятнее всего, означает и что нужно сделать перед обучением?
3. В DataFrame есть колонка `salary` со значениями `[70000, "нет данных", 120000]`. Какой тип присвоит Pandas этой колонке и почему?
4. Из урока 05 мы знаем, как отбирать строки по условию. Как с помощью знания о типах проверить, что ни одна числовая колонка не содержит строку?
5. Вы загрузили CSV и хотите передать данные в модель. Перед выделением X и y вы запускаете `df.info()` и видите, что `city` — тип `object`, а `age` — `float64` с 10 пропусками. Что нужно сделать с каждой из этих колонок?

## Краткий итог

- Числа (`int`, `float`) — модели работают с ними напрямую.
- Строки (`object`) — требуют кодирования (уроки 28–31).
- Пропуски (`NaN`) — требуют обработки (урок 26).
- `df.dtypes`, `df.info()`, `df.isna().sum()` — три команды первичной проверки.
- Если таблица выглядит нормально, это ещё не значит, что данные готовы для модели.

# 05. Как выглядят данные в ML

## Зачем это нужно

Перед обучением модели задачу нужно перевести в понятный для неё вид.
Модель не видит «квартиру», «пользователя» или «письмо» так, как человек.
Она получает описание объекта в виде данных и пытается найти связь между этим описанием и нужным результатом.

Если задача плохо представлена в данных, модель будет учиться на слабом или неправильном описании реальности.
Например:

- забыли важное свойство объекта — модель его не учтёт;
- добавили случайный шум — модель может найти ложную связь;
- случайно добавили ответ во входные данные — получится утечка.

Поэтому до выбора модели нужно понять, как задача выглядит в данных.

## Простая интуиция

Допустим, мы хотим предсказывать цену квартиры.

Для человека квартира — это реальный объект: дом, район, ремонт, этаж, вид из окна.

Для модели квартира — это набор описаний:

```text
площадь
количество комнат
район
этаж
```

А цена — это то, что модель должна научиться предсказывать.

То есть мы переводим реальный объект в форму:

```text
описание объекта → модель → предсказание
```

## Что это такое

В ML данные часто представляют в виде таблицы.

Обычно:

- **строка** — один объект;
- **колонка** — одно свойство объекта;
- часть колонок используется как входные данные;
- отдельная колонка может быть тем, что модель должна предсказать.

Пример:

| area_m2 | rooms | district  | price  |
| ------: | ----: | --------- | -----: |
|      35 |     1 | outskirts |  6 млн |
|      50 |     2 | center    | 12 млн |
|      70 |     3 | center    | 17 млн |

Здесь каждая строка описывает одну квартиру.
Колонки `area_m2`, `rooms`, `district` описывают квартиру.
Колонка `price` содержит результат, который модель должна научиться предсказывать.

## Как это работает

Сначала мы собираем примеры, где результат уже известен.
Для задачи с квартирами это могут быть данные о квартирах, у которых уже известна цена:

```text
площадь, комнаты, район → цена
```

Модель смотрит на такие примеры и пытается найти закономерности.
Например:

- квартиры в центре часто дороже;
- большая площадь обычно повышает цену;
- количество комнат тоже может влиять на цену.

После обучения можно дать модели новую квартиру:

| area_m2 | rooms | district |
| ------: | ----: | -------- |
|      55 |     2 | center   |

И модель попробует предсказать цену.

## Простой пример

Есть таблица пользователей:

| age | city    | orders_count | bought |
| --: | ------- | -----------: | -----: |
|  25 | Berlin  |            4 |      1 |
|  40 | Hamburg |            1 |      0 |
|  31 | Berlin  |            6 |      1 |

Если задача — предсказать, купит ли пользователь товар, то модель может использовать:

```text
age
city
orders_count
```

А колонка `bought` показывает, что произошло на самом деле:

```text
купил / не купил
```

На практике такие таблицы часто обрабатывают через **Pandas DataFrame**.
Но сейчас важен не инструмент, а сама идея: данные должны описывать объект так, чтобы модель могла искать закономерности.

## Как это связано с ML

Данные — это способ объяснить задачу модели.

До обучения нужно понять:

- какой объект мы описываем;
- какие свойства этого объекта у нас есть;
- какой результат хотим получить;
- нет ли в данных лишней или нечестной информации.

Хорошая модель не спасёт плохо собранные данные.
Если задача неправильно представлена в таблице, обучение начнётся уже с ошибки.

## Практика

1. Почему перед обучением модели задачу нужно сначала представить в виде данных?
2. В примере с квартирами что является объектом, а что является свойствами объекта?
3. Нужно предсказать, купит ли пользователь товар. Какие данные о пользователе могут помочь модели, а какие данные выглядели бы лишними или подозрительными?

## Краткий итог

- ML-задачу нужно перевести в данные, с которыми может работать модель.
- Частый формат данных в ML — таблица.
- Строка обычно описывает один объект: квартиру, пользователя, письмо или товар.
- Колонка описывает одно свойство объекта.
- Перед обучением важно понять, какие данные описывают объект и какой результат нужно предсказать.
</script>

# 06. Что модель реально учит из данных

## Зачем это нужно

Многие думают, что модель «понимает» задачу — как человек.
На самом деле она делает кое-что другое и гораздо более простое.

Если не понимать, чему именно учится модель, легко сделать ошибки:
- дать ей данные, по которым она выучит не то;
- удивляться, почему хорошая модель ошибается на реальных данных;
- не замечать, что модель нашла случайную связь вместо настоящей.

## Простая интуиция

Представь, что тебе дали тысячу карточек.
На каждой написаны характеристики квартиры и её цена.

Ты начинаешь листать карточки и замечаешь:
- квартиры в центре стоят дороже;
- большая площадь чаще означает большую цену;
- первый этаж обычно дешевле.

Ты не понял, почему это так. Ты просто заметил закономерность в числах.

Модель делает то же самое — только вместо наблюдений у неё математика.

## Что это такое

Модель учится находить **связь между X и y** в обучающих данных.

По сути она строит функцию:

```text
f(X) ≈ y
```

То есть: «по входным данным X попробуй предсказать y».

Модель не знает, что такое квартира, центр или ремонт.
Она видит только числа и категории — и ищет, какие из них чаще связаны с каким значением y.

## Как это работает

Во время обучения модель смотрит на много пар `(X, y)` и пытается найти правило, которое работает для большинства примеров.

Например, для задачи с ценой квартиры:

```text
X = [площадь=35, район=outskirts, комнат=1]  →  y = 6 млн
X = [площадь=70, район=center,    комнат=3]  →  y = 17 млн
```

Модель замечает: чем больше площадь и чем ближе к центру, тем выше цена.
Это и есть «знание», которое она извлекла — статистическая связь между признаками и результатом.

После обучения на новом объекте она применяет это правило:

```text
X = [площадь=55, район=center, комнат=2]  →  y = ?
```

И выдаёт предсказание.

## Простой пример

Есть задача: предсказать, купит ли пользователь товар.

Обучающие данные показывают: пользователи с `orders_count > 3` покупали в 80% случаев.
Пользователи с `orders_count = 0` — только в 10% случаев.

Модель замечает эту связь и начинает использовать её для новых пользователей.

Она не «понимает», почему активные покупатели чаще покупают.
Она просто выучила: большой `orders_count` → высокая вероятность покупки.

## Как это связано с ML

Из этого следует важное следствие:

**Модель учится только тому, что есть в данных.**

Если в данных есть полезная закономерность — модель её найдёт.
Если закономерности нет — модель будет угадывать.
Если в данных есть случайная или ложная связь — модель выучит её тоже.

Именно поэтому качество данных важнее сложности алгоритма.
Плохие данные — слабая модель, какой бы мощный алгоритм ты ни использовал.

## Практика

1. Чему именно учится модель во время обучения — правилам или статистическим связям?
2. Почему модель может выучить ложную связь и начать ошибаться на новых данных?
3. В данных о квартирах все дорогие квартиры сфотографированы в солнечный день. Что может выучить модель, если добавить в X признак «погода на фото»?
4. В уроке 4 мы говорили, что плохо представленные данные мешают обучению. Как это связано с тем, что модель учится только тому, что есть в данных?
5. Вспомни схему `input → model → output` из урока 2. Что именно происходит внутри «model» после того, как обучение завершено?

## Краткий итог

- Модель не понимает задачу — она ищет статистические связи между X и y.
- Во время обучения она строит функцию: по признакам объекта предсказать результат.
- Если связь в данных есть — модель её найдёт. Если её нет — модель будет угадывать.
- Модель может выучить случайную связь, если она есть в обучающих данных.
- Качество данных важнее сложности алгоритма.
</script>

# 08. Числовые и категориальные признаки

## Зачем это нужно

Модели работают с числами. Но реальные данные — смесь чисел, строк и категорий.

Понять разницу между числовыми и категориальными признаками нужно, чтобы знать, какие колонки можно передать в модель напрямую, а какие потребуют дополнительной обработки.

## Простая интуиция

Возьмём таблицу пользователей:

| age | city    | orders_count | bought |
| --: | ------- | -----------: | -----: |
|  25 | Berlin  |            4 |      1 |
|  40 | Hamburg |            1 |      0 |
|  31 | Berlin  |            6 |      1 |

`age = 25` или `orders_count = 4` — это числа. Модель понимает их сразу: можно сравнивать, складывать, находить связи.

`city = "Berlin"` — это строка. Модель не знает, что с ней делать. Нужно превратить категорию в числа, но сделать это правильно — не добавив ложный смысл.

## Что это такое

**Числовые признаки** — колонки с числами: `age`, `salary`, `orders_count`.
Большинство моделей может работать с ними напрямую.

**Категориальные признаки** — колонки с категориями: `city`, `device`, `plan`.
Перед обучением их нужно закодировать — превратить в числовой вид.

## Как это работает

Главная проблема: нельзя просто заменить категории числами по порядку.

Если сделать `Berlin=1, Hamburg=2, Munich=3`, модель начнёт считать, что Munich > Hamburg > Berlin — как будто между городами есть числовой порядок. Но его нет. Такое кодирование добавляет в данные ложный сигнал.

Один из способов решить это — **One-Hot Encoding**: каждая уникальная категория получает свою отдельную колонку.

**До кодирования:**

| city    |
| ------- |
| Berlin  |
| Hamburg |
| Berlin  |

**После One-Hot Encoding:**

| city_Berlin | city_Hamburg |
| ----------: | -----------: |
|           1 |            0 |
|           0 |            1 |
|           1 |            0 |

Теперь никакого ложного порядка нет. Каждая колонка просто говорит: «этот город — да или нет».

Подробнее о кодировании категорий — в уроках 28–31. Там разберём разные способы и когда какой применять.

## Простой пример

Есть задача — предсказать отток клиента. Признаки:

| age | city    | orders_count |
| --: | ------- | -----------: |
|  25 | Berlin  |            4 |
|  40 | Hamburg |            1 |

`age` и `orders_count` — числовые, идут в модель как есть.
`city` — категориальный, нужно закодировать перед обучением.

После кодирования таблица X становится полностью числовой — и только тогда её можно передать в модель.

## Как это связано с ML

Перед тем как передать данные в модель, нужно убедиться, что все признаки в X — числовые.

Это касается любой задачи: регрессии, классификации, кластеризации.

Пропустить этот шаг — значит либо получить ошибку при обучении, либо незаметно передать в модель бессмысленные данные.

## Практика

1. В чём принципиальная разница между числовым и категориальным признаком с точки зрения модели?
2. Почему One-Hot Encoding решает проблему ложного порядка, а простая нумерация категорий — нет?
3. После One-Hot Encoding колонка `city` с тремя уникальными значениями превратится в сколько колонок? Что будет в каждой из них?

## Краткий итог

- Числовые признаки (`age`, `salary`, `orders`) обычно идут в модель напрямую.
- Категориальные признаки (`city`, `device`, `plan`) нужно закодировать в числа.
- Нельзя просто заменить категории числами по порядку — это добавит ложный смысл.
- One-Hot Encoding — один из способов: каждая категория получает отдельную колонку 0/1.
- Все признаки в X должны быть числовыми до передачи в модель.

# 33. Как выбирать признаки для X

## Зачем это нужно

Не каждая колонка в таблице должна попасть в X. Неправильный выбор признаков — одна из главных причин плохой модели: лишний мусор мешает учиться, а утечка данных делает результаты нечестными.

## Простая интуиция

В таблице обычно есть четыре типа колонок: полезные признаки, target, технический мусор и утечка данных. Задача — оставить только первый тип.

## Что это такое

**Полезные признаки** — описывают объект и реально связаны с тем, что мы предсказываем. Например: `age`, `city`, `orders_count`.

**Target** — то, что предсказываем. Нельзя включать в X.

**Технический мусор** — `id`, `row_number`, `uuid`. Не описывают объект по смыслу — модель может найти ложные связи с target.

**Утечка данных** — признак, который становится известен только после события, которое мы предсказываем. Например, `purchase_date` для задачи «купит ли клиент».

## Как это работает

Главный вопрос перед добавлением колонки в X:

> Была бы эта информация известна в момент предсказания?

Если нет — не включаем. Дополнительная проверка: эта колонка реально описывает объект по смыслу?

```python
X = df[["age", "city"]]   # полезные признаки
y = df["bought"]          # target
# client_id и purchase_date — не берём
```

## Простой пример

Задача: предсказать, купит ли клиент. Таблица содержит: `client_id`, `age`, `city`, `orders_count`, `purchase_date`, `bought`.

В X берём: `age`, `city`, `orders_count`. Не берём: `client_id` (мусор), `purchase_date` (утечка — дата появляется только после покупки), `bought` (это target).

## Как это связано с ML

Утечка данных — тема урока 34. Здесь важно понять базовую идею: не всё, что есть в таблице, нужно давать модели. Плохой выбор признаков не исправить даже самой сильной моделью.

## Практика

## Краткий итог

- В X идут только полезные признаки, известные в момент предсказания.
- Target — это y, не часть X.
- `id`, `uuid` — технический мусор, обычно не нужен.
- Утечка: признак появляется после события → нельзя использовать.
- Главный вопрос: «Была бы эта информация известна в момент предсказания?»

# 32. Масштабирование признаков

## Зачем это нужно

Некоторые модели реагируют на масштаб чисел: если `age = 25` и `salary = 150000`, модель может уделять больше внимания зарплате просто из-за большей числовой величины, а не потому что она важнее. Масштабирование устраняет эту проблему.

## Простая интуиция

Представь двух учителей: один оценивает по шкале 1–5, другой — по шкале 1–100. Если сложить их оценки без нормализации, второй будет доминировать только за счёт шкалы. Масштабирование приводит признаки к одному диапазону, чтобы модель оценивала их по реальной важности.

## Что это такое

**Масштабирование (scaling)** — приведение числовых признаков к примерно одинаковому диапазону. Смысл данных не меняется, меняется только шкала.

Когда нужно: линейные модели (`LinearRegression`, `LogisticRegression`), `k-NN`, `SVM`.

Когда обычно не нужно: деревья (`DecisionTree`, `RandomForest`, `GradientBoosting`) — они разбивают данные по порогам и не зависят от масштаба.

## Как это работает

```python
from sklearn.model_selection import train_test_split
from sklearn.preprocessing import StandardScaler

X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)

scaler = StandardScaler()
X_train_scaled = scaler.fit_transform(X_train)  # учим на train
X_test_scaled = scaler.transform(X_test)        # применяем к test
```

Важно: `fit` только на train. К test — только `transform`. Если сделать `fit` на всём датасете до split — информация из test попадёт в train (утечка данных).

## Простой пример

`age` колеблется от 18 до 70, `salary` — от 30 000 до 300 000. После StandardScaler оба признака будут примерно в диапазоне [-3, 3], и модель будет оценивать их по реальной информативности.

## Как это связано с ML

Масштабирование — часть Feature Engineering и пайплайна обработки данных. Правило «scaler обучается только на train» применяется ко всем преобразованиям, не только к scaling.

## Практика

1. Какие типы моделей чувствительны к масштабу признаков, а для каких масштабирование обычно не нужно?
2. Чем отличается `scaler.fit_transform(X_train)` от `scaler.transform(X_test)`? Почему нельзя применять `fit_transform` к test?
3. У вас признаки `age` (18–70) и `salary` (30000–300000). После `StandardScaler` в каком примерном диапазоне окажутся оба признака?
4. Из урока 07 мы знаем, что категориальные признаки нужно кодировать. Нужно ли масштабировать числовые признаки перед передачей в `DecisionTreeClassifier`?
5. Вы строите пайплайн: сначала делаете `scaler.fit_transform(X)` на всём датасете, затем делаете split на train/test. Что в этом не так и почему это нарушает честность оценки модели?

## Краткий итог

- Масштабирование нужно для линейных моделей, k-NN, SVM.
- Для деревьев и бустинга обычно не нужно.
- `scaler.fit_transform(X_train)` — учим на train.
- `scaler.transform(X_test)` — применяем к test (никакого fit).
- Масштабирование до split — ошибка: информация из test попадает в train.

# 09. Регрессия vs классификация

## Зачем это нужно

Перед тем как выбрать модель и метрику, нужно определить тип задачи. Регрессия и классификация — два главных типа в supervised learning. От этого зависит, какой алгоритм брать (`LinearRegression` или `LogisticRegression`), какую метрику считать (MAE или Accuracy) и как трактовать результат.

## Простая интуиция

- **Регрессия** отвечает на вопрос «**сколько?**»: сколько стоит квартира, сколько минут займёт доставка, какая будет зарплата.
- **Классификация** отвечает на вопрос «**к какому классу?**»: спам или нет, купит или не купит, кот / собака / птица.

Если ответ — произвольное число, это регрессия. Если ответ — выбор из фиксированного списка категорий, это классификация.

## Что это такое

**Регрессия** — задача, где target `y` — непрерывное число. Примеры: `price`, `salary`, `temperature`, `delivery_time_minutes`.

**Классификация** — задача, где target `y` — метка класса из конечного набора. Примеры: `spam (0/1)`, `churn (0/1)`, `species (cat/dog/bird)`.

Важный нюанс: если target записан как `0/1`, это всё равно **классификация**, а не регрессия. Важен смысл, а не формат числа. Модель должна выбрать один из классов, а не вернуть значение «0.73».

## Как это работает

| | Регрессия | Классификация |
|---|---|---|
| Что предсказываем | число | класс |
| Пример target | 12.4 млн руб. | `spam` / `not_spam` |
| Типичные модели | LinearRegression, RandomForestRegressor | LogisticRegression, RandomForestClassifier |
| Метрики | MAE, MSE, RMSE, R² | Accuracy, Precision, Recall, F1, ROC-AUC |

В sklearn это видно прямо в имени класса: `*Regressor` для регрессии, `*Classifier` для классификации.

## Простой пример

```python
import pandas as pd
from sklearn.linear_model import LinearRegression, LogisticRegression

df = pd.DataFrame({
    "experience": [1, 3, 5, 7],
    "english":    [2, 3, 4, 5],
    "salary":     [60_000, 90_000, 130_000, 180_000],   # число → регрессия
    "hired":      [0, 1, 1, 1],                          # 0/1 → классификация
})

X = df[["experience", "english"]]

# Регрессия: предсказываем зарплату
reg = LinearRegression().fit(X, df["salary"])
print(reg.predict([[4, 3]]))   # например, 110_000

# Классификация: предсказываем, наймут ли
clf = LogisticRegression().fit(X, df["hired"])
print(clf.predict([[4, 3]]))   # например, [1]
```

Одни и те же признаки X, но разный target → разные алгоритмы и разные метрики.

## Как это связано с ML

Тип задачи — первое, что нужно понять, глядя на данные. От этого зависит:
- какой класс модели импортировать (`*Regressor` или `*Classifier`);
- какую функцию потерь модель оптимизирует внутри;
- какой метрикой её оценивать (урок 13 — классификация, урок 15 — регрессия);
- как трактовать `predict()` — как число или как класс.

Также бывает обучение без учителя — например, кластеризация. Но это уже отдельная история (раздел про unsupervised).

## Практика

1. Определи тип задачи для каждого target: `house_price`, `is_fraud (0/1)`, `delivery_minutes`, `species (cat/dog/bird)`.
2. Почему `churn = 0/1` — это классификация, а не регрессия, если значения числовые?
3. Задача: предсказать оценку фильма от 1 до 10. Это регрессия или классификация? Что меняется, если нужно вернуть точное число, а не категорию?
4. Из урока 07 мы знаем, что категориальные признаки нужно кодировать. Если target — строка `"cat"/"dog"`, это регрессия или классификация? Что нужно сделать с таким target перед обучением?
5. Вы выбрали `LinearRegression` для задачи «купит ли клиент (0/1)». Какая проблема возникнет при интерпретации предсказаний и какую модель стоит взять вместо?

## Краткий итог

- Регрессия → число. Классификация → класс.
- `0/1` в target — это классификация, а не регрессия.
- Тип задачи определяет модель (`*Regressor` / `*Classifier`) и метрику.
- Метрики разные: MAE/RMSE для регрессии, Accuracy/F1 для классификации.
- Сначала пойми тип задачи — потом выбирай алгоритм.

# 10. Вероятности в классификации

## Зачем это нужно

В уроке 9 мы разобрали, что классификация — это задача, где модель выбирает класс.
Но на самом деле большинство моделей не просто говорят «спам» или «не спам».

Сначала они выдают число от 0 до 1 — уверенность в том, что объект принадлежит к классу.
И только потом это число превращается в ответ.

Понимать это важно, потому что порог, при котором число становится классом, можно менять.
И от этого выбора зависит, как модель ведёт себя в реальной задаче.

## Простая интуиция

Представь, что ты решаешь — брать зонт или нет.
Если вероятность дождя 90% — берёшь. Если 20% — нет.
Но порог «брать зонт» у всех разный: кто-то берёт при 40%, кто-то только при 70%.

Модель работает так же. Она говорит: «вероятность того, что это спам — 0.87».
А ты уже решаешь, при каком значении считать письмо спамом.

## Что это такое

**Вероятность в классификации** — число от 0 до 1, которое модель выдаёт для каждого объекта.

Оно показывает, насколько модель уверена, что объект относится к положительному классу.

- `0.95` — модель почти уверена, что это класс 1
- `0.5` — модель не определилась
- `0.12` — модель склоняется к классу 0

Финальный класс определяется через **порог (threshold)**.
По умолчанию он равен `0.5`: если вероятность выше — класс 1, ниже — класс 0.

## Как это работает

Модель не переключается сразу между классами — она плавно меняет уверенность.

Пример: предсказываем, купит ли пользователь товар.

| age | orders_count | P(bought=1) | Класс при пороге 0.5 |
| --: | -----------: | ----------: | -------------------- |
|  25 |            6 |        0.91 | купит                |
|  40 |            1 |        0.34 | не купит             |
|  31 |            0 |        0.08 | не купит             |
|  28 |            3 |        0.52 | купит                |

Четвёртый пользователь попадает в «купит» с вероятностью 0.52 — совсем немного выше порога.
Если задача требует большей уверенности, порог можно поднять до 0.7 — и тогда он попадёт в «не купит».

## Простой пример

Допустим, модель определяет болезнь по анализам.

При пороге `0.5`:
- меньше пропустим больных, но больше здоровых попадёт на повторный осмотр.

При пороге `0.3`:
- ещё меньше пропустим больных, но ещё больше лишних направлений.

При пороге `0.8`:
- меньше лишних направлений, но выше риск пропустить болезнь.

Правильный порог зависит от задачи — не от модели.

## Как это связано с ML

Вероятности нужны не только для бинарной классификации.

В задачах с несколькими классами модель выдаёт вероятность для каждого:

| Объект | P(кошка) | P(собака) | P(птица) | Класс  |
| ------ | -------: | --------: | -------: | ------ |
| фото 1 |     0.78 |      0.15 |     0.07 | кошка  |
| фото 2 |     0.11 |      0.82 |     0.07 | собака |

Сумма вероятностей всегда равна 1. Побеждает класс с наибольшей.

Это важно понимать при выборе метрик — об этом подробнее в уроках 13 и 14.

## Практика

1. Модель выдала вероятность 0.63. Какой класс она присвоит при пороге 0.5? А при пороге 0.7?
2. Почему модель выдаёт вероятность, а не сразу готовый класс — в чём практическая польза?
3. В задаче выявления мошенничества лучше ошибиться в сторону «подозрительно» или «нормально»? Как это влияет на выбор порога?
4. В уроке 9 мы разобрали, что регрессия возвращает число, а классификация — класс. Чем вероятность в классификации отличается от output регрессии?
5. Модель классифицирует письма на три категории: спам, промо, обычное. Она выдала вероятности 0.15, 0.72, 0.13. Какой класс победит и почему?

## Краткий итог

- Большинство классификационных моделей выдают не класс, а вероятность от 0 до 1.
- Вероятность показывает уверенность модели в принадлежности объекта к классу.
- Порог по умолчанию — 0.5, но его можно менять под задачу.
- В многоклассовой задаче модель выдаёт вероятности для каждого класса — побеждает максимальная.
- Правильный порог зависит от цены ошибки в конкретной задаче, не от модели.
