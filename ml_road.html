<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML ROAD — Offline ML Learning System</title>
  <style>
    :root {
      --bg: #020609;
      --bg2: #050e14;
      --bg3: #091419;
      --border: #0d2a33;
      --border2: #1a4a5e;
      --cyan: #00e5ff;
      --cyan2: #00b8d9;
      --red: #ff4655;
      --green: #00ff9d;
      --orange: #ff9f43;
      --purple: #9b4dff;
      --text: #c8e8f0;
      --text2: #4a8a9e;
      --dim: #1e4a5a;
      --sw: 272px;
      --hh: 56px;
      --font: 'Segoe UI Variable', 'Segoe UI', 'Trebuchet MS', sans-serif;
      --mono: 'SFMono-Regular', 'Consolas', 'Menlo', 'Liberation Mono', monospace;
      --cyan-light: #69E2FC;
      --teal: #00cfb4;
      --gold: #ffc857;
      --text1: #d8f0f8;
      --text3: #9ec8d8;
      --text4: #8acde0;
      --text5: #6aa8be;
      --code-fg: #7fe8b8;
      --mb-bg: #060f1e;
      --mb-border: #0c1e32;
      --mb-inactive: #2a5070;
      --mb-dark: #1e4a65;
      /* ── Opacity variants (theme tokens) ─────────────────────────────── */
      --cyan-bg-faint:    #00e5ff06;
      --cyan-bg:          #00e5ff08;
      --cyan-bg-active:   #00e5ff0a;
      --cyan-glow-faint:  #00e5ff10;
      --cyan-glow-soft:   #00e5ff30;
      --cyan-glow:        #00e5ff55;
      --cyan-glow-vivid:  #00e5ff60;
      --purple-bg:        #9b4dff08;
      --purple-bg-hover:  #9b4dff10;
      --purple-glow-soft: #9b4dff20;
      --purple-border:    #9b4dff40;
      --purple-glow:      #9b4dff55;
      --green-bg:         #00ff9d08;
      --green-bg-tint:    #00ff9d0c;
      --green-border:     #00ff9d30;
      --green-glow:       #00ff9d60;
      --teal-bg:          #00cfb408;
      --teal-border:      #00cfb440;
      --teal-glow:        #00cfb455;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font);
      background:
        linear-gradient(rgba(0,229,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.018) 1px, transparent 1px),
        radial-gradient(ellipse at 10% 0%, var(--cyan-glow-faint) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 5%, var(--purple-bg) 0%, transparent 38%),
        var(--bg);
      background-size: 44px 44px, 44px 44px, 100% 100%, 100% 100%, 100% 100%;
      color: var(--text);
      line-height: 1.7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--cyan2);
      border-radius: 2px
    }

    /* HEADER */
    #hdr {
      height: var(--hh);
      background: var(--bg2);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 100
    }

    #hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: .5
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex-shrink: 0
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border: 1px solid var(--cyan);
      border-radius: 0;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow-soft), inset 0 0 8px var(--cyan-glow-faint);
      letter-spacing: -1px
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 14px var(--cyan-glow);
      letter-spacing: 3px
    }

    .logo-sub {
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      line-height: 1;
      margin-top: 2px
    }

    .srch {
      position: relative
    }

    .sb-srch {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border)
    }

    .srch-pre {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      pointer-events: none;
      opacity: .6;
      white-space: nowrap
    }

    #si {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 12px 7px 90px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color .2s
    }

    #si::placeholder {
      color: var(--dim)
    }

    #si:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow-soft)
    }

    #sr {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      z-index: 220;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 32px #00000090, 0 0 20px var(--cyan-bg)
    }

    #sr.vis {
      display: block
    }

    .sri {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s
    }

    .sri:hover {
      background: var(--bg3)
    }

    .sri:last-child {
      border-bottom: none
    }

    .sri-t {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      margin-bottom: 2px
    }

    .sri-s {
      font-size: 10px;
      color: var(--cyan2);
      font-family: var(--mono);
      letter-spacing: 1px;
      opacity: .7
    }

    .srh {
      color: var(--cyan);
      font-weight: 700;
      text-shadow: 0 0 6px var(--cyan-glow-vivid)
    }

    .sr0 {
      padding: 16px;
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      font-family: var(--mono)
    }

    .mbtn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-left: auto
    }

    .mbtn:hover {
      border-color: var(--cyan);
      color: var(--cyan)
    }

    /* LAYOUT */
    .lay {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* SIDEBAR */
    #sb {
      width: var(--sw);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: left .3s ease
    }

    .sbh {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .sbh-lbl,
    .sbh-t {
      display: none
    }

    .sbh2 {
      padding: 10px 14px 9px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cyan-bg-faint)
    }

    .sbh2::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 5px var(--cyan);
      flex-shrink: 0
    }

    .sbh2-t {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: .7
    }

    .sbnav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 16px
    }

    .sb-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint)
    }

    .sb-tab {
      flex: 1;
      padding: 11px 12px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5a8a98;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s, background .15s, box-shadow .15s
    }

    .sb-tab:last-child { border-right: none }

    .sb-tab.act {
      color: var(--cyan);
      background: var(--cyan-bg-active);
      box-shadow: inset 0 -2px 0 var(--cyan)
    }

    .sb-tab:hover:not(.act) { color: #9fd8e8 }

    .sov {
      display: none;
      position: fixed;
      inset: 0;
      top: var(--hh);
      background: rgba(0, 0, 0, .6);
      z-index: 85
    }

    .sov.vis {
      display: block
    }

    /* HOME ITEM */
    .hi {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      margin-bottom: 4px;
      border-left: 2px solid transparent
    }

    .hi:hover {
      background: var(--bg3)
    }

    .hi.act {
      border-left-color: var(--cyan);
      background: var(--cyan-bg)
    }

    .hi-ic {
      color: var(--cyan);
      font-size: 14px
    }

    .hi-t {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      letter-spacing: .5px
    }

    .hi.act .hi-t {
      color: var(--cyan)
    }

    /* SECTION GROUP */
    .sg {
      margin-bottom: 4px
    }

    .sgh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: background .15s
    }

    .sgh:hover {
      background: #091820
    }

    .sga {
      font-size: 9px;
      color: var(--text2);
      transition: transform .2s;
      flex-shrink: 0
    }

    .sg.open .sga {
      transform: rotate(90deg)
    }

    .sgn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid
    }

    /* section accent colours — unified cyan for module numbers */
    .sgn-c1, .sgn-c2, .sgn-c3, .sgn-c4, .sgn-c5, .sgn-c6,
    .sgn-c7, .sgn-c8, .sgn-c9, .sgn-c10, .sgn-c11 {
      color: var(--cyan-light);
      background: rgba(105, 226, 252, 0.06);
      border-color: rgba(105, 226, 252, 0.35)
    }

    /* Per-section accent colors: section name — two alternating tones */
    .sg.sec-c1 .sgname,
    .sg.sec-c3 .sgname,
    .sg.sec-c5 .sgname,
    .sg.sec-c7 .sgname,
    .sg.sec-c9 .sgname,
    .sg.sec-c11 .sgname { color: var(--cyan-light) }

    .sg.sec-c2 .sgname,
    .sg.sec-c4 .sgname,
    .sg.sec-c6 .sgname,
    .sg.sec-c8 .sgname,
    .sg.sec-c10 .sgname { color: var(--cyan-light) }

    /* Active module header: highlight with cyan */
    .sg.sg-act .sgname {
      color: var(--cyan-light);
      text-shadow: 0 0 8px rgba(105, 226, 252, 0.35)
    }

    /* Hover on module header: subtle brightening */
    .sgh:hover .sgname { color: #D6F7FF }

    /* Per-section active lesson — unified cyan for all sections */
    .sg[class*="sec-c"] .li.act { background: rgba(105,226,252,0.03); border-left-color: var(--cyan-light) }
    .sg[class*="sec-c"] .li.act .li-n { color: var(--cyan-light) }
    .sg[class*="sec-c"] .li.act .li-t { color: var(--text) }
    .sg[class*="sec-c"] .li.act::after { background: var(--cyan-light); box-shadow: 0 0 8px rgba(105,226,252,0.4) }

    .sgname {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .3px;
      color: #a8d8e8;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .ll {
      display: none;
      padding: 0 0 4px
    }

    .sg.open .ll {
      display: block
    }

    .li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 28px;
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent;
      position: relative
    }

    .li:hover {
      background: var(--bg3)
    }

    .li.act {
      background: rgba(105, 226, 252, 0.03);
      border-left-color: var(--cyan-light)
    }

    .li.act::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 14px;
      background: var(--cyan-light);
      box-shadow: 0 0 8px rgba(105, 226, 252, 0.4);
      border-radius: 0
    }

    .li-n {
      font-family: var(--mono);
      font-size: 11px;
      color: #1e5a6e;
      flex-shrink: 0;
      width: 20px
    }

    .li.act .li-n {
      color: var(--cyan-light)
    }

    .li-t {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .2px;
      color: var(--text5);
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .li.act .li-t {
      color: var(--text)
    }

    /* MAIN */
    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative
    }

    #main::before {
      content: '';
      position: fixed;
      top: var(--hh);
      left: var(--sw);
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 229, 255, .022) 3px,
        rgba(0, 229, 255, .022) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .ci {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 32px 24px;
      position: relative;
      z-index: 1
    }

    /* BREADCRUMBS */
    .bc {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 24px;
      flex-wrap: wrap
    }

    .bc span,
    .bc a {
      color: var(--text2);
      text-decoration: none;
      cursor: pointer;
      transition: color .15s
    }

    .bc a:hover {
      color: var(--cyan)
    }

    .bc .sep {
      color: var(--dim)
    }

    .bc .cur {
      color: var(--cyan)
    }

    /* HOME */
    .hero {
      padding: 20px 0 0;
      position: relative
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -32px;
      right: -32px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, var(--cyan-bg-active) 0%, transparent 70%);
      pointer-events: none
    }

    /* terminal boot panel */
    .hboot {
      background: var(--bg2);
      border: 1px solid rgba(0,229,255,.35);
      max-width: 100%;
      margin: 0 auto 18px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px))
    }

    .hboot::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cyan-bg-faint) 0%, transparent 50%);
      pointer-events: none
    }

    .hboot-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint)
    }

    .hboot-dot  { width:12px;height:12px;border-radius:50%;background:#ff5f57;box-shadow:0 0 6px #ff5f5760 }
    .hboot-dot2 { width:12px;height:12px;border-radius:50%;background:#febc2e;box-shadow:0 0 6px #febc2e60 }
    .hboot-dot3 { width:12px;height:12px;border-radius:50%;background:#28c840;box-shadow:0 0 6px #28c84060 }

    .hboot-bar { gap: 6px; }

    .hboot-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--dim);
      margin-left: 8px
    }

    /* Scrolling ticker inside console title bar */
    .hboot-marq-wrap {
      flex: 1;
      overflow: hidden;
      min-width: 0;
      margin-left: 10px;
    }
    .hboot-marq-tr {
      display: flex;
      width: max-content;
      animation: marq 90s linear infinite;
    }
    .hboot-marq-tx {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--dim);
      text-transform: uppercase;
      white-space: nowrap;
      opacity: .6;
      padding-right: 40px;
    }

    /* Button inside terminal */
    .ht-btn-wrap {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }
    .ht-a9 { animation: ht-in .06s ease 1.65s both; }

    /* ── Terminal console layout ── */
    .hterm {
      padding: 10px 22px 14px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
    }
    .ht-line { display: flex; align-items: baseline; white-space: nowrap; min-height: 1.55em; }
    .ht-gap  { height: .4em; }

    /* Prompt colours */
    .ht-u  { color: #4ec9b0; }
    .ht-at { color: var(--dim); }
    .ht-h  { color: var(--cyan); }
    .ht-p  { color: var(--text2); margin-right: .6ch; }

    /* Typed command */
    .ht-cmd {
      overflow: hidden; white-space: nowrap;
      display: inline-block; width: 0; vertical-align: bottom;
      color: var(--text);
      animation: ht-type .35s steps(5,end) .25s forwards;
    }
    @keyframes ht-type { to { width: 5ch; } }

    /* Horizontal rule inside terminal */
    .ht-hdivider {
      height: 1px;
      background: linear-gradient(90deg, rgba(0,229,255,.25), rgba(0,229,255,.08) 70%, transparent);
      margin: 10px 0;
    }

    /* Two-column layout */
    .ht-cols {
      display: grid;
      grid-template-columns: 1fr 1px 1.1fr;
      gap: 0 24px;
      align-items: start;
    }
    .ht-vdivider {
      background: rgba(0,229,255,.15);
      align-self: stretch;
    }
    .ht-col-left  { padding-right: 6px; }
    .ht-col-right { padding-left: 6px; }

    /* Small paper plane in left column */
    .ht-plane-sm {
      width: 90px;
      margin-bottom: 14px;
    }
    .ht-plane-sm svg {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 5px rgba(0,229,255,.7))
              drop-shadow(0 0 14px rgba(0,229,255,.3));
    }

    /* Left column text */
    .hterm .hascii {
      animation: none !important;
      margin: 0 !important;
      font-size: clamp(18px, 3.2vw, 34px) !important;
      letter-spacing: 4px !important;
    }
    .ht-sub { font-size:11px; color:var(--text2); letter-spacing:1.5px; text-transform:uppercase; }
    .ht-tag { font-size:10px; color:var(--red);   letter-spacing:2.5px; opacity:.75; }

    /* Right column */
    .ht-section-hdr {
      color: var(--cyan);
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      opacity: .85;
    }
    .ht-desc {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.75;
      white-space: normal;
      margin-bottom: 4px;
      font-family: var(--mono);
    }
    .ht-easter  { color: var(--cyan); }
    .ht-footnote {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .5px;
      margin-top: 4px;
      opacity: .7;
    }

    /* Blinking cursor */
    .ht-cursor {
      color: var(--cyan);
      opacity: 0;
      animation: ht-blink 1s step-end infinite;
      animation-delay: 1.55s;
    }
    @keyframes ht-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

    /* Staggered appearance */
    @keyframes ht-in { from{opacity:0} to{opacity:1} }
    .ht-a0 { animation: ht-in .04s ease 0.66s both; }  /* hdivider */
    .ht-a1 { animation: ht-in .04s ease 0.70s both; }  /* plane */
    .ht-a2 { animation: ht-in .04s ease 0.76s both; }  /* ML ROAD */
    .ht-a3 { animation: ht-in .04s ease 0.83s both; }  /* sub + tag */
    .ht-a4 { animation: ht-in .04s ease 0.92s both; }  /* sys info */
    .ht-a5 { animation: ht-in .04s ease 0.96s both; }  /* vdivider */
    .ht-a6 { animation: ht-in .08s ease 1.00s both; }  /* right: section 1 */
    .ht-a7 { animation: ht-in .08s ease 1.20s both; }  /* right: section 2 */
    .ht-a8 { animation: ht-in .04s ease 1.45s both; }  /* bottom prompt */

    .hboot-body {
      padding: 20px 24px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center
    }

    .hascii {
      font-family: var(--mono);
      font-size: clamp(22px, 4.5vw, 46px);
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow), 0 0 50px var(--cyan-glow-soft);
      letter-spacing: 4px;
      line-height: 1;
      animation: glitch 6s infinite
    }

    .hascii-sub {
      font-family: var(--mono);
      font-size: clamp(8px, 1.2vw, 11px);
      color: var(--text2);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: .8
    }

    .hascii-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: .7
    }

    .hsys {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.8;
      border-left: 1px solid var(--border2);
      padding-left: 18px;
      min-width: 160px
    }

    .hsys-row {
      display: flex;
      gap: 6px;
      white-space: nowrap
    }

    .hsys-k {
      color: var(--text2);
      letter-spacing: 1px;
      font-size: 10px
    }

    .hsys-v {
      color: var(--cyan);
      font-size: 10px
    }

    .hsys-v.ok {
      color: var(--green)
    }

    .hsys-v.dim {
      color: var(--dim)
    }

    .hmarq {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint);
      overflow: hidden;
      margin: 0 auto 16px;
      max-width: 760px
    }

    .hmarq-b {
      margin-top: 10px;
      margin-bottom: 0
    }

    .hmarq-tr {
      display: flex;
      width: max-content;
      animation: marq 90s linear infinite
    }

    .hmarq-b .hmarq-tr {
      animation-direction: reverse;
      animation-duration: 36s
    }

    .hmarq-tx {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      padding: 6px 10px;
      white-space: nowrap;
      opacity: .7
    }


    .hdesc {
      font-size: 14px;
      color: #7ab8cc;
      max-width: 600px;
      line-height: 1.7;
      margin: 16px auto 0;
      font-family: var(--mono);
      text-align: center
    }
    .hdesc p { margin: 0 0 8px }
    .hstart-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s
    }
    .hstart-btn:hover {
      background: var(--cyan);
      color: #000
    }

    .hsecs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px
    }

    .hsc {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px))
    }

    .hsc:hover {
      border-color: var(--border2);
      background: #081318
    }

    .hsc::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 2px;
      height: 100%
    }

    .hsc-c1::before { background: var(--cyan); box-shadow: 0 0 8px var(--cyan) }
    .hsc:hover.hsc-c1 { border-color: var(--cyan-glow); box-shadow: 0 0 16px var(--cyan-bg-active) }
    .hsc-c2::before { background: var(--teal); box-shadow: 0 0 8px var(--teal) }
    .hsc:hover.hsc-c2 { border-color: var(--teal-glow) }
    .hsc-c3::before { background: var(--green); box-shadow: 0 0 8px var(--green) }
    .hsc:hover.hsc-c3 { border-color: var(--green-glow) }
    .hsc-c4::before { background: var(--orange); box-shadow: 0 0 8px var(--orange) }
    .hsc:hover.hsc-c4 { border-color: #ff9f4355 }
    .hsc-c5::before { background: var(--red); box-shadow: 0 0 8px var(--red) }
    .hsc:hover.hsc-c5 { border-color: #ff465555 }
    .hsc-c6::before { background: var(--purple); box-shadow: 0 0 8px var(--purple) }
    .hsc:hover.hsc-c6 { border-color: var(--purple-glow) }
    .hsc-c7::before { background: #e0a0ff; box-shadow: 0 0 8px #e0a0ff }
    .hsc:hover.hsc-c7 { border-color: #e0a0ff55 }
    .hsc-c8::before { background: #7eb8ff; box-shadow: 0 0 8px #7eb8ff }
    .hsc:hover.hsc-c8 { border-color: #7eb8ff55 }

    .hscn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .hsc-c1 .hscn { color: var(--cyan) }
    .hsc-c2 .hscn { color: var(--teal) }
    .hsc-c3 .hscn { color: var(--green) }
    .hsc-c4 .hscn { color: var(--orange) }
    .hsc-c5 .hscn { color: var(--red) }
    .hsc-c6 .hscn { color: var(--purple) }
    .hsc-c7 .hscn { color: #e0a0ff }
    .hsc-c8 .hscn { color: #7eb8ff }
    .hsct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3
    }

    .hscd {
      font-size: 11px;
      color: var(--text2);
      font-family: var(--mono)
    }

    .hscls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .hscl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px 6px
    }

    /* COMMUNITY HUD */
    .commblock {
      margin-top: 16px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 0;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px))
    }

    .commblock-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint)
    }

    .commblock-hdr-dot {
      width: 6px;
      height: 6px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    .commblock-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .commlinks {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      padding: 10px 12px;
      justify-content: stretch
    }

    .cl {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 8px 14px;
      transition: all .15s;
      text-align: center;
      flex: 1 1 150px;
      margin: 3px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .cl::before {
      content: '>';
      font-family: var(--mono);
      color: var(--cyan);
      opacity: .4;
      font-size: 10px
    }

    .cl:hover {
      background: var(--cyan-bg);
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow-faint)
    }

    .cl:hover::before {
      opacity: 1
    }

    /* LESSON */
    .lhdr {
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
      position: relative;
      padding-left: 16px;
      border-left: 2px solid var(--cyan);
      box-shadow: -4px 0 12px var(--cyan-bg)
    }

    .lhdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan)
    }

    .lmeta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: .8;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .lmeta::before {
      content: '>';
      color: var(--cyan);
      opacity: .5
    }

    .ltitle {
      font-family: var(--mono);
      font-size: clamp(18px, 2.8vw, 26px);
      font-weight: 700;
      color: var(--text1);
      line-height: 1.2
    }

    /* MARKDOWN */
    .lc h1 {
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 700;
      color: var(--text1);
      margin: 32px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2)
    }

    .lc h1::before {
      content: '// ';
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      opacity: .7
    }

    .lc h2 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--cyan);
      margin: 24px 0 10px;
      letter-spacing: .5px
    }

    .lc h2::before {
      content: '# ';
      opacity: .5;
      font-family: var(--mono)
    }

    .lc h3 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text4);
      margin: 18px 0 8px
    }

    .lc h3::before {
      content: '## ';
      color: var(--cyan2);
      font-family: var(--mono);
      font-size: 11px;
      opacity: .5
    }

    .lc h4 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin: 14px 0 6px
    }

    .lc p {
      font-size: 15px;
      color: var(--text3);
      line-height: 1.82;
      margin-bottom: 13px
    }

    .lc strong {
      color: var(--text1);
      font-weight: 700
    }

    .lc em {
      color: var(--orange);
      font-style: italic
    }

    .lc ul,
    .lc ol {
      margin: 10px 0 14px 22px
    }

    .lc li {
      font-size: 15px;
      color: var(--text3);
      line-height: 1.72;
      margin-bottom: 3px
    }

    .lc ul li::marker {
      color: var(--cyan2)
    }

    .lc ol li::marker {
      color: var(--cyan);
      font-family: var(--mono)
    }

    .lc blockquote {
      background: var(--cyan-bg-faint);
      border-left: 2px solid var(--cyan);
      padding: 12px 18px;
      margin: 18px 0;
      box-shadow: -4px 0 12px var(--cyan-bg)
    }

    .lc blockquote p {
      color: var(--text4);
      font-style: normal;
      font-family: var(--mono);
      font-size: 13px;
      margin: 0
    }

    .lc blockquote strong {
      color: var(--cyan)
    }

    code.ic {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      background: var(--green-bg-tint);
      border: 1px solid var(--green-border);
      padding: 1px 6px
    }

    .cb {
      background: #030a0d;
      border: 1px solid var(--border2);
      border-left: 2px solid var(--cyan);
      margin: 14px 0;
      overflow: hidden;
      position: relative;
      box-shadow: -4px 0 14px var(--cyan-bg-active)
    }

    .cb::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      opacity: .4
    }

    .cbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      background: var(--cyan-bg);
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .cbl::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      display: inline-block;
      flex-shrink: 0
    }

    .cb pre {
      padding: 16px;
      overflow-x: auto
    }

    .cb code {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--code-fg);
      line-height: 1.65;
      white-space: pre
    }

    .cb-copy {
      position: absolute;
      top: 7px;
      right: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      transition: .18s ease;
      z-index: 2
    }

    .cb-copy:hover {
      color: var(--cyan);
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow-soft);
      background: var(--cyan-bg)
    }

    .cb-copy.done {
      color: var(--green);
      border-color: var(--green-glow);
      background: var(--green-bg)
    }

    .tw {
      overflow-x: auto;
      margin: 14px 0
    }

    .lc table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    .lc th {
      background: var(--cyan-bg);
      color: var(--cyan);
      border: 1px solid var(--border2);
      padding: 8px 12px;
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .lc td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      color: var(--text3);
      vertical-align: top;
      font-size: 13px
    }

    .lc tr:nth-child(even) td {
      background: var(--cyan-bg-faint)
    }

    .lc td code,
    .lc th code {
      font-family: var(--mono);
      color: var(--green);
      font-size: 12px
    }

    .lc hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
      position: relative
    }

    .lc hr::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 50px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    a.nl {
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px solid var(--cyan-glow-soft);
      transition: all .15s
    }

    a.nl:hover {
      color: #fff;
      border-bottom-color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan)
    }

    /* PREV/NEXT */
    .lnav {
      display: flex;
      gap: 12px;
      margin-top: 44px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap
    }

    .nb {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 12px 18px;
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      flex: 1;
      min-width: 180px;
      font-family: var(--mono)
    }

    .nb:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: var(--cyan-bg-faint);
      box-shadow: 0 0 12px var(--cyan-glow-faint)
    }

    .nb.pr {
      justify-content: flex-start
    }

    .nb.nx {
      justify-content: flex-end
    }

    .nb-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 2px;
      display: block;
      text-transform: uppercase
    }

    .nb:hover .nb-lbl {
      color: var(--cyan2)
    }

    .nb-t {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      max-width: 200px
    }

    /* STATUS */
    .stbar {
      flex-shrink: 0;
      height: 22px;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 18px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      position: relative
    }

    .stbar::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 120px;
      height: 1px;
      background: var(--cyan);
      opacity: .3
    }

    .stitem {
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase
    }

    .stitem-ok {
      color: #2a6878
    }

    .stitem-hi {
      color: var(--cyan);
      opacity: .7
    }

    .stdot {
      width: 5px;
      height: 5px;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {
      0%, 100% { opacity: 1 }
      50% { opacity: .4 }
    }

    /* RESPONSIVE */
    @media(max-width:768px) {
      .mbtn {
        display: block
      }

      .srch {
        max-width: 200px
      }

      #sb {
        position: fixed;
        left: -100%;
        top: var(--hh);
        height: calc(100vh - var(--hh));
        width: 84%;
        max-width: 300px;
        z-index: 90
      }

      #sb.open {
        left: 0
      }

      #main::before {
        left: 0
      }

      .ci {
        padding: 20px 16px 56px
      }

      .htitle {
        font-size: 32px
      }

      .sb-srch {
        padding: 10px 10px 8px
      }

      .lnav {
        flex-direction: column
      }

      .nb {
        min-width: 0
      }

      .logo-sub {
        display: none
      }
    }

    @media(max-width:480px) {
      .logo-text {
        font-size: 13px
      }
    }

    @keyframes glitch {
      0%, 92%, 100% {
        text-shadow: 0 0 20px var(--cyan-glow), 0 0 50px var(--cyan-glow-soft);
        transform: none
      }
      93% {
        text-shadow: 2px 0 6px var(--red), -2px 0 6px var(--cyan);
        transform: translateX(1px) skewX(-1deg)
      }
      94% {
        text-shadow: -2px 0 6px var(--red), 2px 0 6px var(--cyan);
        transform: translateX(-1px) skewX(1deg)
      }
      95% {
        text-shadow: 0 0 20px var(--cyan-glow), 0 0 50px var(--cyan-glow-soft);
        transform: none
      }
    }

    @keyframes marq {
      0% {
        transform: translateX(0)
      }
      100% {
        transform: translateX(-50%)
      }
    }

    /* ═══════ RIGHT PANEL ═══════ */
    #rp {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg2);
      border-left: 1px solid var(--border2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .25s ease;
      position: relative
    }

    #rp.rp-hidden {
      width: 0;
      border-left: none;
      overflow: hidden
    }

    #rp::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,229,255,.012) 3px,
        rgba(0,229,255,.012) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .rp-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border2);
      background: var(--cyan-bg-faint);
      flex-shrink: 0;
      position: relative;
      z-index: 1
    }

    .rp-hdr-dot {
      width: 5px;
      height: 5px;
      background: var(--purple);
      box-shadow: 0 0 6px var(--purple);
      flex-shrink: 0
    }

    .rp-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--purple);
      text-transform: uppercase;
      flex: 1
    }

    .rp-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      transition: .15s
    }

    .rp-close:hover {
      border-color: var(--red);
      color: var(--red)
    }

    .rp-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 1
    }

    .rptab {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 7px;
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: .15s;
      background: none
    }

    .rptab:hover {
      border-color: var(--border2);
      color: var(--text)
    }

    .rptab.act {
      border-color: var(--purple);
      color: var(--purple);
      background: var(--purple-bg-hover)
    }

    .rp-list {
      flex: 1;
      overflow-y: auto;
      position: relative;
      z-index: 1
    }

    .rpi {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent
    }

    .rpi:hover {
      background: var(--cyan-bg-faint)
    }

    .rpi.act {
      background: var(--purple-bg);
      border-left-color: var(--purple)
    }

    .rpi-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px
    }

    .rpi-cat {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 1px 5px;
      border: 1px solid
    }

    .rpi-cat-mlcore { color: var(--cyan); border-color: var(--cyan-glow-soft); background: var(--cyan-bg) }
    .rpi-cat-learning { color: var(--teal); border-color: var(--teal-border); background: var(--teal-bg) }
    .rpi-cat-prompt { color: var(--purple); border-color: var(--purple-border); background: var(--purple-bg) }
    .rpi-cat-other { color: var(--text2); border-color: var(--border) }

    .rpi-t {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text4);
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .rpi.act .rpi-t {
      color: var(--text)
    }

    .rpi-sum {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.4;
      margin-top: 3px;
      font-family: var(--mono)
    }

    /* KB page header in central area */
    .kb-hdr {
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
      position: relative;
      padding-left: 16px;
      border-left: 2px solid var(--purple);
      box-shadow: -4px 0 12px var(--purple-bg)
    }

    .kb-hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 1px;
      background: var(--purple);
      box-shadow: 0 0 8px var(--purple)
    }

    .kb-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
      letter-spacing: .5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .kb-cat-badge {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid var(--purple-glow);
      color: var(--purple);
      background: var(--purple-bg-hover)
    }

    .kb-type-badge {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid var(--border);
      color: var(--text2)
    }

    .kb-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .5px;
      line-height: 1.25;
      margin-bottom: 10px
    }

    .kb-summary {
      font-size: 13px;
      color: #7aaccb;
      line-height: 1.7;
      margin-bottom: 12px
    }

    .kb-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px
    }

    .kb-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      letter-spacing: .5px
    }

    .kb-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 9px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: .15s;
      margin-bottom: 20px
    }

    .kb-back:hover {
      border-color: var(--purple);
      color: var(--purple)
    }

    /* Toggle button in header */
    .rp-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 5px 12px;
      cursor: pointer;
      transition: .15s;
      text-transform: uppercase
    }

    .rp-toggle:hover {
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 8px var(--purple-glow-soft)
    }

    .rp-toggle.act {
      border-color: var(--purple);
      color: var(--purple);
      background: var(--purple-bg-hover)
    }

    @media(max-width:1100px) {
      #rp {
        position: fixed;
        right: -320px;
        top: var(--hh);
        bottom: 24px;
        width: 300px !important;
        z-index: 88;
        transition: right .25s ease
      }
      #rp.rp-open {
        right: 0
      }
      #rp.rp-hidden {
        right: -320px
      }
    }

    @media(max-width:768px) {
      .rp-toggle span.rp-toggle-lbl { display: none }
    }

    /* ─── EASTER EGG ─────────────────────────────────── */
    .prog-joke { position: relative; cursor: default }
    .prog-joke::after {
      content: ' в твоей голове';
      position: absolute;
      left: 100%;
      top: 0;
      white-space: nowrap;
      opacity: 0;
      color: var(--gold);
      font-style: italic;
      transition: opacity .4s ease;
    }
    .prog-joke:hover::after { opacity: 1 }

    /* ─── MUSIC BAR ─────────────────────────────────── */
    #music-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 32px;
      padding: 0 24px;
      background: var(--mb-bg);
      border-bottom: 1px solid var(--mb-border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mb-inactive);
      user-select: none;
      flex-shrink: 0;
      overflow: hidden;
      max-height: 32px;
      opacity: 1;
      transition: max-height .4s ease, opacity .3s ease, padding .4s ease, border-width .4s ease;
    }
    .mb-label {
      color: var(--mb-dark);
      letter-spacing: 1.5px;
      font-weight: 700;
      font-size: 11px;
      white-space: nowrap;
    }
    .mb-dot {
      font-size: 9px;
      line-height: 1;
      transition: color .3s, text-shadow .3s;
    }
    .mb-dot.live   { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); animation: mb-pulse 1.4s ease-in-out infinite }
    .mb-dot.paused { color: var(--gold) }
    .mb-status { font-size: 10px; letter-spacing: .5px; color: #1e3a50; }
    .mb-status.live   { color: var(--cyan) }
    .mb-status.paused { color: var(--gold) }
    .mb-play {
      background: transparent;
      border: 1px solid #142d42;
      color: var(--mb-dark);
      font-family: var(--mono);
      font-size: 11px;
      padding: 0 10px;
      cursor: pointer;
      letter-spacing: .5px;
      height: 22px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      transition: border-color .2s, color .2s, box-shadow .2s;
    }
    .mb-play:hover:not(:disabled) {
      border-color: var(--cyan-glow);
      color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow-faint);
    }
    .mb-play.playing {
      border-color: var(--cyan-glow-vivid);
      color: var(--cyan);
      box-shadow: 0 0 6px var(--cyan-glow-soft);
    }
    .mb-play:disabled { opacity: .22; cursor: not-allowed }
    .mb-vol-wrap { display: flex; align-items: center; gap: 8px }
    .mb-vol-lbl  { color: #1a3245; font-size: 10px; letter-spacing: .5px }
    .mb-vol-val  { color: var(--mb-inactive); width: 30px; text-align: right; font-size: 10px }
    .mb-vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 88px;
      height: 3px;
      outline: none;
      cursor: pointer;
      border-radius: 0;
      background: linear-gradient(to right, var(--mb-inactive) 60%, #0c1e30 60%);
      transition: background .1s;
    }
    .mb-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 9px;
      height: 9px;
      background: var(--mb-inactive);
      cursor: pointer;
      border-radius: 0;
      transition: background .2s, box-shadow .2s;
    }
    .mb-vol-slider.active::-webkit-slider-thumb {
      background: var(--cyan);
      box-shadow: 0 0 5px var(--cyan-glow-vivid);
    }
    .mb-channels { display: flex; align-items: center; gap: 4px; margin-left: auto }
    .mb-ch {
      background: transparent;
      border: 1px solid #0e2536;
      color: #1a3a52;
      font-family: var(--mono);
      font-size: 10px;
      padding: 0 7px;
      height: 20px;
      cursor: pointer;
      letter-spacing: .4px;
      white-space: nowrap;
      transition: border-color .2s, color .2s, background .2s;
    }

    .mb-ch:hover { border-color: var(--cyan-glow-soft); color: #00e5ff70 }
    .mb-ch.act   { border-color: var(--cyan-glow); color: var(--cyan); background: var(--cyan-bg-active) }
    #music-bar.is-offline {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-bottom-width: 0;
      pointer-events: none;
    }
    @keyframes mb-pulse { 0%,100%{opacity:1} 50%{opacity:.15} }

    .read-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      align-self: center;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      background: rgba(0,229,255,.06);
      transition: border-color .2s, color .2s, background .2s;
    }
    .read-btn.is-read {
      border-color: var(--dim);
      color: var(--text2);
      background: transparent;
    }
    .li-prog {
      width: 10px;
      height: 10px;
      border: 1px solid var(--dim);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      flex-shrink: 0;
      margin-right: 4px;
    }
    .sg-prog {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      margin-left: auto;
      opacity: .7;
    }


    /* ── FOCUS MODE ──────────────────────────────────────────────────── */
    .focus-btn {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 9px;
      cursor: pointer;
      transition: all .2s;
      opacity: .65;
    }
    .focus-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      opacity: 1;
      box-shadow: 0 0 8px var(--cyan-glow-faint);
    }

    #focus-exit {
      display: none;
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 9999;
      align-items: center;
      gap: 6px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all .2s;
    }
    #focus-exit:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 12px var(--cyan-glow-faint);
    }

    body.focus-mode #hdr,
    body.focus-mode #sb,
    body.focus-mode .sov,
    body.focus-mode #rp,
    body.focus-mode .stbar { display: none !important; }

    body.focus-mode #main::before { left: 0; top: 0; }

    body.focus-mode .lc p,
    body.focus-mode .lc li       { font-size: 17px; line-height: 1.9; }
    body.focus-mode .lc h1       { font-size: 22px; }
    body.focus-mode .lc h2       { font-size: 17px; }
    body.focus-mode .lc h3       { font-size: 16px; }
    body.focus-mode .lc h4       { font-size: 15px; }
    body.focus-mode .ltitle      { font-size: clamp(20px, 3.2vw, 30px); }
    body.focus-mode .ci {
      max-width: 960px;
      padding: 48px 48px 80px;
    }
    body.focus-mode #focus-exit { display: flex; }

    /* ═══════════════════════════════════════════════════════════════
       TERMINAL AESTHETIC LAYER — ML ROAD poster style
       ═══════════════════════════════════════════════════════════════ */

    /* 1 ── Grid: make lines 2.5× more visible */
    body {
      background:
        linear-gradient(rgba(0,229,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.05) 1px, transparent 1px),
        radial-gradient(ellipse at 10% 0%, rgba(0,229,255,.09) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 5%, rgba(155,77,255,.05) 0%, transparent 38%),
        var(--bg);
      background-size: 44px 44px, 44px 44px, 100% 100%, 100% 100%, 100% 100%;
    }

    /* 2 ── Scanlines: slightly stronger */
    #main::before {
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,229,255,.04) 3px,
        rgba(0,229,255,.04) 4px
      );
    }

    /* 3 ── Page-level corner brackets (frame the whole viewport) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(var(--cyan), var(--cyan)) top left  / 22px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top left  / 1px 22px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top right / 22px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top right / 1px 22px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom left  / 22px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom left  / 1px 22px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right / 22px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right / 1px 22px no-repeat;
      opacity: .35;
      pointer-events: none;
      z-index: 9998;
    }

    /* 4 ── Sidebar dots: removed */
    .sb-tabs::before { content: none; }

    /* 5 ── Module header: uppercase + tighter terminal feel */
    .sgname {
      letter-spacing: 1.4px !important;
      text-transform: uppercase;
      font-size: 10px !important;
    }

    /* 6 ── Open module: cyan glow highlight */
    .sg.open > .sgh {
      background: rgba(0,229,255,.045) !important;
      box-shadow: inset 0 0 28px rgba(0,229,255,.03);
    }

    /* 7 ── Lesson header: deeper glow + corner brackets */
    .lhdr {
      border-left-width: 3px;
      box-shadow: -6px 0 28px rgba(0,229,255,.14),
                  inset 0 0 60px rgba(0,229,255,.013);
    }
    .lhdr::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(var(--cyan), var(--cyan)) top right    / 16px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top right    / 1px 16px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom left  / 16px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom left  / 1px 16px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right / 16px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right / 1px 16px no-repeat;
      opacity: .25;
      pointer-events: none;
      z-index: 0;
    }

    /* 8 ── Nav buttons: corner brackets, stronger hover */
    .nb { position: relative; overflow: hidden; }
    .nb::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(var(--cyan), var(--cyan)) top left    / 10px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top left    / 1px 10px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top right   / 10px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top right   / 1px 10px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom left / 10px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom left / 1px 10px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right/ 10px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right/ 1px 10px no-repeat;
      opacity: .15;
      pointer-events: none;
      transition: opacity .2s;
    }
    .nb:hover::after { opacity: .5; }
    .nb:hover {
      box-shadow: 0 0 18px rgba(0,229,255,.12),
                  inset 0 0 30px rgba(0,229,255,.03) !important;
    }

    /* 9 ── Progress block: floating [ PROGRESS ] terminal label */
    #gp-block { position: relative; }
    #gp-block::before {
      content: '[ PROGRESS ]';
      font-family: var(--mono);
      font-size: 7px;
      letter-spacing: 1.8px;
      color: rgba(0,229,255,.3);
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      padding: 0 8px;
      white-space: nowrap;
    }

    /* 10 ── Progress fill: breathing cyan glow */
    #gp-fill { animation: cyan-breath 3s ease-in-out infinite; }
    @keyframes cyan-breath {
      0%,100% { box-shadow: 0 0 6px var(--cyan); }
      50%      { box-shadow: 0 0 18px var(--cyan), 0 0 34px rgba(0,229,255,.45); }
    }

    /* 11 ── Active lesson: stronger glow + › indicator */
    .li.act { background: rgba(0,229,255,.07) !important; }
    .li.act::before {
      content: '›';
      position: absolute;
      left: 10px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--cyan);
      opacity: .55;
      line-height: 1;
      top: 50%;
      transform: translateY(-50%);
    }

    /* 12 ── Lesson number in sidebar: dimmer, cyan only on active */
    .li-n {
      color: rgba(0,229,255,.2) !important;
      font-size: 9px !important;
    }
    .li.act .li-n { color: rgba(0,229,255,.7) !important; }

    /* 13 ── Lesson title in sidebar: slightly brighter on hover */
    .li:hover .li-t { color: var(--text3) !important; }

    /* 14 ── Header brand: stronger glow */
    .logo-text {
      letter-spacing: 4px !important;
      text-shadow: 0 0 18px var(--cyan-glow), 0 0 40px rgba(0,229,255,.3) !important;
    }
    .logo-icon {
      box-shadow: 0 0 16px var(--cyan-glow-vivid),
                  inset 0 0 14px rgba(0,229,255,.15),
                  0 0 40px rgba(0,229,255,.15) !important;
      border-color: rgba(0,229,255,.9) !important;
    }
    .logo:hover .logo-icon {
      box-shadow: 0 0 24px var(--cyan),
                  inset 0 0 20px rgba(0,229,255,.2),
                  0 0 60px rgba(0,229,255,.25) !important;
    }

    /* 15 ── Status bar: terminal system-status style */
    .stbar {
      border-top-color: rgba(0,229,255,.15) !important;
      background: rgba(2,6,9,.95) !important;
      height: 26px !important;
      justify-content: space-between !important;
      gap: 0 !important;
    }
    .stbar-left {
      display: flex;
      align-items: center;
      gap: 18px;
      flex: 1;
    }
    .stbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 1;
    }

    /* ── Music bar inside status bar ── */
    .stbar > #music-bar {
      display: flex !important;
      align-items: center;
      gap: 7px;
      background: transparent !important;
      border: none !important;
      height: auto !important;
      max-height: none !important;
      padding: 0 !important;
      margin: 0;
      flex-shrink: 0;
      font-size: 9px !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      overflow: visible !important;
      transition: none;
    }
    .stbar > #music-bar.is-offline {
      display: none !important;
    }
    .stbar > #music-bar .mb-label  { font-size: 9px; letter-spacing: 1px; }
    .stbar > #music-bar .mb-dot    { font-size: 8px; }
    .stbar > #music-bar .mb-status { font-size: 9px; }
    .stbar > #music-bar .mb-play   { height: 16px; font-size: 9px; padding: 0 7px; }
    .stbar > #music-bar .mb-vol-wrap { gap: 5px; }
    .stbar > #music-bar .mb-vol-lbl  { font-size: 9px; }
    .stbar > #music-bar .mb-vol-val  { font-size: 9px; width: 22px; }
    .stbar > #music-bar .mb-vol-slider { width: 58px; }
    .stbar > #music-bar .mb-channels { margin-left: 4px; gap: 3px; }

    const RIGHT_PANEL_DATA = [
      {

        summary: "Краткий справочник по базовым терминам AI, ML, данным, метрикам и продовому слою.",
        priority: 1,
        content: `# Ключевые термины и краткие объяснения

## 0. Карта направления

### AI — Artificial Intelligence / Искусственный интеллект

Общее название для систем, которые пытаются выполнять задачи, похожие на человеческое мышление.

ML — это одна из частей AI.

### Machine Learning / Машинное обучение

Подход, при котором система не получает все правила вручную, а учится находить закономерности на данных.

Проще говоря: мы показываем примеры, а модель учится делать выводы сама.

### Deep Learning / Глубокое обучение

Это часть ML, где используют большие нейронные сети.

Обычно применяется там, где задачи сложные: картинки, речь, тексты.

### Data Science

Направление про работу с данными: изучение, анализ, поиск закономерностей и построение моделей.

ML — это только одна часть Data Science.

### Model / Модель

Это математическая система, которая учится на данных и потом делает предсказание.

Например: “купит клиент товар или нет”.

### Prediction / Предсказание

Ответ модели на новых данных.

Например: вероятность того, что клиент уйдёт.

### Training / Обучение

Этап, когда модель смотрит на примеры и настраивает себя.

Именно тут она “учится”.

### Inference

Этап, когда уже обученная модель применяется в реальной жизни.

То есть обучение закончилось, и теперь модель просто выдает ответы.

---

## 1. База про данные

### Dataset / Датасет

Это набор данных, на котором мы работаем.

Обычно это таблица, где строки — объекты, а столбцы — их свойства.

### Row / Строка

Одна запись в таблице.

Например, один клиент, один заказ или один товар.

### Column / Колонка

Один признак или одно поле в таблице.

Например: возраст, город, цена.

### Feature / Признак

Это информация, которую мы даём модели на вход.

Именно по признакам модель пытается понять ответ.

### Target / Целевая переменная

Это то, что мы хотим предсказать.

Например: уйдёт клиент или нет, какая будет цена, купит ли человек товар.

### X

Так часто называют все входные признаки модели.

Проще говоря: всё, на что модель смотрит перед ответом.

### y

Так часто называют target — правильный ответ, который модель должна научиться предсказывать.

Например: \`0\` или \`1\`, если это задача “да/нет”.

### Label

Почти то же самое, что target, особенно в задачах классификации.

Это правильный класс или ответ для примера.

### Missing values / Пропуски

Это пустые значения в данных.

Они мешают обучению и часто требуют отдельной обработки.

### Numerical feature / Числовой признак

Признак, который выражен числом.

Например: возраст, зарплата, количество покупок.

### Categorical feature / Категориальный признак

Признак, который описывает категорию, а не число.

Например: город, пол, тип клиента.

---

## 2. Как устроена задача в ML

### Supervised Learning / Обучение с учителем

У модели есть примеры с готовыми правильными ответами.

Она учится по ним предсказывать ответ для новых данных.

### Unsupervised Learning / Обучение без учителя

У модели нет готовых правильных ответов.

Она сама ищет структуру, группы или закономерности в данных.

### Classification / Классификация

Задача, где модель выбирает один из вариантов ответа.

Например: “спам / не спам”, “уйдёт / не уйдёт”.

### Regression / Регрессия

Задача, где модель предсказывает число.

Например: цену квартиры или сумму заказа.

### Clustering / Кластеризация

Задача, где похожие объекты автоматически собираются в группы.

Например: сегменты клиентов по поведению.

### Binary classification

Классификация, где всего два варианта ответа.

Например: “да / нет”.

### Multiclass classification

Классификация, где вариантов ответа больше двух.

Например: определить категорию товара из нескольких классов.

### Baseline

Это очень простое стартовое решение, с которым сравнивают всё остальное.

Нужно, чтобы понять: новая модель реально лучше или просто сложнее.

---

## 3. Разделение данных

### Train set / Обучающая выборка

Часть данных, на которой модель учится.

Это её “учебник”.

### Validation set / Валидационная выборка

Часть данных, на которой мы проверяем модель в процессе работы.

Она помогает сравнивать варианты и настраивать модель.

### Test set / Тестовая выборка

Часть данных для финальной честной проверки.

На ней смотрят, как модель работает на новых данных.

### Split / Разбиение данных

Это разделение датасета на train, validation и test.

Нужно, чтобы обучение и проверка были честными.

### Generalization / Обобщающая способность

Способность модели хорошо работать не только на знакомых данных, но и на новых.

Это одна из главных целей ML.

---

## 4. Как модель учится

### Algorithm / Алгоритм

Это способ, по которому строится модель.

Например: линейная регрессия, дерево решений, нейросеть.

### Parameter / Параметр

Это внутренние настройки модели, которые она подбирает во время обучения.

Именно через них модель “запоминает” найденные закономерности.

### Epoch / Эпоха

Один полный проход модели по всем обучающим данным.

Часто модель обучается много эпох подряд.

### Loss function / Функция потерь

Это число, которое показывает, насколько модель ошибается во время обучения.

Чем меньше loss, тем лучше модель учится на текущем этапе.

### Optimization / Оптимизация

Процесс, в котором модель пытается уменьшить ошибку.

То есть постепенно становится точнее.

### Gradient descent / Градиентный спуск

Один из основных способов уменьшать ошибку модели.

Если очень просто: это метод, который помогает идти в сторону лучшего решения маленькими шагами.

### Learning rate / Скорость обучения

Показывает, насколько большими шагами модель меняет свои настройки.

Слишком большой шаг может мешать обучению, слишком маленький — делать его очень медленным.

---

## 5. Как понять, хороша ли модель

### Metric / Метрика

Это число, по которому мы оцениваем качество модели.

Разные задачи требуют разных метрик.

### Accuracy

Доля правильных ответов из всех ответов.

Полезная метрика, но иногда может обманывать, если классы несбалансированы.

### Precision

Показывает, как часто модель права, когда говорит “да”.

Важна там, где ложные срабатывания дорогие.

### Recall

Показывает, сколько настоящих “да” модель смогла найти.

Важна там, где опасно что-то пропустить.

### F1-score

Это баланс между precision и recall.

Удобно, когда важны оба показателя сразу.

### MAE — Mean Absolute Error

Средняя абсолютная ошибка в числовых задачах.

Показывает, на сколько в среднем модель ошибается.

### MSE — Mean Squared Error

Средняя ошибка, где большие промахи наказываются сильнее.

Часто используется в задачах регрессии.

### RMSE

Это корень из MSE.

Его удобно читать, потому что он ближе к обычному масштабу ошибки.

---

## 6. Что может пойти не так

### Overfitting / Переобучение

Модель слишком хорошо запомнила обучающие данные, но плохо работает на новых.

То есть она “выучила примеры”, а не поняла общий принцип.

### Underfitting / Недообучение

Модель слишком простая или слишком слабо обучена.

Она плохо работает даже на обучающих данных.

### Data leakage / Утечка данных

Ситуация, когда в признаки случайно попадает информация из будущего или почти готовый ответ.

Из-за этого модель кажется умной, хотя на деле проверка нечестная.

### Noise / Шум

Случайные или бесполезные данные, которые не помогают решать задачу.

Они могут мешать модели учиться.

### Outlier / Выброс

Очень необычное значение, сильно отличающееся от остальных.

Иногда это ошибка, а иногда редкий, но реальный случай.

### Imbalanced data / Дисбаланс классов

Ситуация, когда одного класса очень много, а другого очень мало.

Из-за этого модель может научиться игнорировать редкий, но важный класс.

---

## 7. Подготовка данных

### Preprocessing / Предобработка

Подготовка данных перед обучением.

Сюда входит очистка, заполнение пропусков, преобразование типов и другие шаги.

### Encoding / Кодирование категорий

Преобразование текстовых категорий в числовой вид, понятный модели.

Например, чтобы модель могла работать с колонкой “город”.

### One-hot encoding

Способ кодирования категорий, когда каждая категория превращается в отдельную колонку.

Например: Москва, Берлин, Париж — каждая как отдельный признак.

### Scaling / Масштабирование

Приведение числовых признаков к более удобному масштабу.

Это помогает некоторым моделям учиться стабильнее.

### Normalization / Нормализация

Один из способов привести значения к общему диапазону.

Часто используется, когда признаки слишком разные по масштабу.

### Standardization / Стандартизация

Преобразование данных так, чтобы у признака были удобные средние и разброс.

Это тоже помогает ряду моделей работать лучше.

### Feature engineering

Создание или улучшение признаков на основе исходных данных.

Часто хороший feature engineering даёт сильный прирост качества.

### Feature importance

Оценка того, насколько сильно признак влияет на решение модели.

Помогает понять, что для модели действительно важно.

---

## 8. Более глубокий слой

### Neural network / Нейронная сеть

Модель, вдохновлённая идеей работы нейронов.

Хорошо подходит для сложных задач: тексты, картинки, звук.

### Embedding

Способ представить объект в виде набора чисел так, чтобы похожие объекты были ближе друг к другу.

Часто используется для слов, текстов, товаров, пользователей.

### Transformer

Современная архитектура нейросетей, которая особенно хорошо работает с текстом.

Именно на ней построено много LLM.

### LLM — Large Language Model

Большая языковая модель, обученная на огромном количестве текста.

Она умеет понимать запросы и генерировать осмысленный текст.

### Fine-tuning

Дообучение уже готовой модели на своей задаче или своих данных.

Это дешевле и быстрее, чем обучать всё с нуля.

### Prompt

Текстовая инструкция, которую пользователь даёт языковой модели.

От формулировки prompt часто сильно зависит качество ответа.

---

### Deployment

Этап, когда модель выкладывают в рабочую систему.

После этого её могут использовать реальные пользователи или сервисы.

### Monitoring

Наблюдение за моделью после запуска.

Нужно, чтобы замечать ошибки, просадку качества и странное поведение.

### Data drift

Ситуация, когда новые данные стали отличаться от тех, на которых модель училась.

Из-за этого качество модели может падать.

### Model drift

Ситуация, когда сама модель со временем начинает работать хуже.

Обычно это видно уже после запуска в реальной среде.

### Retraining

Повторное обучение модели на новых данных.

Нужно, чтобы она не устаревала.

### A/B test

Проверка двух вариантов решения на реальных пользователях.

Помогает понять, какой вариант действительно лучше на практике.`
