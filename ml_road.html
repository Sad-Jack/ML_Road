### Краткие ответы, которые помогут на собеседовании

Ниже — не просто список вопросов, а компактная шпаргалка: под каждым вопросом есть ответ, который достаточно точный, чтобы уверенно объяснить тему на собеседовании без лишней воды.

---

## 1. База данных и постановка задачи

### 1. Что такое признаки, target, \`X\` и \`y\`?

**Признаки** — это входные данные, по которым модель делает предсказание.

**Target** — это то, что модель должна предсказать.

Обычно **\`X\`** — это таблица признаков, а **\`y\`** — колонка с правильными ответами.

Например: возраст и стаж — это признаки, а зарплата — target.

---

### 2. Чем отличается классификация от регрессии?

**Классификация** — это когда модель предсказывает класс или категорию: например, спам / не спам.

**Регрессия** — это когда модель предсказывает число: например, цену квартиры или выручку.

Главное отличие — в типе ответа.

---

### 3. Что такое обучающая, валидационная и тестовая выборки?

**Train** используется для обучения модели.

**Validation** нужна для подбора модели и настройки гиперпараметров.

**Test** используется для финальной честной оценки качества на данных, которые модель не видела.

Такое разделение помогает не обманывать себя при оценке.

---

### 4. Почему нельзя оценивать модель на тех же данных, на которых она обучалась?

Потому что модель может просто запомнить эти данные, а не научиться находить общую закономерность.

Тогда качество будет казаться высоким, но на новых данных модель может работать плохо.

Нам важно проверять не запоминание, а способность обобщать.

---

### 5. Что такое data leakage и почему это опасно?

**Data leakage** — это утечка информации из target или будущего в признаки.

Например, когда в \`X\` случайно попадает колонка, напрямую связанная с ответом.

Это опасно, потому что модель показывает искусственно хорошее качество, которое потом не повторяется в реальной работе.

---

## 2. Метрики

### 6. Что такое accuracy, precision, recall, F1-score? Когда какая метрика важнее?

**Accuracy** — доля правильных ответов среди всех объектов.

**Precision** показывает, насколько модель точна, когда говорит “положительный класс”.

**Recall** показывает, сколько реальных положительных объектов модель смогла найти.

**F1-score** — баланс между precision и recall.

Accuracy подходит при сбалансированных классах, recall важен, когда нельзя пропускать нужные случаи, precision — когда ложные срабатывания дорогие.

---

### 7. Почему accuracy может быть плохой метрикой?

Потому что при дисбалансе классов она может давать ложное ощущение хорошей модели.

Например, если 95% объектов относятся к одному классу, модель может всегда предсказывать только его и получить accuracy 95%, но быть бесполезной.

В таких случаях лучше смотреть precision, recall, F1, ROC-AUC или PR-AUC.

---

### 8. Что такое MAE, MSE, RMSE? Чем они отличаются?

Это метрики для регрессии.

**MAE** — средняя абсолютная ошибка, она показывает, на сколько модель ошибается в среднем.

**MSE** — средняя квадратичная ошибка, сильнее штрафует большие ошибки.

**RMSE** — это корень из MSE, он удобен тем, что возвращается в масштаб исходной величины.

---

### 9. Как выбрать метрику под задачу?

Метрика выбирается не по привычке, а по смыслу бизнеса и типу ошибки.

Если важно не пропускать положительные случаи — нужен recall.

Если важны минимальные ложные срабатывания — precision.

Если задача регрессии и большие ошибки особенно опасны — часто смотрят MSE или RMSE.

Если важна простая интерпретация ошибки — MAE.

---

### 10. Что делать, если метрика на train высокая, а на test заметно хуже?

Это типичный признак переобучения.

Нужно проверить сложность модели, утечки данных, корректность split, качество признаков и объём данных.

Часто помогают упрощение модели, регуляризация, кросс-валидация, больше данных или более аккуратная обработка признаков.

---

## 3. Переобучение и качество модели

### 11. Что такое overfitting и underfitting?

**Overfitting** — модель слишком хорошо запомнила train, но плохо работает на новых данных.

**Underfitting** — модель слишком простая и плохо работает даже на train.

В первом случае модель слишком сложная, во втором — слишком слабая или недообученная.

---

### 12. Как понять, что модель переобучилась?

Обычно качество на train заметно выше, чем на validation или test.

Это значит, что модель хорошо выучила обучающие данные, но плохо обобщает.

Также это видно по нестабильности на новых данных и сильной чувствительности к шуму.

---

### 13. Как можно бороться с переобучением?

Можно упростить модель, уменьшить глубину дерева, добавить регуляризацию, использовать кросс-валидацию, убрать слабые признаки, собрать больше данных.

Для нейросетей ещё применяют dropout и early stopping, но для классического ML чаще важны признаки, регуляризация и контроль сложности модели.

---

### 14. Что такое bias и variance в интуитивном смысле?

**Bias** — ошибка из-за слишком простой модели, которая плохо улавливает закономерность.

**Variance** — ошибка из-за слишком чувствительной модели, которая подстраивается под шум.

Хорошая модель должна находить баланс: не быть слишком простой и не переобучаться на детали train.

---

### 15. Зачем нужна baseline-модель?

Baseline — это простая стартовая точка, с которой сравнивают всё остальное.

Она показывает, действительно ли новая модель даёт улучшение, а не просто выглядит сложнее.

Без baseline легко переоценить результат.

---

## 4. Подготовка данных

### 16. Что делать с пропусками в данных?

Сначала нужно понять, почему пропуски появились и случайны ли они.

Потом можно удалять строки или колонки, заполнять средним, медианой, модой, специальным значением или отдельной категорией.

Иногда сам факт пропуска тоже полезен как признак.

---

### 17. Что делать с категориальными признаками?

Их нужно преобразовать в форму, с которой модель умеет работать.

Часто используют one-hot encoding, ordinal encoding, target encoding или модели, которые сами умеют работать с категориями, например CatBoost.

Выбор зависит от модели и числа уникальных значений.

---

### 18. Когда нужно масштабирование признаков, а когда нет?

Масштабирование нужно моделям, которые чувствительны к масштабу признаков: логистическая регрессия, линейная регрессия, SVM, k-NN, нейросети.

Обычно не нужно для деревьев, random forest и boosting на деревьях.

Главная идея — привести признаки к сопоставимому масштабу там, где это влияет на обучение.

---

### 19. Что такое one-hot encoding? Какие у него ограничения?

One-hot encoding превращает каждую категорию в отдельную бинарную колонку.

Например, признак “город” превращается в набор колонок: Москва, Берлин, Париж.

Ограничение в том, что при большом числе уникальных категорий количество колонок резко растёт, и это делает модель тяжелее и менее устойчивой.

---

### 20. Как понять, какие признаки полезны, а какие нет?

Смотрят на здравый смысл, корреляции, feature importance, permutation importance, SHAP, качество модели с разными наборами признаков.

Также важно понимать предметную область: не все статистически заметные признаки реально допустимы и полезны.

Полезный признак помогает модели улучшать качество без утечки и лишнего шума.

---

## 5. Модели

### 21. Как работает линейная регрессия на базовом уровне?

Линейная регрессия пытается описать зависимость target от признаков через линейную формулу.

Модель подбирает веса признаков так, чтобы предсказания были как можно ближе к реальным значениям.

Это простая и интерпретируемая модель для регрессии.

---

### 22. Как работает логистическая регрессия и почему она называется регрессией, хотя решает классификацию?

Логистическая регрессия сначала считает линейную комбинацию признаков, а потом пропускает её через сигмоиду, чтобы получить вероятность класса.

После этого вероятность переводится в класс по порогу.

Она называется регрессией потому, что внутри у неё линейная модель, но применяется она для классификации.

---

### 23. Как работает Decision Tree?

Decision Tree последовательно делит данные по условиям на признаки, например: возраст < 30, доход > 100000 и так далее.

В каждом узле дерево выбирает разбиение, которое лучше всего разделяет данные.

В итоге предсказание получается по пути от корня до листа.

---

### 24. Почему одно дерево решений часто переобучается?

Потому что дерево может выучить слишком много частных правил под конкретный train.

Если его не ограничивать по глубине и минимальному числу объектов в листе, оно начинает подстраиваться под шум.

Из-за этого на новых данных качество падает.

---

### 25. Что такое Random Forest и чем он лучше одного дерева?

Random Forest — это ансамбль из множества деревьев решений.

Каждое дерево обучается на случайной подвыборке данных и признаков, а итоговое предсказание получается через голосование или усреднение.

Это делает модель устойчивее и обычно уменьшает переобучение по сравнению с одним деревом.

---

### 26. Что такое Gradient Boosting в интуитивном смысле?

Это ансамбль, где деревья строятся последовательно, и каждое новое дерево пытается исправить ошибки предыдущих.

То есть модель обучается шаг за шагом, улучшая текущее решение.

Boosting часто даёт очень сильное качество на табличных данных.

---

### 27. Чем примерно отличаются XGBoost, LightGBM и CatBoost?

Все три — реализации gradient boosting на деревьях.

**XGBoost** — сильная и универсальная классика.

**LightGBM** часто быстрее и хорошо работает на больших данных.

**CatBoost** особенно удобен, когда много категориальных признаков, потому что умеет хорошо работать с ними из коробки.

---

### 28. Когда ты бы выбрал простую модель, а когда более сложную?

Простую модель стоит брать, когда важны интерпретируемость, скорость запуска, baseline или данных мало.

Сложную модель имеет смысл брать, если она реально даёт прирост качества и это важно для задачи.

Выбор всегда должен идти от задачи, данных и цены ошибки, а не от желания взять “модную” модель.

---

## 6. Практика и инженерный слой

### 29. Как бы ты решал задачу ML от начала до конца: от датасета до результата?

Сначала я бы понял постановку задачи и target, потом изучил данные: типы признаков, пропуски, распределения, дисбаланс.

Дальше сделал бы preprocessing, разделил данные на train/validation/test, выбрал baseline и подходящую метрику.

После этого обучил бы несколько моделей, сравнил результаты, проверил переобучение, интерпретировал выводы и выбрал лучший вариант.

В конце — сохранил пайплайн и оформил результат так, чтобы его можно было воспроизвести.

---

### 30. Расскажи про свой ML-проект: какая была задача, какие данные, какую метрику выбрал, какие модели пробовал и почему выбрал итоговую?

Здесь важно отвечать по структуре.

Нужно коротко описать задачу, данные, preprocessing, выбор метрики, baseline, модели, сравнение результатов и финальный вывод.

Хороший ответ показывает не только то, что ты “делал проект”, но и что ты понимаешь, почему принимал именно такие решения.

Ты описываешь задачу — он задаёт уточняющие вопросы только если нужно, декомпозирует цель и выдаёт промпт, который можно сразу использовать.

**Как использовать:**

- Скопируй промпт ниже (кнопка copy)
- Вставь как System Prompt в ChatGPT, Claude или любой другой LLM
- Опиши задачу: "хочу агента для X" — или вставь сломанный промпт для улучшения

---

\`\`\`
Role:
You are a Senior Prompt Engineer. Your job is to turn user requests into
production-ready prompts that work reliably in any LLM-based system
(ChatGPT, Claude, agents, pipelines).

Context:
Users may provide: a vague task description, a broken prompt, a use case,
or a specific agent they are building. Your output is a structured,
testable, reusable prompt — not an explanation or a blog post.

Input:
User provides one of:
- A task description ("I need an agent that does X")
- An existing prompt to improve
- A use case with or without context

Clarification logic:
Before generating, check:
1. Is the goal of the agent clear? (what it does, for whom, in what context)
2. Is the input/output defined or inferable?
3. Are constraints present or inferable from domain?

If 2 or more checks fail → ask the minimum necessary questions (max 3).
If 1 or 0 fail → proceed with stated assumptions noted inline.
Never ask questions when the task is simple and self-contained.

Algorithm:
1. Identify the real goal (not the surface request).
2. Decompose into: role, input, task steps, decision rules, output format,
   edge cases.
3. Write the prompt.
4. Validate: no ambiguity, no conflicting instructions, output is stable
   and parseable, edge cases are handled.
5. If improving an existing prompt: list what was wrong and why, then
   rewrite.

Output format (always in this order, omit sections that are not applicable):

GOAL
[One sentence: what the agent does and for whom]

PROMPT
[The ready-to-use prompt, cleanly formatted]

CHANGES (only when improving an existing prompt)
[Bullet list: what was wrong and what was fixed]

ASSUMPTIONS (only when data was insufficient)
[List of assumptions made; user should verify]

FAILURE MODES
[2-4 ways this prompt can break or produce wrong output, and how to catch it]

Rules:
- Never write a prompt that contains vague instructions ("be helpful", "think carefully").
- Never use emoji in the output prompt.
- Never invent domain constraints — state them as assumptions.
- Keep prompts minimal: include only what affects output quality.
- Separate system behavior from task input.
- Make outputs deterministic and parseable when used in code pipelines.
- If a task is too broad for one prompt, say so and split it.

        list = PYTHON_ALL;
      }
      if (!lesson) return null;
      const idx = list.findIndex(l => l.id === id);
      return { lesson, list, prev: list[idx - 1] || null, next: list[idx + 1] || null };
    }

      if (!el) { document.getElementById('ca').innerHTML = '<p style="color:var(--red);font-family:var(--mono);padding:32px">// ERROR: lesson content not found</p>'; return; }

    function _buildSearchIndex() {
      const idx = new Map();
      [...ALL, ...PYTHON_ALL].forEach(l => {

          l.title, l.short, l.section?.title || '',
          document.getElementById('cdata-' + l.id)?.textContent || ''
        ].join(' ');
        const tokens = raw.toLowerCase().replace(/[^a-zа-яё0-9\s]/gi, ' ').split(/\s+/).filter(t => t.length >= 2);
        tokens.forEach(tok => {
          if (!idx.has(tok)) idx.set(tok, new Set());
          idx.get(tok).add(l.id);
        });
      });
      AppState.searchIndex = idx;
    }

    function _queryIndex(q) {
      const terms = q.toLowerCase().replace(/[^a-zа-яё0-9\s]/gi, ' ').split(/\s+/).filter(t => t.length >= 2);
      if (!terms.length) return [];
      const allLessons = [...ALL, ...PYTHON_ALL];
      const idMap = new Map(allLessons.map(l => [l.id, l]));
      const firstSet = AppState.searchIndex.get(terms[0]) || new Set();
      let candidates = [...firstSet].map(id => idMap.get(id)).filter(Boolean);
      if (terms.length > 1) {
        candidates = candidates.filter(l =>
          terms.slice(1).every(t => AppState.searchIndex.get(t)?.has(l.id))
        );
      }
      return candidates.slice(0, 8);
    }

    /* ─── MARKDOWN PARSER ─── */
    function mdToHtml(md) {
      if (!md) return '';
      md = md.replace(/^---[\r\n][\s\S]*?[\r\n]---[\r\n]?/, '');
      const cbs = [];
      md = md.replace(/```(\w*)\r?\n([\s\S]*?)```/g, (_, lang, code) => { cbs.push({ lang: lang.trim(), code: code.trimEnd() }); return '\x01CB' + (cbs.length - 1) + '\x01'; });
      const lines = md.split(/\r?\n/), out = []; let i = 0;
      while (i < lines.length) {
        const raw = lines[i], line = raw.trim();
        if (!line) { i++; continue; }
        if (line.startsWith('\x01CB')) { out.push(line); i++; continue; }
        const hm = line.match(/^(#{1,6})\s+([\s\S]+)/);
        if (hm) { out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`); i++; continue; }
        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) { out.push('<hr>'); i++; continue; }
        if (line.startsWith('>')) {
          const qs = [];
          while (i < lines.length && lines[i].trim().startsWith('>')) { qs.push(lines[i].trim().replace(/^>\s?/, '')); i++; }
          out.push(`<blockquote><p>${inl(qs.join(' '))}</p></blockquote>`); continue;
        }
        if (/^[-*+]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*+]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^[-*+]\s/, ''))}</li>`); i++; }
          out.push(`<ul>${items.join('')}</ul>`); continue;
        }
        if (/^\d+[.)]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+[.)]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^\d+[.)]\s/, ''))}</li>`); i++; }
          out.push(`<ol>${items.join('')}</ol>`); continue;
        }
        if (line.startsWith('|') && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
          const trows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) { trows.push(lines[i].trim()); i++; }
          if (trows.length >= 2) {
            const hdr = trows[0].split('|').slice(1, -1).map(c => c.trim());
            const body = trows.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
            let th = '<div class="tw"><table><thead><tr>' + hdr.map(h => `<th>${inl(h)}</th>`).join('') + '</tr></thead><tbody>';
            body.forEach(row => { th += '<tr>' + row.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>'; });
            out.push(th + '</tbody></table></div>');
          }
          continue;
        }
        out.push(`<p>${inl(line)}</p>`);
        i++;
      }
      let html = out.join('\n');
      html = html.replace(/\x01CB(\d+)\x01/g, (_, n) => {
        const { lang, code } = cbs[+n];
        return `<div class="cb">${lang ? `<div class="cbl">${esc(lang)}</div>` : ''}<button class="cb-copy" type="button">copy</button><pre><code>${esc(code)}</code></pre></div>`;
      });
      return html;
    }

    function inl(text) {
      if (!text) return '';
      const ics = [], links = [];
      text = text.replace(/`([^`]+)`/g, (_, c) => { ics.push(c); return '\x02IC' + (ics.length - 1) + '\x02'; });
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
        links.push({ label, href });
        return '\x02LK' + (links.length - 1) + '\x02';
      });
      text = esc(text);
      text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      text = text.replace(/\x02LK(\d+)\x02/g, (_, n) => {
        const { label, href } = links[+n];
        return `<a href="${safeHref(href)}" class="nl" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`;
      });
      text = text.replace(/\x02IC(\d+)\x02/g, (_, n) => `<code class="ic">${esc(ics[+n])}</code>`);
      return text;
    }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function escAttr(s) { return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function safeHref(href) {
      const raw = String(href || '').trim();
      if (/^(https?:|mailto:)/i.test(raw)) return escAttr(raw);
      return '#';
    }

        const text = codeEl.textContent || '';
        let ok = false;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            ok = true;
          }
        } catch (err) { }
        if (!ok) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { ok = document.execCommand('copy'); } catch (err) { ok = false; }
          document.body.removeChild(ta);
        }
        const prev = btn.textContent;
        btn.textContent = ok ? 'copied' : 'error';
        if (ok) btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = prev;
          btn.classList.remove('done');
        }, 1200);
      });
      let saved = 'home';

    function _mbSync() {
      const bar  = document.getElementById('music-bar');
      const dot  = document.getElementById('mb-dot');
      const sts  = document.getElementById('mb-status');
      const btn  = document.getElementById('mb-play');
      const sl   = document.getElementById('mb-vol');
      const online = navigator.onLine;
      if (!online) {
        bar.classList.add('is-offline');
        btn.disabled = true;
        dot.className = 'mb-dot';       dot.textContent = '◉';
        sts.className = 'mb-status';    sts.textContent = 'OFFLINE';

          AppState.music.audio.pause(); AppState.music.playing = false;
          btn.classList.remove('playing'); btn.textContent = '▶ PLAY';
          sl && sl.classList.remove('active');
          _mbSliderColor(sl, false);
        }
        return;
      }
      bar.classList.remove('is-offline');
      btn.disabled = false;
      if (AppState.music.playing) {
        dot.className = 'mb-dot live';  dot.textContent = '◉';
        sts.className = 'mb-status live'; sts.textContent = 'LIVE';
      } else {
        dot.className = 'mb-dot paused'; dot.textContent = '○';
        sts.className = 'mb-status';    sts.textContent = 'READY';

    function _mbSliderColor(sl, active) {
      if (!sl) return;
      const pct = (sl.value / sl.max) * 100;
      const fill = active ? '#00e5ff' : '#2a5070';
      sl.style.background = `linear-gradient(to right, ${fill} ${pct}%, #0c1e30 ${pct}%)`;

      ).join('');
    }

    function switchChannel(idx) {
      if (idx === AppState.music.streamIdx && !AppState.music.playing) return;
      clearTimeout(AppState.music.reconnTimer); // всегда очищаем, не только при playing
      AppState.music.streamIdx = idx;
      _mbBuildChannels();
      if (AppState.music.playing) { _mStartStream(); }
    }

    /* Пересоздаёт Audio и запускает поток заново — fix для stalled/ended */
    function _mStartStream() {
      clearTimeout(AppState.music.reconnTimer);
      const gen = ++AppState.music.gen; // поколение: старые _reconnect с другим gen игнорируются
      if (AppState.music.audio) { AppState.music.audio.pause(); AppState.music.audio.src = ''; AppState.music.audio.load(); AppState.music.audio = null; }
      const sl = document.getElementById('mb-vol');
      const url = MB_STREAMS[AppState.music.streamIdx].url + '?_=' + Date.now();
      AppState.music.audio = new Audio(url);
      AppState.music.audio.volume = (sl ? sl.value : 60) / 100;

      const _reconnect = () => {
        if (!AppState.music.playing || !navigator.onLine || gen !== AppState.music.gen) return; // устаревший — пропускаем
        const sts = document.getElementById('mb-status');
        if (sts) { sts.className = 'mb-status'; sts.textContent = 'RECONNECT...'; }
        AppState.music.reconnTimer = setTimeout(_mStartStream, 1500);
      };

      AppState.music.audio.addEventListener('ended',   _reconnect);
      AppState.music.audio.addEventListener('stalled', _reconnect);
      AppState.music.audio.addEventListener('error',   _reconnect);
      AppState.music.audio.play().catch(() => {});
    }

    function toggleMusic() {
      if (!navigator.onLine) return;
      const btn = document.getElementById('mb-play');
      const sl  = document.getElementById('mb-vol');
      if (AppState.music.playing) {
        clearTimeout(AppState.music.reconnTimer);
        if (AppState.music.audio) { AppState.music.audio.pause(); AppState.music.audio.src = ''; AppState.music.audio.load(); AppState.music.audio = null; }
        AppState.music.playing = false;
        btn.classList.remove('playing'); btn.textContent = '▶ PLAY';

# 01. Что такое машинное обучение простыми словами

## Зачем это нужно

Написать правило «если температура выше 38 — показать предупреждение» легко. Но написать правило «определи, является ли это письмо спамом» — уже нет: слишком много вариантов, исключений и контекстов. Вручную перечислить все ситуации невозможно.

Машинное обучение решает именно такие задачи: вместо того чтобы прописывать правила, мы показываем системе много примеров, и она сама находит закономерности.

Без понимания этой идеи будет непонятно, когда ML вообще нужен, а когда достаточно простого условия в коде.

## Простая интуиция

Представь, что ты сортируешь письма вручную: спам в одну стопку, важное в другую. Поначалу ты смотришь на детали: знакомый отправитель, тема письма, подозрительные слова.

После сотни писем ты уже не думаешь — просто видишь паттерн и быстро сортируешь. Ты не выписывал правила. Ты научился на примерах.

Это и есть суть: учиться на примерах, а не следовать заранее написанным условиям.

## Что это такое

**Машинное обучение** — это подход, при котором программа учится на данных и потом использует найденные закономерности для новых случаев.

Проще: модель смотрит на примеры, замечает связи и делает предсказание.

Важно: модель не «понимает» мир как человек. Она ищет статистические закономерности в данных.

## Как это работает

1. Собираем примеры.
2. Показываем их модели.
3. Модель ищет закономерности.
4. Проверяем, насколько хорошо она справляется.
5. Используем модель на новых данных.

Например, если модель видела много квартир с разной площадью, районом и ценой, она может научиться примерно предсказывать цену новой квартиры.

## Простой пример

Допустим, мы хотим предсказывать цену квартиры. У нас есть примеры:

```
35 м², окраина → 6 млн
50 м², центр  → 12 млн
70 м², центр  → 17 млн
```

Модель смотрит на эти примеры и замечает:

- большая площадь часто связана с большей ценой;
- центр обычно дороже окраины;
- разные признаки вместе влияют на результат.

После обучения ей можно показать новую квартиру:

```
55 м², центр → ?
```

И модель попробует предсказать цену.

Инсайт: мы нигде не написали «центр дороже окраины» явно. Система сама извлекла это из примеров — именно это отличает машинное обучение от программирования с условиями.

## Практика

1. Сервис музыки хочет предлагать похожие треки. Сформулируй задачу в виде «примеры → закономерность → предсказание»: что будет примерами и что система должна научиться предсказывать?
2. Команда обучила спам-фильтр на 10 000 писем из 2020 года. В 2024 году он пропускает 40% спама. Чего именно не хватило модели, чтобы работать хорошо на новых письмах — и почему это неизбежно, если модель ищет статистические закономерности, а не «понимает» содержимое?
3. Представь сервис с фильмами. Какие три разные вещи он может попробовать предсказывать с помощью машинного обучения?
4. Коллега говорит: «Давай напишем правила вручную — если жанр "боевик" и рейтинг выше 7, рекомендуем». Когда этот подход сломается и почему?
5. Команда спорит: одни предлагают ML, другие — простой алгоритм. Задача — сортировать заявки по приоритету: срочные в начало очереди, если сумма заказа выше 10 000 рублей. Как ты решишь этот спор и какой вопрос нужно задать, чтобы понять, нужен ли здесь ML?

## Краткий итог

- Машинное обучение учится на примерах.
- Модель ищет закономерности в данных.
- После обучения модель может делать предсказания для новых случаев.
- ML полезен там, где сложно заранее описать все ситуации вручную.
- Модель не понимает мир как человек, а работает со связями в данных.

## Ключевые термины урока

- **Машинное обучение** — подход, при котором правила не пишете вы, а находит алгоритм в данных. Ключевое следствие: поведение модели определяется данными, а не кодом. Поменяли данные — поведение изменится, даже если код остался тем же.
- **Модель** — не программа с прописанными условиями, а набор параметров, настроенных под конкретные данные. Одна и та же архитектура (например, дерево решений), обученная на разных данных, будет вести себя по-разному.
- **Обучение** — одноразовый процесс поиска закономерностей в исторических данных. После деплоя модель не обучается сама — нужно явное переобучение на новых данных.
- **Предсказание** — статистически наиболее вероятный ответ по обученным закономерностям, а не «правда». Модель может уверенно ошибаться на примерах, непохожих на обучающие.
- **Закономерность** — устойчивая корреляция в данных. Важно: модель видит корреляции, а не причинно-следственные связи. Если в данных спам коррелирует со словом «срочно» — модель запомнит это, но не поймёт, почему.

# 02. Типы обучения: supervised, unsupervised, RL

## Зачем это нужно

Прежде чем строить модель, нужно понять, какой тип задачи ты решаешь. От этого зависит выбор алгоритма, способ подготовки данных и то, как ты будешь оценивать результат. Путаница в типах обучения — одна из самых частых ошибок начинающих.

## Простая интуиция

Представь, что учишь ребёнка различать кошек и собак. Если ты показываешь картинки и говоришь «это кошка, это собака» — это supervised. Если просто даёшь кучу картинок и говоришь «найди похожие» — это unsupervised. А если ребёнок учится на ошибках в игре, получая очки за правильные ходы — это reinforcement learning.

## Что это такое

Три основных парадигмы машинного обучения:

- **Supervised learning (обучение с учителем)** — у каждого примера есть метка (правильный ответ). Модель учится предсказывать метку по признакам. Пример: предсказать цену квартиры, определить спам.
- **Unsupervised learning (обучение без учителя)** — меток нет. Модель ищет структуру в данных сама. Пример: сгруппировать клиентов по поведению.
- **Reinforcement learning (обучение с подкреплением)** — агент взаимодействует со средой, получает награду или штраф и учится максимизировать награду. Пример: игра в шахматы, управление роботом.

**Метка (label)** — это правильный ответ для конкретного примера в supervised learning. То самое `y` в паре `(X, y)`. Для задачи регрессии метка — число (цена, зарплата, температура). Для классификации — категория (spam / not spam, кошка / собака / птица). Без меток supervised learning невозможен: именно из них модель узнаёт, что считать правильным ответом.

## Как это работает

В supervised learning данные выглядят так: есть таблица с описаниями объектов и столбец с правильными ответами. Модель учится на парах (описание, ответ) и потом предсказывает ответ для новых объектов.

Например, для задачи с квартирами:

```
площадь=50, этаж=3, район=центр → цена=12 млн
площадь=35, этаж=1, район=окраина → цена=6 млн
```

В unsupervised — только описания объектов, без ответов. Алгоритм сам находит группы или паттерны.

В RL нет заранее готового датасета — агент сам собирает опыт, действуя в среде.

## Практика

1. Команда собрала 1 миллион чеков из супермаркета. Бизнес хочет понять, какие продукты обычно покупают вместе, чтобы оптимизировать выкладку. Есть ли готовые метки для этой задачи — и какой тип обучения нужен?
2. У тебя есть данные о транзакциях без меток «мошенничество / не мошенничество». Какой тип обучения подойдёт? Почему?
3. Команда хочет предсказывать отток клиентов. Бизнес говорит: «У нас нет разметки — не знаем, кто ушёл специально, а кто случайно». Как это повлияет на выбор типа обучения?
4. В уроке «Что такое машинное обучение» мы говорили, что модель учится на примерах. Какие примеры нужны для supervised learning и почему без них этот тип обучения невозможен?
5. Задача: предсказать, уйдёт ли клиент (churn). Какой тип обучения подходит? Опиши, как именно будут выглядеть «правильные ответы» для обучения — что именно они должны содержать и как их получить из исторических данных.

## Краткий итог

- Supervised — основа индустрии: метки дороги, но дают чёткий контроль над тем, что нужно предсказывать
- Unsupervised полезен для разведки и предобработки: когда разметить нечего или неизвестно, что искать
- RL применяют там, где правильный ответ определяется взаимодействием: игры, робототехника, оптимизация систем
- Большинство промышленных задач — это supervised learning
- Тип обучения определяет выбор алгоритма и способ подготовки данных
- Главный вопрос: есть ли у тебя размеченные данные?

## Ключевые термины урока

- **Supervised learning (обучение с учителем)** — тип обучения, где у каждого примера есть правильный ответ. Подходит для ~90% промышленных ML-задач; главное ограничение — разметка стоит дорого и требует экспертизы.
- **Unsupervised learning (обучение без учителя)** — тип обучения без правильных ответов. Ключевая сложность: нет чёткого критерия «модель сработала хорошо» — результат оценивают косвенно или вручную.
- **Reinforcement learning (обучение с подкреплением)** — агент учится через награды и штрафы в среде. В реальных бизнес-задачах применяется редко: сложно настроить среду и долго обучать. Не путать с тонкой настройкой LLM по обратной связи (это отдельная техника).
- **Метка (label)** — правильный ответ для объекта в supervised learning. Качество меток важнее объёма данных: зашумлённые или противоречивые метки ломают модель сильнее, чем их нехватка.

# 03. Модель: input → output

## Зачем это нужно

Любую ML-задачу можно описать простой схемой:

```
input → model → output
```

Это помогает сразу понять:

- что мы даём модели на вход;
- что модель должна вернуть на выходе;
- какую задачу мы вообще решаем.

Без этой схемы легко запутаться ещё до обучения модели.

## Простая интуиция

Модель можно представить как преобразователь. Она получает данные об объекте и возвращает результат. Например:

```
данные о квартире → модель → предсказанная цена
```

Пока не важно, как именно модель работает внутри. На этом этапе важно понять главное: что подаём на вход и что хотим получить на выходе.

## Что это такое

**Модель** — это алгоритм, который учится находить связь между входными данными и результатом. После обучения модель может получать новые данные и делать предсказание.

**Input** — то, что модель получает на вход. Это могут быть:

- данные о квартире;
- текст письма;
- изображение;
- история действий пользователя.

**Output** — то, что модель возвращает. Это может быть:

- цена;
- класс;
- вероятность;
- рекомендация;
- текстовый ответ.

## Как это работает

1. Формулируем задачу.
2. Передаём модели input — данные об объекте.
3. Модель обрабатывает эти данные.
4. На выходе получаем output — предсказание.
5. Сравниваем предсказание с реальным ответом, чтобы понять, насколько модель справилась.

Важно: output модели — это не факт. Это предположение модели на основе данных, которые она увидела.

## Простой пример

Задача: предсказать цену квартиры.

Input:

```
площадь: 55 м²
комнат: 2
этаж: 7
район: центр
```

Output:

```
предсказанная цена: 10.8 млн
```

Модель не гарантирует, что квартира точно стоит `10.8 млн`. Она делает предсказание на основе похожих примеров, которые видела раньше.

Инсайт: изменение одного элемента input меняет output — без единой правки алгоритма. Если поменять `район: центр` на `район: окраина`, модель выдаст другое число. Это значит, что поведение модели определяется не кодом, а данными на входе.

## Практика

1. В задаче «спам / не спам» что будет input, а что output?
2. Один и тот же набор данных о пользователе можно использовать для разных задач. Возьми признаки: `age`, `country`, `orders_count`, `last_login_days`. Опиши два разных output, которые можно предсказывать по этим данным — и как изменится смысл задачи.
3. Почему output модели — это предсказание, а не точный факт?
4. В уроке «Что такое машинное обучение» мы разбирали пример с квартирами. Опиши этот пример в виде схемы input → model → output: что конкретно было на входе и что на выходе?
5. В уроке «Типы обучения» мы видели три типа задач. Для каждого типа (supervised, unsupervised, RL) придумай один пример и опиши его как схему input → output: что подаётся на вход и что должно быть на выходе.

## Краткий итог

- Любую ML-задачу можно описать схемой `input → model → output`.
- Понять, что является input, важнее, чем выбрать алгоритм: неверно определённый вход делает задачу нерешаемой.
- Тип output определяет всё: задача, алгоритм, метрика — всё зависит от того, что нужно предсказать.
- Output модели — это предсказание, а не гарантия.
- Перед обучением нужно понять, что модель получает и что должна предсказать.

## Ключевые термины урока

- **Модель** — функция, принимающая input и возвращающая output. Ключевая ловушка: одна и та же модель даст разный output, если изменится состав input — даже при одном и том же алгоритме.
- **Input (вход)** — данные, которые модель получает для предсказания. Именно от состава input зависит, что вообще может выучить модель: признака нет на входе — модель его не учтёт.
- **Output (выход)** — результат, который модель возвращает. Тип output определяет весь дальнейший pipeline: как интерпретировать результат, какую метрику использовать, какая постобработка нужна (пороговая обрезка для вероятности, округление для числа). Менять формат output после обучения нельзя без переобучения модели.
- **Схема input → model → output** — универсальный фреймворк для описания любой ML-задачи. Прежде чем выбирать алгоритм, нужно ответить на два вопроса: что на входе и что должно быть на выходе.

# 04. X, y, признаки и target

## Зачем это нужно

Это фундамент всего ML. Без понимания X и y будет путаница в моделях, коде, метриках и даже в постановке задачи. Разобравшись здесь один раз, вы будете понимать что происходит в любом ML-коде.

## Простая интуиция

X и y — не оси координат, как в школе. В ML: X — это то, что модель видит на входе; y — это то, что модель должна предсказать. Как угадывание: вам говорят характеристики человека (X), а вы должны назвать его зарплату (y).

## Что это такое

**Признаки (features, X)** — характеристики объекта, которые модель использует для обучения. Например: опыт работы, уровень английского, возраст.

**Target (y)** — то, что модель должна предсказать. Например: зарплата, цена квартиры, спам или не спам.

В таблице X — это все колонки кроме одной, y — эта одна колонка с ответами.

## Как это работает

Есть таблица с данными о соискателях:

| experience_years | english_level | salary |
|-----------------|---------------|--------|
| 1 | 2 | 70000 |
| 2 | 3 | 90000 |
| 3 | 4 | 120000 |

Здесь:
- X = колонки `experience_years` и `english_level`
- y = колонка `salary`

Модель учится на этих данных и потом может предсказать зарплату для нового человека, зная только его опыт и уровень английского.

## Простой пример

Аналитик хочет предсказывать зарплату соискателей. Он взял все колонки таблицы: `experience_years`, `english_level`, `salary` — и передал их как X.

Модель обучилась с точностью 99%. Но это не успех — это ошибка: `salary` уже есть в X, и модель просто «смотрит на ответ» вместо того чтобы его искать.

Инсайт: высокое качество модели на обучающих данных — ещё не признак успеха. Сначала проверяй, не попал ли target в X случайно.

## Практика

1. Компания собрала данные о сотрудниках: `age`, `department`, `years_in_company`, `performance_score`, `promoted`. Задача — предсказать, получит ли сотрудник повышение. Определи X и y. Какую ловушку нужно избежать при формировании X?
2. Аналитик взял таблицу с признаками `площадь`, `район`, `этаж`, `цена` и добавил все колонки в X. Какую ошибку он сделал и как это нужно исправить?
3. Почему target нельзя добавлять внутрь X?
4. В уроке «Модель: input → output» мы описывали задачи через схему вход/выход. Возьми задачу «предсказать категорию клиента: новый / постоянный / потерянный» и опиши её через X и y: что войдёт в X и что станет y? Как тип y связан с типом задачи?
5. В уроке «Типы обучения» мы разбирали supervised learning. Почему без правильно определённого y supervised learning невозможен? Что произойдёт, если y в обучающих данных окажется неточным или зашумлённым?

## Краткий итог

- X — таблица признаков (вход модели).
- y — единственная колонка с правильными ответами, которую модель должна предсказывать.
- Правильно определить y — критично: неверно поставленная цель ведёт к решению не той задачи.
- Чем информативнее признаки относительно target — тем лучше будет модель; добавить данных важнее, чем улучшить алгоритм.
- Тип target определяет тип задачи ML: число, категория, порядок — это разные задачи с разными моделями и метриками.

## Ключевые термины урока

- **Признаки (features, X)** — таблица со свойствами объектов, которую модель получает на вход. Два типа ошибок: (1) target попал в X явно — модель «знает ответ» и показывает идеальное качество на обучении, но провалится в проде; (2) в X есть косвенная утечка (например, дата обработки заявки после одобрения) — ловится только анализом семантики признаков.
- **Target (y)** — колонка с правильными ответами. Ловушка: target, выбранный не под бизнес-цель, ведёт к решению не той задачи. Например, предсказывать «открыл ли клиент письмо» вместо «купит ли» — технически корректная задача с бесполезным результатом.

# 05. Как выглядят данные в ML

## Зачем это нужно

Перед обучением модели задачу нужно перевести в понятный для неё вид.
Модель не видит «квартиру», «пользователя» или «письмо» так, как человек.
Она получает описание объекта в виде данных и пытается найти связь между этим описанием и нужным результатом.

Если задача плохо представлена в данных, модель будет учиться на слабом или неправильном описании реальности.
Например:

- забыли важное свойство объекта — модель его не учтёт;
- добавили случайный шум — модель может найти ложную связь;
- случайно добавили ответ во входные данные — получится утечка.

Поэтому до выбора модели нужно понять, как задача выглядит в данных.

## Простая интуиция

Допустим, мы хотим предсказывать цену квартиры.

Для человека квартира — это реальный объект: дом, район, ремонт, этаж, вид из окна.

Для модели квартира — это набор описаний:

```text
площадь
количество комнат
район
этаж
```

А цена — это то, что модель должна научиться предсказывать.

То есть мы переводим реальный объект в форму:

```text
описание объекта → модель → предсказание
```

## Что это такое

В ML данные часто представляют в виде таблицы.

Обычно:

- **строка** — один объект;
- **колонка** — одно свойство объекта;
- часть колонок используется как входные данные;
- отдельная колонка может быть тем, что модель должна предсказать.

Пример:

| area_m2 | rooms | district  | price  |
| ------: | ----: | --------- | -----: |
|      35 |     1 | outskirts |  6 млн |
|      50 |     2 | center    | 12 млн |
|      70 |     3 | center    | 17 млн |

Здесь каждая строка описывает одну квартиру.
Колонки `area_m2`, `rooms`, `district` описывают квартиру.
Колонка `price` содержит результат, который модель должна научиться предсказывать.

## Как это работает

Сначала мы собираем примеры, где результат уже известен.
Для задачи с квартирами это могут быть данные о квартирах, у которых уже известна цена:

```text
площадь, комнаты, район → цена
```

Модель смотрит на такие примеры и пытается найти закономерности.
Например:

- квартиры в центре часто дороже;
- большая площадь обычно повышает цену;
- количество комнат тоже может влиять на цену.

После обучения можно дать модели новую квартиру:

| area_m2 | rooms | district |
| ------: | ----: | -------- |
|      55 |     2 | center   |

И модель попробует предсказать цену.

## Простой пример

Есть таблица пользователей:

| age | city    | orders_count | bought |
| --: | ------- | -----------: | -----: |
|  25 | Berlin  |            4 |      1 |
|  40 | Hamburg |            1 |      0 |
|  31 | Berlin  |            6 |      1 |

Если задача — предсказать, купит ли пользователь товар, то модель может использовать:

```text
age
city
orders_count
```

А колонка `bought` показывает, что произошло на самом деле:

```text
купил / не купил
```

На практике такие таблицы часто обрабатывают через **Pandas DataFrame**.
Но сейчас важен не инструмент, а сама идея: данные должны описывать объект так, чтобы модель могла искать закономерности.

Инсайт: обратите внимание — среди пользователей Berlin встречается дважды, и оба раза `bought=1`. Если таких строк в таблице много, модель сама выучит связь «Berlin → покупка» — без единой написанной нами строки кода с условиями.

## Практика

1. HR-команда строит модель для предсказания успешного найма. Коллега предлагает добавить колонку «общее впечатление» (1–10) — субъективная оценка интервьюера, которая у каждого своя. Почему такой признак может навредить модели, несмотря на то что он числовой?
2. Представь, что ты составляешь таблицу для предсказания успеваемости студентов. Что станет строками, что — колонками, а что — целевой переменной?
3. Мини-кейс: у вас есть таблица покупок с признаками `age`, `city`, `orders_count`, `bought`. Коллега предлагает добавить ещё один признак — «наличие скидки в день последнего визита». Как ты определишь, стоит ли добавлять его, не зная алгоритмы оценки признаков?
4. В уроке «X, y, признаки и target» мы договорились, что X — это признаки, y — это ответ. Возьми таблицу из раздела «Простой пример» этого урока. Какие колонки войдут в X, а какая будет y? Что произойдёт, если y случайно попадёт в X?
5. В уроке «Модель: input → output» мы говорили, что вход модели определяет, что она вообще может выучить. Коллега предлагает добавить в таблицу признак «порядковый номер строки». Почему такой признак не поможет модели, даже если он числовой?

## Краткий итог

- ML-задачу нужно перевести в данные, с которыми может работать модель.
- Частый формат данных в ML — таблица.
- Строка обычно описывает один объект: квартиру, пользователя, письмо или товар.
- Колонка описывает одно свойство объекта.
- Перед обучением важно понять, какие данные описывают объект и какой результат нужно предсказать.

## Ключевые термины урока

- **Строка (объект, наблюдение)** — одна запись в таблице. Количество строк = количество примеров, на которых учится модель. Слишком мало строк — модель не найдёт закономерностей.
- **Колонка (признак)** — одно свойство объекта. Признаки, никак не связанные с результатом, добавляют шум и могут ухудшить качество.
- **Таблица данных** — основной формат представления данных в ML. Каждый столбец должен содержать одно понятие: смешивать разные сущности в одной колонке — частая ошибка.
- **Pandas DataFrame** — табличная структура данных в Python для работы с ML-данными. Хранит данные в памяти: подходит для датасетов до нескольких гигабайт. Совместим со sklearn, поддерживает все операции с таблицами и визуализацию — поэтому стал стандартом первого шага любого ML-проекта.

# 06. Что модель реально учит из данных

## Зачем это нужно

Многие думают, что модель «понимает» задачу — как человек.
На самом деле она делает кое-что другое и гораздо более простое.

Если не понимать, чему именно учится модель, легко сделать ошибки:
- дать ей данные, по которым она выучит не то;
- удивляться, почему хорошая модель ошибается на реальных данных;
- не замечать, что модель нашла случайную связь вместо настоящей.

## Простая интуиция

Представь, что тебе дали тысячу карточек.
На каждой написаны характеристики квартиры и её цена.

Ты начинаешь листать карточки и замечаешь:
- квартиры в центре стоят дороже;
- большая площадь чаще означает большую цену;
- первый этаж обычно дешевле.

Ты не понял, почему это так. Ты просто заметил закономерность в числах.

Модель делает то же самое — только вместо наблюдений у неё математика.

## Что это такое

Модель учится находить **связь между X и y** в обучающих данных.

По сути она строит функцию:

```text
f(X) ≈ y
```

То есть: «по входным данным X попробуй предсказать y».

Модель не знает, что такое квартира, центр или ремонт.
Она видит только числа и категории — и ищет, какие из них чаще связаны с каким значением y.

## Как это работает

Во время обучения модель смотрит на много пар `(X, y)` и пытается найти правило, которое работает для большинства примеров.

Например, для задачи с ценой квартиры:

```text
X = [площадь=35, район=outskirts, комнат=1]  →  y = 6 млн
X = [площадь=70, район=center,    комнат=3]  →  y = 17 млн
```

Модель замечает: чем больше площадь и чем ближе к центру, тем выше цена.
Это и есть «знание», которое она извлекла — статистическая связь между признаками и результатом.

**Что модель хранит после обучения** — это набор **параметров**: конкретных чисел, в которых закодированы найденные закономерности. Например, простая модель может сохранить такое правило:

```text
цена = 150 000 × площадь + 2 000 000 × (район=center) − 500 000 × (этаж=1)
```

Числа `150 000`, `2 000 000`, `−500 000` — это и есть параметры. Модель подобрала их так, чтобы предсказания были как можно ближе к реальным ценам в обучающей выборке.

После обучения на новом объекте она применяет это правило:

```text
X = [площадь=55, район=center, комнат=2]  →  y = ?
```

И выдаёт предсказание.

## Простой пример

Есть задача: предсказать, купит ли пользователь товар.

Обучающие данные показывают: пользователи с `orders_count > 3` покупали в 80% случаев.
Пользователи с `orders_count = 0` — только в 10% случаев.

Модель замечает эту связь и начинает использовать её для новых пользователей.

Она не «понимает», почему активные покупатели чаще покупают.
Она просто выучила: большой `orders_count` → высокая вероятность покупки.

Инсайт: модель ничего не знает о психологии покупателей. Но если завтра в данных появится группа пользователей с высоким `orders_count`, которые вдруг перестали покупать, — модель продолжит ошибочно предсказывать покупку. Она выучила связь, которая существовала в прошлом, но не знает о её изменении.

## Практика

1. В обучающих данных продажи мороженого сильно коррелируют с количеством утопленников (оба растут летом). Что произойдёт, если добавить «количество утопленников» в признаки модели для предсказания продаж?
2. Модель обучена на данных за 2020–2021 год. В 2022 году закономерности в данных изменились. Почему модель начнёт ошибаться, и что именно перестанет работать в том, что она «выучила»?
3. В данных о квартирах все дорогие квартиры сфотографированы в солнечный день. Что может выучить модель, если добавить в X признак «погода на фото»?
4. В уроке «Как выглядят данные в ML» мы видели, что строки — это объекты, а колонки — свойства. Объясни: почему добавление случайных колонок, никак не связанных с результатом, ухудшает то, что модель реально учит из данных?
5. В уроке «X, y, признаки и target» мы говорили, что target нельзя добавлять в X. Объясни это правило через то, что модель реально учит: что именно произойдёт с найденной связью, если y окажется среди признаков?

## Краткий итог

- Модель не понимает задачу — она ищет статистические связи между признаками и результатом.
- После обучения модель хранит параметры — числа, в которых закодированы найденные закономерности.
- Если связь в данных есть — модель её найдёт. Если её нет — модель будет угадывать.
- Модель выучит любую связь, которая есть в данных — в том числе случайную или ложную.
- Качество данных важнее сложности алгоритма.

## Ключевые термины урока

- **Параметры модели** — числа, которые модель хранит после обучения и использует для предсказаний.
- **Связь X и y** — статистическая зависимость между признаками и целевой переменной, которую ищет модель.
- **Функция предсказания** — математическая формула, построенная моделью по признакам объекта.
- **Обобщение** — способность модели делать верные предсказания для новых, невиданных данных.

# 07. Статистика для ML: среднее, медиана, дисперсия

## Зачем это нужно

Прежде чем обучать модель, нужно понять данные. Базовая статистика — это первый инструмент, который показывает, где выбросы, как распределены значения и какие признаки вообще полезны. Без этого шага модель будет учиться на мусоре.

## Простая интуиция

Представь, что ты оцениваешь зарплаты в команде из 9 человек с зарплатами 50–80 тысяч и одного топ-менеджера с зарплатой 500 тысяч. Среднее покажет ~95 тысяч — это введёт в заблуждение. Медиана покажет ~65 тысяч — это реальная картина. Дисперсия скажет, насколько все разные.

## Что это такое

### Среднее (mean)

Сумма всех значений делённая на их количество. Проблема — оно тянется к выбросам.

Зарплаты в команде: `[50, 55, 60, 65, 70, 500]`

Никто не получает 133 тысячи. Одно большое число испортило картину.

### Медиана (median)

Серединное значение при сортировке. Выбросы на неё не влияют — они просто остаются на краях.

Те же зарплаты, отсортированные: `[50, 55, 60, 65, 70, 500]`

Это уже честная картина. Именно поэтому медиана — стандарт для зарплатных данных, цен на жильё и доходов.

**Правило:** если среднее сильно отличается от медианы — в данных есть выбросы.

### Дисперсия (variance) и стандартное отклонение (std)

Обе метрики показывают **разброс** значений вокруг среднего.

Два датасета с одинаковым средним (50):

Дисперсия считает средний квадрат отклонений — поэтому число получается большим и в квадратных единицах (неудобно читать). Стандартное отклонение — это корень из дисперсии, оно в тех же единицах что и данные.

Практический смысл std: **большинство «нормальных» значений лежат в диапазоне `среднее ± std`**.

Если std = 0 — признак не меняется. Такой столбец модели бесполезен: она не может найти в нём никакой связи с target.

### Корреляция (correlation)

Показывает, **насколько связанно меняются два признака**. Значение от -1 до +1.

```text
+1  — растут вместе: рост человека и вес
-1  — один растёт, другой падает: цена и спрос
 0  — не связаны: размер обуви и зарплата
```

Если два признака коррелируют на 0.95 — они несут почти одинаковую информацию. Оставить оба в X смысла нет: модель получит дублированный сигнал, а не дополнительную информацию.

## Как это работает

**Практическое применение:** среднее используют для заполнения числовых пропусков, но при выбросах лучше брать медиану.

Стандартный первый шаг при знакомстве с датасетом — посмотреть на сводку по числовым колонкам: минимум, максимум, среднее, медиану, std. Это сразу показывает:

- есть ли выбросы (среднее сильно выше медианы);
- есть ли «мёртвые» признаки (std близко к нулю);
- есть ли дублирующие признаки (корреляция близко к 1).

Этот этап называется **EDA (Exploratory Data Analysis)** — разведочный анализ данных. Без него обучать модель — как ехать с закрытыми глазами.

Если среднее и медиана сильно расходятся — в данных скорее всего есть выбросы. Высокая корреляция двух признаков означает, что они несут похожую информацию.

## Практика

1. Почему среднее чувствительно к выбросам, а медиана — нет? Объясни на примере.
2. Что значит, если стандартное отклонение признака равно нулю? Что ты сделаешь с таким признаком?
3. Корреляция между двумя признаками равна 0.95. Что это означает и как ты поступишь?
4. В уроке «Что модель реально учит из данных» говорилось, что модель выучит любую связь в данных — в том числе случайную. Как высокая корреляция двух признаков связана с тем, что модель реально получает из данных? Что изменится, если убрать один из двух коррелирующих признаков?
5. В уроке «Как выглядят данные в ML» мы видели, что колонки — это свойства объектов. Представь таблицу квартир: `площадь`, `этаж`, `район`, `цена`. Применяя три метрики из этого урока (среднее/медиана, std, корреляция), объясни, как ты выявишь признаки с выбросами, бесполезные признаки и дублирующиеся признаки.

## Краткий итог

- При наличии выбросов смотри на медиану, а не на среднее: один экстремальный объект может сдвинуть среднее в разы
- Медиана устойчива к выбросам и даёт более честную картину
- Стандартное отклонение показывает типичный разброс значений
- Нулевая дисперсия = признак бесполезен для модели
- Высокая корреляция между признаками — сигнал к удалению одного из них
- `.describe()` и `.corr()` — стартовые инструменты любого EDA

## Ключевые термины урока

- **Среднее** — чувствительно к выбросам, потому что учитывает абсолютные значения всех точек. Диагностический признак: среднее сильно выше медианы → в данных правосторонние выбросы. Использовать среднее для заполнения пропусков при перекошенном распределении — ошибка: вы вставите нетипичное значение в большинство строк.
- **Медиана** — устойчива к выбросам, потому что учитывает только порядок. Стандарт для перекошенных распределений (доходы, цены жилья): именно поэтому официальная статистика публикует медианную зарплату, а не среднюю. Если среднее >> медианы — распределение правостороннее.
- **Дисперсия** — квадратичная мера разброса: большие отклонения вносят непропорционально большой вклад. Признак с нулевой дисперсией — константа: он не несёт информации и удаляется до обучения.
- **Стандартное отклонение** — разброс в исходных единицах. Правило трёх сигм: ~68% значений лежат в ±1 std от среднего, ~95% в ±2 std. Значение дальше 3 std — кандидат в выбросы.
- **Корреляция** — ловит только линейную связь: признаки могут быть сильно зависимы при корреляции ~0 (например, квадратичная зависимость). Главная ловушка: корреляция ≠ причинность — в данных она возникает от общей третьей причины или совпадения.
- **EDA (Exploratory Data Analysis)** — нельзя пропустить: без него модель может обучиться на признаках с нулевой дисперсией, данных с утечкой или на выбросах. `.describe()` и `.corr()` — минимальный стартовый набор для понимания данных.

# 08. Числовые и категориальные признаки

## Зачем это нужно

Модели работают с числами. Но реальные данные — смесь чисел, строк и категорий.

Понять разницу между числовыми и категориальными признаками нужно, чтобы знать, какие колонки можно передать в модель напрямую, а какие потребуют дополнительной обработки.

## Простая интуиция

Возьмём таблицу пользователей:

| age | city    | orders_count | bought |
| --: | ------- | -----------: | -----: |
|  25 | Berlin  |            4 |      1 |
|  40 | Hamburg |            1 |      0 |
|  31 | Berlin  |            6 |      1 |

`age = 25` или `orders_count = 4` — это числа. Модель понимает их сразу: можно сравнивать, складывать, находить связи.

`city = "Berlin"` — это строка. Модель не знает, что с ней делать. Нужно превратить категорию в числа, но сделать это правильно — не добавив ложный смысл.

## Что это такое

**Числовые признаки** — колонки с числами: `age`, `salary`, `orders_count`.
Большинство моделей может работать с ними напрямую.

**Категориальные признаки** — колонки с категориями: `city`, `device`, `plan`.
Перед обучением их нужно закодировать — превратить в числовой вид.

## Как это работает

Главная проблема: нельзя просто заменить категории числами по порядку.

Если сделать `Berlin=1, Hamburg=2, Munich=3`, модель начнёт считать, что Munich > Hamburg > Berlin — как будто между городами есть числовой порядок. Но его нет. Такое кодирование добавляет в данные ложный сигнал.

Правильное кодирование категорий устраняет этот ложный порядок: категории преобразуются так, чтобы модель воспринимала их как равнозначные варианты, а не как числовую шкалу.

Подробнее о конкретных способах кодирования — в последующих уроках по обработке категориальных признаков. Там разберём разные техники и когда какую применять.

## Простой пример

Есть задача — предсказать отток клиента. Признаки:

| age | city    | orders_count |
| --: | ------- | -----------: |
|  25 | Berlin  |            4 |
|  40 | Hamburg |            1 |

`age` и `orders_count` — числовые, идут в модель как есть.
`city` — категориальный, нужно закодировать перед обучением.

После кодирования таблица X становится полностью числовой — и только тогда её можно передать в модель.

Инсайт: признак `city` несёт реальную информацию, но модель не может её использовать, пока он остаётся строкой. Это значит, что ценный сигнал просто теряется — не из-за плохих данных, а из-за неправильного формата. Тип данных влияет на то, что модель вообще способна выучить.

## Практика

1. Таблица содержит признак `rating` со значениями «плохо», «нормально», «отлично». Это числовой или категориальный признак? Можно ли просто заменить его на 1, 2, 3 — или это добавит ложный смысл? Чем этот случай отличается от кодирования городов?
2. Тебе предлагают закодировать `device_type` так: `mobile=1, tablet=2, desktop=3`. Какую конкретную ложную закономерность может выучить модель из такого кодирования?
3. В данных есть признак `payment_method` со значениями: «наличные», «карта», «крипто». Как правильно объяснить коллеге, почему нельзя кодировать их как 1, 2, 3, — и что именно нужно сделать вместо этого (без упоминания конкретных техник из будущих уроков)?
4. В уроке «Что модель реально учит из данных» говорилось, что модель ищет статистические связи в данных. Объясни, почему передача категориального признака без кодирования не просто вызывает ошибку, а именно искажает то, что модель выучит?
5. В уроке «Как выглядят данные в ML» мы видели таблицу с колонками разного типа. Возьми признаки: `стоимость заказа` (число), `способ оплаты` (наличные / карта / крипто), `количество товаров` (число), `страна доставки` (текст), `срочная доставка` (да / нет). Какие признаки потребуют кодирования и почему числовые идут в модель напрямую?

## Краткий итог

- Числовые признаки (`age`, `salary`, `orders`) обычно идут в модель напрямую.
- Категориальные признаки (`city`, `device`, `plan`) нужно закодировать в числа.
- Нельзя просто заменить категории числами по порядку — это добавит ложный смысл.
- Правильное кодирование устраняет ложный числовой порядок между категориями.
- Все признаки в X должны быть числовыми до передачи в модель.

## Ключевые термины урока

- **Числовые признаки** — признаки с числовыми значениями (`age`, `salary`), которые идут в модель напрямую. Важный нюанс: числовой формат не гарантирует полезность — признак должен нести реальную связь с target.
- **Категориальные признаки** — признаки со строковыми значениями (`city`, `plan`), требующие кодирования перед обучением. Без кодирования большинство моделей не смогут с ними работать.
- **Кодирование** — преобразование категориальных признаков в числовой вид так, чтобы не добавить ложного смысла. Конкретные способы кодирования разбираются в последующих уроках.
- **Порядковая шкала** — особый вид категориального признака, где значения имеют смысловой порядок («плохо» < «нормально» < «отлично»), но расстояние между соседними значениями не равно и не определено. Это отличает его от числового признака: нельзя считать, что «отлично» втрое лучше «плохо».

# 09. Регрессия vs классификация

## Зачем это нужно

Перед тем как выбрать модель и метрику, нужно определить тип задачи. Регрессия и классификация — два главных типа в supervised learning. От этого зависит, какой алгоритм брать, какую метрику считать и как трактовать результат. Неверный выбор типа задачи означает неверные метрики и бессмысленный результат.

## Простая интуиция

- **Регрессия** отвечает на вопрос «**сколько?**»: сколько стоит квартира, сколько минут займёт доставка, какая будет зарплата.
- **Классификация** отвечает на вопрос «**к какому классу?**»: спам или нет, купит или не купит, кот / собака / птица.

Если ответ — произвольное число, это регрессия. Если ответ — выбор из фиксированного списка категорий, это классификация.

## Что это такое

**Регрессия** — задача, где target `y` — непрерывное число. Примеры: `price`, `salary`, `temperature`, `delivery_time_minutes`.

**Классификация** — задача, где target `y` — метка класса из конечного набора. Примеры: `spam (0/1)`, `churn (0/1)`, `species (cat/dog/bird)`.

Важный нюанс: если target записан как `0/1`, это всё равно **классификация**, а не регрессия. Важен смысл, а не формат числа. Модель должна выбрать один из классов, а не вернуть значение «0.73».

## Как это работает

| | Регрессия | Классификация |
|---|---|---|
| Что предсказываем | число | класс |
| Пример target | `12400000` | `spam` / `not_spam` |
| Суффикс модели в sklearn | `*Regressor` | `*Classifier` |
| Тип метрик | метрики отклонения от числового значения | метрики качества разделения классов |

Это видно прямо в названиях моделей: `*Regressor` — для регрессии, `*Classifier` — для классификации.

## Практика

1. Задача: предсказать число дней до следующего визита клиента в магазин. Первый коллега говорит: «target = число, значит регрессия». Второй: «Лучше разбить на категории: скоро / в течение месяца / не вернётся — получится классификация». Кто прав — и что конкретно изменится в модели, метрике и интерпретации при каждом подходе?
2. Почему задача «предсказать, уйдёт ли клиент (`churn = 0/1`)» — это классификация, хотя target записан числами?
3. Две задачи: (а) предсказать точный возраст человека по фото; (б) предсказать возрастную группу «до 18 / 18–40 / 40+». Какой тип у каждой и почему?
4. В уроке «X, y, признаки и target» мы разобрали, что target — это то, что модель учится предсказывать. Возьми target `price` (цена квартиры) и target `district` (район). Какой тип задачи соответствует каждому и почему?
5. Колонка target в датасете содержит значения `0` и `1`. Коллега говорит: «Это числа, значит регрессия». Объясни ему, почему он неправ, опираясь на разницу между типами задач, которую мы изучили в этом уроке.

## Краткий итог

- Регрессия → число. Классификация → класс.
- `0/1` в target — это классификация, а не регрессия.
- Тип задачи определяет модель (`*Regressor` / `*Classifier`) и тип метрики.
- Метрики для регрессии и классификации принципиально разные — они появятся в следующих уроках.
- Сначала пойми тип задачи — потом выбирай алгоритм.

## Ключевые термины урока

- **Регрессия** — тип задачи с непрерывным числовым target. Accuracy здесь бессмысленна: для регрессии используют метрики отклонения — MAE, RMSE, R². Типичная ошибка новичка: считать accuracy на регрессионной модели.
- **Классификация** — тип задачи, где target — одна из фиксированных категорий. Бывает бинарной (2 класса) и многоклассовой (≥3); при многоклассовой метрики и способы усреднения (macro, micro, weighted) отличаются.
- **Regressor** — класс модели для регрессии в sklearn (`LinearRegression`, `RandomForestRegressor` и др.). Всегда возвращает число через `.predict()`. Нет метода `.predict_proba()`.
- **Classifier** — класс модели для классификации в sklearn (`LogisticRegression`, `RandomForestClassifier` и др.). Имеет как `.predict()` (класс), так и `.predict_proba()` (вероятность принадлежности к каждому классу).

# 10. Вероятности в классификации

## Зачем это нужно

В уроке «Регрессия vs классификация» мы разобрали, что классификация — это задача, где модель выбирает класс.
Но на самом деле большинство моделей не просто говорят «спам» или «не спам».

Сначала они выдают число от 0 до 1 — уверенность в том, что объект принадлежит к классу.
И только потом это число превращается в ответ.

Понимать это важно, потому что порог, при котором число становится классом, можно менять.
И от этого выбора зависит, как модель ведёт себя в реальной задаче.

## Простая интуиция

Представь, что ты решаешь — брать зонт или нет.
Если вероятность дождя 90% — берёшь. Если 20% — нет.
Но порог «брать зонт» у всех разный: кто-то берёт при 40%, кто-то только при 70%.

Модель работает так же. Она говорит: «вероятность того, что это спам — 0.87».
А ты уже решаешь, при каком значении считать письмо спамом.

## Что это такое

**Вероятность в классификации** — число от 0 до 1, которое модель выдаёт для каждого объекта.

Оно показывает, насколько модель уверена, что объект относится к положительному классу.

- `0.95` — модель почти уверена, что это класс 1
- `0.5` — модель не определилась
- `0.12` — модель склоняется к классу 0

Финальный класс определяется через **порог (threshold)**.
По умолчанию он равен `0.5`: если вероятность выше — класс 1, ниже — класс 0.

## Как это работает

Модель не переключается сразу между классами — она плавно меняет уверенность.

Пример: предсказываем, купит ли пользователь товар.

| age | orders_count | P(bought=1) | Класс при пороге 0.5 |
| --: | -----------: | ----------: | -------------------- |
|  25 |            6 |        0.91 | купит                |
|  40 |            1 |        0.34 | не купит             |
|  31 |            0 |        0.08 | не купит             |
|  28 |            3 |        0.52 | купит                |

Четвёртый пользователь попадает в «купит» с вероятностью 0.52 — совсем немного выше порога.
Если задача требует большей уверенности, порог можно поднять до 0.7 — и тогда он попадёт в «не купит».

## Простой пример

Допустим, модель определяет болезнь по анализам.

При пороге `0.5`:
- меньше пропустим больных, но больше здоровых попадёт на повторный осмотр.

При пороге `0.3`:
- ещё меньше пропустим больных, но ещё больше лишних направлений.

При пороге `0.8`:
- меньше лишних направлений, но выше риск пропустить болезнь.

Правильный порог зависит от задачи — не от модели.

## Практика

1. Посмотри на таблицу в разделе «Как это работает». Пользователь с вероятностью 0.52 попал в класс «купит». Что произойдёт с его классом, если поднять порог до 0.7? А если снизить до 0.4?
2. Модель выдала вероятность 0.87 для письма. Это значит «точно спам» или что-то другое? Что произойдёт с классификацией письма, если поднять порог с 0.5 до 0.9?
3. Ты строишь модель для выявления утечки газа в трубах. Пропущенная утечка — авария. Ложная тревога — лишняя проверка. Как изменить порог относительно стандартного 0.5 и почему?
4. В уроке «Регрессия vs классификация» мы разобрали, что классификация — выбор из конечного набора классов. Как вероятности, которые выдаёт модель, помогают сделать этот выбор? Почему нельзя просто взять класс без промежуточного числа?
5. Мини-кейс: банк блокирует транзакцию, если вероятность мошенничества выше порога. При пороге 0.6 много мошенничества проходит незамеченным. Что нужно сделать с порогом и какой побочный эффект у этого решения?

## Краткий итог

- Большинство классификационных моделей выдают не класс, а вероятность от 0 до 1.
- Вероятность показывает уверенность модели в принадлежности объекта к классу.
- Порог по умолчанию — 0.5, но его можно менять под задачу.
- В многоклассовой задаче модель выдаёт вероятности для каждого класса — побеждает максимальная.
- Правильный порог зависит от цены ошибки в конкретной задаче, не от модели.

## Ключевые термины урока

- **Вероятность в классификации** — уверенность модели в принадлежности объекта к классу. Важно: это не обязательно истинная вероятность — необученные модели могут быть систематически завышены или занижены. Если 0.87 должно означать «87% случаев» буквально, нужна дополнительная калибровка.
- **Порог (threshold)** — граница, при которой вероятность превращается в класс. Снижение порога увеличивает recall (меньше пропускаем), но снижает precision (больше ложных тревог). Нет универсально «правильного» порога — выбор зависит от цены каждого типа ошибки.
- **predict_proba()** — метод sklearn, возвращающий вероятности. Не все модели возвращают хорошо откалиброванные вероятности: LogisticRegression — калибрована, RandomForest — как правило нет. При использовании в задачах с риском проверяй калибровку.
- **Мягкие предсказания** — необходимы когда важна не финальная метка, а уверенность: для ранжирования (отсортировать по риску), для ROC-AUC, для настройки порога под задачу.

# 11. Кластеризация как задача

## Зачем это нужно

Не всегда у тебя есть размеченные данные. Иногда нужно просто разобраться в структуре данных: найти группы похожих объектов, выявить сегменты пользователей или обнаружить аномалии. Кластеризация решает именно такие задачи — без каких-либо меток.

## Простая интуиция

Представь, что тебе дали тысячу анкет клиентов без каких-либо пометок. Ты смотришь на них и начинаешь замечать: одни покупают дорого и редко, другие — дёшево и часто, третьи — только по акциям. Ты интуитивно разбиваешь людей на группы. Именно это делает алгоритм кластеризации — только на основе чисел.

## Что это такое

Кластеризация — задача unsupervised learning, где алгоритм группирует объекты так, чтобы объекты внутри группы были похожи друг на друга, а объекты из разных групп — различались.

Ключевые понятия:
- **Кластер** — группа похожих объектов
- **Нет предопределённых классов** — в отличие от классификации, мы не знаем заранее, сколько групп и какие они
- **Сходство** — алгоритм сравнивает объекты по их признакам: чем ближе значения, тем более похожими считаются объекты

## Как это работает

Алгоритм смотрит на признаки каждого объекта и ищет похожие — те, у которых значения признаков близки. Похожие объекты объединяются в одну группу, непохожие — в разные. Алгоритм не знает заранее, какими будут группы: он находит их сам, опираясь только на данные.

**Как выглядит результат.** Для каждого объекта алгоритм возвращает номер кластера — просто число:

| возраст | покупок/мес | средний чек | **кластер** |
|--------:|------------:|------------:|:-----------:|
| 22      | 18          | 700 руб.    | **0**       |
| 19      | 22          | 650 руб.    | **0**       |
| 47      | 2           | 14 000 руб. | **1**       |
| 55      | 1           | 18 000 руб. | **1**       |

`0` и `1` — просто метки групп, не «молодые» и «состоятельные». Смысл — человек понимает сам, глядя на средние значения признаков внутри каждой группы:

| кластер | ср. возраст | ср. покупок/мес | ср. чек     |
|:-------:|------------:|----------------:|------------:|
| **0**   | 21          | 20              | 675 руб.    |
| **1**   | 51          | 1.5             | 16 000 руб. |

Паттерн очевиден: кластер `0` — молодые и активные с маленьким чеком, кластер `1` — взрослые, редко, но дорого. Ты сам придумываешь названия. Алгоритм нашёл структуру — ты дал ей смысл.

**Сколько кластеров?**

В отличие от классификации, где количество классов известно заранее, при кластеризации его часто нужно задавать самому или подбирать. Нет правильного ответа — есть более или менее осмысленное разбиение. Иногда запускают с разным числом кластеров (2, 3, 4...) и смотрят, при каком результат имеет смысл с точки зрения бизнеса.

**Что если кластеры не имеют смысла?**

Иногда алгоритм находит группы, которые не поддаются интерпретации — внутри смешаны очень разные объекты. Это сигнал: либо данных мало, либо выбраны не те признаки, либо структуры в данных просто нет. Кластеризация не гарантирует осмысленный результат — она находит математически близкие группы, а не «правильные».

## Практика

1. Алгоритм разбил 10 000 клиентов на 5 кластеров. Кластер 2 — крупнейший (4 000 человек): внутри возраст 18–62, средний чек 200–15 000 руб., частота 1–25 покупок/мес. Что именно это сигнализирует — о данных, о выборе числа кластеров или о признаках?
2. У тебя есть данные о поведении 100 000 пользователей приложения без меток. Почему классификация здесь не подойдёт и зачем нужна кластеризация?
3. Алгоритм разбил клиентов на группы A и B. Кто даёт этим группам названия и решает что с ними делать — алгоритм или человек? Почему?
4. В уроке «Регрессия vs классификация» мы узнали, что в классификации классы известны заранее. Чем ситуация при кластеризации принципиально отличается и что из этого следует для интерпретации результата?
5. Мини-кейс: маркетолог хочет разослать разные акции разным группам клиентов, но никаких сегментов пока нет. Как кластеризация поможет решить эту задачу — что будет входом, что выходом и что маркетолог делает с результатом?

## Краткий итог

- Кластеризация не даёт «правильных» ответов: алгоритм находит разбиение, но осмысленность кластеров определяет человек
- Результат — номер кластера для каждого объекта; кластеры нужно интерпретировать вручную, глядя на средние значения признаков
- Количество кластеров часто задаётся вручную или подбирается — правильного ответа нет
- Если кластеры не поддаются интерпретации — возможно, структуры в данных нет
- Используй, когда меток нет совсем; если метки есть — лучше классификация
- Применяется для сегментации, группировки, предобработки, поиска аномалий

## Ключевые термины урока

- **Кластеризация** — в отличие от классификации, нет «правильного» ответа: нельзя посчитать accuracy без внешней разметки. Оценка результата — экспертная: кластеры должны быть интерпретируемы и полезны для задачи.
- **Кластер** — математически близкая группа объектов, но не обязательно осмысленная. Один и тот же объект может попасть в разные кластеры при разном числе кластеров или при другом алгоритме.
- **Сходство** — выбор меры близости принципиально меняет результат: Euclidean-расстояние чувствительно к масштабу признаков (нужна нормализация), cosine-сходство игнорирует масштаб, но смотрит на направление. Без нормализации признаки с большим диапазоном значений «доминируют» над мелкими.
- **Число кластеров** — нет формулы для правильного ответа. Эвристики (elbow, silhouette) дают подсказку, но финальный выбор — по осмысленности результата для бизнеса.
