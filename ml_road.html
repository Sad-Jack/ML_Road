# 54. Обучение без учителя

## Зачем это нужно

В реальных задачах разметка данных — это дорого и долго. Иногда меток просто нет: вы хотите понять структуру данных, найти группы клиентов или обнаружить аномалии. Именно здесь применяется обучение без учителя — один из трёх фундаментальных подходов в ML.

## Простая интуиция

Представьте, что вы разбираете шкаф с вещами и раскладываете их по стопкам: зимнее, летнее, спортивное. Никто не говорил вам, как разложить — вы сами нашли похожие вещи и сгруппировали их. Это и есть обучение без учителя: найти структуру там, где нет заранее заданных ответов.

## Что это такое

- **Unsupervised learning** — класс алгоритмов ML, работающих с данными без меток
- Основные задачи:
  - **Кластеризация** — разбить объекты на похожие группы по сходству признаков
  - **Снижение размерности** — сжать данные, сохранив их структуру в меньшем числе измерений
  - **Обнаружение аномалий** — найти объекты, сильно отличающиеся от остальных
  - **Генеративные модели** — научиться генерировать новые похожие объекты
- В отличие от supervised learning, нет «правильного ответа» для проверки

## Как это работает

Unsupervised learning не имеет единого алгоритма — это семейство подходов с разной механикой:

- **Кластеризация** — алгоритм ищет точки, которые «близки» друг к другу в пространстве признаков, и группирует их вместе. Что считать «близким» — определяется метрикой расстояния (евклидово, косинусное и др.)
- **Снижение размерности** — алгоритм находит новые оси в пространстве данных, вдоль которых данные наиболее «разбросаны», и проецирует на них исходные точки. Исходные признаки при этом заменяются новыми (меньшим числом)
- **Обнаружение аномалий** — алгоритм строит модель «нормального» поведения по обучающим данным. Новые объекты, которые плохо вписываются в эту модель, получают высокий аномальный скор

Во всех случаях у алгоритма нет целевого значения y для обучения — он работает только с X.

## Простой пример

Интернет-магазин накопил данные о 50 000 покупателях: частота покупок, средний чек, категории товаров — но без каких-либо меток. Запустили алгоритм кластеризации с числом групп = 3 и получили три сегмента: «редкие покупатели с малым чеком» (32 000 человек), «регулярные покупатели среднего чека» (14 000), «VIP с высокой частотой и большим чеком» (4 000). Метки никто не ставил — алгоритм нашёл структуру сам. Теперь для каждой группы можно запустить разные маркетинговые кампании.

## Практика

1. Коллега запустил алгоритм кластеризации и получил 4 чётких кластера. Он говорит: «Всё работает хорошо». Почему это утверждение неполное и что нужно проверить дополнительно при оценке качества без учителя?
2. Компания хочет снизить отток клиентов, но данных с метками «ушёл / не ушёл» за последние 3 месяца ещё нет. Аналитик предлагает сначала запустить кластеризацию. Объясни, как unsupervised алгоритм может принести практическую пользу, если в итоге нет y — и что конкретно он способен выдать вместо предсказания.
3. У вас миллион транзакций, из которых лишь несколько помечены как мошеннические. Какой подход — supervised или unsupervised — выбрать и почему?
4. В уроке «Масштабирование признаков» мы узнали, что разные признаки могут иметь несовместимые диапазоны значений. Как это ограничение влияет на алгоритмы кластеризации, использующие евклидово расстояние?
5. В уроке «Overfitting и Underfitting» мы говорили о том, что модели с обучением бывают склонны запоминать шум. Как эта проблема проявляется в unsupervised learning, если число кластеров задать слишком большим?

## Краткий итог

- Unsupervised learning работает с данными без меток, ища скрытую структуру
- Основные задачи: кластеризация, снижение размерности, обнаружение аномалий
- Сложно оценивать качество без «правильных ответов»
- Часто используется как вспомогательный инструмент в supervised пайплайне

## Ключевые термины урока

- **Unsupervised learning** — в отличие от supervised, нет единственно верного ответа для оценки; качество приходится проверять косвенно — через внутренние метрики алгоритмов или экспертную оценку результата.
- **Кластеризация** — задача без меток; нельзя напрямую сравнить результат с «правильным» ответом. Разные алгоритмы кластеризации используют разные определения «похожести» и дают разные результаты на одних данных.
- **Снижение размерности** — используется как в EDA (визуализация структуры данных), так и в pipeline (как preprocessing для ускорения обучения и борьбы с переобучением).
- **Обнаружение аномалий** — особенность: аномалий в обучении почти нет, модель учится на «нормальных» данных и отмечает то, что не похоже на них.
- **Генеративные модели** — в отличие от дискриминативных (предсказывают класс), моделируют само распределение данных; используются для аугментации, синтеза и понимания структуры данных. Детальное рассмотрение (GAN, LLM, диффузионные модели) — в модуле Deep Learning.

# 55. K-Means

## Зачем это нужно

Когда вам нужно разделить клиентов на сегменты, сгруппировать документы по темам или найти похожие товары — у вас нет готовых ответов, только данные. K-Means — первый алгоритм, который берётся за эту задачу: он прост, быстр и даёт результат в виде чётких групп с центрами. Понять его механику важно, чтобы знать, когда он работает хорошо, а когда стоит искать другой подход.

## Простая интуиция

Представьте, что вы расставляете 3 флага на карте городов. Каждый город «идёт» к ближайшему флагу. Потом флаги перемещаются в центры своих групп. И так по кругу, пока флаги не перестанут двигаться. Флаги — это центроиды, города — точки данных.

## Что это такое

- **K-Means** — алгоритм, разбивающий данные на K кластеров, минимизируя расстояния внутри кластеров
- **K** — число кластеров, задаётся вручную
- **Центроид** — среднее значение всех точек в кластере
- **Инерция (inertia)** — сумма квадратов расстояний от точек до их центроидов (чем меньше, тем лучше)
- **Метод локтя (Elbow method)** — подбор оптимального K по графику инерции

## Как это работает

K-Means работает итеративно:

1. Инициализируются K центроидов: sklearn по умолчанию использует **K-Means++** (`init='k-means++'`), который выбирает стартовые центроиды как можно дальше друг от друга, снижая риск попасть в плохой локальный оптимум. Параметр `n_init=10` означает, что алгоритм запускается 10 раз с разными инициализациями и возвращает лучший результат — это дополнительная страховка от неудачного старта даже при K-Means++
2. Каждая точка приписывается к ближайшему центроиду (по евклидовому расстоянию)
3. Центроиды пересчитываются как среднее всех точек своего кластера
4. Шаги 2–3 повторяются до сходимости (центроиды перестают двигаться)

Метод локтя: запускают K-Means для K=1, 2, 3… и строят график инерции по K. Ищут «перегиб» — точку, где снижение инерции резко замедляется. До перегиба каждый новый кластер сильно уменьшает инерцию, после — почти не меняет.

## Простой пример

Сеть розничных магазинов хочет сегментировать 3 000 клиентов по двум признакам: «число визитов в месяц» и «средний чек». Запускают K-Means с K=2, 3, 4, 5 и строят метод локтя. При K=4 инерция резко перестаёт падать — оптимум найден. Четыре центроида описывают сегменты: «редко/дёшево», «редко/дорого», «часто/дёшево», «часто/дорого». Это actionable сегментация для маркетинга.

## Практика

1. K-Means запущен на клиентских данных. При каждом запуске с разными `random_state` результаты немного отличаются. Что это говорит о K-Means и как параметр `n_init=10` помогает с этой проблемой?
2. Вы построили метод локтя: K=1: 5800, K=2: 3200, K=3: 2100, K=4: 1950, K=5: 1870, K=6: 1820. Какое K выбрать? Как объяснить это руководству, которое ожидало «точный ответ»?
3. Вы кластеризуете клиентов по признакам «возраст» и «сумма покупок». K-Means с K=3 выдаёт нестабильные кластеры при разных запусках. Что это говорит и как исправить?
4. В уроке «Обучение без учителя» мы говорили, что у unsupervised learning нет «правильного ответа» для оценки качества. Как метод локтя и инерция K-Means помогают косвенно оценить результат — и в чём их ограничение?
5. В уроке «Масштабирование признаков» мы узнали, что разные признаки имеют несовместимые диапазоны. Как это влияет на K-Means, который использует евклидово расстояние, и что произойдёт с кластерами, если кластеризовать «возраст» (0–100) и «доход» (0–1 000 000) без нормализации?

## Краткий итог

- K-Means требует задать K заранее — используйте метод локтя для подбора, но помните, что «правильного» K часто нет: выбирайте из бизнес-логики
- Результат зависит от начальной инициализации — всегда используйте `n_init=10` или выше, чтобы получить устойчивый результат
- Нормализуйте данные перед запуском: K-Means чувствителен к масштабу признаков
- K-Means предполагает сферические кластеры одинакового размера — если кластеры другой формы, алгоритм даёт ненадёжные результаты

## Ключевые термины урока

- **K-Means** — предполагает сферические кластеры одинакового размера; при вытянутых или разноплотных кластерах работает плохо. Всегда выдаёт ровно K кластеров. K-Means++ (init='k-means++', по умолчанию в sklearn) — улучшенная инициализация: центроиды выбираются далеко друг от друга, а не случайно. Это снижает риск локального оптимума и ускоряет сходимость.
- **Центроид** — среднее всех точек кластера; пересчитывается на каждой итерации до сходимости. Если данные изменятся, центроид сдвинется — алгоритм нестабилен при добавлении новых точек.
- **Инерция (inertia)** — монотонно убывает при росте K; нельзя использовать как единственный критерий (K=N всегда даст 0). Используется только в паре с методом локтя.
- **Метод локтя (Elbow method)** — ищет K, где инерция резко «перегибается»; на практике перегиб часто размыт, и метод даёт ориентир, а не точный ответ.

# 56. DBSCAN

## Зачем это нужно

K-Means требует задавать K заранее и плохо работает с кластерами нестандартных форм. DBSCAN решает обе проблемы: автоматически определяет число кластеров и умеет находить кластеры произвольной формы. Плюс — выявляет выбросы как отдельный класс.

## Простая интуиция

Представьте, что вы идёте по городу и собираете людей в группы. Правило простое: если рядом стоит достаточно людей — это плотная зона, часть кластера. Одиночки в пустынных местах — это выбросы. Вы не знаете заранее, сколько будет групп — они формируются сами по плотности толпы.

## Что это такое

- **DBSCAN** (Density-Based Spatial Clustering of Applications with Noise) — алгоритм кластеризации на основе плотности
- **eps** — радиус окрестности: насколько близко должны быть точки
- **min_samples** — минимальное количество точек в радиусе eps для формирования плотной зоны
- **Основные точки** (core points) — точки с достаточным числом соседей
- **Граничные точки** — в eps-окрестности основной точки, но сами не основные
- **Шум (noise)** — точки, не принадлежащие ни одному кластеру (метка -1)

## Как это работает

DBSCAN обходит точки пространства по принципу плотности:

1. Берётся произвольная непосещённая точка
2. Считаются соседи в радиусе eps: если их ≥ min_samples — точка объявляется основной, начинается новый кластер
3. Кластер расширяется: к нему добавляются все точки в eps-окрестности основных точек (рекурсивно)
4. Точки, попавшие в радиус основной точки, но сами не имеющие достаточно соседей — граничные
5. Точки, не попавшие ни в одну eps-окрестность — шум (метка -1)

Если eps слишком мало — почти всё становится шумом. Если слишком велико — все точки сливаются в один кластер.

## Простой пример

Логистическая компания анализирует GPS-треки 10 000 доставок по городу. K-Means с K=5 делит город на 5 географических зон, но маршруты доставки имеют произвольные формы вдоль улиц. DBSCAN с eps=200м и min_samples=10 находит 12 плотных зон доставки (жилые кварталы, бизнес-центры, промзоны) и помечает 340 точек как шум — это нетипичные адреса в промышленных районах. Именно шумовые точки требуют отдельного планирования маршрута.

## Практика

1. Вы запускаете DBSCAN и видите: при одних настройках 95% точек помечается как шум, при других — все точки оказываются в одном кластере. Какой из двух параметров вы меняли в каждом случае и в какую сторону?
2. Из урока «K-Means» мы знаем, что каждая точка обязана попасть в кластер. DBSCAN вернул метку -1 для 12% точек датасета транзакций. Это проблема или полезный сигнал? Что вы сделаете с этими точками дальше?
3. Вы запустили DBSCAN с eps=0.5 — получили 400 точек-шума. Коллега снизил eps до 0.1 — шума стало 2 000. Руководитель предлагает поднять eps до 5.0 — шума нет, всё в одном кластере. Объясни, что именно контролирует eps и почему оба крайних значения указывают на неправильную настройку.
4. DBSCAN разметил 8% точек как шум (-1). Дата-инженер удалил их: «Они не попали ни в один кластер — значит, мусор». В каком сценарии удаление шумовых точек было бы оправдано? А в каком это фатальная ошибка — и что следует сделать с такими точками вместо удаления?
5. В уроке «Выбросы в данных» мы изучали Z-score и IQR как способы обнаружить выбросы по отдельному признаку. Как DBSCAN решает ту же задачу принципиально иначе, и в каком случае он выявит аномалию, которую Z-score пропустит?

## Краткий итог

- DBSCAN находит кластеры произвольной формы на основе плотности точек
- Параметры eps и min_samples нужно подбирать под данные
- Точки с метками -1 — выбросы (шум)
- Не требует задавать K заранее, но плохо масштабируется на большие датасеты

## Ключевые термины урока

- **DBSCAN** — в отличие от K-Means, не требует задавать K и находит кластеры произвольной формы; минус — плохо масштабируется на миллионы объектов (O(n log n) в лучшем случае).
- **eps** — слишком малое: почти всё становится шумом; слишком большое: всё сливается в один кластер. Подбирают по k-distance графику: для каждой точки считается расстояние до k-го соседа, строится отсортированный график — eps берётся у точки перегиба (резкий рост = граница плотных и разреженных зон).
- **min_samples** — чем выше, тем строже определение «плотной зоны». Правило «≥ числу признаков + 1» — лишь отправная точка; на практике чаще используют 5–20 в зависимости от желаемой плотности. Финальный выбор — совместно с eps по качеству получившихся кластеров. Важно: это правило работает для данных с небольшим числом признаков (до ~10). При высокой размерности расстояния теряют смысл (curse of dimensionality) — в таких случаях DBSCAN требует предварительного снижения размерности (PCA, UMAP) и подбора параметров через silhouette score или визуальный анализ.
- **Шум (noise, метка -1)** — в DBSCAN это не «мусор»: шумовые точки часто и есть ценные аномалии, которые нужно исследовать отдельно. K-Means аналога не имеет — каждая точка обязана попасть в кластер.
- **Плотность** — основа алгоритма; поэтому DBSCAN плохо работает на данных с очень разной плотностью кластеров (алгоритм HDBSCAN решает эту проблему).

# 57. Снижение размерности

## Зачем это нужно

Реальные датасеты часто имеют сотни и тысячи признаков. Это проблема: многие признаки коррелируют, модели переобучаются, визуализация невозможна. Снижение размерности помогает сжать данные, убрать шум и понять их структуру.

## Простая интуиция

Представьте, что вы фотографируете 3D-объект. Фотография — это 2D-проекция 3D-объекта. Вы теряете одно измерение, но сохраняете главную информацию о форме. Снижение размерности делает то же самое с данными: проецирует их из многомерного пространства в пространство меньшей размерности.

## Что это такое

- **Проклятие размерности** — в высоких измерениях данные становятся разреженными, расстояния теряют смысл, модели нуждаются в экспоненциально больше данных
- **Линейные методы** — ищут линейные комбинации признаков; создают устойчивую трансформацию, которую можно применить к новым данным
- **Нелинейные методы** — сохраняют нелинейную структуру данных; хорошо подходят для визуализации, но не для применения к новым объектам в production
- Цели снижения размерности: визуализация, ускорение обучения, борьба с переобучением, сжатие

## Как это работает

Снижение размерности работает по-разному в зависимости от класса метода:

**Линейные методы** ищут новые оси в исходном пространстве признаков — такие направления, вдоль которых данные максимально «разбросаны». Исходные признаки заменяются меньшим числом новых. Трансформация фиксируется один раз на обучающих данных и применяется к любым новым объектам.

**Нелинейные методы** строят проекцию, сохраняя «соседство» точек из высокого пространства в низком. Результат зависит от всей выборки целиком — добавление одного нового объекта меняет проекцию. Поэтому нелинейные методы применяются только для визуализации, не для production pipeline.

Во всех случаях нормализация данных обязательна до применения метода — признаки с большим диапазоном значений иначе подавят признаки с малым.

## Простой пример

Датасет из 800 пациентов с результатами 200 медицинских анализов. Половина признаков — разные измерения одних и тех же показателей крови (высокая корреляция). Линейный метод снижения размерности показывает: первые 15 новых осей объясняют 95% разброса данных. Снижение с 200 до 15 признаков ускоряет обучение модели в 10 раз, при этом качество предсказания падает с 0.873 до 0.868 — незначительная потеря. Плюс визуализация первых 2 новых осей показывает явное разделение здоровых пациентов и больных.

## Практика

1. У вас датасет: 10 000 объектов, 2 признака — точность логистической регрессии = 89%. Коллега добавляет 498 новых признаков (итого 500), и точность падает до 61%. Как называется этот эффект, почему он возникает и как снижение размерности помогает с ним справиться?
2. Ты сжал 500 признаков до 2 с помощью t-SNE и получил хорошую визуализацию. Коллега предлагает обучить на этих 2 компонентах Random Forest и задеплоить. Опиши конкретную проблему, с которой столкнётся команда в первый же день production, — и чем принципиально отличается линейный метод снижения размерности, у которого этой проблемы нет.
3. У вас датасет: 500 признаков, 1000 объектов. Линейный метод снижения размерности показывает, что первые 20 новых осей объясняют 95% разброса. Что это говорит о структуре данных и как вы поступите с оставшимися 480 признаками?
4. В уроке «Overfitting и Underfitting» мы говорили, что избыток признаков заставляет модель запоминать шум. Как снижение размерности через линейный метод может выступать формой регуляризации и когда оно действительно помогает с переобучением?
5. В уроке «Масштабирование признаков» мы узнали, что разные признаки имеют несовместимые диапазоны. Почему это особенно критично именно для методов снижения размерности и что произойдёт, если пропустить нормализацию?

## Краткий итог

- Снижение размерности борется с проклятием размерности и помогает визуализировать данные
- Линейные методы создают переиспользуемую трансформацию: её можно применить к новым данным без повторного обучения.
- Нелинейные методы (подробнее — в уроке «t-SNE и UMAP») хорошо визуализируют структуру, но не подходят как preprocessing: применить их к новым данным корректно нельзя
- Нормализация перед снижением размерности обязательна: признаки с разным масштабом исказят результат

## Ключевые термины урока

- **Проклятие размерности** — при числе признаков p >> числа объектов n все точки становятся «одинаково далеко» друг от друга; расстояния теряют смысл. Алгоритмы, опирающиеся на метрику расстояния, деградируют первыми; деревья устойчивее, но тоже страдают от шумовых признаков.
- **Линейные методы снижения размерности** — находят новые оси как линейные комбинации исходных признаков. Главное свойство: трансформацию можно зафиксировать и применить к новым данным — это делает их пригодными для production pipeline.
- **Нелинейные методы снижения размерности** — сохраняют нелинейные зависимости; отлично показывают структуру данных при визуализации. Ограничение: результат зависит от всех точек сразу, добавление нового объекта меняет всю проекцию.
- **Нормализация обязательна** — методы снижения размерности чувствительны к масштабу; признак с диапазоном 1–1000 доминирует над признаком 0–1. StandardScaler применяется до любого метода снижения размерности.

# 58. PCA простыми словами

## Зачем это нужно

У вас датасет с 500 признаками. Многие из них коррелируют — по сути это одна и та же информация, переупакованная в разные колонки. Модель переобучается, обучение занимает минуты. PCA решает это: находит новые оси, вдоль которых данные максимально «разбросаны», и позволяет выбросить лишние измерения без значительной потери информации. Это не просто ускорение — иногда удаление шумовых компонент улучшает качество модели.

## Простая интуиция

Представьте тени от предметов. Если поставить лампу под правильным углом, тень от 3D-объекта сохранит максимум информации о его форме. PCA находит такой «угол освещения» для ваших данных — направление, в котором данные наиболее «разбросаны», и проецирует их туда. При этом новые оси — не исходные колонки, а смеси из них. Вернуться к оригиналу точно уже нельзя.

## Что это такое

- **PCA** — метод, находящий линейные комбинации признаков (главные компоненты) с максимальной дисперсией
- **Главные компоненты (PC)** — новые оси, ортогональные друг другу, упорядоченные по убыванию объяснённой дисперсии. **Ортогональные** — значит линейно некоррелированные (угол 90°, нулевая ковариация): знание значения PC1 не даёт линейного предсказания PC2. Это не то же самое, что полная статистическая независимость — нелинейные зависимости между компонентами могут сохраняться
- **Explained variance ratio** — доля общего разброса данных, захваченная каждой компонентой. Если PC1=0.45, значит 45% всего разнообразия данных объясняется первой компонентой
- **n_components** — сколько компонент оставить
- PCA под капотом реализован через SVD (Singular Value Decomposition — метод факторизации матрицы, который находит направления максимального разброса); это математический механизм, знать который необязательно для практики

## Как это работает

PCA работает в три шага:

1. **Центрирование** — вычитается среднее по каждому признаку, чтобы данные были сосредоточены вокруг нуля
2. **Поиск направлений максимального разброса** — математически это нахождение собственных векторов матрицы ковариации признаков. Первый вектор — направление, вдоль которого данные разбросаны сильнее всего (PC1). Второй — лучшее направление из оставшихся, ортогональное первому (PC2). И так далее
3. **Проекция** — исходные точки проецируются на выбранные компоненты; получается новый датасет с меньшим числом признаков

Число компонент выбирается через кумулятивную объяснённую дисперсию: если PC1…PC20 вместе объясняют 95% разброса, остальные компоненты несут только 5% информации (часть из которой — шум).

PCA обязательно обучается только на train-данных, затем та же трансформация применяется к test — иначе тест «утекает» в параметры компонент.

## Простой пример

Датасет геномных данных: 1 200 пациентов, 1 000 признаков (уровни экспрессии генов). PC1 объясняет 28% дисперсии, PC2 — 15%, PC3 — 9%. График первых двух компонент показывает три чётких кластера — позже оказывается, что они соответствуют трём подтипам заболевания, ещё не известным врачам. Вместо 1 000 генов в модель передают 40 компонент (93% дисперсии), обучение занимает секунды вместо минут.

## Практика

1. После PCA первые 5 компонент объясняют 80% дисперсии, следующие 5 — ещё 5%. Сколько компонент взять для модели — 5, 10 или все? Что произойдёт с качеством и со скоростью при каждом выборе?
2. Коллега обучил PCA на объединённом датасете (train+test), разбил данные, обучил модель — val R²=0.91. Ты повторил корректно (PCA только на train) — val R²=0.86. Коллега говорит: «Разница 0.05 — случайность». Объясни через конкретный механизм, как именно тестовые объекты «попали» в параметры PCA и почему val-метрика у коллеги нечестная.
3. Вы применяете PCA к датасету вин (13 признаков): PC1+PC2 объясняют 55% дисперсии. Стоит ли использовать только 2 компоненты или нужно больше? Как решить?
4. В уроке «Снижение размерности» мы говорили, что нелинейные методы нельзя применять к новым данным в production. Коллега предлагает снизить 300 признаков до 3 с помощью нелинейного метода, обучить на них модель и задеплоить. Вы принимаете или отклоняете? Аргументируйте и предложите альтернативу.
5. В уроке «Простой ML-пайплайн» мы видели, что все preprocessing-шаги должны входить в единый Pipeline. Почему это требование особенно критично для PCA — что пойдёт не так, если применить его к данным до разбивки на train/test вне Pipeline?

## Краткий итог

- PCA находит ортогональные направления максимальной дисперсии в данных
- Обязательно нормализуйте данные перед PCA
- Обучайте PCA только на train, затем применяйте трансформацию к train и test
- Выбор n_components через explained_variance_ratio_: обычно 90-95% дисперсии достаточно

## Ключевые термины урока

- **PCA** — создаёт НОВЫЕ признаки (PC1, PC2...) как линейные комбинации исходных; не выбирает исходные признаки, а смешивает их. Следствие: интерпретируемость теряется — «PC1 = 0.4·age + 0.3·income − 0.2·debt» нечитаемо.
- **Главные компоненты (PC)** — ортогональны и линейно некоррелированы; PC1 объясняет наибольшую долю дисперсии, PC2 — наибольшую из оставшихся. Важно: ортогональность = отсутствие линейной корреляции, но НЕ гарантирует статистическую независимость — нелинейные зависимости могут существовать при нулевой корреляции.
- **Explained variance ratio** — доля разброса данных, объяснённая каждой компонентой. Кумулятивное 90–95% — практический порог для выбора n_components; ниже = потеря информации, выше = сохраняем шум.
- **fit только на train** — pca.fit(X_train) → параметры компонент вычислены; pca.transform(X_test) применяет те же параметры. Никогда pca.fit(X_test) — test заразит компоненты.

# 59. t-SNE и UMAP

## Зачем это нужно

PCA линеен и не всегда хорошо разделяет сложные структуры данных. t-SNE и UMAP — нелинейные методы, созданные специально для визуализации высокоразмерных данных. Они помогают увидеть кластеры, паттерны и аномалии, которые PCA скрывает.

## Простая интуиция

Представьте карту метро. Реальные расстояния между станциями не важны — важно, какие станции находятся рядом по линиям. Методы нелинейной визуализации делают то же самое с данными: сохраняют «кто рядом с кем» в исходном пространстве, пренебрегая глобальными расстояниями.

## Что это такое

- **t-SNE** (t-distributed Stochastic Neighbor Embedding) — минимизирует расстояния между похожими точками в 2D
- **UMAP** (Uniform Manifold Approximation and Projection) — более быстрая и масштабируемая альтернатива t-SNE
- **perplexity** — параметр t-SNE, контролирующий «количество соседей» (обычно 5-50)
- **n_neighbors** — параметр UMAP, аналогичный perplexity
- Оба метода **недетерминированы** и не создают переиспользуемой трансформации для новых данных

## Как это работает

**t-SNE** работает в два шага:

1. Для каждой пары точек в исходном высокоразмерном пространстве вычисляется вероятность «соседства» — похожие точки получают высокую вероятность, далёкие — близкую к нулю
2. В 2D строится расположение точек, которое максимально сохраняет эти вероятности соседства

Глобальные расстояния между кластерами при этом не сохраняются — два кластера могут выглядеть рядом на карте, но быть далеко в исходном пространстве. Параметр perplexity управляет «шириной» окрестности при расчёте соседства.

**UMAP** использует схожую логику, но строит граф соседства более эффективно — отсюда скорость. Лучше сохраняет глобальную структуру данных и масштабируется на большие выборки.

Оба метода недетерминированы: разные random_state дают разные картинки. Добавление одной новой точки меняет всю проекцию — поэтому их нельзя использовать в production pipeline.

## Простой пример

Датасет из 5 000 изображений рукописных цифр (0–9), каждое — 784 пикселя. PCA до 2 компонент — цифры перемешаны, визуально не разделить. t-SNE (perplexity=30) за 3 минуты формирует 10 чётких кластеров на плоскости — каждая цифра своя группа. До запуска любого классификатора это сразу показывает: данные разделимы, задача реалистична. UMAP даёт похожий результат за 40 секунд вместо 3 минут.

## Практика

1. Исследовательница опубликовала статью, где t-SNE-карта из 3 прогонов стабильно показывала 5 чётких кластеров. Рецензент написал: «Визуализаций недостаточно для вывода о существовании 5 классов». Объясни, что именно делает t-SNE-результаты ненадёжным доказательством — и как правильно использовать t-SNE в исследовании.
2. t-SNE-карта из 50 000 товаров показывает 6 кластеров. Коллега говорит: «Кластер А в правом углу и кластер Б в левом — они похожи по размеру, значит товары в них схожи». Что именно неправильно в его интерпретации — и что на t-SNE-карте можно, а что категорически нельзя сравнивать?
3. Вы визуализировали датасет с помощью t-SNE и видите 5 чётких кластеров. Можете ли вы утверждать, что в данных точно 5 классов? Почему да или нет?
4. Из урока «PCA» мы знаем, что pca.fit(X_train) создаёт устойчивую трансформацию для новых объектов. Почему для t-SNE это невозможно и что произойдёт, если попытаться добавить один новый объект в уже готовую t-SNE-проекцию?
5. Как визуализация t-SNE может помочь понять, подходит ли K-Means для конкретного датасета, ещё до запуска алгоритма кластеризации?

## Краткий итог

- t-SNE и UMAP раскрывают скрытые кластеры, которые линейный PCA не покажет: используйте для понимания данных перед моделированием
- Используйте для EDA, не для предобработки: применить их к новым данным в production нельзя
- UMAP быстрее t-SNE и лучше масштабируется на большие датасеты
- Всегда фиксируйте random_state для воспроизводимости, иначе каждый запуск даёт разную картинку

## Ключевые термины урока

- **t-SNE** — оптимизирует близость соседей в 2D; глобальная структура (расстояния между кластерами) не сохраняется. Два кластера рядом на t-SNE могут быть далеко в исходном пространстве — нельзя интерпретировать расстояния между кластерами.
- **UMAP** — лучше сохраняет глобальную структуру, быстрее (O(n) vs O(n²) у t-SNE), есть .transform() — но всё равно не для Pipeline: нелинейный, нестабильный при добавлении новых точек.
- **perplexity** — «эффективное число соседей» для t-SNE; слишком малая → точки разлетаются; слишком большая → всё сливается в один кластер. Обычно 5–50; подбирают визуально.
- **Запрет на preprocessing** — t-SNE и UMAP нельзя использовать как шаг Pipeline: они меняются при добавлении одной точки, нет стабильного transform для production. Только EDA/визуализация.

# 60. Поиск аномалий

## Зачем это нужно

Аномалии встречаются везде: мошеннические транзакции, сбои оборудования, ошибки в данных, кибератаки. Часто у нас нет размеченных примеров аномалий — только нормальные данные. Поиск аномалий без разметки — задача unsupervised learning с огромным практическим значением.

## Простая интуиция

Представьте охранника в толпе. Большинство людей ходят похожими маршрутами. Человек, который бегает зигзагами, стоит подозрительно долго в одном месте или появляется в неожиданное время — аномалия. Охранник выучил «нормальное» поведение и замечает отклонения.

## Что это такое

- **Аномалия (выброс, outlier)** — объект, значительно отличающийся от остальных
- **Типы аномалий**:
  - *Точечные* — отдельная точка далеко от основного облака
  - *Контекстуальные* — нормальное значение в ненормальном контексте (жара зимой)
  - *Коллективные* — группа точек аномальна вместе
- **Статистические методы** — Z-score, IQR: простые пороговые правила, работают по одному признаку
- **ML методы** — алгоритмы, способные учесть несколько признаков одновременно и найти аномалии, которые статистические методы пропускают
- **Задача**: обычно есть только нормальные данные, аномалии — редкие или отсутствуют в обучении

## Как это работает

**Статистические методы** работают по одному признаку за раз:

- *Z-score*: вычисляется, насколько далеко точка стоит от среднего в единицах стандартного отклонения. Порог |z| > 3 классически считается аномальным. Работает только при нормальном распределении.
- *IQR*: вычисляется межквартильный размах (Q3 − Q1); точки ниже Q1 − 1.5·IQR или выше Q3 + 1.5·IQR — выбросы. Устойчив к распределению, но тоже одномерный.

**ML-методы** обрабатывают все признаки одновременно и строят модель «нормального» поведения. Объект, который плохо вписывается в эту модель, получает высокий аномальный скор. В отличие от Z-score, могут найти аномалию, которая нормальна по каждому признаку отдельно, но аномальна по их сочетанию.

## Простой пример

Банк анализирует 500 000 транзакций по 8 признакам: сумма, время суток, город, тип терминала, частота использования карты и др. Z-score по каждому признаку отдельно пропускает транзакцию на 1 500 рублей в 3:00 ночи в новом городе — каждый признак по отдельности выглядит нормально. ML-метод видит всю картину целиком: сочетание «ночь + новый город + нетипичный магазин» — аномалия. Выявлено 4 200 подозрительных транзакций (0.84%), направлено на ручную проверку.

## Практика

1. Банк обнаружил 200 транзакций на 100 рублей в 3:00 ночи с одного IP. По Z-score каждый признак выглядит нормально. Какой тип аномалии это описывает и почему Z-score её не поймал?
2. У вас 2 миллиона транзакций. Аномальных примеров в разметке нет, но вы подозреваете ~0.5% мошенничества. Почему supervised классификатор здесь не поможет и какой метод взять вместо него?
3. У вас есть нормальные данные о работе сервера за полгода и 10 признаков: загрузка CPU, память, сетевой трафик и др. Отдельно по каждому признаку все значения в пределах нормы, но в один день система начала вести себя странно. Какой тип аномалии это описывает и почему статистические методы её пропустят?
4. В уроке «Выбросы в данных» мы применяли Z-score и IQR для удаления аномальных значений перед обучением. Чем эта задача принципиально отличается от задачи обнаружения аномалий в production — и почему инструменты нужны другие?
5. Из урока «Обучение без учителя» мы знаем, что unsupervised алгоритмы работают без меток. У тебя 500 000 транзакций: 499 000 нормальных, ~500 мошеннических (не размечены). Z-score по каждому из 12 признаков не нашёл ни одной аномалии. После деплоя ML-детектора нашлось 490 из ~500. Назови тип аномалии, который «видит» ML-детектор, и объясни, почему Z-score структурно неспособен его обнаружить — даже при идеальном пороге.

## Краткий итог

- Аномалии — объекты, значительно отличающиеся от остальных данных; чаще всего в обучающей выборке их нет
- Статистические методы (Z-score, IQR) просты, но работают только по одному признаку — пропускают многомерные аномалии
- ML методы работают с несколькими признаками одновременно и находят аномалии, невидимые одномерным методам
- Ключевой параметр любого ML-детектора аномалий: contamination — ожидаемая доля аномалий в данных

## Ключевые термины урока

- **Аномалия** — объект без метки «аномалия» при обучении; модель учится на «нормальных» данных и отмечает то, что на них не похоже. В отличие от supervised классификации, нет y=1 для аномалий.
- **Z-score** — работает только если признак нормально распределён и только по одному признаку. Порог |z| > 3 ловит ~0.3% нормальных точек как ложные аномалии. При тяжёлых хвостах — ненадёжен.
- **IQR** — устойчив к распределению (не предполагает нормальность), но тоже одномерный. Подходит для feature engineering (удаление выбросов); для detection в production — слаб.
- **ML методы обнаружения аномалий** — в отличие от Z-score и IQR, работают с несколькими признаками сразу и находят аномалии, которые нормальны по каждому признаку по отдельности, но аномальны в их сочетании. Подробнее — в следующем уроке.
- **contamination** — ожидаемая доля аномалий в данных; задаётся вручную. Завысишь — много ложных тревог; занизишь — пропустишь реальные аномалии.

# 61. Isolation Forest

## Зачем это нужно

У вас миллион транзакций и ни одной метки «мошенничество». Нужно найти подозрительные — без учителя. Статистические методы пропускают аномалии, которые нормальны по каждому признаку отдельно, но аномальны в сочетании. Isolation Forest решает это: он не учится предсказывать класс, а ищет объекты, которые «легко отрезать» от остальных случайными разрезами. Именно это делает его одним из стандартных инструментов обнаружения аномалий.

## Простая интуиция

Представьте игру: вы произвольно разрезаете прямоугольник вертикальными и горизонтальными линиями. Чтобы изолировать одиночную точку-аномалию вдали от основного облака, нужно мало разрезов. Чтобы изолировать точку внутри плотного облака — много разрезов. Аномалии «изолируются» быстрее — в этом суть алгоритма.

## Что это такое

- **Isolation Forest** — ансамбль случайных деревьев, каждое из которых случайно делит данные
- **Путь изоляции** — количество разрезов, нужных чтобы «поймать» объект в одиночестве
- Аномалии имеют **короткий путь изоляции**: их легко отделить от остальных
- **predict()** — бинарная метка: `-1` = аномалия, `+1` = нормальный объект
- **Anomaly score** — непрерывная оценка через `score_samples()`: значения ближе к 0.5 = норма, более отрицательные = аномалия. В коде используется `-score_samples()`, чтобы перевернуть знак: выше = аномальнее
- **contamination** — гиперпараметр, задающий ожидаемую долю аномалий

## Как это работает

Isolation Forest строит ансамбль случайных деревьев изоляции:

1. Из данных случайно выбирается подвыборка (обычно 256 объектов)
2. Дерево строится случайными разрезами: выбирается произвольный признак и случайное значение разреза в его диапазоне
3. Дерево делит точки до тех пор, пока каждая точка не окажется в одиночестве
4. Для каждой точки фиксируется глубина, на которой она была изолирована — «путь изоляции»
5. Процесс повторяется для n_estimators деревьев; средний путь изоляции по всем деревьям — аномальный скор

Аномалии изолируются быстро (короткий путь), нормальные точки — медленно (длинный путь). Порог между нормой и аномалией определяется параметром contamination.

Помимо бинарного результата (−1 / +1), алгоритм выдаёт непрерывный скор: чем выше скор, тем аномальнее объект — это позволяет ранжировать аномалии по степени подозрительности.

## Простой пример

Производственная линия фиксирует 15 датчиков каждую секунду: температура, давление, вибрация и др. За неделю собрано 600 000 записей нормальной работы оборудования. Isolation Forest обучается на этих данных (без меток аномалий). При появлении нетипичной комбинации показателей — аномальный score резко растёт. За следующую неделю алгоритм выдал 340 предупреждений; 28 из них совпали с реальными поломками, произошедшими через 10–120 минут после сигнала.

## Практика

1. Isolation Forest с contamination=0.05 помечает 500 объектов из 10 000. Ты снизил до 0.01 — помечается 100. Коллега предлагает автоматически выбирать contamination по критерию «наименьшее число тревог». Объясни, почему этот критерий неверен, — и как правильно валидировать выбор contamination, если размеченных аномалий нет.
2. Вы хотите не просто детектировать аномалии, но и ранжировать их по «тяжести». Как использовать Isolation Forest для ранжирования, а не только для бинарной классификации? Какой метод и что возвращает?
3. Вы анализируете логи сервера: 1 миллион строк, подозреваете менее 1% атак. Как настроить Isolation Forest и как оценить его работу в отсутствие размеченных данных?
4. Random Forest и Isolation Forest оба строят ансамбль случайных деревьев. В чём принципиальная разница: как они строят деревья, что за «цель» у каждого дерева и как итоговый вывод получается из ансамбля?
5. В уроке «Поиск аномалий» мы говорили, что Z-score и IQR пропускают аномалии, которые нормальны по каждому признаку отдельно. Почему Isolation Forest обнаруживает такие аномалии — что в его механике позволяет учитывать сочетание признаков, а не каждый по отдельности?

## Краткий итог

- Isolation Forest не требует разметки аномалий: он ищет объекты, которые легко «отрезать» от остальных
- Правильно оценить contamination важно: завысишь — много ложных тревог, занизишь — пропустишь реальные аномалии
- Хорошо масштабируется на большие данные и высокую размерность
- Результат (-1/1) или аномальный score можно использовать как признак в downstream задачах

## Ключевые термины урока

- **Isolation Forest** — аномалию легче изолировать: нужно меньше случайных разрезов. Ключевая идея: random forest без таргета, где «лёгкость изоляции» = аномальность. Не требует меток.
- **Путь изоляции** — среднее число разрезов для изоляции точки по n_estimators деревьям. Нормальные точки требуют длинного пути (log n), аномалии — короткого (2–5 разрезов).
- **predict() vs score_samples()** — predict() возвращает бинарный результат: -1 (аномалия) или 1 (норма) через порог contamination. score_samples() — непрерывная оценка: более отрицательное = более аномальное; полезен для ранжирования аномалий по тяжести.
- **contamination** — ожидаемая доля аномалий; задаётся вручную (0.01–0.1 в большинстве задач). Завысишь → много ложных тревог; занизишь → пропустишь реальные аномалии.

# 62. Коллаборативная фильтрация

## Зачем это нужно

Netflix рекомендует тебе фильм, которого ты никогда не искал. Spotify ставит трек, который тебе понравится, хотя ты его не знаешь. Основа большинства таких систем — коллаборативная фильтрация: алгоритм не смотрит на содержание фильма или трека, он смотрит на поведение людей с похожими вкусами.

## Простая интуиция

Ты приходишь к другу с похожим вкусом в кино и спрашиваешь: «что посмотреть?» Он говорит: «только что видел вот это — тебе точно понравится». Он не описывает фильм — он опирается на то, что вы любите похожее. Именно так работает коллаборативная фильтрация: вместо одного друга — тысячи пользователей с похожим поведением.

## Что это такое

Коллаборативная фильтрация — подход, при котором система ищет пользователей с похожим поведением и рекомендует то, что им понравилось.

Два варианта:
- **User-based** — находим пользователей, похожих на целевого, и рекомендуем то, что им понравилось
- **Item-based** — находим объекты, похожие на те, что уже понравились пользователю, и рекомендуем их

## Как это работает

В основе — матрица «пользователь × объект». Строки — пользователи, столбцы — фильмы (товары, треки), ячейки — оценки. Знак `?` — то, что пользователь ещё не видел. Задача системы — предсказать, какую оценку поставил бы пользователь, и рекомендовать объекты с высокими предсказаниями.

| | Фильм A | Фильм B | Фильм C | Фильм D |
|---|---|---|---|---|
| Андрей | 5 | 4 | **?** | 1 |
| Мария  | 5 | 3 | 4 | **?** |
| Иван   | **?** | 4 | 5 | 2 |

Андрей и Мария оба высоко оценили фильм A → они похожи. Мария поставила фильму C оценку 4 → рекомендуем фильм C Андрею. Мария и Иван оценили фильмы B и C схоже → они похожи → фильм D Иван оценил на 2 → Марии его не рекомендуем.

Важно: алгоритм не знает ничего о содержании фильмов. Он видит только числа в матрице.

## Простой пример

Онлайн-кинотеатр с 80 000 пользователями и 5 000 фильмами. Пользователь Алексей поставил высокие оценки «Джон Уик», «Мстители» и «Люди в чёрном». Система находит 200 пользователей с похожим паттерном оценок. Из фильмов, которые эти 200 человек оценили высоко, но Алексей ещё не смотрел, топ-5 попадает в рекомендации. «Матрица» оказывается на первом месте — 178 из 200 похожих пользователей дали ей 4 или 5 звёзд.

## Практика

1. Интернет-магазин с 1 млн пользователей и 500 000 товаров выбирает между user-based и item-based CF. Что из них масштабируется лучше и почему?
2. Посмотри на таблицу выше. Кому из пользователей ты бы рекомендовал фильм A и почему?
3. Матрица «пользователь × объект» в реальном кинотеатре заполнена менее чем на 1%. Почему это проблема для коллаборативной фильтрации и как она всё равно находит «похожих» пользователей?
4. В уроке «Overfitting и Underfitting» мы видели, что модель, обученная на малом наборе данных, плохо обобщается. Как этот принцип проявляется в коллаборативной фильтрации при малом числе пользователей?
5. В уроке «Baseline-модель» рассматривалось простейшее предсказание — среднее по всем данным. Чем коллаборативная фильтрация принципиально лучше такого baseline для задачи рекомендаций?

## Краткий итог

- Коллаборативная фильтрация ищет похожих пользователей (или объекты) и рекомендует на основе их поведения
- В основе — матрица «пользователь × объект» с оценками или взаимодействиями
- Алгоритм предсказывает значения `?` — оценки для объектов, которые пользователь ещё не видел
- Не требует знания характеристик объектов — только данных о поведении
- Чем больше данных, тем точнее; плохо работает для новых пользователей и новых объектов

## Ключевые термины урока

- **Коллаборативная фильтрация** — метод рекомендаций на основе поведения похожих пользователей или объектов.
- **User-based CF** — поиск пользователей, похожих на целевого, и рекомендация того, что им понравилось.
- **Item-based CF** — поиск объектов, похожих на уже понравившиеся, и их рекомендация. Масштабируется лучше user-based: объектов обычно меньше, чем пользователей, и их профили стабильнее.
- **Матрица пользователь × объект** — основа CF: большинство ячеек пусты (sparse matrix). Типичная заполненность на реальных платформах — менее 1%, остальное нужно предсказать.

# 63. Контентная фильтрация

## Зачем это нужно

Что если пользователь новый и его история пустая? Что если товар только что добавили и никто его ещё не оценивал? Коллаборативная фильтрация в таких случаях беспомощна. Контентная фильтрация решает это иначе — она смотрит не на поведение людей, а на характеристики самих объектов.

## Простая интуиция

Ты только что посмотрел «Интерстеллар» и он тебе понравился. Библиотекарь не знает других зрителей с твоим вкусом, зато знает про фильм: научная фантастика, сложный сюжет, Кристофер Нолан. Он ищет другие фильмы с похожими характеристиками — «Начало», «Довод» — и рекомендует их. Это контентная фильтрация.

## Что это такое

Контентная фильтрация — подход, при котором система рекомендует объекты, похожие по своим характеристикам на те, что уже понравились пользователю. Вместо «что делали похожие пользователи» — «что похоже на то, что тебе нравится».

## Как это работает

Каждый объект описывается набором признаков. Система ищет объекты с похожим набором признаков, измеряя похожесть через **косинусное сходство** — меру близости двух векторов: чем меньше угол между векторами признаков двух объектов, тем они похожее (значение от −1 до 1, где 1 = идентичны).

| Фильм | sci-fi | драма | боевик | длительность (мин) |
|---|:---:|:---:|:---:|---:|
| Интерстеллар | 1 | 1 | 0 | 169 |
| Начало | 1 | 0 | 1 | 148 |
| Довод | 1 | 0 | 1 | 150 |
| Форрест Гамп | 0 | 1 | 0 | 142 |

«Начало» и «Довод» похожи на «Интерстеллар» по набору признаков → рекомендуем их. «Форрест Гамп» — другие жанры, несмотря на высокий рейтинг → не рекомендуем.

Признаки могут быть любыми: жанр, автор, теги, описание (текст), длительность, год выпуска.

## Простой пример

Книжный интернет-магазин добавил 300 новых книг вчера. Ни одной оценки от пользователей ещё нет — коллаборативная фильтрация бессильна. Каждая книга описана 12 признаками: жанр, автор, издательство, год, страниц, теги (детектив, Россия XIX в., психология и др.). Пользователь читал «Преступление и наказание» — система находит 8 новинок с похожим набором тегов. Три из них попадают в рекомендации с первого дня продаж, не дожидаясь первых отзывов.

## Практика

1. Пользователь только что зарегистрировался и ещё ничего не смотрел. Коллаборативная фильтрация не может ему помочь. Как контентная фильтрация справляется с этой ситуацией?
2. Посмотри на таблицу выше. Почему «Форрест Гамп» не попадает в рекомендации для фаната «Интерстеллара»?
3. Тебе нужно построить рекомендации для интернет-магазина книг. Какие признаки книги ты бы использовал?
4. В уроке «Коллаборативная фильтрация» мы видели, что система не знает содержания объектов. Назови одну задачу, где это ограничение делает коллаборативную фильтрацию непригодной, а контентная справляется без труда.
5. В уроке «Коллаборативная фильтрация» разреженность матрицы — ключевая проблема. Как контентная фильтрация обходит эту проблему и какое новое ограничение при этом возникает?

## Краткий итог

- Контентная фильтрация рекомендует объекты, похожие по характеристикам на то, что уже понравилось
- Каждый объект описывается набором признаков; система ищет объекты с похожими признаками
- Не требует данных о других пользователях — работает даже для нового пользователя
- Хорошо подходит для новых объектов, у которых ещё нет истории оценок
- Ограничение: создаёт «пузырь» — рекомендует только похожее, не открывает новое

## Ключевые термины урока

- **Контентная фильтрация** — не требует других пользователей; решает cold start для новых объектов: фильм вышел вчера — уже рекомендуется по жанру/тегам. Именно CF-проблему cold start для объектов она закрывает.
- **Профиль пользователя** — усреднённый вектор объектов, с которыми взаимодействовал. Риск: «пузырь фильтрации» — пользователь, смотревший только боевики, никогда не получит комедию.
- **Косинусное сходство** — cos_sim = dot(a,b)/(||a||·||b||); от -1 до 1. Лучше евклидова расстояния для контентных векторов: популярный фильм с множеством тегов не будет всегда «далеко» только потому, что вектор длиннее.
- **Признаки объекта** — чем детальнее (жанр + актёры + теги + числовые признаки из текстового описания), тем точнее сходство; слишком общие признаки (только жанр) → рекомендации очевидны, нет открытий для пользователя.

# 64. Explicit vs Implicit Feedback

## Зачем это нужно

Прежде чем строить рекомендательную систему, нужно ответить на вопрос: а что вообще значит «пользователю понравилось»? От ответа зависит, какие данные ты собираешь и как интерпретируешь сигналы.

## Простая интуиция

Когда ты ставишь фильму 5 звёзд — ты явно говоришь: «понравилось». Это прямой сигнал. Но когда ты смотришь сериал три часа подряд без остановки — ты тоже говоришь «нравится», только не словами, а поведением. Первое — explicit, второе — implicit.

## Что это такое

**Explicit feedback (явная обратная связь)** — пользователь напрямую выражает своё отношение:
- Оценка от 1 до 5
- Лайк / дизлайк
- Письменный отзыв

**Implicit feedback (неявная обратная связь)** — поведение пользователя, из которого делается вывод:
- Просмотр товара
- Клик
- Покупка
- Время на странице
- Досмотрел ли видео до конца

## Как это работает

В реальных системах почти всегда доминирует implicit — пользователи редко ставят оценки, зато постоянно кликают, смотрят и покупают.

| Сигнал | Тип | Что означает |
|---|---|---|
| Оценка 5 звёзд | Explicit | Точно понравилось |
| Оценка 1 звезда | Explicit | Точно не понравилось |
| Покупка | Implicit | Скорее всего понравилось |
| Просмотрел 95% видео | Implicit | Скорее всего понравилось |
| Открыл и закрыл через 3 сек | Implicit | Скорее всего не понравилось |
| Не кликнул на товар | Implicit | Неизвестно — не видел или не заинтересовало? |

Главная сложность implicit: **отсутствие взаимодействия ≠ «не понравилось»**. Пользователь просто мог не увидеть объект.

## Простой пример

Музыкальный стриминг анализирует поведение пользователя за месяц: 12 явных лайков (explicit) и 3 400 прослушиваний (implicit). Лайки точны, но их мало — не хватит для обучения. Прослушивания зашумлены: трек запустился случайно и выключен через 5 секунд — это не «понравилось». Система комбинирует сигналы: прослушал 80%+ трека — сильный сигнал интереса, добавил в плейлист — ещё сильнее, поставил на repeat — максимальный сигнал. Из 3 400 прослушиваний только 820 считаются «реальным интересом».

## Практика

1. Стриминговый сервис опирается только на лайки (explicit). Данных мало, и обучить модель сложно. Что конкретно теряет система и как implicit feedback решает эту проблему?
2. Spotify не просит оценивать каждый трек. Какие implicit-сигналы он, скорее всего, использует?
3. Почему «пользователь не кликнул на товар» — слабый сигнал? Придумай ситуацию, когда это не означает «не интересно».
4. В уроке «Коллаборативная фильтрация» матрица «пользователь × объект» заполнена менее чем на 1%. Как тип feedback (explicit vs implicit) влияет на плотность этой матрицы и почему implicit помогает снизить разреженность?
5. В уроке «Контентная фильтрация» система рекомендует на основе характеристик объектов, не опираясь на оценки пользователей. Есть ли ситуация, когда explicit feedback оказывается полезнее для контентной системы, чем implicit? Обоснуй.

## Краткий итог

- Explicit feedback точнее, но редок: просить оценку после каждого взаимодействия — значит терять большинство пользователей
- Implicit feedback масштабируется сам, но требует интерпретации: клик не равен «понравилось», длинное чтение — не всегда одобрение
- В реальных системах почти всегда преобладает implicit — его на порядки больше
- Главная сложность implicit: отсутствие взаимодействия не означает «не понравилось»
- Хорошие системы комбинируют несколько сигналов, а не опираются на один

## Ключевые термины урока

- **Explicit feedback** — высокое качество сигнала, критически малый объём: < 5% пользователей оценивают товары на Amazon. Системы на чистом explicit быстро сталкиваются с разреженностью матрицы.
- **Implicit feedback** — объём на порядки больше, но интерпретация неочевидна: клик ≠ «понравилось», досмотр до конца ≈ «интересно», возврат товара = сильный отрицательный сигнал. Разные действия требуют разного веса.
- **Отсутствие взаимодействия** — ключевое отличие от supervised learning: в CF y=0 значит «не видел» или «не смог найти», а не «не понравилось». Нельзя обучать модель, считая все нули отрицательными примерами.
- **Confidence weighting** — подход для implicit: вес взаимодействия c = 1 + α·r, где r = число просмотров. Множественные взаимодействия = более сильный сигнал интереса, а не просто факт просмотра.

# 65. Гибридные рекомендательные системы

## Зачем это нужно

Коллаборативная фильтрация плохо работает для новых пользователей и новых объектов. Контентная создаёт «пузырь» и не учитывает скрытые предпочтения. В реальных продуктах — Netflix, Spotify, YouTube — ни один подход не используется в одиночку. Их комбинируют.

## Простая интуиция

Netflix знает: ты смотришь много триллеров (поведение → collaborative), тебе нравятся фильмы с Нолана (характеристики → content-based), сейчас вечер пятницы и ты на телевизоре, а не на телефоне (контекст). Итоговый список рекомендаций — результат всех этих сигналов вместе.

## Что это такое

Гибридная рекомендательная система — комбинация нескольких подходов для получения более точных и разнообразных рекомендаций. Чаще всего объединяют коллаборативную и контентную фильтрацию, иногда добавляют контекстные сигналы.

## Как это работает

Три основных способа комбинировать подходы:

**1. Взвешенный** — каждый подход даёт оценку, итог — взвешенная сумма:

`финальная оценка = 0.6 × CF_оценка + 0.4 × CB_оценка`

**2. Переключающийся** — выбираем подход в зависимости от ситуации:

| Ситуация | Подход |
|---|---|
| Новый пользователь (нет истории) | Content-based |
| Новый объект (нет оценок) | Content-based |
| Есть история у пользователя и объекта | Collaborative filtering |

**3. Каскадный** — один подход фильтрует, второй ранжирует:
- Сначала CB отбирает объекты, похожие по характеристикам
- Потом CF расставляет их по вероятности понравиться конкретному пользователю

**Пример: Spotify**

| Ситуация | Что использует |
|---|---|
| Новый трек без истории прослушиваний | Анализ звука (content-based) |
| Популярный трек с историей | Поведение похожих слушателей (collaborative) |
| Discover Weekly | Смешивает CF + CB + контекст |

## Простой пример

Маркетплейс с 2 миллионами пользователей и 500 000 товаров использует переключающийся гибрид. Новый пользователь при регистрации — показывают топ продаж в выбранных категориях (популярность) и похожие товары на те, что он смотрел (content-based). После 5 покупок переключаются на коллаборативную фильтрацию: находят 300 пользователей с похожей историей покупок. Итоговый список рекомендаций: 60% из CF, 30% из content-based, 10% «новинки в твоих категориях».

## Практика

1. Маркетплейс использует только коллаборативную фильтрацию. Конверсия падает после добавления 10 000 новых товаров. Почему и какой компонент гибрида исправит это?
2. Какой подход лучше использовать для нового пользователя без истории и почему?
3. Spotify добавил новый трек, который никто ещё не слушал. Как гибридная система может его рекомендовать?
4. В уроке «Коллаборативная фильтрация» мы видели, что алгоритм не знает содержания объектов. В уроке «Контентная фильтрация» — что система не использует поведение других пользователей. Какое конкретное ограничение каждого из этих подходов устраняет гибридная система?
5. В уроке «Explicit vs Implicit Feedback» мы узнали, что тип сигнала влияет на интерпретацию данных. Как тип feedback меняет выбор компонентов в гибридной системе: нужно ли использовать разные веса для explicit и implicit данных?

## Краткий итог

- Гибридные системы комбинируют несколько подходов — чаще всего CF + CB
- Три способа комбинировать: взвешенный, переключающийся, каскадный
- Реальные системы (Netflix, Spotify) используют десятки сигналов одновременно
- Переключающийся гибрид — хорошее решение проблемы холодного старта
- Выбор архитектуры зависит от данных, задачи и бизнес-требований

## Ключевые термины урока

- **Гибридная система** — решает ограничения одиночных подходов: CF хорош при богатой истории, контентная — при новых объектах/пользователях. Гибрид снимает ограничения обоих, но усложняет систему.
- **Взвешенный гибрид** — score = α·CF + (1-α)·CB. Простой, но статичный: α не адаптируется к тому, сколько данных есть у пользователя (новый vs опытный). Пользователь с 2 покупками и с 200 — получают одну формулу.
- **Каскадный гибрид (two-stage)** — этап 1: recall (быстрый алгоритм генерирует тысячи кандидатов), этап 2: ranking (точная ML-модель ранжирует кандидатов). Так работают YouTube, Netflix — нельзя ранжировать миллионы напрямую.
- **Переключающийся гибрид** — явный if/else: холодный старт → контентная, > N взаимодействий → CF. Прозрачен и легко отлаживается, граница переключения требует ручной настройки.

# 66. Холодный старт

## Зачем это нужно

Любая рекомендательная система сталкивается с одной проблемой с первого дня: новый пользователь, новый объект, или вообще новая система — и рекомендовать нечего, потому что данных нет. Это называется проблема холодного старта, и с ней обязательно нужно уметь работать.

## Простая интуиция

Ты пришёл в новый книжный магазин. Продавец тебя не знает. Он не может порекомендовать «то, что нравится таким же как ты» — понятия не имеет, какой ты. Что он делает? Спрашивает: «что вы обычно читаете?» или показывает бестселлеры. Это и есть решения холодного старта.

## Что это такое

Проблема холодного старта — невозможность сделать качественные рекомендации из-за отсутствия данных.

Три вида:
- **Новый пользователь** — только что зарегистрировался, нет истории взаимодействий
- **Новый объект** — только что добавили товар или фильм, никто его ещё не видел
- **Новая система** — продукт только запустился, данных нет ни у кого

## Как это работает

**Для нового пользователя:**
- Онбординг-вопросы при регистрации: «какие жанры любишь?», «выбери 5 артистов»
- Показывать популярное — всегда работает как базовое решение
- Использовать демографические данные (если есть): возраст, страна
- Content-based: рекомендовать популярное в категории, которую смотрит прямо сейчас

**Для нового объекта:**
- Content-based с первого дня: у товара уже есть категория, описание, бренд
- Специально показывать новинку широкой аудитории, чтобы быстро собрать данные
- Использовать похожие объекты с историей как замену

**Для новой системы:**
- Начать с простых правил: популярное, топ по категориям
- Content-based до накопления достаточной истории

## Простой пример

Образовательная платформа запустилась неделю назад: 3 000 зарегистрированных пользователей, 400 курсов, история просмотров почти пустая. При регистрации пользователь отвечает на 3 вопроса: «какая твоя профессия», «какой уровень», «что хочешь изучить». На основе этих ответов показываются 8 курсов из топ-20 в нужной категории. Через месяц у 60% пользователей достаточно истории для CF, и платформа переключается на персонализированные рекомендации.

## Практика

1. Музыкальный сервис запустил новую платформу: 1 000 пользователей и 50 000 треков. Какой из трёх видов холодного старта наиболее острый прямо сейчас и с чего начать?
2. Spotify только что добавил новый альбом. Как система может его рекомендовать, если его ещё никто не слушал?
3. Пользователь только что зарегистрировался на маркетплейсе. Что можно рекомендовать ему на главной странице в первый визит?
4. В уроке «Коллаборативная фильтрация» мы видели, что алгоритм ищет похожих пользователей по истории взаимодействий. Почему этот механизм полностью ломается при холодном старте нового пользователя и какой минимум данных нужно собрать, чтобы CF заработала?
5. В уроке «Контентная фильтрация» система рекомендует на основе характеристик объектов. Почему контентная фильтрация — это стандартное решение холодного старта для нового объекта, но не полная замена CF в долгосрочной перспективе?

## Краткий итог

- Холодный старт — не исключение, а ожидаемое состояние: его нужно планировать с первого дня разработки системы
- Три вида: новый пользователь, новый объект, новая система
- Для нового пользователя: онбординг-вопросы, популярное, content-based
- Для нового объекта: content-based сразу, принудительный показ, метаданные
- Гибридные системы переключаются на CF только после накопления достаточной истории

## Ключевые термины урока

- **Холодный старт** — три разных сценария с разными решениями: новый пользователь (нет истории), новый объект (нет оценок), новая система (нет данных ни у кого).
- **Новый пользователь** — нет истории → CF невозможен. Решение: онбординг-вопросы или демографический fallback до накопления минимум 5–10 взаимодействий.
- **Новый объект** — нет оценок → CF не включит его в рекомендации. Content-based позволяет рекомендовать новинку с первого дня по метаданным.
- **Онбординг** — сбор явных предпочтений при регистрации. Чем короче (3–5 вопросов) — тем выше конверсия при заполнении.

# 67. Как оценивать качество рекомендаций

## Зачем это нужно

Если модель классификации ошиблась — видно сразу: предсказанный класс ≠ реальному. С рекомендациями сложнее: ты показал 10 фильмов, пользователь посмотрел 3 — это хорошо или плохо? Нужны специальные метрики.

## Простая интуиция

Представь, что ты рекомендуешь другу 10 ресторанов. Он сходил в 4 из них. Ты угадал 4 из 10 — неплохо. Но что если 6 ресторанов, которые ты не назвал, ему понравились бы больше? Важно не только «сколько угадал», но и «не пропустил ли лучшее».

## Что это такое

Оценка рекомендательных систем идёт по двум направлениям:

**Offline-метрики** — считаются на исторических данных до запуска:
- **Precision@K** — из K рекомендованных объектов сколько реально понравились
- **Recall@K** — из всех объектов, что понравились, сколько попало в K рекомендаций

**Online-метрики** — измеряются в реальном продукте:
- **CTR** — доля рекомендаций, на которые кликнули
- **Конверсия** — доля рекомендаций, которые привели к покупке
- **Время взаимодействия** — сколько смотрел, слушал, читал

## Как это работает

**Precision@K** — точность среди K рекомендаций:

Рекомендовали 5 фильмов, пользователь посмотрел 2 → `Precision@5 = 2/5 = 40%`

**Recall@K** — полнота среди всего, что могло понравиться:

Пользователь готов был посмотреть 8 фильмов, система показала 2 из них в топ-5 → `Recall@5 = 2/8 = 25%`

| Метрика | Вопрос | Когда важна |
|---|---|---|
| Precision@K | Не показываем ли лишнего? | Когда каждая лишняя рекомендация раздражает |
| Recall@K | Не пропускаем ли важное? | Когда нужно охватить всё подходящее |
| CTR | Кликают ли? | Всегда — показывает реальный интерес |
| Конверсия | Покупают ли? | Для e-commerce |

## Простой пример

Видеосервис рекомендует 10 фильмов. Для пользователя Марины известно (из истории), что из 30 фильмов в базе она бы посмотрела 8. Система показала 10, из которых 4 она реально хочет посмотреть. Precision@10 = 4/10 = 40%, Recall@10 = 4/8 = 50%. Новый алгоритм показывает Precision@10 = 50%, Recall@10 = 62% на исторических данных. Улучшение по offline-метрикам подтверждается онлайн-экспериментом: CTR вырос с 22% до 31%.

## Практика

1. Система рекомендовала 10 фильмов, пользователь посмотрел 3. Всего фильмов, которые ему бы понравились — 12. Посчитай Precision@10 и Recall@10.
2. Сервис стриминга фильмов показывает 5 рекомендаций. Precision@5 = 80%, Recall@5 = 10%. Что это говорит о работе системы? Что произойдёт с Recall, если увеличить список до 50 рекомендаций?
3. Почему CTR — важная метрика, но нельзя опираться только на неё?
4. В уроке «Метрики классификации» Precision и Recall измеряли качество бинарного предсказания. Чем Precision@K и Recall@K в рекомендациях отличаются по смыслу от классических Precision и Recall — что именно добавляет параметр K?
5. В уроке «Коллаборативная фильтрация» система предсказывает оценки для объектов, которые пользователь не видел. Как Recall@K помогает обнаружить, что CF систематически «забывает» показывать определённую часть релевантных объектов?

## Краткий итог

- Precision@K важна, когда внимание пользователя ограничено: каждое из K мест должно попасть в цель
- Recall@K важна для каталогов: нельзя, чтобы половина релевантных объектов никогда не показывалась
- Online-метрики (CTR, конверсия) важнее offline — они отражают реальное поведение
- Финальная оценка системы — онлайн-эксперимент на реальных пользователях (подробнее — в уроке «A/B тестирование в ML»)
- Offline-метрики — для быстрой проверки на исторических данных, не для финального вывода

## Ключевые термины урока

- **Precision@K** — доля релевантных объектов среди первых K рекомендаций. Ограничение: не учитывает порядок — объект на 1-м месте равнозначен объекту на K-м.
- **Recall@K** — доля показанных релевантных объектов от всех, что могли понравиться. Растёт при увеличении K, поэтому сравнивать Recall@5 и Recall@20 некорректно.
- **Online-метрики** — CTR, конверсия, время взаимодействия; измеряются на реальных пользователях. Единственный источник правды о том, что система работает.
- **CTR (Click-Through Rate)** — доля кликов от числа показов. Легко оптимизируется кликбейтом, поэтому всегда смотрят вместе с конверсией и временем взаимодействия.

# 68. Как построить рекомендательную систему с нуля

## Зачем это нужно

Ты знаешь коллаборативную фильтрацию, контентную, implicit/explicit feedback, гибриды, холодный старт и метрики. Но когда приходит реальная задача — с чего начинать? Этот урок — пошаговая схема рассуждений, которую можно применять к любой задаче рекомендаций.

## Простая интуиция

Хороший врач не назначает лечение до осмотра. Хороший специалист по ML не выбирает алгоритм до понимания данных и задачи. Сначала вопросы — потом решение.

## Что это такое

Построение рекомендательной системы — это не выбор алгоритма, а последовательность решений: от понимания задачи и данных до запуска и оценки. Алгоритм — последнее, что выбираешь.

## Как это работает

**Шаг 1. Понять задачу**

Что нужно рекомендовать? Кому? С какой целью?
- Продать товар → оптимизируем конверсию
- Удержать пользователя → оптимизируем время в приложении
- Помочь найти нужное → оптимизируем релевантность

**Шаг 2. Разобраться с данными**

| Вопрос | Что это значит для системы |
|---|---|
| Есть история взаимодействий? | Можно использовать collaborative filtering |
| Feedback explicit или implicit? | Влияет на качество и интерпретацию сигналов |
| Много новых пользователей? | Нужно решение холодного старта |
| Объекты хорошо описаны (теги, категории)? | Можно использовать content-based |

**Шаг 3. Выбрать подход**

| Ситуация | Подход |
|---|---|
| Много истории + мало новых пользователей | Collaborative filtering |
| Мало истории + богатые метаданные объектов | Content-based |
| Много новых пользователей | Гибрид: CF для старых, CB для новых |
| Только запустились | Популярное + content-based |
| Нужен максимум качества | Гибрид с несколькими сигналами |

**Шаг 4. Решить проблему холодного старта**

Он есть всегда. Нужен план:
- Для новых пользователей: онбординг-вопросы, популярное, demographic fallback
- Для новых объектов: content-based сразу, принудительный показ для сбора данных

**Шаг 5. Определить метрики успеха**

Что считаем хорошим результатом? CTR? Конверсия? Время в приложении?
Определяем до запуска — не после.

**Шаг 6. Запустить, оценить, итерировать**

Начать с простого: популярное или content-based. Это всегда лучше, чем «ничего». Потом усложнять, измеряя каждое изменение через A/B тест.

## Простой пример

Стартап строит рекомендации для платформы онлайн-курсов: 15 000 студентов, 600 курсов. Шаг 1: цель — удержание (студент завершает курс). Шаг 2: есть история просмотров (implicit), описания курсов (категория, уровень, теги), 20% новых студентов ежемесячно. Шаг 3: гибрид — CF для студентов с историей 3+ курсов, content-based для новых. Шаг 4: холодный старт — онбординг-анкета 3 вопроса. Шаг 5: метрика — процент завершённых курсов. Шаг 6: запуск content-based за 2 недели, CF через месяц. Завершаемость выросла с 31% до 48%.

## Практика

1. Тебе пришла задача: построить рекомендации для новостного сайта. С каких вопросов ты начнёшь?
2. Стартап только запустил маркетплейс: 500 пользователей, 2 000 товаров, истории почти нет. Какой подход выбрать прямо сейчас?
3. Через 6 месяцев у того же маркетплейса 50 000 активных пользователей и богатая история покупок. Что изменится в подходе и почему?
4. В уроке «Как оценивать качество рекомендаций» мы разделили метрики на offline и online. Какой шаг из 6-шаговой схемы отвечает за выбор этих метрик и почему его нарушение делает бессмысленными все остальные шаги?
5. В уроке «Холодный старт» описаны три вида проблемы. Покажи, как шаги 3 и 4 из 6-шаговой схемы напрямую адресуют каждый из этих трёх видов — что конкретно решается на каждом шаге.

## Краткий итог

- Начинай с задачи и данных, не с алгоритма
- Определи: есть ли история, какой тип feedback, насколько серьёзна проблема холодного старта
- Выбор подхода зависит от ситуации — нет универсального ответа
- Всегда планируй решение холодного старта заранее
- Метрики определяй до запуска; финальная оценка — только через A/B тест
- Начинай просто, итерируй на основе данных

## Ключевые термины урока

- **Формализация** — «хочу рекомендации» → «предсказать вероятность клика для каждого объекта × пользователь за следующие 24 часа». Точная постановка определяет тип данных, метрику и архитектуру.
- **Данные определяют архитектуру** — тип обратной связи определяет метод: explicit feedback (оценки) → коллаборативная фильтрация; только implicit (просмотры, клики) → специализированный CF с взвешенным confidence; нет истории у пользователя → content-based. Алгоритм выбирается под данные, не наоборот.
- **Baseline-first** — самый простой baseline (popularity-based: топ-N популярных) даёт 60–70% от качества сложной системы; первая итерация должна работать за 1–2 дня, не за месяц.
- **Метрика до запуска** — CTR, конверсия или время взаимодействия определяются ДО разработки. Иначе непонятно, что считать улучшением и когда остановиться. A/B тест — единственный финальный арбитр.

# 69. Как выглядит ML-проект

## Зачем это нужно

Большинство учебников по ML учат алгоритмам, но не показывают, как выглядит настоящий ML-проект. В реальности обучение модели — это лишь малая часть работы. Понимание полного жизненного цикла проекта критично для любого специалиста.

## Простая интуиция

Думайте о ML-проекте как о строительстве дома. Архитектор (постановка задачи) важнее, чем выбор гвоздей (алгоритм). Фундамент (данные) определяет всё остальное. И дом нужно не просто построить, но заселить жильцов и обслуживать (деплоймент и мониторинг).

## Что это такое

Типичный ML-проект включает этапы:

1. **Постановка задачи** — перевод бизнес-вопроса в ML-задачу. Что предсказываем? Какая метрика успеха?
2. **Сбор и анализ данных** — откуда берём данные, EDA, качество данных
3. **Feature Engineering** — создание и отбор признаков
4. **Моделирование** — выбор алгоритма, обучение, валидация
5. **Оценка** — метрики, error analysis
6. **Деплоймент** — упаковка модели в API или сервис
7. **Мониторинг** — отслеживание качества в production

## Как это работает

Реальный ML-проект выполняется итеративно. Сначала формулируют задачу и собирают данные. Затем строят простейший baseline — например, модель, которая всегда предсказывает наиболее частый класс. Baseline служит точкой отсчёта: только превысив его, сложная модель считается полезной. Далее итерируют: улучшают признаки, пробуют более сложные алгоритмы, сравнивают результаты через кросс-валидацию. После достижения приемлемого качества модель деплоится и начинается мониторинг.

## Простой пример

Ритейл-компания хочет предсказывать спрос на товары. Постановка задачи: регрессия — предсказать объём продаж на следующие 7 дней по каждой позиции. Данные: 2 года истории продаж по 500 товарам. Feature engineering: день недели, месяц, праздники, тренд, скользящее среднее. Baseline (простая модель со средним значением): MAE 47 единиц. Случайный лес: MAE 18 единиц — в 2.6 раза лучше baseline. Деплоймент: API, обновление предсказаний каждое воскресенье. Мониторинг: еженедельное сравнение предсказанного и реального спроса.

## Практика

1. Менеджер предлагает сразу перейти к моделированию, потому что данные «уже есть в базе». Какие риски это несёт и какие этапы он хочет пропустить?
2. Почему в реальных проектах 80% времени уходит на данные, а не на моделирование?
3. Команда получила задачу: «Снизить отток клиентов». Опишите, как перевести её в ML-задачу: что такое y, X и метрика успеха?
4. В уроке «Train / Validation / Test» мы разбирали, зачем держать тестовую выборку нетронутой до финала. Как это правило проявляется в жизненном цикле ML-проекта: на каком именно этапе используется тест и почему только один раз?
5. Почему ML-пайплайн в production — это не только код обучения, а весь цикл от сбора данных до мониторинга, и что произойдёт, если пропустить этап мониторинга?

## Краткий итог

- Проект не закончен, пока модель не задеплоена и не мониторится: обучение — лишь середина пути
- 80% времени уходит на данные, 20% — на моделирование
- Всегда начинайте с baseline и простых решений
- Большинство ML-проектов умирают не из-за плохой точности, а из-за плохого деплоя и отсутствия мониторинга

## Ключевые термины урока

- **Постановка задачи** — первый шаг: определить, что именно мы предсказываем и зачем. Большинство провалов ML-проектов начинаются здесь — не с плохого алгоритма.
- **Деплоймент** — публикация обученной модели для использования в реальном продукте. Проект считается завершённым только после этого шага, не после обучения.
- **Мониторинг** — регулярная проверка качества модели после деплоя. Без мониторинга деградация обнаруживается только по жалобам пользователей.
- **ML-цикл** — итеративный процесс от задачи до мониторинга и обратно. Ключевое слово — «обратно»: мониторинг запускает новый цикл улучшения.
- **80/20 правило** — эмпирическое наблюдение: 80% времени уходит на данные, 20% — на модели. Следствие: улучшение данных чаще эффективнее улучшения алгоритма.

# 70. От идеи до модели

## Зачем это нужно

Между бизнес-идеей («хотим предсказывать отток клиентов») и работающей моделью — много шагов. Пропуск любого из них ведёт к плохому результату. Этот урок — практическая карта пути от постановки задачи до первого рабочего прототипа.

## Простая интуиция

Вы хотите приготовить новое блюдо. Сначала — понять, что это за блюдо (постановка задачи). Потом — купить ингредиенты и проверить их свежесть (данные). Затем — сначала приготовить простую версию по базовому рецепту (baseline), и только потом — улучшать.

## Что это такое

Путь от идеи до модели включает:

1. **Формализация**: какой тип задачи? (классификация/регрессия/кластеризация). Что такое «успех»?
2. **Данные**: какие есть данные? Есть ли разметка? Достаточно ли объём?
3. **Baseline**: самое простое решение. DummyClassifier, линейная регрессия, среднее
4. **Feature Engineering**: создание информативных признаков из сырых данных
5. **Итерации**: улучшаем baseline, смотрим на ошибки, добавляем признаки, пробуем другие алгоритмы
6. **Валидация**: честная оценка через hold-out или кросс-валидацию

## Как это работает

Каждый шаг выполняется последовательно, но процесс итеративный. Формализация фиксирует тип задачи и метрику успеха — без этого непонятно, когда останавливаться. Данные проверяют на полноту и качество разметки. Baseline строится первым — чаще всего это простейшая эвристика или модель, предсказывающая наиболее частый класс. Затем пробуются более сложные алгоритмы, и каждый шаг оценивается честно через кросс-валидацию на train-данных. Если сложная модель не превышает baseline значимо — проблема в данных или признаках, а не в алгоритме.

## Простой пример

HR-стартап хочет предсказывать, примет ли кандидат оффер. Данные: 3 000 исторических офферов (принял/отказал), 15 признаков. Формализация: бинарная классификация, метрика — F1-score. Baseline (DummyClassifier, всегда «примет»): accuracy = 0.68, F1 = 0.81 для класса «примет», F1 = 0 для «откажет» — бесполезная модель. Логистическая регрессия с 3 ключевыми признаками: F1 для «откажет» уже 0.42. Random Forest (50 признаков после feature engineering): F1 = 0.61. Итог: каждый шаг измерен, понятно куда двигаться.

## Практика

1. Команда сразу обучила Random Forest и получила accuracy 82%. Менеджер доволен. Почему у ML-инженера должен возникнуть вопрос, и что нужно сделать, чтобы понять, хорош ли этот результат?
2. Опишите итеративный подход к разработке модели: какой первый шаг, второй и когда нужно остановиться?
3. Ваш baseline (DummyClassifier) даёт 72% accuracy, сложная модель — 74%. Стоит ли продолжать улучшать алгоритм или искать проблему в данных и признаках?
4. В уроке «Overfitting и Underfitting» мы разбирали, как сложная модель может переобучиться на обучающей выборке. Как итеративный подход «baseline → простая модель → сложная» помогает обнаружить переобучение раньше, чем оно станет проблемой в production?
5. В уроке «Cross-validation» мы изучили, как честно оценивать модель через несколько фолдов. Почему оценивать прогресс на каждом шаге итерации нужно именно через кросс-валидацию, а не через один hold-out?

## Краткий итог

- Путь от идеи до модели: формализация → данные → baseline → итерации → валидация
- Всегда начинайте с простого решения и постепенно усложняйте
- Feature engineering часто важнее выбора алгоритма
- Оценивайте прогресс на каждом шаге через кросс-валидацию

## Ключевые термины урока

- **Формализация** — перевод бизнес-задачи в ML-постановку с чёткими входами и выходами. Включает выбор типа задачи (классификация/регрессия), метрики и критерия остановки.
- **Baseline** — точка отсчёта: без неё невозможно оценить, приносит ли сложная модель реальную пользу. DummyClassifier или среднее значение как baseline — норма, не признак слабости.
- **Feature engineering** — создание и отбор признаков из сырых данных. Добавление одного информативного признака часто даёт больший прирост, чем смена алгоритма.
- **Валидация** — защита от переобучения: оцениваем качество на данных, которые модель не видела при обучении. Hold-out или кросс-валидация зависит от размера выборки.
