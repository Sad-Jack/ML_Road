# 87. Как нейросеть учится на ошибках

## Зачем это нужно

Ты уже знаешь, что нейросеть — это слои с весами (урок «Что такое нейронная сеть»). Но как она вообще учится? Откуда берутся правильные веса? Ответ — в механизме обучения: loss, градиентный спуск и backpropagation. Без этого понимания нейросети остаются чёрным ящиком.

## Простая интуиция

Представь: ты бросаешь мяч в ворота и промахиваешься. Ты смотришь на ошибку (насколько промахнулся) и чуть корректируешь бросок. Повторяешь. Постепенно попадаешь точнее.

Нейросеть делает то же самое:
1. Делает предсказание
2. Считает, насколько ошиблась (loss)
3. Понимает, как надо изменить веса, чтобы ошибка уменьшилась (градиент)
4. Делает маленький шаг в правильном направлении
5. Повторяет миллионы раз

## Что это такое

**Loss (функция потерь)** — число, которое показывает, насколько плохо нейросеть справилась. Чем больше — тем хуже. Цель обучения: минимизировать loss.

Примеры:
- MSE (Mean Squared Error) — для регрессии
- Cross-Entropy — для классификации

**Веса (weights)** — числа в каждом нейроне, которые нейросеть подстраивает в процессе обучения. Именно в них хранится всё, что модель «знает».

**Градиент** — направление, в котором loss растёт быстрее всего. Чтобы его уменьшить, надо двигаться в **противоположную** сторону.

**Gradient Descent (градиентный спуск)** — алгоритм: обновляй веса маленькими шагами против градиента.

**Learning rate** — размер шага. Слишком большой — перепрыгнешь минимум. Слишком маленький — будешь учиться вечно.

**Backpropagation** — алгоритм для вычисления градиентов через всю сеть. По правилу цепочки (chain rule) он считает, как каждый вес во всех слоях повлиял на итоговую ошибку.

## Как это работает

На каждом шаге обучения нейросеть делает прямой проход (forward pass): данные проходят через слои и получается предсказание. Затем считается loss — насколько предсказание отличается от правильного ответа. Backpropagation считает, как каждый вес повлиял на ошибку, и обновляет веса на маленький шаг против градиента. Этот цикл повторяется для каждого батча данных, а весь датасет проходит несколько раз (эпохи).

Базовый алгоритм такого обучения — SGD (Stochastic Gradient Descent). Это один из оптимизаторов; современные сети часто обучают с Adam или RMSProp — это отдельные алгоритмы, а не варианты SGD.

**Батч и эпоха:**
- **Батч** — небольшая подвыборка данных (например, 32 примера). Считаем градиент на батче, а не на всём датасете — быстрее.
- **Эпоха** — один полный проход через все обучающие данные.
- Обычно обучают 10–100+ эпох.

## Простой пример

Нейросеть учится распознавать рукописные цифры на 60 000 изображениях. Размер батча — 64. За одну эпоху происходит 60 000 / 64 ≈ 937 обновлений весов. На первой эпохе loss = 2.31 (случайные предсказания), accuracy = 0.11. К 10-й эпохе loss = 0.08, accuracy = 0.974. Learning rate = 0.001 — маленький, но стабильный. Попытка с lr = 0.1: loss скачет и не сходится. Попытка с lr = 0.00001: сходится, но нужно 200 эпох вместо 10.

## Практика

1. Что такое loss? Почему нейросеть не просто считает «процент правильных ответов» как метрику обучения?
2. Объясни gradient descent своими словами. Почему движение «против градиента» уменьшает loss?
3. Что произойдёт, если learning rate слишком большой? Слишком маленький?
4. В уроке «Что такое нейронная сеть» мы узнали, что нейросеть может содержать миллионы весов. Почему нельзя подобрать эти веса простым перебором и как backpropagation решает эту проблему?
5. В уроке «Train / Validation / Test» мы разделяли данные, чтобы избежать утечки информации. Как идея батча при обучении нейросети согласуется с этим принципом и почему батч берут из train-набора?

## Краткий итог

- Нейросеть учится итеративно: forward → вычислить loss → backward → обновить веса — и так тысячи раз
- Learning rate — самый критичный гиперпараметр: слишком большой → расходимость, слишком маленький → обучение встанет
- Батч — компромисс: считать градиент на всём датасете точно, но медленно; на одном примере быстро, но зашумлённо
- Эпоха = один полный проход по данным; модели нужно несколько эпох, чтобы уточнить знание
- SGD (Stochastic Gradient Descent) — один из базовых оптимизаторов; Adam и RMSProp — отдельные адаптивные алгоритмы, не варианты SGD, но работающие по той же идее итеративного обновления весов

## Ключевые термины урока

- **Loss (функция потерь)** — число, которое нейросеть стремится минимизировать. MSE для регрессии, Cross-Entropy для классификации. Нельзя использовать accuracy как loss: она не дифференцируема.
- **Градиент** — вектор направления роста loss. Важно: обновление идёт в строго противоположную сторону. Формула: `w_new = w_old − lr × ∂L/∂w`.
- **Gradient Descent** — итеративный спуск по поверхности loss. Не гарантирует нахождение даже локального минимума: поверхность loss нейросети очень сложная, и оптимизатор ищет «достаточно хорошую» точку. На практике это работает, но математических гарантий нет.
- **Learning rate** — самый критичный гиперпараметр: слишком большой → loss скачет и расходится, слишком маленький → обучение занимает сотни эпох. Типичные значения: 1e-3 (Adam) до 1e-5 (при донастройке предобученной модели).
- **Backpropagation** — вычисление градиентов для всех весов сразу через chain rule. Без него пришлось бы перебирать каждый вес по отдельности — невозможно для сетей с миллиардами параметров.
- **Эпоха** — один полный проход по датасету. Смысл нескольких эпох: каждый пример влияет на веса несколько раз, модель «уточняет» знание.
- **Батч** — компромисс между точностью градиента (весь датасет) и скоростью (один пример). Размер 32–256 — стандарт; слишком маленький батч → зашумлённые обновления, слишком большой → хуже обобщение.

# 88. Что такое Deep Learning

## Зачем это нужно

Deep Learning — это то, что стоит за современными AI-прорывами: ChatGPT, Midjourney, AlphaFold, Tesla Autopilot. Понимание базовых принципов DL позволяет ориентироваться в этом мире и понимать, что возможно, а что нет.

## Простая интуиция

Обычная нейросеть — это один слой обработки. Deep Learning — это много слоёв, каждый из которых строит более абстрактные понятия. Для изображения: пиксели → края → формы → детали (нос, глаза) → лица. Каждый слой «понимает» чуть больше, чем предыдущий.

## Что это такое

- **Deep Learning** — нейронные сети с большим числом слоёв (от 10 до сотен)
- **Специализированные архитектуры** — разные способы организации слоёв для работы с изображениями, последовательностями, текстом; подробнее в следующем уроке
- **Transfer Learning** — использование предобученных моделей (предобученных на ImageNet, больших текстовых корпусах) для новых задач

## Как это работает

Глубокая нейросеть — это несколько скрытых слоёв, каждый из которых строит более абстрактное представление данных. Первые слои извлекают базовые паттерны (например, края на изображении), последующие объединяют их в более сложные структуры (части объектов, затем целые объекты).

Ключевые компоненты:
- **Dropout** — во время обучения случайно «отключает» часть нейронов на каждом шаге, что снижает переобучение
- **Глубина** — количество скрытых слоёв; именно она отличает Deep Learning от «обычных» нейросетей
- **Иерархия признаков** — каждый слой получает представление от предыдущего и строит более абстрактное; это происходит автоматически, без ручного feature engineering

## Простой пример

Исследователи создают классификатор рентгеновских снимков лёгких (пневмония/норма). Датасет: 5 200 снимков. С нуля (глубокая нейросеть, обученная только на этих данных): accuracy 72% после 50 эпох, обучение 3 часа на GPU. Transfer Learning (предобученная модель на 1.2 миллиона изображений): accuracy 94% после 10 эпох дообучения только последних слоёв, обучение 20 минут. Предобученная модель уже «знает» базовые визуальные паттерны — осталось только научить её отличать признаки пневмонии. Это и есть Transfer Learning: готовые знания из одной задачи переносятся на другую.

## Практика

1. Что отличает Deep Learning от обычной нейронной сети? Почему «глубина» (много слоёв) принципиально важна?
2. Почему Deep Learning требует значительно больше данных, чем классический ML? При каком объёме данных Deep Learning начинает выигрывать у Random Forest или XGBoost на табличных задачах?
3. У вас 300 фотографий цветков трёх видов. Как использовать Transfer Learning для классификатора и почему это лучше, чем обучение глубокой нейросети с нуля на таком объёме данных?
4. В уроке «Overfitting и Underfitting» мы разбирали, что сложные модели склонны переобучаться на небольших данных. Как Dropout решает эту проблему в глубокой сети — и почему случайное отключение нейронов во время обучения снижает переобучение, а не ухудшает качество?
5. В уроке «Как нейросеть учится на ошибках» мы видели, что backpropagation обновляет веса по всей сети от ошибки к входу. Почему при Transfer Learning достаточно переобучить только последние слои — и что именно хранят первые слои предобученной сети, что позволяет не трогать их?

## Краткий итог

- Deep Learning = многослойные нейросети с автоматическим извлечением признаков
- Выбор архитектуры определяется типом данных: для нового проекта не начинай с нуля — Transfer Learning сэкономит месяцы
- Transfer Learning позволяет использовать мощные модели даже при малых данных
- DL требует много данных и GPU, но при этих условиях бьёт классический ML

## Ключевые термины урока

- **Deep Learning** — автоматическое извлечение признаков через иерархию слоёв. В классическом ML признаки создавал инженер вручную; в DL сеть сама обнаруживает нужные паттерны от простых к сложным.
- **Когда DL выигрывает** — нет ручного feature engineering, нужен высокий потолок качества, доступны GPU. Для табличных данных с < 100k строк классический ML (XGBoost) часто лучше и быстрее.
- **Transfer Learning** — предобученная модель уже «знает» базовые паттерны из большого датасета; нужно только переобучить последние слои на своей задаче. 500 примеров + Transfer Learning часто бьёт 50k примеров с обучением с нуля.
- **Требования DL** — нетребователен к ручному FE, но требователен к данным (1k+ примеров на класс) и GPU. Без GPU обучение на больших датасетах занимает месяцы; с современным GPU — часы. Для inference GPU опционален.

# 89. Архитектуры нейросетей: CNN, RNN и Transformer

## Зачем это нужно

Deep Learning — это не одна универсальная нейросеть. Для разных типов данных существуют разные **архитектуры** — разные способы организации слоёв. Знать их на уровне интуиции нужно, чтобы понимать, какой инструмент для чего подходит.

## Простая интуиция

Разные задачи — разная структура:
- Фотографию лучше анализировать **блоками пикселей** → CNN
- Текст лучше читать **последовательно** → RNN/LSTM
- Смысл слова зависит от **контекста всей фразы** → Transformer

## Что это такое

Архитектура нейросети — это способ организации слоёв и связей между ними. Разные архитектуры возникли как ответ на конкретные типы данных: пространственные (изображения), последовательные (текст, аудио), смешанные. Выбор архитектуры определяет, какие паттерны сеть способна обнаруживать и насколько эффективно использует данные.

Четыре ключевых семейства:
- **CNN** — для пространственных данных с локальными паттернами
- **RNN/LSTM** — для последовательностей с зависимостью от прошлого
- **Transformer** — универсальная архитектура через механизм внимания
- **GAN** — для генерации новых данных через конкуренцию двух сетей

## Как это работает

**CNN — Convolutional Neural Network**

**Для чего:** изображения, видео, любые пространственные данные.

**Идея:** вместо того чтобы смотреть на все пиксели сразу, CNN применяет **маленькие фильтры** (ядра свёртки), которые скользят по изображению и обнаруживают локальные паттерны: края, текстуры, формы. Глубокие слои собирают паттерны из паттернов — от краёв до лиц и объектов.

```
Вход: изображение 224×224
→ Conv слой (края, текстуры)
→ Conv слой (формы, части объектов)
→ Fully Connected
→ Выход: класс (кошка/собака)
```

**Применения:** распознавание объектов, медицинские снимки, автопилот.

**RNN и LSTM — Recurrent Neural Network**

**Для чего:** последовательности — текст, временные ряды, аудио.

**Идея:** у RNN есть **скрытое состояние** — «память» о предыдущих шагах. При обработке каждого слова (или временного шага) сеть учитывает, что было раньше.

**Проблема:** обычный RNN плохо помнит далёкое прошлое. LSTM (Long Short-Term Memory) решает это через специальные «ворота», которые решают: что запомнить, что забыть, что передать дальше.

**Применения:** генерация текста, перевод, распознавание речи (до эпохи Transformer).

**Transformer**

**Для чего:** текст, код, изображения, аудио — сегодня главная архитектура для всего.

**Идея:** вместо последовательной обработки Transformer анализирует весь контекст сразу, учитывая взаимосвязи между всеми элементами последовательности одновременно.

**Применения:** GPT, BERT, Claude, Gemini, DALL-E, Whisper — почти всё современное DL. (GPT и другие языковые модели из этого списка детально рассматриваются в уроке «Что такое LLM».)

**GAN — Generative Adversarial Network**

**Для чего:** генерация изображений, аудио, синтетических данных.

**Идея:** два нейрона играют в игру: **Generator** создаёт фейковые данные, **Discriminator** пытается отличить их от настоящих. Оба учатся друг на друге. Итог — Generator научается создавать очень реалистичные данные.

**Применения:** генерация лиц, deepfake, аугментация данных. Сегодня во многом вытеснены диффузионными моделями.

## Простой пример

Три задачи в одном стартапе: (1) Классификация фото товаров на 50 категорий (одежда, электроника и др.) — выбирают CNN (ResNet-50), потому что важны локальные паттерны: текстура ткани, форма устройства. Accuracy = 0.94. (2) Анализ тональности отзывов покупателей (позитив/негатив) — выбирают дообученный Transformer (BERT), потому что важен полный контекст предложения. F1 = 0.91. (3) Генерация описаний товаров по фото — выбирают мультимодальный Transformer (CLIP + GPT), потому что задача требует понять изображение и сгенерировать текст.

## Практика

1. Почему CNN хорошо работает с изображениями, но плохо — с текстом? В чём принципиальное отличие?
2. Что такое «скрытое состояние» в RNN? Почему LSTM лучше справляется с длинными последовательностями?
3. В чём принципиальное отличие Transformer от RNN при обработке последовательностей? Почему это делает Transformer более эффективным для длинных текстов?
4. В уроке «Что такое Deep Learning» рассматривался Transfer Learning. Как Transfer Learning применяется вместе с CNN для задачи классификации медицинских снимков при малом датасете (500 изображений)?
5. В уроке «Overfitting и Underfitting» мы видели, что сложные модели переобучаются на малых данных. Как Transformer — самая мощная архитектура — решает проблему переобучения при дообучении на малом корпусе текстов?

## Краткий итог

- Архитектуры не конкурируют — у каждой своя ниша: CNN для пространственных данных, RNN/LSTM для последовательностей, Transformer для глобального контекста
- Transformer вытеснил RNN из большинства NLP-задач в 2018+; для новых задач с текстом — начинайте с Transformer
- CNN остаётся непревзойдённой для изображений с локальными паттернами; Transfer Learning (ResNet, EfficientNet) экономит недели обучения
- Выбор архитектуры определяется типом данных — это первый вопрос при запуске DL-проекта
- GAN вытесняется диффузионными моделями для генерации изображений, но полезен для аугментации данных

## Ключевые термины урока

- **CNN** — локальные паттерны: фильтр 3×3 видит только соседние пиксели. Это быстро и эффективно для изображений (соседние пиксели связаны), но слабо для текста (слово и его антоним могут стоять далеко).
- **RNN/LSTM** — последовательная обработка: каждый шаг обновляет скрытое состояние. Проблема длинных зависимостей: LSTM лучше RNN, но Transformer решил её кардинально. В 2024+ RNN вытеснен Transformer из NLP.
- **Transformer** — анализирует всю последовательность сразу, учитывая взаимосвязи между всеми элементами; именно это позволило обучать модели на огромных корпусах. Механика работы подробно рассматривается в следующем уроке.
- **GAN** — генератор создаёт данные, дискриминатор отличает их от реальных; оба обучаются одновременно. Нестабильное обучение — известная проблема; в 2024 диффузионные модели вытесняют GAN для генерации изображений.

# 90. Что такое Embeddings

## Зачем это нужно

Компьютеры работают с числами, но данные бывают категориальными: слова, пользователи, товары, города. Embeddings — способ превратить любой объект в осмысленный числовой вектор. Это основа NLP, рекомендательных систем и многих других ML-задач.

## Простая интуиция

Представьте карту. Каждый город — точка с координатами (x, y). Похожие города (близкие географически или культурно) — находятся рядом на карте. Embeddings делают то же самое для слов, пользователей или товаров: превращают их в координаты в многомерном пространстве, где «похожие» объекты находятся рядом.

## Что это такое

- **Embedding** — плотный числовой вектор фиксированной размерности, представляющий объект
- **Word2Vec** — классический алгоритм получения эмбеддингов слов: слова с похожим контекстом → похожие векторы
- **Семантическое сходство** — похожие объекты имеют близкие векторы (косинусное расстояние)
- **Embedding layer** — обучаемый слой нейросети, создающий эмбеддинги категорий
- Пример: вектор("король") - вектор("мужчина") + вектор("женщина") ≈ вектор("королева")

## Как это работает

Каждый объект (слово, товар, пользователь) представляется вектором из нескольких десятков или сотен чисел. Близкие по смыслу объекты получают похожие векторы.

Пример в 3-мерном пространстве (в реальности — 100–1024 измерений):

```
"кот"        → [0.9, 0.1, 0.2]
"кошка"      → [0.85, 0.15, 0.25]   ← близко к "кот"
"машина"     → [0.1, 0.9, 0.3]      ← далеко от "кот"
"автомобиль" → [0.15, 0.85, 0.35]   ← близко к "машина"
```

Для измерения близости используется косинусное сходство: чем ближе угол между векторами, тем похожее объекты. Это позволяет находить семантически близкие объекты без точного совпадения слов.

## Простой пример

Маркетплейс с каталогом из 200 000 товаров. Каждый товар описан текстовым описанием. One-Hot Encoding по словарю — вектор размером 50 000 (размер словаря), 99.9% нулей. Embedding (Word2Vec или sentence-transformer): плотный вектор размером 128. Запрос «беспроводные наушники Sony»: система находит эмбеддинг запроса, вычисляет косинусное сходство с 200 000 товарными эмбеддингами за 20 мс, топ-10 похожих — «наушники JBL» (0.94), «наушники Beats» (0.91), «bluetooth-колонка Sony» (0.87). Семантический поиск работает даже если точное слово не совпадает.

## Практика

1. Что такое embedding и чем он принципиально отличается от One-Hot Encoding категориальных признаков?
2. Объясните концепцию семантического сходства в embeddings: почему слова «кот» и «кошка» имеют близкие векторы?
3. Вы строите рекомендательную систему для музыкального стриминга. Как бы вы использовали embeddings пользователей и треков для генерации рекомендаций?
4. Из урока «One-Hot Encoding» мы знаем, что этот метод создаёт разреженные высокоразмерные векторы. Какое конкретное преимущество даёт embedding размерности 128 по сравнению с One-Hot для словаря из 100 000 слов?
5. Из урока «PCA» мы знаем, что снижение размерности помогает работать с высокоразмерными данными. Как embeddings решают похожую задачу для текстовых данных и в чём их принципиальное отличие от PCA?

## Краткий итог

- Embeddings — универсальный язык для ML: одна идея лежит за текстом, рекомендациями и поиском одновременно
- Похожие объекты имеют близкие векторы (семантическое сходство)
- Используются в NLP, рекомендациях, поиске, любых задачах с категориальными данными
- Косинусное сходство — стандартная метрика близости embeddings

## Ключевые термины урока

- **Embedding** — вектор из R^d, где d << исходное число объектов. Вместо one-hot [0,...,1,...,0] с 100k нулей: плотный вектор из 128 чисел, где каждое несёт смысл. Размерность 128–1024 вместо 100 000.
- **Word2Vec** — обучается без разметки (self-supervised): «предсказать соседние слова в тексте». Следствие: king − man + woman ≈ queen — арифметика смысла возникает как побочный эффект.
- **Косинусное сходство** — cos_sim = dot(a,b)/(||a||·||b||); от -1 до 1. Лучше евклидова для embeddings: длина вектора — шум, а не сигнал. Популярный объект с длинным вектором не должен всегда быть «близко» только из-за размера.
- **Embedding как feature** — user_embedding и item_embedding передаются в ML-модель вместо one-hot ID. Это превращает текстовые/категориальные данные в числовые, сохраняя семантику.

# 91. Что такое Transformer

## Зачем это нужно

Transformer — архитектура, изменившая AI. GPT, BERT, Claude, Gemini, T5 — всё это трансформеры. Понимание базовой идеи attention позволяет разобраться, почему эти модели так мощны и какие у них ограничения.

## Простая интуиция

Читая предложение «Банк открыли раньше, чем солнце» — слово «банк» значит разное (финансовый или берег реки). Чтобы понять, нужно посмотреть на весь контекст. Attention — механизм, который для каждого слова спрашивает: «на какие другие слова мне стоит обратить внимание, чтобы понять себя?»

## Что это такое

- **Transformer** — архитектура, предложенная в статье "Attention is All You Need" (2017)
- **Токен** — единица обработки текста; обычно слово или часть слова: «безполезный» → «без», «полезный»; трансформер работает с последовательностью токенов
- **Attention** — механизм, позволяющий каждому токену «смотреть» на все другие токены
- **Self-attention** — attention внутри одной последовательности (слово смотрит на другие слова)
- **Multi-head attention** — несколько механизмов attention параллельно; каждый head фокусируется на разных аспектах контекста (синтаксис, семантика, дальние связи между словами)
- **Encoder** — обрабатывает входную последовательность (BERT)
- **Decoder** — генерирует выходную последовательность (GPT)

## Как это работает

В основе Transformer лежит механизм attention. Для каждого токена (слова) модель вычисляет, насколько важен каждый другой токен при его обработке. Это делается через три вектора: Query (что ищем), Key (что доступно), Value (что передать).

Упрощённая схема для предложения «Банк открыли раньше»:

```
Для токена "Банк":
  → сравнить с "открыли": вес 0.15
  → сравнить с "раньше":  вес 0.21
  → сравнить с "реки":    вес 0.64  ← высокий вес → понимаем контекст
Итоговый вектор "Банк" = взвешенная сумма всех токенов
```

Ключевые шаги:
1. Каждый токен преобразуется в три вектора: Q, K, V
2. Для каждого токена вычисляется score с каждым другим через скалярное произведение Q·Kᵀ
3. Scores нормализуются через softmax → получаем веса (attention weights)
4. Итоговый вектор токена = взвешенная сумма V всех токенов

Multi-head attention повторяет это параллельно несколько раз — каждый «head» фокусируется на разных аспектах.

## Простой пример

Задача: определить тональность отзыва «Телефон хорош, но батарея разряжается быстро». Слово «хорош» — позитивный сигнал, «быстро» само по себе нейтральное, но вместе с «разряжается» — негативный. RNN обрабатывает слово за словом и к слову «быстро» может «забыть» контекст «хорош» из начала. Transformer: каждое слово смотрит на все остальные. Слово «быстро» получает высокий вес attention к словам «батарея» и «разряжается». Итог: смешанная тональность — модель корректно определяет её как MIXED, а не просто POSITIVE или NEGATIVE.

## Практика

1. Что такое self-attention? Объясните на примере предложения, как один токен использует attention к другим.
2. В чём ключевое преимущество Transformer перед RNN для обработки длинных текстов?
3. Вы строите систему анализа тональности отзывов. Что лучше подходит — BERT (encoder) или GPT (decoder)? Почему?
4. В уроке «Что такое Embeddings» мы узнали, что каждый токен представляется числовым вектором в пространстве смыслов. Как именно эти векторы используются на входе механизма self-attention — что из них становится Query, Key и Value?
5. В уроке «Архитектуры нейросетей CNN, RNN и Transformer» RNN обрабатывает текст последовательно, слово за словом. Почему это ограничение критично для длинных зависимостей и как self-attention Transformer решает именно эту проблему?

## Краткий итог

- Transformer доминирует в современном ML: не знаешь что выбрать для последовательностей — начинай с трансформера
- Self-attention решил главную проблему RNN: дальние зависимости теперь не теряются — каждый токен видит весь контекст
- Все современные большие языковые модели (GPT, Claude, Llama, BERT) — это трансформеры
- Главное ограничение: контекстное окно — фиксированный максимальный размер входа

## Ключевые термины урока

- **Transformer** — архитектура нейросети на основе механизма attention без рекуррентности. Ключевое отличие от RNN: обрабатывает всю последовательность за один проход, а не по одному токену — это сделало возможным обучение на огромных корпусах.
- **Attention** — механизм, взвешивающий значимость каждого элемента для предсказания текущего. Формула: score = softmax(Q·Kᵀ / √d_k)·V; деление на √d_k предотвращает исчезновение градиентов при больших размерностях.
- **Self-attention** — каждый токен учитывает все остальные токены в последовательности. В отличие от RNN, нет «забывания»: токен из начала предложения влияет на токен в конце с той же лёгкостью, что и соседний.
- **Multi-head attention** — несколько параллельных блоков attention для разных аспектов контекста. Один head может отслеживать синтаксические зависимости, другой — семантическое сходство; результаты конкатенируются.
- **Encoder / Decoder** — части Transformer: encoder понимает входную последовательность (применяется в BERT для задач классификации), decoder генерирует выходную (применяется в GPT для генерации текста).

# 92. Что такое LLM

## Зачем это нужно

LLM (Large Language Models) — это технология за ChatGPT, Claude, Gemini. Понимание того, как они работают, их возможностей и ограничений, критично для любого специалиста в области данных и технологий в 2024 году.

## Простая интуиция

Представьте книгочея, прочитавшего весь интернет. Он не знает «правды» — он знает, что обычно пишут после тех или иных слов. Спросите его «Столица Франции» — он ответит «Париж», потому что это слово чаще всего следует после таких слов. Именно так работает LLM: предсказывает наиболее вероятный следующий токен. Важно: LLM не запоминает тексты дословно — он учит распределение вероятностей над токенами. Это принципиально отличается от простого поиска по тексту или n-gram-модели.

## Что это такое

- **LLM** (Large Language Model) — трансформер, предобученный на огромных объёмах текста
- **Pre-training** — самообучение: предсказание следующего слова на триллионах токенов
- **SFT** (Supervised Fine-Tuning) — дообучение базовой модели на размеченных диалогах «вопрос → правильный ответ»; именно SFT превращает «предсказатель токенов» в полезного ассистента, прежде чем применяется RLHF
- **RLHF** (Reinforcement Learning from Human Feedback) — дообучение через человеческие оценки
- **Токен** — единица текста: примерно 1 слово или 4 символа
- **Температура** — параметр случайности генерации: высокая = творческий/непредсказуемый, низкая = детерминированный
- **Контекстное окно** — максимальный объём текста, который модель видит сразу (8K-1M токенов)

## Как это работает

LLM генерирует текст токен за токеном. На каждом шаге модель получает весь предыдущий контекст и предсказывает вероятности для каждого возможного следующего токена. Затем один токен выбирается (с учётом параметра температуры) и добавляется к контексту.

Ключевые параметры при работе с LLM:

| Параметр | Что регулирует | Типичные значения |
|---|---|---|
| temperature | Случайность генерации: 0 = детерминированный, выше = разнообразнее | 0 для фактов/кода, 0.7–1.0 для творчества |
| max_tokens | Максимум генерируемых токенов | 200–4000 |
| top_p | Nucleus sampling: из какой доли вероятностей выбирать | 0.9–0.95 |
| context_window | Максимум токенов на входе | 8K–1M токенов |

Pre-training → SFT → RLHF/DPO: сначала модель обучается предсказывать следующий токен на огромных текстах (pre-training), затем через SFT учится отвечать в нужном формате, и наконец выравнивается через оценки людей (RLHF) или прямую оптимизацию предпочтений (DPO), чтобы отвечать полезно и безопасно.

Два основных архитектурных типа LLM: **decoder-only** (GPT, Claude, Gemini) — генерируют текст токен за токеном, используются для диалога и генерации; **encoder-only** (BERT) — кодируют текст в представление для понимания/классификации, но не генерируют свободный текст.

## Простой пример

Юридическая компания тестирует два LLM для анализа договоров. Запрос: «Есть ли в этом договоре штрафные санкции за досрочное расторжение?». Claude с температурой 0 и контекстным окном 200K токенов: читает весь договор (80 страниц, ~60K токенов), находит пункт 14.3 с штрафом 30% от суммы. GPT-4 с temperature=0.8: отвечает уверенно, но «галлюцинирует» несуществующий пункт 12.1. Вывод: для фактических юридических задач temperature=0 обязательна, а выбор модели с большим контекстным окном позволяет обработать весь документ без разбивки.

## Практика

1. Как LLM генерирует текст? Что происходит на каждом шаге с точки зрения предсказания следующего токена?
2. Что такое «галлюцинации» в LLM и почему они неизбежны при текущем подходе к обучению?

## Краткий итог

- Сила LLM — в scale: те же принципы, что у маленьких моделей, но на порядки больше данных и параметров дают качественный скачок
- Ключевые параметры: temperature (случайность), max_tokens, context window
- Галлюцинации — следствие предсказания правдоподобности, а не фактической точности
- RLHF корректирует **alignment** — разрыв между «статистически правдоподобным текстом» (результат pre-training) и «полезным и безопасным ответом» (то, что нужно пользователю)
- Ограничение контекстного окна — практический потолок: длинные документы нужно делить или использовать архитектуры с расширенным контекстом

## Ключевые термины урока

- **LLM (Large Language Model)** — трансформер, обученный на огромных текстах предсказывать следующий токен.
- **Pre-training** — предобучение на большом корпусе текстов для получения базовой модели.
- **SFT (Supervised Fine-Tuning)** — дообучение базовой модели на примерах правильных ответов; ключевой шаг между pre-training и RLHF.
- **RLHF** — обучение с подкреплением из человеческой обратной связи для выравнивания модели.
- **Токен** — минимальная единица текста, с которой работает LLM (слово, часть слова, символ).
- **Температура** — параметр случайности генерации: выше = разнообразнее, ниже = детерминированнее.
- **Контекстное окно** — максимальное число токенов, которые LLM может учитывать за раз.

# 93. Prompt Engineering

## Зачем это нужно

Качество ответа LLM зависит от качества запроса. Правильно составленный промпт — это разница между полезным ответом и мусором. Prompt Engineering — практический навык, применимый прямо сейчас к любому LLM.

## Простая интуиция

Промпт — это как задание сотруднику. «Напиши что-нибудь про Python» — расплывчато, результат непредсказуем. «Напиши 5 практических советов по оптимизации Python кода для ML-пайплайна, для аудитории junior разработчиков, в формате нумерованного списка» — конкретно, результат предсказуем и полезен.

## Что это такое

- **Zero-shot prompting** — задать вопрос без примеров: «Переведи на английский: ...»
- **Few-shot prompting** — дать 2-3 примера перед задачей: «Пример 1: ... → ... Теперь: ...»
- **Chain-of-thought (CoT)** — попросить рассуждать: «Думай шаг за шагом»
- **System prompt** — инструкции о роли и поведении модели («Ты — эксперт по ML»)
- **Structured output** — просить ответ в определённом формате (JSON, список, таблица)
- **Temperature** — параметр случайности; для кода: 0, для творчества: 0.7-1.0

## Как это работает

Четыре основных техники — на примере задачи классификации тональности отзыва:

**1. Zero-shot** — задать задачу без примеров:
```
Классифицируй тональность отзыва как POSITIVE, NEGATIVE или NEUTRAL.
Отзыв: "Доставка быстрая, но товар не соответствует описанию"
Тональность:
```

**2. Few-shot** — показать 2–3 примера перед задачей:
```
Отзыв: "Отличный продукт!" → POSITIVE
Отзыв: "Ужасное качество" → NEGATIVE
Отзыв: "Обычный товар" → NEUTRAL
Отзыв: "Доставка быстрая, но товар не соответствует описанию"
Тональность:
```

**3. Chain-of-Thought** — попросить рассуждать вслух:
```
Задача: выбери стратегию обработки пропусков для датасета 1000 строк, 20% пропусков.
Думай шаг за шагом: 1. Тип данных? 2. Процент пропусков? 3. Задача ML? 4. Рекомендация?
```

**4. Структурированный вывод** — запросить фиксированный формат:
```
Верни ответ строго в JSON: {"problem_type": "...", "recommended_algorithms": [...]}
Задача: предсказать вероятность покупки для 50K клиентов.
```

## Простой пример

Команда автоматизирует классификацию обращений в службу поддержки (5 категорий). Zero-shot: «Классифицируй: [текст]» — accuracy 71%, много ошибок между «техническая проблема» и «вопрос по функционалу». Few-shot (2 примера на категорию): accuracy 89% — модель видит паттерн разграничения. Chain-of-Thought для сложных случаев: «Сначала определи суть проблемы, потом выбери категорию» — спорных классификаций стало на 40% меньше. Структурированный вывод в JSON: `{"category": "billing", "priority": "high", "sentiment": "negative"}` — парсинг для CRM-системы без дополнительного кода.

## Практика

1. В чём разница между zero-shot и few-shot prompting? Когда few-shot даёт значительное преимущество?
2. Что такое Chain-of-Thought prompting и почему он особенно полезен для математических и логических задач?
3. Вам нужно автоматически извлекать структурированные данные (дата, сумма, контрагент) из счёт-фактур с помощью LLM. Как написать промпт, чтобы получить стабильный JSON-вывод?
4. В уроке «Что такое LLM» мы узнали, что LLM предсказывает следующий токен с некоторой вероятностью. Как параметр temperature влияет на этот процесс: почему temperature=0 даёт стабильный JSON-вывод, а temperature=1.0 — разнообразный творческий текст?
5. В уроке «Что такое LLM» рассматривалось контекстное окно. Как few-shot примеры «расходуют» контекстное окно и когда количество примеров нужно ограничивать?

## Краткий итог

- Few-shot и Chain-of-Thought — наиболее эффективные техники без дополнительного обучения: несколько примеров или «думай шаг за шагом» заметно улучшают результат
- System prompt задаёт роль и поведение для всего диалога
- Для точности: низкая temperature + структурированный вывод
- Явный формат ответа (JSON, список) улучшает предсказуемость и упрощает парсинг

## Ключевые термины урока

- **Zero-shot prompting** — работает для задач из предобучения; не требует токенов на примеры. Проигрывает few-shot, когда нужен специфический формат или разграничение похожих категорий.
- **Few-shot prompting** — 2–5 примеров «вопрос → ответ» в промпте; особенно эффективен при классификации редких или похожих категорий. Цена: токены контекста; не заменяет донастройку модели при < 70% zero-shot accuracy.
- **Chain-of-Thought (CoT)** — явное рассуждение перед ответом; при генерации рассуждения следующий токен «видит» промежуточные шаги. Для математики и логики даёт +20–40% accuracy.
- **System prompt** — задаёт persistent роль и ограничения для всего диалога. Ключевое место для инструкций по формату и безопасности; не переопределяется пользователем в большинстве реализаций.
- **Temperature** — 0 для JSON/код/факты (детерминированный); 0.7–1.0 для творческих задач. temperature=0 ≠ абсолютно одинаковые ответы при сложных промптах из-за квантования вероятностей.

# 94. Fine-tuning моделей

## Зачем это нужно

Pre-trained модели (BERT, GPT, LLama) — мощные, но общие. Fine-tuning адаптирует их к специфической задаче или домену. Это позволяет получить специализированную модель без обучения с нуля (что стоило бы миллионы долларов).

## Простая интуиция

Врач-терапевт (pre-trained модель) знает медицину в целом. Специализация в кардиологии (fine-tuning) — дополнительная учёба, опираясь на уже имеющуюся базу. Это быстрее и дешевле, чем начинать медицинское образование заново.

## Что это такое

- **Full fine-tuning** — обновление всех весов модели на новых данных. Дорого, требует много GPU памяти
- **Feature extraction** — заморозить все слои, обучить только последний (классификационный) слой
- **LoRA** (Low-Rank Adaptation) — обновить только небольшие матрицы-адаптеры; эффективно по памяти
- **Instruction tuning** — дообучение следовать инструкциям (как у ChatGPT)
- **Domain adaptation** — дообучение на специализированных текстах (медицина, юридические документы)
- Когда нужен: специфический формат вывода, специализированный домен, конкретный стиль

## Как это работает

Три подхода к fine-tuning по степени «глубины» адаптации:

```
Базовая модель (предобученные веса)
        │
        ├── Feature extraction: заморозить все слои, обучить только последний
        │   └── Быстро, мало GPU, но ограниченная гибкость
        │
        ├── LoRA: добавить небольшие матрицы-адаптеры к каждому слою
        │   └── ~1% параметров обновляется, базовые веса заморожены
        │
        └── Full fine-tuning: обновить все параметры
            └── Максимальная гибкость, но требует много GPU и риск catastrophic forgetting
```

Ключевой принцип: learning rate при fine-tuning должен быть очень маленьким (2e-5 вместо стандартных 0.001). Большой learning rate «перезапишет» предобученные веса — модель забудет всё, что знала. Маленький rate позволяет аккуратно адаптироваться к новой задаче, сохранив общие знания.

## Простой пример

Банк хочет LLM для анализа финансовой отчётности клиентов. Prompt engineering (GPT-4): 40% ошибок при интерпретации специфической банковской терминологии («EBITDA с корректировками» трактуется неверно). Fine-tuning BERT на 5 000 банковских отчётов с разметкой: ошибки падают до 8%. LoRA на Llama-3: обновляет 0.3% параметров (12M из 4B), обучение на одном A100 GPU за 3 часа, результат сопоставим с full fine-tuning (разница 1.2% в accuracy), но в 8 раз дешевле и быстрее.

## Практика

1. Что такое fine-tuning и чем он отличается от pre-training? Когда fine-tuning необходим, а когда достаточно prompt engineering?
2. Что такое LoRA? Почему обновление только ~1% параметров часто даёт результат, сопоставимый с full fine-tuning?
3. Компания хочет создать чат-бота для техподдержки по внутренней документации. Вы рассматриваете fine-tuning или prompt engineering. Какой подход выбрать и почему?
4. В уроке «Как нейросеть учится на ошибках» мы видели, что learning rate определяет размер шага обновления весов. Почему при fine-tuning нужен learning rate в 50–500 раз меньше стандартного и что произойдёт, если использовать стандартный lr=0.001?
5. В уроке «Overfitting и Underfitting» переобучение объяснялось через чрезмерную адаптацию к обучающим данным. Почему full fine-tuning на малом датасете особенно уязвим к переобучению и как LoRA снижает этот риск, обновляя только ~1% параметров?

## Краткий итог

- Fine-tuning — не первый шаг: сначала исчерпай prompt engineering — он быстрее и дешевле; fine-tuning когда этого недостаточно
- LoRA сделал fine-tuning доступным: достаточно потребительской GPU для адаптации моделей с миллиардами параметров
- Маленький learning rate (2e-5) защищает знания предобучения от catastrophic forgetting
- Catastrophic forgetting — главный риск full fine-tuning; LoRA минимизирует его, не меняя базовые веса

## Ключевые термины урока

- **Fine-tuning vs Prompt Engineering** — сначала исчерпай промпт-инжиниринг: бесплатно, мгновенно. Fine-tuning оправдан, когда нужен конкретный стиль/поведение, которого нельзя добиться промптом, или нужно убрать длинный контекст примеров.
- **Full fine-tuning** — обновляет все параметры; требует GPU ≥ 2× размера модели в памяти (FP16 + оптимизатор). Для GPT-3 (175B) — нереально на потребительском железе.
- **LoRA** — добавляет две малых матрицы (rank r << d) к каждому слою; обновляет только их (~1% параметров). Качество близко к full fine-tuning, VRAM уменьшается в 3–10 раз. Базовые веса заморожены.
- **Catastrophic forgetting** — при fine-tuning на узкой задаче модель «забывает» общие знания предобучения. Важно: это нельзя «откатить» без переобучения с нуля — поэтому профилактика (маленький lr 2e-5, 1–3 эпохи, LoRA) важнее лечения. Признак catastrophic forgetting: модель хорошо работает на целевой задаче, но провалилась на простых общих вопросах.
- **Instruction tuning** — fine-tuning на парах «инструкция → ответ»; обеспечивает следование инструкциям пользователя. Без instruction tuning base-модель продолжает текст, а не отвечает на вопросы.

# 95. Что такое RAG

## Зачем это нужно

LLM не знает о событиях после даты обучения, не знает ваши внутренние документы и галлюцинирует факты. RAG (Retrieval-Augmented Generation) решает все три проблемы: добавляет актуальные знания без переобучения.

## Простая интуиция

Представьте эксперта с доступом к библиотеке. Вы задаёте вопрос — эксперт быстро находит нужные страницы из книг, читает их и отвечает, опираясь на прочитанное, а не только на своё образование. RAG — это LLM + умный поиск по базе знаний.

## Что это такое

- **RAG** (Retrieval-Augmented Generation) — архитектура: Retrieval (поиск) + Generation (генерация)
- **Retrieval** — поиск релевантных документов по запросу пользователя
- **Vector store** — база данных эмбеддингов документов (Chroma, Pinecone, FAISS)
- **Chunking** — разбивка документов на части нужного размера. Выбор размера критичен: слишком маленький chunk (50 токенов) → теряется контекст; слишком большой (2000+) → в одном chunk много шума, retrieval теряет точность. Оптимум обычно 200–500 токенов с небольшим перекрытием
- **Embedding model** — модель для векторизации текста (text-embedding-3-small и др.)
- **Контекст** — найденные документы передаются в LLM как часть промпта

## Как это работает

RAG работает в два этапа:

**Этап 1 — Индексирование (делается один раз):**
```
Документы → Разбивка на chunks (200–500 токенов)
         → Embedding каждого chunk
         → Сохранение в vector store
```

**Этап 2 — Запрос (при каждом вопросе):**
```
Вопрос пользователя
  → Embedding вопроса
  → Поиск топ-K похожих chunks по косинусному сходству (vector store)
  → Передать найденные chunks + вопрос в LLM как контекст
  → LLM генерирует ответ, опираясь на переданные документы
```

Пример промпта на шаге генерации:
```
Используй только следующий контекст для ответа.
Контекст: [найденные chunk-и из документов]
Вопрос: Какова политика возврата?
Ответ:
```

Ключевой принцип: LLM видит только найденные фрагменты документов, а не весь архив. Качество ответа напрямую зависит от того, насколько точно retrieval нашёл нужные chunks.

## Простой пример

Нефтегазовая компания строит RAG-систему для поиска по 12 000 технических регламентов (PDF, общий объём 80 000 страниц). Индексирование: каждый документ разбивается на chunks по 400 токенов с перекрытием 50 токенов, создаются эмбеддинги через text-embedding-3-small, сохраняются в FAISS (12 млн векторов). Запрос: «Каков регламент технического обслуживания компрессора K-201?» — система находит 3 релевантных chunk из разных документов за 80 мс, передаёт их в Claude. Ответ содержит конкретные цифры из регламентов со ссылками на источники. Без RAG — галлюцинации с неверными интервалами обслуживания.

## Практика

1. Компания построила RAG-систему на основе внутренней базы документов. Сотрудник спрашивает о политике командировочных расходов — система отвечает неверно, хотя документ с политикой точно есть в базе. На каком из двух этапов RAG скорее всего произошёл сбой? Назови три конкретные причины, которые могут это объяснить.
2. Что такое chunking и почему выбор размера chunk критически важен для качества RAG?
3. Вы строите корпоративный чат-бот по базе из 50 000 документов. Опишите архитектуру: как документы попадают в систему и как система находит ответ на конкретный вопрос?
4. Из урока «Что такое Embeddings» мы знаем, что похожие объекты имеют близкие векторы. Как это свойство используется в шаге Retrieval: каким образом система находит документы, релевантные вопросу пользователя?
5. Из урока «Fine-tuning моделей» мы знаем, что дообучение изменяет веса модели. Почему RAG предпочтительнее fine-tuning, когда корпоративная база знаний обновляется еженедельно?

## Краткий итог

- RAG = поиск релевантных документов + передача их в контекст LLM
- Решает проблемы: устаревшие знания, внутренние документы, галлюцинации
- Vector store хранит embeddings документов для семантического поиска
- Качество RAG в значительной мере определяется качеством chunking и retrieval

## Ключевые термины урока

- **RAG** — LLM без RAG отвечает из своих весов (статичные знания до cutoff date); RAG даёт LLM доступ к актуальным или приватным документам в реальном времени без переобучения.
- **Chunking** — chunk_size 200–500 токенов = баланс между контекстом и точностью поиска. Слишком маленький chunk теряет контекст абзаца; слишком большой → в найденном chunk много нерелевантного шума.
- **Vector store** — хранит embedding каждого chunk; при запросе embedding запроса сравнивается с embeddings чанков через cosine similarity (ANN-поиск). FAISS, ChromaDB, Weaviate — популярные реализации.
- **Retrieval** — если retrieval нашёл не тот документ, LLM будет уверенно генерировать на основе неверного контекста. Качество RAG определяется на 80% качеством retrieval, а не генерацией.
- **RAG vs Fine-tuning** — RAG для актуальных/обновляемых знаний (база обновляется без переобучения); fine-tuning для изменения стиля/поведения модели. Для корпоративной базы знаний — RAG; для медицинского диалекта — fine-tuning.

# 96. Что такое AI Agent

## Зачем это нужно

LLM, который только отвечает на вопросы, — это чат-бот. AI Agent — это LLM, который может планировать, использовать инструменты и выполнять многошаговые задачи автономно. Это следующий уровень применения LLM: от ответов к действиям.

## Простая интуиция

Обычный LLM — как консультант, который отвечает на вопросы. AI Agent — как ассистент, которому можно сказать «организуй мне командировку» и он сам найдёт рейсы, забронирует отель, отправит письма и внесёт встречи в календарь. Разница — в способности действовать, а не только советовать.

## Что это такое

- **AI Agent** — система: LLM + инструменты + память + планирование
- **Инструменты (tools)** — функции, которые LLM может вызывать (поиск, API, код, база данных)
- **ReAct (Reason + Act)** — паттерн: Рассуждение → Действие → Наблюдение → Рассуждение...
- **Память**: контекстная (в промпте), долгосрочная (vector store), процедурная (память о навыках)
- **Планирование** — разбивка сложной задачи на шаги
- **Human-in-the-loop** — контроль человека на критических шагах

## Как это работает

Агент работает по циклу ReAct (Reason + Act):

```
Задача: "Найди цену акций Apple и сравни с вчерашней"

Шаг 1 — Рассуждение: нужна сегодняшняя цена → вызову search_web
Шаг 1 — Действие:    search_web("Apple stock price today") → $181.5
Шаг 1 — Наблюдение:  получил цену $181.5

Шаг 2 — Рассуждение: нужна вчерашняя цена → вызову search_web
Шаг 2 — Действие:    search_web("Apple stock price yesterday") → $179.2
Шаг 2 — Наблюдение:  получил цену $179.2

Шаг 3 — Рассуждение: нужно посчитать разницу → вызову calculate
Шаг 3 — Действие:    calculate("181.5 - 179.2") → 2.3
Шаг 3 — Наблюдение:  разница $2.3

Шаг 4 — Рассуждение: все данные есть → формулирую ответ
Ответ: "Акции выросли на $2.3 (1.3%)"
```

Каждый инструмент описан для LLM в виде текстового описания функции. LLM выбирает нужный инструмент по этому описанию, не зная кода. Результат каждого вызова добавляется в контекст — агент «помнит» всё, что произошло в текущей сессии.

## Простой пример

Агент для автоматизации аналитического отчёта: задача «Подготовь еженедельный отчёт по продажам». Шаг 1: агент вызывает инструмент `query_database("SELECT * FROM sales WHERE week=current_week")` — получает 15 000 строк. Шаг 2: вызывает `run_python_code("calculate_stats(data)")` — считает метрики (рост 12%, топ-5 товаров). Шаг 3: обнаруживает аномалию — резкий рост продаж категории «электроника» в Сибири — вызывает `search_news("электроника Сибирь промо")` — находит причину. Шаг 4: `create_report(metrics, insights)` — генерирует PDF. Вся цепочка: 4 инструмента, 8 минут, без участия аналитика.

## Практика

1. Вы попросили обычный LLM написать скрипт для выгрузки данных из базы и загрузки в Google Sheets. LLM написал код, но при запуске возникла ошибка подключения — LLM не может сам запустить код и увидеть результат. AI Agent получил ту же задачу. Что принципиально иначе он сделает — и какие конкретно компоненты из его архитектуры дают ему это преимущество?
2. Объясните паттерн ReAct на конкретном примере задачи: «найди цену акции и сравни с вчерашней».
3. Вы строите агента для HR-автоматизации: читает резюме, ищет кандидатов в базе, отправляет email. Какие риски нужно предусмотреть и где нужен human-in-the-loop?
4. Из урока «Что такое RAG» мы знаем, что RAG добавляет LLM доступ к внешним документам. Как AI Agent расширяет эту возможность: что агент может сделать с найденной информацией, чего не может RAG?
5. В уроке «Что такое LLM» мы узнали о галлюцинациях. Как наличие инструментов у агента (поиск, калькулятор, база данных) снижает риск галлюцинаций по сравнению с обычным LLM без инструментов?

## Краткий итог

- AI Agent = LLM + инструменты + память + планирование
- ReAct паттерн: Рассуждение → Действие → Наблюдение — базовый цикл агента
- Инструменты расширяют возможности: поиск, код, API, базы данных
- Human-in-the-loop обязателен для критических и необратимых действий

## Ключевые термины урока

- **AI Agent vs LLM** — LLM отвечает за один «ход»; агент запускает цикл: рассуждение → инструмент → результат → следующий шаг. Агент может сделать 10+ вызовов инструментов для ответа на один вопрос.
- **ReAct** — Thought (что мне нужно?) → Action (вызов инструмента) → Observation (результат) → Thought (теперь я знаю...). Прозрачность рассуждений — ключевое свойство: можно найти, где агент ошибся.
- **Инструменты (tools)** — любые Python-функции, описанные в JSON-схеме. LLM выбирает инструмент по описанию, не зная его кода. Плохое описание инструмента = агент выбирает не тот инструмент.
- **Human-in-the-loop** — обязателен для необратимых действий: «отправить email», «удалить файл», «провести платёж». Агент без HITL на таких действиях — автоматическая точка отказа с реальными последствиями.
- **Память** — краткосрочная (контекст диалога), долгосрочная (vector store с прошлыми взаимодействиями). Без памяти агент «забывает» между сессиями и не учится на прошлых ошибках.

# 97. Этика и ответственность в AI

## Зачем это нужно

AI-системы влияют на жизни людей: решают, кому дать кредит, кого взять на работу, как распределить ресурсы. Эти системы могут дискриминировать, нарушать приватность, работать непрозрачно. Ответственный AI — не только этически правильно, но и юридически и коммерчески необходимо.

## Простая интуиция

Нанимающий менеджер, который оценивает только кандидатов из элитных вузов — предвзятый. Если обучить ML-модель на исторических данных найма, где так и работали, — модель унаследует эту предвзятость. Мусор на входе → предвзятость на выходе. И модель не будет знать, что она несправедлива.

## Что это такое

- **Bias (предвзятость)** — систематическая ошибка в пользу/против определённых групп
- **Fairness (справедливость)** — равное обращение с группами. Метрики: equal accuracy, demographic parity
- **Explainability/Interpretability** — возможность объяснить решение модели (SHAP, LIME)
- **Privacy** — защита персональных данных. Методы: federated learning, differential privacy
- **Accountability** — кто несёт ответственность за решения AI?
- **EU AI Act** — регуляторная база ЕС для AI, классифицирует риски

## Как это работает

Проверка fairness — это расчёт метрик отдельно по группам (пол, возраст, регион), а не только в целом по датасету. Пример для модели найма:

| Группа | Accuracy | Hire rate |
|---|---|---|
| Женщины | 0.76 | 0.31 |
| Мужчины | 0.88 | 0.62 |

Большая разница в accuracy и особенно в hire rate — сигнал предвзятости. Модель работает значительно хуже для одной группы, даже если общая accuracy выглядит приемлемо.

Источники предвзятости:
- **Данные**: исторические данные отражают прошлые предубеждения
- **Признаки**: прокси-переменные (zip code → этническая принадлежность, занятость → пол)
- **Разметка**: предвзятость разметчиков передаётся в модель

## Простой пример

Банк обучил модель одобрения кредитов на данных 2010–2020 годов. В этот период женщины реже получали кредиты (историческая предвзятость). Модель воспроизвела паттерн: approval rate для мужчин 68%, для женщин 41%, хотя дефолт-рейтинг одинаков (4%). Юридический отдел требует объяснения каждого отказа (GDPR). SHAP-анализ показывает: признак «тип занятости» вносит наибольший вклад в предвзятость — исторически женщины чаще работали неполный день. После удаления биографических прокси-признаков и rebalancing: approval rate женщин вырос до 59%, дефолт-рейтинг остался 4%.

## Практика

1. Что такое предвзятость (bias) в контексте AI-систем? Как она попадает в модель из исторических данных?
2. Что такое explainability и зачем она нужна в системах, влияющих на людей (кредит, найм, медицина)?
3. Компания обучила модель найма на данных 2000–2020. Accuracy: мужчины 88%, женщины 76%. Hire rate: мужчины 62%, женщины 31%. Дефолт-рейтинг (уволился в первые 3 месяца): одинаков — 18% для обеих групп. Коллега говорит: «Это объективные данные — модель просто отражает реальность». Что именно неправильно в этой логике — и почему одинаковый дефолт-рейтинг делает этот аргумент несостоятельным?
4. В уроке «Bias и Variance» понятие bias означало систематическую ошибку модели относительно истинной функции. Как это техническое понятие соотносится с «bias» в контексте этики AI: в чём сходство и принципиальное различие?
5. В уроке «Метрики классификации» мы изучили precision, recall и accuracy. Почему при проверке fairness недостаточно смотреть только на общий accuracy и какие метрики нужно считать отдельно по группам?

## Краткий итог

- AI-модели наследуют предвзятость из исторических данных — это нужно активно отслеживать
- Fairness, explainability, privacy — три столпа ответственного AI
- Регуляции (EU AI Act, GDPR) делают это юридическим обязательством
- Проверяйте метрики по группам, а не только общий accuracy

## Ключевые термины урока

- **Bias (предвзятость AI)** — возникает из данных (исторические данные отражают прошлые предубеждения) или признаков (zip code как прокси для этнической принадлежности). Отличие от bias в bias-variance: там — систематическая ошибка модели, здесь — дискриминация по защищённому признаку.
- **Fairness (справедливость)** — несколько определений математически несовместимы: нельзя одновременно иметь равный FPR и равный PPV по группам. Приходится выбирать, какое определение важнее для конкретной задачи.
- **Explainability** — в медицине, финансах, HR объяснение решения — юридическое требование (GDPR право на объяснение). SHAP даёт локальные объяснения; feature importance — глобальные.
- **Privacy** — федеративное обучение (данные не покидают устройство) и дифференциальная приватность (шум в параметрах) — два основных технических подхода к защите данных при обучении.
- **EU AI Act** — классифицирует AI по рискам: неприемлемый (запрещено), высокий (медицина, HR, кредиты — строгие требования), ограниченный, минимальный. Нарушение — штраф до 6% мирового оборота компании.

# 01. DataFrame в Python для ML

## Зачем это нужно

Почти любая ML-задача начинается с данных в табличном виде: CSV-файл, выгрузка из SQL, Excel. В Python для работы с таблицами используют `pandas` и его основную структуру — DataFrame.

## Простая интуиция

DataFrame — это таблица, как в Excel. Каждая строка — один объект (один клиент, одна квартира, одна транзакция). Каждая колонка — одно свойство объекта (возраст, площадь, цена). Это главное правило: строка = объект, колонка = свойство.

## Что это такое

**DataFrame** — это таблица данных в Python (библиотека pandas). Строки — объекты, колонки — их атрибуты. Из DataFrame мы выделяем X (признаки) и y (target) для обучения модели.

## Как это работает

Создать DataFrame и посмотреть на него:

```python
import pandas as pd

df = pd.DataFrame({
    "experience_years": [1, 2, 3, 4],
    "english_level": [2, 3, 4, 4],
    "salary": [70000, 90000, 120000, 150000]
})

print(df.head())   # первые строки
print(df.shape)    # (4, 3) — 4 строки, 3 колонки
```

Выделить X и y:

```python
X = df[["experience_years", "english_level"]]
y = df["salary"]
```

Важно: одна колонка — `df["salary"]`, несколько колонок — `df[["col1", "col2"]]`.

## Простой пример

| experience_years | english_level | salary |
|-----------------|---------------|--------|
| 1 | 2 | 70000 |
| 2 | 3 | 90000 |
| 3 | 4 | 120000 |

Три строки = три объекта (кандидата). Три колонки = три свойства. Первые две — признаки (X), третья — target (y).

## Практика

1. В DataFrame что обычно означает одна строка, а что означает одна колонка?
2. Почему перед обучением модели важно сначала посмотреть на данные через `df.head()`?
3. Есть таблица с колонками `age`, `city`, `orders_count`, `bought`. Если `bought` — это target, какие колонки попадут в X?
4. Чем отличается `df["salary"]` от `df[["salary"]]`?
5. Ты открыл CSV-файл и видишь 10 000 строк и 12 колонок. Что ты проверишь первым перед обучением модели?

## Полезные ссылки

Если хочешь быстро добрать практику по `pandas`, начни с этих материалов:

- [Pandas User Guide](https://pandas.pydata.org/docs/user_guide/index.html)
- [10 minutes to pandas](https://pandas.pydata.org/docs/user_guide/10min.html)
- [IO tools: CSV, Excel, Parquet, SQL](https://pandas.pydata.org/docs/user_guide/io.html)
- [API reference](https://pandas.pydata.org/docs/reference/index.html)

## Краткий итог

- Умение читать и преобразовывать DataFrame — основа всего: без этого нельзя дойти до обучения модели.
- Строка = один объект, колонка = одно свойство.
- Три команды дают первый срез данных: сколько строк, какие колонки, как выглядит содержимое — этого достаточно чтобы начать.
- Из DataFrame выделяем X и y: `X = df[["col1", "col2"]]`, `y = df["target"]`.
- Сначала смотри на данные — потом обучай модель.

## Ключевые термины урока

- **DataFrame** — двумерная таблица данных в pandas; основная структура для работы с ML-данными.
- **Series** — одномерный массив в pandas; отдельная колонка DataFrame.
- **df.head()** — вывод первых 5 строк для быстрого первого взгляда на данные.
- **df.shape** — кортеж (число строк, число колонок) DataFrame.
- **df.columns** — список названий колонок DataFrame.

# 02. Pandas на практике

## Зачем это нужно

Pandas — основной инструмент работы с данными в Python. Прежде чем обучать модель, нужно уметь смотреть на данные: выбирать нужные колонки, фильтровать строки, искать странные значения.

## Простая интуиция

Pandas — это как Excel, но в коде. Три главных действия: выбрать колонки (как SELECT в SQL), отфильтровать строки (как WHERE), посмотреть на структуру (сколько строк, какие типы).

## Что это такое

Pandas — библиотека Python для работы с табличными данными. В первом уроке Python-трека мы создали DataFrame — теперь научимся с ним работать.

## Как это работает

```python
import pandas as pd

df = pd.DataFrame({
    "age": [25, 31, 28, 40],
    "city": ["Berlin", "Hamburg", "Berlin", "Munich"],
    "bought": [1, 0, 1, 0]
})

# Смотрим на структуру
df.head()        # первые 5 строк
df.columns       # названия колонок
df.shape         # (4, 3) — 4 строки, 3 колонки

# Выбираем колонки
df["age"]                  # одна колонка (Series)
df[["age", "city"]]        # несколько колонок (DataFrame)

# Фильтруем строки
df[df["age"] > 30]
df[df["city"] == "Berlin"]
df[(df["city"] == "Berlin") & (df["age"] > 26)]  # AND — используй &, не and
```

Важно: при нескольких условиях каждое берём в скобки, `&` вместо `and`, `|` вместо `or`.

## Простой пример

Выделить X и y:

```python
X = df[["age", "city"]]
y = df["bought"]
```

Это аналог SQL: `SELECT age, city FROM df WHERE ... → X`; `SELECT bought → y`.

## Практика

1. Какие три команды Pandas используют для первого взгляда на структуру DataFrame?
2. Чем отличается `df["age"]` от `df[["age"]]` по типу возвращаемого объекта?
3. Есть DataFrame с колонками `age`, `city`, `orders`, `bought`. Напишите фильтр, который оставляет только строки, где `city == "Berlin"` и `age < 30`.
4. В ML-курсе мы узнали, что X — это матрица признаков, а y — целевая переменная. Как выделить X и y из DataFrame `df[["age", "city", "orders", "bought"]]`, если `bought` — это target?
5. У вас есть DataFrame с 500 строками. Вы хотите убедиться, что колонка `bought` не попала в X. Какой командой Pandas вы это проверите?

## Краткий итог

- `df.head()`, `df.shape`, `df.columns` — первый взгляд на данные.
- Одна колонка: `df["col"]`, несколько: `df[["col1", "col2"]]`.
- Фильтрация: `df[df["col"] > value]`, несколько условий через `&` и `|`.
- Сначала изучи данные — только потом думай о модели.

## Ключевые термины урока

- **Индексирование** — доступ к данным через `df["col"]` (Series) или `df[["col1", "col2"]]` (DataFrame).
- **Фильтрация** — отбор строк по условию: `df[df["col"] > value]`.
- **df["col"]** — возвращает колонку как Series.
- **df[["col"]]** — возвращает колонку как DataFrame (двойные скобки).
- **Булева маска** — массив True/False для фильтрации строк по условию.

# 03. Типы данных в Pandas

## Зачем это нужно

Не все колонки можно сразу отдать модели. Строки, пропуски, даты — это всё требует обработки. Понять типы данных заранее — значит избежать ошибок при обучении.

## Простая интуиция

Pandas хранит данные с указанием типа: это число, строка или пропуск. Модель чаще всего ожидает числа. Строка `"Berlin"` — не число. Пустое значение `NaN` — тоже не число. Поэтому до обучения нужно проверить, что лежит в каждой колонке.

## Что это такое

Основные типы в pandas:
- `int64`, `float64` — числа (модели работают напрямую)
- `object` — строки или смешанные данные (нужна обработка)
- `bool` — True/False
- `NaN` / `None` — пропуски (многие модели не умеют их обрабатывать)

Важно: число `25` и строка `"25"` — разные вещи. Pandas может хранить их по-разному.

## Как это работает

```python
import pandas as pd

df = pd.DataFrame({
    "age": [25, 31, None],
    "city": ["Berlin", "Hamburg", "Berlin"],
    "salary": [70000, 90000, 120000]
})

df.dtypes        # типы колонок
df.info()        # общая информация + сколько непустых значений
df.isna().sum()  # сколько пропусков в каждой колонке
```

## Простой пример

Запускаем `df.dtypes` и видим: `age` — float64 (из-за None), `city` — object, `salary` — int64. Отсюда сразу видно: `city` нужно кодировать, `age` нужно обработать пропуск.

## Практика

1. Какие три команды Pandas позволяют проверить типы колонок и найти пропуски?
2. `df.dtypes` показывает, что колонка `age` имеет тип `object`. Что это, вероятнее всего, означает и что нужно сделать перед обучением?
3. В DataFrame есть колонка `salary` со значениями `[70000, "нет данных", 120000]`. Какой тип присвоит Pandas этой колонке и почему?
4. Из урока Pandas на практике мы знаем, как отбирать строки по условию. Как с помощью знания о типах проверить, что ни одна числовая колонка не содержит строку?
5. Вы загрузили CSV и хотите передать данные в модель. Перед выделением X и y вы запускаете `df.info()` и видите, что `city` — тип `object`, а `age` — `float64` с 10 пропусками. Что нужно сделать с каждой из этих колонок?

## Краткий итог

- Числа (`int`, `float`) — модели работают с ними напрямую.
- Строки (`object`) — требуют кодирования (уроки 37–40).
- Игнорировать пропуски нельзя: большинство алгоритмов sklearn не примут NaN и упадут с ошибкой.
- Три команды диагностики за пять секунд покажут, что нужно исправить перед обучением.
- Если таблица выглядит нормально, это ещё не значит, что данные готовы для модели.

## Ключевые термины урока

- **dtype** — тип данных колонки (`int64`, `float64`, `object`); влияет на дальнейшую обработку.
- **NaN** — обозначение пропущенного значения в pandas.
- **df.dtypes** — вывод типов данных всех колонок DataFrame.
- **df.info()** — сводная информация: типы, число non-null значений, память.
- **df.isnull().sum()** — подсчёт числа пропусков в каждой колонке.
