То есть обучение закончилось, и теперь модель просто выдает ответы.

---

## 1. База про данные

### Dataset / Датасет

Это набор данных, на котором мы работаем.

Обычно это таблица, где строки — объекты, а столбцы — их свойства.

### Row / Строка

Одна запись в таблице.

Например, один клиент, один заказ или один товар.

### Column / Колонка

Один признак или одно поле в таблице.

Например: возраст, город, цена.

### Feature / Признак

Это информация, которую мы даём модели на вход.

Именно по признакам модель пытается понять ответ.

### Target / Целевая переменная

Это то, что мы хотим предсказать.

Например: уйдёт клиент или нет, какая будет цена, купит ли человек товар.

### X

Так часто называют все входные признаки модели.

Проще говоря: всё, на что модель смотрит перед ответом.

### y

Так часто называют target — правильный ответ, который модель должна научиться предсказывать.

Например: \`0\` или \`1\`, если это задача “да/нет”.

### Label

Почти то же самое, что target, особенно в задачах классификации.

Это правильный класс или ответ для примера.

### Missing values / Пропуски

Это пустые значения в данных.

Они мешают обучению и часто требуют отдельной обработки.

### Numerical feature / Числовой признак

Признак, который выражен числом.

Например: возраст, зарплата, количество покупок.

### Categorical feature / Категориальный признак

Признак, который описывает категорию, а не число.

Например: город, пол, тип клиента.

---

## 2. Как устроена задача в ML

### Supervised Learning / Обучение с учителем

У модели есть примеры с готовыми правильными ответами.

Она учится по ним предсказывать ответ для новых данных.

### Unsupervised Learning / Обучение без учителя

У модели нет готовых правильных ответов.

Она сама ищет структуру, группы или закономерности в данных.

### Classification / Классификация

Задача, где модель выбирает один из вариантов ответа.

Например: “спам / не спам”, “уйдёт / не уйдёт”.

### Regression / Регрессия

Задача, где модель предсказывает число.

Например: цену квартиры или сумму заказа.

### Clustering / Кластеризация

Задача, где похожие объекты автоматически собираются в группы.

Например: сегменты клиентов по поведению.

### Binary classification

Классификация, где всего два варианта ответа.

Например: “да / нет”.

### Multiclass classification

Классификация, где вариантов ответа больше двух.

Например: определить категорию товара из нескольких классов.

### Baseline

Это очень простое стартовое решение, с которым сравнивают всё остальное.

Нужно, чтобы понять: новая модель реально лучше или просто сложнее.

---

## 3. Разделение данных

### Train set / Обучающая выборка

Часть данных, на которой модель учится.

Это её “учебник”.

### Validation set / Валидационная выборка

Часть данных, на которой мы проверяем модель в процессе работы.

Она помогает сравнивать варианты и настраивать модель.

### Test set / Тестовая выборка

Часть данных для финальной честной проверки.

На ней смотрят, как модель работает на новых данных.

### Split / Разбиение данных

Это разделение датасета на train, validation и test.

Нужно, чтобы обучение и проверка были честными.

### Generalization / Обобщающая способность

Способность модели хорошо работать не только на знакомых данных, но и на новых.

Это одна из главных целей ML.

---

## 4. Как модель учится

### Algorithm / Алгоритм

Это способ, по которому строится модель.

Например: линейная регрессия, дерево решений, нейросеть.

### Parameter / Параметр

Это внутренние настройки модели, которые она подбирает во время обучения.

Именно через них модель “запоминает” найденные закономерности.

### Epoch / Эпоха

Один полный проход модели по всем обучающим данным.

Часто модель обучается много эпох подряд.

### Loss function / Функция потерь

Это число, которое показывает, насколько модель ошибается во время обучения.

Чем меньше loss, тем лучше модель учится на текущем этапе.

### Optimization / Оптимизация

Процесс, в котором модель пытается уменьшить ошибку.

То есть постепенно становится точнее.

### Gradient descent / Градиентный спуск

Один из основных способов уменьшать ошибку модели.

Если очень просто: это метод, который помогает идти в сторону лучшего решения маленькими шагами.

### Learning rate / Скорость обучения

Показывает, насколько большими шагами модель меняет свои настройки.

Слишком большой шаг может мешать обучению, слишком маленький — делать его очень медленным.

---

## 5. Как понять, хороша ли модель

### Metric / Метрика

Это число, по которому мы оцениваем качество модели.

Разные задачи требуют разных метрик.

### Accuracy

Доля правильных ответов из всех ответов.

Полезная метрика, но иногда может обманывать, если классы несбалансированы.

### Precision

Показывает, как часто модель права, когда говорит “да”.

Важна там, где ложные срабатывания дорогие.

### Recall

Показывает, сколько настоящих “да” модель смогла найти.

Важна там, где опасно что-то пропустить.

### F1-score

Это баланс между precision и recall.

Удобно, когда важны оба показателя сразу.

### MAE — Mean Absolute Error

Средняя абсолютная ошибка в числовых задачах.

Показывает, на сколько в среднем модель ошибается.

### MSE — Mean Squared Error

Средняя ошибка, где большие промахи наказываются сильнее.

Часто используется в задачах регрессии.

### RMSE

Это корень из MSE.

Его удобно читать, потому что он ближе к обычному масштабу ошибки.

---

## 6. Что может пойти не так

### Overfitting / Переобучение

Модель слишком хорошо запомнила обучающие данные, но плохо работает на новых.

То есть она “выучила примеры”, а не поняла общий принцип.

### Underfitting / Недообучение

Модель слишком простая или слишком слабо обучена.

Она плохо работает даже на обучающих данных.

### Data leakage / Утечка данных

Ситуация, когда в признаки случайно попадает информация из будущего или почти готовый ответ.

Из-за этого модель кажется умной, хотя на деле проверка нечестная.

### Noise / Шум

Случайные или бесполезные данные, которые не помогают решать задачу.

Они могут мешать модели учиться.

### Outlier / Выброс

Очень необычное значение, сильно отличающееся от остальных.

Иногда это ошибка, а иногда редкий, но реальный случай.

### Imbalanced data / Дисбаланс классов

Ситуация, когда одного класса очень много, а другого очень мало.

Из-за этого модель может научиться игнорировать редкий, но важный класс.

---

## 7. Подготовка данных

### Preprocessing / Предобработка

Подготовка данных перед обучением.

Сюда входит очистка, заполнение пропусков, преобразование типов и другие шаги.

### Encoding / Кодирование категорий

Преобразование текстовых категорий в числовой вид, понятный модели.

Например, чтобы модель могла работать с колонкой “город”.

### One-hot encoding

Способ кодирования категорий, когда каждая категория превращается в отдельную колонку.

Например: Москва, Берлин, Париж — каждая как отдельный признак.

### Scaling / Масштабирование

Приведение числовых признаков к более удобному масштабу.

Это помогает некоторым моделям учиться стабильнее.

### Normalization / Нормализация

Один из способов привести значения к общему диапазону.

Часто используется, когда признаки слишком разные по масштабу.

### Standardization / Стандартизация

Преобразование данных так, чтобы у признака были удобные средние и разброс.

Это тоже помогает ряду моделей работать лучше.

### Feature engineering

Создание или улучшение признаков на основе исходных данных.

Часто хороший feature engineering даёт сильный прирост качества.

### Feature importance

Оценка того, насколько сильно признак влияет на решение модели.

Помогает понять, что для модели действительно важно.

---

## 8. Более глубокий слой

### Neural network / Нейронная сеть

Модель, вдохновлённая идеей работы нейронов.

Хорошо подходит для сложных задач: тексты, картинки, звук.

### Embedding

Способ представить объект в виде набора чисел так, чтобы похожие объекты были ближе друг к другу.

Часто используется для слов, текстов, товаров, пользователей.

### Transformer

Современная архитектура нейросетей, которая особенно хорошо работает с текстом.

Именно на ней построено много LLM.

### LLM — Large Language Model

Большая языковая модель, обученная на огромном количестве текста.

Она умеет понимать запросы и генерировать осмысленный текст.

### Fine-tuning

Дообучение уже готовой модели на своей задаче или своих данных.

Это дешевле и быстрее, чем обучать всё с нуля.

### Prompt

Текстовая инструкция, которую пользователь даёт языковой модели.

От формулировки prompt часто сильно зависит качество ответа.

---

## 9. Продовый слой

### Deployment

Этап, когда модель выкладывают в рабочую систему.

После этого её могут использовать реальные пользователи или сервисы.

### Monitoring

Наблюдение за моделью после запуска.

Нужно, чтобы замечать ошибки, просадку качества и странное поведение.

### Data drift

Ситуация, когда новые данные стали отличаться от тех, на которых модель училась.

Из-за этого качество модели может падать.

### Model drift

Ситуация, когда сама модель со временем начинает работать хуже.

Обычно это видно уже после запуска в реальной среде.

### Retraining

Повторное обучение модели на новых данных.

Нужно, чтобы она не устаревала.

### A/B test

Проверка двух вариантов решения на реальных пользователях.

Помогает понять, какой вариант действительно лучше на практике.`

### Краткие ответы, которые помогут на собеседовании

Ниже — не просто список вопросов, а компактная шпаргалка: под каждым вопросом есть ответ, который достаточно точный, чтобы уверенно объяснить тему на собеседовании без лишней воды.

---

## 1. База данных и постановка задачи

### 1. Что такое признаки, target, \`X\` и \`y\`?

**Признаки** — это входные данные, по которым модель делает предсказание.

**Target** — это то, что модель должна предсказать.

Обычно **\`X\`** — это таблица признаков, а **\`y\`** — колонка с правильными ответами.

Например: возраст и стаж — это признаки, а зарплата — target.

---

### 2. Чем отличается классификация от регрессии?

**Классификация** — это когда модель предсказывает класс или категорию: например, спам / не спам.

**Регрессия** — это когда модель предсказывает число: например, цену квартиры или выручку.

Главное отличие — в типе ответа.

---

### 3. Что такое обучающая, валидационная и тестовая выборки?

**Train** используется для обучения модели.

**Validation** нужна для подбора модели и настройки гиперпараметров.

**Test** используется для финальной честной оценки качества на данных, которые модель не видела.

Такое разделение помогает не обманывать себя при оценке.

---

### 4. Почему нельзя оценивать модель на тех же данных, на которых она обучалась?

Потому что модель может просто запомнить эти данные, а не научиться находить общую закономерность.

Тогда качество будет казаться высоким, но на новых данных модель может работать плохо.

Нам важно проверять не запоминание, а способность обобщать.

---

### 5. Что такое data leakage и почему это опасно?

**Data leakage** — это утечка информации из target или будущего в признаки.

Например, когда в \`X\` случайно попадает колонка, напрямую связанная с ответом.

Это опасно, потому что модель показывает искусственно хорошее качество, которое потом не повторяется в реальной работе.

---

## 2. Метрики

### 6. Что такое accuracy, precision, recall, F1-score? Когда какая метрика важнее?

**Accuracy** — доля правильных ответов среди всех объектов.

**Precision** показывает, насколько модель точна, когда говорит “положительный класс”.

**Recall** показывает, сколько реальных положительных объектов модель смогла найти.

**F1-score** — баланс между precision и recall.

Accuracy подходит при сбалансированных классах, recall важен, когда нельзя пропускать нужные случаи, precision — когда ложные срабатывания дорогие.

---

### 7. Почему accuracy может быть плохой метрикой?

Потому что при дисбалансе классов она может давать ложное ощущение хорошей модели.

Например, если 95% объектов относятся к одному классу, модель может всегда предсказывать только его и получить accuracy 95%, но быть бесполезной.

В таких случаях лучше смотреть precision, recall, F1, ROC-AUC или PR-AUC.

---

### 8. Что такое MAE, MSE, RMSE? Чем они отличаются?

Это метрики для регрессии.

**MAE** — средняя абсолютная ошибка, она показывает, на сколько модель ошибается в среднем.

**MSE** — средняя квадратичная ошибка, сильнее штрафует большие ошибки.

**RMSE** — это корень из MSE, он удобен тем, что возвращается в масштаб исходной величины.

---

### 9. Как выбрать метрику под задачу?

Метрика выбирается не по привычке, а по смыслу бизнеса и типу ошибки.

Если важно не пропускать положительные случаи — нужен recall.

Если важны минимальные ложные срабатывания — precision.

Если задача регрессии и большие ошибки особенно опасны — часто смотрят MSE или RMSE.

Если важна простая интерпретация ошибки — MAE.

---

### 10. Что делать, если метрика на train высокая, а на test заметно хуже?

Это типичный признак переобучения.

Нужно проверить сложность модели, утечки данных, корректность split, качество признаков и объём данных.

Часто помогают упрощение модели, регуляризация, кросс-валидация, больше данных или более аккуратная обработка признаков.

---

## 3. Переобучение и качество модели

### 11. Что такое overfitting и underfitting?

**Overfitting** — модель слишком хорошо запомнила train, но плохо работает на новых данных.

**Underfitting** — модель слишком простая и плохо работает даже на train.

В первом случае модель слишком сложная, во втором — слишком слабая или недообученная.

---

### 12. Как понять, что модель переобучилась?

Обычно качество на train заметно выше, чем на validation или test.

Это значит, что модель хорошо выучила обучающие данные, но плохо обобщает.

Также это видно по нестабильности на новых данных и сильной чувствительности к шуму.

---

### 13. Как можно бороться с переобучением?

Можно упростить модель, уменьшить глубину дерева, добавить регуляризацию, использовать кросс-валидацию, убрать слабые признаки, собрать больше данных.

Для нейросетей ещё применяют dropout и early stopping, но для классического ML чаще важны признаки, регуляризация и контроль сложности модели.

---

### 14. Что такое bias и variance в интуитивном смысле?

**Bias** — ошибка из-за слишком простой модели, которая плохо улавливает закономерность.

**Variance** — ошибка из-за слишком чувствительной модели, которая подстраивается под шум.

Хорошая модель должна находить баланс: не быть слишком простой и не переобучаться на детали train.

---

### 15. Зачем нужна baseline-модель?

Baseline — это простая стартовая точка, с которой сравнивают всё остальное.

Она показывает, действительно ли новая модель даёт улучшение, а не просто выглядит сложнее.

Без baseline легко переоценить результат.

---

## 4. Подготовка данных

### 16. Что делать с пропусками в данных?

Сначала нужно понять, почему пропуски появились и случайны ли они.

Потом можно удалять строки или колонки, заполнять средним, медианой, модой, специальным значением или отдельной категорией.

Иногда сам факт пропуска тоже полезен как признак.

---

### 17. Что делать с категориальными признаками?

Их нужно преобразовать в форму, с которой модель умеет работать.

Часто используют one-hot encoding, ordinal encoding, target encoding или модели, которые сами умеют работать с категориями, например CatBoost.

Выбор зависит от модели и числа уникальных значений.

---

### 18. Когда нужно масштабирование признаков, а когда нет?

Масштабирование нужно моделям, которые чувствительны к масштабу признаков: логистическая регрессия, линейная регрессия, SVM, k-NN, нейросети.

Обычно не нужно для деревьев, random forest и boosting на деревьях.

Главная идея — привести признаки к сопоставимому масштабу там, где это влияет на обучение.

---

### 19. Что такое one-hot encoding? Какие у него ограничения?

One-hot encoding превращает каждую категорию в отдельную бинарную колонку.

Например, признак “город” превращается в набор колонок: Москва, Берлин, Париж.

Ограничение в том, что при большом числе уникальных категорий количество колонок резко растёт, и это делает модель тяжелее и менее устойчивой.

---

### 20. Как понять, какие признаки полезны, а какие нет?

Смотрят на здравый смысл, корреляции, feature importance, permutation importance, SHAP, качество модели с разными наборами признаков.

Также важно понимать предметную область: не все статистически заметные признаки реально допустимы и полезны.

Полезный признак помогает модели улучшать качество без утечки и лишнего шума.

---

## 5. Модели

### 21. Как работает линейная регрессия на базовом уровне?

Линейная регрессия пытается описать зависимость target от признаков через линейную формулу.

Модель подбирает веса признаков так, чтобы предсказания были как можно ближе к реальным значениям.

Это простая и интерпретируемая модель для регрессии.

---

### 22. Как работает логистическая регрессия и почему она называется регрессией, хотя решает классификацию?

Логистическая регрессия сначала считает линейную комбинацию признаков, а потом пропускает её через сигмоиду, чтобы получить вероятность класса.

После этого вероятность переводится в класс по порогу.

Она называется регрессией потому, что внутри у неё линейная модель, но применяется она для классификации.

---

### 23. Как работает Decision Tree?

Decision Tree последовательно делит данные по условиям на признаки, например: возраст < 30, доход > 100000 и так далее.

В каждом узле дерево выбирает разбиение, которое лучше всего разделяет данные.

В итоге предсказание получается по пути от корня до листа.

---

### 24. Почему одно дерево решений часто переобучается?

Потому что дерево может выучить слишком много частных правил под конкретный train.

Если его не ограничивать по глубине и минимальному числу объектов в листе, оно начинает подстраиваться под шум.

Из-за этого на новых данных качество падает.

---

### 25. Что такое Random Forest и чем он лучше одного дерева?

Random Forest — это ансамбль из множества деревьев решений.

Каждое дерево обучается на случайной подвыборке данных и признаков, а итоговое предсказание получается через голосование или усреднение.

Это делает модель устойчивее и обычно уменьшает переобучение по сравнению с одним деревом.

---

### 26. Что такое Gradient Boosting в интуитивном смысле?

Это ансамбль, где деревья строятся последовательно, и каждое новое дерево пытается исправить ошибки предыдущих.

То есть модель обучается шаг за шагом, улучшая текущее решение.

Boosting часто даёт очень сильное качество на табличных данных.

---

### 27. Чем примерно отличаются XGBoost, LightGBM и CatBoost?

Все три — реализации gradient boosting на деревьях.

**XGBoost** — сильная и универсальная классика.

**LightGBM** часто быстрее и хорошо работает на больших данных.

**CatBoost** особенно удобен, когда много категориальных признаков, потому что умеет хорошо работать с ними из коробки.

---

### 28. Когда ты бы выбрал простую модель, а когда более сложную?

Простую модель стоит брать, когда важны интерпретируемость, скорость запуска, baseline или данных мало.

Сложную модель имеет смысл брать, если она реально даёт прирост качества и это важно для задачи.

Выбор всегда должен идти от задачи, данных и цены ошибки, а не от желания взять “модную” модель.

---

## 6. Практика и инженерный слой

### 29. Как бы ты решал задачу ML от начала до конца: от датасета до результата?

Сначала я бы понял постановку задачи и target, потом изучил данные: типы признаков, пропуски, распределения, дисбаланс.

Дальше сделал бы preprocessing, разделил данные на train/validation/test, выбрал baseline и подходящую метрику.

После этого обучил бы несколько моделей, сравнил результаты, проверил переобучение, интерпретировал выводы и выбрал лучший вариант.

В конце — сохранил пайплайн и оформил результат так, чтобы его можно было воспроизвести.

---

### 30. Расскажи про свой ML-проект: какая была задача, какие данные, какую метрику выбрал, какие модели пробовал и почему выбрал итоговую?

Здесь важно отвечать по структуре.

Нужно коротко описать задачу, данные, preprocessing, выбор метрики, baseline, модели, сравнение результатов и финальный вывод.

Хороший ответ показывает не только то, что ты “делал проект”, но и что ты понимаешь, почему принимал именно такие решения.

---

## Как использовать эту статью для подготовки

Лучший способ — не просто читать ответы, а проговаривать их вслух.

Для каждого вопроса попробуй сделать 3 шага:

1. дать короткое определение;
2. объяснить, зачем это нужно на практике;
3. привести маленький пример.

Так ответы перестанут быть заученными и начнут звучать как твои.

Следующим шагом можно собрать вторую статью: **“Топ-30 вопросов по ML Engineer Junior — но уже в формате живых ответов на собеседовании”**.`

Ты — Senior Prompt Engineer.

Твоя задача — превращать краткие, размытые или неструктурированные запросы пользователя в полноценные, универсальные и инженерно-точные промты, которые можно напрямую использовать в любом AI-агенте (ChatGPT, Claude, и др.).

Ты создаешь не текст, а "исполняемый навык".

---

# 🧠 РЕЖИМ МЫШЛЕНИЯ

Ты всегда:

- думаешь как инженер, а не как копирайтер
- выявляешь реальную цель пользователя (а не формулировку)
- декомпозируешь задачу до уровня действий агента
- устраняешь неоднозначности
- проектируешь поведение агента, а не просто описание
- проверяешь промт на применимость в реальном использовании

---

# ⚠️ ОБРАБОТКА ВХОДА

Если задача:

- размытая
- абстрактная
- без контекста
- или имеет несколько трактовок

👉 ты НЕ генерируешь финальный промт сразу

👉 ты сначала задаешь уточняющие вопросы (минимально достаточные)

👉 и только после этого строишь финальный результат

Если данных достаточно — сразу переходишь к генерации

---

# 🧩 СТРУКТУРА ОТВЕТА

Ты ВСЕГДА отвечаешь в следующем формате:

---

# 🎯 Цель навыка

Кратко и точно: какой результат должен давать агент

---

# 🧠 Декомпозиция навыка

Разложи, что именно должен уметь агент:

- какие шаги делает
- какие решения принимает
- какие проверки выполняет

---

# ⚙️ Готовый промт (универсальный)

Сформируй промт, который можно сразу вставить в любой LLM:

---

Роль:
[конкретная роль агента]

Контекст:
[что важно знать, включая домен, ограничения, уровень пользователя]

Задача:
[четкое описание задачи]

Входные данные:
[что пользователь будет передавать]

Алгоритм работы:
[пошаговая логика действий агента]

Правила:

- без воды
- без галлюцинаций
- проверка логики
- если данных недостаточно — задать уточняющие вопросы
- не делать предположений без явного указания

Формат ответа:
[структура результата]

Критерии качества:

- результат применим на практике
- нет логических дыр
- соответствует задаче пользователя
- легко вставляется и используется

---

# 🔁 Пример использования

Покажи:

1. что пишет пользователь
2. какой результат он получает

---

# 🧪 (опционально) Улучшения

Если есть — предложи:

- как усилить промт
- как расширить навык
- где могут быть ограничения

---

# ❌ ЗАПРЕТЫ

- не упрощать задачу
- не генерировать "красивый текст ради текста"
- не терять смысл задачи

👉 пользователь копирует его

👉 вставляет в любой AI

👉 и получает ожидаемый результат без доработок`

    /* ─── MARKDOWN PARSER ─── */
    function mdToHtml(md) {
      if (!md) return '';
      md = md.replace(/^---[\r\n][\s\S]*?[\r\n]---[\r\n]?/, '');
      const cbs = [];
      md = md.replace(/```(\w*)\r?\n([\s\S]*?)```/g, (_, lang, code) => { cbs.push({ lang: lang.trim(), code: code.trimEnd() }); return '\x01CB' + (cbs.length - 1) + '\x01'; });
      const lines = md.split(/\r?\n/), out = []; let i = 0;
      while (i < lines.length) {
        const raw = lines[i], line = raw.trim();
        if (!line) { i++; continue; }
        if (line.startsWith('\x01CB')) { out.push(line); i++; continue; }
        const hm = line.match(/^(#{1,6})\s+([\s\S]+)/);
        if (hm) { out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`); i++; continue; }
        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) { out.push('<hr>'); i++; continue; }
        if (line.startsWith('>')) {
          const qs = [];
          while (i < lines.length && lines[i].trim().startsWith('>')) { qs.push(lines[i].trim().replace(/^>\s?/, '')); i++; }
          out.push(`<blockquote><p>${inl(qs.join(' '))}</p></blockquote>`); continue;
        }
        if (/^[-*+]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*+]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^[-*+]\s/, ''))}</li>`); i++; }
          out.push(`<ul>${items.join('')}</ul>`); continue;
        }
        if (/^\d+[.)]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+[.)]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^\d+[.)]\s/, ''))}</li>`); i++; }
          out.push(`<ol>${items.join('')}</ol>`); continue;
        }
        if (line.startsWith('|') && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
          const trows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) { trows.push(lines[i].trim()); i++; }
          if (trows.length >= 2) {
            const hdr = trows[0].split('|').slice(1, -1).map(c => c.trim());
            const body = trows.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
            let th = '<div class="tw"><table><thead><tr>' + hdr.map(h => `<th>${inl(h)}</th>`).join('') + '</tr></thead><tbody>';
            body.forEach(row => { th += '<tr>' + row.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>'; });
            out.push(th + '</tbody></table></div>');
          }
          continue;
        }
        const pls = [];
        while (i < lines.length) {
          const l = lines[i].trim();
          if (!l || /^#{1,6}\s/.test(l) || /^(-{3,}|\*{3,})$/.test(l) || l.startsWith('>') || /^[-*+]\s/.test(l) || /^\d+[.)]\s/.test(l) || l.startsWith('|') || l.startsWith('\x01CB')) break;
          pls.push(l); i++;
        }
        if (pls.length) out.push(`<p>${inl(pls.join(' '))}</p>`);
      }
      let html = out.join('\n');
      html = html.replace(/\x01CB(\d+)\x01/g, (_, n) => {
        const { lang, code } = cbs[+n];
        return `<div class="cb">${lang ? `<div class="cbl">${esc(lang)}</div>` : ''}<button class="cb-copy" type="button">copy</button><pre><code>${esc(code)}</code></pre></div>`;
      });
      return html;
    }
    function inl(text) {
      if (!text) return '';
      const ics = [];
      text = text.replace(/`([^`]+)`/g, (_, c) => { ics.push(c); return '\x02IC' + (ics.length - 1) + '\x02'; });
      text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="nl" target="_blank">$1</a>');
      text = text.replace(/\x02IC(\d+)\x02/g, (_, n) => `<code class="ic">${esc(ics[+n])}</code>`);
      return text;
    }
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    /* ─── INIT ─── */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.sb-tab').forEach(b => {
        b.classList.toggle('act', b.dataset.tab === CUR_TAB);
      });
      buildSb(); setupSearch();
      document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.cb-copy');
        if (!btn) return;
        const codeEl = btn.closest('.cb')?.querySelector('pre code');
        if (!codeEl) return;
        const text = codeEl.textContent || '';
        let ok = false;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            ok = true;
          }
        } catch (err) { }
        if (!ok) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { ok = document.execCommand('copy'); } catch (err) { ok = false; }
          document.body.removeChild(ta);
        }
        const prev = btn.textContent;
        btn.textContent = ok ? 'copied' : 'error';
        if (ok) btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = prev;
          btn.classList.remove('done');
        }, 1200);
      });
      let saved = 'home';
      try { saved = localStorage.getItem('mlroad-cur') || 'home'; } catch (e) { }
      initRp();
      nav(saved);
    });


    /* ─── RIGHT PANEL ─── */

    const CAT_CLASSES = {
      'ML Core': 'rpi-cat-mlcore',
      'Learning Resources': 'rpi-cat-learning',
      'Engineering Tools': 'rpi-cat-engineering',
      'Prompt Library': 'rpi-cat-prompt'
    };

    const CAT_LABELS = {
      'ML Core': 'ML Core',
      'Learning Resources': 'Learning',
      'Engineering Tools': 'Tools',
      'Prompt Library': 'Prompts'
    };

    let rpFilter = 'all';
    let rpOpen = false;

    function catClass(cat) {
      return CAT_CLASSES[cat] || 'rpi-cat-other';
    }

    function buildRp() {
      const cats = ['all', ...new Set(RIGHT_PANEL_DATA.map(i => i.category))];
      const filter = document.getElementById('rp-filter');
      filter.innerHTML = cats.map(c =>
        `<button class="rptab${c === rpFilter ? ' act' : ''}" data-cat="${c}" onclick="filterRp('${c}')">${c === 'all' ? 'ALL' : CAT_LABELS[c] || c}</button>`
      ).join('');
      renderRpList();
    }

    function renderRpList() {
      const items = rpFilter === 'all'
        ? RIGHT_PANEL_DATA
        : RIGHT_PANEL_DATA.filter(i => i.category === rpFilter);
      const sorted = [...items].sort((a, b) => a.priority - b.priority);
      document.getElementById('rp-list').innerHTML = sorted.map(item =>
        `<div class="rpi" id="rpi-${item.id}" onclick="openRpItem('${item.id}')">
          <div class="rpi-top">
            <span class="rpi-cat ${catClass(item.category)}">${CAT_LABELS[item.category] || item.category}</span>
            <span class="rpi-t">${item.title}</span>
          </div>
          <div class="rpi-sum">${item.summary}</div>
        </div>`
      ).join('');
    }

    function filterRp(cat) {
      rpFilter = cat;
      document.querySelectorAll('.rptab').forEach(t => t.classList.toggle('act', t.dataset.cat === cat));
      renderRpList();
    }

    function openRpItem(id) {
      navKb(id);
    }

    function updateRpBtn() {
      const btn = document.getElementById('rp-btn');
      if (!btn) return;
      if (rpOpen) {
        btn.innerHTML = '◂ <span class="rp-toggle-lbl">Скрыть материалы</span>';
        btn.classList.add('act');
      } else {
        btn.innerHTML = '▸ <span class="rp-toggle-lbl">Показать материалы</span>';
        btn.classList.remove('act');
      }
    }

    function toggleRp() {
      rpOpen = !rpOpen;
      const panel = document.getElementById('rp');
      if (rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
      try { localStorage.setItem('mlroad-rp', rpOpen ? '1' : '0'); } catch(e) {}
    }

    function initRp() {
      buildRp();
      let saved = '1';
      try { saved = localStorage.getItem('mlroad-rp') ?? '1'; } catch(e) {}
      rpOpen = saved !== '0';
      const panel = document.getElementById('rp');
      if (rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
    }

  </script>
</body>

</html>
