# 65. Мониторинг модели

## Зачем это нужно

Деплой модели — не финал, а начало. Модель в production работает с реальными данными, которые меняются. Без мониторинга вы не узнаете, что модель деградировала, пока не получите жалобы пользователей или бизнес-потери.

## Простая интуиция

Представьте пилота самолёта. Он не просто взлетает и спит до посадки — он постоянно смотрит на приборы. Температура двигателя, высота, скорость — все под контролем. Если что-то выходит за допустимые границы — сразу сигнал. Мониторинг ML — те же «приборы» для модели.

## Что это такое

- **Мониторинг производительности** — отслеживание метрик модели (accuracy, F1) с течением времени
- **Мониторинг данных** — отслеживание изменений в распределении входных данных
- **Feature drift** — изменение распределения отдельных признаков
- **Prediction drift** — изменение распределения предсказаний модели
- **Latency мониторинг** — время ответа API
- **Алертинг** — автоматические уведомления при превышении порогов

## Как это работает

```python
import numpy as np
import pandas as pd
from scipy import stats

# Симуляция мониторинга входных данных
def check_feature_drift(reference_data, current_data, threshold=0.05):
    """Проверяем дрейф признаков с помощью KS-теста"""
    results = {}
    for col in reference_data.columns:
        stat, pvalue = stats.ks_2samp(reference_data[col], current_data[col])
        results[col] = {"ks_stat": stat, "p_value": pvalue, "drift": pvalue < threshold}
    return results

# Пример: обучающие данные vs данные прошлого месяца
np.random.seed(42)
train_data = pd.DataFrame({
    "age": np.random.normal(35, 10, 1000),
    "income": np.random.normal(60000, 15000, 1000)
})

# Имитируем дрейф
current_data = pd.DataFrame({
    "age": np.random.normal(40, 10, 500),    # среднее изменилось
    "income": np.random.normal(60000, 15000, 500)  # не изменилось
})

drift_report = check_feature_drift(train_data, current_data)
for feature, info in drift_report.items():
    status = "ДРЕЙФ!" if info["drift"] else "OK"
    print(f"{feature}: p={info['p_value']:.4f} -> {status}")
```

## Как это связано с ML

Мониторинг — это то, что отличает ML-систему от одноразового скрипта. Хорошая система мониторинга включает: дашборд с ключевыми метриками, алерты при деградации, логирование предсказаний для будущего переобучения, отчёты о качестве данных.

## Практика

**Вопрос 1:** Что нужно мониторить в первую очередь для ML-модели в production?
- A) Время обучения
- B) Метрики качества модели и распределение входных данных
- C) Размер файла модели
- D) Количество признаков
**Ответ:** B) Метрики качества и распределение данных — первое сигнализирует о деградации, второе объясняет причину.

**Вопрос 2:** Модель предсказывает отток клиентов. Как узнать, что она деградировала, если реальные метки приходят с задержкой в месяц?
- A) Подождать месяц
- B) Мониторить распределение предсказаний (prediction drift) — изменение доли положительных предсказаний
- C) Переобучать каждую неделю профилактически
- D) Не мониторить — только реагировать на жалобы
**Ответ:** B) Prediction drift — если доля предсказаний «отток» резко изменилась, это сигнал проблемы ещё до получения реальных меток.

**Вопрос 3:** KS-тест для мониторинга показал p-value = 0.002 для признака "возраст". Что это означает?
- A) Всё в порядке, значение в норме
- B) Статистически значимый дрейф: распределение возраста изменилось
- C) Нужно добавить больше данных
- D) Модель переобучилась
**Ответ:** B) Статистически значимый дрейф — p-value < 0.05 говорит, что распределение признака значительно изменилось по сравнению с reference.

**Вопрос 4:** Что логировать для последующего переобучения?
- A) Только входные данные
- B) Входные данные + предсказания + реальные метки (как только они становятся доступны)
- C) Только метрики качества
- D) Только аномальные предсказания
**Ответ:** B) Входные данные + предсказания + метки — это формирует новый датасет для переобучения модели.

**Вопрос 5:** Модель мониторит продажи. Обнаружен дрейф в декабре каждого года. Что делать?
- A) Всегда переобучать при дрейфе
- B) Проверить: если дрейф сезонный — обучить модель на данных с учётом сезонности
- C) Отключить мониторинг в декабре
- D) Поменять алгоритм
**Ответ:** B) Учесть сезонность — не каждый дрейф является проблемой; предсказуемый сезонный дрейф нужно включить в модель как признак.

## Краткий итог

- Мониторинг модели — это непрерывный процесс после деплоя, не финальный шаг
- Мониторьте: качество модели, распределение признаков, предсказания, latency
- KS-тест — простой способ автоматически обнаруживать feature drift
- Логируйте всё: входные данные, предсказания, метки — для переобучения

# 66. Почему модель деградирует

## Зачем это нужно

Модели стареют. Даже идеально обученная модель через год может работать значительно хуже. Понимание механизмов деградации помогает строить устойчивые системы и правильно настраивать стратегии переобучения.

## Простая интуиция

Представьте прогноз погоды, обученный на данных 1990-х годов. Климат изменился, города разрослись, инструменты измерения улучшились. Модель «устарела» не потому что она плохая, а потому что мир изменился. Модели ML — то же самое.

## Что это такое

- **Model decay / Model staleness** — постепенное ухудшение качества модели в production
- **Concept drift** — изменение самой зависимости между X и y (поведение пользователей меняется)
- **Data drift** — изменение распределения входных данных X
- **Data quality issues** — деградация качества входных данных (пустые поля, неправильные типы)
- **Infrastructure drift** — изменения в инфраструктуре, влияющие на preprocessing

## Как это работает

```python
import numpy as np
import matplotlib.pyplot as plt

# Симуляция деградации модели со временем
np.random.seed(42)
months = list(range(1, 13))

# Сценарий 1: Плавная деградация (data drift)
accuracy_data_drift = [0.92, 0.91, 0.90, 0.89, 0.87, 0.85, 0.83, 0.80, 0.78, 0.75, 0.73, 0.70]

# Сценарий 2: Резкая деградация (concept drift — событие изменило поведение)
accuracy_concept_drift = [0.92] * 6 + [0.75, 0.72, 0.70, 0.68, 0.67, 0.65]

# Сценарий 3: Сезонная деградация
seasonal = [0.92, 0.91, 0.90, 0.88, 0.86, 0.83, 0.80, 0.82, 0.85, 0.89, 0.91, 0.78]

for month, acc in zip(months, accuracy_data_drift):
    status = "⚠️ АЛЕРТ" if acc < 0.80 else "OK"
    print(f"Месяц {month}: accuracy={acc:.2f} {status}")
```

## Как это связано с ML

Деградация — неизбежна, но предсказуема. Стратегии борьбы: (1) регулярное переобучение по расписанию; (2) переобучение по триггеру при обнаружении drift; (3) онлайн-обучение (continuous learning). Выбор стратегии зависит от скорости изменений в данных.

## Практика

**Вопрос 1:** Модель для выдачи кредитов работала хорошо, но после экономического кризиса её точность упала. Что произошло?
- A) Ошибка в коде
- B) Concept drift: связь между признаками и кредитоспособностью изменилась в условиях кризиса
- C) Данные были недостаточно большими
- D) Переобучение
**Ответ:** B) Concept drift — экономический кризис изменил поведение заёмщиков; старые паттерны больше не работают.

**Вопрос 2:** Какой тип деградации обычно происходит постепенно?
- A) Concept drift
- B) Data drift — распределение признаков меняется медленно
- C) Infrastructure drift
- D) Data quality issues
**Ответ:** B) Data drift — это медленное изменение; concept drift часто бывает резким (событие изменило всё).

**Вопрос 3:** Как часто нужно переобучать модель?
- A) Один раз при создании
- B) Зависит от скорости изменений данных: от ежедневно (новости, финансы) до ежегодно (стабильные домены)
- C) Раз в год
- D) Каждый час
**Ответ:** B) Зависит от домена — быстро меняющиеся данные требуют частого переобучения; стабильные — реже.

**Вопрос 4:** Вы заметили, что доля NULL значений в признаке "email" выросла с 1% до 30% за месяц. Что это?
- A) Concept drift
- B) Data quality issue — вероятно, изменилась система сбора данных или баг в pipeline
- C) Нормальная вариация
- D) Data drift
**Ответ:** B) Data quality issue — резкий рост пропущенных значений сигнализирует о проблеме в pipeline, а не об изменении данных.

**Вопрос 5:** Что такое «онлайн-обучение» как стратегия борьбы с деградацией?
- A) Обучение через интернет
- B) Постепенное обновление модели на каждом новом примере или mini-batch без полного переобучения
- C) Обучение на данных из веб-сайтов
- D) Обучение в real-time в браузере
**Ответ:** B) Постепенное обновление модели — модель обновляется инкрементально по мере поступления новых данных.

## Краткий итог

- Все модели деградируют со временем — это нормально и неизбежно
- Concept drift (изменение зависимости) опаснее и сложнее, чем data drift (изменение данных)
- Стратегии: переобучение по расписанию, по триггеру, онлайн-обучение
- Мониторинг качества данных (пропуски, типы) важен наравне с мониторингом метрик

# 67. Как тестировать ML-системы

## Зачем это нужно

ML-системы — это не только ML-код: это данные, preprocessing, бизнес-логика, API. Традиционное тестирование ПО недостаточно. ML-системы требуют особых подходов к тестированию, учитывающих вероятностную природу моделей и зависимость от данных.

## Простая интуиция

Обычный тест проверяет: «при входе A всегда получаем B». В ML всё иначе: «при входе A получаем B примерно в 90% случаев». Тестировать нужно не только код, но и поведение модели: не пропускает ли она определённый тип объектов? Не слишком ли уверена в очевидных случаях?

## Что это такое

- **Unit tests** — тестирование отдельных функций preprocessing, feature engineering
- **Integration tests** — тестирование полного pipeline от сырых данных до предсказания
- **Data validation tests** — проверка схемы, типов, диапазонов входных данных
- **Model behavior tests** — проверка специфических свойств модели (например, если доход вырос — score не должен упасть)
- **Regression tests** — модель не ухудшилась после изменений

## Как это работает

```python
import pytest
import numpy as np
from sklearn.pipeline import Pipeline
from sklearn.preprocessing import StandardScaler
from sklearn.linear_model import LogisticRegression

# Обучаем тестовую модель
from sklearn.datasets import make_classification
X, y = make_classification(n_samples=500, random_state=42)
model = Pipeline([("scaler", StandardScaler()), ("clf", LogisticRegression())])
model.fit(X, y)

# Unit test: проверяем preprocessing
def test_scaler_output_range():
    scaler = StandardScaler()
    X_test = np.array([[1, 2], [3, 4], [5, 6]])
    X_scaled = scaler.fit_transform(X_test)
    # Стандартизированные данные должны иметь mean~0, std~1
    assert abs(X_scaled.mean()) < 0.01, "Среднее должно быть ~0"

# Data validation test
def test_input_validation():
    X_valid = np.random.randn(10, X.shape[1])
    assert X_valid.shape[1] == X.shape[1], "Неправильное количество признаков"
    assert not np.any(np.isnan(X_valid)), "NaN в входных данных"

# Model behavior test: монотонность
def test_monotonicity():
    # Если признак 0 вырастает, предсказание должно расти (для позитивных признаков)
    base = np.zeros((1, X.shape[1]))
    high_val = base.copy()
    high_val[0, 0] = 3.0  # большое значение первого признака
    # Просто проверяем, что модель возвращает валидное предсказание
    pred = model.predict_proba(high_val)
    assert pred.shape == (1, 2), "Неверная форма output"
    assert abs(pred.sum() - 1.0) < 1e-6, "Вероятности должны суммироваться в 1"

# Regression test: quality не упала
def test_minimum_quality():
    from sklearn.metrics import accuracy_score
    y_pred = model.predict(X[:100])
    acc = accuracy_score(y[:100], y_pred)
    assert acc > 0.7, f"Accuracy {acc} ниже минимального порога 0.7"
```

## Как это связано с ML

Тестирование ML — часть MLOps практик. CI/CD pipeline для ML должен запускать все тесты перед деплоем новой версии модели. Основные типы тестов: (1) код — как в обычном ПО; (2) данные — схема, качество; (3) модель — поведение, качество.

## Практика

**Вопрос 1:** Что проверяет data validation test?
- A) Качество предсказания модели
- B) Что входные данные соответствуют ожидаемой схеме: типы, диапазоны, отсутствие NaN
- C) Скорость inference
- D) Параметры модели
**Ответ:** B) Схема и качество входных данных — если данные не соответствуют ожиданиям, модель вернёт бессмысленные предсказания.

**Вопрос 2:** Что такое model behavior test?
- A) Проверка скорости обучения
- B) Проверка специфических свойств предсказаний (монотонность, инвариантность к шуму)
- C) Сравнение двух моделей
- D) Тест на переобучение
**Ответ:** B) Специфические свойства предсказаний — например, кредитная модель должна предсказывать лучший score при более высоком доходе.

**Вопрос 3:** Зачем нужны regression tests для ML?
- A) Для проверки математических операций
- B) Убедиться, что обновление кода/модели не ухудшило качество по сравнению с предыдущей версией
- C) Для тестирования регрессионных задач
- D) Для проверки data leakage
**Ответ:** B) Проверка отсутствия деградации — regression test гарантирует, что "улучшение" не сломало что-то работавшее.

**Вопрос 4:** Почему традиционные unit tests не всегда подходят для ML?
- A) Они слишком медленные
- B) ML-модели вероятностны: выход не детерминирован, нужно проверять диапазоны и свойства
- C) pytest не поддерживает numpy
- D) ML-код слишком сложный
**Ответ:** B) Вероятностная природа — нельзя проверить конкретный результат; нужно проверять свойства (вероятность > 0.5 для явных случаев).

**Вопрос 5:** Что должно происходить при провале теста data validation в production pipeline?
- A) Продолжить с предупреждением
- B) Остановить pipeline и создать алерт — плохие данные дадут плохие предсказания
- C) Автоматически исправить данные
- D) Переобучить модель
**Ответ:** B) Остановить и создать алерт — лучше не дать предсказание, чем дать заведомо неправильное из-за плохих данных.

## Краткий итог

- ML-системы требуют: unit tests кода, data validation, model behavior tests, regression tests
- Data validation — проверяйте схему, типы и диапазоны входных данных
- Model behavior tests проверяют специфические свойства предсказаний
- Интегрируйте тесты в CI/CD: перед каждым деплоем все тесты должны проходить

# 68. A/B тестирование в ML

## Зачем это нужно

Вы обучили новую модель, которая показывает лучшие метрики на тесте. Но как убедиться, что она реально лучше в production? A/B тест — научный способ сравнить две версии системы на реальных пользователях и принять решение на основе данных, а не предположений.

## Простая интуиция

Аптека хочет проверить, помогает ли новое лекарство лучше старого. Одной группе пациентов дают старое, другой — новое. Сравнивают результаты. В ML то же самое: одним пользователям показываем предсказания модели A (контроль), другим — модели B (эксперимент).

## Что это такое

- **A/B тест** — контролируемый эксперимент, где A = контрольная группа (старая модель), B = экспериментальная (новая)
- **Трафик сплит** — случайное разделение пользователей: например, 90% к A, 10% к B
- **Статистическая значимость** — p-value < 0.05 говорит, что разница не случайна
- **Shadow mode** — новая модель делает предсказания, но они не показываются пользователям (логируются для анализа)
- **Canary deployment** — постепенное увеличение трафика к новой модели: 1% → 5% → 20% → 100%

## Как это работает

```python
import numpy as np
from scipy import stats

# Симуляция A/B теста для модели рекомендаций
# Метрика: CTR (click-through rate)
np.random.seed(42)

# Модель A (старая): конверсия 10%
n_users_A = 5000
clicks_A = np.random.binomial(1, 0.10, n_users_A)

# Модель B (новая): конверсия 11%
n_users_B = 5000
clicks_B = np.random.binomial(1, 0.11, n_users_B)

ctr_A = clicks_A.mean()
ctr_B = clicks_B.mean()
print(f"CTR модели A: {ctr_A:.4f}")
print(f"CTR модели B: {ctr_B:.4f}")
print(f"Относительное улучшение: {(ctr_B - ctr_A)/ctr_A:.1%}")

# Тест на статистическую значимость (z-test для пропорций)
stat, pvalue = stats.proportions_ztest([clicks_B.sum(), clicks_A.sum()],
                                        [n_users_B, n_users_A])
print(f"\np-value: {pvalue:.4f}")
if pvalue < 0.05:
    print("Разница статистически значима! Можно деплоить модель B")
else:
    print("Разница незначима. Нужно больше данных или модель B не лучше")
```

## Как это связано с ML

A/B тест — это стандарт в production ML. Метрики на тестовой выборке не гарантируют улучшения в production: распределение prod-данных отличается, бизнес-метрики (CTR, конверсия) не всегда коррелируют с ML-метриками (accuracy). A/B тест даёт честный ответ.

## Практика

**Вопрос 1:** Зачем нужен A/B тест, если новая модель показывает лучшие метрики на тестовой выборке?
- A) A/B тест не нужен — метрики на тесте достаточно
- B) Метрики на тесте не всегда коррелируют с бизнес-метриками в production на реальных пользователях
- C) A/B тест быстрее, чем обучение модели
- D) Тестовая выборка всегда нерепрезентативна
**Ответ:** B) Метрики на тесте ≠ бизнес-метрики — например, более точная модель может предлагать менее интересные рекомендации.

**Вопрос 2:** Что такое shadow mode?
- A) Секретное обучение модели
- B) Новая модель делает предсказания параллельно, но они не используются — только логируются для анализа
- C) Обучение без GPU
- D) Тестирование на синтетических данных
**Ответ:** B) Параллельные предсказания без показа пользователям — позволяет оценить новую модель без риска негативного эффекта.

**Вопрос 3:** p-value = 0.12 в A/B тесте. Можно ли деплоить модель B?
- A) Да — модель B лучше
- B) Нет — разница статистически незначима; нужно собрать больше данных или принять H0
- C) Да, если бизнес-метрика выросла
- D) Зависит от размера выборки
**Ответ:** B) Незначимый результат — p-value > 0.05 означает, что наблюдаемая разница может быть случайной.

**Вопрос 4:** Что такое canary deployment в контексте A/B тестирования?
- A) Тестирование на производственных данных без A/B разделения
- B) Постепенное увеличение трафика к новой модели: 1% → 5% → 50% → 100%
- C) Деплой модели для одного клиента
- D) Автоматический rollback при ошибках
**Ответ:** B) Постепенное увеличение трафика — позволяет обнаружить проблемы на малом трафике до полного переключения.

**Вопрос 5:** Как долго нужно проводить A/B тест?
- A) Ровно одну неделю
- B) До достижения статистической мощности (минимального числа пользователей) и не менее одного полного бизнес-цикла
- C) Пока не наберётся 1000 пользователей
- D) Один день
**Ответ:** B) До статистической мощности и полного цикла — слишком короткий тест даёт ложные результаты; нужно учесть сезонность и недельные паттерны.

## Краткий итог

- A/B тест — единственный надёжный способ доказать улучшение модели на реальных пользователях
- Метрики на тестовой выборке не заменяют A/B тест: бизнес-метрики могут вести себя иначе
- Shadow mode и canary deployment снижают риск при выкатке новой модели
- Ждите статистической значимости (p-value < 0.05) и полного бизнес-цикла перед решением

# 69. Чем ML отличается от Deep Learning

## Зачем это нужно

Deep Learning — это не замена ML, а его подмножество. Понимание разницы помогает выбрать правильный инструмент. DL не всегда лучше — для многих задач классический ML быстрее, интерпретируемее и требует меньше данных.

## Простая интуиция

Классический ML — это как работа с конструктором LEGO: вы сами выбираете нужные детали (признаки) и собираете конструкцию. Deep Learning — 3D-принтер: вы подаёте сырой материал (пиксели, текст), а он сам «лепит» нужную форму, автоматически создавая признаки.

## Что это такое

- **Classical ML** — алгоритмы, требующие ручного создания признаков (feature engineering): Random Forest, XGBoost, SVM, логистическая регрессия
- **Deep Learning** — нейросети с множеством слоёв, автоматически извлекающие иерархические признаки из сырых данных
- Ключевое отличие: в DL признаки извлекаются автоматически, в ML — вручную
- **Когда DL лучше**: изображения, текст, аудио, видео; много данных (>100K примеров)
- **Когда ML лучше**: табличные данные; мало данных; нужна интерпретируемость; ограниченные ресурсы

## Как это работает

```python
# Сравнение ML и DL подходов на одной задаче

# Классический ML (для табличных данных)
from sklearn.ensemble import GradientBoostingClassifier
from sklearn.datasets import make_classification
from sklearn.model_selection import train_test_split

X, y = make_classification(n_samples=1000, n_features=20, random_state=42)
X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)

# ML: быстро, работает на малых данных
ml_model = GradientBoostingClassifier(n_estimators=100)
ml_model.fit(X_train, y_train)
print(f"Gradient Boosting: {ml_model.score(X_test, y_test):.3f}")

# DL на той же задаче (с PyTorch — упрощённо):
# Нейросеть для 1000 примеров часто не лучше ML
# И требует: больше кода, больше данных, GPU, тюнинга

# Правило большого пальца:
# < 10K примеров + таблица → ML (XGBoost, Random Forest)
# > 100K примеров + изображения/текст → DL
# Средний случай → пробуйте оба
print("\nПравило выбора:")
print("Табличные данные < 100K → XGBoost/RF")
print("Изображения/текст → Deep Learning")
```

## Как это связано с ML

Deep Learning — это специализированная область ML. Трансформеры (GPT, BERT) — это Deep Learning. Image recognition (ResNet, EfficientNet) — Deep Learning. Но XGBoost выигрывает у нейросетей на большинстве Kaggle табличных соревнований.

## Практика

**Вопрос 1:** На каких типах данных Deep Learning обычно превосходит классический ML?
- A) Табличные данные малого размера
- B) Изображения, текст, аудио — данные с богатой структурой
- C) Любые данные с более чем 10 признаками
- D) Данные с категориальными переменными
**Ответ:** B) Неструктурированные данные — именно там автоматическое извлечение признаков DL даёт наибольшее преимущество.

**Вопрос 2:** Почему для табличных данных с 5000 примерами XGBoost часто лучше нейросети?
- A) XGBoost быстрее в inference
- B) Нейросети требуют много данных для обучения; XGBoost работает хорошо даже на малых датасетах
- C) Нейросети не работают с числовыми признаками
- D) XGBoost всегда лучше нейросетей
**Ответ:** B) Нейросети требуют много данных — без достаточного количества примеров нейросеть переобучится или не сойдётся.

**Вопрос 3:** Что значит «автоматическое извлечение признаков» в Deep Learning?
- A) Алгоритм сам загружает данные из интернета
- B) Нейросеть сама обнаруживает полезные паттерны в сырых данных без ручного feature engineering
- C) Sklearn автоматически выбирает признаки
- D) Данные нормализуются автоматически
**Ответ:** B) Автоматические паттерны из сырых данных — для картинок сеть сама учится видеть края, формы, текстуры без явного задания этих признаков.

**Вопрос 4:** Команде нужно предсказать вероятность дефолта по кредиту по 50 числовым признакам, датасет 20000 строк. Что выбрать?
- A) Нейросеть с 10 слоями
- B) Классический ML: XGBoost или Random Forest с feature engineering
- C) GPT
- D) K-Means
**Ответ:** B) Классический ML — табличные данные среднего размера, нужна интерпретируемость и надёжность; XGBoost или Random Forest — оптимальный выбор.

**Вопрос 5:** Deep Learning требует GPU. Почему?
- A) GPU обязателен — без него код не запустится
- B) Обучение нейросетей состоит из матричных умножений — GPU выполняет их параллельно в 10-100 раз быстрее CPU
- C) GPU нужен только для inference
- D) GPU увеличивает точность предсказаний
**Ответ:** B) Матричные умножения на GPU — тысячи ядер GPU параллельно обрабатывают матричные операции, из которых состоит обучение нейросетей.

## Краткий итог

- Deep Learning — подмножество ML, специализированное на сырых неструктурированных данных
- Ключевое преимущество DL: автоматическое извлечение признаков
- Для табличных данных классический ML часто лучше, быстрее и интерпретируемее
- Выбор: тип данных + объём + требования к скорости и интерпретируемости

# 70. Что такое нейронная сеть

## Зачем это нужно

Нейронные сети лежат в основе современного AI: распознавание речи, перевод, генерация изображений, ChatGPT. Понять базовую идею нейросети — значит получить ключ к пониманию всего этого. Это не магия, а математика: числа, умножения, активации.

## Простая интуиция

Представьте детектор спама. Одно правило — «если есть слово БЕСПЛАТНО — спам» — часто ошибается. А если взять 100 слабых правил и объединить их с правильными весами — получается надёжный детектор. Нейронная сеть — это тысячи таких «правил» в слоях, каждое из которых обнаруживает свой паттерн.

## Что это такое

- **Нейрон** — вычислительная единица: принимает числа, умножает на веса, суммирует, применяет нелинейную функцию
- **Веса (weights)** — числа, которые сеть учит в процессе обучения
- **Слой (layer)** — группа нейронов, обрабатывающих одни и те же входные данные
- **Архитектура**: Input layer → Hidden layers → Output layer
- **Активационная функция** — нелинейность после суммирования (ReLU, sigmoid, tanh)
- **Backpropagation** — алгоритм обновления весов на основе ошибки

## Как это работает

```python
import numpy as np

# Один нейрон вручную
def neuron(inputs, weights, bias):
    """Линейная комбинация + активация"""
    z = np.dot(inputs, weights) + bias  # взвешенная сумма
    activation = max(0, z)              # ReLU: max(0, x)
    return activation

# Пример: нейрон с 3 входами
inputs = np.array([0.5, 0.3, 0.8])
weights = np.array([0.4, -0.2, 0.7])
bias = 0.1

output = neuron(inputs, weights, bias)
print(f"Выход нейрона: {output:.4f}")

# Простая нейросеть с numpy
def relu(x): return np.maximum(0, x)
def sigmoid(x): return 1 / (1 + np.exp(-x))

# Случайные веса (в реальности — обученные)
W1 = np.random.randn(4, 3)  # 4 нейрона, 3 входа
b1 = np.zeros(4)
W2 = np.random.randn(1, 4)  # 1 выход
b2 = np.zeros(1)

x = np.array([1.0, 2.0, 3.0])  # входные данные

# Forward pass
h = relu(W1 @ x + b1)    # скрытый слой
output = sigmoid(W2 @ h + b2)  # выходной слой
print(f"Предсказание сети: {output[0]:.4f}")
```

## Как это связано с ML

Нейронные сети — это универсальные аппроксиматоры: при достаточном числе нейронов они могут приближать любую непрерывную функцию. Обучение — это оптимизация весов через gradient descent + backpropagation. В основе всего современного DL — этот механизм.

## Практика

**Вопрос 1:** Для чего нужна нелинейная функция активации?
- A) Для ускорения вычислений
- B) Без нелинейности несколько слоёв эквивалентны одному — сеть не может выучить нелинейные зависимости
- C) Для нормализации выходов
- D) Для предотвращения переобучения
**Ответ:** B) Без нелинейности нет глубины — стек линейных преобразований = одно линейное преобразование; нелинейность позволяет сети выучить сложные паттерны.

**Вопрос 2:** Что такое ReLU?
- A) Тип нейросети
- B) Активационная функция: max(0, x) — возвращает 0 для отрицательных входов и x для положительных
- C) Метод оптимизации
- D) Архитектура нейросети для текста
**Ответ:** B) max(0, x) — простая, вычислительно эффективная нелинейность, используемая в большинстве современных нейросетей.

**Вопрос 3:** Что происходит в процессе backpropagation?
- A) Данные проходят через сеть от входа к выходу
- B) Ошибка распространяется от выхода к входу, веса обновляются в направлении снижения ошибки
- C) Нейроны добавляются или удаляются
- D) Гиперпараметры настраиваются автоматически
**Ответ:** B) Ошибка распространяется назад — алгоритм вычисляет градиент функции потерь по каждому весу и обновляет их.

**Вопрос 4:** Нейросеть с большим количеством слоёв и нейронов точнее, но что может произойти?
- A) Она станет быстрее
- B) Переобучение и долгое обучение — нужна регуляризация (dropout, weight decay)
- C) Она перестанет работать
- D) Она станет линейной
**Ответ:** B) Переобучение и долгое обучение — большие сети мощнее, но требуют больше данных и регуляризации.

**Вопрос 5:** Что такое «веса» нейронной сети?
- A) Физический размер файла модели
- B) Числа, которые сеть обучает из данных — они кодируют «знания» модели
- C) Гиперпараметры, заданные вручную
- D) Входные данные
**Ответ:** B) Обученные числа, кодирующие знания — веса — это то, что делает модель умной; именно они сохраняются при сериализации.

## Краткий итог

- Нейрон = взвешенная сумма входов + нелинейная активация
- Несколько слоёв нейронов = нейронная сеть
- Нелинейные активации (ReLU) позволяют выучить сложные зависимости
- Обучение = оптимизация весов через backpropagation + gradient descent

# 71. Что такое Deep Learning

## Зачем это нужно

Deep Learning — это то, что стоит за современными AI-прорывами: ChatGPT, Midjourney, AlphaFold, Tesla Autopilot. Понимание базовых принципов DL позволяет ориентироваться в этом мире и понимать, что возможно, а что нет.

## Простая интуиция

Обычная нейросеть — это один слой обработки. Deep Learning — это много слоёв, каждый из которых строит более абстрактные понятия. Для изображения: пиксели → края → формы → детали (нос, глаза) → лица. Каждый слой «понимает» чуть больше, чем предыдущий.

## Что это такое

- **Deep Learning** — нейронные сети с большим числом слоёв (от 10 до сотен)
- **CNN (Convolutional Neural Networks)** — для изображений и видео; учатся видеть локальные паттерны
- **RNN (Recurrent Neural Networks)** — для последовательностей (текст, временные ряды); есть «память»
- **Transformer** — архитектура на основе attention, заменившая RNN для большинства NLP задач
- **Transfer Learning** — использование предобученных моделей (ImageNet, GPT) для новых задач

## Как это работает

```python
# Простая нейросеть с PyTorch
import torch
import torch.nn as nn
import torch.optim as optim

class SimpleNN(nn.Module):
    def __init__(self, input_size, hidden_size, output_size):
        super().__init__()
        # Несколько слоёв = Deep Learning
        self.layers = nn.Sequential(
            nn.Linear(input_size, hidden_size),
            nn.ReLU(),
            nn.Dropout(0.3),           # регуляризация
            nn.Linear(hidden_size, hidden_size // 2),
            nn.ReLU(),
            nn.Linear(hidden_size // 2, output_size),
            nn.Sigmoid()
        )

    def forward(self, x):
        return self.layers(x)

# Создаём модель
model = SimpleNN(input_size=20, hidden_size=64, output_size=1)
print(model)

# Количество параметров
total_params = sum(p.numel() for p in model.parameters())
print(f"Всего параметров: {total_params:,}")

# Обучение
criterion = nn.BCELoss()
optimizer = optim.Adam(model.parameters(), lr=0.001)
```

## Как это связано с ML

Deep Learning — специализированная ветвь ML. Принципы одинаковы: обучение на данных, функция потерь, оптимизация. Отличие — масштаб: миллионы параметров, GPU, большие датасеты. Transfer Learning изменил правила: теперь можно взять предобученную сеть и дообучить на малых данных.

## Практика

**Вопрос 1:** Что делает CNN (сверточная нейросеть) особенной для обработки изображений?
- A) Работает только с чёрно-белыми изображениями
- B) Локальные фильтры обнаруживают локальные паттерны (края, текстуры), независимые от позиции
- C) Сжимает изображения до векторов фиксированного размера
- D) Работает без обучения
**Ответ:** B) Локальные фильтры — Conv слои применяют один и тот же фильтр ко всем частям изображения, обнаруживая паттерны независимо от их положения.

**Вопрос 2:** Что такое Transfer Learning?
- A) Перенос данных между серверами
- B) Использование весов предобученной модели как начальной точки для обучения на новой задаче
- C) Обучение одной модели на нескольких задачах одновременно
- D) Передача модели между командами
**Ответ:** B) Использование предобученных весов — модель уже «знает» базовые признаки; дообучение на малых данных займёт меньше времени и даст лучшее качество.

**Вопрос 3:** Почему Transformers заменили RNN в NLP задачах?
- A) Transformers не имеют параметров
- B) Transformers обрабатывают весь текст параллельно (attention), RNN — последовательно; Transformers быстрее и лучше улавливают дальние зависимости
- C) RNN работают только с числами
- D) Transformers проще в реализации
**Ответ:** B) Параллельная обработка и дальние зависимости — RNN «забывает» начало длинного текста; attention в Transformers смотрит на всю последовательность сразу.

**Вопрос 4:** Зачем нужен Dropout в нейросетях?
- A) Ускорение обучения
- B) Регуляризация: случайно «выключает» нейроны при обучении, уменьшая переобучение
- C) Уменьшение числа параметров
- D) Инициализация весов
**Ответ:** B) Регуляризация через случайное выключение — каждый раз сеть обучается на «урезанной» версии себя; это заставляет нейроны не полагаться на конкретных соседей.

**Вопрос 5:** У вас 500 изображений кошек/собак для классификатора. Что лучше?
- A) Обучить CNN с нуля
- B) Взять предобученную CNN (ResNet, EfficientNet) и дообучить последние слои
- C) Использовать логистическую регрессию
- D) Добавить больше слоёв для компенсации малых данных
**Ответ:** B) Transfer Learning — предобученная сеть уже умеет видеть визуальные паттерны; дообучение на 500 примерах займёт минуты и даст хороший результат.

## Краткий итог

- Deep Learning = многослойные нейросети с автоматическим извлечением признаков
- CNN — для изображений, Transformer — для текста, RNN — для последовательностей
- Transfer Learning позволяет использовать мощные модели даже при малых данных
- DL требует много данных и GPU, но при этих условиях бьёт классический ML

# 72. Что такое Embeddings

## Зачем это нужно

Компьютеры работают с числами, но данные бывают категориальными: слова, пользователи, товары, города. Embeddings — способ превратить любой объект в осмысленный числовой вектор. Это основа NLP, рекомендательных систем и многих других ML-задач.

## Простая интуиция

Представьте карту. Каждый город — точка с координатами (x, y). Похожие города (близкие географически или культурно) — находятся рядом на карте. Embeddings делают то же самое для слов, пользователей или товаров: превращают их в координаты в многомерном пространстве, где «похожие» объекты находятся рядом.

## Что это такое

- **Embedding** — плотный числовой вектор фиксированной размерности, представляющий объект
- **Word2Vec** — классический алгоритм получения эмбеддингов слов: слова с похожим контекстом → похожие векторы
- **Семантическое сходство** — похожие объекты имеют близкие векторы (косинусное расстояние)
- **Embedding layer** — обучаемый слой нейросети, создающий эмбеддинги категорий
- Пример: вектор("король") - вектор("мужчина") + вектор("женщина") ≈ вектор("королева")

## Как это работает

```python
import numpy as np
from sklearn.metrics.pairwise import cosine_similarity

# Демонстрация концепции эмбеддингов
# В реальности эмбеддинги обучаются; здесь — упрощённый пример

# Представим, что у нас есть эмбеддинги слов (обычно 100-300 измерений)
# Упрощённый пример с 3 измерениями для наглядности
word_embeddings = {
    "кот":    np.array([0.9, 0.1, 0.2]),
    "кошка":  np.array([0.85, 0.15, 0.25]),
    "собака": np.array([0.8, 0.2, 0.15]),
    "машина": np.array([0.1, 0.9, 0.3]),
    "автомобиль": np.array([0.15, 0.85, 0.35]),
}

def similarity(word1, word2):
    v1 = word_embeddings[word1].reshape(1, -1)
    v2 = word_embeddings[word2].reshape(1, -1)
    return cosine_similarity(v1, v2)[0][0]

print(f"Сходство кот-кошка:      {similarity('кот', 'кошка'):.3f}")
print(f"Сходство кот-собака:     {similarity('кот', 'собака'):.3f}")
print(f"Сходство кот-машина:     {similarity('кот', 'машина'):.3f}")
print(f"Сходство машина-автомобиль: {similarity('машина', 'автомобиль'):.3f}")

# В PyTorch: обучаемый embedding слой
import torch
import torch.nn as nn

vocab_size = 10000  # размер словаря
embed_dim = 128     # размер эмбеддинга

embedding_layer = nn.Embedding(vocab_size, embed_dim)
# Получаем эмбеддинг слова с индексом 42
word_idx = torch.tensor([42])
vec = embedding_layer(word_idx)
print(f"\nФорма эмбеддинга: {vec.shape}")  # [1, 128]
```

## Как это связано с ML

Embeddings — фундамент современного NLP и рекомендательных систем. BERT, GPT — это модели, обученные создавать контекстуальные эмбеддинги. В рекомендациях эмбеддинги пользователей и товаров позволяют найти похожих пользователей или похожие товары через простое векторное расстояние.

## Практика

**Вопрос 1:** Зачем нужны embeddings для категориальных признаков?
- A) Они работают быстрее One-Hot Encoding
- B) Они создают плотные информативные представления, где похожие объекты имеют близкие векторы
- C) Они всегда дают лучший результат, чем One-Hot
- D) Sklearn требует числовые признаки
**Ответ:** B) Плотные информативные векторы — One-Hot кодирует 100000 слов как 100000-мерный разреженный вектор; embedding — как компактный 128-мерный плотный вектор.

**Вопрос 2:** Что означает «семантическое сходство» в контексте word embeddings?
- A) Слова пишутся похоже
- B) Слова имеют близкие векторы, потому что часто встречаются в похожих контекстах
- C) Слова имеют одинаковую длину
- D) Слова принадлежат одной части речи
**Ответ:** B) Похожие контексты → похожие векторы — word2vec обучается предсказывать контекст слова, поэтому синонимы получают схожие векторы.

**Вопрос 3:** Что значит, что embedding изменяется при обучении нейросети?
- A) Размерность вектора меняется
- B) Числа в векторе обновляются через backpropagation вместе с остальными весами сети
- C) Словарь пополняется новыми словами
- D) Embeddings загружаются из интернета
**Ответ:** B) Обновляются через backpropagation — embedding layer — это просто матрица весов; она обучается вместе со всей сетью.

**Вопрос 4:** Для чего используется косинусное сходство с embeddings?
- A) Для нормализации векторов
- B) Для измерения семантической близости между объектами: значение близкое к 1 = очень похожи
- C) Для обучения embeddings
- D) Для сжатия векторов
**Ответ:** B) Измерение близости — косинусное сходство учитывает угол между векторами, не зависит от длины; стандартная метрика для сравнения embeddings.

**Вопрос 5:** В рекомендательной системе пользователь и товар имеют embeddings в одном пространстве. Как найти рекомендации?
- A) Просуммировать все векторы товаров
- B) Найти товары с максимальным косинусным сходством к вектору пользователя
- C) Выбрать товары случайным образом
- D) Найти пользователей с похожим вектором
**Ответ:** B) Ближайшие товары к вектору пользователя — это суть collaborative filtering на embeddings: пользователю нравится то, что «рядом» с ним в векторном пространстве.

## Краткий итог

- Embedding — плотный числовой вектор, представляющий объект в векторном пространстве
- Похожие объекты имеют близкие векторы (семантическое сходство)
- Используются в NLP, рекомендациях, поиске, любых задачах с категориальными данными
- Косинусное сходство — стандартная метрика близости embeddings

# 73. Что такое Transformer

## Зачем это нужно

Transformer — архитектура, изменившая AI. GPT, BERT, Claude, Gemini, T5 — всё это трансформеры. Понимание базовой идеи attention позволяет разобраться, почему эти модели так мощны и какие у них ограничения.

## Простая интуиция

Читая предложение «Банк открыли раньше, чем солнце» — слово «банк» значит разное (финансовый или берег реки). Чтобы понять, нужно посмотреть на весь контекст. Attention — механизм, который для каждого слова спрашивает: «на какие другие слова мне стоит обратить внимание, чтобы понять себя?»

## Что это такое

- **Transformer** — архитектура, предложенная в статье "Attention is All You Need" (2017)
- **Attention** — механизм, позволяющий каждому токену «смотреть» на все другие токены
- **Self-attention** — attention внутри одной последовательности (слово смотрит на другие слова)
- **Multi-head attention** — несколько механизмов attention параллельно
- **Encoder** — обрабатывает входную последовательность (BERT)
- **Decoder** — генерирует выходную последовательность (GPT)

## Как это работает

```python
# Упрощённый attention вручную
import numpy as np

def softmax(x):
    e_x = np.exp(x - np.max(x))
    return e_x / e_x.sum()

def simple_attention(query, keys, values):
    """
    query: что мы ищем
    keys: что есть в последовательности
    values: что вернуть для каждого элемента
    """
    # Вычисляем похожесть query с каждым key
    scores = np.dot(query, keys.T)
    # Нормализуем через softmax
    weights = softmax(scores)
    # Взвешенная сумма values
    output = np.dot(weights, values)
    return output, weights

# Пример: 3 слова, 4-мерные векторы
np.random.seed(42)
words = ["Банк", "открыли", "раньше"]
keys = np.random.randn(3, 4)    # 3 слова × 4 измерения
values = np.random.randn(3, 4)

# Для слова "Банк" (query)
query_bank = keys[0]
context, attention_weights = simple_attention(query_bank, keys, values)

print("Веса attention для 'Банк':")
for word, weight in zip(words, attention_weights):
    print(f"  {word}: {weight:.3f}")
print("\nКонтекстный вектор 'Банк':", context.round(3))
```

## Как это связано с ML

Трансформеры совершили революцию: сначала в NLP (BERT, GPT), потом в компьютерном зрении (ViT), потом везде. Все современные LLM (GPT-4, Claude, Llama) — это трансформеры. Главное ограничение: контекстное окно — трансформер «видит» ограниченное количество токенов одновременно.

## Практика

**Вопрос 1:** Что делает механизм self-attention?
- A) Обрабатывает последовательность слева направо
- B) Для каждого токена вычисляет взвешенную сумму всех других токенов — «кто важен для понимания меня»
- C) Уменьшает размерность эмбеддингов
- D) Предотвращает переобучение
**Ответ:** B) Взвешенная сумма всех токенов — это позволяет учитывать дальние зависимости в тексте, что RNN делал плохо.

**Вопрос 2:** В чём преимущество Transformer перед RNN?
- A) Transformer проще в реализации
- B) Transformer обрабатывает всю последовательность параллельно, лучше улавливает дальние зависимости
- C) Transformer требует меньше данных
- D) Transformer работает только с текстом
**Ответ:** B) Параллельная обработка и дальние зависимости — RNN обрабатывает токены последовательно и «забывает» начало длинного текста.

**Вопрос 3:** Что такое контекстное окно (context window) у LLM?
- A) Размер экрана для отображения текста
- B) Максимальное количество токенов, которое модель может обработать за один раз
- C) Количество слоёв трансформера
- D) Размер обучающего датасета
**Ответ:** B) Максимальное количество токенов — трансформеры имеют квадратичную сложность по длине последовательности; context window ограничивает длину входа.

**Вопрос 4:** BERT — это Encoder, GPT — это Decoder. В чём разница на практике?
- A) BERT быстрее, GPT точнее
- B) BERT хорош для задач понимания (классификация, NER), GPT — для генерации текста
- C) Они идентичны
- D) BERT для изображений, GPT для текста
**Ответ:** B) Понимание vs генерация — encoder видит весь текст сразу (для понимания), decoder генерирует следующий токен по предыдущим (для генерации).

**Вопрос 5:** Почему Transformer называют «Attention is All You Need»?
- A) Attention — единственная операция в трансформере
- B) Авторы показали, что attention mechanism достаточно для достижения SOTA без рекуррентных или свёрточных слоёв
- C) Трансформер не требует данных
- D) Attention заменяет функцию потерь
**Ответ:** B) Attention достаточно — статья показала, что полностью attention-based архитектура превосходит RNN/CNN для NLP задач.

## Краткий итог

- Transformer — архитектура на основе attention, обрабатывающая последовательности параллельно
- Self-attention позволяет каждому токену учитывать контекст всей последовательности
- Все современные LLM (GPT, Claude, Llama, BERT) — это трансформеры
- Главное ограничение: контекстное окно — фиксированный максимальный размер входа

# 74. Что такое LLM

## Зачем это нужно

LLM (Large Language Models) — это технология за ChatGPT, Claude, Gemini. Понимание того, как они работают, их возможностей и ограничений, критично для любого специалиста в области данных и технологий в 2024 году.

## Простая интуиция

Представьте книгочея, прочитавшего весь интернет. Он не знает «правды» — он знает, что обычно пишут после тех или иных слов. Спросите его «Столица Франции» — он ответит «Париж», потому что это слово чаще всего следует после таких слов. Именно так работает LLM: предсказывает наиболее вероятный следующий токен.

## Что это такое

- **LLM** (Large Language Model) — трансформер, предобученный на огромных объёмах текста
- **Pre-training** — самообучение: предсказание следующего слова на триллионах токенов
- **RLHF** (Reinforcement Learning from Human Feedback) — дообучение через человеческие оценки
- **Токен** — единица текста: примерно 1 слово или 4 символа
- **Температура** — параметр случайности генерации: высокая = творческий/непредсказуемый, низкая = детерминированный
- **Контекстное окно** — максимальный объём текста, который модель видит сразу (8K-1M токенов)

## Как это работает

## Как это связано с ML

LLM — крупнейший практический результат DL на текущий момент. Они меняют способ работы с ML: вместо написания кода preprocessing можно попросить LLM сгенерировать код. RAG, Fine-tuning, Prompt Engineering — ключевые техники работы с LLM в production.

## Практика

**Вопрос 1:** Как LLM «знает» ответы на вопросы?
- A) Он подключается к интернету в режиме реального времени
- B) Он выучил статистические паттерны из огромного текстового корпуса и предсказывает вероятный следующий токен
- C) В него вручную вводили факты
- D) Он использует базу данных
**Ответ:** B) Статистические паттерны из текстов — LLM не «знает» истину; он предсказывает правдоподобный текст на основе обучающего корпуса.

**Вопрос 2:** Почему LLM иногда «галлюцинирует» (придумывает несуществующие факты)?
- A) Ошибка в коде
- B) LLM предсказывает правдоподобный текст, а не истину — он может генерировать убедительно звучащую неправду
- C) Недостаточно данных при обучении
- D) Проблема с токенизацией
**Ответ:** B) Правдоподобность ≠ правда — модель оптимизирует «похожесть на реальный текст», а не фактическую точность.

**Вопрос 3:** Что делает высокая температура (temperature=1.5) при генерации?
- A) Ускоряет генерацию
- B) Делает текст более случайным и творческим, но менее предсказуемым и точным
- C) Улучшает качество перевода
- D) Увеличивает контекстное окно
**Ответ:** B) Случайность и творчество — высокая температура «выравнивает» вероятности токенов, давая шанс менее ожидаемым продолжениям.

**Вопрос 4:** Что такое RLHF?
- A) Тип нейросетевой архитектуры
- B) Метод дообучения LLM: люди оценивают ответы модели, эти оценки используются для её улучшения
- C) Техника сжатия модели
- D) Метод промпт-инжиниринга
**Ответ:** B) Обучение из человеческих оценок — именно RLHF делает ChatGPT/Claude полезным и безопасным, а не просто «следующий токен».

**Вопрос 5:** Какое главное ограничение LLM при работе со свежими данными?
- A) Слишком медленная генерация
- B) Дата обрезания обучения (training cutoff) — модель не знает о событиях после этой даты
- C) Не может работать с числами
- D) Не понимает русский язык
**Ответ:** B) Training cutoff — у каждой модели есть дата, после которой новые данные не включались в обучение; для актуальных данных нужен RAG.

## Краткий итог

- LLM — трансформер, предобученный на огромных текстах, предсказывающий следующий токен
- Ключевые параметры: temperature (случайность), max_tokens, context window
- Галлюцинации — следствие предсказания правдоподобности, а не фактической точности
- RLHF делает LLM полезным; RAG решает проблему устаревших знаний

# 75. Prompt Engineering

## Зачем это нужно

Качество ответа LLM зависит от качества запроса. Правильно составленный промпт — это разница между полезным ответом и мусором. Prompt Engineering — практическая навык, применимый прямо сейчас к любому LLM.

## Простая интуиция

Промпт — это как задание сотруднику. «Напиши что-нибудь про Python» — расплывчато, результат непредсказуем. «Напиши 5 практических советов по оптимизации Python кода для ML-пайплайна, для аудитории junior разработчиков, в формате нумерованного списка» — конкретно, результат предсказуем и полезен.

## Что это такое

- **Zero-shot prompting** — задать вопрос без примеров: «Переведи на английский: ...»
- **Few-shot prompting** — дать 2-3 примера перед задачей: «Пример 1: ... → ... Теперь: ...»
- **Chain-of-thought (CoT)** — попросить рассуждать: «Думай шаг за шагом»
- **System prompt** — инструкции о роли и поведении модели («Ты — эксперт по ML»)
- **Structured output** — просить ответ в определённом формате (JSON, список, таблица)
- **Temperature** — параметр случайности; для кода: 0, для творчества: 0.7-1.0

## Как это работает

```python
# Примеры шаблонов промптов

# 1. Zero-shot
zero_shot = """
Классифицируй тональность отзыва как POSITIVE, NEGATIVE или NEUTRAL.

Отзыв: "Доставка быстрая, но товар не соответствует описанию"
Тональность:
"""

# 2. Few-shot
few_shot = """
Классифицируй тональность:
Отзыв: "Отличный продукт!" -> POSITIVE
Отзыв: "Ужасное качество" -> NEGATIVE
Отзыв: "Обычный товар" -> NEUTRAL

Отзыв: "Доставка быстрая, но товар не соответствует описанию"
Тональность:
"""

# 3. Chain-of-thought
cot_prompt = """
Задача: есть датасет с 1000 строками, 20% пропущенных значений.
Выбери стратегию обработки пропусков.

Думай шаг за шагом:
1. Какой тип данных?
2. Каков процент пропусков?
3. Какая задача ML?
4. Что порекомендуешь?
"""

# 4. Структурированный вывод
structured = """
Проанализируй модель ML и верни ответ строго в JSON формате:
{
  "problem_type": "classification|regression|clustering",
  "recommended_algorithms": ["algo1", "algo2"],
  "key_risks": ["risk1"],
  "next_steps": ["step1"]
}

Задача: предсказать вероятность покупки для 50K клиентов.
"""
print("Шаблоны промптов готовы к использованию")
```

## Как это связано с ML

Prompt Engineering — практический навык для использования LLM в ML-задачах: генерация кода, анализ данных, документирование, автоматизация. Для production использования: system prompt задаёт поведение, few-shot примеры улучшают стабильность, структурированный вывод упрощает парсинг.

## Практика

**Вопрос 1:** Что делает few-shot prompting?
- A) Даёт модели меньше токенов для ответа
- B) Предоставляет 2-5 примеров «входа → выхода», помогающих модели понять формат задачи
- C) Ограничивает длину промпта
- D) Снижает стоимость API запроса
**Ответ:** B) Примеры входа и выхода — несколько примеров значительно улучшают точность LLM особенно для нестандартных задач.

**Вопрос 2:** Для какой задачи Chain-of-Thought (CoT) особенно полезен?
- A) Перевод текста
- B) Сложные задачи рассуждения и математика — CoT просит модель «думать вслух»
- C) Классификация коротких текстов
- D) Генерация случайных идей
**Ответ:** B) Сложные задачи рассуждения — CoT заставляет модель строить цепочку рассуждений, что улучшает результат на логических и математических задачах.

**Вопрос 3:** Почему для генерации кода рекомендуется temperature=0?
- A) Код должен быть коротким
- B) Детерминированный вывод: нет случайности — один и тот же код каждый раз
- C) Высокая температура не работает с кодом
- D) Temperature=0 работает быстрее
**Ответ:** B) Детерминированный вывод — для кода нужна точность и воспроизводимость, а не «творческие» вариации.

**Вопрос 4:** Что такое system prompt?
- A) Промпт от разработчика операционной системы
- B) Инструкции, задающие роль, стиль и ограничения модели для всего диалога
- C) Первый вопрос пользователя
- D) Скрытый промпт для улучшения безопасности
**Ответ:** B) Инструкции для всего диалога — system prompt невидим пользователю и задаёт «личность» модели: «Ты — эксперт по данным, отвечай кратко на русском».

**Вопрос 5:** Модель даёт нестабильные ответы на один и тот же вопрос. Как улучшить?
- A) Увеличить temperature
- B) Добавить few-shot примеры и указать точный формат ответа
- C) Использовать более короткий промпт
- D) Задавать вопрос несколько раз
**Ответ:** B) Few-shot + формат — чёткие примеры и явно указанный формат вывода значительно снижают вариативность ответов.

## Краткий итог

- Zero-shot: просто вопрос. Few-shot: вопрос + примеры. Chain-of-Thought: вопрос + «думай шаг за шагом»
- System prompt задаёт роль и поведение для всего диалога
- Для точности: низкая temperature + структурированный вывод
- Явный формат ответа (JSON, список) улучшает предсказуемость и упрощает парсинг

# 76. Fine-tuning моделей

## Зачем это нужно

Pre-trained модели (BERT, GPT, LLama) — мощные, но общие. Fine-tuning адаптирует их к специфической задаче или домену. Это позволяет получить специализированную модель без обучения с нуля (что стоило бы миллионы долларов).

## Простая интуиция

Врач-терапевт (pre-trained модель) знает медицину в целом. Специализация в кардиологии (fine-tuning) — дополнительная учёба, опираясь на уже имеющуюся базу. Это быстрее и дешевле, чем начинать медицинское образование заново.

## Что это такое

- **Full fine-tuning** — обновление всех весов модели на новых данных. Дорого, требует много GPU памяти
- **Feature extraction** — заморозить все слои, обучить только последний (классификационный) слой
- **LoRA** (Low-Rank Adaptation) — обновить только небольшие матрицы-адаптеры; эффективно по памяти
- **Instruction tuning** — дообучение следовать инструкциям (как у ChatGPT)
- **Domain adaptation** — дообучение на специализированных текстах (медицина, юридические документы)
- Когда нужен: специфический формат вывода, специализированный домен, конкретный стиль

## Как это работает

```python
from transformers import AutoTokenizer, AutoModelForSequenceClassification
from transformers import TrainingArguments, Trainer
import torch

# Fine-tuning BERT для классификации тональности (упрощённо)

# 1. Загрузка предобученной модели
model_name = "bert-base-multilingual-cased"
tokenizer = AutoTokenizer.from_pretrained(model_name)
model = AutoModelForSequenceClassification.from_pretrained(
    model_name,
    num_labels=3  # positive, negative, neutral
)

# 2. Подготовка данных
texts = ["Отличный продукт!", "Плохое качество", "Нормально"]
labels = [2, 0, 1]  # 0=neg, 1=neu, 2=pos

inputs = tokenizer(texts, padding=True, truncation=True,
                   max_length=128, return_tensors="pt")

# 3. Параметры обучения
training_args = TrainingArguments(
    output_dir="./results",
    num_train_epochs=3,
    per_device_train_batch_size=16,
    learning_rate=2e-5,         # маленький LR для fine-tuning!
    warmup_steps=100,
)

# Для production: используйте Trainer API или HuggingFace PEFT для LoRA
print(f"Параметров в модели: {sum(p.numel() for p in model.parameters()):,}")
print("Для LoRA обновляется только ~1% параметров")
```

## Как это связано с ML

Fine-tuning — мост между общими LLM и специализированными production системами. В ML пайплайне: базовая модель → fine-tuning на доменных данных → deployment → мониторинг. LoRA революционизировал fine-tuning: теперь специализированную модель можно получить на одном GPU за часы.

## Практика

**Вопрос 1:** В каком случае fine-tuning не нужен?
- A) Когда задача очень специфическая
- B) Когда задача хорошо решается prompt engineering без дополнительного обучения
- C) Когда данных мало
- D) Когда нет GPU
**Ответ:** B) Когда prompt engineering достаточно — сначала попробуйте промпты; fine-tuning нужен при стабильно недостаточном качестве или специфическом домене.

**Вопрос 2:** Почему при fine-tuning используют маленький learning rate (2e-5)?
- A) Большой LR быстрее
- B) Маленький LR осторожно корректирует веса, не разрушая знания полученные при pre-training
- C) Это требование transformers библиотеки
- D) Маленький LR экономит GPU память
**Ответ:** B) Осторожная корректировка — слишком большой LR «перезапишет» полезные знания предобучения и модель забудет весь контекст.

**Вопрос 3:** Что такое LoRA?
- A) Языковая модель от Meta
- B) Метод эффективного fine-tuning: добавляет небольшие адаптер-матрицы, обучая только их (~1% параметров)
- C) Техника промпт-инжиниринга
- D) Формат сохранения моделей
**Ответ:** B) Обучение только адаптер-матриц — LoRA позволяет дообучить модель на потребительском GPU вместо кластера серверов.

**Вопрос 4:** В чём разница между feature extraction и full fine-tuning?
- A) Нет разницы
- B) Feature extraction замораживает все слои кроме последнего (быстро, мало данных); full fine-tuning обновляет все веса (лучше, нужно больше данных)
- C) Feature extraction использует другую архитектуру
- D) Full fine-tuning работает только для изображений
**Ответ:** B) Заморозка слоёв vs полное обновление — feature extraction — первый шаг; если недостаточно, переходят к full fine-tuning.

**Вопрос 5:** Сколько примеров нужно для fine-tuning LLM?
- A) Не менее 1 миллиона
- B) Зависит от задачи: от нескольких сотен (специфический формат) до десятков тысяч (новый домен)
- C) Ровно 10000
- D) Столько же, сколько при pre-training
**Ответ:** B) Зависит от задачи — именно это делает fine-tuning привлекательным: сотни примеров часто дают хороший результат, особенно с LoRA.

## Краткий итог

- Fine-tuning адаптирует предобученную модель к специфической задаче без обучения с нуля
- LoRA — эффективный метод: обновляет ~1% параметров, требует значительно меньше GPU
- Маленький learning rate (2e-5) защищает знания предобучения
- Сначала пробуйте prompt engineering; fine-tuning — если этого недостаточно

# 77. Что такое RAG

## Зачем это нужно

LLM не знает о событиях после даты обучения, не знает ваши внутренние документы и галлюцинирует факты. RAG (Retrieval-Augmented Generation) решает все три проблемы: добавляет актуальные знания без переобучения.

## Простая интуиция

Представьте эксперта с доступом к библиотеке. Вы задаёте вопрос — эксперт быстро находит нужные страницы из книг, читает их и отвечает, опираясь на прочитанное, а не только на своё образование. RAG — это LLM + умный поиск по базе знаний.

## Что это такое

- **RAG** (Retrieval-Augmented Generation) — архитектура: Retrieval (поиск) + Generation (генерация)
- **Retrieval** — поиск релевантных документов по запросу пользователя
- **Vector store** — база данных эмбеддингов документов (Chroma, Pinecone, FAISS)
- **Chunking** — разбивка документов на части нужного размера
- **Embedding model** — модель для векторизации текста (text-embedding-3-small и др.)
- **Контекст** — найденные документы передаются в LLM как часть промпта

## Как это работает

```python
# Схема RAG системы (концептуально)

# ЭТАП 1: ИНДЕКСИРОВАНИЕ (делается один раз)
# 1. Загрузить документы
documents = [
    "Компания основана в 2010 году. Штаб-квартира в Москве.",
    "Продукты: CRM система, аналитическая платформа, мобильное приложение.",
    "Политика возврата: 14 дней с момента покупки без объяснения причин."
]

# 2. Разбить на chunks (обычно 200-500 токенов с перекрытием)
# 3. Создать embeddings для каждого chunk
# 4. Сохранить в vector store

# ЭТАП 2: ЗАПРОС (при каждом вопросе)
def rag_pipeline(question, documents, top_k=2):
    """
    Упрощённая RAG система
    """
    # Поиск: находим top_k наиболее релевантных документов
    # В реальности: cosine similarity между embedding вопроса и документов
    # Здесь: простой поиск по ключевым словам
    keywords = question.lower().split()
    scored_docs = []
    for doc in documents:
        score = sum(1 for kw in keywords if kw in doc.lower())
        scored_docs.append((score, doc))
    scored_docs.sort(reverse=True)
    context = "\n".join([doc for _, doc in scored_docs[:top_k]])

    # Генерация: передаём контекст + вопрос в LLM
    prompt = f"""Используй только следующий контекст для ответа.

Контекст:
{context}

Вопрос: {question}
Ответ:"""
    return prompt

q = "Какова политика возврата?"
result = rag_pipeline(q, documents)
print("Промпт для LLM:")
print(result)
```

## Как это связано с ML

RAG — ключевая архитектура для production LLM приложений. Она позволяет: (1) работать с актуальными данными без переобучения; (2) ссылаться на источники; (3) ограничить галлюцинации. Альтернативы: fine-tuning (для стиля/поведения), function calling (для действий).

## Практика

**Вопрос 1:** Какую проблему LLM решает RAG?
- A) Медленную генерацию текста
- B) Отсутствие актуальных знаний, незнание внутренних документов и галлюцинации
- C) Высокую стоимость обучения
- D) Ограниченный контекст
**Ответ:** B) Актуальность, документы и галлюцинации — RAG «докидывает» нужную информацию в контекст, не меняя сами веса модели.

**Вопрос 2:** Что такое chunking в RAG?
- A) Сжатие эмбеддингов
- B) Разбивка документов на небольшие части для индексирования и поиска
- C) Объединение нескольких запросов
- D) Кэширование ответов LLM
**Ответ:** B) Разбивка документов — длинные документы нужно разбить на части; слишком большой chunk не влезет в контекст, слишком маленький потеряет смысл.

**Вопрос 3:** Как RAG находит релевантные документы?
- A) Полный текстовый поиск по ключевым словам
- B) Семантический поиск: сравнение embedding вопроса с embedding документов по cosine similarity
- C) Сортировка по дате создания
- D) Случайный выбор документов
**Ответ:** B) Семантический поиск через embeddings — это позволяет найти документы с похожим смыслом, даже если слова отличаются.

**Вопрос 4:** RAG vs Fine-tuning: когда выбрать RAG?
- A) Когда нужно изменить стиль ответов модели
- B) Когда нужна актуальность (новые данные часто меняются) и прослеживаемость источников
- C) Когда данных очень мало
- D) Когда нет vector store
**Ответ:** B) Актуальность и источники — RAG лучше когда данные меняются; fine-tuning — когда нужен новый стиль или узкоспециализированный домен.

**Вопрос 5:** Почему LLM может давать неправильные ответы даже в RAG?
- A) Vector store работает неправильно
- B) Retrieval нашёл нерелевантный документ, или LLM проигнорировал контекст в пользу «выученных знаний»
- C) Модель не умеет читать документы
- D) Embeddings сгенерированы неверно
**Ответ:** B) Плохой retrieval или игнорирование контекста — качество RAG определяется качеством поиска; если найден неверный документ — ответ будет неверным.

## Краткий итог

- RAG = поиск релевантных документов + передача их в контекст LLM
- Решает проблемы: устаревшие знания, внутренние документы, галлюцинации
- Vector store хранит embeddings документов для семантического поиска
- Качество RAG в значительной мере определяется качеством chunking и retrieval

# 78. Что такое AI Agent

## Зачем это нужно

LLM, который только отвечает на вопросы, — это чат-бот. AI Agent — это LLM, который может планировать, использовать инструменты и выполнять многошаговые задачи автономно. Это следующий уровень применения LLM: от ответов к действиям.

## Простая интуиция

Обычный LLM — как консультант, который отвечает на вопросы. AI Agent — как ассистент, которому можно сказать «организуй мне командировку» и он сам найдёт рейсы, забронирует отель, отправит письма и внесёт встречи в календарь. Разница — в способности действовать, а не только советовать.

## Что это такое

- **AI Agent** — система: LLM + инструменты + память + планирование
- **Инструменты (tools)** — функции, которые LLM может вызывать (поиск, API, код, база данных)
- **ReAct (Reason + Act)** — паттерн: Рассуждение → Действие → Наблюдение → Рассуждение...
- **Память**: контекстная (в промпте), долгосрочная (vector store), процедурная (память о навыках)
- **Планирование** — разбивка сложной задачи на шаги
- **Human-in-the-loop** — контроль человека на критических шагах

## Как это работает

## Как это связано с ML

AI Agents — активно развивающаяся область. Фреймворки: LangChain, LlamaIndex, AutoGen. Ключевые вызовы: надёжность (агент может принять неверное решение), безопасность (инструменты имеют доступ к реальным системам), стоимость (много вызовов LLM). Human-in-the-loop критичен для важных действий.

## Практика

**Вопрос 1:** Чем AI Agent отличается от обычного LLM?
- A) Агент использует другую архитектуру нейросети
- B) Агент может использовать инструменты и совершать действия автономно в несколько шагов
- C) Агент работает без промптов
- D) Агент не галлюцинирует
**Ответ:** B) Инструменты и автономные действия — LLM отвечает; агент действует, используя LLM для планирования.

**Вопрос 2:** Что такое ReAct паттерн?
- A) Библиотека для AI агентов
- B) Цикл: Рассуждение (Reason) → Действие (Act) → Наблюдение → Рассуждение...
- C) Тип нейросетевой архитектуры
- D) Метод fine-tuning
**Ответ:** B) Цикл Reason-Act-Observe — агент рассуждает о следующем шаге, действует, наблюдает результат, снова рассуждает до завершения задачи.

**Вопрос 3:** Почему human-in-the-loop важен для AI агентов?
- A) Агенты не умеют работать без человека
- B) Для критических действий (отправка email, удаление данных, финансовые транзакции) нужно подтверждение человека
- C) Это требование закона
- D) Для ускорения работы агента
**Ответ:** B) Подтверждение для критических действий — агент может ошибиться; для необратимых действий важно иметь контрольную точку.

**Вопрос 4:** Что такое инструменты (tools) в контексте AI агентов?
- A) Python библиотеки для обучения нейросетей
- B) Функции или API, которые LLM может вызывать: поиск, выполнение кода, запросы к базам данных
- C) Инструменты разработчика (IDE, debugger)
- D) Методы оценки качества LLM
**Ответ:** B) Функции/API для вызова — инструменты расширяют возможности LLM за пределы текстовой генерации.

**Вопрос 5:** Какой главный риск автономных AI агентов?
- A) Медленная работа
- B) Агент может совершить нежелательное действие из-за неправильного понимания задачи или манипуляции через данные
- C) Высокое потребление GPU
- D) Сложность программирования
**Ответ:** B) Нежелательные действия — агент действует автономно; ошибка в рассуждении или prompt injection может привести к реальным последствиям.

## Краткий итог

- AI Agent = LLM + инструменты + память + планирование
- ReAct паттерн: Рассуждение → Действие → Наблюдение — базовый цикл агента
- Инструменты расширяют возможности: поиск, код, API, базы данных
- Human-in-the-loop обязателен для критических и необратимых действий

# 79. Этика и ответственность в AI

## Зачем это нужно

AI-системы влияют на жизни людей: решают, кому дать кредит, кого взять на работу, как распределить ресурсы. Эти системы могут дискриминировать, нарушать приватность, работать непрозрачно. Ответственный AI — не только этически правильно, но и юридически и коммерчески необходимо.

## Простая интуиция

Нанимающий менеджер, который оценивает только кандидатов из элитных вузов — предвзятый. Если обучить ML-модель на исторических данных найма, где так и работали, — модель унаследует эту предвзятость. Мусор на входе → предвзятость на выходе. И модель не будет знать, что она несправедлива.

## Что это такое

- **Bias (предвзятость)** — систематическая ошибка в пользу/против определённых групп
- **Fairness (справедливость)** — равное обращение с группами. Метрики: equal accuracy, demographic parity
- **Explainability/Interpretability** — возможность объяснить решение модели (SHAP, LIME)
- **Privacy** — защита персональных данных. Методы: federated learning, differential privacy
- **Accountability** — кто несёт ответственность за решения AI?
- **EU AI Act** — регуляторная база ЕС для AI, классифицирует риски

## Как это работает

```python
from sklearn.linear_model import LogisticRegression
from sklearn.datasets import make_classification
from sklearn.model_selection import train_test_split
import numpy as np
import pandas as pd

# Пример проверки fairness модели
np.random.seed(42)
n = 1000

# Создаём датасет с защищённым атрибутом (пол)
df = pd.DataFrame({
    "score": np.random.randn(n),
    "experience": np.random.randint(0, 20, n),
    "gender": np.random.choice([0, 1], n),  # 0=Female, 1=Male
})

# Искусственная предвзятость в данных (исторический bias)
df["hired"] = ((df["score"] > 0) & (df["experience"] > 5)).astype(int)
df.loc[(df["gender"] == 0) & (df["hired"] == 1), "hired"] = np.random.choice([0, 1],
    size=(df.loc[(df["gender"] == 0) & (df["hired"] == 1)]).shape[0])

# Обучаем модель
X = df[["score", "experience", "gender"]]
y = df["hired"]
X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)

model = LogisticRegression()
model.fit(X_train, y_train)

# Проверяем справедливость
test_df = X_test.copy()
test_df["pred"] = model.predict(X_test)
test_df["true"] = y_test.values

# Точность по группам
for gender, name in [(0, "Female"), (1, "Male")]:
    group = test_df[test_df["gender"] == gender]
    acc = (group["pred"] == group["true"]).mean()
    positive_rate = group["pred"].mean()
    print(f"{name}: accuracy={acc:.3f}, positive_rate={positive_rate:.3f}")
```

## Как это связано с ML

Ответственный AI встроен в весь ML-цикл: от сбора данных (репрезентативность) до деплоя (мониторинг дискриминации) и аудита (explainability). Регуляции (EU AI Act, GDPR) делают это юридическим требованием, а не только этическим выбором.

## Практика

**Вопрос 1:** Почему ML-модель может дискриминировать, даже если признак «пол» или «расa» исключён из данных?
- A) Это технически невозможно
- B) Другие признаки могут коррелировать с защищёнными атрибутами (прокси-переменные)
- C) Модель случайно угадывает группу
- D) Только нейросети могут дискриминировать
**Ответ:** B) Прокси-переменные — почтовый индекс коррелирует с расой, имя — с полом; модель «угадывает» защищённые атрибуты через косвенные признаки.

**Вопрос 2:** Что такое explainability модели и зачем она нужна?
- A) Объяснение кода модели разработчикам
- B) Способность объяснить конкретное решение: почему модель отказала в кредите этому человеку
- C) Документация алгоритма
- D) Интерпретация метрик качества
**Ответ:** B) Объяснение конкретного решения — пользователь имеет право знать, почему ему отказали; SHAP объясняет вклад каждого признака.

**Вопрос 3:** Что такое federated learning с точки зрения приватности?
- A) Обучение на публичных данных
- B) Обучение на данных, которые остаются на устройствах пользователей — центральный сервер получает только обновления весов
- C) Шифрование обучающих данных
- D) Обучение нескольких моделей параллельно
**Ответ:** B) Данные остаются у пользователей — это решает проблему обучения на персональных данных без их передачи на сервер.

**Вопрос 4:** Demographic parity как метрика fairness означает:
- A) Одинаковая точность для всех групп
- B) Равная доля положительных предсказаний для всех демографических групп
- C) Одинаковое число объектов из каждой группы
- D) Отсутствие защищённых атрибутов в данных
**Ответ:** B) Равная доля положительных предсказаний — модель одобряет кредиты с одинаковой вероятностью для мужчин и женщин (или других групп).

**Вопрос 5:** EU AI Act классифицирует AI системы по рискам. К какой категории относятся системы найма, кредитного скоринга и медицинской диагностики?
- A) Минимальный риск
- B) Высокий риск — требуют документации, аудита и объяснимости
- C) Запрещённые
- D) Ограниченный риск
**Ответ:** B) Высокий риск — системы, влияющие на основные права и благополучие людей, требуют строгой регуляторной проверки.

## Краткий итог

- AI-модели наследуют предвзятость из исторических данных — это нужно активно отслеживать
- Fairness, explainability, privacy — три столпа ответственного AI
- Регуляции (EU AI Act, GDPR) делают это юридическим обязательством
- Проверяйте метрики по группам, а не только общий accuracy

# 80. Что учить дальше: Python, SQL, ML-практика

## Зачем это нужно

Вы прошли курс по основам ML. Это фундамент, но не конец пути. Теперь главный вопрос: что изучать дальше, чтобы стать практикующим специалистом? Этот урок — практическая дорожная карта.

## Простая интуиция

Вы выучили правила дорожного движения. Теперь нужно сесть за руль и ехать. Знание теории без практики — это красивая карта, по которой вы не ходили. Настоящее обучение начинается с первого реального проекта.

## Что это такое

Три направления, которые нужно развивать параллельно:

**1. Инструменты (что учить дальше):**
- **Python глубже**: pandas (группировки, merge, pivot), sklearn (всё что не дошли), matplotlib/seaborn
- **SQL**: SELECT, JOIN, GROUP BY, оконные функции — обязательно для работы с данными
- **Git**: ветки, pull requests — работа в команде
- **Jupyter/VS Code**: профессиональная среда разработки

**2. ML практика:**
- **Kaggle**: соревнования учат лучше любого курса
- **Датасеты**: UCI ML Repository, Hugging Face Datasets, Kaggle Datasets
- **Pet-проекты**: свой датасет + своя задача = реальный опыт

**3. Специализация (выбрать направление):**
- Data Analyst: SQL + visualization + statistics
- ML Engineer: Python + deployment + MLOps
- Data Scientist: statistics + experimentation + storytelling
- NLP/CV: специализированные курсы + DL

## Практика

**Вопрос 1:** Что является самым эффективным способом закрепить знания ML?
- A) Просмотреть больше лекций
- B) Прочитать академические статьи
- C) Решить реальную задачу на реальных данных с полным циклом от EDA до оценки
- D) Выучить все алгоритмы наизусть
**Ответ:** C) Реальная задача с реальными данными — практика учит тому, что теория не может: работа с грязными данными, неожиданными проблемами, интерпретацией результатов.

**Вопрос 2:** Почему SQL так важен для ML-специалиста?
- A) SQL нужен только аналитикам
- B) Большинство данных хранится в базах данных; без SQL невозможно получить данные для обучения
- C) SQL заменяет pandas
- D) SQL используется для обучения моделей
**Ответ:** B) Данные в базах данных — 80% работы ML-специалиста начинается с SQL запроса к базе данных; это базовый навык.

**Вопрос 3:** Почему Kaggle-соревнования — эффективный способ обучения?
- A) За победу платят деньги
- B) Реальные данные, сравнение с тысячами решений, публичные ноутбуки с лучшими подходами
- C) Там используются новейшие алгоритмы
- D) Kaggle обязателен для трудоустройства
**Ответ:** B) Реальные данные и доступ к лучшим решениям — после соревнования вы видите, как решают задачу эксперты; это лучше любого учебника.

**Вопрос 4:** Вы хотите стать ML Engineer (а не Data Scientist). На что делать акцент?
- A) Статистика и A/B тестирование
- B) Python, deployment (Docker, FastAPI), MLOps (мониторинг, CI/CD), облачные платформы
- C) Визуализация данных и storytelling
- D) Академические исследования и статьи
**Ответ:** B) Python + deployment + MLOps — ML Engineer фокусируется на построении и поддержке ML-систем в production.

**Вопрос 5:** Что важнее для первого pet-проекта?
- A) Использовать самый современный алгоритм (трансформер, нейросеть)
- B) Взять реальный датасет, решить задачу полностью и доделать до конца
- C) Получить максимальную точность
- D) Опубликовать научную статью
**Ответ:** B) Реальный датасет и довести до конца — законченный простой проект ценнее незаконченного сложного; он показывает, что вы умеете доводить дело до конца.

## 0. Карта направления

### AI — Artificial Intelligence / Искусственный интеллект

Общее название для систем, которые пытаются выполнять задачи, похожие на человеческое мышление.

Направление про работу с данными: изучение, анализ, поиск закономерностей и построение моделей.

### Model / Модель

### Prediction / Предсказание

Ответ модели на новых данных.

### Training / Обучение

Этап, когда модель смотрит на примеры и настраивает себя.

Именно тут она “учится”.
