# 37. One-Hot Encoding простыми словами

## Зачем это нужно

В уроке 28 мы разобрали, что категориальные признаки нужно кодировать. **One-Hot Encoding** — один из основных способов: подходит для категорий без естественного порядка и не создаёт ложной шкалы.

---

## Простая интуиция

Допустим, есть признак:

```text
city = Berlin
```

Модель не понимает строку `Berlin` как число.

Можно было бы сделать так:

```text
Berlin = 1
Hamburg = 2
Munich = 3
```

Но это плохая идея для городов, потому что у них нет порядка.
`Munich` не "больше" `Hamburg`, а `Hamburg` не "больше" `Berlin`.

One-Hot Encoding решает это иначе:

```text
city_Berlin = 1
city_Hamburg = 0
city_Munich = 0
```

То есть мы создаём отдельный признак для каждой категории.

---

## Что это такое

**One-Hot Encoding** — это способ кодирования категорий, где каждая категория превращается в отдельную колонку.

Если объект относится к категории — ставим `1`.
Если не относится — ставим `0`.

Было:

| city    |
| ------- |
| Berlin  |
| Hamburg |
| Munich  |
| Berlin  |

Стало:

| city_Berlin | city_Hamburg | city_Munich |
| ----------: | -----------: | ----------: |
|           1 |            0 |           0 |
|           0 |            1 |           0 |
|           0 |            0 |           1 |
|           1 |            0 |           0 |

---

## Как это работает

### 1. Берём категориальный признак

Например:

```text
device = mobile / desktop / tablet
```

---

### 2. Создаём отдельную колонку для каждой категории

Получаем:

```text
device_mobile
device_desktop
device_tablet
```

---

### 3. Заполняем колонки нулями и единицами

Если у объекта `device = mobile`, то:

```text
device_mobile = 1
device_desktop = 0
device_tablet = 0
```

Если `device = desktop`, то:

```text
device_mobile = 0
device_desktop = 1
device_tablet = 0
```

---

## Простой пример

Есть данные:

| user_id | device  | bought |
| ------: | ------- | -----: |
|       1 | mobile  |      1 |
|       2 | desktop |      0 |
|       3 | mobile  |      1 |
|       4 | tablet  |      0 |

`device` — категориальный признак.
`bought` — target.

После One-Hot Encoding:

| user_id | device_mobile | device_desktop | device_tablet | bought |
| ------: | ------------: | -------------: | ------------: | -----: |
|       1 |             1 |              0 |             0 |      1 |
|       2 |             0 |              1 |             0 |      0 |
|       3 |             1 |              0 |             0 |      1 |
|       4 |             0 |              0 |             1 |      0 |

Теперь модель получает числа и может использовать `device` как признак.

---

### Пример в Pandas

```python
import pandas as pd

df = pd.DataFrame({
    "device": ["mobile", "desktop", "mobile", "tablet"],
    "bought": [1, 0, 1, 0]
})

df_encoded = pd.get_dummies(df, columns=["device"])
print(df_encoded)
```

Результат будет примерно таким:

```text
bought  device_desktop  device_mobile  device_tablet
1       0               1              0
0       1               0              0
1       0               1              0
0       0               0              1
```

---

### Когда One-Hot Encoding подходит

One-Hot Encoding хорошо подходит, если:

* категорий не слишком много;
* между категориями нет естественного порядка;
* модель не умеет работать со строками напрямую;
* нужно сохранить смысл "это просто разные варианты".

Примеры хороших признаков:

| Признак        | Категории                 |
| -------------- | ------------------------- |
| device         | mobile / desktop / tablet |
| payment_method | card / cash / transfer    |
| color          | red / blue / green        |
| city           | Berlin / Hamburg / Munich |

---

### Когда One-Hot Encoding может быть неудобен

Если категорий очень много, One-Hot Encoding создаст слишком много новых колонок.

Например:

```text
city = 10 000 разных городов
```

После кодирования может появиться почти `10 000` новых признаков.

Это может:

* раздуть таблицу;
* замедлить обучение;
* увеличить расход памяти;
* сделать данные сложнее для обработки.

В таких случаях могут понадобиться другие способы кодирования.

---

### Важный момент про новые категории

Модель может столкнуться с категорией, которой не было на обучении.

Например, на train были:

```text
mobile
desktop
```

А в новых данных пришло:

```text
tablet
```

Если это не обработать заранее, могут возникнуть проблемы.

Обычно для таких случаев используют настройки encoder'а или отдельную категорию:

```text
unknown
```

Смысл: если категория неизвестна, не ломаем обработку, а относим её к "другим".

---

## Как это связано с ML

One-Hot Encoding — часть Feature Engineering.

```text
сырые данные -> кодирование категорий -> признаки -> модель
```

Он помогает модели использовать категориальные признаки без ложного порядка.

Главная идея:

> категория превращается не в одно число, а в набор признаков `0/1`.

Так модель понимает не "какая категория больше", а "к какой категории относится объект".

---

## Практика

1. Объясните своими словами, во что One-Hot Encoding превращает одну категориальную колонку.
2. Признак `device` имеет категории `mobile`, `desktop`, `tablet`. Во что превратится строка с `device = tablet` после One-Hot Encoding?
3. Признак `country` содержит 5000 уникальных стран. Какая проблема возникнет при применении One-Hot Encoding?
4. Из урока 28 мы знаем, что для неупорядоченных категорий нельзя использовать числа `1/2/3`. Как именно One-Hot Encoding решает проблему ложного порядка?
5. На train вы использовали `pd.get_dummies` для колонки `city` с городами Berlin и Hamburg. В новых данных появился Munich. Как это скажется на структуре признаков и что с этим делать?

## Краткий итог

* One-Hot Encoding превращает категории в отдельные колонки.
* В колонках используются значения `0` и `1`.
* Метод хорошо подходит для категорий без естественного порядка.
* Он не создаёт ложную шкалу между категориями.
* При большом количестве категорий может появиться слишком много новых признаков.
* Новые неизвестные категории нужно учитывать заранее.

# 38. Label Encoding простыми словами

## Зачем это нужно

Мы уже знаем (урок 28), что категориальные признаки нужно кодировать. **Label Encoding** — самый простой способ: каждой категории присваивается число. Простой, но с важным риском ложного порядка.

---

## Простая интуиция

Label Encoding просто заменяет каждую категорию на число.

Было:

```text
city = Berlin
city = Hamburg
city = Munich
```

Стало:

```text
Berlin  -> 0
Hamburg -> 1
Munich  -> 2
```

То есть каждая категория получает свой числовой код.

---

## Что это такое

**Label Encoding** — это способ кодирования категорий, при котором каждому уникальному значению присваивается отдельное число.

Пример:

| city    | city_encoded |
| ------- | -----------: |
| Berlin  |            0 |
| Hamburg |            1 |
| Munich  |            2 |
| Berlin  |            0 |

Модель уже получает не строки, а числа.

Но здесь есть важный нюанс: эти числа не всегда имеют смысл как порядок.

---

## Как это работает

### 1. Берём категориальный признак

Например:

```text
city = Berlin / Hamburg / Munich
```

---

### 2. Находим все уникальные категории

```text
Berlin
Hamburg
Munich
```

---

### 3. Каждой категории даём номер

```text
Berlin  -> 0
Hamburg -> 1
Munich  -> 2
```

---

### 4. Заменяем строки на числа

Было:

| city    |
| ------- |
| Berlin  |
| Munich  |
| Hamburg |
| Berlin  |

Стало:

| city_encoded |
| -----------: |
|            0 |
|            2 |
|            1 |
|            0 |

---

### Важный момент

Label Encoding может создать ложный порядок.

Например:

```text
Berlin = 0
Hamburg = 1
Munich = 2
```

Модель может воспринять это так, будто:

```text
Munich > Hamburg > Berlin
```

Но у городов нет такого смысла.
Город с кодом `2` не "больше" города с кодом `1`.

Поэтому Label Encoding не всегда подходит для обычных неупорядоченных категорий.

---

### Когда Label Encoding подходит

Label Encoding можно использовать, когда категории имеют естественный порядок.

Например:

```text
low < medium < high
```

Или:

```text
junior < middle < senior
```

Тогда числа отражают реальный смысл:

| level  | encoded |
| ------ | ------: |
| junior |       0 |
| middle |       1 |
| senior |       2 |

Здесь порядок важен и понятен.

---

### Label Encoding vs One-Hot Encoding

| Способ           | Что делает                                     | Когда подходит                                                         |
| ---------------- | ---------------------------------------------- | ---------------------------------------------------------------------- |
| Label Encoding   | Заменяет категорию одним числом                | Когда есть порядок или модель умеет нормально работать с такими кодами |
| One-Hot Encoding | Создаёт отдельную колонку для каждой категории | Когда порядка между категориями нет                                    |

Пример для `city`:

### Label Encoding

| city    | encoded |
| ------- | ------: |
| Berlin  |       0 |
| Hamburg |       1 |
| Munich  |       2 |

Может появиться ложный порядок.

### One-Hot Encoding

| city_Berlin | city_Hamburg | city_Munich |
| ----------: | -----------: | ----------: |
|           1 |            0 |           0 |
|           0 |            1 |           0 |
|           0 |            0 |           1 |

Порядок не создаётся.

---

## Простой пример

```python
from sklearn.preprocessing import LabelEncoder

cities = ["Berlin", "Hamburg", "Munich", "Berlin"]

encoder = LabelEncoder()
cities_encoded = encoder.fit_transform(cities)
print(cities_encoded)
```

Результат:

```text
[0 1 2 0]
```

`LabelEncoder` нашёл уникальные категории и заменил их числами.

---

### Важное уточнение

В `sklearn` `LabelEncoder` чаще используют для кодирования `y`, то есть target.

Например:

```text
cat -> 0
dog -> 1
bird -> 2
```

Для признаков `X` чаще используют другие инструменты, например:

* `OrdinalEncoder`;
* `OneHotEncoder`.

Смысл похожий, но важно не путать, где именно применяется кодирование.

---

## Как это связано с ML

Label Encoding — часть подготовки категориальных данных.

```text
категории -> числовые коды -> модель
```

Он помогает быстро превратить строки в числа.

Но его нельзя применять бездумно: если между категориями нет порядка, модель может увидеть там ложную шкалу.

Главный вопрос:

> есть ли у категорий настоящий порядок?

Если да — Label / Ordinal Encoding может подойти.
Если нет — чаще безопаснее One-Hot Encoding.

---

## Практика

1. Что делает Label Encoding: какой принцип лежит в основе кодирования?
2. Вы применяете Label Encoding к признаку `city`: Berlin→0, Hamburg→1, Munich→2. Почему линейная модель может воспринять это как ложный смысл?
3. Для каких двух типов признаков Label Encoding оправдан, а для каких создаёт проблему?
4. Из урока 29 мы знаем, что One-Hot Encoding создаёт отдельную колонку для каждой категории. В чём преимущество Label Encoding по сравнению с One-Hot Encoding для признака с 1000 уникальных значений?
5. Вы кодируете признак `priority = low / normal / high / critical`. Объясните, почему здесь Label Encoding разумнее, чем One-Hot Encoding.

## Краткий итог

* Label Encoding заменяет категории числами.
* Каждая уникальная категория получает свой код.
* Это простой способ превратить строки в числовой вид.
* Главный риск — ложный порядок между категориями.
* Для категорий с естественным порядком такой подход может быть уместен.
* Для категорий без порядка часто безопаснее использовать One-Hot Encoding.

# 39. Ordinal Encoding простыми словами

## Зачем это нужно

Урок 30 показал, что Label Encoding опасен ложным порядком для неупорядоченных категорий. **Ordinal Encoding** — правильный способ для категорий, где порядок действительно есть: `small < medium < large`, `junior < senior`. Числа здесь несут реальный смысл.

---

## Простая интуиция

Если категории можно расположить по порядку, их можно закодировать числами.

Например:

```text
small  -> 0
medium -> 1
large  -> 2
```

Здесь числа отражают реальный смысл:

```text
small < medium < large
```

Это не просто случайные ID.
Это числовое представление порядка.

---

## Что это такое

**Ordinal Encoding** — это способ кодирования категориальных признаков, где категории заменяются числами с учётом их порядка.

Пример:

| size   | size_encoded |
| ------ | -----------: |
| small  |            0 |
| medium |            1 |
| large  |            2 |

Так модель получает числовой признак, где большее число действительно означает "выше", "больше" или "сильнее" по смыслу.

---

## Как это работает

### 1. Берём признак с порядком

Например:

```text
education_level = school / bachelor / master / phd
```

Здесь порядок есть:

```text
school < bachelor < master < phd
```

---

### 2. Задаём правильную последовательность

Важно не доверять случайному порядку из данных.

Нужно явно сказать:

```text
school   -> 0
bachelor -> 1
master   -> 2
phd      -> 3
```

---

### 3. Заменяем категории числами

Было:

| education_level |
| --------------- |
| bachelor        |
| phd             |
| school          |
| master          |

Стало:

| education_level_encoded |
| ----------------------: |
|                       1 |
|                       3 |
|                       0 |
|                       2 |

Теперь модель может использовать этот признак как число.

---

## Простой пример

Есть признак качества товара:

```text
quality = low / medium / high
```

У него есть порядок:

```text
low < medium < high
```

Можно закодировать так:

| quality | quality_encoded |
| ------- | --------------: |
| low     |               0 |
| medium  |               1 |
| high    |               2 |

Это логично, потому что `high` действительно выше, чем `medium`, а `medium` выше, чем `low`.

---

### Ordinal Encoding vs Label Encoding

Оба способа заменяют категории числами, но смысл разный.

| Способ           | Что делает                              | Главный риск                   |
| ---------------- | --------------------------------------- | ------------------------------ |
| Label Encoding   | даёт категориям числовые коды           | может создать ложный порядок   |
| Ordinal Encoding | кодирует категории по реальному порядку | нужно правильно задать порядок |

Пример с городами:

```text
Berlin -> 0
Hamburg -> 1
Munich -> 2
```

Для городов это плохо, потому что порядка нет.

А вот для уровня:

```text
junior -> 0
middle -> 1
senior -> 2
```

это нормально, потому что порядок есть.

---

### Когда Ordinal Encoding подходит

Ordinal Encoding хорошо подходит для признаков вроде:

| Признак      | Порядок                            |
| ------------ | ---------------------------------- |
| size         | small < medium < large             |
| level        | beginner < intermediate < advanced |
| education    | school < bachelor < master < phd   |
| satisfaction | low < medium < high                |
| priority     | low < normal < high < critical     |

Главное условие:

> категории должны иметь понятный естественный порядок.

Если порядка нет, лучше использовать One-Hot Encoding.

---

### Важный момент

Ordinal Encoding сохраняет порядок, но не всегда точно передаёт расстояние между категориями.

Например:

```text
junior = 0
middle = 1
senior = 2
```

Порядок правильный.

Но это не значит, что разница между `junior` и `middle` точно такая же, как между `middle` и `senior`.

Числа здесь показывают порядок, а не точное расстояние.

---

## Как это связано с ML

Ordinal Encoding — часть подготовки категориальных признаков.

```text
категории с порядком -> числа -> модель
```

Он помогает модели использовать признаки, где порядок действительно важен.

Но его нельзя применять ко всем категориям подряд.

Главный вопрос перед использованием:

> есть ли у категорий реальный порядок?

Если да — Ordinal Encoding может подойти.
Если нет — лучше не создавать искусственную шкалу.

---

## Практика

1. Что такое Ordinal Encoding и чем он принципиально отличается от Label Encoding?
2. Для признака `education = school / bachelor / master / phd` задайте правильный порядок кодирования числами от 0 до 3.
3. Почему Ordinal Encoding нельзя применять к признаку `city = Berlin / Hamburg / Munich`?
4. Из урока 30 мы знаем, что Label Encoding создаёт ложный порядок для неупорядоченных категорий. В каком случае Ordinal Encoding — это правильный способ сделать то же самое?
5. Признак `satisfaction = low / medium / high`. Вы закодировали: low=1, medium=2, high=3. Можно ли утверждать, что «разница между low и medium» равна «разнице между medium и high»? Что это говорит об ограничениях Ordinal Encoding?

## Краткий итог

* Ordinal Encoding превращает категории в числа с учётом порядка.
* Он подходит только для признаков, где порядок реально есть.
* Примеры: размер, уровень, приоритет, образование, качество.
* Для категорий без порядка лучше использовать One-Hot Encoding.
* Числа в Ordinal Encoding показывают порядок, но не всегда точное расстояние между категориями.

# 40. Создание новых признаков

## Зачем это нужно

Иногда в данных уже есть полезная информация, но она лежит не в самом удобном виде.
Модель может видеть отдельные колонки, но не понимать важную связь между ними.

**Создание новых признаков** помогает явно показать модели полезные закономерности.

---

## Простая интуиция

Допустим, есть две колонки:

```text
total_spent = 1000
orders_count = 5
```

По отдельности они полезны.
Но из них можно создать новый признак:

```text
average_order_value = total_spent / orders_count
```

Получим:

```text
average_order_value = 200
```

Теперь модель видит не только общую сумму и количество заказов, но и средний чек.

---

## Что это такое

**Создание новых признаков** — это процесс, где мы получаем новые колонки из уже существующих данных.

Новый признак может быть:

* отношением двух чисел;
* разницей между значениями;
* группировкой;
* флагом `0/1`;
* частью даты;
* упрощённой версией сложного признака.

Главная идея:

> новый признак должен добавлять полезный смысл, а не просто увеличивать количество колонок.

---

## Как это работает

### 1. Смотрим на смысл колонок

Перед созданием признака нужно понять, что означают исходные данные.

Например:

```text
total_spent
orders_count
```

Если это сумма покупок и количество заказов, из них логично получить средний чек.

---

### 2. Создаём новый признак

Пример:

```text
average_order_value = total_spent / orders_count
```

Это может быть полезнее, чем смотреть только на сумму покупок.

Пользователь с 1 заказом на 1000 и пользователь с 10 заказами на 1000 — разные случаи.

---

### 3. Проверяем, нет ли утечки данных

Нельзя создавать признак из target.

Например, если мы предсказываем `price`, нельзя делать:

```text
price_per_m2 = price / area_m2
```

Потому что `price` — это ответ, который модель должна предсказать.
Такой признак будет нечестной подсказкой.

---

### 4. Проверяем, был бы признак известен в момент предсказания

Главный вопрос:

> эта информация была бы доступна до того, как модель делает предсказание?

Если нет — признак использовать нельзя.

---

### Примеры новых признаков

#### 1. Отношение

```text
average_order_value = total_spent / orders_count
```

Показывает средний чек.

---

### 2. Разница

```text
days_since_last_order = today - last_order_date
```

Показывает, как давно пользователь ничего не покупал.

---

### 3. Флаг 0/1

```text
is_weekend = 1
```

если событие произошло в выходной.

```text
is_first_floor = 1
```

если квартира находится на первом этаже.

---

### 4. Признаки из даты

Из даты можно получить:

```text
day_of_week
month
hour
is_weekend
```

Сама дата может быть неудобной, а отдельные части даты — полезными.

---

### 5. Группировка

Возраст можно превратить в возрастную группу:

```text
18-25
26-35
36-50
50+
```

Иногда группе проще показать общий смысл, чем точному числу.

---

## Простой пример

Есть данные:

| total_spent | orders_count | last_order_days_ago |
| ----------: | -----------: | ------------------: |
|        1000 |            5 |                   3 |
|         300 |            1 |                  40 |
|        2400 |           12 |                   2 |

Можно создать новый признак:

```text
average_order_value = total_spent / orders_count
```

Получим:

| total_spent | orders_count | average_order_value | last_order_days_ago |
| ----------: | -----------: | ------------------: | ------------------: |
|        1000 |            5 |                 200 |                   3 |
|         300 |            1 |                 300 |                  40 |
|        2400 |           12 |                 200 |                   2 |

Теперь модель видит средний чек напрямую.

---

### Хороший новый признак

Хороший признак обычно отвечает хотя бы на один вопрос:

* он добавляет новый смысл?
* он помогает лучше описать объект?
* он был бы известен в момент предсказания?
* он не содержит target внутри себя?
* он понятен по логике задачи?

Если новый признак просто создаётся "потому что можно", пользы может не быть.
Иногда лишние признаки только добавляют шум.

---

## Как это связано с ML

Создание новых признаков — часть Feature Engineering.

```text
сырые данные -> новые признаки -> обучение модели -> оценка качества
```

Модель не всегда сама легко находит полезные связи между колонками.
Новый признак может подсветить эту связь явно.

Но каждый новый признак нужно проверять через качество модели, а не добавлять вслепую.

---

## Практика

1. Зачем создавать новые признаки, если данные уже есть в исходной таблице?
2. У вас есть `total_spent` и `orders_count`. Какой новый признак из них получить и что именно он добавляет для модели?
3. Из даты `order_date` вы хотите создать три новых признака. Назовите их и объясните, какую закономерность каждый позволяет обнаружить.
4. Из урока 08 мы знаем, что нельзя использовать признаки, известные после события. Вы хотите создать признак `days_since_purchase`. Когда он будет честным, а когда — утечкой?
5. Признак `is_first_floor` (0/1 — квартира на первом этаже). Вы предсказываете цену квартиры. Объясните, почему такой флаг может быть полезнее, чем просто колонка `floor`.

## Краткий итог

* Создание новых признаков — это получение новых колонок из уже существующих данных.
* Новый признак должен добавлять полезный смысл.
* Частые варианты: отношения, разницы, флаги, признаки из дат, группировки.
* Нельзя создавать признаки из target.
* Важно проверять, был бы признак известен в момент предсказания.
* Хорошие признаки могут улучшить модель сильнее, чем замена алгоритма.

# 41. Удаление лишних признаков

## Зачем это нужно

Больше признаков — не всегда лучше.

Иногда в таблице есть колонки, которые:

* не помогают модели;
* добавляют шум;
* дублируют другие признаки;
* содержат техническую информацию;
* могут привести к утечке данных;
* делают обучение медленнее.

**Удаление лишних признаков** нужно, чтобы оставить в данных только то, что реально может помочь модели.

---

## Простая интуиция

Модель учится по тому, что мы ей показываем.
Если дать ей полезные признаки — она ищет закономерности.
Если дать много мусора — она может начать искать смысл там, где его нет.

Например:

```text
client_id = 847392
```

Сам по себе `client_id` обычно не описывает поведение клиента.
Это просто технический номер.

Модель может случайно найти связь между ID и target, но эта связь не будет работать на новых данных.

---

## Что это такое

**Удаление лишних признаков** — это этап Feature Engineering, где мы убираем колонки, которые не стоит передавать модели.

Цель не в том, чтобы сделать таблицу меньше ради красоты.
Цель — улучшить качество данных для обучения.

```text
сырые признаки -> отбор полезных признаков -> модель
```

---

## Как это работает

### 1. Технические идентификаторы

Примеры:

```text
id
user_id
row_number
transaction_uuid
```

Такие колонки часто нужны для хранения данных, но не для обучения модели.
Они могут быть случайными и не иметь полезного смысла для предсказания.

---

### 2. Колонки с утечкой данных

Это признаки, которые содержат информацию о target или о будущем.

Например, если мы предсказываем, купит ли пользователь товар, нельзя использовать колонку:

```text
purchase_date
```

если она появляется только после покупки.

Главный вопрос:

> эта информация была бы известна в момент предсказания?

Если нет — колонку нужно убрать.

---

### 3. Дублирующие признаки

Иногда в данных есть почти одинаковые колонки.

Например:

```text
price_rub
price
```

Если обе колонки содержат одно и то же, одна из них может быть лишней.
Дубли могут перегружать данные и не добавлять нового смысла.

---

### 4. Константные признаки

Если колонка почти везде имеет одно и то же значение, она обычно бесполезна.

Пример:

| country |
| ------- |
| Germany |
| Germany |
| Germany |
| Germany |

Если все объекты из одной страны, признак `country` не помогает модели различать объекты между собой.

---

### 5. Очень шумные признаки

Иногда колонка вроде бы выглядит полезной, но по смыслу ничего не объясняет.

Например:

```text
random_code
session_hash
internal_number
```

Такие признаки могут создавать ложные закономерности.

---

## Простой пример

Есть таблица для предсказания покупки:

| user_id | age | city    | orders_count | random_code | bought |
| ------: | --: | ------- | -----------: | ----------- | -----: |
|     101 |  25 | Berlin  |            3 | AX91        |      1 |
|     102 |  40 | Hamburg |            0 | QP22        |      0 |
|     103 |  31 | Berlin  |            5 | LM77        |      1 |

`bought` — target.

Что можно оставить:

```text
age
city
orders_count
```

Что лучше убрать:

```text
user_id
random_code
```

Почему:

* `user_id` — технический идентификатор;
* `random_code` — случайный код без понятного смысла;
* `bought` нельзя оставлять в X, потому что это target.

---

### Как понять, что признак лишний

Перед удалением признака можно задать несколько вопросов:

1. Этот признак описывает объект по смыслу?
2. Он был бы известен в момент предсказания?
3. Он не является target или его прямым следствием?
4. Он не дублирует другую колонку?
5. В нём есть разные значения, а не одно и то же почти везде?

Если ответ "нет" — признак стоит проверить внимательнее.

---

### Удалять признаки нужно осторожно

Не стоит удалять колонки просто потому, что они выглядят странно.

Иногда необычный признак может быть полезным.

Например:

```text
orders_count
last_login_days_ago
failed_payments_count
```

На первый взгляд это просто числа.
Но они могут хорошо описывать поведение объекта.

Поэтому правильный подход такой:

```text
понять смысл признака -> проверить риск утечки -> оценить пользу -> удалить или оставить
```

---

## Как это связано с ML

Удаление лишних признаков помогает модели не отвлекаться на шум.

Это влияет на:

* качество модели;
* скорость обучения;
* риск переобучения;
* понятность пайплайна;
* стабильность на новых данных.

Особенно важно удалять признаки с утечкой данных.
Они могут дать красивое качество на обучении, но сломать модель в реальной работе.

---

## Практика

1. Почему большое количество признаков не всегда улучшает модель и может даже навредить?
2. В таблице для предсказания покупки есть колонки: `user_id`, `age`, `city`, `orders_count`, `session_hash`, `bought`. Какие из них включить в X, какие исключить и почему?
3. Чем опасен константный признак (колонка, где почти все значения одинаковы)?
4. Из урока 08 мы знаем, что признаки, появившиеся после события, нельзя использовать. Как это правило применяется к этапу удаления лишних признаков?
5. Вы удалили 5 признаков из X, и val-метрика улучшилась. Как объяснить, почему меньше признаков дало лучший результат?

## Краткий итог

* Лишние признаки могут добавлять шум и ухудшать обучение.
* Технические ID обычно не помогают модели.
* Target нельзя оставлять внутри `X`.
* Признаки с утечкой данных нужно удалять.
* Дублирующие и константные колонки часто не дают пользы.
* Удаление признаков — часть Feature Engineering.
* Хороший набор признаков важнее большого количества колонок.

# 42. Data Leakage: опасная ошибка в ML

## Зачем это нужно

Data Leakage — одна из самых опасных ошибок в машинном обучении.

Модель может показывать отличное качество на обучении и тестах, но плохо работать в реальности.

Почему так происходит?

Потому что в признаки случайно попадает информация, которой у модели **не должно было быть в момент предсказания**.

---

## Простая интуиция

Представь, что студент готовится к экзамену.

Честный вариант:

```text
учебник -> экзамен -> ответ
```

Нечестный вариант:

```text
учебник + правильные ответы -> экзамен -> ответ
```

Результат будет отличным, но это не значит, что студент реально понял тему.

В ML происходит похожая ситуация.
Модель получает подсказку из будущего или из target, поэтому кажется очень умной.

Но в реальной работе такой подсказки уже не будет.

---

## Что это такое

**Data Leakage** — это ситуация, когда в обучение модели попадает информация, которая не должна быть доступна при реальном предсказании.

Проще:

> модель случайно получает подсказку к правильному ответу.

Из-за этого качество на validation/test может выглядеть слишком хорошим.

Но это качество нечестное.

---

## Как это работает

Допустим, мы хотим предсказать:

```text
купит пользователь товар или нет
```

Target:

```text
bought = 1 / 0
```

В данных есть колонка:

```text
purchase_date
```

Проблема: дата покупки появляется только после покупки.

Если использовать `purchase_date` как признак, модель почти напрямую узнает ответ.

```text
есть purchase_date -> скорее всего bought = 1
нет purchase_date -> скорее всего bought = 0
```

Это утечка данных.

---

### Основные виды Data Leakage

#### 1. Target попал в признаки

Самый прямой вариант.

Например, мы предсказываем `price`, но создаём признак:

```text
price_per_m2 = price / area_m2
```

`price` — это target.
Значит, модель получила часть правильного ответа внутри признака.

Так делать нельзя.

---

### 2. Признак появился после события

Если признак становится известен только после того, что мы предсказываем, это утечка.

Пример:

```text
bought
purchase_date
delivery_status
final_payment_amount
```

Если мы предсказываем покупку заранее, нельзя использовать данные, которые появились после покупки.

Главный вопрос:

> эта колонка была бы известна в момент предсказания?

Если нет — её нельзя использовать.

---

### 3. Обработка данных сделана до split

Иногда утечка появляется не из-за колонки, а из-за неправильного порядка действий.

Например, нельзя сначала посчитать среднее по всему датасету, заполнить пропуски, а потом делить данные на train/test.

Плохо:

```text
весь датасет -> fill missing -> split
```

Правильно:

```text
split -> fit обработки на train -> применить к validation/test
```

Иначе информация из test попадёт в train через обработку данных.

---

### 4. Дубликаты между train и test

Если одинаковые или почти одинаковые объекты попали и в train, и в test, модель может просто запомнить их.

Качество будет выглядеть хорошим, но проверка уже не будет честной.

---

## Простой пример

Задача:

```text
предсказать, уйдёт ли клиент из сервиса
```

Target:

```text
churn = 1 / 0
```

Есть признаки:

| Признак                   | Можно использовать? | Почему                                 |
| ------------------------- | ------------------- | -------------------------------------- |
| age                       | да                  | известен заранее                       |
| plan_type                 | да                  | известен заранее                       |
| orders_count_last_30_days | да                  | если считается до момента предсказания |
| cancellation_date         | нет                 | появляется после ухода                 |
| final_status              | нет                 | напрямую связан с ответом              |

`cancellation_date` и `final_status` дают модели подсказку из будущего.

Это Data Leakage.

---

### Как находить Data Leakage

Перед тем как добавить признак в `X`, задай три вопроса:

1. Эта колонка была бы известна в момент предсказания?
2. Не содержит ли она target напрямую или косвенно?
3. Не появилась ли она после события, которое мы пытаемся предсказать?

Если есть сомнение — признак нужно проверить внимательнее.

---

### Почему это опасно

Data Leakage опасна тем, что создаёт иллюзию хорошей модели.

Модель может показывать:

```text
accuracy = 0.99
```

Но не потому, что она нашла настоящие закономерности.
А потому что получила нечестную подсказку.

В реальности качество резко упадёт, потому что таких подсказок уже не будет.

---

## Как это связано с ML

Data Leakage может сломать весь ML-пайплайн.

```text
данные -> признаки -> split -> обучение -> метрика
```

Если утечка попала в признаки или в обработку данных, метрика перестаёт быть честной.

Поэтому Data Leakage нужно проверять до обучения модели и во время анализа качества.

Особенно если качество выглядит слишком хорошим.

---

## Практика

1. Что такое Data Leakage и почему оно опасно, если модель показывает отличное качество на тестах?
2. Вы создаёте признак `price_per_m2 = price / area_m2` для задачи предсказания `price`. Почему этот признак нельзя использовать?
3. В задаче предсказания churn вы заполняете пропуски медианой, рассчитанной по всему датасету до split. Как именно это создаёт утечку из test в train?
4. Из урока 08 мы знаем главный вопрос для отбора признаков. Сформулируйте его и объясните, как он помогает предотвращать Data Leakage.
5. Простая модель неожиданно показала accuracy = 0.99 на val-выборке. Назовите два признака того, что это результат Data Leakage, а не реального качества модели.

## Краткий итог

* Data Leakage — это утечка информации в признаки или обучение модели.
* Модель получает данные, которых не было бы в реальный момент предсказания.
* Из-за этого качество на тестах может быть нечестно высоким.
* Нельзя использовать target или его прямые следствия внутри `X`.
* Нельзя использовать признаки, которые появились после события.
* Обработку данных нужно обучать на train, а не на всём датасете.
* Главный вопрос: была бы эта информация доступна в момент предсказания?

## 1. База про данные

### Dataset / Датасет

Это набор данных, на котором мы работаем.

Обычно это таблица, где строки — объекты, а столбцы — их свойства.

Одна запись в таблице.

Например, один клиент, один заказ или один товар.

### Column / Колонка

Один признак или одно поле в таблице.

Например: возраст, город, цена.

### Feature / Признак

Это информация, которую мы даём модели на вход.

Именно по признакам модель пытается понять ответ.

### Target / Целевая переменная

Это то, что мы хотим предсказать.

Например: уйдёт клиент или нет, какая будет цена, купит ли человек товар.

### X

Так часто называют все входные признаки модели.

Проще говоря: всё, на что модель смотрит перед ответом.

### y

Так часто называют target — правильный ответ, который модель должна научиться предсказывать.

Например: \`0\` или \`1\`, если это задача “да/нет”.

### Label

Почти то же самое, что target, особенно в задачах классификации.

Это правильный класс или ответ для примера.

### Missing values / Пропуски

Это пустые значения в данных.

Они мешают обучению и часто требуют отдельной обработки.

### Numerical feature / Числовой признак

Признак, который выражен числом.

Например: возраст, зарплата, количество покупок.

### Categorical feature / Категориальный признак

Признак, который описывает категорию, а не число.

Например: город, пол, тип клиента.

---

## 2. Как устроена задача в ML

### Supervised Learning / Обучение с учителем

У модели есть примеры с готовыми правильными ответами.

Она учится по ним предсказывать ответ для новых данных.

### Unsupervised Learning / Обучение без учителя

У модели нет готовых правильных ответов.

Она сама ищет структуру, группы или закономерности в данных.

### Classification / Классификация

Задача, где модель выбирает один из вариантов ответа.

Например: “спам / не спам”, “уйдёт / не уйдёт”.

### Regression / Регрессия

Задача, где модель предсказывает число.

Например: цену квартиры или сумму заказа.

### Clustering / Кластеризация

Задача, где похожие объекты автоматически собираются в группы.

Например: сегменты клиентов по поведению.

### Binary classification

Классификация, где всего два варианта ответа.

Например: “да / нет”.

### Multiclass classification

Классификация, где вариантов ответа больше двух.

Например: определить категорию товара из нескольких классов.

### Baseline

Это очень простое стартовое решение, с которым сравнивают всё остальное.

Нужно, чтобы понять: новая модель реально лучше или просто сложнее.

---

## 3. Разделение данных

### Train set / Обучающая выборка

Часть данных, на которой модель учится.

Это её “учебник”.

### Validation set / Валидационная выборка

Часть данных, на которой мы проверяем модель в процессе работы.

Она помогает сравнивать варианты и настраивать модель.

### Test set / Тестовая выборка

Часть данных для финальной честной проверки.

На ней смотрят, как модель работает на новых данных.

### Split / Разбиение данных

Это разделение датасета на train, validation и test.

Нужно, чтобы обучение и проверка были честными.

### Generalization / Обобщающая способность

Способность модели хорошо работать не только на знакомых данных, но и на новых.

Это одна из главных целей ML.

---

## 4. Как модель учится

### Algorithm / Алгоритм

Это способ, по которому строится модель.

Например: линейная регрессия, дерево решений, нейросеть.

### Parameter / Параметр

Это внутренние настройки модели, которые она подбирает во время обучения.

Именно через них модель “запоминает” найденные закономерности.

### Epoch / Эпоха

Один полный проход модели по всем обучающим данным.

Часто модель обучается много эпох подряд.

### Loss function / Функция потерь

Это число, которое показывает, насколько модель ошибается во время обучения.

Чем меньше loss, тем лучше модель учится на текущем этапе.

### Optimization / Оптимизация

Процесс, в котором модель пытается уменьшить ошибку.

То есть постепенно становится точнее.

### Gradient descent / Градиентный спуск

Один из основных способов уменьшать ошибку модели.

Если очень просто: это метод, который помогает идти в сторону лучшего решения маленькими шагами.

### Learning rate / Скорость обучения

Показывает, насколько большими шагами модель меняет свои настройки.

Слишком большой шаг может мешать обучению, слишком маленький — делать его очень медленным.

---

## 5. Как понять, хороша ли модель

### Metric / Метрика

Это число, по которому мы оцениваем качество модели.

Разные задачи требуют разных метрик.

### Accuracy

Доля правильных ответов из всех ответов.

Полезная метрика, но иногда может обманывать, если классы несбалансированы.

### Precision

Показывает, как часто модель права, когда говорит “да”.

Важна там, где ложные срабатывания дорогие.

### Recall

Показывает, сколько настоящих “да” модель смогла найти.

Важна там, где опасно что-то пропустить.

### F1-score

Это баланс между precision и recall.

Удобно, когда важны оба показателя сразу.

### MAE — Mean Absolute Error

Средняя абсолютная ошибка в числовых задачах.

Показывает, на сколько в среднем модель ошибается.

### MSE — Mean Squared Error

Средняя ошибка, где большие промахи наказываются сильнее.

Часто используется в задачах регрессии.

### RMSE

Это корень из MSE.

Его удобно читать, потому что он ближе к обычному масштабу ошибки.

---

## 6. Что может пойти не так

### Overfitting / Переобучение

Модель слишком хорошо запомнила обучающие данные, но плохо работает на новых.

То есть она “выучила примеры”, а не поняла общий принцип.

### Underfitting / Недообучение

Модель слишком простая или слишком слабо обучена.

Она плохо работает даже на обучающих данных.

### Data leakage / Утечка данных

Ситуация, когда в признаки случайно попадает информация из будущего или почти готовый ответ.

Из-за этого модель кажется умной, хотя на деле проверка нечестная.

### Noise / Шум

Случайные или бесполезные данные, которые не помогают решать задачу.

Они могут мешать модели учиться.

### Outlier / Выброс

Очень необычное значение, сильно отличающееся от остальных.

Иногда это ошибка, а иногда редкий, но реальный случай.

### Imbalanced data / Дисбаланс классов

Ситуация, когда одного класса очень много, а другого очень мало.

Из-за этого модель может научиться игнорировать редкий, но важный класс.

---

## 7. Подготовка данных

### Preprocessing / Предобработка

Подготовка данных перед обучением.

Сюда входит очистка, заполнение пропусков, преобразование типов и другие шаги.

### Encoding / Кодирование категорий

Преобразование текстовых категорий в числовой вид, понятный модели.

Например, чтобы модель могла работать с колонкой “город”.

### One-hot encoding

Способ кодирования категорий, когда каждая категория превращается в отдельную колонку.

Например: Москва, Берлин, Париж — каждая как отдельный признак.

### Scaling / Масштабирование

Приведение числовых признаков к более удобному масштабу.

Это помогает некоторым моделям учиться стабильнее.

### Normalization / Нормализация

Один из способов привести значения к общему диапазону.

Часто используется, когда признаки слишком разные по масштабу.

### Standardization / Стандартизация

Преобразование данных так, чтобы у признака были удобные средние и разброс.

Это тоже помогает ряду моделей работать лучше.

### Feature engineering

Создание или улучшение признаков на основе исходных данных.

Часто хороший feature engineering даёт сильный прирост качества.

### Feature importance

Оценка того, насколько сильно признак влияет на решение модели.

Помогает понять, что для модели действительно важно.

---

## 8. Более глубокий слой

### Neural network / Нейронная сеть

Модель, вдохновлённая идеей работы нейронов.

Хорошо подходит для сложных задач: тексты, картинки, звук.

### Embedding

Способ представить объект в виде набора чисел так, чтобы похожие объекты были ближе друг к другу.

Часто используется для слов, текстов, товаров, пользователей.

### Transformer

Современная архитектура нейросетей, которая особенно хорошо работает с текстом.

Именно на ней построено много LLM.

### LLM — Large Language Model

Большая языковая модель, обученная на огромном количестве текста.

Она умеет понимать запросы и генерировать осмысленный текст.

### Fine-tuning

Дообучение уже готовой модели на своей задаче или своих данных.

Это дешевле и быстрее, чем обучать всё с нуля.

### Prompt

Текстовая инструкция, которую пользователь даёт языковой модели.

От формулировки prompt часто сильно зависит качество ответа.

---

## 9. Продовый слой

### Deployment

Этап, когда модель выкладывают в рабочую систему.

После этого её могут использовать реальные пользователи или сервисы.

### Monitoring

Наблюдение за моделью после запуска.

Нужно, чтобы замечать ошибки, просадку качества и странное поведение.

### Data drift

Ситуация, когда новые данные стали отличаться от тех, на которых модель училась.

Из-за этого качество модели может падать.

### Model drift

Ситуация, когда сама модель со временем начинает работать хуже.

Обычно это видно уже после запуска в реальной среде.

### Retraining

Повторное обучение модели на новых данных.

Нужно, чтобы она не устаревала.

### A/B test

Проверка двух вариантов решения на реальных пользователях.

Помогает понять, какой вариант действительно лучше на практике.`

## 1. База данных и постановка задачи

### 1. Что такое признаки, target, \`X\` и \`y\`?

**Признаки** — это входные данные, по которым модель делает предсказание.

**Target** — это то, что модель должна предсказать.

Обычно **\`X\`** — это таблица признаков, а **\`y\`** — колонка с правильными ответами.

Например: возраст и стаж — это признаки, а зарплата — target.

---

### 2. Чем отличается классификация от регрессии?

**Классификация** — это когда модель предсказывает класс или категорию: например, спам / не спам.

**Регрессия** — это когда модель предсказывает число: например, цену квартиры или выручку.

Главное отличие — в типе ответа.

---

### 3. Что такое обучающая, валидационная и тестовая выборки?

**Train** используется для обучения модели.

**Validation** нужна для подбора модели и настройки гиперпараметров.

**Test** используется для финальной честной оценки качества на данных, которые модель не видела.

Такое разделение помогает не обманывать себя при оценке.

---

### 4. Почему нельзя оценивать модель на тех же данных, на которых она обучалась?

Потому что модель может просто запомнить эти данные, а не научиться находить общую закономерность.

Тогда качество будет казаться высоким, но на новых данных модель может работать плохо.

Нам важно проверять не запоминание, а способность обобщать.

---

### 5. Что такое data leakage и почему это опасно?

**Data leakage** — это утечка информации из target или будущего в признаки.

Например, когда в \`X\` случайно попадает колонка, напрямую связанная с ответом.

Это опасно, потому что модель показывает искусственно хорошее качество, которое потом не повторяется в реальной работе.

---

## 2. Метрики

### 6. Что такое accuracy, precision, recall, F1-score? Когда какая метрика важнее?

**Accuracy** — доля правильных ответов среди всех объектов.

**Precision** показывает, насколько модель точна, когда говорит “положительный класс”.

**Recall** показывает, сколько реальных положительных объектов модель смогла найти.

**F1-score** — баланс между precision и recall.

Accuracy подходит при сбалансированных классах, recall важен, когда нельзя пропускать нужные случаи, precision — когда ложные срабатывания дорогие.

---

### 7. Почему accuracy может быть плохой метрикой?

Потому что при дисбалансе классов она может давать ложное ощущение хорошей модели.

Например, если 95% объектов относятся к одному классу, модель может всегда предсказывать только его и получить accuracy 95%, но быть бесполезной.

В таких случаях лучше смотреть precision, recall, F1, ROC-AUC или PR-AUC.

---

### 8. Что такое MAE, MSE, RMSE? Чем они отличаются?

Это метрики для регрессии.

**MAE** — средняя абсолютная ошибка, она показывает, на сколько модель ошибается в среднем.

**MSE** — средняя квадратичная ошибка, сильнее штрафует большие ошибки.

**RMSE** — это корень из MSE, он удобен тем, что возвращается в масштаб исходной величины.

---

### 9. Как выбрать метрику под задачу?

Метрика выбирается не по привычке, а по смыслу бизнеса и типу ошибки.

Если важно не пропускать положительные случаи — нужен recall.

Если важны минимальные ложные срабатывания — precision.

Если задача регрессии и большие ошибки особенно опасны — часто смотрят MSE или RMSE.

Если важна простая интерпретация ошибки — MAE.

---

### 10. Что делать, если метрика на train высокая, а на test заметно хуже?

Это типичный признак переобучения.

Нужно проверить сложность модели, утечки данных, корректность split, качество признаков и объём данных.

Часто помогают упрощение модели, регуляризация, кросс-валидация, больше данных или более аккуратная обработка признаков.

---

## 3. Переобучение и качество модели

### 11. Что такое overfitting и underfitting?

**Overfitting** — модель слишком хорошо запомнила train, но плохо работает на новых данных.

**Underfitting** — модель слишком простая и плохо работает даже на train.

В первом случае модель слишком сложная, во втором — слишком слабая или недообученная.

---

### 12. Как понять, что модель переобучилась?

Обычно качество на train заметно выше, чем на validation или test.

Это значит, что модель хорошо выучила обучающие данные, но плохо обобщает.

Также это видно по нестабильности на новых данных и сильной чувствительности к шуму.

---

### 13. Как можно бороться с переобучением?

Можно упростить модель, уменьшить глубину дерева, добавить регуляризацию, использовать кросс-валидацию, убрать слабые признаки, собрать больше данных.

Для нейросетей ещё применяют dropout и early stopping, но для классического ML чаще важны признаки, регуляризация и контроль сложности модели.

---

### 14. Что такое bias и variance в интуитивном смысле?

**Bias** — ошибка из-за слишком простой модели, которая плохо улавливает закономерность.

**Variance** — ошибка из-за слишком чувствительной модели, которая подстраивается под шум.

Хорошая модель должна находить баланс: не быть слишком простой и не переобучаться на детали train.

---

### 15. Зачем нужна baseline-модель?

Baseline — это простая стартовая точка, с которой сравнивают всё остальное.

Она показывает, действительно ли новая модель даёт улучшение, а не просто выглядит сложнее.

Без baseline легко переоценить результат.

---

## 4. Подготовка данных

### 16. Что делать с пропусками в данных?

Сначала нужно понять, почему пропуски появились и случайны ли они.

Потом можно удалять строки или колонки, заполнять средним, медианой, модой, специальным значением или отдельной категорией.

Иногда сам факт пропуска тоже полезен как признак.

---

### 17. Что делать с категориальными признаками?

Их нужно преобразовать в форму, с которой модель умеет работать.

Часто используют one-hot encoding, ordinal encoding, target encoding или модели, которые сами умеют работать с категориями, например CatBoost.

Выбор зависит от модели и числа уникальных значений.

---

### 18. Когда нужно масштабирование признаков, а когда нет?

Масштабирование нужно моделям, которые чувствительны к масштабу признаков: логистическая регрессия, линейная регрессия, SVM, k-NN, нейросети.

Обычно не нужно для деревьев, random forest и boosting на деревьях.

Главная идея — привести признаки к сопоставимому масштабу там, где это влияет на обучение.

---

### 19. Что такое one-hot encoding? Какие у него ограничения?

One-hot encoding превращает каждую категорию в отдельную бинарную колонку.

Например, признак “город” превращается в набор колонок: Москва, Берлин, Париж.

Ограничение в том, что при большом числе уникальных категорий количество колонок резко растёт, и это делает модель тяжелее и менее устойчивой.

---

### 20. Как понять, какие признаки полезны, а какие нет?

Смотрят на здравый смысл, корреляции, feature importance, permutation importance, SHAP, качество модели с разными наборами признаков.

Также важно понимать предметную область: не все статистически заметные признаки реально допустимы и полезны.

Полезный признак помогает модели улучшать качество без утечки и лишнего шума.

---

## 5. Модели

### 21. Как работает линейная регрессия на базовом уровне?

Линейная регрессия пытается описать зависимость target от признаков через линейную формулу.

Модель подбирает веса признаков так, чтобы предсказания были как можно ближе к реальным значениям.

Это простая и интерпретируемая модель для регрессии.

---

### 22. Как работает логистическая регрессия и почему она называется регрессией, хотя решает классификацию?

Логистическая регрессия сначала считает линейную комбинацию признаков, а потом пропускает её через сигмоиду, чтобы получить вероятность класса.

После этого вероятность переводится в класс по порогу.

Она называется регрессией потому, что внутри у неё линейная модель, но применяется она для классификации.

---

### 23. Как работает Decision Tree?

Decision Tree последовательно делит данные по условиям на признаки, например: возраст < 30, доход > 100000 и так далее.

В каждом узле дерево выбирает разбиение, которое лучше всего разделяет данные.

В итоге предсказание получается по пути от корня до листа.

---

### 24. Почему одно дерево решений часто переобучается?

Потому что дерево может выучить слишком много частных правил под конкретный train.

Если его не ограничивать по глубине и минимальному числу объектов в листе, оно начинает подстраиваться под шум.

Из-за этого на новых данных качество падает.

---

### 25. Что такое Random Forest и чем он лучше одного дерева?

Random Forest — это ансамбль из множества деревьев решений.

Каждое дерево обучается на случайной подвыборке данных и признаков, а итоговое предсказание получается через голосование или усреднение.

Это делает модель устойчивее и обычно уменьшает переобучение по сравнению с одним деревом.

---

### 26. Что такое Gradient Boosting в интуитивном смысле?

Это ансамбль, где деревья строятся последовательно, и каждое новое дерево пытается исправить ошибки предыдущих.

То есть модель обучается шаг за шагом, улучшая текущее решение.

Boosting часто даёт очень сильное качество на табличных данных.

---

### 27. Чем примерно отличаются XGBoost, LightGBM и CatBoost?

Все три — реализации gradient boosting на деревьях.

**XGBoost** — сильная и универсальная классика.

**LightGBM** часто быстрее и хорошо работает на больших данных.

**CatBoost** особенно удобен, когда много категориальных признаков, потому что умеет хорошо работать с ними из коробки.

---

### 28. Когда ты бы выбрал простую модель, а когда более сложную?

Простую модель стоит брать, когда важны интерпретируемость, скорость запуска, baseline или данных мало.

Сложную модель имеет смысл брать, если она реально даёт прирост качества и это важно для задачи.

Выбор всегда должен идти от задачи, данных и цены ошибки, а не от желания взять “модную” модель.

---

## 6. Практика и инженерный слой

### 29. Как бы ты решал задачу ML от начала до конца: от датасета до результата?

Сначала я бы понял постановку задачи и target, потом изучил данные: типы признаков, пропуски, распределения, дисбаланс.

Дальше сделал бы preprocessing, разделил данные на train/validation/test, выбрал baseline и подходящую метрику.

После этого обучил бы несколько моделей, сравнил результаты, проверил переобучение, интерпретировал выводы и выбрал лучший вариант.

В конце — сохранил пайплайн и оформил результат так, чтобы его можно было воспроизвести.

---

Здесь важно отвечать по структуре.

Нужно коротко описать задачу, данные, preprocessing, выбор метрики, baseline, модели, сравнение результатов и финальный вывод.

Хороший ответ показывает не только то, что ты “делал проект”, но и что ты понимаешь, почему принимал именно такие решения.

Ты — Senior Prompt Engineer.

Твоя задача — превращать краткие, размытые или неструктурированные запросы пользователя в полноценные, универсальные и инженерно-точные промты, которые можно напрямую использовать в любом AI-агенте (ChatGPT, Claude, и др.).

Ты создаешь не текст, а "исполняемый навык".

---

# 🧠 РЕЖИМ МЫШЛЕНИЯ

Ты всегда:

- думаешь как инженер, а не как копирайтер
- выявляешь реальную цель пользователя (а не формулировку)
- декомпозируешь задачу до уровня действий агента
- устраняешь неоднозначности
- проектируешь поведение агента, а не просто описание
- проверяешь промт на применимость в реальном использовании

---

# ⚠️ ОБРАБОТКА ВХОДА

Если задача:

- размытая
- абстрактная
- без контекста
- или имеет несколько трактовок

👉 ты НЕ генерируешь финальный промт сразу

👉 ты сначала задаешь уточняющие вопросы (минимально достаточные)

👉 и только после этого строишь финальный результат

Если данных достаточно — сразу переходишь к генерации

---

# 🧩 СТРУКТУРА ОТВЕТА

Ты ВСЕГДА отвечаешь в следующем формате:

---

# 🎯 Цель навыка

Кратко и точно: какой результат должен давать агент

---

# 🧠 Декомпозиция навыка

Разложи, что именно должен уметь агент:

- какие шаги делает
- какие решения принимает
- какие проверки выполняет

---

# ⚙️ Готовый промт (универсальный)

Сформируй промт, который можно сразу вставить в любой LLM:

---

Роль:
[конкретная роль агента]

Контекст:
[что важно знать, включая домен, ограничения, уровень пользователя]

Задача:
[четкое описание задачи]

Входные данные:
[что пользователь будет передавать]

Алгоритм работы:
[пошаговая логика действий агента]

Правила:

- без воды
- без галлюцинаций
- проверка логики
- если данных недостаточно — задать уточняющие вопросы
- не делать предположений без явного указания

Формат ответа:
[структура результата]

Критерии качества:

- результат применим на практике
- нет логических дыр
- соответствует задаче пользователя
- легко вставляется и используется

---

# 🔁 Пример использования

Покажи:

1. что пишет пользователь
2. какой результат он получает

---

# 🧪 (опционально) Улучшения

Если есть — предложи:

- как усилить промт
- как расширить навык
- где могут быть ограничения

---

# ❌ ЗАПРЕТЫ

- не упрощать задачу
- не генерировать "красивый текст ради текста"
- не терять смысл задачи

👉 пользователь копирует его

👉 вставляет в любой AI

👉 и получает ожидаемый результат без доработок`

    /* ─── MARKDOWN PARSER ─── */
    function mdToHtml(md) {
      if (!md) return '';
      md = md.replace(/^---[\r\n][\s\S]*?[\r\n]---[\r\n]?/, '');
      const cbs = [];
      md = md.replace(/```(\w*)\r?\n([\s\S]*?)```/g, (_, lang, code) => { cbs.push({ lang: lang.trim(), code: code.trimEnd() }); return '\x01CB' + (cbs.length - 1) + '\x01'; });
      const lines = md.split(/\r?\n/), out = []; let i = 0;
      while (i < lines.length) {
        const raw = lines[i], line = raw.trim();
        if (!line) { i++; continue; }
        if (line.startsWith('\x01CB')) { out.push(line); i++; continue; }
        const hm = line.match(/^(#{1,6})\s+([\s\S]+)/);
        if (hm) { out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`); i++; continue; }
        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) { out.push('<hr>'); i++; continue; }
        if (line.startsWith('>')) {
          const qs = [];
          while (i < lines.length && lines[i].trim().startsWith('>')) { qs.push(lines[i].trim().replace(/^>\s?/, '')); i++; }
          out.push(`<blockquote><p>${inl(qs.join(' '))}</p></blockquote>`); continue;
        }
        if (/^[-*+]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*+]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^[-*+]\s/, ''))}</li>`); i++; }
          out.push(`<ul>${items.join('')}</ul>`); continue;
        }
        if (/^\d+[.)]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+[.)]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^\d+[.)]\s/, ''))}</li>`); i++; }
          out.push(`<ol>${items.join('')}</ol>`); continue;
        }
        if (line.startsWith('|') && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
          const trows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) { trows.push(lines[i].trim()); i++; }
          if (trows.length >= 2) {
            const hdr = trows[0].split('|').slice(1, -1).map(c => c.trim());
            const body = trows.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
            let th = '<div class="tw"><table><thead><tr>' + hdr.map(h => `<th>${inl(h)}</th>`).join('') + '</tr></thead><tbody>';
            body.forEach(row => { th += '<tr>' + row.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>'; });
            out.push(th + '</tbody></table></div>');
          }
          continue;
        }
        const pls = [];
        while (i < lines.length) {
          const l = lines[i].trim();
          if (!l || /^#{1,6}\s/.test(l) || /^(-{3,}|\*{3,})$/.test(l) || l.startsWith('>') || /^[-*+]\s/.test(l) || /^\d+[.)]\s/.test(l) || l.startsWith('|') || l.startsWith('\x01CB')) break;
          pls.push(l); i++;
        }
        if (pls.length) out.push(`<p>${inl(pls.join(' '))}</p>`);
      }
      let html = out.join('\n');
      html = html.replace(/\x01CB(\d+)\x01/g, (_, n) => {
        const { lang, code } = cbs[+n];
        return `<div class="cb">${lang ? `<div class="cbl">${esc(lang)}</div>` : ''}<button class="cb-copy" type="button">copy</button><pre><code>${esc(code)}</code></pre></div>`;
      });
      return html;
    }
    function inl(text) {
      if (!text) return '';
      const ics = [];
      text = text.replace(/`([^`]+)`/g, (_, c) => { ics.push(c); return '\x02IC' + (ics.length - 1) + '\x02'; });
      text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="nl" target="_blank">$1</a>');
      text = text.replace(/\x02IC(\d+)\x02/g, (_, n) => `<code class="ic">${esc(ics[+n])}</code>`);
      return text;
    }
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    /* ─── INIT ─── */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.sb-tab').forEach(b => {
        b.classList.toggle('act', b.dataset.tab === CUR_TAB);
      });
      buildSb(); setupSearch();
      document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.cb-copy');
        if (!btn) return;
        const codeEl = btn.closest('.cb')?.querySelector('pre code');
        if (!codeEl) return;
        const text = codeEl.textContent || '';
        let ok = false;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            ok = true;
          }
        } catch (err) { }
        if (!ok) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { ok = document.execCommand('copy'); } catch (err) { ok = false; }
          document.body.removeChild(ta);
        }
        const prev = btn.textContent;
        btn.textContent = ok ? 'copied' : 'error';
        if (ok) btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = prev;
          btn.classList.remove('done');
        }, 1200);
      });
      let saved = 'home';
      try { saved = localStorage.getItem('mlroad-cur') || 'home'; } catch (e) { }
      initRp();
      nav(saved);
    });


    /* ─── RIGHT PANEL ─── */

    const CAT_CLASSES = {
      'ML Core': 'rpi-cat-mlcore',
      'Learning Resources': 'rpi-cat-learning',
      'Engineering Tools': 'rpi-cat-engineering',
      'Prompt Library': 'rpi-cat-prompt'
    };

    const CAT_LABELS = {
      'ML Core': 'ML Core',
      'Learning Resources': 'Learning',
      'Engineering Tools': 'Tools',
      'Prompt Library': 'Prompts'
    };

    let rpFilter = 'all';
    let rpOpen = false;

    function catClass(cat) {
      return CAT_CLASSES[cat] || 'rpi-cat-other';
    }

    function buildRp() {
      const cats = ['all', ...new Set(RIGHT_PANEL_DATA.map(i => i.category))];
      const filter = document.getElementById('rp-filter');
      filter.innerHTML = cats.map(c =>
        `<button class="rptab${c === rpFilter ? ' act' : ''}" data-cat="${c}" onclick="filterRp('${c}')">${c === 'all' ? 'ALL' : CAT_LABELS[c] || c}</button>`
      ).join('');
      renderRpList();
    }

    function renderRpList() {
      const items = rpFilter === 'all'
        ? RIGHT_PANEL_DATA
        : RIGHT_PANEL_DATA.filter(i => i.category === rpFilter);
      const sorted = [...items].sort((a, b) => a.priority - b.priority);
      document.getElementById('rp-list').innerHTML = sorted.map(item =>
        `<div class="rpi" id="rpi-${item.id}" onclick="openRpItem('${item.id}')">
          <div class="rpi-top">
            <span class="rpi-cat ${catClass(item.category)}">${CAT_LABELS[item.category] || item.category}</span>
            <span class="rpi-t">${item.title}</span>
          </div>
          <div class="rpi-sum">${item.summary}</div>
        </div>`
      ).join('');
    }

    function filterRp(cat) {
      rpFilter = cat;
      document.querySelectorAll('.rptab').forEach(t => t.classList.toggle('act', t.dataset.cat === cat));
      renderRpList();
    }

    function openRpItem(id) {
      navKb(id);
    }

    function updateRpBtn() {
      const btn = document.getElementById('rp-btn');
      if (!btn) return;
      if (rpOpen) {
        btn.innerHTML = '◂ <span class="rp-toggle-lbl">Скрыть материалы</span>';
        btn.classList.add('act');
      } else {
        btn.innerHTML = '▸ <span class="rp-toggle-lbl">Показать материалы</span>';
        btn.classList.remove('act');
      }
    }

    function toggleRp() {
      rpOpen = !rpOpen;
      const panel = document.getElementById('rp');
      if (rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
      try { localStorage.setItem('mlroad-rp', rpOpen ? '1' : '0'); } catch(e) {}
    }

    function initRp() {
      buildRp();
      let saved = '1';
      try { saved = localStorage.getItem('mlroad-rp') ?? '1'; } catch(e) {}
      rpOpen = saved !== '0';
      const panel = document.getElementById('rp');
      if (rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
    }

  </script>
</body>

</html>
