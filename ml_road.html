# 65. Холодный старт

## Зачем это нужно

Любая рекомендательная система сталкивается с одной проблемой с первого дня: новый пользователь, новый объект, или вообще новая система — и рекомендовать нечего, потому что данных нет. Это называется проблема холодного старта, и с ней обязательно нужно уметь работать.

## Простая интуиция

Ты пришёл в новый книжный магазин. Продавец тебя не знает. Он не может порекомендовать «то, что нравится таким же как ты» — понятия не имеет, какой ты. Что он делает? Спрашивает: «что вы обычно читаете?» или показывает бестселлеры. Это и есть решения холодного старта.

## Что это такое

Проблема холодного старта — невозможность сделать качественные рекомендации из-за отсутствия данных.

Три вида:
- **Новый пользователь** — только что зарегистрировался, нет истории взаимодействий
- **Новый объект** — только что добавили товар или фильм, никто его ещё не видел
- **Новая система** — продукт только запустился, данных нет ни у кого

## Как это работает

**Для нового пользователя:**
- Онбординг-вопросы при регистрации: «какие жанры любишь?», «выбери 5 артистов»
- Показывать популярное — всегда работает как базовое решение
- Использовать демографические данные (если есть): возраст, страна
- Content-based: рекомендовать популярное в категории, которую смотрит прямо сейчас

**Для нового объекта:**
- Content-based с первого дня: у товара уже есть категория, описание, бренд
- Специально показывать новинку широкой аудитории, чтобы быстро собрать данные
- Использовать похожие объекты с историей как замену

**Для новой системы:**
- Начать с простых правил: популярное, топ по категориям
- Content-based до накопления достаточной истории

## Простой пример

Образовательная платформа запустилась неделю назад: 3 000 зарегистрированных пользователей, 400 курсов, история просмотров почти пустая. При регистрации пользователь отвечает на 3 вопроса: «какая твоя профессия», «какой уровень», «что хочешь изучить». На основе этих ответов показываются 8 курсов из топ-20 в нужной категории. Через месяц у 60% пользователей достаточно истории для CF, и платформа переключается на персонализированные рекомендации.

## Практика

1. Музыкальный сервис запустил новую платформу: 1 000 пользователей и 50 000 треков. Какой из трёх видов холодного старта наиболее острый прямо сейчас и с чего начать?
2. Spotify только что добавил новый альбом. Как система может его рекомендовать, если его ещё никто не слушал?
3. Пользователь только что зарегистрировался на маркетплейсе. Что можно рекомендовать ему на главной странице в первый визит?
4. Почему онбординг-вопросы при регистрации («выбери любимые жанры») — это решение холодного старта, а не просто красивый UI?
5. Мини-кейс: стриминговый сервис запустился неделю назад. 10 000 пользователей, 5 000 фильмов, но история просмотров очень маленькая. Какую стратегию рекомендаций ты выбрал бы прямо сейчас и почему?

## Краткий итог

- Холодный старт — не исключение, а ожидаемое состояние: его нужно планировать с первого дня разработки системы
- Три вида: новый пользователь, новый объект, новая система
- Для нового пользователя: онбординг-вопросы, популярное, content-based
- Для нового объекта: content-based сразу, принудительный показ, метаданные
- Гибридные системы переключаются на CF только после накопления достаточной истории

## Ключевые термины урока

- **Холодный старт** — три разных сценария с разными решениями: новый пользователь (нет истории), новый объект (нет оценок), новая система (нет данных ни у кого).
- **Новый пользователь** — нет истории → CF невозможен. Решение: онбординг-вопросы или демографический fallback до накопления минимум 5–10 взаимодействий.
- **Новый объект** — нет оценок → CF не включит его в рекомендации. Content-based позволяет рекомендовать новинку с первого дня по метаданным.
- **Онбординг** — сбор явных предпочтений при регистрации. Чем короче (3–5 вопросов) — тем выше конверсия при заполнении.

# 66. Как оценивать качество рекомендаций

## Зачем это нужно

Если модель классификации ошиблась — видно сразу: предсказанный класс ≠ реальному. С рекомендациями сложнее: ты показал 10 фильмов, пользователь посмотрел 3 — это хорошо или плохо? Нужны специальные метрики.

## Простая интуиция

Представь, что ты рекомендуешь другу 10 ресторанов. Он сходил в 4 из них. Ты угадал 4 из 10 — неплохо. Но что если 6 ресторанов, которые ты не назвал, ему понравились бы больше? Важно не только «сколько угадал», но и «не пропустил ли лучшее».

## Что это такое

Оценка рекомендательных систем идёт по двум направлениям:

**Offline-метрики** — считаются на исторических данных до запуска:
- **Precision@K** — из K рекомендованных объектов сколько реально понравились
- **Recall@K** — из всех объектов, что понравились, сколько попало в K рекомендаций

**Online-метрики** — измеряются в реальном продукте:
- **CTR** — доля рекомендаций, на которые кликнули
- **Конверсия** — доля рекомендаций, которые привели к покупке
- **Время взаимодействия** — сколько смотрел, слушал, читал

## Как это работает

**Precision@K** — точность среди K рекомендаций:

Рекомендовали 5 фильмов, пользователь посмотрел 2 → `Precision@5 = 2/5 = 40%`

**Recall@K** — полнота среди всего, что могло понравиться:

Пользователь готов был посмотреть 8 фильмов, система показала 2 из них в топ-5 → `Recall@5 = 2/8 = 25%`

| Метрика | Вопрос | Когда важна |
|---|---|---|
| Precision@K | Не показываем ли лишнего? | Когда каждая лишняя рекомендация раздражает |
| Recall@K | Не пропускаем ли важное? | Когда нужно охватить всё подходящее |
| CTR | Кликают ли? | Всегда — показывает реальный интерес |
| Конверсия | Покупают ли? | Для e-commerce |

## Простой пример

Видеосервис рекомендует 10 фильмов. Для пользователя Марины известно (из истории), что из 30 фильмов в базе она бы посмотрела 8. Система показала 10, из которых 4 она реально хочет посмотреть. Precision@10 = 4/10 = 40%, Recall@10 = 4/8 = 50%. Новый алгоритм показывает Precision@10 = 50%, Recall@10 = 62% на исторических данных. Улучшение по offline-метрикам подтверждается A/B тестом: CTR вырос с 22% до 31%.

## Практика

1. Система рекомендовала 10 фильмов, пользователь посмотрел 3. Всего фильмов, которые ему бы понравились — 12. Посчитай Precision@10 и Recall@10.
2. Сервис стриминга фильмов показывает 5 рекомендаций. Precision@5 = 80%, Recall@5 = 10%. Что это говорит о работе системы? Что произойдёт с Recall, если увеличить список до 50 рекомендаций?
3. Почему CTR — важная метрика, но нельзя опираться только на неё?
4. Почему offline-метрики не всегда предсказывают успех в реальном продукте?
5. Мини-кейс: алгоритм рекомендаций улучшили, offline Precision@10 выросла с 30% до 45%. Достаточно ли этого, чтобы выкатить изменение всем пользователям?

## Краткий итог

- Precision@K важна, когда внимание пользователя ограничено: каждое из K мест должно попасть в цель
- Recall@K важна для каталогов: нельзя, чтобы половина релевантных объектов никогда не показывалась
- Online-метрики (CTR, конверсия) важнее offline — они отражают реальное поведение
- Финальная оценка системы — всегда A/B тест в реальном продукте
- Offline-метрики — для быстрой проверки на исторических данных, не для финального вывода

## Ключевые термины урока

- **Precision@K** — доля релевантных объектов среди первых K рекомендаций. Ограничение: не учитывает порядок — объект на 1-м месте равнозначен объекту на K-м.
- **Recall@K** — доля показанных релевантных объектов от всех, что могли понравиться. Растёт при увеличении K, поэтому сравнивать Recall@5 и Recall@20 некорректно.
- **Online-метрики** — CTR, конверсия, время взаимодействия; измеряются на реальных пользователях. Единственный источник правды о том, что система работает.
- **CTR (Click-Through Rate)** — доля кликов от числа показов. Легко оптимизируется кликбейтом, поэтому всегда смотрят вместе с конверсией и временем взаимодействия.
- **A/B тест** — обязательный финальный шаг для проверки улучшения рекомендаций в production.

# 67. Как построить рекомендательную систему с нуля

## Зачем это нужно

Ты знаешь коллаборативную фильтрацию, контентную, implicit/explicit feedback, гибриды, холодный старт и метрики. Но когда приходит реальная задача — с чего начинать? Этот урок — пошаговая схема рассуждений, которую можно применять к любой задаче рекомендаций.

## Простая интуиция

Хороший врач не назначает лечение до осмотра. Хороший специалист по ML не выбирает алгоритм до понимания данных и задачи. Сначала вопросы — потом решение.

## Что это такое

Построение рекомендательной системы — это не выбор алгоритма, а последовательность решений: от понимания задачи и данных до запуска и оценки. Алгоритм — последнее, что выбираешь.

## Как это работает

**Шаг 1. Понять задачу**

Что нужно рекомендовать? Кому? С какой целью?
- Продать товар → оптимизируем конверсию
- Удержать пользователя → оптимизируем время в приложении
- Помочь найти нужное → оптимизируем релевантность

**Шаг 2. Разобраться с данными**

| Вопрос | Что это значит для системы |
|---|---|
| Есть история взаимодействий? | Можно использовать collaborative filtering |
| Feedback explicit или implicit? | Влияет на качество и интерпретацию сигналов |
| Много новых пользователей? | Нужно решение холодного старта |
| Объекты хорошо описаны (теги, категории)? | Можно использовать content-based |

**Шаг 3. Выбрать подход**

| Ситуация | Подход |
|---|---|
| Много истории + мало новых пользователей | Collaborative filtering |
| Мало истории + богатые метаданные объектов | Content-based |
| Много новых пользователей | Гибрид: CF для старых, CB для новых |
| Только запустились | Популярное + content-based |
| Нужен максимум качества | Гибрид с несколькими сигналами |

**Шаг 4. Решить проблему холодного старта**

Он есть всегда. Нужен план:
- Для новых пользователей: онбординг-вопросы, популярное, demographic fallback
- Для новых объектов: content-based сразу, принудительный показ для сбора данных

**Шаг 5. Определить метрики успеха**

Что считаем хорошим результатом? CTR? Конверсия? Время в приложении?
Определяем до запуска — не после.

**Шаг 6. Запустить, оценить, итерировать**

Начать с простого: популярное или content-based. Это всегда лучше, чем «ничего». Потом усложнять, измеряя каждое изменение через A/B тест.

## Простой пример

Стартап строит рекомендации для платформы онлайн-курсов: 15 000 студентов, 600 курсов. Шаг 1: цель — удержание (студент завершает курс). Шаг 2: есть история просмотров (implicit), описания курсов (категория, уровень, теги), 20% новых студентов ежемесячно. Шаг 3: гибрид — CF для студентов с историей 3+ курсов, content-based для новых. Шаг 4: холодный старт — онбординг-анкета 3 вопроса. Шаг 5: метрика — процент завершённых курсов. Шаг 6: запуск content-based за 2 недели, CF через месяц. Завершаемость выросла с 31% до 48%.

## Практика

1. Тебе пришла задача: построить рекомендации для новостного сайта. С каких вопросов ты начнёшь?
2. Стартап только запустил маркетплейс: 500 пользователей, 2 000 товаров, истории почти нет. Какой подход выбрать прямо сейчас?
3. Через 6 месяцев у того же маркетплейса 50 000 активных пользователей и богатая история покупок. Что изменится в подходе и почему?
4. Команда потратила 3 месяца на разработку сложного гибрида, но пропустила шаг с определением метрики. После запуска непонятно, стало ли лучше. Какой шаг из 6 нарушен и к каким последствиям это приводит?
5. Мини-кейс: музыкальный стриминг. Данные: история прослушиваний (implicit), жанры треков, время суток, устройство пользователя. Пройди все 6 шагов и опиши свой подход.

## Краткий итог

- Начинай с задачи и данных, не с алгоритма
- Определи: есть ли история, какой тип feedback, насколько серьёзна проблема холодного старта
- Выбор подхода зависит от ситуации — нет универсального ответа
- Всегда планируй решение холодного старта заранее
- Метрики определяй до запуска; финальная оценка — только через A/B тест
- Начинай просто, итерируй на основе данных

## Ключевые термины урока

- **Формализация** — «хочу рекомендации» → «предсказать вероятность клика для каждого объекта × пользователь за следующие 24 часа». Точная постановка определяет тип данных, метрику и архитектуру.
- **Данные определяют архитектуру** — explicit feedback → matrix factorization; только implicit → ALS с confidence; нет истории у пользователя → content-based. Алгоритм выбирается под данные, не наоборот.
- **Baseline-first** — самый простой baseline (popularity-based: топ-N популярных) даёт 60–70% от качества сложной системы; первая итерация должна работать за 1–2 дня, не за месяц.
- **Метрика до запуска** — CTR, конверсия или время взаимодействия определяются ДО разработки. Иначе непонятно, что считать улучшением и когда остановиться. A/B тест — единственный финальный арбитр.

# 68. Как выглядит ML-проект

## Зачем это нужно

Большинство учебников по ML учат алгоритмам, но не показывают, как выглядит настоящий ML-проект. В реальности обучение модели — это лишь малая часть работы. Понимание полного жизненного цикла проекта критично для любого специалиста.

## Простая интуиция

Думайте о ML-проекте как о строительстве дома. Архитектор (постановка задачи) важнее, чем выбор гвоздей (алгоритм). Фундамент (данные) определяет всё остальное. И дом нужно не просто построить, но заселить жильцов и обслуживать (деплоймент и мониторинг).

## Что это такое

Типичный ML-проект включает этапы:

1. **Постановка задачи** — перевод бизнес-вопроса в ML-задачу. Что предсказываем? Какая метрика успеха?
2. **Сбор и анализ данных** — откуда берём данные, EDA, качество данных
3. **Feature Engineering** — создание и отбор признаков
4. **Моделирование** — выбор алгоритма, обучение, валидация
5. **Оценка** — метрики, error analysis
6. **Деплоймент** — упаковка модели в API или сервис
7. **Мониторинг** — отслеживание качества в production

## Как это работает

```python
import pandas as pd
from sklearn.dummy import DummyClassifier
from sklearn.ensemble import RandomForestClassifier
from sklearn.model_selection import cross_val_score

# 1. Загрузка данных
df = pd.read_csv("data.csv")
X = df.drop("target", axis=1)
y = df["target"]

# 2. Baseline — всегда начинайте с простейшей модели
baseline = DummyClassifier(strategy="most_frequent")
print("Baseline:", cross_val_score(baseline, X, y, cv=5).mean().round(3))

# 3. Реальная модель — сравниваем с baseline
model = RandomForestClassifier(random_state=42)
print("RandomForest:", cross_val_score(model, X, y, cv=5).mean().round(3))
```

## Простой пример

Ритейл-компания хочет предсказывать спрос на товары. Постановка задачи: регрессия — предсказать объём продаж на следующие 7 дней по каждой позиции. Данные: 2 года истории продаж по 500 товарам. Feature engineering: день недели, месяц, праздники, тренд, скользящее среднее. Baseline (DummyRegressor со средним значением): MAE 47 единиц. Случайный лес: MAE 18 единиц — в 2.6 раза лучше baseline. Деплоймент: API, обновление предсказаний каждое воскресенье. Мониторинг: еженедельное сравнение предсказанного и реального спроса.

## Практика

1. Менеджер предлагает сразу перейти к моделированию, потому что данные «уже есть в базе». Какие риски это несёт и какие этапы он хочет пропустить?
2. Почему в реальных проектах 80% времени уходит на данные, а не на моделирование?
3. Команда получила задачу: «Снизить отток клиентов». Опишите, как перевести её в ML-задачу: что такое y, X и метрика успеха?
4. Почему в настоящем ML-проекте тест используется только один раз в самом конце?
5. Почему ML-пайплайн в production — это не только код обучения, но и весь цикл от сбора данных до мониторинга?

## Краткий итог

- Проект не закончен, пока модель не задеплоена и не мониторится: обучение — лишь середина пути
- 80% времени уходит на данные, 20% — на моделирование
- Всегда начинайте с baseline и простых решений
- Большинство ML-проектов умирают не из-за плохой точности, а из-за плохого деплоя и отсутствия мониторинга

## Ключевые термины урока

- **Постановка задачи** — первый шаг: определить, что именно мы предсказываем и зачем. Большинство провалов ML-проектов начинаются здесь — не с плохого алгоритма.
- **Деплоймент** — публикация обученной модели для использования в реальном продукте. Проект считается завершённым только после этого шага, не после обучения.
- **Мониторинг** — регулярная проверка качества модели после деплоя. Без мониторинга деградация обнаруживается только по жалобам пользователей.
- **ML-цикл** — итеративный процесс от задачи до мониторинга и обратно. Ключевое слово — «обратно»: мониторинг запускает новый цикл улучшения.
- **80/20 правило** — эмпирическое наблюдение: 80% времени уходит на данные, 20% — на модели. Следствие: улучшение данных чаще эффективнее улучшения алгоритма.

# 69. От идеи до модели

## Зачем это нужно

Между бизнес-идеей («хотим предсказывать отток клиентов») и работающей моделью — много шагов. Пропуск любого из них ведёт к плохому результату. Этот урок — практическая карта пути от постановки задачи до первого рабочего прототипа.

## Простая интуиция

Вы хотите приготовить новое блюдо. Сначала — понять, что это за блюдо (постановка задачи). Потом — купить ингредиенты и проверить их свежесть (данные). Затем — сначала приготовить простую версию по базовому рецепту (baseline), и только потом — улучшать.

## Что это такое

Путь от идеи до модели включает:

1. **Формализация**: какой тип задачи? (классификация/регрессия/кластеризация). Что такое «успех»?
2. **Данные**: какие есть данные? Есть ли разметка? Достаточно ли объём?
3. **Baseline**: самое простое решение. DummyClassifier, линейная регрессия, среднее
4. **Feature Engineering**: создание информативных признаков из сырых данных
5. **Итерации**: улучшаем baseline, смотрим на ошибки, добавляем признаки, пробуем другие алгоритмы
6. **Валидация**: честная оценка через hold-out или кросс-валидацию

## Как это работает

```python
from sklearn.model_selection import train_test_split, cross_val_score
from sklearn.dummy import DummyClassifier
from sklearn.linear_model import LogisticRegression

# Шаг 1: Стратифицированный split
X_train, X_test, y_train, y_test = train_test_split(
    X, y, test_size=0.2, stratify=y, random_state=42
)

# Шаг 2: Baseline
baseline = DummyClassifier(strategy="most_frequent")
print("Baseline:", cross_val_score(baseline, X_train, y_train, cv=5).mean().round(3))

# Шаг 3: Простая модель
model = LogisticRegression()
print("LogReg:", cross_val_score(model, X_train, y_train, cv=5).mean().round(3))

# Если прогресс есть → пробуем более сложные модели
# Если нет → смотрим на данные и признаки, а не на алгоритм
```

## Простой пример

HR-стартап хочет предсказывать, примет ли кандидат оффер. Данные: 3 000 исторических офферов (принял/отказал), 15 признаков. Формализация: бинарная классификация, метрика — F1-score. Baseline (DummyClassifier, всегда «примет»): accuracy 68%, F1 = 0.81 для класса «примет», F1 = 0 для «откажет» — бесполезная модель. Логистическая регрессия с 3 ключевыми признаками: F1 для «откажет» уже 0.42. Random Forest (50 признаков после feature engineering): F1 = 0.61. Итог: каждый шаг измерен, понятно куда двигаться.

## Практика

1. Команда сразу обучила Random Forest и получила accuracy 82%. Менеджер доволен. Почему у ML-инженера должен возникнуть вопрос, и что нужно сделать, чтобы понять, хорош ли этот результат?
2. Опишите итеративный подход к разработке модели: какой первый шаг, второй и когда нужно остановиться?
3. Ваш baseline (DummyClassifier) даёт 72% accuracy, сложная модель — 74%. Стоит ли продолжать улучшать модель или искать проблему в данных?
4. Как итеративный процесс разработки помогает обнаружить эту проблему на ранних этапах?
5. Почему первый прототип важно строить сразу через Pipeline, а не через ручные трансформации данных?

## Краткий итог

- Путь от идеи до модели: формализация → данные → baseline → итерации → валидация
- Всегда начинайте с простого решения и постепенно усложняйте
- Feature engineering часто важнее выбора алгоритма
- Оценивайте прогресс на каждом шаге через кросс-валидацию

## Ключевые термины урока

- **Формализация** — перевод бизнес-задачи в ML-постановку с чёткими входами и выходами. Включает выбор типа задачи (классификация/регрессия), метрики и критерия остановки.
- **Baseline** — точка отсчёта: без неё невозможно оценить, приносит ли сложная модель реальную пользу. DummyClassifier или среднее значение как baseline — норма, не признак слабости.
- **Feature engineering** — создание и отбор признаков из сырых данных. Добавление одного информативного признака часто даёт больший прирост, чем смена алгоритма.
- **Валидация** — защита от переобучения: оцениваем качество на данных, которые модель не видела при обучении. Hold-out или кросс-валидация зависит от размера выборки.

# 70. От данных до предсказания

## Зачем это нужно

Модель — это не только .fit() и .predict(). Между сырыми данными и финальным предсказанием — цепочка трансформаций. Если нарушить её порядок, получим неправильные предсказания или data leakage. Pipeline в sklearn решает эту проблему автоматически.

## Простая интуиция

Думайте о конвейере на заводе. Сырой материал проходит через последовательность станков: очистка → нарезка → сборка → проверка качества. Каждый станок делает своё, порядок важен. ML-пайплайн — тот же конвейер: данные → imputer → scaler → модель.

## Что это такое

- **Pipeline** — последовательность трансформаций + финальная модель
- **Трансформеры** — шаги, которые делают fit_transform (scaler, imputer, encoder)
- **Estimator** — финальный шаг (модель), делающий fit и predict
- Ключевое правило: трансформеры должны обучаться ТОЛЬКО на train данных
- **ColumnTransformer** — применяет разные трансформации к разным столбцам

## Как это работает

```python
from sklearn.pipeline import Pipeline
from sklearn.preprocessing import StandardScaler, OneHotEncoder
from sklearn.impute import SimpleImputer
from sklearn.ensemble import RandomForestClassifier

# Pipeline: последовательность шагов, fit_transform → fit_transform → fit
pipeline = Pipeline([
    ("imputer", SimpleImputer(strategy="median")),
    ("scaler", StandardScaler()),
    ("model", RandomForestClassifier())
])

# fit: все трансформеры обучаются ТОЛЬКО на train
pipeline.fit(X_train, y_train)
# predict: к test применяется только transform (параметры уже зафиксированы)
pipeline.predict(X_test)

# Для разных типов признаков — ColumnTransformer:
# num_cols → imputer + scaler
# cat_cols → imputer + OneHotEncoder
# Оба передаются в Pipeline как единый preprocessor
```

## Простой пример

Команда строит модель оценки кредитного риска: 10 числовых признаков и 3 категориальных (профессия, регион, тип кредита). Без Pipeline: scaler обучен на всём датасете (data leakage), OneHotEncoder применён отдельно, при деплое забыли передать imputer. Результат: модель в production выдаёт ошибки при NaN. С Pipeline: один объект (imputer → ColumnTransformer → LogisticRegression) обучается только на train, сохраняется в файл, загружается в API. Новый клиент с пропущенным полем обрабатывается корректно — imputer внутри pipeline заполняет пропуск медианой.

## Практика

1. Коллега говорит: «Я уже применил scaler отдельно, зачем ещё Pipeline?» Что именно пойдёт не так при кросс-валидации, если scaler обучен вне Pipeline?
2. Чем `ColumnTransformer` отличается от обычного Pipeline и в каких случаях он необходим?
3. Вы обучили Pipeline (imputer → scaler → RandomForest). Коллега применил `scaler.fit_transform(X_test)` отдельно перед предсказанием. Что пошло не так?
4. Как Pipeline автоматически предотвращает самый частый вид leakage при нормализации и заполнении пропусков?
5. Что именно хранится в обученном Pipeline — только параметры scaler, только модель или и то, и другое?

## Краткий итог

- Pipeline соединяет preprocessing и модель в единый объект
- Трансформеры обучаются только на train, к test применяется только transform
- ColumnTransformer внутри Pipeline гарантирует: preprocessing обучается только на train и автоматически применяется к test
- Обученный Pipeline можно сохранить и использовать в production

## Ключевые термины урока

- **Pipeline** — единственный правильный способ применить scaler при кросс-валидации: fit() только на fold-train, а не на всём датасете. Без Pipeline scaler почти всегда обучается с data leakage.
- **Трансформер** — шаг Pipeline с методами fit_transform (на train) и transform (на test). Ключевое отличие от Estimator: трансформер не делает предсказаний.
- **Estimator** — финальный шаг Pipeline с методами fit и predict. В Pipeline может быть только один Estimator и только последним шагом.
- **ColumnTransformer** — позволяет применять разные трансформации к разным колонкам одновременно. Без него числовые и категориальные признаки пришлось бы обрабатывать отдельно, что нарушает целостность Pipeline.

# 71. Training vs Inference

## Зачем это нужно

Обучение модели и её использование для предсказаний — принципиально разные операции. В production нас интересует только inference: скорость, надёжность, стоимость предсказания. Путаница между training и inference — частая причина проблем при деплойменте.

## Простая интуиция

Повар учится готовить годами (training) — изучает рецепты, пробует разные ингредиенты, совершенствует технику. Но когда гость заказывает блюдо в ресторане, повар не учится заново — он просто готовит по уже выученному рецепту (inference). Ресторан не может ждать годы обучения для каждого заказа.

## Что это такое

- **Training** — процесс подбора параметров модели на обучающих данных. Медленно, ресурсоёмко, делается заранее
- **Inference** — использование обученной модели для предсказаний на новых данных. Должно быть быстрым
- **Batch inference** — предсказания для большого набора объектов сразу (ночная обработка)
- **Real-time inference** — предсказание для одного объекта с минимальной задержкой (API)
- **Latency** — задержка ответа при inference; критична для real-time систем
- **Throughput** — сколько предсказаний в секунду может обработать система

## Как это работает

```python
from sklearn.ensemble import RandomForestClassifier

# Training: один раз, медленно
model = RandomForestClassifier(n_estimators=100)
model.fit(X_train, y_train)          # секунды–минуты

# Batch inference: много объектов сразу
predictions = model.predict(X_test)  # миллисекунды

# Real-time inference: один объект за раз
pred = model.predict(X_test[0:1])    # единицы миллисекунд

# В production: train → сохранить (joblib) → загрузить → predict
```

## Простой пример

E-commerce платформа обучает модель предсказания вероятности покупки: Random Forest на 50 000 пользователей, обучение занимает 8 минут — это training. Деплой модели в real-time API: при загрузке страницы товара за 80 мс нужно выдать персонализированную цену. Random Forest предсказывает за 12 мс (один объект) — вписывается в бюджет. Batch inference: ночью для 200 000 пользователей предварительно считают рекомендации — throughput 3 000 предсказаний/сек, весь прогон занимает 67 секунд.

## Практика

1. Стартап обучает модель на ноутбуке (8 минут) и деплоит её в мобильное приложение. Какие характеристики производительности важны при обучении и какие — при inference, и почему они различаются?
2. Что такое latency и throughput? Почему для real-time API критична latency, а для batch-обработки — throughput?
3. Вы создаёте ML-сервис для мобильного приложения. Нейросеть даёт 96% accuracy, но inference занимает 2 секунды. Как это повлияет на пользователей и какой компромисс вы рассмотрите?
4. В production при вызове predict(new_data) данные проходят через все шаги Pipeline. Почему важно, что трансформеры на этапе inference вызывают только transform(), а не fit_transform(), и что произойдёт, если кто-то случайно вызовет fit() на prod-данных?
5. Почему высокая accuracy на тесте не гарантирует хорошего пользовательского опыта в production и какую дополнительную характеристику нужно измерять?

## Краткий итог

- Разделение обучения и inference — ключевое архитектурное решение: обучать заново на каждый запрос в production невозможно
- Latency inference определяет применимость модели: медленная модель убивает UX даже при отличном качестве предсказаний
- Latency (задержка) и throughput (пропускная способность) критичны в production
- Выбор алгоритма для production часто определяется требованиями к скорости

## Ключевые термины урока

- **Training** — вычислительно тяжёлое, выполняется редко (раз в день/неделю); latency не критична; может занимать часы. Оптимизируется по throughput (объём данных в единицу времени).
- **Inference** — latency критична: > 200 мс = пользователь заметит, > 500 мс = уйдёт. Мониторят p99-latency (наихудшие 1% запросов), а не среднее: среднее скрывает проблемы под нагрузкой.
- **Batch inference** — ночной прогон; годится для email-рекомендаций, ежедневных отчётов. Latency неважна, важна пропускная способность и стоимость на объект.
- **Real-time inference** — нужен для поиска, ленты, фрода (решение до конца транзакции ≈ 100 мс). Требует хранения модели в памяти и минималистичного preprocessing.
- **Training-serving skew** — расхождение между preprocessing при обучении и при inference; одна из главных причин деградации в production. Решение: один Pipeline для обоих этапов.

# 72. Почему модель в проде ≠ модель на обучении

## Зачем это нужно

Модель показала отличные результаты на тесте, но в production работает хуже. Это одна из самых частых и болезненных проблем в ML. Понимание причин этого разрыва позволяет предотвращать его или быстро диагностировать.

## Простая интуиция

Представьте повара, который учился готовить по летним рецептам с сезонными овощами. Когда наступила зима, доступные ингредиенты изменились — блюда получаются не такими, как в учебе. Модель «учила» на одних данных, но мир вокруг неё изменился.

## Что это такое

- **Training-serving skew** — несоответствие между данными при обучении и данными в production
- **Distribution shift** — изменение статистических свойств данных со временем
- **Concept drift** — изменение самой зависимости между X и y (что было верно год назад, теперь не так)
- **Data drift** — изменение распределения входных признаков X без изменения зависимости
- **Pipeline skew** — разная логика preprocessing при обучении и inference

## Как это работает

```python
# Training-serving skew: используем один Pipeline на обучение и inference
pipeline.fit(X_train, y_train)           # train
predictions = pipeline.predict(X_prod)   # prod — те же трансформации, без leakage

# Data drift: статистика входных признаков изменилась
train_mean = X_train["age"].mean()  # 35 лет при обучении
prod_mean  = X_prod["age"].mean()   # 42 года в production

drift_ratio = abs(prod_mean - train_mean) / train_mean
if drift_ratio > 0.15:
    print("Внимание: дрейф признака 'age'! Рассмотрите переобучение.")
```

## Простой пример

Банк обучает модель кредитного скоринга в январе на данных 2023 года. В марте запускает её в production. К декабрю F1-score падает с 0.84 до 0.71. Анализ показывает: средний возраст заявителей вырос с 34 до 41 года (data drift — переехали в онлайн другие группы клиентов), а связь «доход → платёжеспособность» изменилась из-за инфляции (concept drift). Мониторинг входных признаков поймал data drift в октябре, но concept drift обнаружили только по падению метрик в ноябре — на него нет прямых сигналов без меток.

## Практика

1. Модель кредитного скоринга обучена в 2022 году. В 2024 году распределение доходов заявителей сильно изменилось, но связь «доход → платёжеспособность» осталась прежней. Какой тип изменения это? Что нужно сделать: переобучить модель или исправить preprocessing?
2. Что такое training-serving skew и как он возникает? Приведите конкретный пример.
3. Вы задеплоили модель рекомендаций, обученную в марте. В декабре качество резко упало. Какие три возможные причины вы проверите и в каком порядке?
4. Почему использование одного Pipeline объекта для training и inference автоматически предотвращает pipeline skew?
5. Почему даже высокое качество на CV не гарантирует отсутствие проблем в production, связанных с data drift?

## Краткий итог

- Модель в production деградирует из-за drift: данные и зависимости меняются со временем
- Training-serving skew — незаметная ловушка: модель хороша на тестах, но ломается в production из-за разного preprocessing
- Используйте один Pipeline объект для обучения и предсказания
- Мониторьте распределения входных данных для раннего обнаружения drift

## Ключевые термины урока

- **Training-serving skew** — расхождение между preprocessing при обучении и при inference. Лечится единственным способом: один Pipeline объект на оба этапа.
- **Distribution shift** — общий термин для любого изменения данных со временем. Включает два подвида: data drift и concept drift, которые требуют разных реакций.
- **Concept drift** — изменилось P(y|X): та же квартира с теми же признаками теперь стоит иначе. Нельзя обнаружить без реальных меток — только по падению метрик.
- **Data drift** — изменилось P(X): признаки сдвинулись, но зависимость та же. Можно обнаружить мониторингом входных данных без меток.

# 73. Что такое сохранённая модель

## Зачем это нужно

Обучение модели занимает время и ресурсы. После обучения нужно сохранить результат, чтобы использовать модель без повторного обучения. Понимание того, что именно сохраняется и как загружается, обязательно для работы с production ML.

## Простая интуиция

Представьте повара, который записал все свои рецепты в книгу. Открыв книгу, любой повар может приготовить те же блюда без переобучения. Сохранённая модель — это «книга рецептов»: все параметры, которые модель «выучила», записаны и могут быть загружены позже.

## Что это такое

- **Сериализация** — процесс сохранения объекта Python (модели) в файл
- **pickle** — стандартная библиотека Python для сериализации; простой, но не самый безопасный
- **joblib** — рекомендуется для sklearn: эффективно сохраняет numpy массивы
- **ONNX** — открытый формат для обмена моделями между фреймворками (sklearn → ONNX → C++/Java)
- Что сохраняется: параметры модели (веса, пороги), гиперпараметры, preprocessing параметры

## Как это работает

```python
import joblib

# Сохранить обученный pipeline (scaler + модель вместе)
joblib.dump(pipeline, "model_v1.pkl")

# Загрузить и сразу использовать — без повторного .fit()
loaded = joblib.load("model_v1.pkl")
predictions = loaded.predict(new_data)

# Версионируйте файлы и фиксируйте версию sklearn:
# model_v1.pkl, model_v2.pkl — храните историю
```

## Простой пример

ML-команда обучает модель предсказания оттока клиентов: Pipeline из imputer, scaler и Random Forest. Обучение на 50 000 клиентов занимает 4 минуты, происходит каждое воскресенье. Результат сохраняется как `churn_model_2024_w42.pkl` (2.3 МБ). Inference-сервер загружает файл при старте (0.8 секунды), затем обрабатывает запросы. Когда sklearn обновили до 1.4, старый файл вызвал предупреждение при загрузке — пришлось переобучить и пересохранить. Теперь в файле `requirements.txt` фиксирована `scikit-learn==1.4.2`.

## Практика

1. Разработчик сохранил только `model.pkl` без scaler и передал файл коллеге. Коллега загрузил модель и запустил predict — получил неправильные результаты без ошибки. Объясните, почему это произошло и что именно нужно было сохранить.
2. В чём преимущество `joblib` перед стандартным `pickle` для sklearn моделей?
3. Вы обучили модель на sklearn 1.0. Коллега загружает её с sklearn 1.4 и видит предупреждения о несовместимости. Как предотвратить подобные проблемы в будущем?
4. Почему правильно сохранять весь Pipeline, а не только модель — что потеряется, если сохранить только `model.pkl` без scaler?
5. Что конкретно загружается из файла при `joblib.load()` и почему загруженный Pipeline сразу готов к `predict()` без повторного `.fit()`?

## Краткий итог

- Используйте joblib.dump() для сохранения sklearn моделей
- Сохраняйте Pipeline (включает scaler + модель) как единый объект
- Версионируйте модели и фиксируйте версию sklearn
- Проверяйте корректность загруженной модели на нескольких примерах

## Ключевые термины урока

- **Сериализация** — сохранение обученного объекта Python на диск. В файл попадает всё: параметры модели, гиперпараметры, параметры scaler — всё, что нужно для predict() без повторного fit().
- **joblib** — рекомендуется вместо pickle для sklearn, потому что эффективно сжимает numpy-массивы. Для больших Random Forest разница в размере файла может быть в разы.
- **pickle** — универсальный сериализатор Python, но небезопасен: загрузка файла из недоверенного источника может выполнить произвольный код.
- **ONNX** — промежуточный формат для экспорта модели из Python в C++, Java, мобильные устройства. Используется, когда inference нужен вне Python-окружения.
- **Версионирование моделей** — фиксация версии sklearn вместе с моделью обязательна: файл, сохранённый на sklearn 1.0, может не загрузиться на sklearn 1.4.

# 74. Что такое модель в API

## Зачем это нужно

Jupyter notebook с моделью — это не продукт. Чтобы другие системы и пользователи могли использовать модель, её нужно завернуть в API. REST API — стандартный способ предоставить доступ к ML-модели через HTTP-запросы.

## Простая интуиция

Ресторан — это API. Вы (клиент) делаете заказ (запрос), кухня (модель) готовит блюдо (предсказание), официант приносит результат (ответ). Вам не нужно знать, как работает кухня — вы просто делаете заказ в стандартном формате (меню = API-документация).

## Что это такое

- **HTTP** — протокол передачи данных в интернете: клиент отправляет запрос, сервер возвращает ответ. Стандарт для общения между любыми сервисами
- **JSON** — текстовый формат данных, понятный любому языку программирования: как Python-словарь, но универсальный (`{"age": 35, "income": 80000}`)
- **REST API** — стандарт организации HTTP-интерфейса для взаимодействия между системами
- **Endpoint** — URL, по которому доступен сервис (например, /predict)
- **Request** — входные данные в формате JSON
- **Response** — предсказание модели в формате JSON
- **FastAPI** — современный Python-фреймворк для создания API; быстрый, с автодокументацией
- **Flask** — более простой Python-фреймворк для API

## Как это работает

```python
# Пример API с FastAPI
from fastapi import FastAPI
from pydantic import BaseModel
import joblib
import numpy as np

app = FastAPI()

# Загружаем обученную модель при старте сервера
model = joblib.load("model_pipeline.pkl")

# Схема входных данных
class PredictionRequest(BaseModel):
    age: float
    income: float
    credit_score: float

# Схема ответа
class PredictionResponse(BaseModel):
    prediction: int
    probability: float

@app.post("/predict", response_model=PredictionResponse)
def predict(request: PredictionRequest):
    # Создаём массив признаков из запроса
    features = np.array([[request.age, request.income, request.credit_score]])

    # Предсказание
    prediction = int(model.predict(features)[0])
    probability = float(model.predict_proba(features)[0][1])

    return PredictionResponse(prediction=prediction, probability=probability)

# Запуск: uvicorn app:app --host 0.0.0.0 --port 8000
# Документация автоматически: http://localhost:8000/docs
```

## Простой пример

Страховая компания создаёт API для оценки рисков: endpoint `/predict` принимает JSON с 8 полями (возраст, стаж вождения, марка авто, город, история ДТП и др.), возвращает страховую премию и уровень риска. Мобильное приложение, веб-сайт и CRM брокеров — все три системы делают запросы к одному и тому же endpoint. Модель обновляется раз в квартал: новый `model.pkl` загружается на сервер, перезапускать три клиентских системы не нужно. Среднее время ответа API — 23 мс.

## Практика

1. Почему Jupyter notebook с моделью — не продукт? Что нужно сделать, чтобы другие системы могли использовать вашу модель?
2. Что происходит в ML API при каждом запросе: от получения JSON до возврата предсказания?
3. Вы создаёте API для кредитного скоринга. Входные данные: возраст, доход, кредитный рейтинг. Опишите структуру endpoint `/predict` и что он должен возвращать.
4. Почему нужно загружать модель один раз при старте сервера, а не при каждом запросе, и как это влияет на latency — характеристику, которую мы разбирали в уроке «Training vs Inference»?
5. Как использование Pipeline в API автоматически гарантирует, что новые данные обрабатываются точно так же, как при обучении?

## Краткий итог

- Обернуть модель в REST API — минимум для production: так её могут вызвать любые сервисы независимо от языка
- Загружайте модель один раз при старте сервера
- Автодокументация FastAPI упрощает интеграцию: другие команды сразу видят, как работает API, без отдельной документации
- API принимает JSON запрос, возвращает JSON с предсказанием

## Ключевые термины урока

- **REST API** — стандартный «контракт» между ML-моделью и любым сервисом: независимо от языка клиента (Python, Java, iOS), HTTP + JSON всегда понятен. Альтернатива: gRPC — быстрее, но сложнее; выбирается при очень строгих latency-требованиях.
- **Stateless** — каждый запрос самодостаточен; сервер не помнит предыдущих. Это упрощает горизонтальное масштабирование (запустить 10 копий сервера) и перезапуск без потери состояния.
- **Загрузка модели при старте** — model = pickle.load() один раз в startup-событии, не в каждом запросе. Загрузка большой модели при каждом запросе = latency 5–30 с вместо 5–30 мс.
- **Валидация входа (Pydantic)** — FastAPI + Pydantic проверяют типы и диапазоны до вызова модели. Без валидации: None/NaN попадает в модель → исключение или тихое неправильное предсказание в production.

# 75. Мониторинг модели

## Зачем это нужно

Деплой модели — не финал, а начало. Модель в production работает с реальными данными, которые меняются. Без мониторинга вы не узнаете, что модель деградировала, пока не получите жалобы пользователей или бизнес-потери.

## Простая интуиция

Представьте пилота самолёта. Он не просто взлетает и спит до посадки — он постоянно смотрит на приборы. Температура двигателя, высота, скорость — все под контролем. Если что-то выходит за допустимые границы — сразу сигнал. Мониторинг ML — те же «приборы» для модели.

## Что это такое

- **Мониторинг производительности** — отслеживание метрик модели (accuracy, F1) с течением времени
- **Мониторинг данных** — отслеживание изменений в распределении входных данных
- **Feature drift** — изменение распределения отдельных признаков
- **Prediction drift** — изменение распределения предсказаний модели
- **KS-тест (Kolmogorov-Smirnov)** — стандартный статистический тест для сравнения двух распределений. Если распределение признака в production значимо отличается от обучающего (p < 0.05) — это feature drift. Именно его имеют в виду, когда говорят «обнаружить дрейф автоматически»
- **Latency мониторинг** — время ответа API
- **Алертинг** — автоматические уведомления при превышении порогов

## Как это работает

```python
# 1. Мониторинг дрейфа признаков
def check_drift(train_col, prod_col, threshold=0.15):
    drift = abs(prod_col.mean() - train_col.mean()) / abs(train_col.mean())
    return drift > threshold

if check_drift(X_train["age"], X_prod["age"]):
    print("АЛЕРТ: дрейф признака 'age'!")

# 2. Мониторинг предсказаний
pred_rate = y_pred.mean()   # доля позитивных предсказаний
# Если pred_rate резко изменился → возможен concept drift

# 3. Мониторинг качества (если есть реальные метки)
from sklearn.metrics import accuracy_score
current_acc = accuracy_score(y_true, y_pred)
print(f"Accuracy за период: {current_acc:.3f}")
```

## Простой пример

Телеком-компания деплоит модель предсказания оттока. Настроены четыре дашборда: (1) accuracy на недельной выборке с метками — снизилась с 86% до 81% за 3 месяца; (2) распределение возраста клиентов в запросах — среднее выросло с 38 до 44 лет (feature drift); (3) доля предсказаний «уйдёт» — выросла с 12% до 19% (prediction drift); (4) latency API — стабильно 28 мс. Алерт сработал на признаке «возраст» в октябре — команда начала подготовку к переобучению на свежих данных.

## Практика

1. Модель предсказания оттока деплоена 3 месяца назад. Команда не настроила мониторинг. В каком сценарии деградация обнаружится раньше всего — и почему это будет слишком поздно?
2. Что такое feature drift и как его обнаружить автоматически с помощью статистического теста?
3. Вы задеплоили модель предсказания оттока клиентов. Реальные метки приходят с задержкой 30 дней. Как мониторить модель в этот период?
4. Как мониторинг входных признаков помогает отличить data drift от concept drift?
5. Почему важно логировать не только входные признаки, но и предсказания модели, и как эти данные используются для переобучения?

## Краткий итог

- Деплой — не финал: без мониторинга модель деградирует незаметно, пока бизнес-метрики не покажут проблему
- Мониторьте: качество модели, распределение признаков, предсказания, latency
- Автоматизируйте обнаружение drift: вручную отслеживать сотни признаков в production нереально
- Логируйте всё: входные данные, предсказания, метки — для переобучения

## Ключевые термины урока

- **Мониторинг модели** — непрерывная проверка качества, распределения данных и производительности после деплоя.
- **Feature drift** — изменение распределения входных признаков относительно обучения.
- **Prediction drift** — изменение распределения предсказаний модели.
- **KS-тест (Kolmogorov-Smirnov)** — тест для сравнения двух распределений; обнаруживает, что признак в production стал распределён иначе, чем на обучении.
- **Алертинг** — автоматическое уведомление при обнаружении критического отклонения метрик.

# 76. Почему модель деградирует

## Зачем это нужно

Модели стареют. Даже идеально обученная модель через год может работать значительно хуже. Понимание механизмов деградации помогает строить устойчивые системы и правильно настраивать стратегии переобучения.

## Простая интуиция

Представьте прогноз погоды, обученный на данных 1990-х годов. Климат изменился, города разрослись, инструменты измерения улучшились. Модель «устарела» не потому что она плохая, а потому что мир изменился. Модели ML — то же самое.

## Что это такое

- **Model decay / Model staleness** — постепенное ухудшение качества модели в production
- **Concept drift** — изменение самой зависимости между X и y (поведение пользователей меняется)
- **Data drift** — изменение распределения входных данных X
- **Data quality issues** — деградация качества входных данных (пустые поля, неправильные типы)
- **Infrastructure drift** — изменения в инфраструктуре, влияющие на preprocessing

## Как это работает

```python
# Симуляция плавной деградации (data drift)
accuracy_by_month = {1: 0.92, 3: 0.90, 6: 0.85, 9: 0.78, 12: 0.70}

alert_threshold = 0.80
for month, acc in accuracy_by_month.items():
    status = "АЛЕРТ" if acc < alert_threshold else "OK"
    print(f"Месяц {month:2d}: accuracy={acc:.2f}  {status}")

# Стратегии реагирования:
# - По расписанию: переобучать раз в месяц/квартал
# - По триггеру: переобучать при превышении порога дрейфа
# - Онлайн-обучение: обновлять модель непрерывно
```

## Простой пример

Финтех-компания запустила модель кредитного скоринга в январе с F1 = 0.89. К июню F1 = 0.82 — постепенная деградация. Анализ: средний доход заявителей вырос на 18% (data drift из-за роста зарплат), но порог «надёжный заёмщик» в модели не изменился. В марте 2020 года аналогичная модель у банка рухнула за 3 недели из-за concept drift — пандемия изменила связь «стабильная работа → низкий риск» overnight. Первый случай: переобучение по расписанию раз в квартал. Второй случай: нужно было онлайн-обучение или экстренное переобучение за дни.

## Практика

1. Модель рекомендаций обучена в феврале и деградирует каждый ноябрь из-за предпраздничного спроса, но в остальное время работает стабильно. Какой тип деградации это? Стоит ли переобучать её каждый раз или есть лучшее решение?
2. Какие три стратегии переобучения существуют при обнаружении деградации и когда применяется каждая?
3. Модель предсказания спроса деградирует каждый декабрь три года подряд. Это проблема или паттерн? Что нужно изменить в модели?
4. Какой тип деградации проще обнаружить мониторингом входных признаков и почему второй тип сложнее?
5. Почему резкий concept drift (из-за кризиса или пандемии) опаснее, чем постепенный data drift, с точки зрения скорости обнаружения и масштаба последствий?

## Краткий итог

- Все модели деградируют со временем — это нормально и неизбежно
- Concept drift (изменение зависимости) опаснее и сложнее, чем data drift (изменение данных)
- Стратегию переобучения выбирают по скорости drift: чем быстрее меняются данные — тем чаще нужно обновлять модель
- Мониторинг качества данных (пропуски, типы) важен наравне с мониторингом метрик

## Ключевые термины урока

- **Model decay (устаревание модели)** — неизбежный процесс: не «если», а «когда». Скорость зависит от области: финансовые модели устаревают за недели, промышленные — за годы.
- **Concept drift** — изменилась сама зависимость P(y|X). Опаснее data drift: может произойти внезапно (пандемия, кризис) и не виден в мониторинге входных данных — только в метриках.
- **Data drift** — изменилось распределение входных признаков P(X), но зависимость та же. Обнаруживается мониторингом без меток; менее опасен, чем concept drift.
- **Переобучение по расписанию** — подходит при предсказуемом, постепенном дрейфе. Простейшая стратегия: раз в неделю/месяц независимо от реального состояния модели.
- **Переобучение по триггеру** — переобучение только при детекции деградации. Экономит ресурсы, но требует надёжного мониторинга, иначе реакция будет запоздалой.

# 77. Как тестировать ML-системы

## Зачем это нужно

ML-системы — это не только ML-код: это данные, preprocessing, бизнес-логика, API. Традиционное тестирование ПО недостаточно. ML-системы требуют особых подходов к тестированию, учитывающих вероятностную природу моделей и зависимость от данных.

## Простая интуиция

Обычный тест проверяет: «при входе A всегда получаем B». В ML всё иначе: «при входе A получаем B примерно в 90% случаев». Тестировать нужно не только код, но и поведение модели: не пропускает ли она определённый тип объектов? Не слишком ли уверена в очевидных случаях?

## Что это такое

- **Unit tests** — тестирование отдельных функций preprocessing, feature engineering
- **Integration tests** — тестирование полного pipeline от сырых данных до предсказания
- **Data validation tests** — проверка схемы, типов, диапазонов входных данных
- **Model behavior tests** — проверка специфических свойств модели (например, если доход вырос — score не должен упасть)
- **Regression tests** — модель не ухудшилась после изменений

## Как это работает

```python
import numpy as np

# Unit test: preprocessing не меняет размерность
X_transformed = pipeline.named_steps["scaler"].transform(X_test)
assert X_transformed.shape == X_test.shape

# Data validation: входные данные корректны
def validate_input(X_new, expected_cols):
    assert X_new.shape[1] == expected_cols, "Неверное количество признаков"
    assert not np.isnan(X_new).any(), "NaN в входных данных"

# Regression test: качество не упало после изменений
current_acc = pipeline.score(X_test, y_test)
assert current_acc > 0.75, f"Accuracy {current_acc:.3f} ниже порога 0.75!"

# Model behavior test: вероятности суммируются в 1
probs = pipeline.predict_proba(X_test)
assert abs(probs.sum(axis=1) - 1.0).max() < 1e-6
```

## Простой пример

Команда деплоит новую версию модели предсказания оттока в CI/CD пайплайне. Unit test: scaler не изменяет размерность (10 признаков на входе → 10 на выходе). Data validation: запрос с отрицательным возрастом или строкой вместо числа — возвращает 400 Bad Request, не падает с ошибкой. Model behavior test: для клиента с доходом 100 000 ₽ вероятность оттока не должна быть выше, чем для клиента с доходом 50 000 ₽ при одинаковых прочих признаках. Regression test: F1 на hold-out выборке не ниже 0.78. Всё прошло — деплой. Один тест провалился — пайплайн остановлен, деплой отменён.

## Практика

1. Коллега написал unit-тест, который проверяет, что predict() возвращает число без исключения. CI/CD проходит, но в production модель тихо выдаёт бессмысленные предсказания при NaN-входах. Какого теста не хватает и почему unit-тест этого не поймал?
2. Что проверяет data validation test и что должно произойти при его провале в production pipeline?
3. Вы деплоите модель кредитного скоринга. Придумайте: один unit test, один data validation test и один model behavior test для этой задачи.
4. Как regression test автоматизирует проверку того, что обновление модели не ухудшило качество на ранее проблемных группах?
5. Как data validation test при каждом запросе отличается от мониторинга по роли в ML-системе?

## Краткий итог

- ML-системы требуют: unit tests кода, data validation, model behavior tests, regression tests
- Data validation — проверяйте схему, типы и диапазоны входных данных
- Model behavior tests проверяют специфические свойства предсказаний
- Интегрируйте тесты в CI/CD: перед каждым деплоем все тесты должны проходить

## Ключевые термины урока

- **Unit tests для ML** — тестируют корректность кода, не качество модели: «feature engineering возвращает правильный тип?», «scaler применяется только на train?». Обычные pytest; не требуют обученной модели.
- **Data validation tests** — 4 проверки: схема (нужные колонки есть), типы (числа — числа, не строки), диапазоны (возраст 0–120), NaN в критичных полях. Ловят баги при изменении upstream данных — до того, как модель молча выдаст бред.
- **Model behavior tests (invariance tests)** — проверяют логику: изменение нерелевантного признака не меняет предсказание; более положительный сигнал → более высокий скор. Ловят логические баги, которые unit tests не поймают.
- **Regression tests** — новая модель ≥ старой на ключевых метриках перед деплоем; иначе деплой блокируется. CI/CD для ML: тест провалился = автоматический откат или запрет деплоя.

# 78. p-value и статистическая значимость

## Зачем это нужно

Ты обучил новую модель. На тестовой выборке CTR вырос с 10.2% до 10.5%. Запустил A/B тест на реальных пользователях — результаты похожие. Можно деплоить?

Не факт. Разница в 0.3% могла возникнуть случайно, просто потому что в одну группу попали чуть более активные пользователи. Чтобы отличить реальное улучшение от случайного шума, нужен инструмент — статистическая значимость и p-value.

## Простая интуиция

Ты подбрасываешь монету 10 раз и получаешь 7 орлов. Монета нечестная? Может быть. А может, просто повезло. Вопрос: насколько вероятно получить 7 орлов из 10, если монета честная?

Статистика отвечает именно на этот вопрос: «Насколько вероятно увидеть такой результат, если никакого эффекта нет?» Если вероятность очень мала — эффект реален. Если вероятность большая — это может быть просто шум.

## Что это такое

**Нулевая гипотеза (H₀)** — утверждение «разницы нет». Для A/B теста: «Модель A и модель B дают одинаковые результаты». Мы пытаемся опровергнуть это утверждение.

**p-value** — вероятность получить такие же или более экстремальные результаты, если нулевая гипотеза верна.

**Уровень значимости (α)** — порог, ниже которого мы считаем результат не случайным. Стандарт в индустрии: **α = 0.05**.

- p-value < 0.05 → результат статистически значим, нулевую гипотезу отвергаем
- p-value ≥ 0.05 → недостаточно доказательств, нулевую гипотезу сохраняем

## Как это работает

### Что p-value говорит и что не говорит

**p-value — это НЕ вероятность того, что модель B лучше модели A.**

p-value говорит: «Если бы разницы не было, как часто мы бы видели такой результат просто по случайности?»

Пример:
- A/B тест: 5 000 пользователей в каждой группе
- Модель A: CTR = 10.2%, Модель B: CTR = 10.5%
- p-value = 0.03

Интерпретация: если бы модели были одинаковы, мы бы наблюдали такую разницу (0.3%) или большую только в 3% случаев. Это достаточно редко → разница, вероятно, реальна.

### Роль размера выборки

Маленькая выборка — ты можешь не заметить реальный эффект.

```
10 пользователей: CTR 10% vs 15% → p-value = 0.62 (не значимо, мало данных)
1 000 пользователей: CTR 10% vs 10.5% → p-value = 0.03 (значимо)
```

С маленькой выборкой даже большая реальная разница может выглядеть как шум. Поэтому A/B тесты нужно держать достаточно долго — пока не наберётся нужный объём данных.

### Как вычислить p-value на практике

В примерах выше p-value приводится как готовое число. На практике его считает статистический тест:

```python
from scipy.stats import proportions_ztest

# A/B тест: сравниваем CTR двух групп (доля кликов)
clicks_A, users_A = 510, 5000   # 10.2%
clicks_B, users_B = 525, 5000   # 10.5%

stat, p_value = proportions_ztest(
    count=[clicks_A, clicks_B],
    nobs=[users_A, users_B]
)
print(f"p-value: {p_value:.4f}")
# p-value = 0.4832 → не значимо (0.3% разницы — шум на 5000 пользователях)

# Для сравнения среднего времени сессии (непрерывная метрика):
from scipy.stats import ttest_ind
stat, p_value = ttest_ind(sessions_A, sessions_B)
```

`proportions_ztest` — для долей (CTR, конверсия). `ttest_ind` — для средних (время, доход). p-value — на выходе.

### Статистическая значимость ≠ практическая значимость

Разница может быть статистически значимой, но бессмысленной на практике:

- CTR вырос с 10.000% до 10.001% → p-value = 0.001 (при миллионах пользователей)
- Это статистически значимо, но бизнесу безразлично

Всегда задавай два вопроса: **«Значимо ли это статистически?»** и **«Значимо ли это для бизнеса?»**

## Простой пример

Команда тестирует новую модель рекомендаций в стриминговом сервисе.

Гипотеза: новая модель увеличивает время просмотра.

Тест: 14 дней, 50 000 пользователей в каждой группе.
- Модель A (старая): 42.3 мин/день
- Модель B (новая): 43.1 мин/день
- p-value = 0.01

p-value < 0.05 → разница статистически значима. +0.8 мин/день на 10 млн пользователей — это ~133 000 дополнительных часов просмотра в сутки. Практически значимо. Деплоим.

Контрпример: другой тест показал рост с 42.3 до 42.4 мин, p-value = 0.03. Статистически значимо, но +0.1 мин/день — бизнес решил не усложнять систему ради такого прироста.

## Практика

1. A/B тест показал: модель B улучшила время просмотра с 42.3 до 43.1 мин, p-value = 0.01. Коллега говорит: «p < 0.05, значит модель B с вероятностью 99% лучше модели A». Что именно неправильно в этой интерпретации?
2. A/B тест показал: модель A — CTR 8.1%, модель B — CTR 8.4%, p-value = 0.08. Можно ли деплоить модель B? Что нужно сделать дальше?
3. Почему при малой выборке сложно обнаружить реальный эффект? Как это связано с p-value?
4. Два теста: (а) CTR вырос с 5.00% до 5.01%, p-value = 0.001; (б) CTR вырос с 5% до 6%, p-value = 0.06. Какой результат статистически значим? Какой практически значим? Могут ли они не совпадать?
5. Мини-кейс: команда запустила A/B тест на 500 пользователях на 2 дня. Новая модель показала p-value = 0.07. Коллега говорит: «Нет смысла деплоить — не значимо». Ты не уверен. Какие два вопроса надо задать, прежде чем принять это решение?

## Краткий итог

- p-value < 0.05 означает: такой результат случайно возникает реже одного раза из двадцати — это стандартный порог значимости
- Статистическая значимость — первый фильтр: убеждаемся, что эффект не шум
- Практическая значимость — второй фильтр: убеждаемся, что эффект достаточно велик, чтобы оправдать внедрение
- Маленькая выборка скрывает реальные эффекты: держите A/B тест, пока не наберётся нужный объём данных
- Большая выборка может сделать незначительный эффект статистически значимым — проверяйте обе значимости

## Ключевые термины урока

- **Нулевая гипотеза (H₀)** — предположение об отсутствии разницы, которое мы пытаемся опровергнуть.
- **p-value** — вероятность получить наблюдаемый результат (или более экстремальный), если нулевая гипотеза верна.
- **Уровень значимости (α)** — порог для p-value, стандартно 0.05: ниже порога — результат значим.
- **Статистическая значимость** — уверенность, что наблюдаемый эффект не случаен.
- **Практическая значимость** — достаточность величины эффекта для принятия бизнес-решения.

# 79. A/B тестирование в ML

## Зачем это нужно

Вы обучили новую модель, которая показывает лучшие метрики на тесте. Но как убедиться, что она реально лучше в production? A/B тест — научный способ сравнить две версии системы на реальных пользователях и принять решение на основе данных, а не предположений.

## Простая интуиция

Аптека хочет проверить, помогает ли новое лекарство лучше старого. Одной группе пациентов дают старое, другой — новое. Сравнивают результаты. В ML то же самое: одним пользователям показываем предсказания модели A (контроль), другим — модели B (эксперимент).

## Что это такое

- **A/B тест** — контролируемый эксперимент, где A = контрольная группа (старая модель), B = экспериментальная (новая)
- **Трафик сплит** — случайное разделение пользователей: например, 90% к A, 10% к B
- **Статистическая значимость** — p-value < 0.05 говорит, что разница не случайна
- **Shadow mode** — новая модель делает предсказания, но они не показываются пользователям (логируются для анализа)
- **Canary deployment** — постепенное увеличение трафика к новой модели: 1% → 5% → 20% → 100%

## Как это работает

```python
# Результаты A/B теста (5000 пользователей в каждой группе)
ctr_A = 0.102  # CTR старой модели
ctr_B = 0.105  # CTR новой модели

relative_lift = (ctr_B - ctr_A) / ctr_A
print(f"Улучшение CTR: {relative_lift:.1%}")

# Вывод делается только при p-value < 0.05 (статистическая значимость)
# p-value >= 0.05 → нужно больше данных или разница случайна

# При малом улучшении (+0.3%) и большом шуме нужна очень большая выборка
```

## Простой пример

Маркетплейс улучшил модель ранжирования товаров: на offline тестовой выборке точность выросла с 74% до 81%. Запускают A/B тест: 90 000 пользователей в контрольной группе (старая модель), 10 000 — в экспериментальной (новая). Через 2 недели: CTR вырос с 8.3% до 9.1% (p-value = 0.02 — значимо), конверсия с 2.1% до 2.4% (p-value = 0.03 — тоже значимо). Выкатывают на 100% трафика. Прирост конверсии на 0.3% при обороте 500 млн ₽/месяц — дополнительные 1.5 млн ₽ в месяц.

## Практика

1. Почему A/B тест необходим, даже если новая модель показывает лучшие метрики на тестовой выборке?
2. Что такое shadow mode и canary deployment? Чем они отличаются по назначению и риску?
3. Вы провели A/B тест: модель A — CTR 10.2%, модель B — CTR 10.5%, p-value = 0.08. Можно ли деплоить модель B? Почему?
4. Команда запустила A/B тест, увидела p-value = 0.03 через 3 дня и решила остановить тест досрочно. Почему это опасно, даже если результат кажется убедительным, и какой термин описывает эту ошибку?
5. Почему A/B тест нужно проводить не менее одного полного бизнес-цикла и как это связано с сезонностью и недельными паттернами?

## Краткий итог

- Offline-метрики не дают права катить модель: только A/B тест с реальным трафиком даёт достоверный ответ «стало ли лучше?»
- Метрики на тестовой выборке не заменяют A/B тест: бизнес-метрики могут вести себя иначе
- Shadow mode и canary deployment снижают риск при выкатке новой модели
- Ждите статистической значимости (p-value < 0.05) и полного бизнес-цикла перед решением

## Ключевые термины урока

- **A/B тест** — единственный способ честно измерить влияние ML на бизнес-метрики. Offline-метрики (accuracy, NDCG) — прокси; пользователь реагирует иначе, чем предполагает val-выборка.
- **Shadow mode** — новая модель делает предсказания, но пользователи видят только старую: нулевой риск для UX, можно сравнить распределения и поймать баги до реального трафика.
- **Canary deployment** — 1–5% трафика на новую модель; мониторинг 24–48 часов на ошибки и деградацию метрик. Если чисто — постепенное расширение до 50/50.
- **p-value и размер выборки** — p < 0.05 и минимальный детектируемый эффект (MDE) определяют нужный размер выборки ДО начала теста. Остановить тест «раньше, потому что уже хорошо» = p-hacking; результат недостоверен.
- **Статистическая значимость ≠ практическая** — p < 0.05 при +0.01% конверсии = значимо, но не стоит инженерных затрат. Всегда оцениваем оба: «есть ли эффект?» и «достаточен ли он?».

# 80. Как работает поисковая выдача

## Зачем это нужно

Ты каждый день пользуешься Google или Яндексом. Кажется, что поисковик «просто находит» нужные страницы. На самом деле за каждой выдачей стоит ML-модель, которая за доли секунды обрабатывает сотни сигналов и решает, что поставить первым.

## Простая интуиция

Представь библиотеку в миллиард книг и библиотекаря, который за 0.2 секунды должен выбрать 10 самых подходящих для конкретного человека с конкретным вопросом. Причём для одного читателя важнее практические руководства, для другого — академические статьи. Библиотекарь знает каждого посетителя, помнит его прошлые визиты и понимает, что именно он ищет сегодня. Это и есть задача поисковой выдачи.

## Что это такое

Поисковая выдача — результат ранжирующей модели, которая для каждого запроса сортирует все возможные страницы по релевантности и показывает лучшие.

Три группы сигналов:
- **Сигналы запроса** — что именно ищет пользователь, какое намерение стоит за словами
- **Сигналы страницы** — насколько контент соответствует запросу, насколько авторитетна страница
- **Сигналы пользователя** — история поиска, местоположение, устройство, время суток

## Как это работает

Для каждой пары «запрос + страница» модель вычисляет score релевантности из десятков признаков:

| Признак | Пример |
|---|---|
| Совпадение слов | «iPhone 14» есть в заголовке страницы? |
| Намерение запроса | «купить» → коммерческий, «что такое» → информационный |
| Авторитетность | Сколько других сайтов ссылаются на эту страницу? |
| Свежесть | Насколько недавно обновлена страница? |
| Местоположение | Поиск «кафе» → показываем ближайшие |
| История пользователя | Ты уже был на этой странице? |

**Intent (намерение запроса)** — одна из важнейших идей. Запрос «iPhone 14» может означать разное:
- «хочу купить» → на первом месте должен быть магазин
- «хочу узнать характеристики» → на первом месте должна быть статья
- «хочу посмотреть фото» → нужна галерея

Модель учится распознавать intent и подбирает тип контента под него.

**Как модель учится**

Основной сигнал — клики пользователей. Если на запрос «ноутбук для работы» пользователи чаще кликают на второй результат, а не на первый — значит второй релевантнее. Это implicit feedback, точно как в рекомендательных системах.

## Простой пример

Пользователь в Москве вечером вводит запрос «пицца». Поисковик определяет intent как «заказать еду рядом», а не «рецепт». Три сигнала работают одновременно: сигнал пользователя — геолокация Москва, Замоскворецкий район; сигнал запроса — слово «пицца» без уточнений → коммерческий intent; сигнал страниц — рейтинг и расстояние заведений. Топ-3 результата: три пиццерии в 500м. Тот же запрос «пицца» для пользователя без геолокации и с историей кулинарных сайтов выдаёт рецепты на первых позициях.

## Практика

1. Какие три группы сигналов использует поисковая модель? Приведи по одному примеру из каждой.
2. Почему запрос «ресторан» даст разные результаты для пользователя в Москве и Новосибирске?
3. Что такое intent запроса? Как он влияет на тип результатов на первом месте?
4. Пользователь вводит запрос и не кликает ни на один результат, а уточняет запрос. О чём это говорит системе?
5. Мини-кейс: пользователь ищет «Python». Придумай три разных намерения, которые могут стоять за этим словом, и объясни почему для каждого первый результат должен быть разным.

## Краткий итог

- Поиск давно перестал быть поиском по ключевым словам: сотни сигналов делают из него персонализированную ранжирующую систему
- Три группы сигналов: запрос, страница, пользователь
- Не угадав intent, нельзя дать правильный результат: одно слово означает разные запросы у разных людей в разный момент
- Клики пользователей — основной обучающий сигнал (implicit feedback)
- Выдача персональна: история, местоположение и устройство меняют результаты

## Ключевые термины урока

- **Поисковая выдача** — не «находилка» по ключевым словам, а ранжирующая ML-модель: одно и то же слово разным пользователям в разное время даёт разный список.
- **Сигналы запроса** — характеристики текста: не только слова, но и намерение. «Python» для новичка и для инженера → разные первые результаты.
- **Сигналы страницы** — контент плюс авторитет (ссылочная масса). Авторитет не обнуляется при смене контента — это актив, накопленный годами.
- **Intent (намерение)** — скрытая цель за запросом; угадать intent важнее, чем точно совпасть по словам. Запрос «пицца» без геолокации и с кулинарной историей → рецепты, а не доставка.
- **Персонализация** — выдача меняется от пользователя к пользователю: одинаковый запрос «Python» даёт разные топ-3 для студента и для DevOps-инженера.

# 81. Как ранжируется лента в соцсетях

## Зачем это нужно

TikTok, Instagram, ВКонтакте, LinkedIn — у всех есть лента. Кажется, там просто посты друзей. На самом деле каждый пост проходит через ранжирующую модель, которая решает: показать это тебе или нет, и на какой позиции. Понимание этого меняет взгляд на то, как работают соцсети.

## Простая интуиция

Представь редактора газеты, который знает каждого читателя лично: что ему интересно, сколько времени он обычно читает, на что реагирует. Для каждого читателя он составляет свою версию газеты. Лента — это такой редактор, работающий на ML.

## Что это такое

Ранжирование ленты — задача, где «запрос» это не текст, а **профиль пользователя**: его история, интересы, поведение. Модель решает, какие посты показать, в каком порядке.

Ключевое отличие от поиска: пользователь **ничего не спрашивает** — модель сама угадывает, что ему интересно прямо сейчас.

## Как это работает

**Сигналы со стороны пользователя:**
- С чем взаимодействовал раньше: лайки, комментарии, репосты, сохранения
- Время просмотра: сколько секунд смотрел на конкретный пост
- Что досматривал до конца, а что пролистывал сразу
- Время суток, устройство, частота открытия приложения

**Сигналы со стороны поста:**
- Engagement rate — сколько людей лайкнули и прокомментировали из увидевших
- Скорость набора реакций: свежий пост с быстрым ростом — хороший сигнал
- Автор: насколько пользователь взаимодействовал с ним раньше

**Что модель оптимизирует**

| Метрика | Что получается |
|---|---|
| Время в приложении | Контент, от которого сложно оторваться |
| Вовлечённость | Контент, вызывающий реакцию |
| Удовлетворённость | Контент, после которого пользователь доволен |

Эти цели могут конфликтовать: скандальный контент держит в приложении дольше, но пользователь потом чувствует себя плохо. Платформы постепенно учатся измерять удовлетворённость, а не только время.

## Простой пример

Пользователь открывает Instagram в 22:00, уже посмотрел 15 постов про кулинарию за последние 3 дня. Модель знает: вечер + смартфон + история про еду → высокая вероятность просмотра кулинарных видео. Пост кулинарного блогера с engagement rate 8% (400 лайков из 5 000 просмотров) получает score выше, чем пост знаменитости с engagement rate 2% (200 000 лайков из 10 млн). Плюс автор блогера попадает в «близкий круг» пользователя — он смотрел 9 из последних 10 его постов. Итог: блогер на 1-м месте, знаменитость на 7-м.

## Практика

1. Чем ранжирование ленты отличается от поискового ранжирования? Что играет роль «запроса»?
2. Почему один и тот же пост двое друзей видят в разном порядке — или один вообще не видит?
3. Ты досмотрел до конца видео о кулинарии, хотя специально его не искал. Как это повлияет на твою ленту?
4. Платформа оптимизирует «время в приложении». Какой контент она начнёт показывать чаще — полезный или эмоционально заряженный? Почему?
5. Мини-кейс: пост набрал 200 лайков из 500 просмотров. Другой пост — 10 лайков из 50 просмотров. У какого engagement rate выше и как алгоритм это использует при распространении?

## Краткий итог

- В ленте нет явного запроса: модель угадывает интерес по профилю — это сложнее поиска и требует больше implicit сигналов
- Сигналы: время просмотра, лайки, комментарии, скорость роста engagement
- Время просмотра честнее лайков: досмотрел до конца = сильный позитивный сигнал
- Что оптимизирует лента — то и растёт: выбор оптимизируемой метрики определяет характер контента в продукте
- Оптимизация на удовлетворённость, а не только на время в приложении — продуктовое решение, которое меняет качество ленты

## Ключевые термины урока

- **Лента** — в отличие от поиска, здесь нет запроса: модель угадывает интерес по поведенческой истории. Это делает ленту сложнее поиска — «угадать» труднее, чем «ответить».
- **Implicit feedback** — сигналы, которые пользователь не осознаёт как оценку: досмотрел до конца = лайк без лайка. Сильнее явных реакций, потому что честнее.
- **Сигналы пользователя** — история взаимодействий, время суток, устройство. Ключевой сигнал — не «что лайкнул», а «сколько секунд смотрел».
- **Сигналы поста** — не только тема и автор, но и engagement rate среди уже увидевших. Пост с 40% реакций из 50 просмотров «горячее», чем пост с 2% из 1 млн.
- **Оптимизируемая метрика** — определяет характер контента в продукте: оптимизация на время в приложении поднимает скандальный контент, на удовлетворённость — полезный. Выбор метрики = продуктовое решение.

# 82. Как ранжируются товары на маркетплейсе

## Зачем это нужно

Ты ищешь «наушники» на Wildberries или Ozon. Из 50 000 товаров тебе показывают 20. Почему именно эти? Порядок результатов — не случайный и не просто «по рейтингу». Это ML-модель, которая одновременно думает о тебе, о продавце и о платформе.

## Простая интуиция

Представь менеджера магазина, расставляющего товары на полках. Он хочет, чтобы покупатель нашёл нужное — довольный вернётся. Но также хочет поставить на видное место товары с высокой маржой. На маркетплейсе эту задачу решает ML-модель, причём для каждого покупателя отдельно.

## Что это такое

Ранжирование товаров — задача, где для каждого запроса нужно упорядочить тысячи товаров, оптимизируя несколько целей одновременно: удовлетворить пользователя, помочь продавцу и заработать платформе.

## Как это работает

**Сигналы релевантности** — насколько товар соответствует запросу:
- Совпадение запроса с названием, описанием, категорией
- Атрибуты: бренд, цвет, размер, характеристики

**Сигналы качества товара** — насколько товар хорош:
- Рейтинг и количество отзывов
- Процент возвратов (высокий возврат — плохой сигнал)
- Скорость доставки
- **Конверсия** — какой процент просмотревших купил; один из сильнейших сигналов

**Коммерческие сигналы** — интересы платформы:
- Платная реклама: продавец заплатил за более высокую позицию
- Маржинальность: платформе выгоднее продавать одни товары, чем другие

**Конфликт интересов**

| Сторона | Что хочет |
|---|---|
| Пользователь | Лучший товар по цене и качеству |
| Продавец | Попасть на первые позиции |
| Платформа | Максимизировать выручку |

Хорошая платформа балансирует: слишком много рекламы на первых позициях — пользователи уходят к конкурентам.

**Персонализация**

Один запрос «ноутбук» даёт разные результаты разным пользователям. Тот, кто всегда покупает дорогую технику, увидит премиум-модели. Тот, кто всегда выбирает по цене — увидит бюджетные варианты. Модель учится на истории покупок каждого пользователя.

## Простой пример

Пользователь вводит «беспроводные наушники» на маркетплейсе. В базе 3 800 товаров по этому запросу. Модель оценивает каждый по трём группам сигналов. Товар A: точное совпадение с запросом, рейтинг 4.8 из 1 200 отзывов, конверсия 12%, доставка 1 день — высокий score. Товар B: рейтинг 4.9 из 8 отзывов, конверсия 3%, доставка 5 дней — score ниже. Товар C: платная реклама, поднимает позицию, но конверсия 1.5% — система не ставит его выше первых двух, чтобы не раздражать пользователя. Итог: A на 1-м, B на 4-м, C на 3-м.

## Практика

1. Продавец улучшил описание товара и добавил больше фотографий. Какие группы сигналов это затронет, а какие останутся без изменений?
2. Почему товар с рейтингом 4.9 из 5 отзывов может стоять ниже товара с рейтингом 4.3 из 800 отзывов?
3. Что такое конверсия в контексте маркетплейса и почему это один из сильнейших сигналов ранжирования?
4. Один и тот же запрос «кроссовки» даёт разные результаты двум пользователям. Какие данные о них мог использовать алгоритм?
5. Мини-кейс: продавец видит, что его товар с отличными отзывами стоит на 18-й позиции, а конкурент с меньшим рейтингом — на 3-й. Придумай три возможные причины этого, опираясь на сигналы ранжирования.

## Краткий итог

- Ранжирование на маркетплейсе балансирует интересы пользователя, продавца и платформы
- Три группы сигналов: релевантность запросу, качество товара, коммерческие факторы
- Конверсия — важный, но опасный сигнал в одиночку: чрезмерная оптимизация на неё ведёт к деградации каталога
- Персонализация: история покупок меняет результаты для каждого пользователя
- Избыток рекламных позиций разрушает доверие пользователей — платформа балансирует

## Ключевые термины урока

- **Ранжирование на маркетплейсе** — единственный контекст ранжирования, где модель явно балансирует три конкурирующих интереса: пользователь, продавец, платформа. Поисковик балансирует только два.
- **Конверсия** — доля просмотревших, кто купил; сильнейший сигнал, но опасный в одиночку: оптимизация только на конверсию вымывает новые товары без истории продаж.
- **Коммерческие сигналы** — платная реклама и маржинальность. Отличие от поиска: здесь деньги продавца напрямую влияют на позицию. Риск — потеря доверия пользователей при избытке рекламы.
- **Персонализация** — история покупок переопределяет «одинаковый» запрос. Покупатель премиум-техники и покупатель бюджетных товаров с одним запросом «ноутбук» видят принципиально разный топ-20.
- **Конфликт интересов** — структурная особенность маркетплейса: максимизировать выручку платформы ≠ показать лучший товар. Компромисс между ними — ключевое продуктовое решение.
