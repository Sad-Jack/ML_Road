# 47. Imbalanced Classes

## Зачем это нужно

Несбалансированные классы — одна из самых частых проблем в реальных задачах: обнаружение мошенничества, диагностика болезней, спам-фильтрация. Если проигнорировать дисбаланс, модель будет казаться точной, но на практике окажется бесполезной — она просто предскажет всегда «нет» и получит 99% accuracy.

## Простая интуиция

Представьте, что вы предсказываете, упадёт ли самолёт. Из 10 000 рейсов только 1 заканчивается катастрофой. Если ваша модель всегда говорит «не упадёт» — она права в 99.99% случаев. Но она полностью бесполезна именно для того, для чего создавалась.

## Что это такое

- **Несбалансированные классы** — когда один класс встречается намного чаще другого (например, 99% vs 1%)
- **Accuracy-парадокс** — высокая точность при тривиальной модели, предсказывающей только большинство
- **Minority class** — редкий класс, который чаще всего и является целевым
- **Majority class** — преобладающий класс
- Серьёзность имбаланса зависит от **цены ошибки**: 1:50 в онкологии — критично, 1:10 в спам-фильтре — управляемо. Не ориентируйся только на соотношение — смотри на recall и F1 для minority class

## Как это работает

```python
# Accuracy обманывает при несбалансированных классах
# Если модель всегда предсказывает большинство (95%):
# accuracy = 0.95 — выглядит хорошо!
# Но recall для minority class = 0.00 → редкий класс не находится вообще

from sklearn.metrics import classification_report
print(classification_report(y_test, y_pred))
# y_test — реальные метки, y_pred — предсказания модели
# Смотрите на precision, recall и f1 для minority class — не на accuracy
```

## Простой пример

Банк обучает модель обнаружения мошенничества на 100 000 транзакций: 99 000 нормальных и 1 000 мошеннических. Наивная модель «всё нормально» получает accuracy 99% — выглядит отлично. Но recall для мошеннических транзакций равен 0: ни одна атака не поймана. Когда смотрят на F1-score для класса «мошенничество» — он равен 0. Это немедленно разоблачает бесполезность модели.

## Практика

1. Email-сервис строит спам-фильтр: 95% писем — не спам, 5% — спам. Модель получила accuracy = 0.96. Менеджер доволен. Аналитик скептичен. Какой один вопрос должен задать аналитик — и что ответ на него может выявить?
2. Вы решаете задачу fraud detection (99:1). Вас просят выбрать одну метрику для мониторинга в production. Вы выбираете recall, коллега — precision. Кто прав? При каких условиях коллега может быть прав?
3. Датасет: 9800 здоровых пациентов и 200 больных. Модель всегда предсказывает «здоров». Какой accuracy она получит и почему это катастрофа с точки зрения recall?
4. Как матрица ошибок немедленно демонстрирует провал модели при несбалансированных классах, который скрыт в accuracy?
5. Из урока «Метрики классификации» мы знаем, что F1-score — это гармоническое среднее precision и recall. Почему при несбалансированных классах F1-score информативнее accuracy? Что именно он учитывает, чего не учитывает accuracy?

## Краткий итог

- Несбалансированные классы создают иллюзию хорошей модели через высокую accuracy
- Пропустить редкий класс часто дороже, чем ложная тревога: метрики должны это отражать, а не скрывать высоким accuracy
- Правильные метрики: F1-score, precision, recall для minority class
- Всегда проверяйте распределение классов до начала обучения

## Ключевые термины урока

- **Несбалансированные классы** — соотношение 1:10 управляемо, 1:100 критично; серьёзность зависит не только от пропорции, но и от цены ошибки на minority class.
- **Accuracy-парадокс** — модель, предсказывающая только «0» при 99% нулей, получает 99% accuracy и 0% recall на целевом классе; именно поэтому accuracy — плохая метрика при дисбалансе.
- **Minority class** — редкий класс, для которого recall и F1 критически важны; смотрите отчёт `classification_report` именно по этому классу.
- **Majority class** — преобладающий класс; высокий recall на нём почти ничего не стоит при сильном дисбалансе.

# 48. Что делать с несбалансированными классами

## Зачем это нужно

Зная, что дисбаланс есть, нужно уметь с ним бороться. Существует несколько практичных техник, которые работают в разных ситуациях. Правильный выбор метода может превратить бесполезную модель в рабочую без сбора новых данных.

## Простая интуиция

Представьте, что у вас 1000 фото собак и 10 фото кошек для обучения классификатора. Вы можете скопировать редкие фото кошек несколько раз, чтобы выровнять количество. Или выбросить часть лишних фото собак. Или сказать алгоритму: «За пропущенную кошку штрафуй меня в 100 раз больше, чем за ошибку с собакой». Три разных подхода к одной и той же проблеме.

## Что это такое

- **Oversampling** — увеличение minority class: дублирование примеров или генерация синтетических (SMOTE)
- **Undersampling** — уменьшение majority class: случайное удаление примеров
- **class_weight** — параметр в sklearn, увеличивающий штраф за ошибки на редком классе
- **SMOTE** (Synthetic Minority Over-sampling Technique) — создаёт новые синтетические примеры путём интерполяции
- **Threshold tuning** — изменение порога классификации (по умолчанию 0.5) для баланса precision/recall

## Как это работает

```python
from sklearn.linear_model import LogisticRegression

# Метод 1: class_weight="balanced" — первое что пробуем, ничего не меняет в данных
model = LogisticRegression(class_weight="balanced")
model.fit(X_train, y_train)

# Метод 2: порог классификации (по умолчанию 0.5)
probs = model.predict_proba(X_test)[:, 1]
y_pred = (probs >= 0.3).astype(int)  # снижаем порог → больше recall, меньше precision

# Метод 3: SMOTE — генерация синтетических примеров (pip install imbalanced-learn)
# from imblearn.over_sampling import SMOTE
# X_res, y_res = SMOTE().fit_resample(X_train, y_train)
```

## Простой пример

Медицинская система диагностики рака кожи: 9 500 снимков здоровой кожи и 500 снимков с меланомой. Первый шаг — добавить `class_weight="balanced"`: recall для меланомы вырастает с 12% до 61% без изменения данных. Затем снижают порог классификации с 0.5 до 0.3 — recall достигает 78%, но precision падает до 45%. В медицине это приемлемо: лучше ложная тревога, чем пропущенный рак. Если этого мало — применяют SMOTE для генерации 1 000 синтетических снимков меланомы.

## Практика

1. После добавления `class_weight='balanced'` recall для minority class вырос с 8% до 45%. Вы решаете попробовать SMOTE. Какие улучшения вы ожидаете, если class_weight уже работает? Есть ли риски в применении SMOTE поверх class_weight?
2. Вы обнаружили, что SMOTE был применён ко всему датасету до split. Val-метрика выглядит отлично. В чём конкретно ошибка и почему val-метрика нечестная?
3. Вы работаете над детектором мошенничества: 99% транзакций нормальные, 1% мошеннические. Какой подход попробуете первым и как оцените результат?
4. Как изменение порога классификации с 0.5 до 0.3 влияет на баланс precision и recall и почему это компромисс?
5. Почему SMOTE нельзя применять до разделения на train и test, и как Pipeline помогает правильно встроить oversampling в пайплайн?

## Краткий итог

- Первый шаг: попробуйте class_weight="balanced" — просто и эффективно
- SMOTE создаёт синтетические примеры и работает лучше при очень малом minority class
- Undersampling быстр, но теряет данные
- Порог классификации позволяет гибко управлять балансом precision/recall

## Ключевые термины урока

- **Oversampling** — увеличивает minority class; SMOTE предпочтительнее простого дублирования, так как создаёт новые точки, а не копии. Применять только к train, не к test!
- **Undersampling** — уменьшает majority class; быстро, но теряет данные. Оправдан при очень большом датасете, где потеря некритична.
- **class_weight="balanced"** — не меняет данные, штрафует модель сильнее за ошибку на редком классе; `sklearn` вычисляет веса автоматически как `n_samples / (n_classes * n_class_i)`. Пробовать первым.
- **SMOTE** — в отличие от oversampling-дублирования, создаёт синтетические точки путём линейной интерполяции между соседними примерами minority class; требует `imbalanced-learn`.
- **Threshold tuning** — снижение порога с 0.5 до 0.3 увеличивает recall (меньше FN), но снижает precision (больше FP); правильный порог подбирают по PR-кривой под конкретную цену ошибок.

# 49. Гиперпараметры модели

## Зачем это нужно

Гиперпараметры — это рычаги управления моделью, которые задаются до обучения. Правильный выбор может превратить слабую модель в сильную. Неправильный — даже мощный алгоритм сделает бесполезным. Понимание того, что такое гиперпараметры и как они влияют на модель, обязательно для любого ML-практика.

## Простая интуиция

Представьте, что модель — это кофемашина. Параметры — это количество молотого кофе, которое она определяет сама в процессе приготовления. Гиперпараметры — это температура воды, давление, время заваривания: вы устанавливаете их вручную до того, как машина начинает работу.

## Что это такое

- **Параметры модели** — то, что модель учит из данных (веса нейросети, коэффициенты линейной регрессии)
- **Гиперпараметры** — то, что задаёте вы до обучения (нельзя выучить из данных напрямую)
- Примеры гиперпараметров:
  - `max_depth` — максимальная глубина дерева решений
  - `n_estimators` — количество деревьев в Random Forest
  - `learning_rate` — размер шага в градиентном спуске
  - `C` — сила регуляризации в SVM и логистической регрессии

## Как это работает

```python
from sklearn.ensemble import RandomForestClassifier

# Гиперпараметры задаются ДО обучения — не выучиваются из данных
model = RandomForestClassifier(
    n_estimators=100,    # количество деревьев
    max_depth=5,         # глубина каждого дерева (управляет bias-variance)
    min_samples_leaf=2,  # минимум объектов в листе (регуляризация)
    random_state=42
)
model.fit(X_train, y_train)

# Параметры модели (веса деревьев) — обновляются автоматически при .fit()
# Гиперпараметры — задаёте вы и не меняются при обучении
```

## Простой пример

Датасет из 5 000 отзывов на товары для предсказания тональности (позитив/негатив). Дерево решений с `max_depth=2` не улавливает нюансы текста — train accuracy 63%, явное недообучение. Дерево с `max_depth=None` запоминает каждое слово — train 99%, test 71%, переобучение. После перебора значений `max_depth` от 1 до 20 через кросс-валидацию оптимум находится при `max_depth=8`: train 88%, test 86%. Именно гиперпараметр `max_depth` управлял этим балансом.

## Практика

1. Вы задали `max_depth=20`: train=0.99, test=0.72. Затем `max_depth=3`: train=0.65, test=0.63. Является ли `max_depth` параметром или гиперпараметром? Что вы будете делать дальше для поиска оптимального значения?
2. Почему нельзя выбирать гиперпараметры, оценивая качество на тестовой выборке?
3. Вы настраиваете `max_depth` Decision Tree: при depth=1 train=60%, test=59%; при depth=None train=99%, test=70%. Что происходит в каждом случае и как найти оптимум?
4. Для Random Forest вы перебираете `n_estimators` и оцениваете через CV. При n=10: mean=0.78, std=0.09. При n=200: mean=0.87, std=0.02. Что именно говорит вам `std=0.09` о модели с n=10?
5. Почему гиперпараметры нужно подбирать через кросс-валидацию, а не через метрику на train или на одной val-выборке? Что произойдёт, если выбирать гиперпараметры по test?

## Краткий итог

- Гиперпараметры задаются до обучения и не обновляются из данных
- Они управляют сложностью модели и балансом bias-variance
- Подбор вручную неэффективен — нужен систематический поиск
- Оценивать качество гиперпараметров нужно через кросс-валидацию

## Ключевые термины урока

- **Параметры модели** — обновляются автоматически при `fit()` (веса, коэффициенты); их не трогают вручную. В отличие от гиперпараметров, не задаются до обучения.
- **Гиперпараметры** — задаются до `fit()` и фиксируются на всё обучение; подбираются через CV, не через метрику на test. Подбор на test — это data leakage для гиперпараметров.
- **Поиск гиперпараметров** — Grid Search исчерпывающий, Random Search стохастический; оба оценивают каждую комбинацию через кросс-валидацию, а не на одном разбиении.
- **max_depth как пример** — малое значение → высокий bias (underfitting), большое → высокая variance (overfitting); оптимум находится через CV, а не интуитивно.

# 50. Grid Search и Random Search

## Зачем это нужно

Ручной подбор гиперпараметров — это угадывание. Grid Search и Random Search делают этот процесс систематическим и воспроизводимым. Без автоматического поиска практик тратит часы на то, что алгоритм делает за минуты.

## Простая интуиция

Grid Search — это как попробовать каждое блюдо в меню ресторана, чтобы найти любимое. Вы гарантированно найдёте лучшее, но потратите много времени. Random Search — выбрать 10 случайных блюд. Вы с высокой вероятностью найдёте хорошее блюдо намного быстрее.

## Что это такое

- **GridSearchCV** — перебирает все комбинации заданных гиперпараметров, оценивает каждую через кросс-валидацию
- **RandomizedSearchCV** — перебирает случайное подмножество комбинаций из заданного распределения
- **CV** (Cross-Validation) — каждая комбинация оценивается на нескольких фолдах для надёжности
- **param_grid** — словарь с гиперпараметрами и их значениями для перебора
- **best_params_** — лучшая найденная комбинация
- **best_score_** — лучший средний score по кросс-валидации

## Как это работает

```python
from sklearn.ensemble import RandomForestClassifier
from sklearn.model_selection import GridSearchCV

# Grid Search: перебирает все комбинации (3 × 3 = 9 вариантов)
param_grid = {"n_estimators": [50, 100, 200], "max_depth": [3, 5, None]}
grid = GridSearchCV(RandomForestClassifier(), param_grid, cv=5, n_jobs=-1)
grid.fit(X_train, y_train)
print("Лучшие параметры:", grid.best_params_)
print("CV score:", round(grid.best_score_, 3))

# Random Search: быстрее при большом пространстве — не перебирает все комбинации
# RandomizedSearchCV(..., n_iter=20) — случайно выбирает 20 комбинаций
```

## Простой пример

Команда настраивает Random Forest для предсказания оттока клиентов (8 000 клиентов, 20 признаков). Grid Search с `n_estimators` ∈ {50, 100, 200} и `max_depth` ∈ {3, 5, None}: 9 комбинаций × 5 фолдов = 45 обучений, занимает 4 минуты. Лучшие параметры: `n_estimators=200`, `max_depth=5`, CV score 87.3%. Random Search с 6 параметрами и 4 значениями каждого (1 296 комбинаций) занял бы часы с Grid Search, но Random Search с n_iter=30 находит почти такой же результат за 12 минут.

## Практика

1. Grid Search нашёл `best_score_ = 0.89`, Random Search с n_iter=20 — score=0.875. Стоит ли продолжать Grid Search ради 0.015 разницы? Какие факторы влияют на это решение?
2. Что хранится в `best_estimator_` после GridSearchCV и почему нужна дополнительная оценка на тестовой выборке?
3. У вас пространство поиска: 5 значений `n_estimators`, 4 значения `max_depth`, 3 значения `min_samples_leaf`, 5-fold CV. Сколько обучений потребует Grid Search и когда выгоднее Random Search?
4. Вы подобрали гиперпараметры через GridSearchCV: `best_score_ = 0.88`. Оценили `best_estimator_` на test — получили 0.81. Это нормально или указывает на проблему? Что могло пойти не так?
5. Что происходит, если GridSearchCV настраивает гиперпараметры модели без Pipeline — почему трансформации вызывают data leakage?

## Краткий итог

- GridSearch неприменим при большом пространстве параметров: экспоненциальный рост делает полный перебор нереальным
- RandomizedSearch даёт почти такое же качество за долю времени: на практике 100 случайных точек покрывают пространство не хуже
- Оба используют кросс-валидацию для честной оценки каждой комбинации
- После поиска всегда оценивайте финальную модель на отдельной тестовой выборке

## Ключевые термины урока

- **GridSearchCV** — перебирает декартово произведение значений; при 3 параметрах по 4 значения = 64 комбинации × cv_folds обучений. При 5+ параметрах становится нереальным.
- **RandomizedSearchCV** — сэмплирует n_iter случайных комбинаций из распределений; часто 20–50 итераций дают результат, близкий к полному перебору, в разы быстрее.
- **best_params_** — оптимальные гиперпараметры по CV, но финальное качество всегда проверять на отдельном test, который не участвовал в поиске.
- **best_estimator_** — уже обученная модель с best_params_ на всём train; использовать для предсказания, не переобучать заново.
- **CV в поиске** — каждая комбинация оценивается на k фолдах, итоговый score — среднее; это защищает от случайно удачного разбиения.

# 51. Error Analysis

## Зачем это нужно

Метрики говорят вам, насколько хороша модель. Error Analysis говорит, почему она ошибается и что делать дальше. Без анализа ошибок разработчик не знает, куда направить усилия: собирать данные, менять признаки или улучшать алгоритм.

## Простая интуиция

Представьте учителя, проверяющего контрольные. Он мог бы просто поставить оценки и двигаться дальше. Но хороший учитель смотрит на ошибки: «10 студентов не поняли задачи на дроби, 5 — на проценты». Зная паттерн ошибок, он знает, что объяснить заново. Так же работает error analysis в ML.

## Что это такое

- **Error Analysis** — ручной или автоматический просмотр неправильных предсказаний для поиска паттернов
- **False Positives (FP)** — модель предсказала 1, а было 0 (ложная тревога)
- **False Negatives (FN)** — модель предсказала 0, а было 1 (пропущенный случай)
- **Confusion Matrix** — матрица ошибок, показывающая все 4 типа предсказаний
- **Паттерны ошибок** — категории или характеристики объектов, на которых модель систематически ошибается

## Как это работает

```python
y_pred = model.predict(X_test)  # предсказания модели
# y_test — реальные метки тестовой выборки

# Все ошибки
errors_mask = (y_pred != y_test)
print(f"Ошибок: {errors_mask.sum()} из {len(y_test)}")

# Разделить на типы
fp_mask = (y_pred == 1) & (y_test == 0)  # ложная тревога
fn_mask = (y_pred == 0) & (y_test == 1)  # пропущенный случай
print(f"FP: {fp_mask.sum()}, FN: {fn_mask.sum()}")

# Следующий шаг: изучить X_test[errors_mask]
# На каких объектах модель ошибается систематически?
```

## Простой пример

Классификатор спама на 2 000 писем: общая accuracy 94%, кажется хорошим результатом. Error Analysis показывает: из 120 ошибок — 90 FN (спам помечен как нормальное письмо). Просмотр этих 90 писем выявляет паттерн: все они с темой «Вы выиграли...» на испанском языке. Модель обучалась только на английских письмах. Решение: добавить 200 испаноязычных спам-примеров. После дообучения FN снизились с 90 до 11.

## Практика

1. Модель классификации email получила accuracy = 94%. Команда довольна. Error Analysis показывает: 80% ошибок — это FN. Как один этот факт меняет план улучшений по сравнению с тем, если бы вы смотрели только на accuracy?
2. Вы проанализировали 150 ошибок классификатора изображений: 100 из них — изображения при плохом освещении, остальные 50 — случайный набор разных сцен. Что говорит каждая группа и какие разные действия они требуют?
3. Вы обнаружили, что модель кредитного скоринга систематически ошибается на клиентах старше 70 лет. Что это говорит о данных и модели и каков следующий шаг?
4. Как разделение ошибок на FP и FN помогает расставить приоритеты в задаче медицинской диагностики, где цена FN несопоставимо выше цены FP?
5. Как Error Analysis помогает отличить: модель переобучилась на одних подгруппах или в данных принципиально отсутствует нужная информация?

## Краткий итог

- Error Analysis — самый прямой путь к следующему улучшению: ошибки подсказывают, чего модель не умеет
- Разделяйте ошибки по типам: False Positives и False Negatives имеют разную цену
- Систематические ошибки на подгруппах — сигнал о нужных новых признаках
- Случайные ошибки без паттернов — возможно, вы достигли предела данных

## Ключевые термины урока

- **Error Analysis** — анализируй не агрегированную метрику, а конкретные ошибки; цель — найти общий признак у ошибочных объектов и превратить его в улучшение (признак, данные, правило).
- **False Positives (FP)** — модель кричит «тревога» там, где её нет; высокая цена FP → нужно повышать precision (порог вверх). В спаме: нормальное письмо попало в спам.
- **False Negatives (FN)** — модель молчит там, где должна сработать; высокая цена FN → нужно повышать recall (порог вниз). В медицине: больной пропущен как здоровый.
- **Паттерны ошибок** — если ошибки систематические (один язык, одна подгруппа, один диапазон значений) — это сигнал нехватки данных или признаков. Случайные ошибки без паттерна — вы достигли предела данных.

# 52. SHAP и интерпретируемость

## Зачем это нужно

Модель выдала отказ в кредите. Клиент спрашивает: «Почему?». Compliance требует объяснение по GDPR. Менеджер хочет убедиться, что модель не дискриминирует по полу.

Accuracy 91% — это хорошо. Но если ты не можешь объяснить, почему модель приняла конкретное решение, ты не можешь ей доверять, не можешь её дебаггить и не можешь использовать в регулируемых отраслях.

## Простая интуиция

Представь двух следователей. Один изучил тысячи дел и говорит: «В среднем я больше всего обращаю внимание на возраст и историю нарушений подозреваемого». Это полезная статистика, но она не объясняет конкретное решение. Второй берёт конкретное дело Иванова и говорит: «Его возраст добавил +15 к вердикту, доход снизил на −8, отсутствие судимости снизило на −20». Это объяснение одного решения — и именно оно нужно, когда клиент спрашивает «почему мне отказали?»

## Что это такое

**Интерпретируемость** — способность объяснить, почему модель приняла то или иное решение.

**Feature importance** — глобальная метрика: какие признаки в среднем влияют на предсказания модели. Встроена в деревья и градиентный бустинг.

**SHAP (SHapley Additive exPlanations)** — метод, который для каждого отдельного предсказания показывает вклад каждого признака: насколько он сдвинул результат вверх или вниз относительно среднего предсказания модели.

Идея пришла из **теории кооперативных игр**: каждый признак — «игрок» в команде. SHAP вычисляет справедливый вклад каждого игрока, перебирая все возможные «коалиции» (подмножества признаков) — это математически обоснованный вклад, а не эвристика.

SHAP работает с любой моделью — от линейной регрессии до деревьев и градиентного бустинга.

## Как это работает

### SHAP-значение

Для каждого объекта и каждого признака SHAP вычисляет: «Насколько изменилось бы предсказание, если бы у этого объекта не было этого признака?»

Результат — число со знаком:
- **положительное** — признак увеличил предсказание (сдвинул к «да», «выше», «1»)
- **отрицательное** — признак уменьшил предсказание (сдвинул к «нет», «ниже», «0»)

Сумма всех SHAP-значений для одного объекта равна разнице между его предсказанием и средним предсказанием по всему датасету.

### Два уровня объяснений

**Локальное объяснение** — почему модель приняла конкретное решение для конкретного объекта. Пример для заявки на кредит:

```
Базовое предсказание (среднее): 0.42

age = 52         → −0.15  (возраст снижает шанс)
income = 180k    → +0.28  (высокий доход повышает)
debt_ratio = 0.6 → −0.19  (высокий долг снижает)
credit_hist = 5y → +0.11  (хорошая история повышает)

Итоговое предсказание: 0.47
```

**Глобальное объяснение** — на большой выборке SHAP показывает, какие признаки в целом важны для модели (аналог feature importance, но честнее).

### Что ещё можно обнаружить

SHAP помогает поймать неожиданные паттерны:
- модель использует признак «почтовый индекс» как прокси для этнического происхождения
- модель опирается на признак, который в production недоступен
- данные утекают через признак, который создан из target

## Простой пример

Банк обучил модель оценки кредитного риска. Accuracy на тесте — 88%. Compliance-офицер спрашивает: «Не используете ли вы пол клиента как признак?»

Напрямую — нет, колонка `gender` удалена. Но SHAP-анализ показал: признак `job_type = "maternity_leave"` имеет большой отрицательный вклад. Это де-факто гендерный признак — непрямая дискриминация. Без SHAP это не заметили бы.

После удаления этого признака accuracy упала до 86%, но модель перестала дискриминировать. Compliance принял.

## Практика

1. Вы объясняете менеджеру, почему модель отказала конкретному клиенту в кредите. У вас есть feature importance модели и SHAP-значения для этого клиента. Что именно вы покажете менеджеру — и почему feature importance здесь недостаточно?
2. SHAP-значение признака `age` для конкретного клиента равно −0.12. Что это означает? В какую сторону признак сдвинул предсказание?
3. Модель отказала в кредите. SHAP показывает: `income` → +0.18, `debt_ratio` → −0.31, `employment_years` → −0.05. Какой признак сильнее всего повлиял на отказ? Как объяснить это клиенту?
4. Почему интерпретируемость важна не только для «объяснения клиенту», но и для отладки самой модели?
5. Мини-кейс: модель предсказывает отток сотрудников. Глобальный SHAP показывает, что признак `employee_id` входит в топ-3 важных. Это подозрительно. Что это может означать и как исправить?

## Краткий итог

- Интерпретируемость — требование для моделей, влияющих на людей: медицина, финансы, HR
- Feature importance отвечает «что важно в среднем», SHAP — «почему именно это решение для этого объекта»
- SHAP помогает не только объяснять клиентам, но и находить баги: утечки данных, косвенную дискриминацию
- Если признак попал в топ важных, но это подозрительно — SHAP-анализ покажет, что происходит на самом деле
- Локальное объяснение — для одного объекта; глобальное — агрегат по всей выборке

## Ключевые термины урока

- **Интерпретируемость** — требование для моделей в медицине, финансах, HR: без объяснений нельзя пройти compliance, обнаружить дискриминацию или найти баг типа «модель использует недоступный признак».
- **Feature importance** — глобальная статистика по всему датасету; не скажет, почему отказано конкретному клиенту. В отличие от SHAP, не имеет знака и не учитывает контекст объекта.
- **SHAP** — сумма всех SHAP-значений объекта = его предсказание минус среднее по датасету; математически обоснован теорией игр Шепли. Работает с любой моделью (не только деревьями).
- **Локальное объяснение** — SHAP-значения для одного объекта; используется для объяснения клиенту и для отладки конкретных предсказаний.
- **Глобальное объяснение** — агрегирование SHAP по всей выборке; честнее feature importance, потому что учитывает направление и взаимодействия признаков.

# 53. Обучение без учителя

## Зачем это нужно

В реальных задачах разметка данных — это дорого и долго. Иногда меток просто нет: вы хотите понять структуру данных, найти группы клиентов или обнаружить аномалии. Именно здесь применяется обучение без учителя — один из трёх фундаментальных подходов в ML.

## Простая интуиция

Представьте, что вы разбираете шкаф с вещами и раскладываете их по стопкам: зимнее, летнее, спортивное. Никто не говорил вам, как разложить — вы сами нашли похожие вещи и сгруппировали их. Это и есть обучение без учителя: найти структуру там, где нет заранее заданных ответов.

## Что это такое

- **Unsupervised learning** — класс алгоритмов ML, работающих с данными без меток
- Основные задачи:
  - **Кластеризация** — разбить объекты на похожие группы по сходству признаков
  - **Снижение размерности** — сжать данные, сохранив их структуру в меньшем числе измерений
  - **Обнаружение аномалий** — найти объекты, сильно отличающиеся от остальных
  - **Генеративные модели** — научиться генерировать новые похожие объекты
- В отличие от supervised learning, нет «правильного ответа» для проверки

## Как это работает

Unsupervised learning не имеет единого алгоритма — это семейство подходов с разной механикой:

- **Кластеризация** — алгоритм ищет точки, которые «близки» друг к другу в пространстве признаков, и группирует их вместе. Что считать «близким» — определяется метрикой расстояния (евклидово, косинусное и др.)
- **Снижение размерности** — алгоритм находит новые оси в пространстве данных, вдоль которых данные наиболее «разбросаны», и проецирует на них исходные точки. Исходные признаки при этом заменяются новыми (меньшим числом)
- **Обнаружение аномалий** — алгоритм строит модель «нормального» поведения по обучающим данным. Новые объекты, которые плохо вписываются в эту модель, получают высокий аномальный скор

Во всех случаях у алгоритма нет целевого значения y для обучения — он работает только с X.

## Простой пример

Интернет-магазин накопил данные о 50 000 покупателях: частота покупок, средний чек, категории товаров — но без каких-либо меток. Запустили алгоритм кластеризации с числом групп = 3 и получили три сегмента: «редкие покупатели с малым чеком» (32 000 человек), «регулярные покупатели среднего чека» (14 000), «VIP с высокой частотой и большим чеком» (4 000). Метки никто не ставил — алгоритм нашёл структуру сам. Теперь для каждой группы можно запустить разные маркетинговые кампании.

## Практика

1. Коллега запустил алгоритм кластеризации и получил 4 чётких кластера. Он говорит: «Всё работает хорошо». Почему это утверждение неполное и что нужно проверить дополнительно при оценке качества без учителя?
2. Маркетинговая команда хочет разделить пользователей на сегменты для персонализации рассылок. Какой тип задачи это — кластеризация, снижение размерности или обнаружение аномалий? Что будет результатом и как его использовать?
3. У вас миллион транзакций, из которых лишь несколько помечены как мошеннические. Какой подход — supervised или unsupervised — выбрать и почему?
4. Почему кластеризацию нельзя напрямую использовать вместо классификации, даже если кластеры визуально хорошо разделены?
5. Почему нормализация особенно важна для алгоритмов кластеризации и что произойдёт без неё?

## Краткий итог

- Unsupervised learning работает с данными без меток, ища скрытую структуру
- Основные задачи: кластеризация, снижение размерности, обнаружение аномалий
- Сложно оценивать качество без «правильных ответов»
- Часто используется как вспомогательный инструмент в supervised пайплайне

## Ключевые термины урока

- **Unsupervised learning** — в отличие от supervised, нет единственно верного ответа для оценки; качество приходится проверять косвенно — через внутренние метрики алгоритмов или экспертную оценку результата.
- **Кластеризация** — задача без меток; нельзя напрямую сравнить результат с «правильным» ответом. Разные алгоритмы кластеризации используют разные определения «похожести» и дают разные результаты на одних данных.
- **Снижение размерности** — используется как в EDA (визуализация структуры данных), так и в pipeline (как preprocessing для ускорения обучения и борьбы с переобучением).
- **Обнаружение аномалий** — особенность: аномалий в обучении почти нет, модель учится на «нормальных» данных и отмечает то, что не похоже на них.
- **Генеративные модели** — в отличие от дискриминативных (предсказывают класс), моделируют само распределение данных; используются для аугментации, синтеза и понимания структуры данных.

# 54. K-Means

## Зачем это нужно

Когда вам нужно разделить клиентов на сегменты, сгруппировать документы по темам или найти похожие товары — у вас нет готовых ответов, только данные. K-Means — первый алгоритм, который берётся за эту задачу: он прост, быстр и даёт результат в виде чётких групп с центрами. Понять его механику важно, чтобы знать, когда он работает хорошо, а когда стоит искать другой подход.

## Простая интуиция

Представьте, что вы расставляете 3 флага на карте городов. Каждый город «идёт» к ближайшему флагу. Потом флаги перемещаются в центры своих групп. И так по кругу, пока флаги не перестанут двигаться. Флаги — это центроиды, города — точки данных.

## Что это такое

- **K-Means** — алгоритм, разбивающий данные на K кластеров, минимизируя расстояния внутри кластеров
- **K** — число кластеров, задаётся вручную
- **Центроид** — среднее значение всех точек в кластере
- **Инерция (inertia)** — сумма квадратов расстояний от точек до их центроидов (чем меньше, тем лучше)
- **Метод локтя (Elbow method)** — подбор оптимального K по графику инерции

## Как это работает

```python
from sklearn.cluster import KMeans

kmeans = KMeans(n_clusters=4, random_state=42, n_init=10)
kmeans.fit(X)

labels = kmeans.predict(X)
print("Центроиды:", kmeans.cluster_centers_.round(2))
print("Инерция:", round(kmeans.inertia_, 1))

# Метод локтя: обучаем K-Means для K=1..10, строим inertia[K]
# Ищем "перегиб" — точку, где снижение инерции резко замедляется
# inertia[1] >> inertia[4] ≈ inertia[5]  →  оптимальное K ≈ 4
```

## Простой пример

Сеть розничных магазинов хочет сегментировать 3 000 клиентов по двум признакам: «число визитов в месяц» и «средний чек». Запускают K-Means с K=2, 3, 4, 5 и строят метод локтя. При K=4 инерция резко перестаёт падать — оптимум найден. Четыре центроида описывают сегменты: «редко/дёшево», «редко/дорого», «часто/дёшево», «часто/дорого». Это actionable сегментация для маркетинга.

## Практика

1. K-Means запущен на клиентских данных. При каждом запуске с разными `random_state` результаты немного отличаются. Что это говорит о K-Means и как параметр `n_init=10` помогает с этой проблемой?
2. Вы построили метод локтя: K=1: 5800, K=2: 3200, K=3: 2100, K=4: 1950, K=5: 1870, K=6: 1820. Какое K выбрать? Как объяснить это руководству, которое ожидало «точный ответ»?
3. Вы кластеризуете клиентов по признакам «возраст» и «сумма покупок». K-Means с K=3 выдаёт нестабильные кластеры при разных запусках. Что это говорит и как исправить?
4. Что такое инерция как метрика K-Means и почему её нельзя использовать как единственный критерий выбора модели?
5. Что произойдёт, если кластеризовать клиентов по признакам «возраст» (0–100) и «доход» (0–1 000 000) без нормализации?

## Краткий итог

- K-Means требует задать K заранее — используйте метод локтя для подбора, но помните, что «правильного» K часто нет: выбирайте из бизнес-логики
- Результат зависит от начальной инициализации — всегда используйте `n_init=10` или выше, чтобы получить устойчивый результат
- Нормализуйте данные перед запуском: K-Means чувствителен к масштабу признаков
- K-Means предполагает сферические кластеры одинакового размера — если кластеры другой формы, алгоритм даёт ненадёжные результаты

## Ключевые термины урока

- **K-Means** — предполагает сферические кластеры одинакового размера; при вытянутых или разноплотных кластерах работает плохо. Всегда выдаёт ровно K кластеров — каждая точка обязана попасть в один из них.
- **Центроид** — среднее всех точек кластера; пересчитывается на каждой итерации до сходимости. Если данные изменятся, центроид сдвинется — алгоритм нестабилен при добавлении новых точек.
- **Инерция (inertia)** — монотонно убывает при росте K; нельзя использовать как единственный критерий (K=N всегда даст 0). Используется только в паре с методом локтя.
- **Метод локтя (Elbow method)** — ищет K, где инерция резко «перегибается»; на практике перегиб часто размыт, и метод даёт ориентир, а не точный ответ.

# 55. DBSCAN

## Зачем это нужно

K-Means требует задавать K заранее и плохо работает с кластерами нестандартных форм. DBSCAN решает обе проблемы: автоматически определяет число кластеров и умеет находить кластеры произвольной формы. Плюс — выявляет выбросы как отдельный класс.

## Простая интуиция

Представьте, что вы идёте по городу и собираете людей в группы. Правило простое: если рядом стоит достаточно людей — это плотная зона, часть кластера. Одиночки в пустынных местах — это выбросы. Вы не знаете заранее, сколько будет групп — они формируются сами по плотности толпы.

## Что это такое

- **DBSCAN** (Density-Based Spatial Clustering of Applications with Noise) — алгоритм кластеризации на основе плотности
- **eps** — радиус окрестности: насколько близко должны быть точки
- **min_samples** — минимальное количество точек в радиусе eps для формирования плотной зоны
- **Основные точки** (core points) — точки с достаточным числом соседей
- **Граничные точки** — в eps-окрестности основной точки, но сами не основные
- **Шум (noise)** — точки, не принадлежащие ни одному кластеру (метка -1)

## Как это работает

```python
from sklearn.cluster import DBSCAN
import numpy as np

# DBSCAN находит кластеры произвольной формы без заданного K
dbscan = DBSCAN(eps=0.3, min_samples=5)
labels = dbscan.fit_predict(X)

# -1 = шум (outlier), остальные — номер кластера
n_clusters = len(set(labels)) - (1 if -1 in labels else 0)
print(f"Кластеров: {n_clusters}, шумовых точек: {(labels == -1).sum()}")

# eps слишком мало → всё шум; eps слишком велико → один большой кластер
```

## Простой пример

Логистическая компания анализирует GPS-треки 10 000 доставок по городу. K-Means с K=5 делит город на 5 географических зон, но маршруты доставки имеют произвольные формы вдоль улиц. DBSCAN с eps=200м и min_samples=10 находит 12 плотных зон доставки (жилые кварталы, бизнес-центры, промзоны) и помечает 340 точек как шум — это нетипичные адреса в промышленных районах. Именно шумовые точки требуют отдельного планирования маршрута.

## Практика

1. Вы запускаете DBSCAN и видите: при одних настройках 95% точек помечается как шум, при других — все точки оказываются в одном кластере. Какой из двух параметров вы меняли в каждом случае и в какую сторону?
2. Из урока «K-Means» мы знаем, что каждая точка обязана попасть в кластер. DBSCAN вернул метку -1 для 12% точек датасета транзакций. Это проблема или полезный сигнал? Что вы сделаете с этими точками дальше?
3. Вы кластеризуете GPS-треки клиентов в магазине. Маршруты имеют произвольную форму. Почему K-Means плохо подходит и что DBSCAN делает принципиально иначе?
4. Почему ограничение K-Means (сферические кластеры одинакового размера) особенно критично для задачи обнаружения аномальных маршрутов и как DBSCAN решает её иначе?
5. Как DBSCAN естественным образом решает задачу выявления выбросов, в отличие от статистических методов Z-score и IQR?

## Краткий итог

- DBSCAN находит кластеры произвольной формы на основе плотности точек
- Параметры eps и min_samples нужно подбирать под данные
- Точки с метками -1 — выбросы (шум)
- Не требует задавать K заранее, но плохо масштабируется на большие датасеты

## Ключевые термины урока

- **DBSCAN** — в отличие от K-Means, не требует задавать K и находит кластеры произвольной формы; минус — плохо масштабируется на миллионы объектов (O(n log n) в лучшем случае).
- **eps** — слишком малое: почти всё становится шумом; слишком большое: всё сливается в один кластер. Подбирают по графику k-distance (расстояние до k-го соседа по всем точкам).
- **min_samples** — чем выше, тем строже определение «плотной зоны»; рекомендуется ≥ числу признаков + 1.
- **Шум (noise, метка -1)** — в DBSCAN это не «мусор»: шумовые точки часто и есть ценные аномалии, которые нужно исследовать отдельно. K-Means аналога не имеет — каждая точка обязана попасть в кластер.
- **Плотность** — основа алгоритма; поэтому DBSCAN плохо работает на данных с очень разной плотностью кластеров (алгоритм HDBSCAN решает эту проблему).

# 56. Снижение размерности

## Зачем это нужно

Реальные датасеты часто имеют сотни и тысячи признаков. Это проблема: многие признаки коррелируют, модели переобучаются, визуализация невозможна. Снижение размерности помогает сжать данные, убрать шум и понять их структуру.

## Простая интуиция

Представьте, что вы фотографируете 3D-объект. Фотография — это 2D-проекция 3D-объекта. Вы теряете одно измерение, но сохраняете главную информацию о форме. Снижение размерности делает то же самое с данными: проецирует их из многомерного пространства в пространство меньшей размерности.

## Что это такое

- **Проклятие размерности** — в высоких измерениях данные становятся разреженными, расстояния теряют смысл, модели нуждаются в экспоненциально больше данных
- **Линейные методы** — ищут линейные комбинации признаков; создают устойчивую трансформацию, которую можно применить к новым данным
- **Нелинейные методы** — сохраняют нелинейную структуру данных; хорошо подходят для визуализации, но не для применения к новым объектам в production
- **Автоэнкодеры** — нейросети, сжимающие и восстанавливающие данные
- Цели снижения размерности: визуализация, ускорение обучения, борьба с переобучением, сжатие

## Как это работает

```python
from sklearn.decomposition import PCA
from sklearn.preprocessing import StandardScaler
import numpy as np

# Нормализация обязательна перед снижением размерности!
scaler = StandardScaler()
X_scaled = scaler.fit_transform(X_train)  # fit только на train

pca = PCA()
pca.fit(X_scaled)

# Накопленная объяснённая дисперсия — сколько компонент нужно?
cumsum = np.cumsum(pca.explained_variance_ratio_)
n_95 = np.searchsorted(cumsum, 0.95) + 1
print(f"Для 95% дисперсии: {n_95} компонент из {X.shape[1]}")
```

## Простой пример

Датасет из 800 пациентов с результатами 200 медицинских анализов. Половина признаков — разные измерения одних и тех же показателей крови (высокая корреляция). PCA показывает: первые 15 компонент объясняют 95% дисперсии. Снижение с 200 до 15 признаков ускоряет обучение модели в 10 раз, при этом качество предсказания падает с 87.3% до 86.8% — незначительная потеря. Плюс визуализация первых 2 компонент показывает явное разделение здоровых пациентов и больных.

## Практика

1. У вас датасет: 10 000 объектов, 2 признака — точность k-NN = 89%. Коллега добавляет 498 новых признаков (итого 500), и точность падает до 61%. Как называется этот эффект, почему он возникает и как снижение размерности помогает с ним справиться?
2. Вы снизили размерность данных с 500 до 2 с помощью нелинейного метода и обучили модель классификации. На тестовой выборке она показывает 91%. Вы пытаетесь запустить её на новых данных в production — и не можете применить ту же трансформацию. В чём принципиальное ограничение нелинейного метода снижения размерности и какой класс методов этой проблемы не имеет?
3. У вас датасет: 500 признаков, 1000 объектов. PCA показывает, что первые 20 компонент объясняют 95% дисперсии. Что это говорит о данных и как вы поступите дальше?
4. Как снижение размерности через PCA может служить формой регуляризации и помогать в борьбе с переобучением?
5. Почему нормализация особенно критична именно перед PCA и что произойдёт, если пропустить этот шаг?

## Краткий итог

- Снижение размерности борется с проклятием размерности и помогает визуализировать данные
- Линейные методы (подробнее — в уроке «PCA простыми словами») создают переиспользуемую трансформацию: её можно применить к новым объектам в production
- Нелинейные методы (подробнее — в уроке «t-SNE и UMAP») хорошо визуализируют структуру, но не подходят как preprocessing: применить их к новым данным корректно нельзя
- Нормализация перед снижением размерности обязательна: признаки с разным масштабом исказят результат

## Ключевые термины урока

- **Проклятие размерности** — при числе признаков p >> числа объектов n все точки становятся «одинаково далеко» друг от друга; расстояния теряют смысл. Алгоритмы, опирающиеся на метрику расстояния, деградируют первыми; деревья устойчивее, но тоже страдают от шумовых признаков.
- **Линейные методы снижения размерности** — находят новые оси как линейные комбинации исходных признаков. Главное свойство: трансформацию можно зафиксировать и применить к новым данным — это делает их пригодными для production pipeline.
- **Нелинейные методы снижения размерности** — сохраняют нелинейные зависимости; отлично показывают структуру данных при визуализации. Ограничение: результат зависит от всех точек сразу, добавление нового объекта меняет всю проекцию.
- **Нормализация обязательна** — методы снижения размерности чувствительны к масштабу; признак с диапазоном 1–1000 доминирует над признаком 0–1. StandardScaler применяется до любого метода снижения размерности.

# 57. PCA простыми словами

## Зачем это нужно

У вас датасет с 500 признаками. Многие из них коррелируют — по сути это одна и та же информация, переупакованная в разные колонки. Модель переобучается, обучение занимает минуты. PCA решает это: находит новые оси, вдоль которых данные максимально «разбросаны», и позволяет выбросить лишние измерения без значительной потери информации. Это не просто ускорение — иногда удаление шумовых компонент улучшает качество модели.

## Простая интуиция

Представьте тени от предметов. Если поставить лампу под правильным углом, тень от 3D-объекта сохранит максимум информации о его форме. PCA находит такой «угол освещения» для ваших данных — направление, в котором данные наиболее «разбросаны», и проецирует их туда. При этом новые оси — не исходные колонки, а смеси из них. Вернуться к оригиналу точно уже нельзя.

## Что это такое

- **PCA** — метод, находящий линейные комбинации признаков (главные компоненты) с максимальной дисперсией
- **Главные компоненты (PC)** — новые оси, ортогональные друг другу, упорядоченные по убыванию объяснённой дисперсии. **Ортогональные** — значит независимые (угол 90°): знание значения PC1 ничего не говорит о PC2
- **Explained variance ratio** — доля общего разброса данных, захваченная каждой компонентой. Если PC1=0.45, значит 45% всего разнообразия данных объясняется первой компонентой
- **n_components** — сколько компонент оставить
- PCA — это SVD (Singular Value Decomposition) матрицы данных

## Как это работает

```python
from sklearn.decomposition import PCA
from sklearn.preprocessing import StandardScaler

# Обязательно: нормализуем ПЕРЕД PCA (fit только на train!)
scaler = StandardScaler()
X_scaled = scaler.fit_transform(X_train)

# Вариант 1: задать число компонент вручную
pca = PCA(n_components=2)
X_pca = pca.fit_transform(X_scaled)
print(f"Объяснённая дисперсия: {pca.explained_variance_ratio_.round(3)}")
print(f"Итого: {pca.explained_variance_ratio_.sum():.1%}")

# Вариант 2: задать долю сохранённой дисперсии
pca_95 = PCA(n_components=0.95)  # автовыбор числа компонент
X_95 = pca_95.fit_transform(X_scaled)
print(f"Компонент для 95%: {pca_95.n_components_}")
```

## Простой пример

Датасет геномных данных: 1 200 пациентов, 1 000 признаков (уровни экспрессии генов). PC1 объясняет 28% дисперсии, PC2 — 15%, PC3 — 9%. График первых двух компонент показывает три чётких кластера — позже оказывается, что они соответствуют трём подтипам заболевания, ещё не известным врачам. Вместо 1 000 генов в модель передают 40 компонент (93% дисперсии), обучение занимает секунды вместо минут.

## Практика

1. После PCA первые 5 компонент объясняют 80% дисперсии, следующие 5 — ещё 5%. Сколько компонент взять для модели — 5, 10 или все? Что произойдёт с качеством и со скоростью при каждом выборе?
2. Ваш коллега обучает PCA на всём датасете (train + test), затем разбивает на train/test и обучает модель. Метрики выглядят отлично — 94%. Почему эти результаты нельзя доверять и какая ошибка здесь допущена?
3. Вы применяете PCA к датасету вин (13 признаков): PC1+PC2 объясняют 55% дисперсии. Стоит ли использовать только 2 компоненты или нужно больше? Как решить?
4. Коллега предлагает снизить 300 признаков до 3 с помощью t-SNE, обучить на них модель и задеплоить. Вы принимаете или отклоняете? Аргументируйте и предложите альтернативу.
5. Почему PCA должен быть включён в Pipeline, а не применяться отдельно до вызова fit/predict?

## Краткий итог

- PCA находит ортогональные направления максимальной дисперсии в данных
- Обязательно нормализуйте данные перед PCA
- Обучайте PCA только на train, затем применяйте трансформацию к train и test
- Выбор n_components через explained_variance_ratio_: обычно 90-95% дисперсии достаточно

## Ключевые термины урока

- **PCA** — создаёт НОВЫЕ признаки (PC1, PC2...) как линейные комбинации исходных; не выбирает исходные признаки, а смешивает их. Следствие: интерпретируемость теряется — «PC1 = 0.4·age + 0.3·income − 0.2·debt» нечитаемо.
- **Главные компоненты (PC)** — ортогональны (независимы под углом 90°); PC1 объясняет наибольшую долю дисперсии, PC2 — наибольшую из оставшихся. Ортогональность = отсутствие корреляции между компонентами.
- **Explained variance ratio** — доля разброса данных, объяснённая каждой компонентой. Кумулятивное 90–95% — практический порог для выбора n_components; ниже = потеря информации, выше = сохраняем шум.
- **fit только на train** — pca.fit(X_train) → параметры компонент вычислены; pca.transform(X_test) применяет те же параметры. Никогда pca.fit(X_test) — test заразит компоненты.

# 58. t-SNE и UMAP

## Зачем это нужно

PCA линеен и не всегда хорошо разделяет сложные структуры данных. t-SNE и UMAP — нелинейные методы, созданные специально для визуализации высокоразмерных данных. Они помогают увидеть кластеры, паттерны и аномалии, которые PCA скрывает.

## Простая интуиция

Представьте карту метро. Реальные расстояния между станциями не важны — важно, какие станции находятся рядом по линиям. Методы нелинейной визуализации делают то же самое с данными: сохраняют «кто рядом с кем» в исходном пространстве, пренебрегая глобальными расстояниями.

## Что это такое

- **t-SNE** (t-distributed Stochastic Neighbor Embedding) — минимизирует расстояния между похожими точками в 2D
- **UMAP** (Uniform Manifold Approximation and Projection) — более быстрая и масштабируемая альтернатива t-SNE
- **perplexity** — параметр t-SNE, контролирующий «количество соседей» (обычно 5-50)
- **n_neighbors** — параметр UMAP, аналогичный perplexity
- Оба метода **недетерминированы** и не создают переиспользуемой трансформации для новых данных

## Как это работает

```python
from sklearn.manifold import TSNE
from sklearn.preprocessing import StandardScaler

scaler = StandardScaler()
X_scaled = scaler.fit_transform(X)

# t-SNE: нелинейное сжатие до 2D для визуализации
tsne = TSNE(n_components=2, perplexity=30, random_state=42)
X_2d = tsne.fit_transform(X_scaled)
print(f"{X.shape} → {X_2d.shape}")

# UMAP: быстрее и лучше масштабируется (pip install umap-learn)
# X_2d = umap.UMAP(n_components=2, random_state=42).fit_transform(X_scaled)

# Внимание: оба метода не создают переиспользуемой трансформации для новых данных!
```

## Простой пример

Датасет из 5 000 изображений рукописных цифр (0–9), каждое — 784 пикселя. PCA до 2 компонент — цифры перемешаны, визуально не разделить. t-SNE (perplexity=30) за 3 минуты формирует 10 чётких кластеров на плоскости — каждая цифра своя группа. До запуска любого классификатора это сразу показывает: данные разделимы, задача реалистична. UMAP даёт похожий результат за 40 секунд вместо 3 минут.

## Практика

1. Вы запустили t-SNE дважды на одних и тех же данных, но с разными random_state — картинки получились совершенно разные. Это баг или норма? Что это говорит о надёжности t-SNE-визуализации как доказательства?
2. Коллега смотрит на t-SNE-карту и говорит: «Кластеры A и B далеко друг от друга на плоскости — значит они очень далеко в исходном пространстве». Прав ли он? Что на t-SNE можно, а что нельзя интерпретировать?
3. Вы визуализировали датасет с помощью t-SNE и видите 5 чётких кластеров. Можете ли вы утверждать, что в данных точно 5 классов? Почему да или нет?
4. Из урока «PCA» мы знаем, что pca.fit(X_train) создаёт устойчивую трансформацию для новых объектов. Почему для t-SNE это невозможно и что произойдёт, если попытаться добавить один новый объект в уже готовую t-SNE-проекцию?
5. Как визуализация t-SNE может помочь понять, подходит ли K-Means для конкретного датасета, ещё до запуска алгоритма кластеризации?

## Краткий итог

- t-SNE и UMAP раскрывают скрытые кластеры, которые линейный PCA не покажет: используйте для понимания данных перед моделированием
- Используйте для EDA, не для предобработки: применить их к новым данным в production нельзя
- UMAP быстрее t-SNE и лучше масштабируется на большие датасеты
- Всегда фиксируйте random_state для воспроизводимости, иначе каждый запуск даёт разную картинку

## Ключевые термины урока

- **t-SNE** — оптимизирует близость соседей в 2D; глобальная структура (расстояния между кластерами) не сохраняется. Два кластера рядом на t-SNE могут быть далеко в исходном пространстве — нельзя интерпретировать расстояния между кластерами.
- **UMAP** — лучше сохраняет глобальную структуру, быстрее (O(n) vs O(n²) у t-SNE), есть .transform() — но всё равно не для Pipeline: нелинейный, нестабильный при добавлении новых точек.
- **perplexity** — «эффективное число соседей» для t-SNE; слишком малая → точки разлетаются; слишком большая → всё сливается в один кластер. Обычно 5–50; подбирают визуально.
- **Запрет на preprocessing** — t-SNE и UMAP нельзя использовать как шаг Pipeline: они меняются при добавлении одной точки, нет стабильного transform для production. Только EDA/визуализация.

# 59. Поиск аномалий

## Зачем это нужно

Аномалии встречаются везде: мошеннические транзакции, сбои оборудования, ошибки в данных, кибератаки. Часто у нас нет размеченных примеров аномалий — только нормальные данные. Поиск аномалий без разметки — задача unsupervised learning с огромным практическим значением.

## Простая интуиция

Представьте охранника в толпе. Большинство людей ходят похожими маршрутами. Человек, который бегает зигзагами, стоит подозрительно долго в одном месте или появляется в неожиданное время — аномалия. Охранник выучил «нормальное» поведение и замечает отклонения.

## Что это такое

- **Аномалия (выброс, outlier)** — объект, значительно отличающийся от остальных
- **Типы аномалий**:
  - *Точечные* — отдельная точка далеко от основного облака
  - *Контекстуальные* — нормальное значение в ненормальном контексте (жара зимой)
  - *Коллективные* — группа точек аномальна вместе
- **Статистические методы** — Z-score, IQR: простые пороговые правила, работают по одному признаку
- **ML методы** — алгоритмы, способные учесть несколько признаков одновременно и найти аномалии, которые статистические методы пропускают
- **Задача**: обычно есть только нормальные данные, аномалии — редкие или отсутствуют в обучении

## Как это работает

```python
import numpy as np
from sklearn.ensemble import IsolationForest

# Подход 1: статистика (Z-score) — только для одномерных данных
z_scores = np.abs((X - X.mean()) / X.std())
print(f"Z-score аномалий: {(z_scores > 3).sum()}")

# IQR — ещё один простой одномерный метод
Q1, Q3 = np.percentile(X, [25, 75])
outliers_iqr = ((X < Q1 - 1.5*(Q3-Q1)) | (X > Q3 + 1.5*(Q3-Q1))).sum()
print(f"IQR аномалий: {outliers_iqr}")

# Подход 2: ML (Isolation Forest) — работает в многомерных данных
iso = IsolationForest(contamination=0.02, random_state=42)
labels = iso.fit_predict(X_multi)   # -1 = аномалия, 1 = норма
print(f"Isolation Forest аномалий: {(labels == -1).sum()}")
```

## Простой пример

Банк анализирует 500 000 транзакций по 8 признакам: сумма, время суток, город, тип терминала, частота использования карты и др. Z-score по каждому признаку отдельно пропускает транзакцию на 1 500 рублей в 3:00 ночи в новом городе — каждый признак по отдельности выглядит нормально. ML-метод видит всю картину целиком: сочетание «ночь + новый город + нетипичный магазин» — аномалия. Выявлено 4 200 подозрительных транзакций (0.84%), направлено на ручную проверку.

## Практика

1. Банк обнаружил 200 транзакций на 100 рублей в 3:00 ночи с одного IP. По Z-score каждый признак выглядит нормально. Какой тип аномалии это описывает и почему Z-score её не поймал?
2. У вас 2 миллиона транзакций. Аномальных примеров в разметке нет, но вы подозреваете ~0.5% мошенничества. Почему supervised классификатор здесь не поможет и какой метод взять вместо него?
3. Вы внедряете систему обнаружения мошенничества и не имеете ни одного помеченного примера. Как подойти к задаче и какие методы из этого урока применимы?
4. Чем задача обнаружения аномалий в production принципиально шире, чем просто удаление выбросов при feature engineering?
5. Почему для многомерных данных (10+ признаков) Z-score и IQR дают ненадёжные результаты, даже если применять их к каждому признаку отдельно? Что принципиально умеют ML-методы обнаружения аномалий, чего не умеют статистические?

## Краткий итог

- Аномалии — объекты, значительно отличающиеся от остальных данных; чаще всего в обучающей выборке их нет
- Статистические методы (Z-score, IQR) просты, но работают только по одному признаку — пропускают многомерные аномалии
- ML методы работают с несколькими признаками одновременно и находят аномалии, невидимые одномерным методам
- Ключевой параметр любого ML-детектора аномалий: contamination — ожидаемая доля аномалий в данных

## Ключевые термины урока

- **Аномалия** — объект без метки «аномалия» при обучении; модель учится на «нормальных» данных и отмечает то, что на них не похоже. В отличие от supervised классификации, нет y=1 для аномалий.
- **Z-score** — работает только если признак нормально распределён и только по одному признаку. Порог |z| > 3 ловит ~0.3% нормальных точек как ложные аномалии. При тяжёлых хвостах — ненадёжен.
- **IQR** — устойчив к распределению (не предполагает нормальность), но тоже одномерный. Подходит для feature engineering (удаление выбросов); для detection в production — слаб.
- **ML методы обнаружения аномалий** — в отличие от Z-score и IQR, работают с несколькими признаками сразу и находят аномалии, которые нормальны по каждому признаку по отдельности, но аномальны в их сочетании. Подробнее — в следующем уроке.
- **contamination** — ожидаемая доля аномалий в данных; задаётся вручную. Завысишь — много ложных тревог; занизишь — пропустишь реальные аномалии.

# 60. Isolation Forest

## Зачем это нужно

У вас миллион транзакций и ни одной метки «мошенничество». Нужно найти подозрительные — без учителя. Статистические методы пропускают аномалии, которые нормальны по каждому признаку отдельно, но аномальны в сочетании. Isolation Forest решает это: он не учится предсказывать класс, а ищет объекты, которые «легко отрезать» от остальных случайными разрезами. Именно это делает его одним из стандартных инструментов обнаружения аномалий.

## Простая интуиция

Представьте игру: вы произвольно разрезаете прямоугольник вертикальными и горизонтальными линиями. Чтобы изолировать одиночную точку-аномалию вдали от основного облака, нужно мало разрезов. Чтобы изолировать точку внутри плотного облака — много разрезов. Аномалии «изолируются» быстрее — в этом суть алгоритма.

## Что это такое

- **Isolation Forest** — ансамбль случайных деревьев, каждое из которых случайно делит данные
- **Путь изоляции** — количество разрезов, нужных чтобы «поймать» объект в одиночестве
- Аномалии имеют **короткий путь изоляции**: их легко отделить от остальных
- **predict()** — бинарная метка: `-1` = аномалия, `+1` = нормальный объект
- **Anomaly score** — непрерывная оценка через `score_samples()`: значения ближе к 0.5 = норма, более отрицательные = аномалия. В коде используется `-score_samples()`, чтобы перевернуть знак: выше = аномальнее
- **contamination** — гиперпараметр, задающий ожидаемую долю аномалий

## Как это работает

```python
from sklearn.ensemble import IsolationForest

iso_forest = IsolationForest(
    n_estimators=100,    # деревьев в ансамбле
    contamination=0.05,  # ожидаемая доля аномалий
    random_state=42
)
iso_forest.fit(X_train)

# -1 = аномалия, 1 = нормальный объект
labels = iso_forest.predict(X)
print(f"Аномалий: {(labels == -1).sum()}")

# Численный скор аномальности (чем выше — тем аномальнее)
scores = -iso_forest.score_samples(X)
```

## Простой пример

Производственная линия фиксирует 15 датчиков каждую секунду: температура, давление, вибрация и др. За неделю собрано 600 000 записей нормальной работы оборудования. Isolation Forest обучается на этих данных (без меток аномалий). При появлении нетипичной комбинации показателей — аномальный score резко растёт. За следующую неделю алгоритм выдал 340 предупреждений; 28 из них совпали с реальными поломками, произошедшими через 10–120 минут после сигнала.

## Практика

1. Isolation Forest пометил 980 объектов из 10 000 как аномалии — это почти 10%. Вы ожидали ~1%. Какой параметр скорее всего выставлен неверно, в какую сторону и как это исправить?
2. Вы хотите не просто детектировать аномалии, но и ранжировать их по «тяжести». Как использовать Isolation Forest для ранжирования, а не только для бинарной классификации? Какой метод и что возвращает?
3. Вы анализируете логи сервера: 1 миллион строк, подозреваете менее 1% атак. Как настроить Isolation Forest и как оценить его работу в отсутствие размеченных данных?
4. Random Forest и Isolation Forest оба строят ансамбль случайных деревьев. В чём принципиальная разница: как они строят деревья, что за «цель» у каждого дерева и как итоговый вывод получается из ансамбля?
5. Почему Isolation Forest лучше подходит для многомерного случая, когда объект аномален только по сочетанию нескольких признаков, а не по каждому отдельно?

## Краткий итог

- Isolation Forest не требует разметки аномалий: он ищет объекты, которые легко «отрезать» от остальных
- Правильно оценить contamination важно: завысишь — много ложных тревог, занизишь — пропустишь реальные аномалии
- Хорошо масштабируется на большие данные и высокую размерность
- Результат (-1/1) или аномальный score можно использовать как признак в downstream задачах

## Ключевые термины урока

- **Isolation Forest** — аномалию легче изолировать: нужно меньше случайных разрезов. Ключевая идея: random forest без таргета, где «лёгкость изоляции» = аномальность. Не требует меток.
- **Путь изоляции** — среднее число разрезов для изоляции точки по n_estimators деревьям. Нормальные точки требуют длинного пути (log n), аномалии — короткого (2–5 разрезов).
- **predict() vs score_samples()** — predict() возвращает бинарный результат: -1 (аномалия) или 1 (норма) через порог contamination. score_samples() — непрерывная оценка: более отрицательное = более аномальное; полезен для ранжирования аномалий по тяжести.
- **contamination** — ожидаемая доля аномалий; задаётся вручную (0.01–0.1 в большинстве задач). Завысишь → много ложных тревог; занизишь → пропустишь реальные аномалии.

# 61. Коллаборативная фильтрация

## Зачем это нужно

Netflix рекомендует тебе фильм, которого ты никогда не искал. Spotify ставит трек, который тебе понравится, хотя ты его не знаешь. Основа большинства таких систем — коллаборативная фильтрация: алгоритм не смотрит на содержание фильма или трека, он смотрит на поведение людей с похожими вкусами.

## Простая интуиция

Ты приходишь к другу с похожим вкусом в кино и спрашиваешь: «что посмотреть?» Он говорит: «только что видел вот это — тебе точно понравится». Он не описывает фильм — он опирается на то, что вы любите похожее. Именно так работает коллаборативная фильтрация: вместо одного друга — тысячи пользователей с похожим поведением.

## Что это такое

Коллаборативная фильтрация — подход, при котором система ищет пользователей с похожим поведением и рекомендует то, что им понравилось.

Два варианта:
- **User-based** — находим пользователей, похожих на целевого, и рекомендуем то, что им понравилось
- **Item-based** — находим объекты, похожие на те, что уже понравились пользователю, и рекомендуем их

## Как это работает

В основе — матрица «пользователь × объект». Строки — пользователи, столбцы — фильмы (товары, треки), ячейки — оценки. Знак `?` — то, что пользователь ещё не видел. Задача системы — предсказать, какую оценку поставил бы пользователь, и рекомендовать объекты с высокими предсказаниями.

| | Фильм A | Фильм B | Фильм C | Фильм D |
|---|---|---|---|---|
| Андрей | 5 | 4 | **?** | 1 |
| Мария  | 5 | 3 | 4 | **?** |
| Иван   | **?** | 4 | 5 | 2 |

Андрей и Мария оба высоко оценили фильм A → они похожи. Мария поставила фильму C оценку 4 → рекомендуем фильм C Андрею. Мария и Иван оценили фильмы B и C схоже → они похожи → фильм D Иван оценил на 2 → Марии его не рекомендуем.

Важно: алгоритм не знает ничего о содержании фильмов. Он видит только числа в матрице.

## Простой пример

Онлайн-кинотеатр с 80 000 пользователями и 5 000 фильмами. Пользователь Алексей поставил высокие оценки «Джон Уик», «Мстители» и «Люди в чёрном». Система находит 200 пользователей с похожим паттерном оценок. Из фильмов, которые эти 200 человек оценили высоко, но Алексей ещё не смотрел, топ-5 попадает в рекомендации. «Матрица» оказывается на первом месте — 178 из 200 похожих пользователей дали ей 4 или 5 звёзд.

## Практика

1. Интернет-магазин с 1 млн пользователей и 500 000 товаров выбирает между user-based и item-based CF. Что из них масштабируется лучше и почему?
2. Посмотри на таблицу выше. Кому из пользователей ты бы рекомендовал фильм A и почему?
3. Матрица «пользователь × объект» в реальном кинотеатре заполнена менее чем на 1%. Почему это проблема для коллаборативной фильтрации и как она всё равно находит «похожих» пользователей?
4. Коллаборативная фильтрация не знает ничего о содержании объектов. В чём преимущество и в чём ограничение такого подхода?
5. Почему коллаборативная фильтрация работает лучше, когда пользователей много, а не мало?

## Краткий итог

- Коллаборативная фильтрация ищет похожих пользователей (или объекты) и рекомендует на основе их поведения
- В основе — матрица «пользователь × объект» с оценками или взаимодействиями
- Алгоритм предсказывает значения `?` — оценки для объектов, которые пользователь ещё не видел
- Не требует знания характеристик объектов — только данных о поведении
- Чем больше данных, тем точнее; плохо работает для новых пользователей и новых объектов

## Ключевые термины урока

- **Коллаборативная фильтрация** — метод рекомендаций на основе поведения похожих пользователей или объектов.
- **User-based CF** — поиск пользователей, похожих на целевого, и рекомендация того, что им понравилось.
- **Item-based CF** — поиск объектов, похожих на уже понравившиеся, и их рекомендация. Масштабируется лучше user-based: объектов обычно меньше, чем пользователей, и их профили стабильнее.
- **Матрица пользователь × объект** — основа CF: большинство ячеек пусты (sparse matrix). Типичная заполненность на реальных платформах — менее 1%, остальное нужно предсказать.

# 62. Контентная фильтрация

## Зачем это нужно

Что если пользователь новый и его история пустая? Что если товар только что добавили и никто его ещё не оценивал? Коллаборативная фильтрация в таких случаях беспомощна. Контентная фильтрация решает это иначе — она смотрит не на поведение людей, а на характеристики самих объектов.

## Простая интуиция

Ты только что посмотрел «Интерстеллар» и он тебе понравился. Библиотекарь не знает других зрителей с твоим вкусом, зато знает про фильм: научная фантастика, сложный сюжет, Кристофер Нолан. Он ищет другие фильмы с похожими характеристиками — «Начало», «Довод» — и рекомендует их. Это контентная фильтрация.

## Что это такое

Контентная фильтрация — подход, при котором система рекомендует объекты, похожие по своим характеристикам на те, что уже понравились пользователю. Вместо «что делали похожие пользователи» — «что похоже на то, что тебе нравится».

## Как это работает

Каждый объект описывается набором признаков. Система ищет объекты с похожим набором признаков, измеряя похожесть через **косинусное сходство** — меру близости двух векторов: чем меньше угол между векторами признаков двух объектов, тем они похожее (значение от −1 до 1, где 1 = идентичны).

| Фильм | sci-fi | драма | боевик | длительность (мин) |
|---|:---:|:---:|:---:|---:|
| Интерстеллар | 1 | 1 | 0 | 169 |
| Начало | 1 | 0 | 1 | 148 |
| Довод | 1 | 0 | 1 | 150 |
| Форрест Гамп | 0 | 1 | 0 | 142 |

«Начало» и «Довод» похожи на «Интерстеллар» по набору признаков → рекомендуем их. «Форрест Гамп» — другие жанры, несмотря на высокий рейтинг → не рекомендуем.

Признаки могут быть любыми: жанр, автор, теги, описание (текст), длительность, год выпуска.

## Простой пример

Книжный интернет-магазин добавил 300 новых книг вчера. Ни одной оценки от пользователей ещё нет — коллаборативная фильтрация бессильна. Каждая книга описана 12 признаками: жанр, автор, издательство, год, страниц, теги (детектив, Россия XIX в., психология и др.). Пользователь читал «Преступление и наказание» — система находит 8 новинок с похожим набором тегов. Три из них попадают в рекомендации с первого дня продаж, не дожидаясь первых отзывов.

## Практика

1. Пользователь только что зарегистрировался и ещё ничего не смотрел. Коллаборативная фильтрация не может ему помочь. Как контентная фильтрация справляется с этой ситуацией?
2. Посмотри на таблицу выше. Почему «Форрест Гамп» не попадает в рекомендации для фаната «Интерстеллара»?
3. Тебе нужно построить рекомендации для интернет-магазина книг. Какие признаки книги ты бы использовал?
4. Пользователь три месяца смотрит только боевики — система всё время рекомендует боевики. Почему это происходит и чем это вредит пользователю?
5. В каких ситуациях контентная фильтрация подходит лучше, чем коллаборативная?

## Краткий итог

- Контентная фильтрация рекомендует объекты, похожие по характеристикам на то, что уже понравилось
- Каждый объект описывается набором признаков; система ищет объекты с похожими признаками
- Не требует данных о других пользователях — работает даже для нового пользователя
- Хорошо подходит для новых объектов, у которых ещё нет истории оценок
- Ограничение: создаёт «пузырь» — рекомендует только похожее, не открывает новое

## Ключевые термины урока

- **Контентная фильтрация** — не требует других пользователей; решает cold start для новых объектов: фильм вышел вчера — уже рекомендуется по жанру/тегам. Именно CF-проблему cold start для объектов она закрывает.
- **Профиль пользователя** — усреднённый вектор объектов, с которыми взаимодействовал. Риск: «пузырь фильтрации» — пользователь, смотревший только боевики, никогда не получит комедию.
- **Косинусное сходство** — cos_sim = dot(a,b)/(||a||·||b||); от -1 до 1. Лучше евклидова расстояния для контентных векторов: популярный фильм с множеством тегов не будет всегда «далеко» только потому, что вектор длиннее.
- **Признаки объекта** — чем детальнее (жанр + актёры + теги + TF-IDF описания), тем точнее сходство; слишком общие признаки (только жанр) → рекомендации очевидны, нет открытий для пользователя.

# 63. Explicit vs Implicit Feedback

## Зачем это нужно

Прежде чем строить рекомендательную систему, нужно ответить на вопрос: а что вообще значит «пользователю понравилось»? От ответа зависит, какие данные ты собираешь и как интерпретируешь сигналы.

## Простая интуиция

Когда ты ставишь фильму 5 звёзд — ты явно говоришь: «понравилось». Это прямой сигнал. Но когда ты смотришь сериал три часа подряд без остановки — ты тоже говоришь «нравится», только не словами, а поведением. Первое — explicit, второе — implicit.

## Что это такое

**Explicit feedback (явная обратная связь)** — пользователь напрямую выражает своё отношение:
- Оценка от 1 до 5
- Лайк / дизлайк
- Письменный отзыв

**Implicit feedback (неявная обратная связь)** — поведение пользователя, из которого делается вывод:
- Просмотр товара
- Клик
- Покупка
- Время на странице
- Досмотрел ли видео до конца

## Как это работает

В реальных системах почти всегда доминирует implicit — пользователи редко ставят оценки, зато постоянно кликают, смотрят и покупают.

| Сигнал | Тип | Что означает |
|---|---|---|
| Оценка 5 звёзд | Explicit | Точно понравилось |
| Оценка 1 звезда | Explicit | Точно не понравилось |
| Покупка | Implicit | Скорее всего понравилось |
| Просмотрел 95% видео | Implicit | Скорее всего понравилось |
| Открыл и закрыл через 3 сек | Implicit | Скорее всего не понравилось |
| Не кликнул на товар | Implicit | Неизвестно — не видел или не заинтересовало? |

Главная сложность implicit: **отсутствие взаимодействия ≠ «не понравилось»**. Пользователь просто мог не увидеть объект.

## Простой пример

Музыкальный стриминг анализирует поведение пользователя за месяц: 12 явных лайков (explicit) и 3 400 прослушиваний (implicit). Лайки точны, но их мало — не хватит для обучения. Прослушивания зашумлены: трек запустился случайно и выключен через 5 секунд — это не «понравилось». Система комбинирует сигналы: прослушал 80%+ трека — сильный сигнал интереса, добавил в плейлист — ещё сильнее, поставил на repeat — максимальный сигнал. Из 3 400 прослушиваний только 820 считаются «реальным интересом».

## Практика

1. Стриминговый сервис опирается только на лайки (explicit). Данных мало, и обучить модель сложно. Что конкретно теряет система и как implicit feedback решает эту проблему?
2. Spotify не просит оценивать каждый трек. Какие implicit-сигналы он, скорее всего, использует?
3. Почему «пользователь не кликнул на товар» — слабый сигнал? Придумай ситуацию, когда это не означает «не интересно».
4. У тебя интернет-магазин. Ты можешь собирать: просмотр товара, добавление в корзину, покупку, возврат. Расставь эти сигналы от слабого к сильному по тому, насколько они говорят «понравилось».
5. Почему explicit feedback точнее, но его всегда меньше? В каком продукте пользователи охотнее оставляют явные оценки?

## Краткий итог

- Explicit feedback точнее, но редок: просить оценку после каждого взаимодействия — значит терять большинство пользователей
- Implicit feedback масштабируется сам, но требует интерпретации: клик не равен «понравилось», длинное чтение — не всегда одобрение
- В реальных системах почти всегда преобладает implicit — его на порядки больше
- Главная сложность implicit: отсутствие взаимодействия не означает «не понравилось»
- Хорошие системы комбинируют несколько сигналов, а не опираются на один

## Ключевые термины урока

- **Explicit feedback** — высокое качество сигнала, критически малый объём: < 5% пользователей оценивают товары на Amazon. Системы на чистом explicit быстро сталкиваются с разреженностью матрицы.
- **Implicit feedback** — объём на порядки больше, но интерпретация неочевидна: клик ≠ «понравилось», досмотр до конца ≈ «интересно», возврат товара = сильный отрицательный сигнал. Разные действия требуют разного веса.
- **Отсутствие взаимодействия** — ключевое отличие от supervised learning: в CF y=0 значит «не видел» или «не смог найти», а не «не понравилось». Нельзя обучать модель, считая все нули отрицательными примерами.
- **Confidence weighting** — подход для implicit: вес взаимодействия c = 1 + α·r, где r = число просмотров. Множественные взаимодействия = более сильный сигнал интереса, а не просто факт просмотра.

# 64. Гибридные рекомендательные системы

## Зачем это нужно

Коллаборативная фильтрация плохо работает для новых пользователей и новых объектов. Контентная создаёт «пузырь» и не учитывает скрытые предпочтения. В реальных продуктах — Netflix, Spotify, YouTube — ни один подход не используется в одиночку. Их комбинируют.

## Простая интуиция

Netflix знает: ты смотришь много триллеров (поведение → collaborative), тебе нравятся фильмы с Нолана (характеристики → content-based), сейчас вечер пятницы и ты на телевизоре, а не на телефоне (контекст). Итоговый список рекомендаций — результат всех этих сигналов вместе.

## Что это такое

Гибридная рекомендательная система — комбинация нескольких подходов для получения более точных и разнообразных рекомендаций. Чаще всего объединяют коллаборативную и контентную фильтрацию, иногда добавляют контекстные сигналы.

## Как это работает

Три основных способа комбинировать подходы:

**1. Взвешенный** — каждый подход даёт оценку, итог — взвешенная сумма:

`финальная оценка = 0.6 × CF_оценка + 0.4 × CB_оценка`

**2. Переключающийся** — выбираем подход в зависимости от ситуации:

| Ситуация | Подход |
|---|---|
| Новый пользователь (нет истории) | Content-based |
| Новый объект (нет оценок) | Content-based |
| Есть история у пользователя и объекта | Collaborative filtering |

**3. Каскадный** — один подход фильтрует, второй ранжирует:
- Сначала CB отбирает объекты, похожие по характеристикам
- Потом CF расставляет их по вероятности понравиться конкретному пользователю

**Пример: Spotify**

| Ситуация | Что использует |
|---|---|
| Новый трек без истории прослушиваний | Анализ звука (content-based) |
| Популярный трек с историей | Поведение похожих слушателей (collaborative) |
| Discover Weekly | Смешивает CF + CB + контекст |

## Простой пример

Маркетплейс с 2 миллионами пользователей и 500 000 товаров использует переключающийся гибрид. Новый пользователь при регистрации — показывают топ продаж в выбранных категориях (популярность) и похожие товары на те, что он смотрел (content-based). После 5 покупок переключаются на коллаборативную фильтрацию: находят 300 пользователей с похожей историей покупок. Итоговый список рекомендаций: 60% из CF, 30% из content-based, 10% «новинки в твоих категориях».

## Практика

1. Маркетплейс использует только коллаборативную фильтрацию. Конверсия падает после добавления 10 000 новых товаров. Почему и какой компонент гибрида исправит это?
2. Какой подход лучше использовать для нового пользователя без истории и почему?
3. Spotify добавил новый трек, который никто ещё не слушал. Как гибридная система может его рекомендовать?
4. В чём разница между взвешенным и переключающимся гибридом? Когда каждый из них предпочтительнее?
5. Мини-кейс: интернет-магазин электроники. Данные: история покупок, описания товаров (категория, бренд, характеристики), текущая страница. Какой гибридный подход ты бы выбрал?

## Краткий итог

- Гибридные системы комбинируют несколько подходов — чаще всего CF + CB
- Три способа комбинировать: взвешенный, переключающийся, каскадный
- Реальные системы (Netflix, Spotify) используют десятки сигналов одновременно
- Переключающийся гибрид — хорошее решение проблемы холодного старта
- Выбор архитектуры зависит от данных, задачи и бизнес-требований

## Ключевые термины урока

- **Гибридная система** — решает ограничения одиночных подходов: CF хорош при богатой истории, контентная — при новых объектах/пользователях. Гибрид снимает ограничения обоих, но усложняет систему.
- **Взвешенный гибрид** — score = α·CF + (1-α)·CB. Простой, но статичный: α не адаптируется к тому, сколько данных есть у пользователя (новый vs опытный). Пользователь с 2 покупками и с 200 — получают одну формулу.
- **Каскадный гибрид (two-stage)** — этап 1: recall (быстрый алгоритм генерирует тысячи кандидатов), этап 2: ranking (точная ML-модель ранжирует кандидатов). Так работают YouTube, Netflix — нельзя ранжировать миллионы напрямую.
- **Переключающийся гибрид** — явный if/else: холодный старт → контентная, > N взаимодействий → CF. Прозрачен и легко отлаживается, граница переключения требует ручной настройки.
