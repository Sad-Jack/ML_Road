## Краткий итог

- ML-системы требуют: unit tests кода, data validation, model behavior tests, regression tests
- Data validation — проверяйте схему, типы и диапазоны входных данных
- Model behavior tests проверяют специфические свойства предсказаний
- Интегрируйте тесты в CI/CD: перед каждым деплоем все тесты должны проходить

# 69. A/B тестирование в ML

## Зачем это нужно

Вы обучили новую модель, которая показывает лучшие метрики на тесте. Но как убедиться, что она реально лучше в production? A/B тест — научный способ сравнить две версии системы на реальных пользователях и принять решение на основе данных, а не предположений.

## Простая интуиция

Аптека хочет проверить, помогает ли новое лекарство лучше старого. Одной группе пациентов дают старое, другой — новое. Сравнивают результаты. В ML то же самое: одним пользователям показываем предсказания модели A (контроль), другим — модели B (эксперимент).

## Что это такое

- **A/B тест** — контролируемый эксперимент, где A = контрольная группа (старая модель), B = экспериментальная (новая)
- **Трафик сплит** — случайное разделение пользователей: например, 90% к A, 10% к B
- **Статистическая значимость** — p-value < 0.05 говорит, что разница не случайна
- **Shadow mode** — новая модель делает предсказания, но они не показываются пользователям (логируются для анализа)
- **Canary deployment** — постепенное увеличение трафика к новой модели: 1% → 5% → 20% → 100%

## Как это работает

```python
# Результаты A/B теста (5000 пользователей в каждой группе)
ctr_A = 0.102  # CTR старой модели
ctr_B = 0.105  # CTR новой модели

relative_lift = (ctr_B - ctr_A) / ctr_A
print(f"Улучшение CTR: {relative_lift:.1%}")

# Вывод делается только при p-value < 0.05 (статистическая значимость)
# p-value >= 0.05 → нужно больше данных или разница случайна

# При малом улучшении (+0.3%) и большом шуме нужна очень большая выборка
```

## Как это связано с ML

A/B тест — это стандарт в production ML. Метрики на тестовой выборке не гарантируют улучшения в production: распределение prod-данных отличается, бизнес-метрики (CTR, конверсия) не всегда коррелируют с ML-метриками (accuracy). A/B тест даёт честный ответ.

## Практика

1. Почему A/B тест необходим, даже если новая модель показывает лучшие метрики на тестовой выборке?
2. Что такое shadow mode и canary deployment? Чем они отличаются по назначению и риску?
3. Вы провели A/B тест: модель A — CTR 10.2%, модель B — CTR 10.5%, p-value = 0.08. Можно ли деплоить модель B? Почему?
4. Из урока 07 мы знаем о статистической значимости. Что такое p-value в контексте A/B теста и при каком значении принято считать результат значимым?
5. Из урока 62 мы знаем о сезонном дрейфе данных. Почему A/B тест нужно проводить не менее одного полного бизнес-цикла и как это связано с сезонностью и недельными паттернами?

## Краткий итог

- A/B тест — единственный надёжный способ доказать улучшение модели на реальных пользователях
- Метрики на тестовой выборке не заменяют A/B тест: бизнес-метрики могут вести себя иначе
- Shadow mode и canary deployment снижают риск при выкатке новой модели
- Ждите статистической значимости (p-value < 0.05) и полного бизнес-цикла перед решением

# 70. AI, ML, Deep Learning и Generative AI: кто внутри кого

## Зачем это нужно

Слова AI, ML, Deep Learning, нейросети, LLM, GenAI — звучат повсюду, и часто их используют как синонимы. Но каждое из них означает конкретную вещь. Понять иерархию — значит не путаться в разговорах, статьях и вакансиях.

## Простая интуиция

Представь матрёшку:

```
AI (искусственный интеллект)
  └── ML (машинное обучение)
        └── Neural Networks (нейронные сети)
              └── Deep Learning (глубокое обучение)
                    └── Generative AI (генеративный AI)
                          └── LLM (большие языковые модели)
```

Каждый следующий уровень — это **подмножество** предыдущего. Не замена, а специализация.

## Что это такое

**AI (Artificial Intelligence)** — широкая область: любая система, которая имитирует человеческий интеллект. Включает логику, экспертные системы, поиск, планирование — и ML тоже.

**ML (Machine Learning)** — подраздел AI, где система **учится на данных**, а не запрограммирована жёсткими правилами. Линейная регрессия, деревья, бустинг — всё это ML.

**Нейронные сети (Neural Networks)** — подраздел ML, вдохновлённый биологическими нейронами. Состоят из слоёв, которые извлекают признаки автоматически.

**Deep Learning** — нейронные сети с **много слоями** (глубокие). Работают особенно хорошо с изображениями, аудио, текстом. Требуют много данных и вычислений.

**Generative AI** — подраздел Deep Learning, где модель **создаёт новый контент**: текст, изображения, аудио, код. Не просто классифицирует, а генерирует.

**LLM (Large Language Model)** — конкретный тип генеративного AI для работы с текстом. GPT-4, Claude, Gemini — примеры LLM.

## Как это связано между собой

```
AI
├── Экспертные системы, логика, поиск (не ML)
└── ML
    ├── Линейные модели, деревья, бустинг (не нейросети)
    └── Neural Networks
        ├── Shallow Networks (1–2 слоя)
        └── Deep Learning (много слоёв)
            ├── CNN — изображения
            ├── RNN / LSTM — последовательности
            └── Transformer — универсальная архитектура
                └── Generative AI
                    ├── LLM — текст (GPT, Claude)
                    ├── Diffusion — изображения (DALL-E, Stable Diffusion)
                    └── Multimodal — текст + изображения
```

## Почему важно не путать

- «Мы используем AI» — может означать что угодно от `if/else` до GPT-4.
- «Мы используем ML» — точнее: модель учится на данных.
- «Мы используем Deep Learning» — нейросети, много вычислений, GPU.
- «Мы используем LLM» — конкретный тип: генерация текста, API.

Когда читаешь вакансию или статью — уточняй, что именно имеется в виду.

## Практика

1. Нарисуй иерархию AI → ML → Deep Learning → Generative AI → LLM своими словами, без подсказок. Что ты помнишь на каждом уровне?

2. Классификатор спама на логистической регрессии — это AI? ML? Deep Learning? Объясни почему каждый ответ верен или нет.

3. Почему Deep Learning — это подмножество ML, а не отдельная область? В чём принципиальное сходство?

4. Чем Generative AI отличается от обычного Deep Learning для классификации? Приведи пример обоих.

5. GPT-4 — это LLM. Назови три уровня иерархии, к которым он одновременно относится.

## Краткий итог

AI — широкое поле. ML — AI на данных. Deep Learning — ML через глубокие нейросети. Generative AI — Deep Learning, который создаёт контент. LLM — Generative AI для текста. Каждый уровень наследует свойства предыдущего, добавляя специализацию.

# 71. Что такое нейронная сеть

## Зачем это нужно

Нейронные сети лежат в основе современного AI: распознавание речи, перевод, генерация изображений, ChatGPT. Понять базовую идею нейросети — значит получить ключ к пониманию всего этого. Это не магия, а математика: числа, умножения, активации.

## Простая интуиция

Представьте детектор спама. Одно правило — «если есть слово БЕСПЛАТНО — спам» — часто ошибается. А если взять 100 слабых правил и объединить их с правильными весами — получается надёжный детектор. Нейронная сеть — это тысячи таких «правил» в слоях, каждое из которых обнаруживает свой паттерн.

## Что это такое

- **Нейрон** — вычислительная единица: принимает числа, умножает на веса, суммирует, применяет нелинейную функцию
- **Веса (weights)** — числа, которые сеть учит в процессе обучения
- **Слой (layer)** — группа нейронов, обрабатывающих одни и те же входные данные
- **Архитектура**: Input layer → Hidden layers → Output layer
- **Активационная функция** — нелинейность после суммирования (ReLU, sigmoid, tanh)
- **Backpropagation** — алгоритм обновления весов на основе ошибки

## Как это работает

```python
import numpy as np

# Один нейрон вручную
def neuron(inputs, weights, bias):
    """Линейная комбинация + активация"""
    z = np.dot(inputs, weights) + bias  # взвешенная сумма
    activation = max(0, z)              # ReLU: max(0, x)
    return activation

# Пример: нейрон с 3 входами
inputs = np.array([0.5, 0.3, 0.8])
weights = np.array([0.4, -0.2, 0.7])
bias = 0.1

output = neuron(inputs, weights, bias)
print(f"Выход нейрона: {output:.4f}")

# Простая нейросеть с numpy
def relu(x): return np.maximum(0, x)
def sigmoid(x): return 1 / (1 + np.exp(-x))

# Случайные веса (в реальности — обученные)
W1 = np.random.randn(4, 3)  # 4 нейрона, 3 входа
b1 = np.zeros(4)
W2 = np.random.randn(1, 4)  # 1 выход
b2 = np.zeros(1)

x = np.array([1.0, 2.0, 3.0])  # входные данные

# Forward pass
h = relu(W1 @ x + b1)    # скрытый слой
output = sigmoid(W2 @ h + b2)  # выходной слой
print(f"Предсказание сети: {output[0]:.4f}")
```

## Как это связано с ML

Нейронные сети — это универсальные аппроксиматоры: при достаточном числе нейронов они могут приближать любую непрерывную функцию. Обучение — это оптимизация весов через gradient descent + backpropagation. В основе всего современного DL — этот механизм.

## Практика

- Несколько слоёв нейронов = нейронная сеть
- Нелинейные активации (ReLU) позволяют выучить сложные зависимости
- Обучение = оптимизация весов через backpropagation + gradient descent

# 72. Как нейросеть учится на ошибках

## Зачем это нужно

Ты уже знаешь, что нейросеть — это слои с весами (урок 71). Но как она вообще учится? Откуда берутся правильные веса? Ответ — в механизме обучения: loss, градиентный спуск и backpropagation. Без этого понимания нейросети остаются чёрным ящиком.

## Простая интуиция

Представь: ты бросаешь мяч в ворота и промахиваешься. Ты смотришь на ошибку (насколько промахнулся) и чуть корректируешь бросок. Повторяешь. Постепенно попадаешь точнее.

Нейросеть делает то же самое:
1. Делает предсказание
2. Считает, насколько ошиблась (loss)
3. Понимает, как надо изменить веса, чтобы ошибка уменьшилась (градиент)
4. Делает маленький шаг в правильном направлении
5. Повторяет миллионы раз

## Что это такое

**Loss (функция потерь)** — число, которое показывает, насколько плохо нейросеть справилась. Чем больше — тем хуже. Цель обучения: минимизировать loss.

Примеры:
- MSE (Mean Squared Error) — для регрессии
- Cross-Entropy — для классификации

**Веса (weights)** — числа в каждом нейроне, которые нейросеть подстраивает в процессе обучения. Именно в них хранится всё, что модель «знает».

**Градиент** — направление, в котором loss растёт быстрее всего. Чтобы его уменьшить, надо двигаться в **противоположную** сторону.

**Gradient Descent (градиентный спуск)** — алгоритм: обновляй веса маленькими шагами против градиента.

```
новый_вес = старый_вес − learning_rate × градиент
```

**Learning rate** — размер шага. Слишком большой — перепрыгнешь минимум. Слишком маленький — будешь учиться вечно.

**Backpropagation** — алгоритм для вычисления градиентов через всю сеть. По правилу цепочки (chain rule) он считает, как каждый вес во всех слоях повлиял на итоговую ошибку.

## Как это работает: цикл обучения

```
Для каждого батча данных:
  1. Forward pass:  X → слои → предсказание ŷ
  2. Считаем loss:  L = loss(ŷ, y_true)
  3. Backward pass: backprop считает градиенты ∂L/∂w для всех w
  4. Update:        w = w − lr × ∂L/∂w
Повторить для всех батчей (= 1 эпоха)
Повторить много эпох
```

Это и есть SGD (Stochastic Gradient Descent) — основа обучения всех нейросетей.

## Что такое эпоха и батч

- **Батч** — небольшая подвыборка данных (например, 32 примера). Считаем градиент на батче, а не на всём датасете — быстрее.
- **Эпоха** — один полный проход через все обучающие данные.
- Обычно обучают 10–100+ эпох.

## Практика

1. Что такое loss? Почему нейросеть не просто считает «процент правильных ответов» как метрику обучения?

2. Объясни gradient descent своими словами. Почему движение «против градиента» уменьшает loss?

3. Что произойдёт, если learning rate слишком большой? Слишком маленький?

4. Зачем нужен backpropagation? Почему нельзя просто «перебрать» все значения весов?

5. Что такое батч и эпоха? Почему обучают на батчах, а не на одном примере за раз?

## Краткий итог

Нейросеть учится через цикл: предсказание → ошибка (loss) → вычисление градиентов (backprop) → обновление весов (gradient descent). Этот цикл повторяется тысячи раз. Loss показывает, насколько плохо. Градиент — в какую сторону менять. Learning rate — насколько сильно.

# 73. Что такое Deep Learning

## Зачем это нужно

Deep Learning — это то, что стоит за современными AI-прорывами: ChatGPT, Midjourney, AlphaFold, Tesla Autopilot. Понимание базовых принципов DL позволяет ориентироваться в этом мире и понимать, что возможно, а что нет.

## Простая интуиция

Обычная нейросеть — это один слой обработки. Deep Learning — это много слоёв, каждый из которых строит более абстрактные понятия. Для изображения: пиксели → края → формы → детали (нос, глаза) → лица. Каждый слой «понимает» чуть больше, чем предыдущий.

## Что это такое

- **Deep Learning** — нейронные сети с большим числом слоёв (от 10 до сотен)
- **CNN (Convolutional Neural Networks)** — для изображений и видео; учатся видеть локальные паттерны
- **RNN (Recurrent Neural Networks)** — для последовательностей (текст, временные ряды); есть «память»
- **Transformer** — архитектура на основе attention, заменившая RNN для большинства NLP задач
- **Transfer Learning** — использование предобученных моделей (ImageNet, GPT) для новых задач

## Как это работает

```python
import torch.nn as nn

# Deep = несколько слоёв, каждый строит более абстрактные признаки
model = nn.Sequential(
    nn.Linear(20, 64),   # входной слой → скрытый
    nn.ReLU(),
    nn.Dropout(0.3),     # регуляризация: случайно отключаем нейроны при обучении
    nn.Linear(64, 32),   # скрытый → скрытый
    nn.ReLU(),
    nn.Linear(32, 1),    # скрытый → выход
    nn.Sigmoid()         # вероятность (0..1) для бинарной классификации
)

total_params = sum(p.numel() for p in model.parameters())
print(f"Параметров: {total_params:,}")  # всё это учится из данных
```

## Как это связано с ML

Deep Learning — специализированная ветвь ML. Принципы одинаковы: обучение на данных, функция потерь, оптимизация. Отличие — масштаб: миллионы параметров, GPU, большие датасеты. Transfer Learning изменил правила: теперь можно взять предобученную сеть и дообучить на малых данных.

- Transfer Learning позволяет использовать мощные модели даже при малых данных

# 74. Архитектуры нейросетей: CNN, RNN и Transformer

## Зачем это нужно

Deep Learning — это не одна универсальная нейросеть. Для разных типов данных существуют разные **архитектуры** — разные способы организации слоёв. Знать их на уровне интуиции нужно, чтобы понимать, какой инструмент для чего подходит.

## Простая интуиция

Разные задачи — разная структура:
- Фотографию лучше анализировать **блоками пикселей** → CNN
- Текст лучше читать **последовательно** → RNN/LSTM
- Смысл слова зависит от **контекста всей фразы** → Transformer

## CNN — Convolutional Neural Network

**Для чего:** изображения, видео, любые пространственные данные.

**Идея:** вместо того чтобы смотреть на все пиксели сразу, CNN применяет **маленькие фильтры** (ядра свёртки), которые скользят по изображению и обнаруживают локальные паттерны: края, текстуры, формы. Глубокие слои собирают паттерны из паттернов — от краёв до лиц и объектов.

```
Вход: изображение 224×224
→ Conv слой (края, текстуры)
→ Conv слой (формы, части объектов)
→ Fully Connected
→ Выход: класс (кошка/собака)
```

**Применения:** распознавание объектов, медицинские снимки, автопилот.

## RNN и LSTM — Recurrent Neural Network

**Для чего:** последовательности — текст, временные ряды, аудио.

**Идея:** у RNN есть **скрытое состояние** — «память» о предыдущих шагах. При обработке каждого слова (или временного шага) сеть учитывает, что было раньше.

**Проблема:** обычный RNN плохо помнит далёкое прошлое. LSTM (Long Short-Term Memory) решает это через специальные «ворота», которые решают: что запомнить, что забыть, что передать дальше.

**Применения:** генерация текста, перевод, распознавание речи (до эпохи Transformer).

## Transformer

**Для чего:** текст, код, изображения, аудио — сегодня главная архитектура для всего.

**Идея:** вместо последовательной обработки — **внимание (attention)**. Каждое слово смотрит на все остальные слова в предложении и решает, что важно для его понимания.

```
"Банк на берегу реки"
 ↑__________________↑
Слово "банк" смотрит на "реки" → понимает, что это берег, не финансы
```

Это позволяет обрабатывать весь контекст **параллельно**, не по одному слову. Поэтому Transformer быстро обучается на больших данных.

**Применения:** GPT, BERT, Claude, Gemini, DALL-E, Whisper — почти всё современное DL.

## GAN — Generative Adversarial Network

**Для чего:** генерация изображений, аудио, синтетических данных.

**Идея:** два нейрона играют в игру: **Generator** создаёт фейковые данные, **Discriminator** пытается отличить их от настоящих. Оба учатся друг на друге. Итог — Generator научается создавать очень реалистичные данные.

**Применения:** генерация лиц, deepfake, аугментация данных. Сегодня во многом вытеснены диффузионными моделями.

## Карта архитектур

```
Изображения    → CNN → ResNet, EfficientNet, ViT
Последовательности → RNN/LSTM → заменены Transformer
Текст/код/всё  → Transformer → GPT, BERT, T5, Claude
Генерация      → GAN, Diffusion → DALL-E, Stable Diffusion
```

## Практика

1. Почему CNN хорошо работает с изображениями, но плохо — с текстом? В чём принципиальное отличие?

2. Что такое «скрытое состояние» в RNN? Почему LSTM лучше справляется с длинными последовательностями?

3. В чём главная идея механизма внимания (attention) в Transformer? Почему это лучше, чем обрабатывать текст слово за словом?

4. Ты работаешь с временным рядом продаж за 3 года (ежедневные данные). Какую архитектуру выберешь и почему?

## Краткий итог

CNN — для пространственных данных (изображения) через локальные фильтры. RNN/LSTM — для последовательностей через скрытое состояние. Transformer — универсальная архитектура через attention, сегодня доминирует. GAN — генерация через конкуренцию двух сетей. Выбор архитектуры зависит от типа данных и задачи.

# 75. Что такое Embeddings

## Зачем это нужно

Компьютеры работают с числами, но данные бывают категориальными: слова, пользователи, товары, города. Embeddings — способ превратить любой объект в осмысленный числовой вектор. Это основа NLP, рекомендательных систем и многих других ML-задач.

## Простая интуиция

Представьте карту. Каждый город — точка с координатами (x, y). Похожие города (близкие географически или культурно) — находятся рядом на карте. Embeddings делают то же самое для слов, пользователей или товаров: превращают их в координаты в многомерном пространстве, где «похожие» объекты находятся рядом.

## Что это такое

- **Embedding** — плотный числовой вектор фиксированной размерности, представляющий объект
- **Word2Vec** — классический алгоритм получения эмбеддингов слов: слова с похожим контекстом → похожие векторы
- **Семантическое сходство** — похожие объекты имеют близкие векторы (косинусное расстояние)
- **Embedding layer** — обучаемый слой нейросети, создающий эмбеддинги категорий
- Пример: вектор("король") - вектор("мужчина") + вектор("женщина") ≈ вектор("королева")

## Как это работает

```python
import numpy as np
from sklearn.metrics.pairwise import cosine_similarity

# Эмбеддинги слов (в реальности 100-300 измерений, здесь 3 для наглядности)
embeddings = {
    "кот":        np.array([0.9, 0.1, 0.2]),
    "кошка":      np.array([0.85, 0.15, 0.25]),
    "машина":     np.array([0.1, 0.9, 0.3]),
    "автомобиль": np.array([0.15, 0.85, 0.35]),
}

def sim(w1, w2):
    return cosine_similarity([embeddings[w1]], [embeddings[w2]])[0][0]

print(f"кот ↔ кошка:       {sim('кот', 'кошка'):.3f}")       # близко
print(f"кот ↔ машина:      {sim('кот', 'машина'):.3f}")      # далеко
print(f"машина ↔ автомобиль: {sim('машина', 'автомобиль'):.3f}")  # близко

# Похожие объекты → близкие векторы — это ключевое свойство embeddings
```

## Как это связано с ML

Embeddings — фундамент современного NLP и рекомендательных систем. BERT, GPT — это модели, обученные создавать контекстуальные эмбеддинги. В рекомендациях эмбеддинги пользователей и товаров позволяют найти похожих пользователей или похожие товары через простое векторное расстояние.

## Краткий итог

- Embedding — плотный числовой вектор, представляющий объект в векторном пространстве
- Похожие объекты имеют близкие векторы (семантическое сходство)

# 76. Что такое Transformer

## Зачем это нужно

Transformer — архитектура, изменившая AI. GPT, BERT, Claude, Gemini, T5 — всё это трансформеры. Понимание базовой идеи attention позволяет разобраться, почему эти модели так мощны и какие у них ограничения.

## Простая интуиция

Читая предложение «Банк открыли раньше, чем солнце» — слово «банк» значит разное (финансовый или берег реки). Чтобы понять, нужно посмотреть на весь контекст. Attention — механизм, который для каждого слова спрашивает: «на какие другие слова мне стоит обратить внимание, чтобы понять себя?»

## Что это такое

- **Transformer** — архитектура, предложенная в статье "Attention is All You Need" (2017)
- **Attention** — механизм, позволяющий каждому токену «смотреть» на все другие токены
- **Self-attention** — attention внутри одной последовательности (слово смотрит на другие слова)
- **Multi-head attention** — несколько механизмов attention параллельно
- **Encoder** — обрабатывает входную последовательность (BERT)
- **Decoder** — генерирует выходную последовательность (GPT)

## Как это работает

```python
# Упрощённый attention вручную
import numpy as np

def softmax(x):
    e_x = np.exp(x - np.max(x))
    return e_x / e_x.sum()

def simple_attention(query, keys, values):
    """
    query: что мы ищем
    keys: что есть в последовательности
    values: что вернуть для каждого элемента
    """
    # Вычисляем похожесть query с каждым key
    scores = np.dot(query, keys.T)
    # Нормализуем через softmax
    weights = softmax(scores)
    # Взвешенная сумма values
    output = np.dot(weights, values)
    return output, weights

# Пример: 3 слова, 4-мерные векторы
np.random.seed(42)
words = ["Банк", "открыли", "раньше"]
keys = np.random.randn(3, 4)    # 3 слова × 4 измерения
values = np.random.randn(3, 4)

# Для слова "Банк" (query)
query_bank = keys[0]
context, attention_weights = simple_attention(query_bank, keys, values)

print("Веса attention для 'Банк':")
for word, weight in zip(words, attention_weights):
    print(f"  {word}: {weight:.3f}")
print("\nКонтекстный вектор 'Банк':", context.round(3))
```

## Как это связано с ML

Трансформеры совершили революцию: сначала в NLP (BERT, GPT), потом в компьютерном зрении (ViT), потом везде. Все современные LLM (GPT-4, Claude, Llama) — это трансформеры. Главное ограничение: контекстное окно — трансформер «видит» ограниченное количество токенов одновременно.

- Все современные LLM (GPT, Claude, Llama, BERT) — это трансформеры
- Главное ограничение: контекстное окно — фиксированный максимальный размер входа

# 77. Что такое LLM

## Зачем это нужно

LLM (Large Language Models) — это технология за ChatGPT, Claude, Gemini. Понимание того, как они работают, их возможностей и ограничений, критично для любого специалиста в области данных и технологий в 2024 году.

## Простая интуиция

Представьте книгочея, прочитавшего весь интернет. Он не знает «правды» — он знает, что обычно пишут после тех или иных слов. Спросите его «Столица Франции» — он ответит «Париж», потому что это слово чаще всего следует после таких слов. Именно так работает LLM: предсказывает наиболее вероятный следующий токен.

## Что это такое

- **LLM** (Large Language Model) — трансформер, предобученный на огромных объёмах текста
- **Pre-training** — самообучение: предсказание следующего слова на триллионах токенов
- **RLHF** (Reinforcement Learning from Human Feedback) — дообучение через человеческие оценки
- **Токен** — единица текста: примерно 1 слово или 4 символа
- **Температура** — параметр случайности генерации: высокая = творческий/непредсказуемый, низкая = детерминированный
- **Контекстное окно** — максимальный объём текста, который модель видит сразу (8K-1M токенов)

## Как это работает

```python
# Ключевые параметры при работе с LLM
params = {
    "temperature": 0.7,      # 0 = детерминированный, 1+ = творческий
    "max_tokens": 500,       # максимум генерируемых токенов
    "top_p": 0.95,           # nucleus sampling
    "context_window": 200000 # максимум токенов на входе
}

# Вызов через API (схема):
# message = client.messages.create(
#     model="claude-opus-4-5",
#     max_tokens=200,
#     messages=[{"role": "user", "content": "Объясни градиентный спуск кратко"}]
# )
```

## Как это связано с ML

LLM — крупнейший практический результат DL на текущий момент. Они меняют способ работы с ML: вместо написания кода preprocessing можно попросить LLM сгенерировать код. RAG, Fine-tuning, Prompt Engineering — ключевые техники работы с LLM в production.

# 78. Prompt Engineering

## Зачем это нужно

Качество ответа LLM зависит от качества запроса. Правильно составленный промпт — это разница между полезным ответом и мусором. Prompt Engineering — практическая навык, применимый прямо сейчас к любому LLM.

## Простая интуиция

Промпт — это как задание сотруднику. «Напиши что-нибудь про Python» — расплывчато, результат непредсказуем. «Напиши 5 практических советов по оптимизации Python кода для ML-пайплайна, для аудитории junior разработчиков, в формате нумерованного списка» — конкретно, результат предсказуем и полезен.

## Что это такое

- **Zero-shot prompting** — задать вопрос без примеров: «Переведи на английский: ...»
- **Few-shot prompting** — дать 2-3 примера перед задачей: «Пример 1: ... → ... Теперь: ...»
- **Chain-of-thought (CoT)** — попросить рассуждать: «Думай шаг за шагом»
- **System prompt** — инструкции о роли и поведении модели («Ты — эксперт по ML»)
- **Structured output** — просить ответ в определённом формате (JSON, список, таблица)
- **Temperature** — параметр случайности; для кода: 0, для творчества: 0.7-1.0

## Как это работает

```python
# Примеры шаблонов промптов

# 1. Zero-shot
zero_shot = """
Классифицируй тональность отзыва как POSITIVE, NEGATIVE или NEUTRAL.

Отзыв: "Доставка быстрая, но товар не соответствует описанию"
Тональность:
"""

# 2. Few-shot
few_shot = """
Классифицируй тональность:
Отзыв: "Отличный продукт!" -> POSITIVE
Отзыв: "Ужасное качество" -> NEGATIVE
Отзыв: "Обычный товар" -> NEUTRAL

Отзыв: "Доставка быстрая, но товар не соответствует описанию"
Тональность:
"""

# 3. Chain-of-thought
cot_prompt = """
Задача: есть датасет с 1000 строками, 20% пропущенных значений.
Выбери стратегию обработки пропусков.

Думай шаг за шагом:
1. Какой тип данных?
2. Каков процент пропусков?
3. Какая задача ML?
4. Что порекомендуешь?
"""

# 4. Структурированный вывод
structured = """
Проанализируй модель ML и верни ответ строго в JSON формате:
{
  "problem_type": "classification|regression|clustering",
  "recommended_algorithms": ["algo1", "algo2"],
  "key_risks": ["risk1"],
  "next_steps": ["step1"]
}

Задача: предсказать вероятность покупки для 50K клиентов.
"""
print("Шаблоны промптов готовы к использованию")
```

## Как это связано с ML

Prompt Engineering — практический навык для использования LLM в ML-задачах: генерация кода, анализ данных, документирование, автоматизация. Для production использования: system prompt задаёт поведение, few-shot примеры улучшают стабильность, структурированный вывод упрощает парсинг.

# 79. Fine-tuning моделей

## Зачем это нужно

Pre-trained модели (BERT, GPT, LLama) — мощные, но общие. Fine-tuning адаптирует их к специфической задаче или домену. Это позволяет получить специализированную модель без обучения с нуля (что стоило бы миллионы долларов).

## Простая интуиция

Врач-терапевт (pre-trained модель) знает медицину в целом. Специализация в кардиологии (fine-tuning) — дополнительная учёба, опираясь на уже имеющуюся базу. Это быстрее и дешевле, чем начинать медицинское образование заново.

## Что это такое

- **Full fine-tuning** — обновление всех весов модели на новых данных. Дорого, требует много GPU памяти
- **Feature extraction** — заморозить все слои, обучить только последний (классификационный) слой
- **LoRA** (Low-Rank Adaptation) — обновить только небольшие матрицы-адаптеры; эффективно по памяти
- **Instruction tuning** — дообучение следовать инструкциям (как у ChatGPT)
- **Domain adaptation** — дообучение на специализированных текстах (медицина, юридические документы)
- Когда нужен: специфический формат вывода, специализированный домен, конкретный стиль

## Как это работает

```python
from transformers import AutoModelForSequenceClassification
import torch

# 1. Загрузка базовой модели
model = AutoModelForSequenceClassification.from_pretrained(
    "bert-base-multilingual-cased",
    num_labels=3  # positive / negative / neutral
)
print(f"Параметров: {sum(p.numel() for p in model.parameters()):,}")

# 2. Fine-tuning: маленький LR сохраняет знания предобучения
optimizer = torch.optim.AdamW(model.parameters(), lr=2e-5)
# Стандартный lr=0.001 разрушит предобученные веса

# LoRA: обновляет ~1% параметров → сопоставимый результат, в 10× меньше GPU
# (pip install peft)
print("LoRA обновляет: ~1% параметров")
```

## Как это связано с ML

Fine-tuning — мост между общими LLM и специализированными production системами. В ML пайплайне: базовая модель → fine-tuning на доменных данных → deployment → мониторинг. LoRA революционизировал fine-tuning: теперь специализированную модель можно получить на одном GPU за часы.

# 80. Что такое RAG

## Зачем это нужно

LLM не знает о событиях после даты обучения, не знает ваши внутренние документы и галлюцинирует факты. RAG (Retrieval-Augmented Generation) решает все три проблемы: добавляет актуальные знания без переобучения.

## Простая интуиция

Представьте эксперта с доступом к библиотеке. Вы задаёте вопрос — эксперт быстро находит нужные страницы из книг, читает их и отвечает, опираясь на прочитанное, а не только на своё образование. RAG — это LLM + умный поиск по базе знаний.

## Что это такое

- **RAG** (Retrieval-Augmented Generation) — архитектура: Retrieval (поиск) + Generation (генерация)
- **Retrieval** — поиск релевантных документов по запросу пользователя
- **Vector store** — база данных эмбеддингов документов (Chroma, Pinecone, FAISS)
- **Chunking** — разбивка документов на части нужного размера
- **Embedding model** — модель для векторизации текста (text-embedding-3-small и др.)
- **Контекст** — найденные документы передаются в LLM как часть промпта

## Как это работает

```python
# Схема RAG системы (концептуально)

# ЭТАП 1: ИНДЕКСИРОВАНИЕ (делается один раз)
# 1. Загрузить документы
documents = [
    "Компания основана в 2010 году. Штаб-квартира в Москве.",
    "Продукты: CRM система, аналитическая платформа, мобильное приложение.",
    "Политика возврата: 14 дней с момента покупки без объяснения причин."
]

# 2. Разбить на chunks (обычно 200-500 токенов с перекрытием)
# 3. Создать embeddings для каждого chunk
# 4. Сохранить в vector store

# ЭТАП 2: ЗАПРОС (при каждом вопросе)
def rag_pipeline(question, documents, top_k=2):
    """
    Упрощённая RAG система
    """
    # Поиск: находим top_k наиболее релевантных документов
    # В реальности: cosine similarity между embedding вопроса и документов
    # Здесь: простой поиск по ключевым словам
    keywords = question.lower().split()
    scored_docs = []
    for doc in documents:
        score = sum(1 for kw in keywords if kw in doc.lower())
        scored_docs.append((score, doc))
    scored_docs.sort(reverse=True)
    context = "\n".join([doc for _, doc in scored_docs[:top_k]])

    # Генерация: передаём контекст + вопрос в LLM
    prompt = f"""Используй только следующий контекст для ответа.

Контекст:
{context}

Вопрос: {question}
Ответ:"""
    return prompt

q = "Какова политика возврата?"
result = rag_pipeline(q, documents)
print("Промпт для LLM:")
print(result)
```

## Как это связано с ML

RAG — ключевая архитектура для production LLM приложений. Она позволяет: (1) работать с актуальными данными без переобучения; (2) ссылаться на источники; (3) ограничить галлюцинации. Альтернативы: fine-tuning (для стиля/поведения), function calling (для действий).

## Практика

2. Что такое chunking и почему выбор размера chunk критически важен для качества RAG?

## Краткий итог

- RAG = поиск релевантных документов + передача их в контекст LLM
- Решает проблемы: устаревшие знания, внутренние документы, галлюцинации
- Vector store хранит embeddings документов для семантического поиска
- Качество RAG в значительной мере определяется качеством chunking и retrieval

# 81. Что такое AI Agent

## Зачем это нужно

LLM, который только отвечает на вопросы, — это чат-бот. AI Agent — это LLM, который может планировать, использовать инструменты и выполнять многошаговые задачи автономно. Это следующий уровень применения LLM: от ответов к действиям.

## Простая интуиция

Обычный LLM — как консультант, который отвечает на вопросы. AI Agent — как ассистент, которому можно сказать «организуй мне командировку» и он сам найдёт рейсы, забронирует отель, отправит письма и внесёт встречи в календарь. Разница — в способности действовать, а не только советовать.

## Что это такое

- **AI Agent** — система: LLM + инструменты + память + планирование
- **Инструменты (tools)** — функции, которые LLM может вызывать (поиск, API, код, база данных)
- **ReAct (Reason + Act)** — паттерн: Рассуждение → Действие → Наблюдение → Рассуждение...
- **Память**: контекстная (в промпте), долгосрочная (vector store), процедурная (память о навыках)
- **Планирование** — разбивка сложной задачи на шаги
- **Human-in-the-loop** — контроль человека на критических шагах

# Простой пример агентного мышления

## Как это связано с ML

AI Agents — активно развивающаяся область. Фреймворки: LangChain, LlamaIndex, AutoGen. Ключевые вызовы: надёжность (агент может принять неверное решение), безопасность (инструменты имеют доступ к реальным системам), стоимость (много вызовов LLM). Human-in-the-loop критичен для важных действий.

# 82. Этика и ответственность в AI

## Зачем это нужно

AI-системы влияют на жизни людей: решают, кому дать кредит, кого взять на работу, как распределить ресурсы. Эти системы могут дискриминировать, нарушать приватность, работать непрозрачно. Ответственный AI — не только этически правильно, но и юридически и коммерчески необходимо.

## Простая интуиция

Нанимающий менеджер, который оценивает только кандидатов из элитных вузов — предвзятый. Если обучить ML-модель на исторических данных найма, где так и работали, — модель унаследует эту предвзятость. Мусор на входе → предвзятость на выходе. И модель не будет знать, что она несправедлива.

## Что это такое

- **Bias (предвзятость)** — систематическая ошибка в пользу/против определённых групп
- **Fairness (справедливость)** — равное обращение с группами. Метрики: equal accuracy, demographic parity
- **Explainability/Interpretability** — возможность объяснить решение модели (SHAP, LIME)
- **Privacy** — защита персональных данных. Методы: federated learning, differential privacy
- **Accountability** — кто несёт ответственность за решения AI?
- **EU AI Act** — регуляторная база ЕС для AI, классифицирует риски

## Как это работает

```python
import numpy as np

# Проверка fairness: сравниваем метрики по группам
y_pred = model.predict(X_test)
gender = X_test["gender"].values

for group_name, mask in [("Female", gender == 0), ("Male", gender == 1)]:
    acc = (y_pred[mask] == y_test[mask]).mean()
    hire_rate = y_pred[mask].mean()
    print(f"{group_name}: accuracy={acc:.3f}, hire_rate={hire_rate:.3f}")

# Female: accuracy=0.76, hire_rate=0.31
# Male:   accuracy=0.88, hire_rate=0.62
# Большая разница → сигнал предвзятости в данных или модели
```

## Как это связано с ML

Ответственный AI встроен в весь ML-цикл: от сбора данных (репрезентативность) до деплоя (мониторинг дискриминации) и аудита (explainability). Регуляции (EU AI Act, GDPR) делают это юридическим требованием, а не только этическим выбором.

        priority: 1,
        content: `# Ключевые термины и краткие объяснения

## 0. Карта направления

### AI — Artificial Intelligence / Искусственный интеллект

Общее название для систем, которые пытаются выполнять задачи, похожие на человеческое мышление.

ML — это одна из частей AI.

### Machine Learning / Машинное обучение

Подход, при котором система не получает все правила вручную, а учится находить закономерности на данных.

Проще говоря: мы показываем примеры, а модель учится делать выводы сама.

### Deep Learning / Глубокое обучение

Это часть ML, где используют большие нейронные сети.

Обычно применяется там, где задачи сложные: картинки, речь, тексты.

### Data Science

Направление про работу с данными: изучение, анализ, поиск закономерностей и построение моделей.

ML — это только одна часть Data Science.

### Model / Модель

Это математическая система, которая учится на данных и потом делает предсказание.

Например: “купит клиент товар или нет”.

### Prediction / Предсказание

Ответ модели на новых данных.

Например: вероятность того, что клиент уйдёт.

### Training / Обучение

Этап, когда модель смотрит на примеры и настраивает себя.

Именно тут она “учится”.

### Inference

Этап, когда уже обученная модель применяется в реальной жизни.

То есть обучение закончилось, и теперь модель просто выдает ответы.

---

## 1. База про данные

### Dataset / Датасет

Это набор данных, на котором мы работаем.

Обычно это таблица, где строки — объекты, а столбцы — их свойства.

### Row / Строка

Одна запись в таблице.

Например, один клиент, один заказ или один товар.

### Column / Колонка

Один признак или одно поле в таблице.

Например: возраст, город, цена.

### Feature / Признак

Это информация, которую мы даём модели на вход.

Именно по признакам модель пытается понять ответ.

### Target / Целевая переменная

Это то, что мы хотим предсказать.

Например: уйдёт клиент или нет, какая будет цена, купит ли человек товар.

### X

Так часто называют все входные признаки модели.

Проще говоря: всё, на что модель смотрит перед ответом.

### y

Так часто называют target — правильный ответ, который модель должна научиться предсказывать.

Например: \`0\` или \`1\`, если это задача “да/нет”.

### Label

Почти то же самое, что target, особенно в задачах классификации.

Это правильный класс или ответ для примера.

### Missing values / Пропуски

Это пустые значения в данных.

Они мешают обучению и часто требуют отдельной обработки.

### Numerical feature / Числовой признак

Признак, который выражен числом.

Например: возраст, зарплата, количество покупок.

### Categorical feature / Категориальный признак

Признак, который описывает категорию, а не число.

Например: город, пол, тип клиента.

---

## 2. Как устроена задача в ML

### Supervised Learning / Обучение с учителем

У модели есть примеры с готовыми правильными ответами.

Она учится по ним предсказывать ответ для новых данных.

### Unsupervised Learning / Обучение без учителя

У модели нет готовых правильных ответов.

Она сама ищет структуру, группы или закономерности в данных.

### Classification / Классификация

Задача, где модель выбирает один из вариантов ответа.

Например: “спам / не спам”, “уйдёт / не уйдёт”.

### Regression / Регрессия

Задача, где модель предсказывает число.

Например: цену квартиры или сумму заказа.

### Clustering / Кластеризация

Задача, где похожие объекты автоматически собираются в группы.

Например: сегменты клиентов по поведению.

### Binary classification

Классификация, где всего два варианта ответа.

Например: “да / нет”.

### Multiclass classification

Классификация, где вариантов ответа больше двух.

Например: определить категорию товара из нескольких классов.

### Baseline

Это очень простое стартовое решение, с которым сравнивают всё остальное.

Нужно, чтобы понять: новая модель реально лучше или просто сложнее.

---

## 3. Разделение данных

### Train set / Обучающая выборка

Часть данных, на которой модель учится.

Это её “учебник”.

### Validation set / Валидационная выборка

Часть данных, на которой мы проверяем модель в процессе работы.

Она помогает сравнивать варианты и настраивать модель.

### Test set / Тестовая выборка

Часть данных для финальной честной проверки.

На ней смотрят, как модель работает на новых данных.

### Split / Разбиение данных

Это разделение датасета на train, validation и test.

Нужно, чтобы обучение и проверка были честными.

### Generalization / Обобщающая способность

Способность модели хорошо работать не только на знакомых данных, но и на новых.

Это одна из главных целей ML.

---

## 4. Как модель учится

### Algorithm / Алгоритм

Это способ, по которому строится модель.

Например: линейная регрессия, дерево решений, нейросеть.

### Parameter / Параметр

Это внутренние настройки модели, которые она подбирает во время обучения.

Именно через них модель “запоминает” найденные закономерности.

### Epoch / Эпоха

Один полный проход модели по всем обучающим данным.

Часто модель обучается много эпох подряд.

### Loss function / Функция потерь

Это число, которое показывает, насколько модель ошибается во время обучения.

Чем меньше loss, тем лучше модель учится на текущем этапе.

### Optimization / Оптимизация

Процесс, в котором модель пытается уменьшить ошибку.

То есть постепенно становится точнее.

### Gradient descent / Градиентный спуск

Один из основных способов уменьшать ошибку модели.

Если очень просто: это метод, который помогает идти в сторону лучшего решения маленькими шагами.

### Learning rate / Скорость обучения

Показывает, насколько большими шагами модель меняет свои настройки.

Слишком большой шаг может мешать обучению, слишком маленький — делать его очень медленным.

---

## 5. Как понять, хороша ли модель

### Metric / Метрика

Это число, по которому мы оцениваем качество модели.

Разные задачи требуют разных метрик.

### Accuracy

Доля правильных ответов из всех ответов.

Полезная метрика, но иногда может обманывать, если классы несбалансированы.

### Precision

Показывает, как часто модель права, когда говорит “да”.

Важна там, где ложные срабатывания дорогие.

### Recall

Показывает, сколько настоящих “да” модель смогла найти.

Важна там, где опасно что-то пропустить.

### F1-score

Это баланс между precision и recall.

Удобно, когда важны оба показателя сразу.

### MAE — Mean Absolute Error

Средняя абсолютная ошибка в числовых задачах.

Показывает, на сколько в среднем модель ошибается.

### MSE — Mean Squared Error

Средняя ошибка, где большие промахи наказываются сильнее.

Часто используется в задачах регрессии.

### RMSE

Это корень из MSE.

Его удобно читать, потому что он ближе к обычному масштабу ошибки.

---

## 6. Что может пойти не так

### Overfitting / Переобучение

Модель слишком хорошо запомнила обучающие данные, но плохо работает на новых.

То есть она “выучила примеры”, а не поняла общий принцип.

### Underfitting / Недообучение

Модель слишком простая или слишком слабо обучена.

Она плохо работает даже на обучающих данных.

### Data leakage / Утечка данных

Ситуация, когда в признаки случайно попадает информация из будущего или почти готовый ответ.

Из-за этого модель кажется умной, хотя на деле проверка нечестная.

### Noise / Шум

Случайные или бесполезные данные, которые не помогают решать задачу.

Они могут мешать модели учиться.

### Outlier / Выброс

Очень необычное значение, сильно отличающееся от остальных.

Иногда это ошибка, а иногда редкий, но реальный случай.

### Imbalanced data / Дисбаланс классов

Ситуация, когда одного класса очень много, а другого очень мало.

Из-за этого модель может научиться игнорировать редкий, но важный класс.

---

## 7. Подготовка данных

### Preprocessing / Предобработка

Подготовка данных перед обучением.

Сюда входит очистка, заполнение пропусков, преобразование типов и другие шаги.

### Encoding / Кодирование категорий

Преобразование текстовых категорий в числовой вид, понятный модели.

Например, чтобы модель могла работать с колонкой “город”.

### One-hot encoding

Способ кодирования категорий, когда каждая категория превращается в отдельную колонку.

Например: Москва, Берлин, Париж — каждая как отдельный признак.

### Scaling / Масштабирование

Приведение числовых признаков к более удобному масштабу.

Это помогает некоторым моделям учиться стабильнее.

### Normalization / Нормализация

Один из способов привести значения к общему диапазону.

Часто используется, когда признаки слишком разные по масштабу.

### Standardization / Стандартизация

Преобразование данных так, чтобы у признака были удобные средние и разброс.

Это тоже помогает ряду моделей работать лучше.

### Feature engineering

Создание или улучшение признаков на основе исходных данных.

Часто хороший feature engineering даёт сильный прирост качества.

### Feature importance

Оценка того, насколько сильно признак влияет на решение модели.

Помогает понять, что для модели действительно важно.

---

## 8. Более глубокий слой

### Neural network / Нейронная сеть

Модель, вдохновлённая идеей работы нейронов.

Хорошо подходит для сложных задач: тексты, картинки, звук.

### Embedding

Способ представить объект в виде набора чисел так, чтобы похожие объекты были ближе друг к другу.

Часто используется для слов, текстов, товаров, пользователей.

### Transformer

Современная архитектура нейросетей, которая особенно хорошо работает с текстом.

Именно на ней построено много LLM.

### LLM — Large Language Model

Большая языковая модель, обученная на огромном количестве текста.

Она умеет понимать запросы и генерировать осмысленный текст.

### Fine-tuning

Дообучение уже готовой модели на своей задаче или своих данных.

Это дешевле и быстрее, чем обучать всё с нуля.

### Prompt

Текстовая инструкция, которую пользователь даёт языковой модели.

От формулировки prompt часто сильно зависит качество ответа.

---

## 9. Продовый слой

### Deployment

Этап, когда модель выкладывают в рабочую систему.

После этого её могут использовать реальные пользователи или сервисы.

### Monitoring

Наблюдение за моделью после запуска.

Нужно, чтобы замечать ошибки, просадку качества и странное поведение.

### Data drift

Ситуация, когда новые данные стали отличаться от тех, на которых модель училась.

Из-за этого качество модели может падать.

### Model drift

Ситуация, когда сама модель со временем начинает работать хуже.

Обычно это видно уже после запуска в реальной среде.

### Retraining

Повторное обучение модели на новых данных.

Нужно, чтобы она не устаревала.

### A/B test

Проверка двух вариантов решения на реальных пользователях.

Помогает понять, какой вариант действительно лучше на практике.`

### Краткие ответы, которые помогут на собеседовании

Ниже — не просто список вопросов, а компактная шпаргалка: под каждым вопросом есть ответ, который достаточно точный, чтобы уверенно объяснить тему на собеседовании без лишней воды.

---

## 1. База данных и постановка задачи

### 1. Что такое признаки, target, \`X\` и \`y\`?

**Признаки** — это входные данные, по которым модель делает предсказание.

**Target** — это то, что модель должна предсказать.

Обычно **\`X\`** — это таблица признаков, а **\`y\`** — колонка с правильными ответами.

Например: возраст и стаж — это признаки, а зарплата — target.

---

### 2. Чем отличается классификация от регрессии?

**Классификация** — это когда модель предсказывает класс или категорию: например, спам / не спам.

**Регрессия** — это когда модель предсказывает число: например, цену квартиры или выручку.

Главное отличие — в типе ответа.

---

### 3. Что такое обучающая, валидационная и тестовая выборки?

**Train** используется для обучения модели.

**Validation** нужна для подбора модели и настройки гиперпараметров.

**Test** используется для финальной честной оценки качества на данных, которые модель не видела.

Такое разделение помогает не обманывать себя при оценке.

---

### 4. Почему нельзя оценивать модель на тех же данных, на которых она обучалась?

Потому что модель может просто запомнить эти данные, а не научиться находить общую закономерность.

Тогда качество будет казаться высоким, но на новых данных модель может работать плохо.

Нам важно проверять не запоминание, а способность обобщать.

---

### 5. Что такое data leakage и почему это опасно?

**Data leakage** — это утечка информации из target или будущего в признаки.

Например, когда в \`X\` случайно попадает колонка, напрямую связанная с ответом.

Это опасно, потому что модель показывает искусственно хорошее качество, которое потом не повторяется в реальной работе.

---

## 2. Метрики

### 6. Что такое accuracy, precision, recall, F1-score? Когда какая метрика важнее?

**Accuracy** — доля правильных ответов среди всех объектов.

**Precision** показывает, насколько модель точна, когда говорит “положительный класс”.

**Recall** показывает, сколько реальных положительных объектов модель смогла найти.

**F1-score** — баланс между precision и recall.

Accuracy подходит при сбалансированных классах, recall важен, когда нельзя пропускать нужные случаи, precision — когда ложные срабатывания дорогие.

---

### 7. Почему accuracy может быть плохой метрикой?

Потому что при дисбалансе классов она может давать ложное ощущение хорошей модели.

Например, если 95% объектов относятся к одному классу, модель может всегда предсказывать только его и получить accuracy 95%, но быть бесполезной.

В таких случаях лучше смотреть precision, recall, F1, ROC-AUC или PR-AUC.

---

### 8. Что такое MAE, MSE, RMSE? Чем они отличаются?

Это метрики для регрессии.

**MAE** — средняя абсолютная ошибка, она показывает, на сколько модель ошибается в среднем.

**MSE** — средняя квадратичная ошибка, сильнее штрафует большие ошибки.

**RMSE** — это корень из MSE, он удобен тем, что возвращается в масштаб исходной величины.

---

### 9. Как выбрать метрику под задачу?

Метрика выбирается не по привычке, а по смыслу бизнеса и типу ошибки.

Если важно не пропускать положительные случаи — нужен recall.

Если важны минимальные ложные срабатывания — precision.

Если задача регрессии и большие ошибки особенно опасны — часто смотрят MSE или RMSE.

Если важна простая интерпретация ошибки — MAE.

---

### 10. Что делать, если метрика на train высокая, а на test заметно хуже?

Это типичный признак переобучения.

Нужно проверить сложность модели, утечки данных, корректность split, качество признаков и объём данных.

Часто помогают упрощение модели, регуляризация, кросс-валидация, больше данных или более аккуратная обработка признаков.

---

## 3. Переобучение и качество модели

### 11. Что такое overfitting и underfitting?

**Overfitting** — модель слишком хорошо запомнила train, но плохо работает на новых данных.

**Underfitting** — модель слишком простая и плохо работает даже на train.

В первом случае модель слишком сложная, во втором — слишком слабая или недообученная.

---

### 12. Как понять, что модель переобучилась?

Обычно качество на train заметно выше, чем на validation или test.

Это значит, что модель хорошо выучила обучающие данные, но плохо обобщает.

Также это видно по нестабильности на новых данных и сильной чувствительности к шуму.

---

### 13. Как можно бороться с переобучением?

Можно упростить модель, уменьшить глубину дерева, добавить регуляризацию, использовать кросс-валидацию, убрать слабые признаки, собрать больше данных.

Для нейросетей ещё применяют dropout и early stopping, но для классического ML чаще важны признаки, регуляризация и контроль сложности модели.

---

### 14. Что такое bias и variance в интуитивном смысле?

**Bias** — ошибка из-за слишком простой модели, которая плохо улавливает закономерность.

**Variance** — ошибка из-за слишком чувствительной модели, которая подстраивается под шум.

Хорошая модель должна находить баланс: не быть слишком простой и не переобучаться на детали train.

---

### 15. Зачем нужна baseline-модель?

Baseline — это простая стартовая точка, с которой сравнивают всё остальное.

Она показывает, действительно ли новая модель даёт улучшение, а не просто выглядит сложнее.

Без baseline легко переоценить результат.

---

## 4. Подготовка данных

### 16. Что делать с пропусками в данных?

Сначала нужно понять, почему пропуски появились и случайны ли они.

Потом можно удалять строки или колонки, заполнять средним, медианой, модой, специальным значением или отдельной категорией.

Иногда сам факт пропуска тоже полезен как признак.

---

### 17. Что делать с категориальными признаками?

Их нужно преобразовать в форму, с которой модель умеет работать.

Часто используют one-hot encoding, ordinal encoding, target encoding или модели, которые сами умеют работать с категориями, например CatBoost.

Выбор зависит от модели и числа уникальных значений.

---

### 18. Когда нужно масштабирование признаков, а когда нет?

Масштабирование нужно моделям, которые чувствительны к масштабу признаков: логистическая регрессия, линейная регрессия, SVM, k-NN, нейросети.

Обычно не нужно для деревьев, random forest и boosting на деревьях.

Главная идея — привести признаки к сопоставимому масштабу там, где это влияет на обучение.

---

### 19. Что такое one-hot encoding? Какие у него ограничения?

One-hot encoding превращает каждую категорию в отдельную бинарную колонку.

Например, признак “город” превращается в набор колонок: Москва, Берлин, Париж.

Ограничение в том, что при большом числе уникальных категорий количество колонок резко растёт, и это делает модель тяжелее и менее устойчивой.

---

### 20. Как понять, какие признаки полезны, а какие нет?

Смотрят на здравый смысл, корреляции, feature importance, permutation importance, SHAP, качество модели с разными наборами признаков.

Также важно понимать предметную область: не все статистически заметные признаки реально допустимы и полезны.

Полезный признак помогает модели улучшать качество без утечки и лишнего шума.

---

## 5. Модели

### 21. Как работает линейная регрессия на базовом уровне?

Линейная регрессия пытается описать зависимость target от признаков через линейную формулу.

Модель подбирает веса признаков так, чтобы предсказания были как можно ближе к реальным значениям.

Это простая и интерпретируемая модель для регрессии.

---

### 22. Как работает логистическая регрессия и почему она называется регрессией, хотя решает классификацию?

Логистическая регрессия сначала считает линейную комбинацию признаков, а потом пропускает её через сигмоиду, чтобы получить вероятность класса.

После этого вероятность переводится в класс по порогу.

Она называется регрессией потому, что внутри у неё линейная модель, но применяется она для классификации.

---

### 23. Как работает Decision Tree?

Decision Tree последовательно делит данные по условиям на признаки, например: возраст < 30, доход > 100000 и так далее.

В каждом узле дерево выбирает разбиение, которое лучше всего разделяет данные.

В итоге предсказание получается по пути от корня до листа.

---

### 24. Почему одно дерево решений часто переобучается?

Потому что дерево может выучить слишком много частных правил под конкретный train.

Если его не ограничивать по глубине и минимальному числу объектов в листе, оно начинает подстраиваться под шум.

Из-за этого на новых данных качество падает.

---

### 25. Что такое Random Forest и чем он лучше одного дерева?

Random Forest — это ансамбль из множества деревьев решений.

Каждое дерево обучается на случайной подвыборке данных и признаков, а итоговое предсказание получается через голосование или усреднение.

Это делает модель устойчивее и обычно уменьшает переобучение по сравнению с одним деревом.

---

### 26. Что такое Gradient Boosting в интуитивном смысле?

Это ансамбль, где деревья строятся последовательно, и каждое новое дерево пытается исправить ошибки предыдущих.

То есть модель обучается шаг за шагом, улучшая текущее решение.

Boosting часто даёт очень сильное качество на табличных данных.

---

### 27. Чем примерно отличаются XGBoost, LightGBM и CatBoost?

Все три — реализации gradient boosting на деревьях.

**XGBoost** — сильная и универсальная классика.

**LightGBM** часто быстрее и хорошо работает на больших данных.

**CatBoost** особенно удобен, когда много категориальных признаков, потому что умеет хорошо работать с ними из коробки.

---

### 28. Когда ты бы выбрал простую модель, а когда более сложную?

Простую модель стоит брать, когда важны интерпретируемость, скорость запуска, baseline или данных мало.

Сложную модель имеет смысл брать, если она реально даёт прирост качества и это важно для задачи.

Выбор всегда должен идти от задачи, данных и цены ошибки, а не от желания взять “модную” модель.

---

## 6. Практика и инженерный слой

### 29. Как бы ты решал задачу ML от начала до конца: от датасета до результата?

Сначала я бы понял постановку задачи и target, потом изучил данные: типы признаков, пропуски, распределения, дисбаланс.

Дальше сделал бы preprocessing, разделил данные на train/validation/test, выбрал baseline и подходящую метрику.

После этого обучил бы несколько моделей, сравнил результаты, проверил переобучение, интерпретировал выводы и выбрал лучший вариант.

В конце — сохранил пайплайн и оформил результат так, чтобы его можно было воспроизвести.

---

### 30. Расскажи про свой ML-проект: какая была задача, какие данные, какую метрику выбрал, какие модели пробовал и почему выбрал итоговую?

Здесь важно отвечать по структуре.

Нужно коротко описать задачу, данные, preprocessing, выбор метрики, baseline, модели, сравнение результатов и финальный вывод.

Хороший ответ показывает не только то, что ты “делал проект”, но и что ты понимаешь, почему принимал именно такие решения.

        priority: 1,
        content: `**Prompt Engineer** — это агент, который превращает размытую идею или сломанный промпт в готовый, рабочий системный промпт.

Ты описываешь задачу — он задаёт уточняющие вопросы только если нужно, декомпозирует цель и выдаёт промпт, который можно сразу использовать.

**Как использовать:**

- Скопируй промпт ниже (кнопка copy)
- Вставь как System Prompt в ChatGPT, Claude или любой другой LLM
- Опиши задачу: "хочу агента для X" — или вставь сломанный промпт для улучшения

---

\`\`\`
Role:
You are a Senior Prompt Engineer. Your job is to turn user requests into
production-ready prompts that work reliably in any LLM-based system
(ChatGPT, Claude, agents, pipelines).

Context:
Users may provide: a vague task description, a broken prompt, a use case,
or a specific agent they are building. Your output is a structured,
testable, reusable prompt — not an explanation or a blog post.

Input:
User provides one of:
- A task description ("I need an agent that does X")
- An existing prompt to improve
- A use case with or without context

Clarification logic:
Before generating, check:
1. Is the goal of the agent clear? (what it does, for whom, in what context)
2. Is the input/output defined or inferable?
3. Are constraints present or inferable from domain?

If 2 or more checks fail → ask the minimum necessary questions (max 3).
If 1 or 0 fail → proceed with stated assumptions noted inline.
Never ask questions when the task is simple and self-contained.

Algorithm:
1. Identify the real goal (not the surface request).
2. Decompose into: role, input, task steps, decision rules, output format,
   edge cases.
3. Write the prompt.
4. Validate: no ambiguity, no conflicting instructions, output is stable
   and parseable, edge cases are handled.
5. If improving an existing prompt: list what was wrong and why, then
   rewrite.

Output format (always in this order, omit sections that are not applicable):

GOAL
[One sentence: what the agent does and for whom]

PROMPT
[The ready-to-use prompt, cleanly formatted]

CHANGES (only when improving an existing prompt)
[Bullet list: what was wrong and what was fixed]

ASSUMPTIONS (only when data was insufficient)
[List of assumptions made; user should verify]

FAILURE MODES
[2-4 ways this prompt can break or produce wrong output, and how to catch it]

Rules:
- Never write a prompt that contains vague instructions ("be helpful", "think carefully").
- Never use emoji in the output prompt.
- Never invent domain constraints — state them as assumptions.
- Keep prompts minimal: include only what affects output quality.
- Separate system behavior from task input.
- Make outputs deterministic and parseable when used in code pipelines.
- If a task is too broad for one prompt, say so and split it.
\`\`\``

        const cleanTitle = s.title.replace(/^Раздел\s+\d+\.\s*/i, '');
        const secNum = String(si + 1).padStart(2, '0');
        h += `<div class="sg${secLocked ? ' sec-locked' : ''} sec-${s.color}" id="sg-${s.id}">
      <div class="sgh" onclick="toggleSec('${s.id}')">
        <span class="sga">▶</span>
        <span class="sgn sgn-${s.color}">${secNum}</span>
        <span class="sgname">${cleanTitle}</span>
        ${secLocked ? '<span class="sg-lk">LCK</span>' : ''}
      </div>
      <div class="ll">`;
        s.lessons.forEach(l => {
          h += `<div class="li${l.locked ? ' lk' : ''}" id="li-${l.id}" onclick="nav('${l.id}')">
        <span class="li-n">${l.num}</span>
        <span class="li-t">${l.short}</span>
        ${l.locked ? '<span class="li-lk">LCK</span>' : '<span class="li-ok">ON</span>'}
      </div>`;
        });
        h += `</div></div>`;
      });
      document.getElementById('sbnav').innerHTML = h;
    }

    function updateSb(id) {
      document.querySelectorAll('.li,.hi').forEach(el => el.classList.remove('act'));
      const t = document.getElementById(id === 'home' ? 'hi-home' : 'li-' + id);
      if (t) {
        t.classList.add('act');
        const group = t.closest('.sg');
        if (group) group.classList.add('open');
        t.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    function toggleSec(id) { document.getElementById('sg-' + id)?.classList.toggle('open'); }
    function toggleSb() { document.getElementById('sb').classList.toggle('open'); document.getElementById('sov').classList.toggle('vis'); }
    function closeSb() { document.getElementById('sb').classList.remove('open'); document.getElementById('sov').classList.remove('vis'); }

    /* ─── SEARCH ─── */
    function setupSearch() {
      const inp = document.getElementById('si'), res = document.getElementById('sr');
      inp.addEventListener('input', () => {
        const q = inp.value.trim().toLowerCase();
        if (!q) { res.classList.remove('vis'); return; }
        const hits = [...ALL, ...PYTHON_ALL].filter(l =>
          l.title.toLowerCase().includes(q) ||
          l.short.toLowerCase().includes(q) ||
          l.section.title.toLowerCase().includes(q)
        ).slice(0, 8);
        res.innerHTML = hits.length
          ? hits.map(l => {
            const t = l.title.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<span class="srh">${m}</span>`);
            return `<div class="sri" onclick="nav('${l.id}')"><div class="sri-t">${t}${l.locked ? ' 🔒' : ''}</div><div class="sri-s">${l.section.title}</div></div>`;
          }).join('')
          : '<div class="sr0">// нет результатов</div>';
        res.classList.add('vis');
      });
      document.addEventListener('click', e => { if (!e.target.closest('.srch')) closeSearch(); });
      inp.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
    }
    function closeSearch() { document.getElementById('sr').classList.remove('vis'); }

    /* ─── MARKDOWN PARSER ─── */
    function mdToHtml(md) {
      if (!md) return '';
      md = md.replace(/^---[\r\n][\s\S]*?[\r\n]---[\r\n]?/, '');
      const cbs = [];
      md = md.replace(/```(\w*)\r?\n([\s\S]*?)```/g, (_, lang, code) => { cbs.push({ lang: lang.trim(), code: code.trimEnd() }); return '\x01CB' + (cbs.length - 1) + '\x01'; });
      const lines = md.split(/\r?\n/), out = []; let i = 0;
      while (i < lines.length) {
        const raw = lines[i], line = raw.trim();
        if (!line) { i++; continue; }
        if (line.startsWith('\x01CB')) { out.push(line); i++; continue; }
        const hm = line.match(/^(#{1,6})\s+([\s\S]+)/);
        if (hm) { out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`); i++; continue; }
        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) { out.push('<hr>'); i++; continue; }
        if (line.startsWith('>')) {
          const qs = [];
          while (i < lines.length && lines[i].trim().startsWith('>')) { qs.push(lines[i].trim().replace(/^>\s?/, '')); i++; }
          out.push(`<blockquote><p>${inl(qs.join(' '))}</p></blockquote>`); continue;
        }
        if (/^[-*+]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*+]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^[-*+]\s/, ''))}</li>`); i++; }
          out.push(`<ul>${items.join('')}</ul>`); continue;
        }
        if (/^\d+[.)]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+[.)]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^\d+[.)]\s/, ''))}</li>`); i++; }
          out.push(`<ol>${items.join('')}</ol>`); continue;
        }
        if (line.startsWith('|') && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
          const trows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) { trows.push(lines[i].trim()); i++; }
          if (trows.length >= 2) {
            const hdr = trows[0].split('|').slice(1, -1).map(c => c.trim());
            const body = trows.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
            let th = '<div class="tw"><table><thead><tr>' + hdr.map(h => `<th>${inl(h)}</th>`).join('') + '</tr></thead><tbody>';
            body.forEach(row => { th += '<tr>' + row.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>'; });
            out.push(th + '</tbody></table></div>');
          }
          continue;
        }
        const pls = [];
        while (i < lines.length) {
          const l = lines[i].trim();
          if (!l || /^#{1,6}\s/.test(l) || /^(-{3,}|\*{3,})$/.test(l) || l.startsWith('>') || /^[-*+]\s/.test(l) || /^\d+[.)]\s/.test(l) || l.startsWith('|') || l.startsWith('\x01CB')) break;
          pls.push(l); i++;
        }
        if (pls.length) out.push(`<p>${inl(pls.join(' '))}</p>`);
      }
      let html = out.join('\n');
      html = html.replace(/\x01CB(\d+)\x01/g, (_, n) => {
        const { lang, code } = cbs[+n];
        return `<div class="cb">${lang ? `<div class="cbl">${esc(lang)}</div>` : ''}<button class="cb-copy" type="button">copy</button><pre><code>${esc(code)}</code></pre></div>`;
      });
      return html;
    }
    function inl(text) {
      if (!text) return '';
      const ics = [];
      text = text.replace(/`([^`]+)`/g, (_, c) => { ics.push(c); return '\x02IC' + (ics.length - 1) + '\x02'; });
      text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="nl" target="_blank">$1</a>');
      text = text.replace(/\x02IC(\d+)\x02/g, (_, n) => `<code class="ic">${esc(ics[+n])}</code>`);
      return text;
    }
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    /* ─── INIT ─── */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.sb-tab').forEach(b => {
        b.classList.toggle('act', b.dataset.tab === CUR_TAB);
      });
      buildSb(); setupSearch();
      document.getElementById('st-p').textContent = `${COURSE.sections.length} МОДУЛЕЙ // ${ALL.length} УРОКОВ`;
      _mbSync(); setMusicVolume(60);
      document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.cb-copy');
        if (!btn) return;
        const codeEl = btn.closest('.cb')?.querySelector('pre code');
        if (!codeEl) return;
        const text = codeEl.textContent || '';
        let ok = false;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            ok = true;
          }
        } catch (err) { }
        if (!ok) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { ok = document.execCommand('copy'); } catch (err) { ok = false; }
          document.body.removeChild(ta);
        }
        const prev = btn.textContent;
        btn.textContent = ok ? 'copied' : 'error';
        if (ok) btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = prev;
          btn.classList.remove('done');
        }, 1200);
      });
      let saved = 'home';
      try { saved = localStorage.getItem('mlroad-cur') || 'home'; } catch (e) { }
      initRp();
      nav(saved);
    });


    /* ─── RIGHT PANEL ─── */

    const CAT_CLASSES = {
      'ML Core': 'rpi-cat-mlcore',
      'Learning Resources': 'rpi-cat-learning',
      'Engineering Tools': 'rpi-cat-engineering',
      'Prompt Library': 'rpi-cat-prompt'
    };

    const CAT_LABELS = {
      'ML Core': 'ML Core',
      'Learning Resources': 'Learning',
      'Engineering Tools': 'Tools',
      'Prompt Library': 'Prompts'
    };

    let rpFilter = 'all';
    let rpOpen = false;

    function catClass(cat) {
      return CAT_CLASSES[cat] || 'rpi-cat-other';
    }

    function buildRp() {
      const cats = ['all', ...new Set(RIGHT_PANEL_DATA.map(i => i.category))];
      const filter = document.getElementById('rp-filter');
      filter.innerHTML = cats.map(c =>
        `<button class="rptab${c === rpFilter ? ' act' : ''}" data-cat="${c}" onclick="filterRp('${c}')">${c === 'all' ? 'ALL' : CAT_LABELS[c] || c}</button>`
      ).join('');
      renderRpList();
    }

    function renderRpList() {
      const items = rpFilter === 'all'
        ? RIGHT_PANEL_DATA
        : RIGHT_PANEL_DATA.filter(i => i.category === rpFilter);
      const sorted = [...items].sort((a, b) => a.priority - b.priority);
      document.getElementById('rp-list').innerHTML = sorted.map(item =>
        `<div class="rpi" id="rpi-${item.id}" onclick="openRpItem('${item.id}')">
          <div class="rpi-top">
            <span class="rpi-cat ${catClass(item.category)}">${CAT_LABELS[item.category] || item.category}</span>
            <span class="rpi-t">${item.title}</span>
          </div>
          <div class="rpi-sum">${item.summary}</div>
        </div>`
      ).join('');
    }

    function filterRp(cat) {
      rpFilter = cat;
      document.querySelectorAll('.rptab').forEach(t => t.classList.toggle('act', t.dataset.cat === cat));
      renderRpList();
    }

    function openRpItem(id) {
      navKb(id);
    }

    function updateRpBtn() {
      const btn = document.getElementById('rp-btn');
      if (!btn) return;
      if (rpOpen) {
        btn.innerHTML = '◂ <span class="rp-toggle-lbl">Скрыть материалы</span>';
        btn.classList.add('act');
      } else {
        btn.innerHTML = '▸ <span class="rp-toggle-lbl">Показать материалы</span>';
        btn.classList.remove('act');
      }
    }

    function toggleRp() {
      rpOpen = !rpOpen;
      const panel = document.getElementById('rp');
      if (rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
      try { localStorage.setItem('mlroad-rp', rpOpen ? '1' : '0'); } catch(e) {}
    }

    function initRp() {
      buildRp();
      let saved = '1';
      try { saved = localStorage.getItem('mlroad-rp') ?? '1'; } catch(e) {}
      rpOpen = saved !== '0';
      const panel = document.getElementById('rp');
      if (rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
    }

    /* ─── MUSIC BAR ─────────────────────────────────── */
    const LOFI_STREAM = 'https://ice1.somafm.com/groovesalad-128-mp3';
    let _mAudio = null, _mPlaying = false, _mReconnTimer = null;

    function _mbSync() {
      const bar  = document.getElementById('music-bar');
      const dot  = document.getElementById('mb-dot');
      const sts  = document.getElementById('mb-status');
      const btn  = document.getElementById('mb-play');
      const sl   = document.getElementById('mb-vol');
      const online = navigator.onLine;
      if (!online) {
        bar.classList.add('is-offline');
        btn.disabled = true;
        dot.className = 'mb-dot';       dot.textContent = '◉';
        sts.className = 'mb-status';    sts.textContent = 'OFFLINE';
        if (_mPlaying && _mAudio) {
          _mAudio.pause(); _mPlaying = false;
          btn.classList.remove('playing'); btn.textContent = '▶ PLAY';
          sl && sl.classList.remove('active');
          _mbSliderColor(sl, false);
        }
        return;
      }
      bar.classList.remove('is-offline');
      btn.disabled = false;
      if (_mPlaying) {
        dot.className = 'mb-dot live';  dot.textContent = '◉';
        sts.className = 'mb-status live'; sts.textContent = 'LIVE';
      } else {
        dot.className = 'mb-dot paused'; dot.textContent = '○';
        sts.className = 'mb-status';    sts.textContent = 'READY';
      }
    }

    function _mbSliderColor(sl, active) {
      if (!sl) return;
      const pct = (sl.value / sl.max) * 100;
      const fill = active ? '#00e5ff' : '#2a5070';
      sl.style.background = `linear-gradient(to right, ${fill} ${pct}%, #0c1e30 ${pct}%)`;
    }

    /* Пересоздаёт Audio и запускает поток заново — fix для stalled/ended */
    function _mStartStream() {
      if (_mAudio) { _mAudio.pause(); _mAudio.src = ''; _mAudio.load(); }
      const sl = document.getElementById('mb-vol');
      _mAudio = new Audio(LOFI_STREAM + '?_=' + Date.now());
      _mAudio.volume = (sl ? sl.value : 60) / 100;

      const _reconnect = () => {
        if (!_mPlaying || !navigator.onLine) return;
        const sts = document.getElementById('mb-status');
        if (sts) { sts.className = 'mb-status'; sts.textContent = 'RECONNECT...'; }
        clearTimeout(_mReconnTimer);
        _mReconnTimer = setTimeout(_mStartStream, 1500);
      };

      _mAudio.addEventListener('ended',  _reconnect);
      _mAudio.addEventListener('stalled', _reconnect);
      _mAudio.addEventListener('error',  _reconnect);
      _mAudio.play().catch(() => {});
    }

    function toggleMusic() {
      if (!navigator.onLine) return;
      const btn = document.getElementById('mb-play');
      const sl  = document.getElementById('mb-vol');
      if (_mPlaying) {
        clearTimeout(_mReconnTimer);
        if (_mAudio) { _mAudio.pause(); _mAudio.src = ''; _mAudio.load(); _mAudio = null; }
        _mPlaying = false;
        btn.classList.remove('playing'); btn.textContent = '▶ PLAY';
        sl && sl.classList.remove('active'); _mbSliderColor(sl, false);
      } else {
        _mPlaying = true;
        btn.classList.add('playing'); btn.textContent = '▐▐ PAUSE';
        sl && sl.classList.add('active'); _mbSliderColor(sl, true);
        _mStartStream();
      }
      _mbSync();
    }

    function setMusicVolume(val) {
      if (_mAudio) _mAudio.volume = val / 100;
      const valEl = document.getElementById('mb-vol-val');
      const sl    = document.getElementById('mb-vol');
      if (valEl) valEl.textContent = val + '%';
      _mbSliderColor(sl, _mPlaying);
    }

    window.addEventListener('online',  _mbSync);
    window.addEventListener('offline', _mbSync);

  </script>
