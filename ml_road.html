<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML ROAD — Offline ML Learning System</title>
  <style>
    :root {
      --bg: #020609;
      --bg2: #050e14;
      --bg3: #091419;
      --border: #0d2a33;
      --border2: #1a4a5e;
      --cyan: #00e5ff;
      --cyan2: #00b8d9;
      --red: #ff4655;
      --green: #00ff9d;
      --orange: #ff9f43;
      --purple: #9b4dff;
      --text: #c8e8f0;
      --text2: #4a8a9e;
      --dim: #1e4a5a;
      --sw: 272px;
      --hh: 56px;
      --font: 'Segoe UI Variable', 'Segoe UI', 'Trebuchet MS', sans-serif;
      --mono: 'SFMono-Regular', 'Consolas', 'Menlo', 'Liberation Mono', monospace
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font);
      background:
        linear-gradient(rgba(0,229,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.018) 1px, transparent 1px),
        radial-gradient(ellipse at 10% 0%, #00e5ff0f 0%, transparent 45%),
        radial-gradient(ellipse at 90% 5%, #9b4dff0a 0%, transparent 38%),
        var(--bg);
      background-size: 44px 44px, 44px 44px, 100% 100%, 100% 100%, 100% 100%;
      color: var(--text);
      line-height: 1.7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--cyan2);
      border-radius: 2px
    }

    /* HEADER */
    #hdr {
      height: var(--hh);
      background: var(--bg2);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 100
    }

    #hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: .5
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex-shrink: 0
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border: 1px solid var(--cyan);
      border-radius: 0;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      box-shadow: 0 0 10px #00e5ff30, inset 0 0 8px #00e5ff10;
      letter-spacing: -1px
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 14px #00e5ff55;
      letter-spacing: 3px
    }

    .logo-sub {
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      line-height: 1;
      margin-top: 2px
    }

    .srch {
      position: relative
    }

    .sb-srch {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border)
    }

    .srch-pre {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      pointer-events: none;
      opacity: .6;
      white-space: nowrap
    }

    #si {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 12px 7px 90px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color .2s
    }

    #si::placeholder {
      color: var(--dim)
    }

    #si:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px #00e5ff28
    }

    #sr {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      z-index: 220;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 32px #00000090, 0 0 20px #00e5ff08
    }

    #sr.vis {
      display: block
    }

    .sri {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s
    }

    .sri:hover {
      background: var(--bg3)
    }

    .sri:last-child {
      border-bottom: none
    }

    .sri-t {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      margin-bottom: 2px
    }

    .sri-s {
      font-size: 10px;
      color: var(--cyan2);
      font-family: var(--mono);
      letter-spacing: 1px;
      opacity: .7
    }

    .srh {
      color: var(--cyan);
      font-weight: 700;
      text-shadow: 0 0 6px #00e5ff60
    }

    .sr0 {
      padding: 16px;
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      font-family: var(--mono)
    }

    .mbtn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-left: auto
    }

    .mbtn:hover {
      border-color: var(--cyan);
      color: var(--cyan)
    }

    /* LAYOUT */
    .lay {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* SIDEBAR */
    #sb {
      width: var(--sw);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: left .3s ease
    }

    .sbh {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .sbh-lbl,
    .sbh-t {
      display: none
    }

    .sbh2 {
      padding: 10px 14px 9px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #00e5ff04
    }

    .sbh2::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 5px var(--cyan);
      flex-shrink: 0
    }

    .sbh2-t {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: .7
    }

    .sbnav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 16px
    }

    .sb-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #00e5ff04
    }

    .sb-tab {
      flex: 1;
      padding: 11px 12px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5a8a98;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s, background .15s, box-shadow .15s
    }

    .sb-tab:last-child { border-right: none }

    .sb-tab.act {
      color: var(--cyan);
      background: #00e5ff0a;
      box-shadow: inset 0 -2px 0 var(--cyan)
    }

    .sb-tab:hover:not(.act) { color: #9fd8e8 }

    .sov {
      display: none;
      position: fixed;
      inset: 0;
      top: var(--hh);
      background: rgba(0, 0, 0, .6);
      z-index: 85
    }

    .sov.vis {
      display: block
    }

    /* HOME ITEM */
    .hi {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      margin-bottom: 4px;
      border-left: 2px solid transparent
    }

    .hi:hover {
      background: var(--bg3)
    }

    .hi.act {
      border-left-color: var(--cyan);
      background: #00e5ff08
    }

    .hi-ic {
      color: var(--cyan);
      font-size: 14px
    }

    .hi-t {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      letter-spacing: .5px
    }

    .hi.act .hi-t {
      color: var(--cyan)
    }

    /* SECTION GROUP */
    .sg {
      margin-bottom: 4px
    }

    .sgh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: background .15s
    }

    .sgh:hover {
      background: #091820
    }

    .sga {
      font-size: 9px;
      color: var(--text2);
      transition: transform .2s;
      flex-shrink: 0
    }

    .sg.open .sga {
      transform: rotate(90deg)
    }

    .sgn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid
    }

    /* section accent colours — unified cyan for module numbers */
    .sgn-c1, .sgn-c2, .sgn-c3, .sgn-c4, .sgn-c5, .sgn-c6,
    .sgn-c7, .sgn-c8, .sgn-c9, .sgn-c10, .sgn-c11 {
      color: #69E2FC;
      background: rgba(105, 226, 252, 0.06);
      border-color: rgba(105, 226, 252, 0.35)
    }

    /* Per-section accent colors: section name — two alternating tones */
    .sg.sec-c1 .sgname,
    .sg.sec-c3 .sgname,
    .sg.sec-c5 .sgname,
    .sg.sec-c7 .sgname,
    .sg.sec-c9 .sgname,
    .sg.sec-c11 .sgname { color: #69E2FC }

    .sg.sec-c2 .sgname,
    .sg.sec-c4 .sgname,
    .sg.sec-c6 .sgname,
    .sg.sec-c8 .sgname,
    .sg.sec-c10 .sgname { color: #69E2FC }

    /* Active module header: highlight with cyan */
    .sg.sg-act .sgname {
      color: #69E2FC;
      text-shadow: 0 0 8px rgba(105, 226, 252, 0.35)
    }

    /* Hover on module header: subtle brightening */
    .sgh:hover .sgname { color: #D6F7FF }

    /* Per-section active lesson — unified cyan for all sections */
    .sg[class*="sec-c"] .li.act { background: rgba(105,226,252,0.03); border-left-color: #69E2FC }
    .sg[class*="sec-c"] .li.act .li-n { color: #69E2FC }
    .sg[class*="sec-c"] .li.act .li-t { color: var(--text) }
    .sg[class*="sec-c"] .li.act::after { background: #69E2FC; box-shadow: 0 0 8px rgba(105,226,252,0.4) }

    .sgname {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .3px;
      color: #a8d8e8;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .ll {
      display: none;
      padding: 0 0 4px
    }

    .sg.open .ll {
      display: block
    }

    .li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 28px;
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent;
      position: relative
    }

    .li:hover {
      background: var(--bg3)
    }

    .li.act {
      background: rgba(105, 226, 252, 0.03);
      border-left-color: #69E2FC
    }

    .li.act::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 14px;
      background: #69E2FC;
      box-shadow: 0 0 8px rgba(105, 226, 252, 0.4);
      border-radius: 0
    }

    .li-n {
      font-family: var(--mono);
      font-size: 11px;
      color: #1e5a6e;
      flex-shrink: 0;
      width: 20px
    }

    .li.act .li-n {
      color: #69E2FC
    }

    .li-t {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .2px;
      color: #6aa8be;
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .li.act .li-t {
      color: var(--text)
    }

    /* MAIN */
    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative
    }

    #main::before {
      content: '';
      position: fixed;
      top: var(--hh);
      left: var(--sw);
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 229, 255, .022) 3px,
        rgba(0, 229, 255, .022) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .ci {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 32px 24px;
      position: relative;
      z-index: 1
    }

    /* BREADCRUMBS */
    .bc {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 24px;
      flex-wrap: wrap
    }

    .bc span,
    .bc a {
      color: var(--text2);
      text-decoration: none;
      cursor: pointer;
      transition: color .15s
    }

    .bc a:hover {
      color: var(--cyan)
    }

    .bc .sep {
      color: var(--dim)
    }

    .bc .cur {
      color: var(--cyan)
    }

    /* HOME */
    .hero {
      padding: 20px 0 0;
      position: relative
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -32px;
      right: -32px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, #00e5ff0d 0%, transparent 70%);
      pointer-events: none
    }

    /* terminal boot panel */
    .hboot {
      background: var(--bg2);
      border: 1px solid var(--border2);
      max-width: 760px;
      margin: 0 auto 18px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px))
    }

    .hboot::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #00e5ff06 0%, transparent 50%);
      pointer-events: none
    }

    .hboot-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      background: #00e5ff06
    }

    .hboot-dot {
      width: 8px;
      height: 8px;
      border: 1px solid var(--cyan);
      background: var(--cyan);
      opacity: .6
    }

    .hboot-dot2 {
      width: 8px;
      height: 8px;
      border: 1px solid var(--red);
      background: var(--red);
      opacity: .5
    }

    .hboot-dot3 {
      width: 8px;
      height: 8px;
      border: 1px solid var(--dim);
      opacity: .4
    }

    .hboot-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      margin-left: 4px
    }

    .hboot-body {
      padding: 20px 24px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center
    }

    .hascii {
      font-family: var(--mono);
      font-size: clamp(22px, 4.5vw, 46px);
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 20px #00e5ff50, 0 0 50px #00e5ff20;
      letter-spacing: 4px;
      line-height: 1;
      animation: glitch 6s infinite
    }

    .hascii-sub {
      font-family: var(--mono);
      font-size: clamp(8px, 1.2vw, 11px);
      color: var(--text2);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: .8
    }

    .hascii-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: .7
    }

    .hsys {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.8;
      border-left: 1px solid var(--border2);
      padding-left: 18px;
      min-width: 160px
    }

    .hsys-row {
      display: flex;
      gap: 6px;
      white-space: nowrap
    }

    .hsys-k {
      color: var(--text2);
      letter-spacing: 1px;
      font-size: 10px
    }

    .hsys-v {
      color: var(--cyan);
      font-size: 10px
    }

    .hsys-v.ok {
      color: var(--green)
    }

    .hsys-v.dim {
      color: var(--dim)
    }

    .hmarq {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: #00e5ff04;
      overflow: hidden;
      margin: 0 auto 16px;
      max-width: 760px
    }

    .hmarq-b {
      margin-top: 10px;
      margin-bottom: 0
    }

    .hmarq-tr {
      display: flex;
      width: max-content;
      animation: marq 90s linear infinite
    }

    .hmarq-b .hmarq-tr {
      animation-direction: reverse;
      animation-duration: 36s
    }

    .hmarq-tx {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      padding: 6px 10px;
      white-space: nowrap;
      opacity: .7
    }


    .hdesc {
      font-size: 14px;
      color: #7ab8cc;
      max-width: 600px;
      line-height: 1.7;
      margin: 16px auto 0;
      font-family: var(--mono);
      text-align: center
    }
    .hdesc p { margin: 0 0 8px }
    .hstart-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s
    }
    .hstart-btn:hover {
      background: var(--cyan);
      color: #000
    }

    .hsecs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px
    }

    .hsc {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px))
    }

    .hsc:hover {
      border-color: var(--border2);
      background: #081318
    }

    .hsc::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 2px;
      height: 100%
    }

    .hsc-c1::before { background: #00e5ff; box-shadow: 0 0 8px #00e5ff }
    .hsc:hover.hsc-c1 { border-color: #00e5ff55; box-shadow: 0 0 16px #00e5ff0a }
    .hsc-c2::before { background: #00cfb4; box-shadow: 0 0 8px #00cfb4 }
    .hsc:hover.hsc-c2 { border-color: #00cfb455 }
    .hsc-c3::before { background: #00ff9d; box-shadow: 0 0 8px #00ff9d }
    .hsc:hover.hsc-c3 { border-color: #00ff9d55 }
    .hsc-c4::before { background: var(--orange); box-shadow: 0 0 8px var(--orange) }
    .hsc:hover.hsc-c4 { border-color: #ff9f4355 }
    .hsc-c5::before { background: var(--red); box-shadow: 0 0 8px var(--red) }
    .hsc:hover.hsc-c5 { border-color: #ff465555 }
    .hsc-c6::before { background: var(--purple); box-shadow: 0 0 8px var(--purple) }
    .hsc:hover.hsc-c6 { border-color: #9b4dff55 }
    .hsc-c7::before { background: #e0a0ff; box-shadow: 0 0 8px #e0a0ff }
    .hsc:hover.hsc-c7 { border-color: #e0a0ff55 }
    .hsc-c8::before { background: #7eb8ff; box-shadow: 0 0 8px #7eb8ff }
    .hsc:hover.hsc-c8 { border-color: #7eb8ff55 }

    .hscn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .hsc-c1 .hscn { color: #00e5ff }
    .hsc-c2 .hscn { color: #00cfb4 }
    .hsc-c3 .hscn { color: #00ff9d }
    .hsc-c4 .hscn { color: var(--orange) }
    .hsc-c5 .hscn { color: var(--red) }
    .hsc-c6 .hscn { color: var(--purple) }
    .hsc-c7 .hscn { color: #e0a0ff }
    .hsc-c8 .hscn { color: #7eb8ff }
    .hsct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3
    }

    .hscd {
      font-size: 11px;
      color: var(--text2);
      font-family: var(--mono)
    }

    .hscls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .hscl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px 6px
    }

    /* COMMUNITY HUD */
    .commblock {
      margin-top: 16px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 0;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px))
    }

    .commblock-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      background: #00e5ff06
    }

    .commblock-hdr-dot {
      width: 6px;
      height: 6px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    .commblock-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .commlinks {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      padding: 10px 12px;
      justify-content: stretch
    }

    .cl {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 8px 14px;
      transition: all .15s;
      text-align: center;
      flex: 1 1 150px;
      margin: 3px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .cl::before {
      content: '>';
      font-family: var(--mono);
      color: var(--cyan);
      opacity: .4;
      font-size: 10px
    }

    .cl:hover {
      background: #00e5ff08;
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px #00e5ff10
    }

    .cl:hover::before {
      opacity: 1
    }

    /* LESSON */
    .lhdr {
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
      position: relative;
      padding-left: 16px;
      border-left: 2px solid var(--cyan);
      box-shadow: -4px 0 12px #00e5ff08
    }

    .lhdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan)
    }

    .lmeta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: .8;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .lmeta::before {
      content: '>';
      color: var(--cyan);
      opacity: .5
    }

    .ltitle {
      font-family: var(--mono);
      font-size: clamp(18px, 2.8vw, 26px);
      font-weight: 700;
      color: #d8f0f8;
      line-height: 1.2
    }

    /* MARKDOWN */
    .lc h1 {
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 700;
      color: #d8f0f8;
      margin: 32px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2)
    }

    .lc h1::before {
      content: '// ';
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      opacity: .7
    }

    .lc h2 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--cyan);
      margin: 24px 0 10px;
      letter-spacing: .5px
    }

    .lc h2::before {
      content: '# ';
      opacity: .5;
      font-family: var(--mono)
    }

    .lc h3 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: #8acde0;
      margin: 18px 0 8px
    }

    .lc h3::before {
      content: '## ';
      color: var(--cyan2);
      font-family: var(--mono);
      font-size: 11px;
      opacity: .5
    }

    .lc h4 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin: 14px 0 6px
    }

    .lc p {
      font-size: 15px;
      color: #9ec8d8;
      line-height: 1.82;
      margin-bottom: 13px
    }

    .lc strong {
      color: #d8f0f8;
      font-weight: 700
    }

    .lc em {
      color: var(--orange);
      font-style: italic
    }

    .lc ul,
    .lc ol {
      margin: 10px 0 14px 22px
    }

    .lc li {
      font-size: 15px;
      color: #9ec8d8;
      line-height: 1.72;
      margin-bottom: 3px
    }

    .lc ul li::marker {
      color: var(--cyan2)
    }

    .lc ol li::marker {
      color: var(--cyan);
      font-family: var(--mono)
    }

    .lc blockquote {
      background: #00e5ff06;
      border-left: 2px solid var(--cyan);
      padding: 12px 18px;
      margin: 18px 0;
      box-shadow: -4px 0 12px #00e5ff08
    }

    .lc blockquote p {
      color: #8acde0;
      font-style: normal;
      font-family: var(--mono);
      font-size: 13px;
      margin: 0
    }

    .lc blockquote strong {
      color: var(--cyan)
    }

    code.ic {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      background: #00ff9d0c;
      border: 1px solid #00ff9d30;
      padding: 1px 6px
    }

    .cb {
      background: #030a0d;
      border: 1px solid var(--border2);
      border-left: 2px solid var(--cyan);
      margin: 14px 0;
      overflow: hidden;
      position: relative;
      box-shadow: -4px 0 14px #00e5ff0a
    }

    .cb::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      opacity: .4
    }

    .cbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      background: #00e5ff08;
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .cbl::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      display: inline-block;
      flex-shrink: 0
    }

    .cb pre {
      padding: 16px;
      overflow-x: auto
    }

    .cb code {
      font-family: var(--mono);
      font-size: 13px;
      color: #7fe8b8;
      line-height: 1.65;
      white-space: pre
    }

    .cb-copy {
      position: absolute;
      top: 7px;
      right: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      transition: .18s ease;
      z-index: 2
    }

    .cb-copy:hover {
      color: var(--cyan);
      border-color: var(--cyan);
      box-shadow: 0 0 8px #00e5ff30;
      background: #00e5ff08
    }

    .cb-copy.done {
      color: var(--green);
      border-color: #00ff9d60;
      background: #00ff9d08
    }

    .tw {
      overflow-x: auto;
      margin: 14px 0
    }

    .lc table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    .lc th {
      background: #00e5ff08;
      color: var(--cyan);
      border: 1px solid var(--border2);
      padding: 8px 12px;
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .lc td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      color: #9ec8d8;
      vertical-align: top;
      font-size: 13px
    }

    .lc tr:nth-child(even) td {
      background: #00e5ff04
    }

    .lc td code,
    .lc th code {
      font-family: var(--mono);
      color: var(--green);
      font-size: 12px
    }

    .lc hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
      position: relative
    }

    .lc hr::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 50px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    a.nl {
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px solid #00e5ff30;
      transition: all .15s
    }

    a.nl:hover {
      color: #fff;
      border-bottom-color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan)
    }

    /* PREV/NEXT */
    .lnav {
      display: flex;
      gap: 12px;
      margin-top: 44px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap
    }

    .nb {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 12px 18px;
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      flex: 1;
      min-width: 180px;
      font-family: var(--mono)
    }

    .nb:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: #00e5ff06;
      box-shadow: 0 0 12px #00e5ff10
    }

    .nb.pr {
      justify-content: flex-start
    }

    .nb.nx {
      justify-content: flex-end
    }

    .nb-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 2px;
      display: block;
      text-transform: uppercase
    }

    .nb:hover .nb-lbl {
      color: var(--cyan2)
    }

    .nb-t {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      max-width: 200px
    }

    /* STATUS */
    .stbar {
      flex-shrink: 0;
      height: 22px;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 18px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      position: relative
    }

    .stbar::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 120px;
      height: 1px;
      background: var(--cyan);
      opacity: .3
    }

    .stitem {
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase
    }

    .stitem-ok {
      color: #2a6878
    }

    .stitem-hi {
      color: var(--cyan);
      opacity: .7
    }

    .stdot {
      width: 5px;
      height: 5px;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {
      0%, 100% { opacity: 1 }
      50% { opacity: .4 }
    }

    /* RESPONSIVE */
    @media(max-width:768px) {
      .mbtn {
        display: block
      }

      .srch {
        max-width: 200px
      }

      #sb {
        position: fixed;
        left: -100%;
        top: var(--hh);
        height: calc(100vh - var(--hh));
        width: 84%;
        max-width: 300px;
        z-index: 90
      }

      #sb.open {
        left: 0
      }

      #main::before {
        left: 0
      }

      .ci {
        padding: 20px 16px 56px
      }

      .htitle {
        font-size: 32px
      }

      .sb-srch {
        padding: 10px 10px 8px
      }

      .lnav {
        flex-direction: column
      }

      .nb {
        min-width: 0
      }

      .logo-sub {
        display: none
      }
    }

    @media(max-width:480px) {
      .logo-text {
        font-size: 13px
      }
    }

    @keyframes glitch {
      0%, 92%, 100% {
        text-shadow: 0 0 20px #00e5ff55, 0 0 50px #00e5ff22;
        transform: none
      }
      93% {
        text-shadow: 2px 0 6px var(--red), -2px 0 6px var(--cyan);
        transform: translateX(1px) skewX(-1deg)
      }
      94% {
        text-shadow: -2px 0 6px var(--red), 2px 0 6px var(--cyan);
        transform: translateX(-1px) skewX(1deg)
      }
      95% {
        text-shadow: 0 0 20px #00e5ff55, 0 0 50px #00e5ff22;
        transform: none
      }
    }

    @keyframes marq {
      0% {
        transform: translateX(0)
      }
      100% {
        transform: translateX(-50%)
      }
    }

    /* ═══════ RIGHT PANEL ═══════ */
    #rp {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg2);
      border-left: 1px solid var(--border2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .25s ease;
      position: relative
    }

    #rp.rp-hidden {
      width: 0;
      border-left: none;
      overflow: hidden
    }

    #rp::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,229,255,.012) 3px,
        rgba(0,229,255,.012) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .rp-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border2);
      background: #00e5ff06;
      flex-shrink: 0;
      position: relative;
      z-index: 1
    }

    .rp-hdr-dot {
      width: 5px;
      height: 5px;
      background: var(--purple);
      box-shadow: 0 0 6px var(--purple);
      flex-shrink: 0
    }

    .rp-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--purple);
      text-transform: uppercase;
      flex: 1
    }

    .rp-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      transition: .15s
    }

    .rp-close:hover {
      border-color: var(--red);
      color: var(--red)
    }

    .rp-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 1
    }

    .rptab {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 7px;
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: .15s;
      background: none
    }

    .rptab:hover {
      border-color: var(--border2);
      color: var(--text)
    }

    .rptab.act {
      border-color: var(--purple);
      color: var(--purple);
      background: #9b4dff10
    }

    .rp-list {
      flex: 1;
      overflow-y: auto;
      position: relative;
      z-index: 1
    }

    .rpi {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent
    }

    .rpi:hover {
      background: #00e5ff05
    }

    .rpi.act {
      background: #9b4dff08;
      border-left-color: var(--purple)
    }

    .rpi-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px
    }

    .rpi-cat {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 1px 5px;
      border: 1px solid
    }

    .rpi-cat-mlcore { color: var(--cyan); border-color: #00e5ff40; background: #00e5ff08 }
    .rpi-cat-learning { color: #00cfb4; border-color: #00cfb440; background: #00cfb408 }
    .rpi-cat-prompt { color: var(--purple); border-color: #9b4dff40; background: #9b4dff08 }
    .rpi-cat-other { color: var(--text2); border-color: var(--border) }

    .rpi-t {
      font-family: var(--mono);
      font-size: 11px;
      color: #8acde0;
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .rpi.act .rpi-t {
      color: var(--text)
    }

    .rpi-sum {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.4;
      margin-top: 3px;
      font-family: var(--mono)
    }

    /* KB page header in central area */
    .kb-hdr {
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
      position: relative;
      padding-left: 16px;
      border-left: 2px solid var(--purple);
      box-shadow: -4px 0 12px #9b4dff08
    }

    .kb-hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 1px;
      background: var(--purple);
      box-shadow: 0 0 8px var(--purple)
    }

    .kb-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
      letter-spacing: .5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .kb-cat-badge {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid #9b4dff60;
      color: var(--purple);
      background: #9b4dff10
    }

    .kb-type-badge {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid var(--border);
      color: var(--text2)
    }

    .kb-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .5px;
      line-height: 1.25;
      margin-bottom: 10px
    }

    .kb-summary {
      font-size: 13px;
      color: #7aaccb;
      line-height: 1.7;
      margin-bottom: 12px
    }

    .kb-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px
    }

    .kb-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      letter-spacing: .5px
    }

    .kb-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 9px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: .15s;
      margin-bottom: 20px
    }

    .kb-back:hover {
      border-color: var(--purple);
      color: var(--purple)
    }

    /* Toggle button in header */
    .rp-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 5px 12px;
      cursor: pointer;
      transition: .15s;
      text-transform: uppercase
    }

    .rp-toggle:hover {
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 8px #9b4dff20
    }

    .rp-toggle.act {
      border-color: var(--purple);
      color: var(--purple);
      background: #9b4dff10
    }

    @media(max-width:1100px) {
      #rp {
        position: fixed;
        right: -320px;
        top: var(--hh);
        bottom: 24px;
        width: 300px !important;
        z-index: 88;
        transition: right .25s ease
      }
      #rp.rp-open {
        right: 0
      }
      #rp.rp-hidden {
        right: -320px
      }
    }

    @media(max-width:768px) {
      .rp-toggle span.rp-toggle-lbl { display: none }
    }

    /* ─── EASTER EGG ─────────────────────────────────── */
    .prog-joke { position: relative; cursor: default }
    .prog-joke::after {
      content: ' в твоей голове';
      position: absolute;
      left: 100%;
      top: 0;
      white-space: nowrap;
      opacity: 0;
      color: #ffc857;
      font-style: italic;
      transition: opacity .4s ease;
    }
    .prog-joke:hover::after { opacity: 1 }

    /* ─── MUSIC BAR ─────────────────────────────────── */
    #music-bar {
      display: flex;

        summary: "Краткий справочник по базовым терминам AI, ML, данным, метрикам и продовому слою.",
        priority: 1,
        content: `# Ключевые термины и краткие объяснения

## 0. Карта направления

### AI — Artificial Intelligence / Искусственный интеллект

Общее название для систем, которые пытаются выполнять задачи, похожие на человеческое мышление.

ML — это одна из частей AI.

### Machine Learning / Машинное обучение

Подход, при котором система не получает все правила вручную, а учится находить закономерности на данных.

Проще говоря: мы показываем примеры, а модель учится делать выводы сама.

### Deep Learning / Глубокое обучение

Это часть ML, где используют большие нейронные сети.

Обычно применяется там, где задачи сложные: картинки, речь, тексты.

### Data Science

Направление про работу с данными: изучение, анализ, поиск закономерностей и построение моделей.

ML — это только одна часть Data Science.

### Model / Модель

Это математическая система, которая учится на данных и потом делает предсказание.

Например: “купит клиент товар или нет”.

### Prediction / Предсказание

Ответ модели на новых данных.

Например: вероятность того, что клиент уйдёт.

### Training / Обучение

Этап, когда модель смотрит на примеры и настраивает себя.

Именно тут она “учится”.

### Inference

Этап, когда уже обученная модель применяется в реальной жизни.

То есть обучение закончилось, и теперь модель просто выдает ответы.

---

## 1. База про данные

### Dataset / Датасет

Это набор данных, на котором мы работаем.

Обычно это таблица, где строки — объекты, а столбцы — их свойства.

### Row / Строка

Одна запись в таблице.

Например, один клиент, один заказ или один товар.

### Column / Колонка

Один признак или одно поле в таблице.

Например: возраст, город, цена.

### Feature / Признак

Это информация, которую мы даём модели на вход.

Именно по признакам модель пытается понять ответ.

### Target / Целевая переменная

Это то, что мы хотим предсказать.

Например: уйдёт клиент или нет, какая будет цена, купит ли человек товар.

### X

Так часто называют все входные признаки модели.

Проще говоря: всё, на что модель смотрит перед ответом.

### y

Так часто называют target — правильный ответ, который модель должна научиться предсказывать.

Например: \`0\` или \`1\`, если это задача “да/нет”.

### Label

Почти то же самое, что target, особенно в задачах классификации.

Это правильный класс или ответ для примера.

### Missing values / Пропуски

Это пустые значения в данных.

Они мешают обучению и часто требуют отдельной обработки.

### Numerical feature / Числовой признак

Признак, который выражен числом.

Например: возраст, зарплата, количество покупок.

### Categorical feature / Категориальный признак

Признак, который описывает категорию, а не число.

Например: город, пол, тип клиента.

---

## 2. Как устроена задача в ML

### Supervised Learning / Обучение с учителем

У модели есть примеры с готовыми правильными ответами.

Она учится по ним предсказывать ответ для новых данных.

### Unsupervised Learning / Обучение без учителя

У модели нет готовых правильных ответов.

Она сама ищет структуру, группы или закономерности в данных.

### Classification / Классификация

Задача, где модель выбирает один из вариантов ответа.

Например: “спам / не спам”, “уйдёт / не уйдёт”.

### Regression / Регрессия

Задача, где модель предсказывает число.

Например: цену квартиры или сумму заказа.

### Clustering / Кластеризация

Задача, где похожие объекты автоматически собираются в группы.

Например: сегменты клиентов по поведению.

### Binary classification

Классификация, где всего два варианта ответа.

Например: “да / нет”.

### Multiclass classification

Классификация, где вариантов ответа больше двух.

Например: определить категорию товара из нескольких классов.

### Baseline

Это очень простое стартовое решение, с которым сравнивают всё остальное.

Нужно, чтобы понять: новая модель реально лучше или просто сложнее.

---

## 3. Разделение данных

### Train set / Обучающая выборка

Часть данных, на которой модель учится.

Это её “учебник”.

### Validation set / Валидационная выборка

Часть данных, на которой мы проверяем модель в процессе работы.

Она помогает сравнивать варианты и настраивать модель.

### Test set / Тестовая выборка

Часть данных для финальной честной проверки.

На ней смотрят, как модель работает на новых данных.

### Split / Разбиение данных

Это разделение датасета на train, validation и test.

Нужно, чтобы обучение и проверка были честными.

### Generalization / Обобщающая способность

Способность модели хорошо работать не только на знакомых данных, но и на новых.

Это одна из главных целей ML.

---

## 4. Как модель учится

### Algorithm / Алгоритм

Это способ, по которому строится модель.

Например: линейная регрессия, дерево решений, нейросеть.

### Parameter / Параметр

Это внутренние настройки модели, которые она подбирает во время обучения.

Именно через них модель “запоминает” найденные закономерности.

### Epoch / Эпоха

Один полный проход модели по всем обучающим данным.

Часто модель обучается много эпох подряд.

### Loss function / Функция потерь

Это число, которое показывает, насколько модель ошибается во время обучения.

Чем меньше loss, тем лучше модель учится на текущем этапе.

### Optimization / Оптимизация

Процесс, в котором модель пытается уменьшить ошибку.

То есть постепенно становится точнее.

### Gradient descent / Градиентный спуск

Один из основных способов уменьшать ошибку модели.

Если очень просто: это метод, который помогает идти в сторону лучшего решения маленькими шагами.

### Learning rate / Скорость обучения

Показывает, насколько большими шагами модель меняет свои настройки.

Слишком большой шаг может мешать обучению, слишком маленький — делать его очень медленным.

---

## 5. Как понять, хороша ли модель

### Metric / Метрика

Это число, по которому мы оцениваем качество модели.

Разные задачи требуют разных метрик.

### Accuracy

Доля правильных ответов из всех ответов.

Полезная метрика, но иногда может обманывать, если классы несбалансированы.

### Precision

Показывает, как часто модель права, когда говорит “да”.

Важна там, где ложные срабатывания дорогие.

### Recall

Показывает, сколько настоящих “да” модель смогла найти.

Важна там, где опасно что-то пропустить.

### F1-score

Это баланс между precision и recall.

Удобно, когда важны оба показателя сразу.

### MAE — Mean Absolute Error

Средняя абсолютная ошибка в числовых задачах.

Показывает, на сколько в среднем модель ошибается.

### MSE — Mean Squared Error

Средняя ошибка, где большие промахи наказываются сильнее.

Часто используется в задачах регрессии.

### RMSE

Это корень из MSE.

Его удобно читать, потому что он ближе к обычному масштабу ошибки.

---

## 6. Что может пойти не так

### Overfitting / Переобучение

Модель слишком хорошо запомнила обучающие данные, но плохо работает на новых.

То есть она “выучила примеры”, а не поняла общий принцип.

### Underfitting / Недообучение

Модель слишком простая или слишком слабо обучена.

Она плохо работает даже на обучающих данных.

### Data leakage / Утечка данных

Ситуация, когда в признаки случайно попадает информация из будущего или почти готовый ответ.

Из-за этого модель кажется умной, хотя на деле проверка нечестная.

### Noise / Шум

Случайные или бесполезные данные, которые не помогают решать задачу.

Они могут мешать модели учиться.

### Outlier / Выброс

Очень необычное значение, сильно отличающееся от остальных.

Иногда это ошибка, а иногда редкий, но реальный случай.

### Imbalanced data / Дисбаланс классов

Ситуация, когда одного класса очень много, а другого очень мало.

Из-за этого модель может научиться игнорировать редкий, но важный класс.

---

## 7. Подготовка данных

### Preprocessing / Предобработка

Подготовка данных перед обучением.

Сюда входит очистка, заполнение пропусков, преобразование типов и другие шаги.

### Encoding / Кодирование категорий

Преобразование текстовых категорий в числовой вид, понятный модели.

Например, чтобы модель могла работать с колонкой “город”.

### One-hot encoding

Способ кодирования категорий, когда каждая категория превращается в отдельную колонку.

Например: Москва, Берлин, Париж — каждая как отдельный признак.

### Scaling / Масштабирование

Приведение числовых признаков к более удобному масштабу.

Это помогает некоторым моделям учиться стабильнее.

### Normalization / Нормализация

Один из способов привести значения к общему диапазону.

Часто используется, когда признаки слишком разные по масштабу.

### Standardization / Стандартизация

Преобразование данных так, чтобы у признака были удобные средние и разброс.

Это тоже помогает ряду моделей работать лучше.

### Feature engineering

Создание или улучшение признаков на основе исходных данных.

Часто хороший feature engineering даёт сильный прирост качества.

### Feature importance

Оценка того, насколько сильно признак влияет на решение модели.

Помогает понять, что для модели действительно важно.

---

## 8. Более глубокий слой

### Neural network / Нейронная сеть

Модель, вдохновлённая идеей работы нейронов.

Хорошо подходит для сложных задач: тексты, картинки, звук.

### Embedding

Способ представить объект в виде набора чисел так, чтобы похожие объекты были ближе друг к другу.

Часто используется для слов, текстов, товаров, пользователей.

### Transformer

Современная архитектура нейросетей, которая особенно хорошо работает с текстом.

Именно на ней построено много LLM.

### LLM — Large Language Model

Большая языковая модель, обученная на огромном количестве текста.

Она умеет понимать запросы и генерировать осмысленный текст.

### Fine-tuning

Дообучение уже готовой модели на своей задаче или своих данных.

Это дешевле и быстрее, чем обучать всё с нуля.

### Prompt

Текстовая инструкция, которую пользователь даёт языковой модели.

От формулировки prompt часто сильно зависит качество ответа.

---

## 9. Продовый слой

### Deployment

Этап, когда модель выкладывают в рабочую систему.

После этого её могут использовать реальные пользователи или сервисы.

### Monitoring

Наблюдение за моделью после запуска.

Нужно, чтобы замечать ошибки, просадку качества и странное поведение.

### Data drift

Ситуация, когда новые данные стали отличаться от тех, на которых модель училась.

Из-за этого качество модели может падать.

### Model drift

Ситуация, когда сама модель со временем начинает работать хуже.

Обычно это видно уже после запуска в реальной среде.

### Retraining

Повторное обучение модели на новых данных.

Нужно, чтобы она не устаревала.

### A/B test

Проверка двух вариантов решения на реальных пользователях.

Помогает понять, какой вариант действительно лучше на практике.`

        content: `# Топ-30 вопросов на Junior ML Engineer

### Краткие ответы, которые помогут на собеседовании

Ниже — не просто список вопросов, а компактная шпаргалка: под каждым вопросом есть ответ, который достаточно точный, чтобы уверенно объяснить тему на собеседовании без лишней воды.

---

## 1. База данных и постановка задачи

### 1. Что такое признаки, target, \`X\` и \`y\`?

**Признаки** — это входные данные, по которым модель делает предсказание.

**Target** — это то, что модель должна предсказать.

Обычно **\`X\`** — это таблица признаков, а **\`y\`** — колонка с правильными ответами.

Например: возраст и стаж — это признаки, а зарплата — target.

---

### 2. Чем отличается классификация от регрессии?

**Классификация** — это когда модель предсказывает класс или категорию: например, спам / не спам.

**Регрессия** — это когда модель предсказывает число: например, цену квартиры или выручку.

Главное отличие — в типе ответа.

---

### 3. Что такое обучающая, валидационная и тестовая выборки?

**Train** используется для обучения модели.

**Validation** нужна для подбора модели и настройки гиперпараметров.

**Test** используется для финальной честной оценки качества на данных, которые модель не видела.

Такое разделение помогает не обманывать себя при оценке.

---

### 4. Почему нельзя оценивать модель на тех же данных, на которых она обучалась?

Потому что модель может просто запомнить эти данные, а не научиться находить общую закономерность.

Тогда качество будет казаться высоким, но на новых данных модель может работать плохо.

Нам важно проверять не запоминание, а способность обобщать.

---

### 5. Что такое data leakage и почему это опасно?

**Data leakage** — это утечка информации из target или будущего в признаки.

Например, когда в \`X\` случайно попадает колонка, напрямую связанная с ответом.

Это опасно, потому что модель показывает искусственно хорошее качество, которое потом не повторяется в реальной работе.

---

## 2. Метрики

### 6. Что такое accuracy, precision, recall, F1-score? Когда какая метрика важнее?

**Accuracy** — доля правильных ответов среди всех объектов.

**Precision** показывает, насколько модель точна, когда говорит “положительный класс”.

**Recall** показывает, сколько реальных положительных объектов модель смогла найти.

**F1-score** — баланс между precision и recall.

Accuracy подходит при сбалансированных классах, recall важен, когда нельзя пропускать нужные случаи, precision — когда ложные срабатывания дорогие.

---

### 7. Почему accuracy может быть плохой метрикой?

Потому что при дисбалансе классов она может давать ложное ощущение хорошей модели.

Например, если 95% объектов относятся к одному классу, модель может всегда предсказывать только его и получить accuracy 95%, но быть бесполезной.

В таких случаях лучше смотреть precision, recall, F1, ROC-AUC или PR-AUC.

---

### 8. Что такое MAE, MSE, RMSE? Чем они отличаются?

Это метрики для регрессии.

**MAE** — средняя абсолютная ошибка, она показывает, на сколько модель ошибается в среднем.

**MSE** — средняя квадратичная ошибка, сильнее штрафует большие ошибки.

**RMSE** — это корень из MSE, он удобен тем, что возвращается в масштаб исходной величины.

---

### 9. Как выбрать метрику под задачу?

Метрика выбирается не по привычке, а по смыслу бизнеса и типу ошибки.

Если важно не пропускать положительные случаи — нужен recall.

Если важны минимальные ложные срабатывания — precision.

Если задача регрессии и большие ошибки особенно опасны — часто смотрят MSE или RMSE.

Если важна простая интерпретация ошибки — MAE.

---

### 10. Что делать, если метрика на train высокая, а на test заметно хуже?

Это типичный признак переобучения.

Нужно проверить сложность модели, утечки данных, корректность split, качество признаков и объём данных.

Часто помогают упрощение модели, регуляризация, кросс-валидация, больше данных или более аккуратная обработка признаков.

---

## 3. Переобучение и качество модели

### 11. Что такое overfitting и underfitting?

**Overfitting** — модель слишком хорошо запомнила train, но плохо работает на новых данных.

**Underfitting** — модель слишком простая и плохо работает даже на train.

В первом случае модель слишком сложная, во втором — слишком слабая или недообученная.

---

### 12. Как понять, что модель переобучилась?

Обычно качество на train заметно выше, чем на validation или test.

Это значит, что модель хорошо выучила обучающие данные, но плохо обобщает.

Также это видно по нестабильности на новых данных и сильной чувствительности к шуму.

---

### 13. Как можно бороться с переобучением?

Можно упростить модель, уменьшить глубину дерева, добавить регуляризацию, использовать кросс-валидацию, убрать слабые признаки, собрать больше данных.

Для нейросетей ещё применяют dropout и early stopping, но для классического ML чаще важны признаки, регуляризация и контроль сложности модели.

---

### 14. Что такое bias и variance в интуитивном смысле?

**Bias** — ошибка из-за слишком простой модели, которая плохо улавливает закономерность.

**Variance** — ошибка из-за слишком чувствительной модели, которая подстраивается под шум.

Хорошая модель должна находить баланс: не быть слишком простой и не переобучаться на детали train.

---

### 15. Зачем нужна baseline-модель?

Baseline — это простая стартовая точка, с которой сравнивают всё остальное.

Она показывает, действительно ли новая модель даёт улучшение, а не просто выглядит сложнее.

Без baseline легко переоценить результат.

---

## 4. Подготовка данных

### 16. Что делать с пропусками в данных?

Сначала нужно понять, почему пропуски появились и случайны ли они.

Потом можно удалять строки или колонки, заполнять средним, медианой, модой, специальным значением или отдельной категорией.

Иногда сам факт пропуска тоже полезен как признак.

---

### 17. Что делать с категориальными признаками?

Их нужно преобразовать в форму, с которой модель умеет работать.

Часто используют one-hot encoding, ordinal encoding, target encoding или модели, которые сами умеют работать с категориями, например CatBoost.

Выбор зависит от модели и числа уникальных значений.

---

### 18. Когда нужно масштабирование признаков, а когда нет?

Масштабирование нужно моделям, которые чувствительны к масштабу признаков: логистическая регрессия, линейная регрессия, SVM, k-NN, нейросети.

Обычно не нужно для деревьев, random forest и boosting на деревьях.

Главная идея — привести признаки к сопоставимому масштабу там, где это влияет на обучение.

---

### 19. Что такое one-hot encoding? Какие у него ограничения?

One-hot encoding превращает каждую категорию в отдельную бинарную колонку.

Например, признак “город” превращается в набор колонок: Москва, Берлин, Париж.

Ограничение в том, что при большом числе уникальных категорий количество колонок резко растёт, и это делает модель тяжелее и менее устойчивой.

---

### 20. Как понять, какие признаки полезны, а какие нет?

Смотрят на здравый смысл, корреляции, feature importance, permutation importance, SHAP, качество модели с разными наборами признаков.

Также важно понимать предметную область: не все статистически заметные признаки реально допустимы и полезны.

Полезный признак помогает модели улучшать качество без утечки и лишнего шума.

---

## 5. Модели

### 21. Как работает линейная регрессия на базовом уровне?

Линейная регрессия пытается описать зависимость target от признаков через линейную формулу.

Модель подбирает веса признаков так, чтобы предсказания были как можно ближе к реальным значениям.

Это простая и интерпретируемая модель для регрессии.

---

### 22. Как работает логистическая регрессия и почему она называется регрессией, хотя решает классификацию?

Логистическая регрессия сначала считает линейную комбинацию признаков, а потом пропускает её через сигмоиду, чтобы получить вероятность класса.

После этого вероятность переводится в класс по порогу.

Она называется регрессией потому, что внутри у неё линейная модель, но применяется она для классификации.

---

### 23. Как работает Decision Tree?

Decision Tree последовательно делит данные по условиям на признаки, например: возраст < 30, доход > 100000 и так далее.

В каждом узле дерево выбирает разбиение, которое лучше всего разделяет данные.

В итоге предсказание получается по пути от корня до листа.

---

### 24. Почему одно дерево решений часто переобучается?

Потому что дерево может выучить слишком много частных правил под конкретный train.

Если его не ограничивать по глубине и минимальному числу объектов в листе, оно начинает подстраиваться под шум.

Из-за этого на новых данных качество падает.

---

### 25. Что такое Random Forest и чем он лучше одного дерева?

Random Forest — это ансамбль из множества деревьев решений.

Каждое дерево обучается на случайной подвыборке данных и признаков, а итоговое предсказание получается через голосование или усреднение.

Это делает модель устойчивее и обычно уменьшает переобучение по сравнению с одним деревом.

---

### 26. Что такое Gradient Boosting в интуитивном смысле?

Это ансамбль, где деревья строятся последовательно, и каждое новое дерево пытается исправить ошибки предыдущих.

То есть модель обучается шаг за шагом, улучшая текущее решение.

Boosting часто даёт очень сильное качество на табличных данных.

---

### 27. Чем примерно отличаются XGBoost, LightGBM и CatBoost?

Все три — реализации gradient boosting на деревьях.

**XGBoost** — сильная и универсальная классика.

**LightGBM** часто быстрее и хорошо работает на больших данных.

**CatBoost** особенно удобен, когда много категориальных признаков, потому что умеет хорошо работать с ними из коробки.

---

### 28. Когда ты бы выбрал простую модель, а когда более сложную?

Простую модель стоит брать, когда важны интерпретируемость, скорость запуска, baseline или данных мало.

Сложную модель имеет смысл брать, если она реально даёт прирост качества и это важно для задачи.

Выбор всегда должен идти от задачи, данных и цены ошибки, а не от желания взять “модную” модель.

---

## 6. Практика и инженерный слой

### 29. Как бы ты решал задачу ML от начала до конца: от датасета до результата?

Сначала я бы понял постановку задачи и target, потом изучил данные: типы признаков, пропуски, распределения, дисбаланс.

Дальше сделал бы preprocessing, разделил данные на train/validation/test, выбрал baseline и подходящую метрику.

После этого обучил бы несколько моделей, сравнил результаты, проверил переобучение, интерпретировал выводы и выбрал лучший вариант.

В конце — сохранил пайплайн и оформил результат так, чтобы его можно было воспроизвести.

---

### 30. Расскажи про свой ML-проект: какая была задача, какие данные, какую метрику выбрал, какие модели пробовал и почему выбрал итоговую?

Здесь важно отвечать по структуре.

Нужно коротко описать задачу, данные, preprocessing, выбор метрики, baseline, модели, сравнение результатов и финальный вывод.

Хороший ответ показывает не только то, что ты “делал проект”, но и что ты понимаешь, почему принимал именно такие решения.

---

## Как использовать эту статью для подготовки

Лучший способ — не просто читать ответы, а проговаривать их вслух.

Для каждого вопроса попробуй сделать 3 шага:

1. дать короткое определение;
2. объяснить, зачем это нужно на практике;
3. привести маленький пример.

Так ответы перестанут быть заученными и начнут звучать как твои.

Следующим шагом можно собрать вторую статью: **“Топ-30 вопросов по ML Engineer Junior — но уже в формате живых ответов на собеседовании”**.`

        content: `**Prompt Engineer** — это агент, который превращает размытую идею или сломанный промпт в готовый, рабочий системный промпт.

Ты описываешь задачу — он задаёт уточняющие вопросы только если нужно, декомпозирует цель и выдаёт промпт, который можно сразу использовать.

**Как использовать:**

- Скопируй промпт ниже (кнопка copy)
- Вставь как System Prompt в ChatGPT, Claude или любой другой LLM
- Опиши задачу: "хочу агента для X" — или вставь сломанный промпт для улучшения

---

\`\`\`
Role:
You are a Senior Prompt Engineer. Your job is to turn user requests into
production-ready prompts that work reliably in any LLM-based system
(ChatGPT, Claude, agents, pipelines).

Context:
Users may provide: a vague task description, a broken prompt, a use case,
or a specific agent they are building. Your output is a structured,
testable, reusable prompt — not an explanation or a blog post.

Input:
User provides one of:
- A task description ("I need an agent that does X")
- An existing prompt to improve
- A use case with or without context

Clarification logic:
Before generating, check:
1. Is the goal of the agent clear? (what it does, for whom, in what context)
2. Is the input/output defined or inferable?
3. Are constraints present or inferable from domain?

If 2 or more checks fail → ask the minimum necessary questions (max 3).
If 1 or 0 fail → proceed with stated assumptions noted inline.
Never ask questions when the task is simple and self-contained.

Algorithm:
1. Identify the real goal (not the surface request).
2. Decompose into: role, input, task steps, decision rules, output format,
   edge cases.
3. Write the prompt.
4. Validate: no ambiguity, no conflicting instructions, output is stable
   and parseable, edge cases are handled.
5. If improving an existing prompt: list what was wrong and why, then
   rewrite.

Output format (always in this order, omit sections that are not applicable):

GOAL
[One sentence: what the agent does and for whom]

PROMPT
[The ready-to-use prompt, cleanly formatted]

CHANGES (only when improving an existing prompt)
[Bullet list: what was wrong and what was fixed]

ASSUMPTIONS (only when data was insufficient)
[List of assumptions made; user should verify]

FAILURE MODES
[2-4 ways this prompt can break or produce wrong output, and how to catch it]

Rules:
- Never write a prompt that contains vague instructions ("be helpful", "think carefully").
- Never use emoji in the output prompt.
- Never invent domain constraints — state them as assumptions.
- Keep prompts minimal: include only what affects output quality.
- Separate system behavior from task input.
- Make outputs deterministic and parseable when used in code pipelines.
- If a task is too broad for one prompt, say so and split it.
\`\`\``

      const t = document.getElementById(id === 'home' ? 'hi-home' : 'li-' + id);

        t.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
      document.querySelectorAll('.li').forEach(el => {
        const lid = el.id.replace('li-', '');
        const prog = el.querySelector('.li-prog');
        if (!prog) return;
        if (getReadSet(lid).has(lid)) {
          prog.textContent = '✓';
          prog.style.borderColor = 'var(--green)';
          prog.style.color = 'var(--green)';
          prog.style.background = 'rgba(0,255,157,.08)';
        } else {
          prog.textContent = '';
          prog.style.borderColor = 'var(--dim)';
          prog.style.color = '';
          prog.style.background = '';
        }
      });

    function closeSb() { document.getElementById('sb').classList.remove('open'); document.getElementById('sov').classList.remove('vis'); }

    /* ─── SEARCH ─── */
    function setupSearch() {
      const inp = document.getElementById('si'), res = document.getElementById('sr');
      inp.addEventListener('input', () => {
        const q = inp.value.trim().toLowerCase();
        if (!q) { res.classList.remove('vis'); return; }
        const hits = [...ALL, ...PYTHON_ALL].filter(l =>
          l.title.toLowerCase().includes(q) ||
          l.short.toLowerCase().includes(q) ||
          l.section.title.toLowerCase().includes(q) ||
          (SEARCH_INDEX[l.id] && SEARCH_INDEX[l.id].includes(q))
        ).slice(0, 8);
        res.innerHTML = hits.length
          ? hits.map(l => {
            const safeTitle = esc(l.title);
            const t = safeTitle.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<span class="srh">${m}</span>`);
            const inContent = !(l.title.toLowerCase().includes(q) || l.short.toLowerCase().includes(q) || l.section.title.toLowerCase().includes(q));
            return `<div class="sri" onclick="nav('${l.id}')"><div class="sri-t">${t}</div><div class="sri-s">${esc(l.section.title)}${inContent ? ' <span style="opacity:.6">// найдено в тексте урока</span>' : ''}</div></div>`;
          }).join('')
          : '<div class="sr0">// нет результатов</div>';

      document.addEventListener('click', e => { if (!e.target.closest('.srch')) closeSearch(); });
      inp.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
    }
    function closeSearch() { document.getElementById('sr').classList.remove('vis'); }

    /* ─── MARKDOWN PARSER ─── */
    function mdToHtml(md) {
      if (!md) return '';
      md = md.replace(/^---[\r\n][\s\S]*?[\r\n]---[\r\n]?/, '');
      const cbs = [];
      md = md.replace(/```(\w*)\r?\n([\s\S]*?)```/g, (_, lang, code) => { cbs.push({ lang: lang.trim(), code: code.trimEnd() }); return '\x01CB' + (cbs.length - 1) + '\x01'; });
      const lines = md.split(/\r?\n/), out = []; let i = 0;
      while (i < lines.length) {
        const raw = lines[i], line = raw.trim();
        if (!line) { i++; continue; }
        if (line.startsWith('\x01CB')) { out.push(line); i++; continue; }
        const hm = line.match(/^(#{1,6})\s+([\s\S]+)/);
        if (hm) { out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`); i++; continue; }
        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) { out.push('<hr>'); i++; continue; }
        if (line.startsWith('>')) {
          const qs = [];
          while (i < lines.length && lines[i].trim().startsWith('>')) { qs.push(lines[i].trim().replace(/^>\s?/, '')); i++; }
          out.push(`<blockquote><p>${inl(qs.join(' '))}</p></blockquote>`); continue;
        }
        if (/^[-*+]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*+]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^[-*+]\s/, ''))}</li>`); i++; }
          out.push(`<ul>${items.join('')}</ul>`); continue;
        }
        if (/^\d+[.)]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+[.)]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^\d+[.)]\s/, ''))}</li>`); i++; }
          out.push(`<ol>${items.join('')}</ol>`); continue;
        }
        if (line.startsWith('|') && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
          const trows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) { trows.push(lines[i].trim()); i++; }
          if (trows.length >= 2) {
            const hdr = trows[0].split('|').slice(1, -1).map(c => c.trim());
            const body = trows.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
            let th = '<div class="tw"><table><thead><tr>' + hdr.map(h => `<th>${inl(h)}</th>`).join('') + '</tr></thead><tbody>';
            body.forEach(row => { th += '<tr>' + row.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>'; });
            out.push(th + '</tbody></table></div>');
          }
          continue;
        }
        out.push(`<p>${inl(line)}</p>`);
        i++;
      }
      let html = out.join('\n');
      html = html.replace(/\x01CB(\d+)\x01/g, (_, n) => {
        const { lang, code } = cbs[+n];
        return `<div class="cb">${lang ? `<div class="cbl">${esc(lang)}</div>` : ''}<button class="cb-copy" type="button">copy</button><pre><code>${esc(code)}</code></pre></div>`;
      });
      return html;
    }

    function inl(text) {
      if (!text) return '';
      const ics = [], links = [];
      text = text.replace(/`([^`]+)`/g, (_, c) => { ics.push(c); return '\x02IC' + (ics.length - 1) + '\x02'; });
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
        links.push({ label, href });
        return '\x02LK' + (links.length - 1) + '\x02';
      });
      text = esc(text);
      text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      text = text.replace(/\x02LK(\d+)\x02/g, (_, n) => {
        const { label, href } = links[+n];
        return `<a href="${safeHref(href)}" class="nl" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`;
      });
      text = text.replace(/\x02IC(\d+)\x02/g, (_, n) => `<code class="ic">${esc(ics[+n])}</code>`);
      return text;
    }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function escAttr(s) { return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function safeHref(href) {
      const raw = String(href || '').trim();
      if (/^(https?:|mailto:)/i.test(raw)) return escAttr(raw);
      return '#';
    }

    /* ─── INIT ─── */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.sb-tab').forEach(b => {
        b.classList.toggle('act', b.dataset.tab === CUR_TAB);
      });
      buildSb(); setupSearch();
      document.querySelectorAll('[id^="cdata-"]').forEach(el => {
        const id = el.id.replace('cdata-', '');
        SEARCH_INDEX[id] = el.textContent.replace(/\s+/g, ' ').trim().toLowerCase();
      });
      document.getElementById('st-p').textContent = `${COURSE.sections.length} МОДУЛЕЙ // ${ALL.length} УРОКОВ`;
      _mbBuildChannels(); _mbSync(); setMusicVolume(60);
      document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.cb-copy');
        if (!btn) return;
        const codeEl = btn.closest('.cb')?.querySelector('pre code');
        if (!codeEl) return;
        const text = codeEl.textContent || '';
        let ok = false;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            ok = true;
          }
        } catch (err) { }
        if (!ok) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { ok = document.execCommand('copy'); } catch (err) { ok = false; }
          document.body.removeChild(ta);
        }
        const prev = btn.textContent;
        btn.textContent = ok ? 'copied' : 'error';
        if (ok) btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = prev;
          btn.classList.remove('done');
        }, 1200);

      try { saved = localStorage.getItem('mlroad-cur') || 'home'; } catch (e) { }

    /* ─── RIGHT PANEL ─── */

    const CAT_CLASSES = {
      'ML Core': 'rpi-cat-mlcore',
      'Learning Resources': 'rpi-cat-learning',
      'Prompt Library': 'rpi-cat-prompt'

    const CAT_LABELS = {
      'ML Core': 'ML Core',
      'Learning Resources': 'Learning',
      'Prompt Library': 'Prompts'
    };

    let rpFilter = 'all';
    let rpOpen = false;

    function catClass(cat) {
      return CAT_CLASSES[cat] || 'rpi-cat-other';
    }

    function buildRp() {
      const cats = ['all', ...new Set(RIGHT_PANEL_DATA.map(i => i.category))];

      filter.innerHTML = cats.map(c =>

      renderRpList();

    function renderRpList() {
      const items = rpFilter === 'all'
        ? RIGHT_PANEL_DATA
        : RIGHT_PANEL_DATA.filter(i => i.category === rpFilter);
