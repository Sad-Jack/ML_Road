# 47. Что делать с несбалансированными классами

## Зачем это нужно

Зная, что дисбаланс есть, нужно уметь с ним бороться. Существует несколько практичных техник, которые работают в разных ситуациях. Правильный выбор метода может превратить бесполезную модель в рабочую без сбора новых данных.

## Простая интуиция

Представьте, что у вас 1000 фото собак и 10 фото кошек для обучения классификатора. Вы можете либо скопировать фото кошек несколько раз (oversampling), либо случайно выбросить часть фото собак (undersampling), либо сказать алгоритму: «ошибка на кошке в 100 раз дороже ошибки на собаке» (class_weight).

## Что это такое

- **Oversampling** — увеличение minority class: дублирование примеров или генерация синтетических (SMOTE)
- **Undersampling** — уменьшение majority class: случайное удаление примеров
- **class_weight** — параметр в sklearn, увеличивающий штраф за ошибки на редком классе
- **SMOTE** (Synthetic Minority Over-sampling Technique) — создаёт новые синтетические примеры путём интерполяции
- **Threshold tuning** — изменение порога классификации (по умолчанию 0.5) для баланса precision/recall

## Как это работает

```python
from sklearn.linear_model import LogisticRegression

# Метод 1: class_weight="balanced" — первое что пробуем, ничего не меняет в данных
model = LogisticRegression(class_weight="balanced")
model.fit(X_train, y_train)

# Метод 2: порог классификации (по умолчанию 0.5)
probs = model.predict_proba(X_test)[:, 1]
y_pred = (probs >= 0.3).astype(int)  # снижаем порог → больше recall, меньше precision

# Метод 3: SMOTE — генерация синтетических примеров (pip install imbalanced-learn)
# from imblearn.over_sampling import SMOTE
# X_res, y_res = SMOTE().fit_resample(X_train, y_train)
```

## Как это связано с ML

Выбор метода балансировки зависит от задачи: в медицине критичен recall, в спам-фильтрации важен precision. class_weight — это первое, что стоит попробовать: просто, быстро, без изменения данных.

# 48. Гиперпараметры модели

## Зачем это нужно

Гиперпараметры — это рычаги управления моделью, которые задаются до обучения. Правильный выбор может превратить слабую модель в сильную. Неправильный — даже мощный алгоритм сделает бесполезным. Понимание того, что такое гиперпараметры и как они влияют на модель, обязательно для любого ML-практика.

## Простая интуиция

Представьте, что модель — это кофемашина. Параметры — это количество молотого кофе, которое она определяет сама в процессе приготовления. Гиперпараметры — это температура воды, давление, время заваривания: вы устанавливаете их вручную до того, как машина начинает работу.

## Что это такое

- **Параметры модели** — то, что модель учит из данных (веса нейросети, коэффициенты линейной регрессии)
- **Гиперпараметры** — то, что задаёте вы до обучения (нельзя выучить из данных напрямую)
- Примеры гиперпараметров:
  -  — максимальная глубина дерева решений
  -  — количество деревьев в Random Forest
  -  — размер шага в градиентном спуске
  -  — сила регуляризации в SVM и логистической регрессии
  -  — количество соседей в kNN

## Как это работает

```python
from sklearn.ensemble import RandomForestClassifier

# Гиперпараметры задаются ДО обучения — не выучиваются из данных
model = RandomForestClassifier(
    n_estimators=100,    # количество деревьев
    max_depth=5,         # глубина каждого дерева (управляет bias-variance)
    min_samples_leaf=2,  # минимум объектов в листе (регуляризация)
    random_state=42
)
model.fit(X_train, y_train)

# Параметры модели (веса деревьев) — обновляются автоматически при .fit()
# Гиперпараметры — задаёте вы и не меняются при обучении
```

## Как это связано с ML

Выбор гиперпараметров напрямую управляет балансом bias-variance. Подбор гиперпараметров вручную неэффективен — следующий урок посвящён автоматическому поиску через Grid Search и Random Search.

- Подбор вручную неэффективен — нужен систематический поиск

# 49. Grid Search и Random Search

## Зачем это нужно

Ручной подбор гиперпараметров — это угадывание. Grid Search и Random Search делают этот процесс систематическим и воспроизводимым. Без автоматического поиска практик тратит часы на то, что алгоритм делает за минуты.

## Простая интуиция

Grid Search — это как попробовать каждое блюдо в меню ресторана, чтобы найти любимое. Вы гарантированно найдёте лучшее, но потратите много времени. Random Search — выбрать 10 случайных блюд. Вы с высокой вероятностью найдёте хорошее блюдо намного быстрее.

## Что это такое

- **GridSearchCV** — перебирает все комбинации заданных гиперпараметров, оценивает каждую через кросс-валидацию
- **RandomizedSearchCV** — перебирает случайное подмножество комбинаций из заданного распределения
- **CV** (Cross-Validation) — каждая комбинация оценивается на нескольких фолдах для надёжности
- **param_grid** — словарь с гиперпараметрами и их значениями для перебора
- **best_params_** — лучшая найденная комбинация
- **best_score_** — лучший средний score по кросс-валидации

## Как это работает

```python
from sklearn.ensemble import RandomForestClassifier
from sklearn.model_selection import GridSearchCV

# Grid Search: перебирает все комбинации (3 × 3 = 9 вариантов)
param_grid = {"n_estimators": [50, 100, 200], "max_depth": [3, 5, None]}
grid = GridSearchCV(RandomForestClassifier(), param_grid, cv=5, n_jobs=-1)
grid.fit(X_train, y_train)
print("Лучшие параметры:", grid.best_params_)
print("CV score:", round(grid.best_score_, 3))

# Random Search: быстрее при большом пространстве — не перебирает все комбинации
# RandomizedSearchCV(..., n_iter=20) — случайно выбирает 20 комбинаций
```

## Как это связано с ML

Grid Search и Random Search — стандартный инструмент в пайплайне ML. Сначала применяют Random Search с широкими диапазонами, затем Grid Search для точной настройки. Современная альтернатива — Bayesian Optimization (optuna).

- RandomizedSearchCV перебирает случайное подмножество — быстрее, часто сопоставимо по качеству

# 50. Error Analysis

## Зачем это нужно

Метрики говорят вам, насколько хороша модель. Error Analysis говорит, почему она ошибается и что делать дальше. Без анализа ошибок разработчик не знает, куда направить усилия: собирать данные, менять признаки или улучшать алгоритм.

## Простая интуиция

Представьте учителя, проверяющего контрольные. Он мог бы просто поставить оценки и двигаться дальше. Но хороший учитель смотрит на ошибки: «10 студентов не поняли задачи на дроби, 5 — на проценты». Зная паттерн ошибок, он знает, что объяснить заново. Так же работает error analysis в ML.

## Что это такое

- **Error Analysis** — ручной или автоматический просмотр неправильных предсказаний для поиска паттернов
- **False Positives (FP)** — модель предсказала 1, а было 0 (ложная тревога)
- **False Negatives (FN)** — модель предсказала 0, а было 1 (пропущенный случай)
- **Confusion Matrix** — матрица ошибок, показывающая все 4 типа предсказаний
- **Паттерны ошибок** — категории или характеристики объектов, на которых модель систематически ошибается

## Как это работает

```python
y_pred = model.predict(X_test)

# Все ошибки
errors_mask = (y_pred != y_test)
print(f"Ошибок: {errors_mask.sum()} из {len(y_test)}")

# Разделить на типы
fp_mask = (y_pred == 1) & (y_test == 0)  # ложная тревога
fn_mask = (y_pred == 0) & (y_test == 1)  # пропущенный случай
print(f"FP: {fp_mask.sum()}, FN: {fn_mask.sum()}")

# Следующий шаг: изучить X_test[errors_mask]
# На каких объектах модель ошибается систематически?
```

## Как это связано с ML

Error Analysis замыкает цикл улучшения модели. Систематические ошибки на подгруппах сигнализируют о нужных новых признаках, случайные ошибки — о возможном пределе данных.

## Практика

1. Что такое Error Analysis и в чём его ключевое преимущество перед просмотром только агрегированных метрик?

# 51. Обучение без учителя

## Зачем это нужно

В реальных задачах разметка данных — это дорого и долго. Иногда меток просто нет: вы хотите понять структуру данных, найти группы клиентов или обнаружить аномалии. Именно здесь применяется обучение без учителя — один из трёх фундаментальных подходов в ML.

## Простая интуиция

Представьте, что вы разбираете шкаф с вещами и раскладываете их по стопкам: зимнее, летнее, спортивное. Никто не говорил вам, как разложить — вы сами нашли похожие вещи и сгруппировали их. Это и есть обучение без учителя: найти структуру там, где нет заранее заданных ответов.

## Что это такое

- **Unsupervised learning** — класс алгоритмов ML, работающих с данными без меток
- Основные задачи:
  - **Кластеризация** — разбить объекты на похожие группы (K-Means, DBSCAN)
  - **Снижение размерности** — сжать данные, сохранив структуру (PCA, t-SNE)
  - **Обнаружение аномалий** — найти объекты, сильно отличающиеся от остальных
  - **Генеративные модели** — научиться генерировать новые похожие объекты (VAE, GAN)
- В отличие от supervised learning, нет «правильного ответа» для проверки

## Как это работает

```python
from sklearn.cluster import KMeans
import numpy as np

# X — данные без меток, просто точки в пространстве
# Задача: найти 3 кластера без знания y

kmeans = KMeans(n_clusters=3, random_state=42, n_init=10)
labels = kmeans.fit_predict(X)

unique, counts = np.unique(labels, return_counts=True)
print("Кластер → размер:", dict(zip(unique, counts)))
# {0: 102, 1: 98, 2: 100} — три примерно равных кластера
```

## Как это связано с ML

Unsupervised learning часто используется как шаг предобработки: кластеризация для создания признаков, снижение размерности перед обучением, обнаружение аномалий для очистки данных. Это не альтернатива supervised learning, а дополнение к нему.

# 52. K-Means

## Зачем это нужно

K-Means — самый популярный алгоритм кластеризации. Он прост, быстр и даёт интерпретируемые результаты. Используется для сегментации клиентов, сжатия изображений, создания признаков и анализа данных. Понимание K-Means открывает двери в мир unsupervised learning.

## Простая интуиция

Представьте, что вы расставляете 3 флага на карте городов. Каждый город «идёт» к ближайшему флагу. Потом флаги перемещаются в центры своих групп. И так по кругу, пока флаги не перестанут двигаться. Флаги — это центроиды, города — точки данных.

## Что это такое

- **K-Means** — алгоритм, разбивающий данные на K кластеров, минимизируя расстояния внутри кластеров
- **K** — число кластеров, задаётся вручную
- **Центроид** — среднее значение всех точек в кластере
- **Инерция (inertia)** — сумма квадратов расстояний от точек до их центроидов (чем меньше, тем лучше)
- **Метод локтя (Elbow method)** — подбор оптимального K по графику инерции

## Как это работает

```python
from sklearn.cluster import KMeans

kmeans = KMeans(n_clusters=4, random_state=42, n_init=10)
kmeans.fit(X)

labels = kmeans.predict(X)
print("Центроиды:", kmeans.cluster_centers_.round(2))
print("Инерция:", round(kmeans.inertia_, 1))

# Метод локтя: обучаем K-Means для K=1..10, строим inertia[K]
# Ищем "перегиб" — точку, где снижение инерции резко замедляется
# inertia[1] >> inertia[4] ≈ inertia[5]  →  оптимальное K ≈ 4
```

## Как это связано с ML

K-Means часто используется для создания признаков (cluster_id как новый признак), сегментации пользователей, инициализации других алгоритмов. Его ограничение — предположение о сферической форме кластеров и чувствительность к выбросам.

## Краткий итог

- K-Means итеративно назначает точки к ближайшему центроиду и пересчитывает центроиды
- K нужно задавать вручную, метод локтя помогает выбрать оптимальное значение
- Алгоритм предполагает сферические кластеры одинакового размера

# 53. DBSCAN

## Зачем это нужно

K-Means требует задавать K заранее и плохо работает с кластерами нестандартных форм. DBSCAN решает обе проблемы: автоматически определяет число кластеров и умеет находить кластеры произвольной формы. Плюс — выявляет выбросы как отдельный класс.

## Простая интуиция

Представьте, что вы идёте по городу и собираете людей в группы. Правило простое: если рядом (в радиусе eps) стоит достаточно людей (min_samples), — это плотная зона, часть кластера. Одиночки в пустынных местах — это выбросы. Вы не знаете заранее, сколько будет групп — они формируются сами.

## Что это такое

- **DBSCAN** (Density-Based Spatial Clustering of Applications with Noise) — алгоритм кластеризации на основе плотности
- **eps** — радиус окрестности: насколько близко должны быть точки
- **min_samples** — минимальное количество точек в радиусе eps для формирования плотной зоны
- **Основные точки** (core points) — точки с достаточным числом соседей
- **Граничные точки** — в eps-окрестности основной точки, но сами не основные
- **Шум (noise)** — точки, не принадлежащие ни одному кластеру (метка -1)

## Как это работает

```python
from sklearn.cluster import DBSCAN
import numpy as np

# DBSCAN находит кластеры произвольной формы без заданного K
dbscan = DBSCAN(eps=0.3, min_samples=5)
labels = dbscan.fit_predict(X)

# -1 = шум (outlier), остальные — номер кластера
n_clusters = len(set(labels)) - (1 if -1 in labels else 0)
print(f"Кластеров: {n_clusters}, шумовых точек: {(labels == -1).sum()}")

# eps слишком мало → всё шум; eps слишком велико → один большой кластер
```

## Как это связано с ML

DBSCAN хорошо подходит для обнаружения аномалий (шумовые точки = аномалии) и для данных с нестандартной геометрией. Его слабость — подбор eps и min_samples требует понимания данных, плохо масштабируется на очень большие датасеты.

# 54. Снижение размерности

## Зачем это нужно

Реальные датасеты часто имеют сотни и тысячи признаков. Это проблема: многие признаки коррелируют, модели переобучаются, визуализация невозможна. Снижение размерности помогает сжать данные, убрать шум и понять их структуру.

## Простая интуиция

Представьте, что вы фотографируете 3D-объект. Фотография — это 2D-проекция 3D-объекта. Вы теряете одно измерение, но сохраняете главную информацию о форме. Снижение размерности делает то же самое с данными: проецирует их из многомерного пространства в пространство меньшей размерности.

## Что это такое

- **Проклятие размерности** — в высоких измерениях данные становятся разреженными, расстояния теряют смысл, модели нуждаются в экспоненциально больше данных
- **Линейные методы** — PCA, SVD: ищут линейные комбинации признаков
- **Нелинейные методы** — t-SNE, UMAP: сохраняют нелинейную структуру данных
- **Автоэнкодеры** — нейросети, сжимающие и восстанавливающие данные
- Цели снижения размерности: визуализация, ускорение обучения, борьба с переобучением, сжатие

## Как это работает

```python
from sklearn.decomposition import PCA
from sklearn.preprocessing import StandardScaler
import numpy as np

# Нормализация обязательна перед снижением размерности!
scaler = StandardScaler()
X_scaled = scaler.fit_transform(X_train)  # fit только на train

pca = PCA()
pca.fit(X_scaled)

# Накопленная объяснённая дисперсия — сколько компонент нужно?
cumsum = np.cumsum(pca.explained_variance_ratio_)
n_95 = np.searchsorted(cumsum, 0.95) + 1
print(f"Для 95% дисперсии: {n_95} компонент из {X.shape[1]}")
```

## Как это связано с ML

Снижение размерности применяется в двух сценариях: (1) визуализация — чтобы понять структуру данных; (2) предобработка — чтобы улучшить качество или скорость downstream модели. Важно: снижать размерность нужно только на train данных, потом применять трансформацию к test.

## Краткий итог

- PCA — линейный метод, создающий переиспользуемую трансформацию
- t-SNE и UMAP — нелинейные методы для визуализации, не для предобработки
- Нормализация перед снижением размерности обязательна

# 55. PCA простыми словами

## Зачем это нужно

PCA (Principal Component Analysis) — самый распространённый метод снижения размерности. Он используется в сотнях задач: сжатие изображений, анализ геномных данных, визуализация, борьба с переобучением. Понимание PCA открывает один из ключевых инструментов data science.

## Простая интуиция

Представьте тени от предметов. Если поставить лампу под правильным углом, тень от 3D-объекта сохранит максимум информации о его форме. PCA находит такой «угол освещения» для ваших данных — направление, в котором данные наиболее «разбросаны», и проецирует их туда.

## Что это такое

- **PCA** — метод, находящий линейные комбинации признаков (главные компоненты) с максимальной дисперсией
- **Главные компоненты (PC)** — новые оси, ортогональные друг другу, упорядоченные по убыванию объяснённой дисперсии
- **Explained variance ratio** — доля общей дисперсии, объяснённая каждой компонентой
- **n_components** — сколько компонент оставить
- PCA — это SVD (Singular Value Decomposition) матрицы данных

## Как это работает

```python
from sklearn.decomposition import PCA
from sklearn.preprocessing import StandardScaler

# Обязательно: нормализуем ПЕРЕД PCA (fit только на train!)
scaler = StandardScaler()
X_scaled = scaler.fit_transform(X_train)

# Вариант 1: задать число компонент вручную
pca = PCA(n_components=2)
X_pca = pca.fit_transform(X_scaled)
print(f"Объяснённая дисперсия: {pca.explained_variance_ratio_.round(3)}")
print(f"Итого: {pca.explained_variance_ratio_.sum():.1%}")

# Вариант 2: задать долю сохранённой дисперсии
pca_95 = PCA(n_components=0.95)  # автовыбор числа компонент
X_95 = pca_95.fit_transform(X_scaled)
print(f"Компонент для 95%: {pca_95.n_components_}")
```

## Как это связано с ML

PCA используется в ML-пайплайне двумя способами: (1) перед обучением — уменьшить размерность, убрать шум, ускорить обучение; (2) для визуализации — спроецировать данные в 2D для понимания структуры. Важно: PCA обучается только на train, трансформируется и train, и test.

2. Как правильно использовать PCA в ML-пайплайне, чтобы избежать data leakage?

- Обучайте PCA только на train, затем применяйте трансформацию к train и test
- Выбор n_components через explained_variance_ratio_: обычно 90-95% дисперсии достаточно

# 56. t-SNE и UMAP

## Зачем это нужно

PCA линеен и не всегда хорошо разделяет сложные структуры данных. t-SNE и UMAP — нелинейные методы, созданные специально для визуализации высокоразмерных данных. Они помогают увидеть кластеры, паттерны и аномалии, которые PCA скрывает.

## Простая интуиция

Представьте карту метро. Реальные расстояния между станциями не важны — важно, какие станции находятся рядом по линиям. t-SNE делает то же самое: сохраняет «кто рядом с кем» в исходном пространстве, пренебрегая глобальными расстояниями. UMAP делает это быстрее и лучше сохраняет глобальную структуру.

## Что это такое

- **t-SNE** (t-distributed Stochastic Neighbor Embedding) — минимизирует расстояния между похожими точками в 2D
- **UMAP** (Uniform Manifold Approximation and Projection) — более быстрая и масштабируемая альтернатива t-SNE
- **perplexity** — параметр t-SNE, контролирующий «количество соседей» (обычно 5-50)
- **n_neighbors** — параметр UMAP, аналогичный perplexity
- Оба метода **недетерминированы** и не создают переиспользуемой трансформации для новых данных

## Как это работает

```python
from sklearn.manifold import TSNE
from sklearn.preprocessing import StandardScaler

scaler = StandardScaler()
X_scaled = scaler.fit_transform(X)

# t-SNE: нелинейное сжатие до 2D для визуализации
tsne = TSNE(n_components=2, perplexity=30, random_state=42)
X_2d = tsne.fit_transform(X_scaled)
print(f"{X.shape} → {X_2d.shape}")

# UMAP: быстрее и лучше масштабируется (pip install umap-learn)
# X_2d = umap.UMAP(n_components=2, random_state=42).fit_transform(X_scaled)

# Внимание: оба метода не создают переиспользуемой трансформации для новых данных!
```

## Как это связано с ML

t-SNE и UMAP — инструменты **разведочного анализа** (EDA), а не предобработки. Используйте их чтобы понять: разделимы ли классы в данных? Есть ли явные кластеры? Есть ли выбросы? Эти вопросы важно задать до начала моделирования.

4. Из урока 54 мы знаем, что PCA создаёт переиспользуемую трансформацию, применимую к новым данным. Почему t-SNE не обладает этим свойством и как это ограничивает его применение в production?

## Краткий итог

- t-SNE и UMAP — нелинейные методы визуализации для понимания структуры данных
- Используйте для EDA, не для предобработки
- UMAP быстрее t-SNE и лучше масштабируется
- Всегда фиксируйте random_state для воспроизводимости

# 57. Поиск аномалий

## Зачем это нужно

Аномалии встречаются везде: мошеннические транзакции, сбои оборудования, ошибки в данных, кибератаки. Часто у нас нет размеченных примеров аномалий — только нормальные данные. Поиск аномалий без разметки — задача unsupervised learning с огромным практическим значением.

## Простая интуиция

Представьте охранника в толпе. Большинство людей ходят похожими маршрутами. Человек, который бегает зигзагами, стоит подозрительно долго в одном месте или появляется в неожиданное время — аномалия. Охранник выучил «нормальное» поведение и замечает отклонения.

## Что это такое

- **Аномалия (выброс, outlier)** — объект, значительно отличающийся от остальных
- **Типы аномалий**:
  - *Точечные* — отдельная точка далеко от основного облака
  - *Контекстуальные* — нормальное значение в ненормальном контексте (жара зимой)
  - *Коллективные* — группа точек аномальна вместе
- **Статистические методы** — Z-score, IQR: простые пороговые правила
- **ML методы** — Isolation Forest, Local Outlier Factor (LOF), AutoEncoder
- **Задача**: обычно есть только нормальные данные, аномалии — редкие или отсутствуют в обучении

## Как это работает

```python
import numpy as np
from sklearn.ensemble import IsolationForest

# Подход 1: статистика (Z-score) — только для одномерных данных
z_scores = np.abs((X - X.mean()) / X.std())
print(f"Z-score аномалий: {(z_scores > 3).sum()}")

# IQR — ещё один простой одномерный метод
Q1, Q3 = np.percentile(X, [25, 75])
outliers_iqr = ((X < Q1 - 1.5*(Q3-Q1)) | (X > Q3 + 1.5*(Q3-Q1))).sum()
print(f"IQR аномалий: {outliers_iqr}")

# Подход 2: ML (Isolation Forest) — работает в многомерных данных
iso = IsolationForest(contamination=0.02, random_state=42)
labels = iso.fit_predict(X_multi)   # -1 = аномалия, 1 = норма
print(f"Isolation Forest аномалий: {(labels == -1).sum()}")
```

## Как это связано с ML

Поиск аномалий — часть preprocessing (очистка данных) и самостоятельная задача (fraud detection, мониторинг). Результаты можно использовать как признак (is_anomaly) для supervised моделей. Выбор порога contamination — ключевой гиперпараметр, требующий экспертного знания.

- Статистические методы (Z-score, IQR) просты, но работают только в 1D
- ML методы (Isolation Forest, LOF) лучше в многомерных данных
- Ключевой параметр: contamination — ожидаемая доля аномалий

# 58. Isolation Forest

## Зачем это нужно

Isolation Forest — один из самых эффективных и популярных алгоритмов обнаружения аномалий. Он работает быстро, масштабируется на большие данные и хорошо справляется с многомерными данными. Понимание его принципа помогает правильно настраивать и интерпретировать результаты.

## Простая интуиция

Представьте игру: вы произвольно разрезаете прямоугольник вертикальными и горизонтальными линиями. Чтобы изолировать одиночную точку-аномалию вдали от основного облака, нужно мало разрезов. Чтобы изолировать точку внутри плотного облака — много разрезов. Аномалии «изолируются» быстрее — в этом суть алгоритма.

## Что это такое

- **Isolation Forest** — ансамбль случайных деревьев, каждое из которых случайно делит данные
- **Путь изоляции** — количество разрезов, нужных чтобы «поймать» объект в одиночестве
- Аномалии имеют **короткий путь изоляции**: их легко отделить от остальных
- **Anomaly score** — нормализованная длина пути; ближе к 1 = аномалия, к 0.5 = нормальный
- **contamination** — гиперпараметр, задающий ожидаемую долю аномалий

## Как это работает

```python
from sklearn.ensemble import IsolationForest

iso_forest = IsolationForest(
    n_estimators=100,    # деревьев в ансамбле
    contamination=0.05,  # ожидаемая доля аномалий
    random_state=42
)
iso_forest.fit(X_train)

# -1 = аномалия, 1 = нормальный объект
labels = iso_forest.predict(X)
print(f"Аномалий: {(labels == -1).sum()}")

# Численный скор аномальности (чем выше — тем аномальнее)
scores = -iso_forest.score_samples(X)
```

## Как это связано с ML

Isolation Forest хорошо интегрируется в ML-пайплайн: как шаг очистки данных (удаление выбросов перед обучением), как источник признака (добавить anomaly_score как числовой признак), или как самостоятельная production-система мониторинга.

## Практика

2. Что такое `contamination` в Isolation Forest и как этот параметр влияет на результат?
3. Вы анализируете логи сервера: 1 миллион строк, подозреваете менее 1% атак. Как настроить Isolation Forest и как оценить его работу в отсутствие размеченных данных?
4. Из урока 26 мы знаем, что Random Forest — ансамбль деревьев решений для классификации. Как Isolation Forest использует ту же идею ансамбля, но с совершенно другой целью?

## Краткий итог

- Isolation Forest изолирует аномалии через случайные разрезы — аномалии изолируются быстрее
- contamination — ключевой параметр, определяющий порог между нормой и аномалией
- Хорошо масштабируется на большие данные и высокую размерность
- Результат (-1/1) или аномальный score можно использовать как признак в downstream задачах

# 84. Коллаборативная фильтрация

## Зачем это нужно

Netflix рекомендует тебе фильм, которого ты никогда не искал. Spotify ставит трек, который тебе понравится, хотя ты его не знаешь. Основа большинства таких систем — коллаборативная фильтрация: алгоритм не смотрит на содержание фильма или трека, он смотрит на поведение людей с похожими вкусами.

## Простая интуиция

Ты приходишь к другу с похожим вкусом в кино и спрашиваешь: «что посмотреть?» Он говорит: «только что видел вот это — тебе точно понравится». Он не описывает фильм — он опирается на то, что вы любите похожее. Именно так работает коллаборативная фильтрация: вместо одного друга — тысячи пользователей с похожим поведением.

## Что это такое

Коллаборативная фильтрация — подход, при котором система ищет пользователей с похожим поведением и рекомендует то, что им понравилось.

Два варианта:
- **User-based** — находим пользователей, похожих на целевого, и рекомендуем то, что им понравилось
- **Item-based** — находим объекты, похожие на те, что уже понравились пользователю, и рекомендуем их

## Как это работает

В основе — матрица «пользователь × объект». Строки — пользователи, столбцы — фильмы (товары, треки), ячейки — оценки. Знак `?` — то, что пользователь ещё не видел. Задача системы — предсказать, какую оценку поставил бы пользователь, и рекомендовать объекты с высокими предсказаниями.

| | Фильм A | Фильм B | Фильм C | Фильм D |
|---|---|---|---|---|
| Андрей | 5 | 4 | **?** | 1 |
| Мария  | 5 | 3 | 4 | **?** |
| Иван   | **?** | 4 | 5 | 2 |

Андрей и Мария оба высоко оценили фильм A → они похожи. Мария поставила фильму C оценку 4 → рекомендуем фильм C Андрею. Мария и Иван оценили фильмы B и C схоже → они похожи → фильм D Иван оценил на 2 → Марии его не рекомендуем.

Важно: алгоритм не знает ничего о содержании фильмов. Он видит только числа в матрице.

## Как это связано с ML

Коллаборативная фильтрация — классика рекомендательных систем. Чем больше данных о поведении пользователей, тем точнее система. Главное ограничение — не работает для новых пользователей и новых объектов, у которых ещё нет истории (об этом подробнее в уроке 88).

## Практика

1. В чём разница между user-based и item-based коллаборативной фильтрацией?
2. Посмотри на таблицу выше. Кому из пользователей ты бы рекомендовал фильм A и почему?
3. Что означают знаки `?` в матрице — что с ними делает система?

## Краткий итог

- Коллаборативная фильтрация ищет похожих пользователей (или объекты) и рекомендует на основе их поведения
- В основе — матрица «пользователь × объект» с оценками или взаимодействиями
- Алгоритм предсказывает значения `?` — оценки для объектов, которые пользователь ещё не видел
- Не требует знания характеристик объектов — только данных о поведении
- Чем больше данных, тем точнее; плохо работает для новых пользователей и новых объектов

# 85. Контентная фильтрация

## Зачем это нужно

Что если пользователь новый и его история пустая? Что если товар только что добавили и никто его ещё не оценивал? Коллаборативная фильтрация в таких случаях беспомощна. Контентная фильтрация решает это иначе — она смотрит не на поведение людей, а на характеристики самих объектов.

## Простая интуиция

Ты только что посмотрел «Интерстеллар» и он тебе понравился. Библиотекарь не знает других зрителей с твоим вкусом, зато знает про фильм: научная фантастика, сложный сюжет, Кристофер Нолан. Он ищет другие фильмы с похожими характеристиками — «Начало», «Довод» — и рекомендует их. Это контентная фильтрация.

## Что это такое

Контентная фильтрация — подход, при котором система рекомендует объекты, похожие по своим характеристикам на те, что уже понравились пользователю. Вместо «что делали похожие пользователи» — «что похоже на то, что тебе нравится».

## Как это работает

Каждый объект описывается набором признаков. Система ищет объекты с похожим набором признаков.

| Фильм | sci-fi | драма | боевик | длительность (мин) |
|---|:---:|:---:|:---:|---:|
| Интерстеллар | 1 | 1 | 0 | 169 |
| Начало | 1 | 0 | 1 | 148 |
| Довод | 1 | 0 | 1 | 150 |
| Форрест Гамп | 0 | 1 | 0 | 142 |

«Начало» и «Довод» похожи на «Интерстеллар» по набору признаков → рекомендуем их. «Форрест Гамп» — другие жанры, несмотря на высокий рейтинг → не рекомендуем.

Признаки могут быть любыми: жанр, автор, теги, описание (текст), длительность, год выпуска.

## Как это связано с ML

Контентная фильтрация хорошо работает для новых объектов: у фильма есть жанр и описание с первого дня, не нужно ждать оценок. Главное ограничение — нужно хорошо описать объекты признаками. Также подход может создавать «пузырь»: пользователь получает только похожее на то, что уже видел, и никогда не открывает новое.

5. В каких ситуациях контентная фильтрация подходит лучше, чем коллаборативная?

## Краткий итог

- Контентная фильтрация рекомендует объекты, похожие по характеристикам на то, что уже понравилось
- Каждый объект описывается набором признаков; система ищет объекты с похожими признаками
- Не требует данных о других пользователях — работает даже для нового пользователя
- Хорошо подходит для новых объектов, у которых ещё нет истории оценок
- Ограничение: создаёт «пузырь» — рекомендует только похожее, не открывает новое

# 86. Explicit vs Implicit Feedback

## Зачем это нужно

Прежде чем строить рекомендательную систему, нужно ответить на вопрос: а что вообще значит «пользователю понравилось»? От ответа зависит, какие данные ты собираешь и как интерпретируешь сигналы.

## Простая интуиция

Когда ты ставишь фильму 5 звёзд — ты явно говоришь: «понравилось». Это прямой сигнал. Но когда ты смотришь сериал три часа подряд без остановки — ты тоже говоришь «нравится», только не словами, а поведением. Первое — explicit, второе — implicit.

## Что это такое

**Explicit feedback (явная обратная связь)** — пользователь напрямую выражает своё отношение:
- Оценка от 1 до 5
- Лайк / дизлайк
- Письменный отзыв

**Implicit feedback (неявная обратная связь)** — поведение пользователя, из которого делается вывод:
- Просмотр товара
- Клик
- Покупка
- Время на странице
- Досмотрел ли видео до конца

## Как это работает

В реальных системах почти всегда доминирует implicit — пользователи редко ставят оценки, зато постоянно кликают, смотрят и покупают.

| Сигнал | Тип | Что означает |
|---|---|---|
| Оценка 5 звёзд | Explicit | Точно понравилось |
| Оценка 1 звезда | Explicit | Точно не понравилось |
| Покупка | Implicit | Скорее всего понравилось |
| Просмотрел 95% видео | Implicit | Скорее всего понравилось |
| Открыл и закрыл через 3 сек | Implicit | Скорее всего не понравилось |
| Не кликнул на товар | Implicit | Неизвестно — не видел или не заинтересовало? |

Главная сложность implicit: **отсутствие взаимодействия ≠ «не понравилось»**. Пользователь просто мог не увидеть объект.

## Как это связано с ML

Большинство реальных систем строятся на implicit feedback, потому что его на порядки больше. Но интерпретировать его сложнее: сигналы зашумлены, один клик не гарантирует интерес. Поэтому системы комбинируют несколько сигналов — не просто «кликнул», а «кликнул + смотрел долго + вернулся».

## Практика

1. В чём принципиальная разница между explicit и implicit feedback?
2. Spotify не просит оценивать каждый трек. Какие implicit-сигналы он, скорее всего, использует?
3. Почему «пользователь не кликнул на товар» — слабый сигнал? Придумай ситуацию, когда это не означает «не интересно».
4. У тебя интернет-магазин. Ты можешь собирать: просмотр товара, добавление в корзину, покупку, возврат. Расставь эти сигналы от слабого к сильному по тому, насколько они говорят «понравилось».
5. Почему explicit feedback точнее, но его всегда меньше? В каком продукте пользователи охотнее оставляют явные оценки?

## Краткий итог

- Explicit feedback — пользователь явно выражает отношение: оценки, лайки, отзывы
- Implicit feedback — выводы из поведения: клики, просмотры, покупки, время на странице
- В реальных системах почти всегда преобладает implicit — его на порядки больше
- Главная сложность implicit: отсутствие взаимодействия не означает «не понравилось»
- Хорошие системы комбинируют несколько сигналов, а не опираются на один

# 87. Гибридные системы

## Зачем это нужно

Коллаборативная фильтрация плохо работает для новых пользователей и новых объектов. Контентная создаёт «пузырь» и не учитывает скрытые предпочтения. В реальных продуктах — Netflix, Spotify, YouTube — ни один подход не используется в одиночку. Их комбинируют.

## Простая интуиция

Netflix знает: ты смотришь много триллеров (поведение → collaborative), тебе нравятся фильмы с Нолана (характеристики → content-based), сейчас вечер пятницы и ты на телевизоре, а не на телефоне (контекст). Итоговый список рекомендаций — результат всех этих сигналов вместе.

## Что это такое

Гибридная рекомендательная система — комбинация нескольких подходов для получения более точных и разнообразных рекомендаций. Чаще всего объединяют коллаборативную и контентную фильтрацию, иногда добавляют контекстные сигналы.

## Как это работает

Три основных способа комбинировать подходы:

**1. Взвешенный** — каждый подход даёт оценку, итог — взвешенная сумма:

`финальная оценка = 0.6 × CF_оценка + 0.4 × CB_оценка`

**2. Переключающийся** — выбираем подход в зависимости от ситуации:

| Ситуация | Подход |
|---|---|
| Новый пользователь (нет истории) | Content-based |
| Новый объект (нет оценок) | Content-based |
| Есть история у пользователя и объекта | Collaborative filtering |

**3. Каскадный** — один подход фильтрует, второй ранжирует:
- Сначала CB отбирает объекты, похожие по характеристикам
- Потом CF расставляет их по вероятности понравиться конкретному пользователю

**Пример: Spotify**

| Ситуация | Что использует |
|---|---|
| Новый трек без истории прослушиваний | Анализ звука (content-based) |
| Популярный трек с историей | Поведение похожих слушателей (collaborative) |
| Discover Weekly | Смешивает CF + CB + контекст |

## Как это связано с ML

Реальные промышленные системы используют десятки сигналов одновременно. Выбор архитектуры — это бизнес-решение: какие данные доступны, сколько новых пользователей, насколько важна новизна рекомендаций.

## Практика

1. Почему ни коллаборативная, ни контентная фильтрация в одиночку не дают наилучший результат?
2. Какой подход лучше использовать для нового пользователя без истории и почему?
3. Spotify добавил новый трек, который никто ещё не слушал. Как гибридная система может его рекомендовать?
4. В чём разница между взвешенным и переключающимся гибридом? Когда каждый из них предпочтительнее?
5. Мини-кейс: интернет-магазин электроники. Данные: история покупок, описания товаров (категория, бренд, характеристики), текущая страница. Какой гибридный подход ты бы выбрал?

## Краткий итог

- Гибридные системы комбинируют несколько подходов — чаще всего CF + CB
- Три способа комбинировать: взвешенный, переключающийся, каскадный
- Реальные системы (Netflix, Spotify) используют десятки сигналов одновременно
- Переключающийся гибрид — хорошее решение проблемы холодного старта
- Выбор архитектуры зависит от данных, задачи и бизнес-требований

# 88. Холодный старт

## Зачем это нужно

Любая рекомендательная система сталкивается с одной проблемой с первого дня: новый пользователь, новый объект, или вообще новая система — и рекомендовать нечего, потому что данных нет. Это называется проблема холодного старта, и с ней обязательно нужно уметь работать.

## Простая интуиция

Ты пришёл в новый книжный магазин. Продавец тебя не знает. Он не может порекомендовать «то, что нравится таким же как ты» — понятия не имеет, какой ты. Что он делает? Спрашивает: «что вы обычно читаете?» или показывает бестселлеры. Это и есть решения холодного старта.

## Что это такое

Проблема холодного старта — невозможность сделать качественные рекомендации из-за отсутствия данных.

Три вида:
- **Новый пользователь** — только что зарегистрировался, нет истории взаимодействий
- **Новый объект** — только что добавили товар или фильм, никто его ещё не видел
- **Новая система** — продукт только запустился, данных нет ни у кого

## Как это работает

**Для нового пользователя:**
- Онбординг-вопросы при регистрации: «какие жанры любишь?», «выбери 5 артистов»
- Показывать популярное — всегда работает как базовое решение
- Использовать демографические данные (если есть): возраст, страна
- Content-based: рекомендовать популярное в категории, которую смотрит прямо сейчас

**Для нового объекта:**
- Content-based с первого дня: у товара уже есть категория, описание, бренд
- Специально показывать новинку широкой аудитории, чтобы быстро собрать данные
- Использовать похожие объекты с историей как замену

**Для новой системы:**
- Начать с простых правил: популярное, топ по категориям
- Content-based до накопления достаточной истории

## Как это связано с ML

Холодный старт — одна из главных практических проблем рекомендательных систем. Именно поэтому реальные системы гибридные: коллаборативная фильтрация включается только тогда, когда накоплено достаточно данных. До этого работает content-based или популярность.

## Практика

1. Объясни три вида холодного старта своими словами. В чём разница между ними?
2. Spotify только что добавил новый альбом. Как система может его рекомендовать, если его ещё никто не слушал?
3. Пользователь только что зарегистрировался на маркетплейсе. Что можно рекомендовать ему на главной странице в первый визит?
4. Почему онбординг-вопросы при регистрации («выбери любимые жанры») — это решение холодного старта, а не просто красивый UI?
5. Мини-кейс: стриминговый сервис запустился неделю назад. 10 000 пользователей, 5 000 фильмов, но история просмотров очень маленькая. Какую стратегию рекомендаций ты выбрал бы прямо сейчас и почему?

## Краткий итог

- Холодный старт — невозможность рекомендовать из-за отсутствия данных
- Три вида: новый пользователь, новый объект, новая система
- Для нового пользователя: онбординг-вопросы, популярное, content-based
- Для нового объекта: content-based сразу, принудительный показ, метаданные
- Гибридные системы переключаются на CF только после накопления достаточной истории

# 89. Как оценивать качество рекомендаций

## Зачем это нужно

Если модель классификации ошиблась — видно сразу: предсказанный класс ≠ реальному. С рекомендациями сложнее: ты показал 10 фильмов, пользователь посмотрел 3 — это хорошо или плохо? Нужны специальные метрики.

## Простая интуиция

Представь, что ты рекомендуешь другу 10 ресторанов. Он сходил в 4 из них. Ты угадал 4 из 10 — неплохо. Но что если 6 ресторанов, которые ты не назвал, ему понравились бы больше? Важно не только «сколько угадал», но и «не пропустил ли лучшее».

## Что это такое

Оценка рекомендательных систем идёт по двум направлениям:

**Offline-метрики** — считаются на исторических данных до запуска:
- **Precision@K** — из K рекомендованных объектов сколько реально понравились
- **Recall@K** — из всех объектов, что понравились, сколько попало в K рекомендаций

**Online-метрики** — измеряются в реальном продукте:
- **CTR** — доля рекомендаций, на которые кликнули
- **Конверсия** — доля рекомендаций, которые привели к покупке
- **Время взаимодействия** — сколько смотрел, слушал, читал

## Как это работает

**Precision@K** — точность среди K рекомендаций:

Рекомендовали 5 фильмов, пользователь посмотрел 2 → `Precision@5 = 2/5 = 40%`

**Recall@K** — полнота среди всего, что могло понравиться:

Пользователь готов был посмотреть 8 фильмов, система показала 2 из них в топ-5 → `Recall@5 = 2/8 = 25%`

| Метрика | Вопрос | Когда важна |
|---|---|---|
| Precision@K | Не показываем ли лишнего? | Когда каждая лишняя рекомендация раздражает |
| Recall@K | Не пропускаем ли важное? | Когда нужно охватить всё подходящее |
| CTR | Кликают ли? | Всегда — показывает реальный интерес |
| Конверсия | Покупают ли? | Для e-commerce |

## Как это связано с ML

Offline-метрики быстрее считать, но они не всегда предсказывают реальное поведение. Поэтому финальная оценка системы — всегда онлайн: A/B тест, где часть пользователей видит новые рекомендации, часть — старые.

## Практика

1. Система рекомендовала 10 фильмов, пользователь посмотрел 3. Всего фильмов, которые ему бы понравились — 12. Посчитай Precision@10 и Recall@10.
2. В чём разница между Precision@K и Recall@K? Когда важнее каждая из них?
3. Почему CTR — важная метрика, но нельзя опираться только на неё?
4. Почему offline-метрики не всегда предсказывают успех в реальном продукте?
5. Мини-кейс: алгоритм рекомендаций улучшили, offline Precision@10 выросла с 30% до 45%. Достаточно ли этого, чтобы выкатить изменение всем пользователям?

## Краткий итог

- Precision@K — доля «попаданий» среди K рекомендаций
- Recall@K — доля показанного от всего, что могло понравиться
- Online-метрики (CTR, конверсия) важнее offline — они отражают реальное поведение
- Финальная оценка системы — всегда A/B тест в реальном продукте
- Offline-метрики — для быстрой проверки на исторических данных, не для финального вывода

# 90. Как построить рекомендательную систему с нуля

## Зачем это нужно

Ты знаешь коллаборативную фильтрацию, контентную, implicit/explicit feedback, гибриды, холодный старт и метрики. Но когда приходит реальная задача — с чего начинать? Этот урок — пошаговая схема рассуждений, которую можно применять к любой задаче рекомендаций.

## Простая интуиция

Хороший врач не назначает лечение до осмотра. Хороший специалист по ML не выбирает алгоритм до понимания данных и задачи. Сначала вопросы — потом решение.

## Что это такое

Построение рекомендательной системы — это не выбор алгоритма, а последовательность решений: от понимания задачи и данных до запуска и оценки. Алгоритм — последнее, что выбираешь.

## Как это работает

**Шаг 1. Понять задачу**

Что нужно рекомендовать? Кому? С какой целью?
- Продать товар → оптимизируем конверсию
- Удержать пользователя → оптимизируем время в приложении
- Помочь найти нужное → оптимизируем релевантность

**Шаг 2. Разобраться с данными**

| Вопрос | Что это значит для системы |
|---|---|
| Есть история взаимодействий? | Можно использовать collaborative filtering |
| Feedback explicit или implicit? | Влияет на качество и интерпретацию сигналов |
| Много новых пользователей? | Нужно решение холодного старта |
| Объекты хорошо описаны (теги, категории)? | Можно использовать content-based |

**Шаг 3. Выбрать подход**

| Ситуация | Подход |
|---|---|
| Много истории + мало новых пользователей | Collaborative filtering |
| Мало истории + богатые метаданные объектов | Content-based |
| Много новых пользователей | Гибрид: CF для старых, CB для новых |
| Только запустились | Популярное + content-based |
| Нужен максимум качества | Гибрид с несколькими сигналами |

**Шаг 4. Решить проблему холодного старта**

Он есть всегда. Нужен план:
- Для новых пользователей: онбординг-вопросы, популярное, demographic fallback
- Для новых объектов: content-based сразу, принудительный показ для сбора данных

**Шаг 5. Определить метрики успеха**

Что считаем хорошим результатом? CTR? Конверсия? Время в приложении?
Определяем до запуска — не после.

**Шаг 6. Запустить, оценить, итерировать**

Начать с простого: популярное или content-based. Это всегда лучше, чем «ничего». Потом усложнять, измеряя каждое изменение через A/B тест.

## Как это связано с ML

Рекомендательная система — это не один алгоритм, это пайплайн решений. Понимание задачи и данных важнее выбора конкретного метода. Самая сложная система, построенная без понимания данных, проиграет простой, построенной правильно.

## Практика

1. Тебе пришла задача: построить рекомендации для новостного сайта. С каких вопросов ты начнёшь?
2. Стартап только запустил маркетплейс: 500 пользователей, 2 000 товаров, истории почти нет. Какой подход выбрать прямо сейчас?
3. Через 6 месяцев у того же маркетплейса 50 000 активных пользователей и богатая история покупок. Что изменится в подходе и почему?
4. Почему «начать с простого» — хорошая стратегия, а не признак слабого специалиста?
5. Мини-кейс: музыкальный стриминг. Данные: история прослушиваний (implicit), жанры треков, время суток, устройство пользователя. Пройди все 6 шагов и опиши свой подход.

## Краткий итог

- Начинай с задачи и данных, не с алгоритма
- Определи: есть ли история, какой тип feedback, насколько серьёзна проблема холодного старта
- Выбор подхода зависит от ситуации — нет универсального ответа
- Всегда планируй решение холодного старта заранее
- Метрики определяй до запуска; финальная оценка — только через A/B тест
- Начинай просто, итерируй на основе данных

# 91. Как работает поисковая выдача

## Зачем это нужно

Ты каждый день пользуешься Google или Яндексом. Кажется, что поисковик «просто находит» нужные страницы. На самом деле за каждой выдачей стоит ML-модель, которая за доли секунды обрабатывает сотни сигналов и решает, что поставить первым.

## Простая интуиция

Из библиотеки в миллиард книг нужно выбрать 10 самых подходящих для конкретного человека с конкретным вопросом — и сделать это за 0.2 секунды. Это задача поисковой выдачи.

## Что это такое

Поисковая выдача — результат ранжирующей модели, которая для каждого запроса сортирует все возможные страницы по релевантности и показывает лучшие.

Три группы сигналов:
- **Сигналы запроса** — что именно ищет пользователь, какое намерение стоит за словами
- **Сигналы страницы** — насколько контент соответствует запросу, насколько авторитетна страница
- **Сигналы пользователя** — история поиска, местоположение, устройство, время суток

## Как это работает

Для каждой пары «запрос + страница» модель вычисляет score релевантности из десятков признаков:

| Признак | Пример |
|---|---|
| Совпадение слов | «iPhone 14» есть в заголовке страницы? |
| Намерение запроса | «купить» → коммерческий, «что такое» → информационный |
| Авторитетность | Сколько других сайтов ссылаются на эту страницу? |
| Свежесть | Насколько недавно обновлена страница? |
| Местоположение | Поиск «кафе» → показываем ближайшие |
| История пользователя | Ты уже был на этой странице? |

**Intent (намерение запроса)** — одна из важнейших идей. Запрос «iPhone 14» может означать разное:
- «хочу купить» → на первом месте должен быть магазин
- «хочу узнать характеристики» → на первом месте должна быть статья
- «хочу посмотреть фото» → нужна галерея

Модель учится распознавать intent и подбирает тип контента под него.

**Как модель учится**

Основной сигнал — клики пользователей. Если на запрос «ноутбук для работы» пользователи чаще кликают на второй результат, а не на первый — значит второй релевантнее. Это implicit feedback, точно как в рекомендательных системах (урок 86).

## Как это связано с ML

Поисковая выдача — классическая задача ранжирования (урок 14). Выдача персональна: одинаковый запрос даёт разные результаты в зависимости от истории, местоположения и устройства пользователя.

## Практика

1. Какие три группы сигналов использует поисковая модель? Приведи по одному примеру из каждой.

# 92. Как ранжируется лента в соцсетях

## Зачем это нужно

TikTok, Instagram, ВКонтакте, LinkedIn — у всех есть лента. Кажется, там просто посты друзей. На самом деле каждый пост проходит через ранжирующую модель, которая решает: показать это тебе или нет, и на какой позиции. Понимание этого меняет взгляд на то, как работают соцсети.

## Простая интуиция

Представь редактора газеты, который знает каждого читателя лично: что ему интересно, сколько времени он обычно читает, на что реагирует. Для каждого читателя он составляет свою версию газеты. Лента — это такой редактор, работающий на ML.

## Что это такое

Ранжирование ленты — задача, где «запрос» это не текст, а **профиль пользователя**: его история, интересы, поведение. Модель решает, какие посты показать, в каком порядке.

Ключевое отличие от поиска: пользователь **ничего не спрашивает** — модель сама угадывает, что ему интересно прямо сейчас.

## Как это работает

**Сигналы со стороны пользователя:**
- С чем взаимодействовал раньше: лайки, комментарии, репосты, сохранения
- Время просмотра: сколько секунд смотрел на конкретный пост
- Что досматривал до конца, а что пролистывал сразу
- Время суток, устройство, частота открытия приложения

**Сигналы со стороны поста:**
- Engagement rate — сколько людей лайкнули и прокомментировали из увидевших
- Скорость набора реакций: свежий пост с быстрым ростом — хороший сигнал
- Автор: насколько пользователь взаимодействовал с ним раньше

**Что модель оптимизирует**

| Метрика | Что получается |
|---|---|
| Время в приложении | Контент, от которого сложно оторваться |
| Вовлечённость | Контент, вызывающий реакцию |
| Удовлетворённость | Контент, после которого пользователь доволен |

Эти цели могут конфликтовать: скандальный контент держит в приложении дольше, но пользователь потом чувствует себя плохо. Платформы постепенно учатся измерять удовлетворённость, а не только время.

## Как это связано с ML

Лента — ранжирование с implicit feedback (урок 86): пользователь не ставит оценки, но его поведение — просмотры, паузы, пролистывания — и есть обучающий сигнал. Модель постоянно переобучается на свежих данных: твоя лента меняется в зависимости от того, что ты делал последние дни.

# 93. Как ранжируются товары на маркетплейсе

## Зачем это нужно

Ты ищешь «наушники» на Wildberries или Ozon. Из 50 000 товаров тебе показывают 20. Почему именно эти? Порядок результатов — не случайный и не просто «по рейтингу». Это ML-модель, которая одновременно думает о тебе, о продавце и о платформе.

## Простая интуиция

Представь менеджера магазина, расставляющего товары на полках. Он хочет, чтобы покупатель нашёл нужное — довольный вернётся. Но также хочет поставить на видное место товары с высокой маржой. На маркетплейсе эту задачу решает ML-модель, причём для каждого покупателя отдельно.

## Что это такое

Ранжирование товаров — задача, где для каждого запроса нужно упорядочить тысячи товаров, оптимизируя несколько целей одновременно: удовлетворить пользователя, помочь продавцу и заработать платформе.

## Как это работает

**Сигналы релевантности** — насколько товар соответствует запросу:
- Совпадение запроса с названием, описанием, категорией
- Атрибуты: бренд, цвет, размер, характеристики

**Сигналы качества товара** — насколько товар хорош:
- Рейтинг и количество отзывов
- Процент возвратов (высокий возврат — плохой сигнал)
- Скорость доставки
- **Конверсия** — какой процент просмотревших купил; один из сильнейших сигналов

**Коммерческие сигналы** — интересы платформы:
- Платная реклама: продавец заплатил за более высокую позицию
- Маржинальность: платформе выгоднее продавать одни товары, чем другие

**Конфликт интересов**

| Сторона | Что хочет |
|---|---|
| Пользователь | Лучший товар по цене и качеству |
| Продавец | Попасть на первые позиции |
| Платформа | Максимизировать выручку |

Хорошая платформа балансирует: слишком много рекламы на первых позициях — пользователи уходят к конкурентам.

Один запрос «ноутбук» даёт разные результаты разным пользователям. Тот, кто всегда покупает дорогую технику, увидит премиум-модели. Тот, кто всегда выбирает по цене — увидит бюджетные варианты. Модель учится на истории покупок каждого пользователя.

Маркетплейс — пример ранжирования с несколькими объективными функциями. Модель обучается на кликах и покупках (implicit feedback). Основная бизнес-метрика — GMV (Gross Merchandise Value): суммарная стоимость всех проданных товаров.

# 94. Как оценивать качество ранжирования

## Зачем это нужно

Ты обновил алгоритм ранжирования. Как понять, стало ли лучше? Метрики классификации не работают — они не учитывают порядок. Нужны специальные подходы к оценке.

## Простая интуиция

Представь экзамен, где важно не только ответить правильно, но и ответить первым. Если правильный ответ на 10-м месте — это всё равно провал. Метрики ранжирования именно это и измеряют: не просто «нашли ли нужное», а «где оно оказалось в списке».

## Что это такое

Оценка качества ранжирования учитывает не только то, найдены ли правильные результаты, но и на каких позициях они оказались.

## Как это работает

**Почему accuracy не работает**

Модель нашла 8 из 10 нужных страниц → Accuracy = 80%. Но если все 8 стоят на позициях 11–18, а первые 10 мест заняты нерелевантными — пользователь ничего не найдёт. Accuracy этого не замечает.

**Ключевая идея: позиция важна**

Пользователи смотрят первые 3–5 результатов. Нужное на 1-м месте — отлично. На 5-м — терпимо. На 10-м — как будто его нет вообще.

**Offline-оценка** — на исторических данных:
- Есть запросы и известно, какие результаты «правильные» (по кликам или разметке экспертов)
- Модель ранжирует — проверяем, оказались ли правильные результаты вверху
- Быстро и дёшево, но не гарантирует результат в реальном продукте

**Online-оценка** — в реальном продукте:

| Метрика | Что измеряет |
|---|---|
| CTR | Кликают ли на первые результаты |
| Конверсия | После клика совершили целевое действие (купили, прочитали) |
| Bounce rate | Ушли сразу — результат оказался нерелевантным |
| Время сессии | Нашли ли что искали и остались на сайте |

**A/B тест — обязательный финальный шаг**

Нельзя просто запустить новый алгоритм и смотреть на метрики — нет базы для сравнения. Нужно:
- Разделить пользователей на две группы
- Одной показывать новый алгоритм, другой — старый
- Сравнить метрики через неделю-две

| Группа | CTR | Конверсия |
|---|---:|---:|
| Старый алгоритм | 31% | 4.1% |
| Новый алгоритм | 38% | 5.3% |

Оба показателя выросли → выкатываем на всех.

## Как это связано с ML

Это тот же двухэтапный процесс, что у рекомендательных систем (урок 89): сначала offline на исторических данных, потом обязательно A/B тест с реальными пользователями. Offline хорошо — не гарантия онлайн-успеха.

## Практика

1. Почему accuracy — плохая метрика для поисковой выдачи? Придумай конкретный пример, где accuracy 80%, но пользователь ничего не нашёл.
2. Что такое CTR и почему он используется как метрика качества ранжирования?
3. Модель улучшила результаты по offline-данным. Достаточно ли этого, чтобы выкатить изменение всем пользователям?
4. Зачем нужна контрольная группа в A/B тесте? Почему нельзя просто включить новый алгоритм и посмотреть что изменилось?
5. Мини-кейс: после обновления алгоритма поиска CTR вырос на 15%, но количество покупок упало на 8%. Как такое возможно и что это говорит о качестве новой модели?

## Краткий итог

- Accuracy не работает для ранжирования — не учитывает позицию результата
- Ключевая идея: правильное на 1-м месте ≫ правильное на 10-м
- Offline-метрики: быстро считать, но не гарантируют реальный результат
- Online-метрики: CTR, конверсия, bounce rate — реальное поведение пользователей
- Финальная проверка — всегда A/B тест; без контрольной группы нет объективного сравнения

# 59. Как выглядит ML-проект

## Зачем это нужно

Большинство учебников по ML учат алгоритмам, но не показывают, как выглядит настоящий ML-проект. В реальности обучение модели — это лишь малая часть работы. Понимание полного жизненного цикла проекта критично для любого специалиста.

## Простая интуиция

Думайте о ML-проекте как о строительстве дома. Архитектор (постановка задачи) важнее, чем выбор гвоздей (алгоритм). Фундамент (данные) определяет всё остальное. И дом нужно не просто построить, но заселить жильцов и обслуживать (деплоймент и мониторинг).

## Что это такое

Типичный ML-проект включает этапы:

1. **Постановка задачи** — перевод бизнес-вопроса в ML-задачу. Что предсказываем? Какая метрика успеха?
2. **Сбор и анализ данных** — откуда берём данные, EDA, качество данных
3. **Feature Engineering** — создание и отбор признаков
4. **Моделирование** — выбор алгоритма, обучение, валидация
5. **Оценка** — метрики, error analysis
6. **Деплоймент** — упаковка модели в API или сервис
7. **Мониторинг** — отслеживание качества в production

## Как это работает

```python
import pandas as pd
from sklearn.dummy import DummyClassifier
from sklearn.ensemble import RandomForestClassifier
from sklearn.model_selection import cross_val_score

# 1. Загрузка данных
df = pd.read_csv("data.csv")
X = df.drop("target", axis=1)
y = df["target"]

# 2. Baseline — всегда начинайте с простейшей модели
baseline = DummyClassifier(strategy="most_frequent")
print("Baseline:", cross_val_score(baseline, X, y, cv=5).mean().round(3))

# 3. Реальная модель — сравниваем с baseline
model = RandomForestClassifier(random_state=42)
print("RandomForest:", cross_val_score(model, X, y, cv=5).mean().round(3))
```

## Как это связано с ML

Алгоритмы ML — это лишь один шаг в цикле. Опытные ML-инженеры тратят 80% времени на данные и только 20% на моделирование. Знание полного пайплайна позволяет находить узкие места не только в коде модели, но и в данных, инфраструктуре, мониторинге.

## Практика

1. Перечислите семь этапов типичного ML-проекта. Почему важен именно этот порядок?
2. Почему в реальных проектах 80% времени уходит на данные, а не на моделирование?
3. Команда получила задачу: «Снизить отток клиентов». Опишите, как перевести её в ML-задачу: что такое y, X и метрика успеха?
4. Из урока 16 мы знаем, что тестовая выборка — это финальная честная оценка, которую нельзя смотреть при разработке. Почему в настоящем ML-проекте тест используется только один раз в самом конце?
5. Из урока 29 мы знаем, что Pipeline соединяет preprocessing и модель. Почему ML-пайплайн в production — это не только код обучения, но и весь цикл от сбора данных до мониторинга?

## Краткий итог

- ML-проект — это не только обучение модели, но полный цикл от постановки задачи до мониторинга
- 80% времени уходит на данные, 20% — на моделирование
- Всегда начинайте с baseline и простых решений
- Деплоймент и мониторинг — обязательные части проекта

# 60. От идеи до модели

## Зачем это нужно

Между бизнес-идеей («хотим предсказывать отток клиентов») и работающей моделью — много шагов. Пропуск любого из них ведёт к плохому результату. Этот урок — практическая карта пути от постановки задачи до первого рабочего прототипа.

## Простая интуиция

Вы хотите приготовить новое блюдо. Сначала — понять, что это за блюдо (постановка задачи). Потом — купить ингредиенты и проверить их свежесть (данные). Затем — сначала приготовить простую версию по базовому рецепту (baseline), и только потом — улучшать.

## Что это такое

Путь от идеи до модели включает:

1. **Формализация**: какой тип задачи? (классификация/регрессия/кластеризация). Что такое «успех»?
2. **Данные**: какие есть данные? Есть ли разметка? Достаточно ли объём?
3. **Baseline**: самое простое решение. DummyClassifier, линейная регрессия, среднее
4. **Feature Engineering**: создание информативных признаков из сырых данных
5. **Итерации**: улучшаем baseline, смотрим на ошибки, добавляем признаки, пробуем другие алгоритмы
6. **Валидация**: честная оценка через hold-out или кросс-валидацию

## Как это работает

```python
from sklearn.model_selection import train_test_split, cross_val_score
from sklearn.dummy import DummyClassifier
from sklearn.linear_model import LogisticRegression

# Шаг 1: Стратифицированный split
X_train, X_test, y_train, y_test = train_test_split(
    X, y, test_size=0.2, stratify=y, random_state=42
)

# Шаг 2: Baseline
baseline = DummyClassifier(strategy="most_frequent")
print("Baseline:", cross_val_score(baseline, X_train, y_train, cv=5).mean().round(3))

# Шаг 3: Простая модель
model = LogisticRegression()
print("LogReg:", cross_val_score(model, X_train, y_train, cv=5).mean().round(3))

# Если прогресс есть → пробуем более сложные модели
# Если нет → смотрим на данные и признаки, а не на алгоритм
```

## Как это связано с ML

Итеративный подход (baseline → улучшение → оценка → следующая итерация) — самый эффективный в ML. Перепрыгивание сразу к сложным моделям без baseline — частая ошибка начинающих. Оценка прогресса на каждом шаге позволяет найти, где именно кроется улучшение.

## Практика

1. Что такое baseline в ML-проекте и почему без него невозможно оценить ценность сложной модели?

# 61. От данных до предсказания

## Зачем это нужно

Модель — это не только .fit() и .predict(). Между сырыми данными и финальным предсказанием — цепочка трансформаций. Если нарушить её порядок, получим неправильные предсказания или data leakage. Pipeline в sklearn решает эту проблему автоматически.

## Простая интуиция

Думайте о конвейере на заводе. Сырой материал проходит через последовательность станков: очистка → нарезка → сборка → проверка качества. Каждый станок делает своё, порядок важен. ML-пайплайн — тот же конвейер: данные → imputer → scaler → модель.

## Что это такое

- **Pipeline** — последовательность трансформаций + финальная модель
- **Трансформеры** — шаги, которые делают fit_transform (scaler, imputer, encoder)
- **Estimator** — финальный шаг (модель), делающий fit и predict
- Ключевое правило: трансформеры должны обучаться ТОЛЬКО на train данных
- **ColumnTransformer** — применяет разные трансформации к разным столбцам

## Как это работает

```python
from sklearn.pipeline import Pipeline
from sklearn.preprocessing import StandardScaler, OneHotEncoder
from sklearn.impute import SimpleImputer
from sklearn.ensemble import RandomForestClassifier

# Pipeline: последовательность шагов, fit_transform → fit_transform → fit
pipeline = Pipeline([
    ("imputer", SimpleImputer(strategy="median")),
    ("scaler", StandardScaler()),
    ("model", RandomForestClassifier())
])

# fit: все трансформеры обучаются ТОЛЬКО на train
pipeline.fit(X_train, y_train)
# predict: к test применяется только transform (параметры уже зафиксированы)
pipeline.predict(X_test)

# Для разных типов признаков — ColumnTransformer:
# num_cols → imputer + scaler
# cat_cols → imputer + OneHotEncoder
# Оба передаются в Pipeline как единый preprocessor
```

## Как это связано с ML

Pipeline — стандарт промышленного ML. Он предотвращает data leakage, делает код чистым и воспроизводимым. Один объект pipeline можно сохранить с помощью joblib и использовать в production для предсказаний на новых данных.

3. Вы обучили Pipeline (imputer → scaler → RandomForest). Коллега применил `scaler.fit_transform(X_test)` отдельно перед предсказанием. Что пошло не так?

## Краткий итог

- Pipeline соединяет preprocessing и модель в единый объект
- Трансформеры обучаются только на train, к test применяется только transform
- ColumnTransformer позволяет по-разному обрабатывать числовые и категориальные признаки
- Обученный Pipeline можно сохранить и использовать в production

# 62. Training vs Inference

## Зачем это нужно

Обучение модели и её использование для предсказаний — принципиально разные операции. В production нас интересует только inference: скорость, надёжность, стоимость предсказания. Путаница между training и inference — частая причина проблем при деплойменте.

## Простая интуиция

Повар учится готовить годами (training) — изучает рецепты, пробует разные ингредиенты, совершенствует технику. Но когда гость заказывает блюдо в ресторане, повар не учится заново — он просто готовит по уже выученному рецепту (inference). Ресторан не может ждать годы обучения для каждого заказа.

## Что это такое

- **Training** — процесс подбора параметров модели на обучающих данных. Медленно, ресурсоёмко, делается заранее
- **Inference** — использование обученной модели для предсказаний на новых данных. Должно быть быстрым
- **Batch inference** — предсказания для большого набора объектов сразу (ночная обработка)
- **Real-time inference** — предсказание для одного объекта с минимальной задержкой (API)
- **Latency** — задержка ответа при inference; критична для real-time систем
- **Throughput** — сколько предсказаний в секунду может обработать система

## Как это работает

```python
from sklearn.ensemble import RandomForestClassifier

# Training: один раз, медленно
model = RandomForestClassifier(n_estimators=100)
model.fit(X_train, y_train)          # секунды–минуты

# Batch inference: много объектов сразу
predictions = model.predict(X_test)  # миллисекунды

# Real-time inference: один объект за раз
pred = model.predict(X_test[0:1])    # единицы миллисекунд

# В production: train → сохранить (joblib) → загрузить → predict
```

## Как это связано с ML

В production важен inference, а не training. Если модель предсказывает за 5 секунд — она бесполезна для веб-сервиса. Выбор алгоритма в production часто определяется latency: линейные модели быстрее случайных лесов, случайные леса быстрее нейросетей (без GPU).

## Практика

1. В чём принципиальная разница между training и inference с точки зрения частоты, скорости и потребляемых ресурсов?
2. Что такое latency и throughput? Почему для real-time API критична latency, а для batch-обработки — throughput?
3. Вы создаёте ML-сервис для мобильного приложения. Нейросеть даёт 96% accuracy, но inference занимает 2 секунды. Как это повлияет на пользователей и какой компромисс вы рассмотрите?
4. Из урока 60 мы знаем, что Pipeline соединяет preprocessing и модель в единый объект. Что конкретно происходит в production при вызове `pipeline.predict(new_data)` на этапе inference?
5. Из урока 58 мы знаем, что деплоймент — отдельный этап ML-проекта. Почему высокая accuracy на тесте не гарантирует хорошего пользовательского опыта в production и какую дополнительную характеристику нужно измерять?

## Краткий итог

- Training — медленный процесс подбора параметров, делается заранее
- Inference — быстрое применение обученной модели к новым данным
- Latency (задержка) и throughput (пропускная способность) критичны в production
- Выбор алгоритма для production часто определяется требованиями к скорости

# 63. Почему модель в проде ≠ модель на обучении

## Зачем это нужно

Модель показала отличные результаты на тесте, но в production работает хуже. Это одна из самых частых и болезненных проблем в ML. Понимание причин этого разрыва позволяет предотвращать его или быстро диагностировать.

## Простая интуиция

Представьте повара, который учился готовить по летним рецептам с сезонными овощами. Когда наступила зима, доступные ингредиенты изменились — блюда получаются не такими, как в учебе. Модель «учила» на одних данных, но мир вокруг неё изменился.

## Что это такое

- **Training-serving skew** — несоответствие между данными при обучении и данными в production
- **Distribution shift** — изменение статистических свойств данных со временем
- **Concept drift** — изменение самой зависимости между X и y (что было верно год назад, теперь не так)
- **Data drift** — изменение распределения входных признаков X без изменения зависимости
- **Pipeline skew** — разная логика preprocessing при обучении и inference

## Как это работает

```python
# Training-serving skew: используем один Pipeline на обучение и inference
pipeline.fit(X_train, y_train)           # train
predictions = pipeline.predict(X_prod)   # prod — те же трансформации, без leakage

# Data drift: статистика входных признаков изменилась
train_mean = X_train["age"].mean()  # 35 лет при обучении
prod_mean  = X_prod["age"].mean()   # 42 года в production

drift_ratio = abs(prod_mean - train_mean) / train_mean
if drift_ratio > 0.15:
    print("Внимание: дрейф признака 'age'! Рассмотрите переобучение.")
```

## Как это связано с ML

Training-serving skew — главная причина деградации моделей в production. Правильное решение: (1) одинаковый код preprocessing на train и prod; (2) мониторинг распределений входных данных; (3) регулярное переобучение. Pipeline объект помогает с первым пунктом.

## Практика

1. Что такое concept drift и data drift? Чем они принципиально отличаются по природе и опасности?

3. Вы задеплоили модель рекомендаций, обученную в марте. В декабре качество резко упало. Какие три возможные причины вы проверите и в каком порядке?
4. Из урока 60 мы знаем, что Pipeline содержит как preprocessing, так и модель. Почему использование одного Pipeline объекта для training и inference автоматически предотвращает pipeline skew?
5. Из урока 17 мы знаем, что кросс-валидация проверяет, насколько модель обобщает. Почему даже высокое качество на CV не гарантирует отсутствие проблем в production, связанных с data drift?

## Краткий итог

- Модель в production деградирует из-за drift: данные и зависимости меняются со временем
- Training-serving skew — разная логика preprocessing при обучении и inference
- Используйте один Pipeline объект для обучения и предсказания
- Мониторьте распределения входных данных для раннего обнаружения drift

# 64. Что такое сохранённая модель

## Зачем это нужно

Обучение модели занимает время и ресурсы. После обучения нужно сохранить результат, чтобы использовать модель без повторного обучения. Понимание того, что именно сохраняется и как загружается, обязательно для работы с production ML.

## Простая интуиция

Представьте повара, который записал все свои рецепты в книгу. Открыв книгу, любой повар может приготовить те же блюда без переобучения. Сохранённая модель — это «книга рецептов»: все параметры, которые модель «выучила», записаны и могут быть загружены позже.

## Что это такое

- **Сериализация** — процесс сохранения объекта Python (модели) в файл
- **pickle** — стандартная библиотека Python для сериализации; простой, но не самый безопасный
- **joblib** — рекомендуется для sklearn: эффективно сохраняет numpy массивы
- **ONNX** — открытый формат для обмена моделями между фреймворками (sklearn → ONNX → C++/Java)
- Что сохраняется: параметры модели (веса, пороги), гиперпараметры, preprocessing параметры

## Как это работает

```python
import joblib

# Сохранить обученный pipeline (scaler + модель вместе)
joblib.dump(pipeline, "model_v1.pkl")

# Загрузить и сразу использовать — без повторного .fit()
loaded = joblib.load("model_v1.pkl")
predictions = loaded.predict(new_data)

# Версионируйте файлы и фиксируйте версию sklearn:
# model_v1.pkl, model_v2.pkl — храните историю
```

## Как это связано с ML

Сохранение модели — bridge между обучением и inference. В production: обучают на training сервере → сохраняют → деплоят на inference сервер → загружают → используют. Важно: версионировать модели (model_v1.pkl, model_v2.pkl) и хранить вместе с данными о версии sklearn.

## Практика

1. Что такое сериализация модели? Что именно сохраняется в файле — только веса или всё, что нужно для предсказания?

3. Вы обучили модель на sklearn 1.0. Коллега загружает её с sklearn 1.4 и видит предупреждения о несовместимости. Как предотвратить подобные проблемы в будущем?
4. Из урока 60 мы знаем, что Pipeline содержит все шаги от preprocessing до модели. Почему правильно сохранять весь Pipeline, а не только модель — что потеряется, если сохранить только `model.pkl` без scaler?
5. Из урока 61 мы знаем, что inference — применение обученной модели к новым данным. Что конкретно загружается из файла при `joblib.load()` и почему загруженный Pipeline сразу готов к `predict()` без повторного `.fit()`?

## Краткий итог

- Используйте joblib.dump() для сохранения sklearn моделей
- Сохраняйте Pipeline (включает scaler + модель) как единый объект
- Версионируйте модели и фиксируйте версию sklearn
- Проверяйте корректность загруженной модели на нескольких примерах

# 65. Что такое модель в API

## Зачем это нужно

Jupyter notebook с моделью — это не продукт. Чтобы другие системы и пользователи могли использовать модель, её нужно завернуть в API. REST API — стандартный способ предоставить доступ к ML-модели через HTTP-запросы.

## Простая интуиция

Ресторан — это API. Вы (клиент) делаете заказ (запрос), кухня (модель) готовит блюдо (предсказание), официант приносит результат (ответ). Вам не нужно знать, как работает кухня — вы просто делаете заказ в стандартном формате (меню = API-документация).

## Что это такое

- **REST API** — стандарт HTTP-интерфейса для взаимодействия между системами
- **Endpoint** — URL, по которому доступен сервис (например, /predict)
- **Request** — входные данные в формате JSON
- **Response** — предсказание модели в формате JSON
- **FastAPI** — современный Python-фреймворк для создания API; быстрый, с автодокументацией
- **Flask** — более простой Python-фреймворк для API

## Как это работает

```python
# Пример API с FastAPI
from fastapi import FastAPI
from pydantic import BaseModel
import joblib
import numpy as np

app = FastAPI()

# Загружаем обученную модель при старте сервера
model = joblib.load("model_pipeline.pkl")

# Схема входных данных
class PredictionRequest(BaseModel):
    age: float
    income: float
    credit_score: float

# Схема ответа
class PredictionResponse(BaseModel):
    prediction: int
    probability: float

@app.post("/predict", response_model=PredictionResponse)
def predict(request: PredictionRequest):
    # Создаём массив признаков из запроса
    features = np.array([[request.age, request.income, request.credit_score]])

    # Предсказание
    prediction = int(model.predict(features)[0])
    probability = float(model.predict_proba(features)[0][1])

    return PredictionResponse(prediction=prediction, probability=probability)

# Запуск: uvicorn app:app --host 0.0.0.0 --port 8000
# Документация автоматически: http://localhost:8000/docs
```

## Как это связано с ML

REST API — стандартный способ интеграции ML-модели в любую систему: веб-приложение, мобильное приложение, другой сервис. Модель в API позволяет: (1) переиспользовать одну модель из разных мест; (2) масштабировать inference независимо; (3) обновлять модель без изменения клиентского кода.

# 66. Мониторинг модели

## Зачем это нужно

Деплой модели — не финал, а начало. Модель в production работает с реальными данными, которые меняются. Без мониторинга вы не узнаете, что модель деградировала, пока не получите жалобы пользователей или бизнес-потери.

## Простая интуиция

Представьте пилота самолёта. Он не просто взлетает и спит до посадки — он постоянно смотрит на приборы. Температура двигателя, высота, скорость — все под контролем. Если что-то выходит за допустимые границы — сразу сигнал. Мониторинг ML — те же «приборы» для модели.

## Что это такое

- **Мониторинг производительности** — отслеживание метрик модели (accuracy, F1) с течением времени
- **Мониторинг данных** — отслеживание изменений в распределении входных данных
- **Feature drift** — изменение распределения отдельных признаков
- **Prediction drift** — изменение распределения предсказаний модели
- **Latency мониторинг** — время ответа API
- **Алертинг** — автоматические уведомления при превышении порогов

## Как это работает

```python
# 1. Мониторинг дрейфа признаков
def check_drift(train_col, prod_col, threshold=0.15):
    drift = abs(prod_col.mean() - train_col.mean()) / abs(train_col.mean())
    return drift > threshold

if check_drift(X_train["age"], X_prod["age"]):
    print("АЛЕРТ: дрейф признака 'age'!")

# 2. Мониторинг предсказаний
pred_rate = y_pred.mean()   # доля позитивных предсказаний
# Если pred_rate резко изменился → возможен concept drift

# 3. Мониторинг качества (если есть реальные метки)
from sklearn.metrics import accuracy_score
current_acc = accuracy_score(y_true, y_pred)
print(f"Accuracy за период: {current_acc:.3f}")
```

## Как это связано с ML

# 67. Почему модель деградирует

## Зачем это нужно

Модели стареют. Даже идеально обученная модель через год может работать значительно хуже. Понимание механизмов деградации помогает строить устойчивые системы и правильно настраивать стратегии переобучения.

## Простая интуиция

Представьте прогноз погоды, обученный на данных 1990-х годов. Климат изменился, города разрослись, инструменты измерения улучшились. Модель «устарела» не потому что она плохая, а потому что мир изменился. Модели ML — то же самое.

## Что это такое

- **Model decay / Model staleness** — постепенное ухудшение качества модели в production
- **Concept drift** — изменение самой зависимости между X и y (поведение пользователей меняется)
- **Data drift** — изменение распределения входных данных X
- **Data quality issues** — деградация качества входных данных (пустые поля, неправильные типы)
- **Infrastructure drift** — изменения в инфраструктуре, влияющие на preprocessing

## Как это работает

```python
# Симуляция плавной деградации (data drift)
accuracy_by_month = {1: 0.92, 3: 0.90, 6: 0.85, 9: 0.78, 12: 0.70}

alert_threshold = 0.80
for month, acc in accuracy_by_month.items():
    status = "АЛЕРТ" if acc < alert_threshold else "OK"
    print(f"Месяц {month:2d}: accuracy={acc:.2f}  {status}")

# Стратегии реагирования:
# - По расписанию: переобучать раз в месяц/квартал
# - По триггеру: переобучать при превышении порога дрейфа
# - Онлайн-обучение: обновлять модель непрерывно
```

## Как это связано с ML

Деградация — неизбежна, но предсказуема. Стратегии борьбы: (1) регулярное переобучение по расписанию; (2) переобучение по триггеру при обнаружении drift; (3) онлайн-обучение (continuous learning). Выбор стратегии зависит от скорости изменений в данных.

## Практика

## Краткий итог

- Стратегии: переобучение по расписанию, по триггеру, онлайн-обучение
- Мониторинг качества данных (пропуски, типы) важен наравне с мониторингом метрик

# 68. Как тестировать ML-системы

## Зачем это нужно

ML-системы — это не только ML-код: это данные, preprocessing, бизнес-логика, API. Традиционное тестирование ПО недостаточно. ML-системы требуют особых подходов к тестированию, учитывающих вероятностную природу моделей и зависимость от данных.

## Простая интуиция

Обычный тест проверяет: «при входе A всегда получаем B». В ML всё иначе: «при входе A получаем B примерно в 90% случаев». Тестировать нужно не только код, но и поведение модели: не пропускает ли она определённый тип объектов? Не слишком ли уверена в очевидных случаях?

## Что это такое

- **Unit tests** — тестирование отдельных функций preprocessing, feature engineering
- **Integration tests** — тестирование полного pipeline от сырых данных до предсказания
- **Data validation tests** — проверка схемы, типов, диапазонов входных данных
- **Model behavior tests** — проверка специфических свойств модели (например, если доход вырос — score не должен упасть)
- **Regression tests** — модель не ухудшилась после изменений

## Как это работает

```python
import numpy as np

# Unit test: preprocessing не меняет размерность
X_transformed = pipeline.named_steps["scaler"].transform(X_test)
assert X_transformed.shape == X_test.shape

# Data validation: входные данные корректны
def validate_input(X_new, expected_cols):
    assert X_new.shape[1] == expected_cols, "Неверное количество признаков"
    assert not np.isnan(X_new).any(), "NaN в входных данных"

# Regression test: качество не упало после изменений
current_acc = pipeline.score(X_test, y_test)
assert current_acc > 0.75, f"Accuracy {current_acc:.3f} ниже порога 0.75!"

# Model behavior test: вероятности суммируются в 1
probs = pipeline.predict_proba(X_test)
assert abs(probs.sum(axis=1) - 1.0).max() < 1e-6
```

## Как это связано с ML

Тестирование ML — часть MLOps практик. CI/CD pipeline для ML должен запускать все тесты перед деплоем новой версии модели. Основные типы тестов: (1) код — как в обычном ПО; (2) данные — схема, качество; (3) модель — поведение, качество.

## Практика
