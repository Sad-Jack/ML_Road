# 40. One-Hot Encoding простыми словами

## Зачем это нужно

Из урока «Кодирование категориальных признаков» мы знаем, что категориальные признаки нужно кодировать. Если просто заменить города числами `0/1/2`, модель может решить, что один город «в два раза больше» другого — это неверно. **One-Hot Encoding** — один из основных способов: подходит для категорий без естественного порядка и не создаёт ложной шкалы.

---

## Простая интуиция

Представьте, что на входе в театр у каждого зрителя спрашивают место: ложа, партер или балкон. Вместо того чтобы записывать слово, вам дают три кнопки — и вы нажимаете ровно одну. Одна горит, две погашены. Именно так работает One-Hot Encoding: одна «лампочка» загорается для нужной категории, остальные остаются нулями.

## Что это такое

**One-Hot Encoding** — это способ кодирования категорий, где каждая категория превращается в отдельную колонку.

Если объект относится к категории — ставим `1`.
Если не относится — ставим `0`.

Было:

| city    |
| ------- |
| Berlin  |
| Hamburg |
| Munich  |
| Berlin  |

Стало:

| city_Berlin | city_Hamburg | city_Munich |
| ----------: | -----------: | ----------: |
|           1 |            0 |           0 |
|           0 |            1 |           0 |
|           0 |            0 |           1 |
|           1 |            0 |           0 |

---

## Как это работает

### 1. Берём категориальный признак

---

### 2. Создаём отдельную колонку для каждой категории

Получаем:

```text
device_mobile
device_desktop
device_tablet
```

---

### 3. Заполняем колонки нулями и единицами

---

## Простой пример

Есть данные:

| user_id | device  | bought |
| ------: | ------- | -----: |
|       1 | mobile  |      1 |
|       2 | desktop |      0 |
|       3 | mobile  |      1 |
|       4 | tablet  |      0 |

`device` — категориальный признак.
`bought` — target.

После One-Hot Encoding:

| user_id | device_mobile | device_desktop | device_tablet | bought |
| ------: | ------------: | -------------: | ------------: | -----: |
|       1 |             1 |              0 |             0 |      1 |
|       2 |             0 |              1 |             0 |      0 |
|       3 |             1 |              0 |             0 |      1 |
|       4 |             0 |              0 |             1 |      0 |

Теперь модель получает числа и может использовать `device` как признак.

Обратите внимание: колонка `device_tablet` технически лишняя. Если `device_mobile=0` и `device_desktop=0`, то объект — точно tablet. Одну колонку всегда можно вычислить из остальных. Для линейных моделей это создаёт мультиколлинеарность — поэтому sklearn по умолчанию предлагает параметр `drop='first'`, убирающий первую колонку. Для деревьев и бустинга это не важно.

---

### Когда One-Hot Encoding подходит

One-Hot Encoding хорошо подходит, если:

* категорий не слишком много;
* между категориями нет естественного порядка;
* модель не умеет работать со строками напрямую;
* нужно сохранить смысл "это просто разные варианты".

Примеры хороших признаков:

| Признак        | Категории                 |
| -------------- | ------------------------- |
| device         | mobile / desktop / tablet |
| payment_method | card / cash / transfer    |
| color          | red / blue / green        |
| city           | Berlin / Hamburg / Munich |

---

### Когда One-Hot Encoding может быть неудобен

Если категорий очень много, One-Hot Encoding создаст слишком много новых колонок.

Например:

```text
city = 10 000 разных городов
```

После кодирования может появиться почти `10 000` новых признаков.

Это может:

* раздуть таблицу;
* замедлить обучение;
* увеличить расход памяти;
* сделать данные сложнее для обработки.

В таких случаях могут понадобиться другие способы кодирования.

---

### Важный момент про новые категории

Модель может столкнуться с категорией, которой не было на обучении.

Например, на train были:

```text
mobile
desktop
```

А в новых данных пришло:

```text
tablet
```

Если это не обработать заранее, могут возникнуть проблемы.

Обычно для таких случаев используют настройки encoder'а или отдельную категорию:

```text
unknown
```

Смысл: если категория неизвестна, не ломаем обработку, а относим её к "другим".

---

## Практика

1. Вы применили One-Hot Encoding к признаку device (3 значения: mobile, desktop, tablet) — получили 3 колонки. Первый коллега: «Для линейной регрессии убери одну колонку через drop='first' — иначе мультиколлинеарность». Второй: «Для Random Forest это лишнее». Оба правы? Объясни, почему проблема мультиколлинеарности актуальна для линейных моделей, но не для деревьев.
2. Признак `device` имеет категории `mobile`, `desktop`, `tablet`. Во что превратится строка с `device = tablet` после One-Hot Encoding?
3. Признак `country` содержит 5000 уникальных стран. Какая проблема возникнет при применении One-Hot Encoding?
4. В уроке «Логистическая регрессия» мы видели, что модель учит веса для каждого признака. Вы строите LogisticRegression с признаком `device` через One-Hot Encoding. После обучения выяснилось, что mobile-пользователи покупают чаще. Как веса модели это отразят? Что изменится, если вместо OHE использовать числовой код 0/1/2?
5. В уроке «Кодирование категориальных признаков» мы обсуждали, что новые категории в production могут сломать модель. На train вы применили One-Hot Encoding для `city` с городами Berlin и Hamburg. В новых данных появился Munich. Как это скажется на структуре признаков и что с этим делать?

## Краткий итог

- One-Hot Encoding — для категорий без порядка: не создаёт ложной шкалы.
- При высокой кардинальности (тысячи значений) даёт curse of dimensionality — нужен другой метод.
- Для линейных моделей используйте `drop='first'`, чтобы убрать мультиколлинеарность. Для деревьев — не нужно.
- `OneHotEncoder` из sklearn надёжнее `pd.get_dummies` в production: запоминает категории на fit и не ломается на новых значениях.

## Ключевые термины урока

- **One-Hot Encoding** — единственный 1 в строке, остальное — 0. Ключевое свойство: никакая категория не «больше» другой — модель не может вывести ложный порядок.
- **Бинарные колонки** — в отличие от числовых признаков, несут только сигнал «принадлежит / не принадлежит». Модель обрабатывает их как независимые признаки.
- **OneHotEncoder (sklearn)** — в отличие от `get_dummies`, **умеет работать в Pipeline**: запоминает категории на `fit` и корректно обрабатывает новые на `transform` через параметр `handle_unknown`.
- **get_dummies (pandas)** — удобен для быстрого EDA, но не сохраняет состояние: при новых категориях в production структура колонок изменится и модель сломается.

# 41. Label Encoding простыми словами

## Зачем это нужно

Из урока «Кодирование категориальных признаков» мы знаем, что категориальные признаки нужно кодировать. **Label Encoding** — самый простой способ: каждой категории присваивается число. Простой, но с важным риском ложного порядка.

---

## Простая интуиция

Представьте номерки в гардеробе: 1, 2, 3... Пальто под номером 100 не хуже и не лучше пальто под номером 1 — это просто метки для идентификации. Но если кто-то решит, что «чем больше номер, тем дороже пальто» — это бессмыслица. Именно такую ошибку делает линейная модель, когда видит Label Encoding для городов: Munich=2 воспринимается как «больше», чем Berlin=0.

## Что это такое

**Label Encoding** — это способ кодирования категорий, при котором каждому уникальному значению присваивается отдельное число.

Пример:

| city    | city_encoded |
| ------- | -----------: |
| Berlin  |            0 |
| Hamburg |            1 |
| Munich  |            2 |
| Berlin  |            0 |

Модель уже получает не строки, а числа.

Но здесь есть важный нюанс: эти числа не всегда имеют смысл как порядок.

---

## Как это работает

### 1. Берём категориальный признак

---

### 2. Находим все уникальные категории

```text
Berlin
Hamburg
Munich
```

---

### 3. Каждой категории даём номер

```text
Berlin  -> 0
Hamburg -> 1
Munich  -> 2
```

---

### 4. Заменяем строки на числа

Было:

| city    |
| ------- |
| Berlin  |
| Munich  |
| Hamburg |
| Berlin  |

Стало:

| city_encoded |
| -----------: |
|            0 |
|            2 |
|            1 |
|            0 |

---

### Важный момент

Label Encoding может создать ложный порядок.

Например:

```text
Berlin = 0
Hamburg = 1
Munich = 2
```

Модель может воспринять это так, будто:

```text
Munich > Hamburg > Berlin
```

Но у городов нет такого смысла.
Город с кодом `2` не "больше" города с кодом `1`.

Поэтому Label Encoding не всегда подходит для обычных неупорядоченных категорий.

---

### Когда Label Encoding подходит

Label Encoding можно использовать, когда категории имеют естественный порядок.

Например:

```text
low < medium < high
```

Или:

```text
junior < middle < senior
```

Тогда числа отражают реальный смысл:

| level  | encoded |
| ------ | ------: |
| junior |       0 |
| middle |       1 |
| senior |       2 |

Здесь порядок важен и понятен.

---

### Label Encoding vs One-Hot Encoding

| Способ           | Что делает                                     | Когда подходит                                                         |
| ---------------- | ---------------------------------------------- | ---------------------------------------------------------------------- |
| Label Encoding   | Заменяет категорию одним числом                | Когда есть порядок или модель умеет нормально работать с такими кодами |
| One-Hot Encoding | Создаёт отдельную колонку для каждой категории | Когда порядка между категориями нет                                    |

Пример для `city`:

### Label Encoding

| city    | encoded |
| ------- | ------: |
| Berlin  |       0 |
| Hamburg |       1 |
| Munich  |       2 |

Может появиться ложный порядок.

### One-Hot Encoding

| city_Berlin | city_Hamburg | city_Munich |
| ----------: | -----------: | ----------: |
|           1 |            0 |           0 |
|           0 |            1 |           0 |
|           0 |            0 |           1 |

Порядок не создаётся.

---

## Простой пример

LabelEncoder присваивает коды алфавитно: Berlin=0, Hamburg=1, Munich=2. Случайный порядок — не отражение реальности.

Если теперь обучить LinearRegression и получить коэффициент для `city_encoded` = 0.3, это значит: «с каждым следующим городом по алфавиту вероятность покупки растёт на 0.3». Это бессмыслица — модель нашла артефакт кодирования, а не реальный сигнал.

---

### Важное уточнение

В `sklearn` `LabelEncoder` чаще используют для кодирования `y`, то есть target.

Например:

```text
cat -> 0
dog -> 1
bird -> 2
```

Для признаков `X` используют другие инструменты — с явным заданием порядка или с созданием бинарных колонок. Смысл похожий, но важно не путать, где именно применяется кодирование.

---

## Практика

1. LabelEncoder присвоил: Berlin=0, Hamburg=1, Munich=2 (алфавитный порядок). Через неделю в датасете появился новый город — Amsterdam. Как encoder, обученный только на train, обработает его при вызове `transform`? Что нужно сделать, чтобы модель не сломалась?
2. Команда обучила Random Forest и линейную регрессию на признаке `device_type` с Label Encoding: mobile=0, tablet=1, desktop=2. Random Forest — val accuracy 0.81, линейная регрессия — 0.64. Коллега объяснил разрыв «сложностью задачи». Предложи альтернативное объяснение, связанное именно с кодированием, — и объясни, почему Random Forest менее чувствителен к Label Encoding неупорядоченных категорий, чем линейная модель.
3. Random Forest и LogisticRegression по-разному реагируют на Label Encoding неупорядоченных категорий. Для какой из двух моделей это менее опасно и почему?
4. В уроке «One-Hot Encoding» мы видели, что этот способ создаёт отдельную колонку для каждой категории. В чём преимущество Label Encoding перед One-Hot Encoding для признака с 1000 уникальных значений?
5. В уроке «Кодирование категориальных признаков» мы разбирали, что упорядоченные категории можно кодировать числами. Признак `priority = low / normal / high / critical` имеет реальный порядок. Объясните, почему здесь Label Encoding с правильным маппингом разумнее, чем создание бинарных колонок для каждого уровня.

## Краткий итог

- Используйте Label Encoding только когда порядок реален: `low < medium < high`. Для городов, цветов, типов устройств — опасно.
- Для деревьев и бустинга Label Encoding неупорядоченных категорий менее критичен: они разбивают по порогам, а не вычисляют расстояния.
- Для линейных моделей Label Encoding неупорядоченных категорий создаёт ложные коэффициенты — лучше One-Hot Encoding.
- `LabelEncoder` из sklearn — для `y` (target), не для признаков. Для признаков с порядком используйте инструменты, которые позволяют явно задать нужную последовательность категорий.

## Ключевые термины урока

- **Label Encoding** — один числовой признак вместо N бинарных колонок. Безопасен только если: (1) признак действительно имеет порядок (ordinal), или (2) используются деревья, которые нечувствительны к численному масштабу.
- **Числовой код** — порядок присвоения кодов случаен (алфавитный по умолчанию). Berlin=0, Hamburg=1, Munich=2 — это не «рейтинг городов», хотя линейная модель интерпретирует именно так. Для признаков с >50 уникальными значениями без порядка — рассмотрите target encoding вместо label encoding.
- **Ложный порядок** — главная ловушка. Линейные модели и нейросети интерпретируют числа как расстояния: код «2» воспринимается как «вдвое больше, чем код 1». Деревья менее чувствительны, но тоже могут строить разбиения на основе числового значения, а не смысла.
- **LabelEncoder (sklearn)** — предназначен для кодирования `y` (target), а не признаков. Для признаков используйте `OrdinalEncoder` с явным `categories=[...]`: он гарантирует, что порядок кодов совпадёт с реальным порядком категорий, а не будет случайно алфавитным.

# 42. Ordinal Encoding простыми словами

## Зачем это нужно

Из урока «Label Encoding» мы знаем, что Label Encoding опасен ложным порядком для неупорядоченных категорий. **Ordinal Encoding** — правильный способ для категорий, где порядок действительно есть: `small < medium < large`, `junior < senior`. Числа здесь несут реальный смысл.

---

## Простая интуиция

Представьте шкалу остроты блюда в меню ресторана: мягкое, среднее, острое, очень острое. Числа здесь несут настоящий смысл — «очень острое» больше «острого», «острое» больше «среднего». Закодировать 1/2/3/4 — совершенно логично. Но взять то же кодирование для названий блюд (борщ=1, паста=2, суши=3) — уже бессмыслица: борщ не «меньше» пасты.

## Что это такое

**Ordinal Encoding** — это способ кодирования категориальных признаков, где категории заменяются числами с учётом их порядка.

Пример:

| size   | size_encoded |
| ------ | -----------: |
| small  |            0 |
| medium |            1 |
| large  |            2 |

Так модель получает числовой признак, где большее число действительно означает "выше", "больше" или "сильнее" по смыслу.

---

## Как это работает

### 1. Берём признак с порядком

Например:

```text
education_level = school / bachelor / master / phd
```

Здесь порядок есть:

```text
school < bachelor < master < phd
```

---

### 2. Задаём правильную последовательность

Важно не доверять случайному порядку из данных.

Нужно явно сказать:

```text
school   -> 0
bachelor -> 1
master   -> 2
phd      -> 3
```

---

### 3. Заменяем категории числами

Было:

| education_level |
| --------------- |
| bachelor        |
| phd             |
| school          |
| master          |

Стало:

| education_level_encoded |
| ----------------------: |
|                       1 |
|                       3 |
|                       0 |
|                       2 |

Теперь модель может использовать этот признак как число.

---

## Простой пример

Есть признак качества товара:

```text
quality = low / medium / high
```

У него есть порядок:

```text
low < medium < high
```

Можно закодировать так:

| quality | quality_encoded |
| ------- | --------------: |
| low     |               0 |
| medium  |               1 |
| high    |               2 |

Это логично, потому что `high` действительно выше, чем `medium`, а `medium` выше, чем `low`.

**Ключевой вывод:** если применить вместо Ordinal случайный Label Encoding (`good=0, high=1, low=2`), линейная модель получит перевёрнутый или бессмысленный порядок и будет делать хуже предсказания для товаров с признаком `quality`. Правильный маппинг — не деталь, а часть смысла признака.

---

### Ordinal Encoding vs Label Encoding

Оба способа заменяют категории числами, но смысл разный.

| Способ           | Что делает                              | Главный риск                   |
| ---------------- | --------------------------------------- | ------------------------------ |
| Label Encoding   | даёт категориям числовые коды           | может создать ложный порядок   |
| Ordinal Encoding | кодирует категории по реальному порядку | нужно правильно задать порядок |

Пример с городами:

```text
Berlin -> 0
Hamburg -> 1
Munich -> 2
```

Для городов это плохо, потому что порядка нет.

А вот для уровня:

```text
junior -> 0
middle -> 1
senior -> 2
```

это нормально, потому что порядок есть.

---

### Когда Ordinal Encoding подходит

Ordinal Encoding хорошо подходит для признаков вроде:

| Признак      | Порядок                            |
| ------------ | ---------------------------------- |
| size         | small < medium < large             |
| level        | beginner < intermediate < advanced |
| education    | school < bachelor < master < phd   |
| satisfaction | low < medium < high                |
| priority     | low < normal < high < critical     |

Главное условие:

> категории должны иметь понятный естественный порядок.

Если порядка нет, лучше использовать One-Hot Encoding.

---

### Важный момент

Ordinal Encoding сохраняет порядок, но не всегда точно передаёт расстояние между категориями.

Например:

```text
junior = 0
middle = 1
senior = 2
```

Порядок правильный.

Но это не значит, что разница между `junior` и `middle` точно такая же, как между `middle` и `senior`.

Числа здесь показывают порядок, а не точное расстояние.

---

## Практика

1. Коллега кодирует `satisfaction_level = bad / ok / good / excellent` через LabelEncoder и получает алфавитный порядок: bad=0, excellent=1, good=2, ok=3. Что здесь сломалось? Как исправить через OrdinalEncoder?
2. Коллега применил OrdinalEncoder к признаку `region = North / South / East / West` и задал алфавитный порядок: East=0, North=1, South=2, West=3. После обучения val accuracy = 0.79; после замены на One-Hot Encoding — 0.84. Объясни, что именно OrdinalEncoder сделал неправильно с точки зрения смысла данных, и почему One-Hot сработал лучше для этого признака.
3. Вы применяете OrdinalEncoder к признаку `priority` и ошибочно задаёте порядок `['high', 'normal', 'low']` вместо обратного. Как это скажется на качестве модели и как такую ошибку можно обнаружить?
4. В уроке «Линейная регрессия» мы видели, что она воспринимает числовые признаки как расстояния. В датасете есть признак `clothing_size = XS / S / M / L / XL / XXL`. Предложите правильный маппинг. Что нужно проверить перед тем, как использовать этот признак в LinearRegression после кодирования?
5. В уроке «Label Encoding» мы разбирали, что числа создают иллюзию равных расстояний между категориями. Признак `satisfaction = low / medium / high`. Вы закодировали: low=1, medium=2, high=3. Можно ли утверждать, что разница между low и medium такая же, как между medium и high? Что это говорит об ограничениях Ordinal Encoding?

## Краткий итог

* Ordinal Encoding превращает категории в числа с учётом порядка.
* Он подходит только для признаков, где порядок реально есть.
* Примеры: размер, уровень, приоритет, образование, качество.
* Для категорий без порядка лучше использовать One-Hot Encoding.
* Числа в Ordinal Encoding показывают порядок, но не всегда точное расстояние между категориями.

## Ключевые термины урока

- **Ordinal Encoding** — как Label Encoding, но **порядок задаётся явно**. Разница принципиальная: Label Encoding присваивает числа произвольно, Ordinal — по заданному вами правилу.
- **Порядок категорий** — должен быть задан **вручную**, не доверяя алфавитному порядку из данных. Ошибка в маппинге тихо искажает сигнал: `high=1, low=2` перевернёт порядок и даст обратный смысл.
- **OrdinalEncoder (sklearn)** — принимает параметр `categories=[['low', 'medium', 'high']]`, фиксируя нужный порядок. В отличие от `LabelEncoder`, работает с 2D-массивом признаков.
- **Маппинг** — явное соответствие категория → число. Хранить его стоит отдельно (словарём или в `OrdinalEncoder`), чтобы воспроизвести в production без ошибок.

# 43. Создание новых признаков

## Зачем это нужно

Иногда в данных уже есть полезная информация, но она лежит не в самом удобном виде.
Модель может видеть отдельные колонки, но не понимать важную связь между ними.

**Создание новых признаков** помогает явно показать модели полезные закономерности.

---

## Простая интуиция

Педиатр смотрит на рост и вес ребёнка — оба в пределах нормы по отдельности. Но ИМТ (вес/рост²) может показать отклонение, которое ни рост, ни вес сами по себе не демонстрировали. Создание признаков — это то же самое: из нескольких «простых» фактов вычислить более информативный, который модель не извлечёт, глядя на исходные колонки по отдельности.

## Что это такое

**Создание новых признаков** — это процесс, где мы получаем новые колонки из уже существующих данных.

Новый признак может быть:

* отношением двух чисел;
* разницей между значениями;
* группировкой;
* флагом `0/1`;
* частью даты;
* упрощённой версией сложного признака.

Главная идея:

> новый признак должен добавлять полезный смысл, а не просто увеличивать количество колонок.

---

## Как это работает

### 1. Смотрим на смысл колонок

Перед созданием признака нужно понять, что означают исходные данные.

Например:

```text
total_spent
orders_count
```

Если это сумма покупок и количество заказов, из них логично получить средний чек.

---

### 2. Создаём новый признак

Пример:

```text
average_order_value = total_spent / orders_count
```

Это может быть полезнее, чем смотреть только на сумму покупок.

Пользователь с 1 заказом на 1000 и пользователь с 10 заказами на 1000 — разные случаи.

---

### 3. Проверяем, нет ли утечки данных

Нельзя создавать признак из target.

Например, если мы предсказываем `price`, нельзя делать:

```text
price_per_m2 = price / area_m2
```

Потому что `price` — это ответ, который модель должна предсказать.
Такой признак будет нечестной подсказкой.

---

### 4. Проверяем, был бы признак известен в момент предсказания

Главный вопрос:

> эта информация была бы доступна до того, как модель делает предсказание?

Если нет — признак использовать нельзя.

---

### Примеры новых признаков

#### 1. Отношение

```text
average_order_value = total_spent / orders_count
```

Показывает средний чек.

---

### 2. Разница

```text
days_since_last_order = today - last_order_date
```

Показывает, как давно пользователь ничего не покупал.

---

### 3. Флаг 0/1

```text
is_weekend = 1
```

если событие произошло в выходной.

```text
is_first_floor = 1
```

если квартира находится на первом этаже.

---

### 4. Признаки из даты

Из даты можно получить:

```text
day_of_week
month
hour
is_weekend
```

Сама дата может быть неудобной, а отдельные части даты — полезными.

---

### 5. Группировка

Возраст можно превратить в возрастную группу:

```text
18-25
26-35
36-50
50+
```

Иногда группе проще показать общий смысл, чем точному числу.

---

## Простой пример

Есть данные:

| total_spent | orders_count | last_order_days_ago |
| ----------: | -----------: | ------------------: |
|        1000 |            5 |                   3 |
|         300 |            1 |                  40 |
|        2400 |           12 |                   2 |

Можно создать новый признак:

```text
average_order_value = total_spent / orders_count
```

Получим:

| total_spent | orders_count | average_order_value | last_order_days_ago |
| ----------: | -----------: | ------------------: | ------------------: |
|        1000 |            5 |                 200 |                   3 |
|         300 |            1 |                 300 |                  40 |
|        2400 |           12 |                 200 |                   2 |

Теперь модель видит средний чек напрямую.

Обратите внимание на пользователей 1 и 3: оба имеют `average_order_value = 200`, но пользователь 3 совершил в 2.4 раза больше заказов. Пользователь 2 с `avg=300` — меньше трат суммарно, но дороже каждая покупка. Без `average_order_value` модель видела бы только суммарные числа и не могла бы различить «активного покупателя недорогих товаров» и «редкого покупателя дорогих товаров» — два разных профиля с очень разным поведением.

---

### Хороший новый признак

Хороший признак обычно отвечает хотя бы на один вопрос:

* он добавляет новый смысл?
* он помогает лучше описать объект?
* он был бы известен в момент предсказания?
* он не содержит target внутри себя?
* он понятен по логике задачи?

Если новый признак просто создаётся "потому что можно", пользы может не быть.
Иногда лишние признаки только добавляют шум.

---

## Практика

1. Вы добавили 10 новых производных признаков и обнаружили, что качество модели упало. Назовите две вероятные причины.
2. В данных есть `registration_date` и `first_order_date`. Придумайте один производный признак из этих двух колонок и объясните, что он говорит о поведении клиента.
3. Из даты `order_date` вы хотите создать три новых признака. Назовите их и объясните, какую закономерность каждый позволяет обнаружить.
4. В уроке «Как выбирать признаки для X» мы разбирали, что признак должен быть известен до момента предсказания. Вы хотите создать признак `days_since_purchase` для модели, предсказывающей повторную покупку. Когда он будет честным признаком, а когда — нечестной подсказкой?
5. Признак «этаж» можно закодировать двумя способами: числовой `floor` (1, 2, 3, ...) или бинарный флаг `is_first_floor` (1 если первый, иначе 0). Вы предсказываете цену квартиры. Объясните, почему бинарный флаг точнее передаёт влияние первого этажа на цену, и назовите ещё одну ситуацию, где числовой признак стоит заменить флагом по той же причине.

## Краткий итог

* Создание новых признаков — это получение новых колонок из уже существующих данных.
* Новый признак должен добавлять полезный смысл.
* Частые варианты: отношения, разницы, флаги, признаки из дат, группировки.
* Нельзя создавать признаки из target.
* Важно проверять, был бы признак известен в момент предсказания.
* Хорошие признаки могут улучшить модель сильнее, чем замена алгоритма.

## Ключевые термины урока

- **Создание признаков** — не просто «добавить колонок», а явно показать модели взаимосвязь, которую та не найдёт сама. Пример: `avg_order = total / count` передаёт сигнал, который модель не извлечёт, глядя на два числа по отдельности.
- **Производный признак** — вычислен из исходных, но **не должен содержать target внутри себя**. Проверка: если убрать target из формулы, признак по-прежнему вычислим? Если нет — это утечка.
- **Флаг** — бинарный признак (0/1), полезен когда отношение нелинейно: `is_first_floor` ловит резкий скачок цены, который числовой `floor` размажет равномерно по оси.
- **Признаки из дат** — сырая дата (`2026-05-13`) почти бесполезна для большинства моделей; `day_of_week`, `month`, `is_weekend` — конкретные сигналы. Главное: признак должен быть известен **до** события, которое предсказываем.

# 44. Удаление лишних признаков

## Зачем это нужно

Больше признаков — не всегда лучше.

Иногда в таблице есть колонки, которые:

* не помогают модели;
* добавляют шум;
* дублируют другие признаки;
* содержат техническую информацию;
* могут привести к утечке данных;
* делают обучение медленнее.

**Удаление лишних признаков** нужно, чтобы оставить в данных только то, что реально может помочь модели.

---

## Простая интуиция

Представьте резюме кандидата на 5 страницах, где вперемешку: опыт работы, навыки, рекомендации — и номер страхового полиса, любимый цвет, ID паспорта. Работодатель читает всё, тратит время на лишнее и рискует обратить внимание не туда. Чем больше бесполезных данных — тем труднее найти настоящий сигнал. Модель реагирует так же.

## Что это такое

**Удаление лишних признаков** — это этап Feature Engineering, где мы убираем колонки, которые не стоит передавать модели.

Цель не в том, чтобы сделать таблицу меньше ради красоты.
Цель — улучшить качество данных для обучения.

```text
сырые признаки -> отбор полезных признаков -> модель
```

---

## Как это работает

### 1. Технические идентификаторы

Примеры:

```text
id
user_id
row_number
transaction_uuid
```

Такие колонки часто нужны для хранения данных, но не для обучения модели.
Они могут быть случайными и не иметь полезного смысла для предсказания.

---

### 2. Колонки с утечкой данных

Это признаки, которые содержат информацию о target или о будущем.

Например, если мы предсказываем, купит ли пользователь товар, нельзя использовать колонку:

```text
purchase_date
```

если она появляется только после покупки.

Главный вопрос:

> эта информация была бы известна в момент предсказания?

Если нет — колонку нужно убрать.

---

### 3. Дублирующие признаки

Иногда в данных есть почти одинаковые колонки.

Например:

```text
price_rub
price
```

Если обе колонки содержат одно и то же, одна из них может быть лишней.
Дубли могут перегружать данные и не добавлять нового смысла.

---

### 4. Константные признаки

Если колонка почти везде имеет одно и то же значение, она обычно бесполезна.

Пример:

| country |
| ------- |
| Germany |
| Germany |
| Germany |
| Germany |

Если все объекты из одной страны, признак `country` не помогает модели различать объекты между собой.

---

### 5. Очень шумные признаки

Иногда колонка вроде бы выглядит полезной, но по смыслу ничего не объясняет.

Например:

```text
random_code
session_hash
internal_number
```

Такие признаки могут создавать ложные закономерности.

---

## Простой пример

Есть таблица для предсказания покупки:

| user_id | age | city    | orders_count | random_code | bought |
| ------: | --: | ------- | -----------: | ----------- | -----: |
|     101 |  25 | Berlin  |            3 | AX91        |      1 |
|     102 |  40 | Hamburg |            0 | QP22        |      0 |
|     103 |  31 | Berlin  |            5 | LM77        |      1 |

`bought` — target.

Что можно оставить:

```text
age
city
orders_count
```

Что лучше убрать:

```text
user_id
random_code
```

Почему:

* `user_id` — технический идентификатор;
* `random_code` — случайный код без понятного смысла;
* `bought` нельзя оставлять в X, потому что это target.

Если оставить `user_id` в X: на train модель может случайно «выучить» связь между конкретными ID и target (пользователь 101 всегда покупал — запомним). train accuracy = 0.95, val accuracy = 0.61. В production придут новые пользователи с новыми ID — модель не знает их и возвращает что попало. Это переобучение на технический мусор: модель запомнила конкретные объекты, а не закономерность.

---

### Как понять, что признак лишний

Перед удалением признака можно задать несколько вопросов:

1. Этот признак описывает объект по смыслу?
2. Он был бы известен в момент предсказания?
3. Он не является target или его прямым следствием?
4. Он не дублирует другую колонку?
5. В нём есть разные значения, а не одно и то же почти везде?

Если ответ "нет" — признак стоит проверить внимательнее.

---

### Удалять признаки нужно осторожно

Не стоит удалять колонки просто потому, что они выглядят странно.

Иногда необычный признак может быть полезным.

Например:

```text
orders_count
last_login_days_ago
failed_payments_count
```

На первый взгляд это просто числа.
Но они могут хорошо описывать поведение объекта.

Поэтому правильный подход такой:

```text
понять смысл признака -> проверить риск утечки -> оценить пользу -> удалить или оставить
```

---

## Практика

1. Команда обучила модель рекомендаций товаров: признаки — `user_id`, `age`, `city`, `orders_count`. Train F1 = 0.94, val F1 = 0.63. Ты подозреваешь один из признаков. Как проверить гипотезу — не удаляя признак сразу — что именно он вызывает разрыв? Какой конкретный шаг диагностики подтвердит или опровергнет подозрение?
2. В данных есть признаки `total_orders` (всего заказов) и `completed_orders` (заказов со статусом «доставлено»). Стоит ли оставить оба или один лишний? Что нужно проверить перед удалением?
3. В датасете 10 000 строк, признак `country`: 9 720 строк — 'Germany', 280 — 'Austria'. После удаления признака val score вырос на 0.03. Объясни конкретный механизм, через который почти константный признак не просто «бесполезен», но активно мешает — особенно в Random Forest и бустинге.
4. В уроке «Как выбирать признаки для X» мы разбирали правило «признак должен быть известен до момента предсказания». Как это правило применяется на этапе удаления лишних признаков? Приведите конкретный пример признака, который нужно удалить по этой причине.
5. В уроке «Overfitting и Underfitting» мы видели, что модель может запомнить шум вместо закономерности. Вы удалили 5 признаков из X, и val-метрика улучшилась. Объясните, как лишние признаки связаны с переобучением и почему меньше признаков дало лучший результат.

## Краткий итог

- Хороший набор признаков важнее большого количества колонок: шум мешает модели найти реальный сигнал.
- Всегда удалять: технические ID, нечестные признаки (появляются после события), target из X.
- Проверять перед удалением: дублирующие и константные колонки — они не дают пользы, но убедитесь что не несут скрытого смысла.
- Overfit на ID — модель запоминает конкретные объекты train и не обобщается на новые данные с незнакомыми ID.

## Ключевые термины урока

- **Лишние признаки** — включают четыре класса: технические ID, дубликаты, константы и нечестные признаки. Каждый вредит по-своему: первые три добавляют шум, последние создают иллюзию хорошей модели.
- **Шум** — признак может коррелировать с target **на конкретном train**, но не воспроизводится на новых данных. Чем больше шумных признаков, тем выше риск переобучения.
- **Технический ID** — числовой по виду, но не числовой по смыслу. Модель может «выучить» связь `user_id → target` на train, которой нет в природе — это форма переобучения, а не нечестный признак.
- **Нечестный признак** — в отличие от технического мусора, он активно «подсказывает» ответ (появляется после события или содержит target). Результат: метрика на val отличная, в production — резкое падение.

# 45. Data Leakage: опасная ошибка в ML

## Зачем это нужно

Data Leakage — одна из самых опасных ошибок в машинном обучении.

Модель может показывать отличное качество на обучении и тестах, но плохо работать в реальности.

Почему так происходит?

Потому что в признаки случайно попадает информация, которой у модели **не должно было быть в момент предсказания**.

---

## Простая интуиция

Представь студента, готовящегося к экзамену. Честный вариант: изучает учебник, сдаёт экзамен по своим знаниям. Нечестный вариант: учебник плюс готовые ответы к конкретным билетам. Результат — отличный, но только в этот раз. На следующем экзамене с другими билетами — провал. В ML то же самое: модель получает подсказку из будущего или из самого ответа, кажется умной на val — но в production подсказки нет.

## Что это такое

**Data Leakage** — это ситуация, когда в обучение модели попадает информация, которая не должна быть доступна при реальном предсказании.

Проще:

> модель случайно получает подсказку к правильному ответу.

Из-за этого качество на validation/test может выглядеть слишком хорошим.

Но это качество нечестное.

---

## Как это работает

Допустим, мы хотим предсказать:

```text
купит пользователь товар или нет
```

Target:

```text
bought = 1 / 0
```

В данных есть колонка:

```text
purchase_date
```

Проблема: дата покупки появляется только после покупки.

Если использовать `purchase_date` как признак, модель почти напрямую узнает ответ.

```text
есть purchase_date -> скорее всего bought = 1
нет purchase_date -> скорее всего bought = 0
```

Это утечка данных.

---

### Основные виды Data Leakage

#### 1. Target попал в признаки

Самый прямой вариант.

Например, мы предсказываем `price`, но создаём признак:

```text
price_per_m2 = price / area_m2
```

`price` — это target.
Значит, модель получила часть правильного ответа внутри признака.

Так делать нельзя.

---

### 2. Temporal leakage: признак появился после события

**Temporal leakage** (временной leakage) — особый вид утечки: обучающие данные содержат информацию из будущего относительно момента предсказания (например, использование данных после целевого события для предсказания этого события). Иначе говоря, признак становится известен только после того, что мы предсказываем — модель обучается на данных, которых у неё не будет в момент реального предсказания.

Пример:

```text
bought
purchase_date
delivery_status
final_payment_amount
```

Если мы предсказываем покупку заранее, нельзя использовать данные, которые появились после покупки.

Главный вопрос:

> эта колонка была бы известна в момент предсказания?

Если нет — её нельзя использовать.

---

### 3. Обработка данных сделана до split

Иногда утечка появляется не из-за колонки, а из-за неправильного порядка действий.

Например, нельзя сначала посчитать среднее по всему датасету, заполнить пропуски, а потом делить данные на train/test.

Плохо:

```text
весь датасет -> fill missing -> split
```

Правильно:

```text
split -> fit обработки на train -> применить к validation/test
```

Иначе информация из test попадёт в train через обработку данных.

---

### 4. Дубликаты между train и test

Если одинаковые или почти одинаковые объекты попали и в train, и в test, модель может просто запомнить их.

Качество будет выглядеть хорошим, но проверка уже не будет честной.

---

## Простой пример

Задача:

```text
предсказать, уйдёт ли клиент из сервиса
```

Target:

```text
churn = 1 / 0
```

Есть признаки:

| Признак                   | Можно использовать? | Почему                                 |
| ------------------------- | ------------------- | -------------------------------------- |
| age                       | да                  | известен заранее                       |
| plan_type                 | да                  | известен заранее                       |
| orders_count_last_30_days | да                  | если считается до момента предсказания |
| cancellation_date         | нет                 | появляется после ухода                 |
| final_status              | нет                 | напрямую связан с ответом              |

`cancellation_date` и `final_status` дают модели подсказку из будущего. Это Data Leakage.

Что происходит в production: модель запрашивает `cancellation_date` для нового пользователя — поля ещё нет, он не ушёл. Модель видит пустое значение вместо привычного сигнала и возвращает случайный результат. F1 на val был 0.97 — в production упал до 0.52. Хуже монетки.

---

### Как находить Data Leakage

Перед тем как добавить признак в `X`, задай три вопроса:

1. Эта колонка была бы известна в момент предсказания?
2. Не содержит ли она target напрямую или косвенно?
3. Не появилась ли она после события, которое мы пытаемся предсказать?

Если есть сомнение — признак нужно проверить внимательнее.

---

### Почему это опасно

Data Leakage опасна тем, что создаёт иллюзию хорошей модели.

Модель может показывать:

```text
accuracy = 0.99
```

Но не потому, что она нашла настоящие закономерности.
А потому что получила нечестную подсказку.

В реальности качество резко упадёт, потому что таких подсказок уже не будет.

---

## Практика

1. Дата-сайентист показывает тебе модель одобрения кредита: val F1 = 0.97. Ты подозреваешь Data Leakage. Назови три конкретных вопроса — по одному на каждый вид leakage: target, temporal, preprocessing — которые ты задашь аналитику, чтобы выяснить, что именно пошло не так.
2. Аналитик строит модель предсказания зарплаты (`salary`). Среди признаков добавляет `salary_band` — категорию: 'low' если salary < 50k, 'high' если salary ≥ 50k. Val R² = 0.99. Объясни точный механизм leakage: почему `salary_band` передаёт модели ответ и чем это отличается от честного категориального признака.
3. Два аналитика обрабатывают 5 000 строк (800 пропусков в признаке `income`). Аналитик А считает медиану до split по всем строкам — 52 400 ₽. Аналитик Б делает split сначала и считает медиану только по 4 000 train строкам — 52 100 ₽. Коллега говорит: «300 рублей — не важно». Объясни, почему это не вопрос точности числа, а вопрос принципа — какие строки «попали» в медиану А и почему это делает val-метрику нечестной.
4. В уроке «Как выбирать признаки для X» мы разбирали, что признак должен быть известен до момента предсказания. Вы строите модель одобрения кредита. Среди признаков есть `loan_amount` (запрошенная клиентом сумма) и `approved_amount` (одобренная банком сумма). Какой из двух признаков является утечкой и почему?
5. В уроке «Baseline-модель» мы видели, что даже простейшая модель имеет определённый уровень качества. Простая модель неожиданно показала accuracy = 0.99 на val-выборке в задаче, где baseline около 0.70. Назовите два признака того, что такой результат — следствие Data Leakage, а не реального качества модели.

## Краткий итог

- Симптом leakage — нереалистично высокая метрика: 0.99 там, где 0.80 уже хорошо.
- Три вида: target leakage (ответ в признаках), temporal leakage (будущие данные), preprocessing leakage (статистика test в train).
- Главный вопрос для каждого признака: «Была бы эта информация известна в момент предсказания?»
- Лечение preprocessing leakage — всегда Pipeline: сначала split, потом fit обработки только на train.

## Ключевые термины урока

- **Data Leakage** — симптом: нереалистично высокая метрика на val (99.9% там, где 80% — уже хорошо). Коварство: модель кажется отличной, ломается только в production — там «будущих» данных нет.
- **Target leakage** — признак вычислен из target или становится известен только одновременно с ним. Главный вопрос: «Был бы этот признак известен в момент предсказания?» Если нет — это leakage.
- **Temporal leakage** — в задачах с временными рядами shuffle=True при split = leakage: train видит «будущие» примеры. Лечение: TimeSeriesSplit или разбивка по дате вручную.
- **Preprocessing leakage** — scaler/imputer обучен на всём датасете до split: test просочился в train через статистики. Лечение: всегда Pipeline + сначала split, потом fit.

# 46. Почему модель ошибается

## Зачем это нужно

Понимание причин ошибок модели — первый шаг к её улучшению. Без диагностики разработчик действует вслепую: меняет архитектуру, добавляет данные, подбирает параметры — и не знает, поможет ли это. Умение определить источник проблемы экономит недели работы.

## Простая интуиция

Представьте повара, который учится готовить. Он может научиться идеально готовить ровно одно блюдо — и оказаться беспомощным с любым другим запросом. Или пытаться угадать вкус, не имея нужных ингредиентов. Или готовить по чужим конспектам, не понимая смысла. Каждая причина плохого результата требует своего лечения — нельзя просто «готовить лучше» без диагноза.

## Что это такое

Модели ошибаются по нескольким типичным причинам:

- **Underfitting (недообучение)** — модель слишком простая, не улавливает закономерности даже в тренировочных данных
- **Overfitting (переобучение)** — модель запомнила обучающую выборку, но не обобщает на новые данные
- **Неправильные признаки** — в данных нет информации, нужной для предсказания (или нужные признаки отсутствуют)
- **Плохие данные** — шум, ошибки разметки, выбросы, несбалансированные классы
- **Утечка данных (data leakage)** — в тренировке случайно использована информация из будущего или из теста

## Как это работает

Главный инструмент диагностики — сравнение метрики на обучающей и тестовой выборке:

- **Недообучение:** train = 0.61, test = 0.59 → оба низкие, модель слишком проста
- **Переобучение:** train = 0.99, test = 0.71 → train >> test, модель запомнила обучающую выборку
- **Норма:** train = 0.88, test = 0.85 → близкие значения, хорошая модель

## Простой пример

Компания обучает модель предсказания кредитного дефолта на 10 000 клиентах. Простая логистическая регрессия: train accuracy 62%, test accuracy 61% — оба показателя низкие, модель не улавливает паттерны. Глубокое дерево без ограничений: train accuracy 99%, test accuracy 68% — явное переобучение. Дерево с max_depth=5: train 85%, test 83% — разумный баланс. Диагноз поставлен за 3 минуты, без перебора алгоритмов вслепую.

## Практика

1. Коллега говорит: «Модель плохо работает — нужно взять более сложный алгоритм». Как сравнение метрик train vs test поможет определить, прав ли коллега? Когда смена алгоритма точно не поможет?
2. Команда обучила три модели: А — train=0.62, test=0.60; Б — train=0.93, test=0.80; В — train=0.99, test=0.51. Менеджер выбирает Б («самый высокий test»), директор выбирает А («нет переобучения»). Объясни, почему оба аргумента неполны, и дай финальную рекомендацию с обоснованием.
3. Вы обучили модель предсказания цены квартиры: Train RMSE = 500 000, Test RMSE = 520 000. Каков диагноз и что вы сделаете дальше?
4. Как data leakage маскируется под «хорошую модель»? По каким признакам можно заподозрить утечку ещё до деплоя?
5. Из урока «Cross-validation» мы знаем, что один split может давать случайный результат. Train accuracy = 99%, test accuracy = 61%. Какую конкретную проблему это указывает, и почему кросс-валидация помогла бы обнаружить её раньше?

## Краткий итог

- Модели ошибаются по нескольким причинам: недообучение, переобучение, плохие признаки, плохие данные
- Сравнение метрик на train и test — главный диагностический инструмент
- Переобучение: train >> test; Недообучение: оба низкие
- Диагностика должна предшествовать любым улучшениям модели

## Ключевые термины урока

- **Underfitting (недообучение)** — диагноз: train ≈ test, оба низкие. Лечение: усложнить модель, добавить признаки. В отличие от overfitting, больше данных не поможет.
- **Overfitting (переобучение)** — диагноз: train >> test. Лечение: регуляризация, больше данных, упрощение модели. Особенно опасно при малых датасетах.
- **Data leakage (утечка данных)** — информация из test или из будущего случайно попала в train; симптом — нереалистично высокая метрика на тесте (например, 99% там, где 80% уже хорошо).
- **Диагностический разрыв** — разница (train − test) по метрике: <3% — норма, 5–15% — переобучение, ~0% при плохом train — недообучение.

# 47. Bias и Variance

## Зачем это нужно

Bias-variance tradeoff — фундаментальная концепция машинного обучения, объясняющая главное противоречие: чем сложнее модель, тем меньше ошибка на обучении, но больше риск переобучения. Понимание этого баланса помогает принимать осознанные решения о сложности модели и объёме данных.

## Простая интуиция

Представьте лучника на соревновании. Если он всегда промахивается чуть левее цели — это систематическая ошибка, смещение: стрелы предсказуемо летят не туда. Если стрелы каждый раз летят в разные места — это разброс: результат непредсказуем. Лучший лучник — стрелы кучно попадают в цель: и без смещения, и без разброса.

## Что это такое

- **Bias (смещение)** — систематическая ошибка модели: насколько предсказания в среднем отклоняются от истинных значений. Высокий bias = underfitting
- **Variance (дисперсия)** — насколько сильно модель меняется при изменении обучающих данных. Высокая variance = overfitting
- **Tradeoff** — уменьшение bias обычно увеличивает variance и наоборот
- **Общая ошибка** = Bias² + Variance + Irreducible Noise *(строго это разложение выводится для MSE при регрессии; для классификации с cross-entropy аналогичного замкнутого выражения нет, но интуиция bias/variance сохраняется)*
- **Irreducible noise** — шум в данных, который нельзя устранить никакой моделью

## Как это работает

Чем сложнее модель, тем ниже bias, но выше variance. Пример на дереве решений (параметр глубины):

| Глубина дерева | train | test | Bias | Variance |
|---|---|---|---|---|
| 1 | 0.62 | 0.60 | высокий | низкая |
| 4 | 0.88 | 0.86 | баланс | баланс |
| 20 | 0.99 | 0.72 | низкий | высокая |

Irreducible noise остаётся при любой сложности модели.

## Простой пример

Датасет из 500 медицинских снимков для предсказания наличия опухоли. Логистическая регрессия (высокий bias): RMSE одинаково плохо на train и test — модель слишком проста, не улавливает нелинейные паттерны. Дерево решений без ограничений (высокая variance): отлично на train, провал на test — запомнило шум в 500 примерах. Случайный лес (баланс): умеренно хорошо и там, и там. Irreducible noise — некачественные снимки с плохим разрешением, которые никакая модель не классифицирует верно.

## Практика

1. Вы обучаете модель на одной выборке из 100 примеров, затем на другой 100 из той же базы — и получаете совершенно разные предсказания. Это высокий bias или высокая variance? Что нужно изменить?
2. В датасете 10% примеров размечены неверно из-за ошибок аннотаторов. Ваша лучшая модель достигла точности 91%. Можно ли преодолеть этот потолок более сложной моделью? Что это говорит о природе ошибки?
3. Вы строите модель: простая даёт RMSE 8 на train и 9 на test; сложная — 2 на train и 15 на test. Какой тип ошибки у каждой и какую модель выбрать?
4. Как формула Total Error = Bias² + Variance + Irreducible Noise объясняет, почему увеличение глубины дерева из урока «Decision Tree» одновременно снижает один тип ошибки и повышает другой?
5. Из урока «Кросс-валидация» мы знаем, что разброс метрик между фолдами отражает стабильность модели. При 5-fold CV вы получаете: 0.91, 0.74, 0.89, 0.72, 0.93 (std=0.09). Это большой разброс. Какой тип ошибки — высокий bias или высокая variance — это сигнализирует? Назовите два способа это исправить.

## Краткий итог

- Bias и variance нельзя снижать одновременно: это фундаментальный trade-off, определяющий стратегию улучшения модели
- Высокий bias = underfitting, высокая variance = overfitting
- Общая ошибка = Bias² + Variance + Irreducible Noise *(формула строго верна для MSE / регрессии)*
- Цель — найти баланс: достаточно сложная модель, но не переобученная

## Ключевые термины урока

- **Bias (смещение)** — ошибка от заниженной сложности модели; виден как высокая ошибка на train. Проявляется в линейной модели на нелинейных данных. Снижается увеличением сложности модели.
- **Variance (дисперсия)** — ошибка от чувствительности к конкретной выборке; виден как разрыв train/test. Обучи ту же модель на другом разбиении — получишь другой результат. Снижается ограничением сложности модели (регуляризацией — штрафом за слишком большие веса, подробнее в уроке 24) и ансамблями (объединением нескольких моделей).
- **Bias-variance tradeoff** — увеличение сложности модели одновременно снижает bias и увеличивает variance; задача — найти точку минимума суммарной ошибки.
- **Irreducible noise** — шум, встроенный в сами данные (ошибки разметки, случайность природы); его не снизит ни одна модель, сколько бы сложной она ни была.

# 48. Imbalanced Classes

## Зачем это нужно

Несбалансированные классы — одна из самых частых проблем в реальных задачах: обнаружение мошенничества, диагностика болезней, спам-фильтрация. Если проигнорировать дисбаланс, модель будет казаться точной, но на практике окажется бесполезной — она просто предскажет всегда «нет» и получит 99% accuracy.

## Простая интуиция

Представьте, что вы предсказываете, упадёт ли самолёт. Из 10 000 рейсов только 1 заканчивается катастрофой. Если ваша модель всегда говорит «не упадёт» — она права в 99.99% случаев. Но она полностью бесполезна именно для того, для чего создавалась.

## Что это такое

- **Несбалансированные классы** — когда один класс встречается намного чаще другого (например, 99% vs 1%)
- **Accuracy-парадокс** — высокая точность при тривиальной модели, предсказывающей только большинство
- **Minority class** — редкий класс, который чаще всего и является целевым
- **Majority class** — преобладающий класс
- Серьёзность имбаланса зависит от **цены ошибки**: 1:50 в онкологии — критично, 1:10 в спам-фильтре — управляемо. Не ориентируйся только на соотношение — смотри на recall и F1 для minority class

## Как это работает

Accuracy обманывает при несбалансированных классах. Если модель всегда предсказывает большинство (95% объектов):

- accuracy = 0.95 — выглядит хорошо!
- Но recall для minority class = 0.00 → редкий класс не находится вообще

Правильный инструмент — отчёт по каждому классу отдельно: смотрите на precision, recall и F1 для minority class, а не на accuracy.

## Простой пример

Банк обучает модель обнаружения мошенничества на 100 000 транзакций: 99 000 нормальных и 1 000 мошеннических. Наивная модель «всё нормально» получает accuracy = 0.99 — выглядит отлично. Но recall для мошеннических транзакций равен 0: ни одна атака не поймана. Когда смотрят на F1-score для класса «мошенничество» — он равен 0. Это немедленно разоблачает бесполезность модели.

## Практика

1. Email-сервис строит спам-фильтр: 95% писем — не спам, 5% — спам. Модель получила accuracy = 0.96. Менеджер доволен. Аналитик скептичен. Какой один вопрос должен задать аналитик — и что ответ на него может выявить?
2. Вы решаете задачу fraud detection (99:1). Вас просят выбрать одну метрику для мониторинга в production. Вы выбираете recall, коллега — precision. Кто прав? При каких условиях коллега может быть прав?
3. Датасет: 9800 здоровых пациентов и 200 больных. Модель всегда предсказывает «здоров». Какой accuracy она получит и почему это катастрофа с точки зрения recall?
4. В уроке «Confusion Matrix» мы видели четыре ячейки: TP, FP, FN, TN. Какая конкретная ячейка немедленно демонстрирует провал модели при несбалансированных классах, который скрыт в accuracy?
5. Из урока «Метрики классификации» мы знаем, что F1-score — это гармоническое среднее precision и recall. Почему при несбалансированных классах F1-score информативнее accuracy? Что именно он учитывает, чего не учитывает accuracy?

## Краткий итог

- Несбалансированные классы создают иллюзию хорошей модели через высокую accuracy
- Пропустить редкий класс часто дороже, чем ложная тревога: метрики должны это отражать, а не скрывать высоким accuracy
- Правильные метрики: F1-score, precision, recall для minority class
- Всегда проверяйте распределение классов до начала обучения

## Ключевые термины урока

- **Несбалансированные классы** — соотношение 1:10 управляемо, 1:100 критично; серьёзность зависит не только от пропорции, но и от цены ошибки на minority class.
- **Accuracy-парадокс** — модель, предсказывающая только «0» при 99% нулей, получает 99% accuracy и 0% recall на целевом классе; именно поэтому accuracy — плохая метрика при дисбалансе.
- **Minority class** — редкий класс, для которого recall и F1 критически важны; смотрите отчёт `classification_report` именно по этому классу.
- **Majority class** — преобладающий класс; высокий recall на нём почти ничего не стоит при сильном дисбалансе.

# 49. Что делать с несбалансированными классами

## Зачем это нужно

Зная, что дисбаланс есть, нужно уметь с ним бороться. Существует несколько практичных техник, которые работают в разных ситуациях. Правильный выбор метода может превратить бесполезную модель в рабочую без сбора новых данных.

## Простая интуиция

Представьте, что у вас 1000 фото собак и 10 фото кошек для обучения классификатора. Вы можете скопировать редкие фото кошек несколько раз, чтобы выровнять количество. Или выбросить часть лишних фото собак. Или сказать алгоритму: «За пропущенную кошку штрафуй меня в 100 раз больше, чем за ошибку с собакой». Три разных подхода к одной и той же проблеме.

## Что это такое

- **Oversampling** — увеличение minority class: дублирование примеров или генерация синтетических (SMOTE)
- **Undersampling** — уменьшение majority class: случайное удаление примеров
- **class_weight** — параметр в sklearn, увеличивающий штраф за ошибки на редком классе
- **SMOTE** (Synthetic Minority Over-sampling Technique) — создаёт новые синтетические примеры путём интерполяции
- **Threshold tuning** — изменение порога классификации (по умолчанию 0.5) для баланса precision/recall

## Как это работает

Три основных подхода к борьбе с дисбалансом классов:

**Метод 1: class_weight="balanced"** — первое что пробуем, ничего не меняет в данных. Параметр сообщает алгоритму штрафовать сильнее за ошибки на редком классе.

**Метод 2: изменение порога классификации** — по умолчанию порог 0.5. Снижение порога до 0.3 увеличивает recall, но снижает precision. Порог подбирается исходя из цены ошибок задачи.

**Метод 3: SMOTE** — генерация синтетических примеров для minority class путём интерполяции между соседними объектами. Применять только к train-выборке.

## Простой пример

Медицинская система диагностики рака кожи: 9 500 снимков здоровой кожи и 500 снимков с меланомой. Первый шаг — добавить `class_weight="balanced"`: recall для меланомы вырастает с 12% до 61% без изменения данных. Затем снижают порог классификации с 0.5 до 0.3 — recall достигает 78%, но precision падает до 45%. В медицине это приемлемо: лучше ложная тревога, чем пропущенный рак. Если этого мало — применяют SMOTE для генерации 1 000 синтетических снимков меланомы.

## Практика

1. После добавления `class_weight='balanced'` recall для minority class вырос с 8% до 45%. Вы решаете попробовать SMOTE. Какие улучшения вы ожидаете, если class_weight уже работает? Есть ли риски в применении SMOTE поверх class_weight?
2. Дата-аналитик применил SMOTE к полному датасету (5 000 строк), потом сделал split и обучил модель — F1 = 0.89. Коллега указал на ошибку. Аналитик ответил: «Ничего страшного — SMOTE только добавляет данные, а не смотрит в test». Объясни, в чём именно неправ аналитик: через какой конкретный механизм синтетические примеры «просочились» в val и почему F1 = 0.89 нечестная оценка.
3. Вы работаете над детектором мошенничества: 99% транзакций нормальные, 1% мошеннические. Какой подход попробуете первым и как оцените результат?
4. Из урока «Метрики классификации» мы знаем, что precision и recall находятся в обратной зависимости. Как изменение порога классификации с 0.5 до 0.3 использует этот принцип и почему выбор конкретного порога всегда компромисс?
5. Из урока «Train / Validation / Test» мы знаем, что данные нельзя «видеть» до обучения. Почему SMOTE, применённый до разделения на train и test, нарушает это правило и чем это грозит на практике?

## Краткий итог

- Первый шаг: попробуйте class_weight="balanced" — просто и эффективно
- SMOTE создаёт синтетические примеры и работает лучше при очень малом minority class
- Undersampling быстр, но теряет данные
- Порог классификации позволяет гибко управлять балансом precision/recall

## Ключевые термины урока

- **Oversampling** — увеличивает minority class; SMOTE предпочтительнее простого дублирования, так как создаёт новые точки, а не копии. Применять только к train, не к test!
- **Undersampling** — уменьшает majority class; быстро, но теряет данные. Оправдан при очень большом датасете, где потеря некритична.
- **class_weight="balanced"** — не меняет данные, штрафует модель сильнее за ошибку на редком классе; `sklearn` вычисляет веса автоматически как `n_samples / (n_classes * n_class_i)`. Пробовать первым.
- **SMOTE** — в отличие от oversampling-дублирования, создаёт синтетические точки путём линейной интерполяции между соседними примерами minority class; требует `imbalanced-learn`.
- **Threshold tuning** — снижение порога с 0.5 до 0.3 увеличивает recall (меньше FN), но снижает precision (больше FP). **PR-кривая** (Precision-Recall curve) — график зависимости precision от recall при разных порогах классификатора; полезна при дисбалансе классов, когда ROC-кривая может быть оптимистичной. PR-кривая показывает trade-off при всех возможных порогах — правильный порог выбирается как точка максимального F1 или как точка, удовлетворяющая бизнес-ограничению (например, recall ≥ 0.9).

# 50. Гиперпараметры модели

## Зачем это нужно

Гиперпараметры — это рычаги управления моделью, которые задаются до обучения. Правильный выбор может превратить слабую модель в сильную. Неправильный — даже мощный алгоритм сделает бесполезным. Понимание того, что такое гиперпараметры и как они влияют на модель, обязательно для любого ML-практика.

## Простая интуиция

Представьте, что модель — это кофемашина. Параметры — это количество молотого кофе, которое она определяет сама в процессе приготовления. Гиперпараметры — это температура воды, давление, время заваривания: вы устанавливаете их вручную до того, как машина начинает работу.

## Что это такое

- **Параметры модели** — то, что модель учит из данных (веса нейросети, коэффициенты линейной регрессии)
- **Гиперпараметры** — то, что задаёте вы до обучения (нельзя выучить из данных напрямую)
- Примеры гиперпараметров:
  - `max_depth` — максимальная глубина дерева решений
  - `n_estimators` — количество деревьев в Random Forest
  - `learning_rate` — размер шага в градиентном спуске (алгоритм оптимизации параметров; подробнее в уроке «Как нейросеть учится на ошибках»)
  - `C` — сила регуляризации в SVM и логистической регрессии

## Как это работает

Параметры задаются до обучения и фиксируются — модель их не меняет. Например, для случайного леса:

- `n_estimators = 100` — количество деревьев (задаёте вы)
- `max_depth = 5` — глубина каждого дерева, управляет балансом bias-variance (задаёте вы)
- `min_samples_leaf = 2` — минимум объектов в листе, регуляризация (задаёте вы)

Параметры модели (веса внутри деревьев) — обновляются автоматически в процессе обучения. Гиперпараметры — остаются теми, что вы задали.

## Простой пример

Датасет из 5 000 отзывов на товары для предсказания тональности (позитив/негатив). Дерево решений с `max_depth=2` не улавливает нюансы текста — train accuracy 63%, явное недообучение. Дерево с `max_depth=None` запоминает каждое слово — train 99%, test 71%, переобучение. После перебора значений `max_depth` от 1 до 20 через кросс-валидацию оптимум находится при `max_depth=8`: train 88%, test 86%. Именно гиперпараметр `max_depth` управлял этим балансом.

## Практика

1. Вы задали `max_depth=20`: train=0.99, test=0.72. Затем `max_depth=3`: train=0.65, test=0.63. Является ли `max_depth` параметром или гиперпараметром? Что вы будете делать дальше для поиска оптимального значения?
2. Вы перебрали 50 комбинаций гиперпараметров через cross-validation, выбрали лучшую и оценили модель на test — получили 0.83. Коллега говорит: «Попробуем ещё 20 комбинаций и выберем ту, что даёт лучший test». Что именно случится с test-метрикой после такого подбора — и почему она перестаёт отражать реальное качество модели на новых данных?
3. Вы настраиваете `max_depth` Decision Tree: при depth=1 train=60%, test=59%; при depth=None train=99%, test=70%. Что происходит в каждом случае и как найти оптимум?
4. Из урока «Bias и Variance» мы знаем, что высокая variance проявляется как нестабильность результатов. Для Random Forest при n_estimators=10 кросс-валидация даёт std=0.09, при n_estimators=200 — std=0.02. Что говорит std=0.09 о качестве модели и какой тип ошибки он сигнализирует?
5. Из урока «Cross-validation» мы знаем, что одно разбиение даёт случайный результат. Почему это означает, что выбирать гиперпараметры по метрике на одной val-выборке или на test — плохая практика?

## Краткий итог

- Гиперпараметры задаются до обучения и не обновляются из данных
- Они управляют сложностью модели и балансом bias-variance
- Подбор вручную неэффективен — нужен систематический поиск
- Оценивать качество гиперпараметров нужно через кросс-валидацию

## Ключевые термины урока

- **Параметры модели** — обновляются автоматически при `fit()` (веса, коэффициенты); их не трогают вручную. В отличие от гиперпараметров, не задаются до обучения.
- **Гиперпараметры** — задаются до `fit()` и фиксируются на всё обучение; подбираются через CV, не через метрику на test. Подбор на test — это data leakage для гиперпараметров.
- **Поиск гиперпараметров** — каждая комбинация оценивается через кросс-валидацию. Ловушка: при большом пространстве гиперпараметров и k-fold CV время поиска растёт как N_combinations × k × время_обучения — для сложных моделей нужен random search или Bayesian optimization вместо полного перебора.
- **max_depth как пример** — малое значение → высокий bias (underfitting), большое → высокая variance (overfitting); оптимум находится через CV, а не интуитивно.

# 51. Grid Search и Random Search

## Зачем это нужно

Ручной подбор гиперпараметров — это угадывание. Grid Search и Random Search делают этот процесс систематическим и воспроизводимым. Без автоматического поиска практик тратит часы на то, что алгоритм делает за минуты.

## Простая интуиция

Grid Search — это как попробовать каждое блюдо в меню ресторана, чтобы найти любимое. Вы гарантированно найдёте лучшее, но потратите много времени. Random Search — выбрать 10 случайных блюд. Вы с высокой вероятностью найдёте хорошее блюдо намного быстрее.

## Что это такое

- **GridSearchCV** — перебирает все комбинации заданных гиперпараметров, оценивает каждую через кросс-валидацию
- **RandomizedSearchCV** — перебирает случайное подмножество комбинаций из заданного распределения
- **CV** (Cross-Validation) — каждая комбинация оценивается на нескольких фолдах для надёжности
- **param_grid** — словарь с гиперпараметрами и их значениями для перебора
- **best_params_** — лучшая найденная комбинация
- **best_score_** — лучший средний score по кросс-валидации

## Как это работает

**Grid Search** перебирает декартово произведение всех заданных значений. Например, 3 значения `n_estimators` × 3 значения `max_depth` = 9 комбинаций. Каждая оценивается через кросс-валидацию. Итог: `best_params_` — лучшая комбинация, `best_score_` — средний score по фолдам.

**Random Search** не перебирает все комбинации — случайно сэмплирует заданное количество (например, 20). При большом пространстве параметров это даёт почти такой же результат за долю времени.

Оба метода оценивают каждую комбинацию через кросс-валидацию, а не на одном разбиении.

## Простой пример

Команда настраивает Random Forest для предсказания оттока клиентов (8 000 клиентов, 20 признаков). Grid Search с `n_estimators` ∈ {50, 100, 200} и `max_depth` ∈ {3, 5, None}: 9 комбинаций × 5 фолдов = 45 обучений, занимает 4 минуты. Лучшие параметры: `n_estimators=200`, `max_depth=5`, CV score 87.3%. Random Search с 6 параметрами и 4 значениями каждого (1 296 комбинаций) занял бы часы с Grid Search, но Random Search с n_iter=30 находит почти такой же результат за 12 минут.

## Практика

1. Grid Search нашёл `best_score_ = 0.89`, Random Search с n_iter=20 — score=0.875. Стоит ли продолжать Grid Search ради 0.015 разницы? Какие факторы влияют на это решение?
2. Что хранится в `best_estimator_` после GridSearchCV и почему нужна дополнительная оценка на тестовой выборке?
3. У вас пространство поиска: 5 значений `n_estimators`, 4 значения `max_depth`, 3 значения `min_samples_leaf`, 5-fold CV. Сколько обучений потребует Grid Search и когда выгоднее Random Search?
4. Из урока «Гиперпараметры модели» мы знаем, что подбор гиперпараметров по test — это data leakage. GridSearchCV вернул best_score_ = 0.88, но оценка best_estimator_ на отдельном test дала 0.81. Это нормальный разрыв или сигнал проблемы? Что могло пойти не так?
5. Из урока «Data Leakage» мы знаем, что утечка возникает, когда информация из test попадает в train. Почему трансформации признаков (например, масштабирование), применённые до GridSearchCV без Pipeline, создают именно такую утечку?

## Краткий итог

- GridSearch неприменим при большом пространстве параметров: экспоненциальный рост делает полный перебор нереальным
- RandomizedSearch даёт почти такое же качество за долю времени: на практике 100 случайных точек покрывают пространство не хуже
- Оба используют кросс-валидацию для честной оценки каждой комбинации
- После поиска всегда оценивайте финальную модель на отдельной тестовой выборке

## Ключевые термины урока

- **GridSearchCV** — перебирает декартово произведение значений; при 3 параметрах по 4 значения = 64 комбинации × cv_folds обучений. При 5+ параметрах становится нереальным.
- **RandomizedSearchCV** — сэмплирует n_iter случайных комбинаций из распределений; часто 20–50 итераций дают результат, близкий к полному перебору, в разы быстрее.
- **best_params_** — оптимальные гиперпараметры по CV, но финальное качество всегда проверять на отдельном test, который не участвовал в поиске.
- **best_estimator_** — уже обученная модель с best_params_ на всём train; использовать для предсказания, не переобучать заново.
- **CV в поиске** — каждая комбинация оценивается на k фолдах, итоговый score — среднее; это защищает от случайно удачного разбиения.

# 52. Error Analysis

## Зачем это нужно

Метрики говорят вам, насколько хороша модель. Error Analysis говорит, почему она ошибается и что делать дальше. Без анализа ошибок разработчик не знает, куда направить усилия: собирать данные, менять признаки или улучшать алгоритм.

## Простая интуиция

Представьте учителя, проверяющего контрольные. Он мог бы просто поставить оценки и двигаться дальше. Но хороший учитель смотрит на ошибки: «10 студентов не поняли задачи на дроби, 5 — на проценты». Зная паттерн ошибок, он знает, что объяснить заново. Так же работает error analysis в ML.

## Что это такое

- **Error Analysis** — ручной или автоматический просмотр неправильных предсказаний для поиска паттернов
- **False Positives (FP)** — модель предсказала 1, а было 0 (ложная тревога)
- **False Negatives (FN)** — модель предсказала 0, а было 1 (пропущенный случай)
- **Confusion Matrix** — матрица ошибок, показывающая все 4 типа предсказаний
- **Паттерны ошибок** — категории или характеристики объектов, на которых модель систематически ошибается

## Как это работает

Процесс Error Analysis состоит из нескольких шагов:

1. Собрать все неправильные предсказания — где предсказание модели не совпало с реальным значением
2. Разделить ошибки по типам: False Positives (ложная тревога) и False Negatives (пропущенный случай)
3. Изучить объекты, на которых модель ошиблась — найти общий признак
4. Сформулировать гипотезу: нужны новые данные, новые признаки или другой алгоритм

## Простой пример

Классификатор спама на 2 000 писем: общая accuracy 94%, кажется хорошим результатом. Error Analysis показывает: из 120 ошибок — 90 FN (спам помечен как нормальное письмо). Просмотр этих 90 писем выявляет паттерн: все они с темой «Вы выиграли...» на испанском языке. Модель обучалась только на английских письмах. Решение: добавить 200 испаноязычных спам-примеров. После дообучения FN снизились с 90 до 11.

## Практика

1. Спам-фильтр для корпоративной почты: accuracy = 94%, команда довольна. Error Analysis показывает: из 200 ошибок 160 — FN (реальный спам, пропущенный в inbox). Коллега предлагает: «Нужно больше данных для переобучения». Ты просматриваешь конкретные FN-примеры и видишь: почти все они от отправителей из редких доменов, которых почти нет в train. Что ты предложишь вместо «больше данных» — и как именно Error Analysis привёл тебя к более точному плану, чем просто смотреть на метрику?
2. Вы проанализировали 150 ошибок классификатора изображений: 100 из них — изображения при плохом освещении, остальные 50 — случайный набор разных сцен. Что говорит каждая группа и какие разные действия они требуют?
3. Вы обнаружили, что модель кредитного скоринга систематически ошибается на клиентах старше 70 лет. Что это говорит о данных и модели и каков следующий шаг?
4. Из урока «Метрики классификации» мы знаем, что recall = TP / (TP + FN). В задаче медицинской диагностики, где цена FN несопоставимо выше цены FP, как Error Analysis помогает расставить приоритеты между типами ошибок — и что именно нужно минимизировать?
5. Из урока «Overfitting и Underfitting» мы знаем признаки переобучения. Если Error Analysis показывает, что модель ошибается систематически на одной подгруппе (например, пациентах старше 70), как отличить: это переобучение на остальных данных или нехватка информации именно об этой подгруппе?

## Краткий итог

- Error Analysis — самый прямой путь к следующему улучшению: ошибки подсказывают, чего модель не умеет
- Разделяйте ошибки по типам: False Positives и False Negatives имеют разную цену
- Систематические ошибки на подгруппах — сигнал о нужных новых признаках
- Случайные ошибки без паттернов — возможно, вы достигли предела данных

## Ключевые термины урока

- **Error Analysis** — анализируй не агрегированную метрику, а конкретные ошибки; цель — найти общий признак у ошибочных объектов и превратить его в улучшение (признак, данные, правило).
- **False Positives (FP)** — модель кричит «тревога» там, где её нет; высокая цена FP → нужно повышать precision (порог вверх). В спаме: нормальное письмо попало в спам.
- **False Negatives (FN)** — модель молчит там, где должна сработать; высокая цена FN → нужно повышать recall (порог вниз). В медицине: больной пропущен как здоровый.
- **Паттерны ошибок** — если ошибки систематические (один язык, одна подгруппа, один диапазон значений) — это сигнал нехватки данных или признаков. Случайные ошибки без паттерна — вы достигли предела данных.

# 53. SHAP и интерпретируемость

## Зачем это нужно

Модель выдала отказ в кредите. Клиент спрашивает: «Почему?». Compliance требует объяснение по GDPR. Менеджер хочет убедиться, что модель не дискриминирует по полу.

Accuracy 91% — это хорошо. Но если ты не можешь объяснить, почему модель приняла конкретное решение, ты не можешь ей доверять, не можешь её дебаггить и не можешь использовать в регулируемых отраслях.

## Простая интуиция

Представь двух следователей. Один изучил тысячи дел и говорит: «В среднем я больше всего обращаю внимание на возраст и историю нарушений подозреваемого». Это полезная статистика, но она не объясняет конкретное решение. Второй берёт конкретное дело Иванова и говорит: «Его возраст добавил +15 к вердикту, доход снизил на −8, отсутствие судимости снизило на −20». Это объяснение одного решения — и именно оно нужно, когда клиент спрашивает «почему мне отказали?»

## Что это такое

**Интерпретируемость** — способность объяснить, почему модель приняла то или иное решение.

**Feature importance** — глобальная метрика: какие признаки в среднем влияют на предсказания модели. Встроена в деревья и градиентный бустинг.

**SHAP (SHapley Additive exPlanations)** — метод, который для каждого отдельного предсказания показывает вклад каждого признака: насколько он сдвинул результат вверх или вниз относительно среднего предсказания модели.

Идея пришла из **теории кооперативных игр**: каждый признак — «игрок» в команде. SHAP вычисляет справедливый вклад каждого игрока, перебирая все возможные «коалиции» (подмножества признаков) — это математически обоснованный вклад, а не эвристика.

SHAP работает с любой моделью — от линейной регрессии до деревьев и градиентного бустинга.

## Как это работает

### SHAP-значение

Для каждого объекта и каждого признака SHAP вычисляет: «Насколько изменилось бы предсказание, если бы у этого объекта не было этого признака?»

Результат — число со знаком:
- **положительное** — признак увеличил предсказание (сдвинул к «да», «выше», «1»)
- **отрицательное** — признак уменьшил предсказание (сдвинул к «нет», «ниже», «0»)

Сумма всех SHAP-значений для одного объекта равна разнице между его предсказанием и средним предсказанием по всему датасету.

### Два уровня объяснений

**Локальное объяснение** — почему модель приняла конкретное решение для конкретного объекта.

**Глобальное объяснение** — на большой выборке SHAP показывает, какие признаки в целом важны для модели (аналог feature importance, но честнее).

### Что ещё можно обнаружить

SHAP помогает поймать неожиданные паттерны:
- модель использует признак «почтовый индекс» как прокси для этнического происхождения
- модель опирается на признак, который в production недоступен
- данные утекают через признак, который создан из target

## Простой пример

Банк обучил модель оценки кредитного риска. Accuracy на тесте — 88%. Compliance-офицер спрашивает: «Не используете ли вы пол клиента как признак?»

Напрямую — нет, колонка `gender` удалена. Но SHAP-анализ показал: признак `job_type = "maternity_leave"` имеет большой отрицательный вклад. Это де-факто гендерный признак — непрямая дискриминация. Без SHAP это не заметили бы.

После удаления этого признака accuracy упала до 86%, но модель перестала дискриминировать. Compliance принял.

## Практика

1. Вы объясняете менеджеру, почему модель отказала конкретному клиенту в кредите. У вас есть feature importance модели и SHAP-значения для этого клиента. Что именно вы покажете менеджеру — и почему feature importance здесь недостаточно?
2. Два клиента с одинаковым возрастом (`age`=45). Клиент А: SHAP(`age`)=+0.09. Клиент Б: SHAP(`age`)=−0.14. Как одно и то же значение признака может давать разные SHAP-значения у двух объектов — и что это говорит о принципиальном отличии SHAP от feature importance?
3. Модель отказала в кредите. SHAP показывает: `income` → +0.18, `debt_ratio` → −0.31, `employment_years` → −0.05. Какой признак сильнее всего повлиял на отказ? Как объяснить это клиенту?
4. Из урока «Error Analysis» мы знаем, что ошибки нужно изучать по паттернам. Как SHAP-значения для группы ошибочных предсказаний помогают найти паттерн быстрее, чем просто просмотр признаков вручную?
5. Из урока «Data Leakage» мы знаем, что утечка делает метрики нереалистично высокими. Мини-кейс: модель предсказывает отток сотрудников, глобальный SHAP показывает, что `employee_id` входит в топ-3 важных. Что это может означать с точки зрения data leakage и каков следующий шаг?

## Краткий итог

- Интерпретируемость — требование для моделей, влияющих на людей: медицина, финансы, HR
- Feature importance отвечает «что важно в среднем», SHAP — «почему именно это решение для этого объекта»
- SHAP помогает не только объяснять клиентам, но и находить баги: утечки данных, косвенную дискриминацию
- Если признак попал в топ важных, но это подозрительно — SHAP-анализ покажет, что происходит на самом деле
- Локальное объяснение — для одного объекта; глобальное — агрегат по всей выборке

## Ключевые термины урока

- **Интерпретируемость** — требование для моделей в медицине, финансах, HR: без объяснений нельзя пройти compliance, обнаружить дискриминацию или найти баг типа «модель использует недоступный признак».
- **Feature importance** — глобальная статистика; не скажет, почему отказано конкретному клиенту. Ловушка: feature importance из random forest может завышать важность числовых признаков с большим числом уникальных значений (permutation importance честнее).
- **SHAP** — сумма всех SHAP-значений объекта = его предсказание минус среднее по датасету; математически обоснован теорией игр Шепли. TreeSHAP для деревьев — точный и быстрый (O(T·D²)); KernelSHAP для любой модели — аппроксимация (медленнее). Работает с любой моделью.
- **Локальное объяснение** — SHAP-значения для одного объекта; используется для объяснения клиенту и для отладки конкретных предсказаний.
- **Глобальное объяснение** — агрегирование SHAP по всей выборке; честнее feature importance, потому что учитывает направление и взаимодействия признаков.
