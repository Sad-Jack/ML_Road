<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML ROAD — Offline ML Learning System</title>
  <style>
    :root {
      --bg: #020609;
      --bg2: #050e14;
      --bg3: #091419;
      --border: #0d2a33;
      --border2: #1a4a5e;
      --cyan: #00e5ff;
      --cyan2: #00b8d9;
      --red: #ff4655;
      --green: #00ff9d;
      --orange: #ff9f43;
      --purple: #9b4dff;
      --text: #c8e8f0;
      --text2: #4a8a9e;
      --dim: #1e4a5a;
      --sw: 272px;
      --hh: 56px;
      --font: 'Segoe UI Variable', 'Segoe UI', 'Trebuchet MS', sans-serif;
      --mono: 'SFMono-Regular', 'Consolas', 'Menlo', 'Liberation Mono', monospace;
      --cyan-light: #69E2FC;
      --teal: #00cfb4;
      --gold: #ffc857;
      --text1: #d8f0f8;
      --text3: #9ec8d8;
      --text4: #8acde0;
      --text5: #6aa8be;
      --code-fg: #7fe8b8;
      --mb-bg: #060f1e;
      --mb-border: #0c1e32;
      --mb-inactive: #2a5070;
      --mb-dark: #1e4a65;
      /* ── Opacity variants (theme tokens) ─────────────────────────────── */
      --cyan-bg-faint:    #00e5ff06;
      --cyan-bg:          #00e5ff08;
      --cyan-bg-active:   #00e5ff0a;
      --cyan-glow-faint:  #00e5ff10;
      --cyan-glow-soft:   #00e5ff30;
      --cyan-glow:        #00e5ff55;
      --cyan-glow-vivid:  #00e5ff60;
      --purple-bg:        #9b4dff08;
      --purple-bg-hover:  #9b4dff10;
      --purple-glow-soft: #9b4dff20;
      --purple-border:    #9b4dff40;
      --purple-glow:      #9b4dff55;
      --green-bg:         #00ff9d08;
      --green-bg-tint:    #00ff9d0c;
      --green-border:     #00ff9d30;
      --green-glow:       #00ff9d60;
      --teal-bg:          #00cfb408;
      --teal-border:      #00cfb440;
      --teal-glow:        #00cfb455;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font);
      background:
        linear-gradient(rgba(0,229,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.018) 1px, transparent 1px),
        radial-gradient(ellipse at 10% 0%, var(--cyan-glow-faint) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 5%, var(--purple-bg) 0%, transparent 38%),
        var(--bg);
      background-size: 44px 44px, 44px 44px, 100% 100%, 100% 100%, 100% 100%;
      color: var(--text);
      line-height: 1.7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--cyan2);
      border-radius: 2px
    }

    /* HEADER */
    #hdr {
      height: var(--hh);
      background: var(--bg2);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 100
    }

    #hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: .5
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex-shrink: 0
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border: 1px solid var(--cyan);
      border-radius: 0;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow-soft), inset 0 0 8px var(--cyan-glow-faint);
      letter-spacing: -1px
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 14px var(--cyan-glow);
      letter-spacing: 3px
    }

    .logo-sub {
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      line-height: 1;
      margin-top: 2px
    }

    .srch {
      position: relative
    }

    .sb-srch {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border)
    }

    .srch-pre {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      pointer-events: none;
      opacity: .6;
      white-space: nowrap
    }

    #si {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 12px 7px 90px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color .2s
    }

    #si::placeholder {
      color: var(--dim)
    }

    #si:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow-soft)
    }

    #sr {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      z-index: 220;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 32px #00000090, 0 0 20px var(--cyan-bg)
    }

    #sr.vis {
      display: block
    }

    .sri {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s
    }

    .sri:hover {
      background: var(--bg3)
    }

    .sri:last-child {
      border-bottom: none
    }

    .sri-t {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      margin-bottom: 2px
    }

    .sri-s {
      font-size: 10px;
      color: var(--cyan2);
      font-family: var(--mono);
      letter-spacing: 1px;
      opacity: .7
    }

    .srh {
      color: var(--cyan);
      font-weight: 700;
      text-shadow: 0 0 6px var(--cyan-glow-vivid)
    }

    .sr0 {
      padding: 16px;
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      font-family: var(--mono)
    }

    .mbtn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-left: auto
    }

    .mbtn:hover {
      border-color: var(--cyan);
      color: var(--cyan)
    }

    /* LAYOUT */
    .lay {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* SIDEBAR */
    #sb {
      width: var(--sw);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: left .3s ease
    }

    .sbh {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .sbh-lbl,
    .sbh-t {
      display: none
    }

    .sbh2 {
      padding: 10px 14px 9px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cyan-bg-faint)
    }

    .sbh2::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 5px var(--cyan);
      flex-shrink: 0
    }

    .sbh2-t {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: .7
    }

    .sbnav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 16px
    }

    .sb-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint)
    }

    .sb-tab {
      flex: 1;
      padding: 11px 12px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5a8a98;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s, background .15s, box-shadow .15s
    }

    .sb-tab:last-child { border-right: none }

    .sb-tab.act {
      color: var(--cyan);
      background: var(--cyan-bg-active);
      box-shadow: inset 0 -2px 0 var(--cyan)
    }

    .sb-tab:hover:not(.act) { color: #9fd8e8 }

    .sov {
      display: none;
      position: fixed;
      inset: 0;
      top: var(--hh);
      background: rgba(0, 0, 0, .6);
      z-index: 85
    }

    .sov.vis {
      display: block
    }

    /* HOME ITEM */
    .hi {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      margin-bottom: 4px;
      border-left: 2px solid transparent
    }

    .hi:hover {
      background: var(--bg3)
    }

    .hi.act {
      border-left-color: var(--cyan);
      background: var(--cyan-bg)
    }

    .hi-ic {
      color: var(--cyan);
      font-size: 14px
    }

    .hi-t {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      letter-spacing: .5px
    }

    .hi.act .hi-t {
      color: var(--cyan)
    }

    /* SECTION GROUP */
    .sg {
      margin-bottom: 4px
    }

    .sgh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: background .15s
    }

    .sgh:hover {
      background: #091820
    }

    .sga {
      font-size: 9px;
      color: var(--text2);
      transition: transform .2s;
      flex-shrink: 0
    }

    .sg.open .sga {
      transform: rotate(90deg)
    }

    .sgn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid
    }

    /* section accent colours — unified cyan for module numbers */
    .sgn-c1, .sgn-c2, .sgn-c3, .sgn-c4, .sgn-c5, .sgn-c6,
    .sgn-c7, .sgn-c8, .sgn-c9, .sgn-c10, .sgn-c11 {
      color: var(--cyan-light);
      background: rgba(105, 226, 252, 0.06);
      border-color: rgba(105, 226, 252, 0.35)
    }

    /* Per-section accent colors: section name — two alternating tones */
    .sg.sec-c1 .sgname,
    .sg.sec-c3 .sgname,
    .sg.sec-c5 .sgname,
    .sg.sec-c7 .sgname,
    .sg.sec-c9 .sgname,
    .sg.sec-c11 .sgname { color: var(--cyan-light) }

    .sg.sec-c2 .sgname,
    .sg.sec-c4 .sgname,
    .sg.sec-c6 .sgname,
    .sg.sec-c8 .sgname,
    .sg.sec-c10 .sgname { color: var(--cyan-light) }

    /* Active module header: highlight with cyan */
    .sg.sg-act .sgname {
      color: var(--cyan-light);
      text-shadow: 0 0 8px rgba(105, 226, 252, 0.35)
    }

    /* Hover on module header: subtle brightening */
    .sgh:hover .sgname { color: #D6F7FF }

    /* Per-section active lesson — unified cyan for all sections */
    .sg[class*="sec-c"] .li.act { background: rgba(105,226,252,0.03); border-left-color: var(--cyan-light) }
    .sg[class*="sec-c"] .li.act .li-n { color: var(--cyan-light) }
    .sg[class*="sec-c"] .li.act .li-t { color: var(--text) }
    .sg[class*="sec-c"] .li.act::after { background: var(--cyan-light); box-shadow: 0 0 8px rgba(105,226,252,0.4) }

    .sgname {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .3px;
      color: #a8d8e8;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .ll {
      display: none;
      padding: 0 0 4px
    }

    .sg.open .ll {
      display: block
    }

    .li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 28px;
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent;
      position: relative
    }

    .li:hover {
      background: var(--bg3)
    }

    .li.act {
      background: rgba(105, 226, 252, 0.03);
      border-left-color: var(--cyan-light)
    }

    .li.act::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 14px;
      background: var(--cyan-light);
      box-shadow: 0 0 8px rgba(105, 226, 252, 0.4);
      border-radius: 0
    }

    .li-n {
      font-family: var(--mono);
      font-size: 11px;
      color: #1e5a6e;
      flex-shrink: 0;
      width: 20px
    }

    .li.act .li-n {
      color: var(--cyan-light)
    }

    .li-t {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .2px;
      color: var(--text5);
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .li.act .li-t {
      color: var(--text)
    }

    /* MAIN */
    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative
    }

    #main::before {
      content: '';
      position: fixed;
      top: var(--hh);
      left: var(--sw);
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 229, 255, .022) 3px,
        rgba(0, 229, 255, .022) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .ci {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 32px 24px;
      position: relative;
      z-index: 1
    }

    /* BREADCRUMBS */
    .bc {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 24px;
      flex-wrap: wrap
    }

    .bc span,
    .bc a {
      color: var(--text2);
      text-decoration: none;
      cursor: pointer;
      transition: color .15s
    }

    .bc a:hover {
      color: var(--cyan)
    }

    .bc .sep {
      color: var(--dim)
    }

    .bc .cur {
      color: var(--cyan)
    }

    /* HOME */
    .hero {
      padding: 20px 0 0;
      position: relative
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -32px;
      right: -32px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, var(--cyan-bg-active) 0%, transparent 70%);
      pointer-events: none
    }

    /* terminal boot panel */
    .hboot {
      background: var(--bg2);
      border: 1px solid var(--border2);
      max-width: 760px;
      margin: 0 auto 18px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px))
    }

    .hboot::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cyan-bg-faint) 0%, transparent 50%);
      pointer-events: none
    }

    .hboot-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint)
    }

    .hboot-dot {
      width: 8px;
      height: 8px;
      border: 1px solid var(--cyan);
      background: var(--cyan);
      opacity: .6
    }

    .hboot-dot2 {
      width: 8px;
      height: 8px;
      border: 1px solid var(--red);
      background: var(--red);
      opacity: .5
    }

    .hboot-dot3 {
      width: 8px;
      height: 8px;
      border: 1px solid var(--dim);
      opacity: .4
    }

    .hboot-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      margin-left: 4px
    }

    .hboot-body {
      padding: 20px 24px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center
    }

    .hascii {
      font-family: var(--mono);
      font-size: clamp(22px, 4.5vw, 46px);
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow), 0 0 50px var(--cyan-glow-soft);
      letter-spacing: 4px;
      line-height: 1;
      animation: glitch 6s infinite
    }

    .hascii-sub {
      font-family: var(--mono);
      font-size: clamp(8px, 1.2vw, 11px);
      color: var(--text2);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: .8
    }

    .hascii-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: .7
    }

    .hsys {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.8;
      border-left: 1px solid var(--border2);
      padding-left: 18px;
      min-width: 160px
    }

    .hsys-row {
      display: flex;
      gap: 6px;
      white-space: nowrap
    }

    .hsys-k {
      color: var(--text2);
      letter-spacing: 1px;
      font-size: 10px
    }

    .hsys-v {
      color: var(--cyan);
      font-size: 10px
    }

    .hsys-v.ok {
      color: var(--green)
    }

    .hsys-v.dim {
      color: var(--dim)
    }

    .hmarq {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint);
      overflow: hidden;
      margin: 0 auto 16px;
      max-width: 760px
    }

    .hmarq-b {
      margin-top: 10px;
      margin-bottom: 0
    }

    .hmarq-tr {
      display: flex;
      width: max-content;
      animation: marq 90s linear infinite
    }

    .hmarq-b .hmarq-tr {
      animation-direction: reverse;
      animation-duration: 36s
    }

    .hmarq-tx {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      padding: 6px 10px;
      white-space: nowrap;
      opacity: .7
    }


    .hdesc {
      font-size: 14px;
      color: #7ab8cc;
      max-width: 600px;
      line-height: 1.7;
      margin: 16px auto 0;
      font-family: var(--mono);
      text-align: center
    }
    .hdesc p { margin: 0 0 8px }
    .hstart-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s
    }
    .hstart-btn:hover {
      background: var(--cyan);
      color: #000
    }

    .hsecs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px
    }

    .hsc {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px))
    }

    .hsc:hover {
      border-color: var(--border2);
      background: #081318
    }

    .hsc::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 2px;
      height: 100%
    }

    .hsc-c1::before { background: var(--cyan); box-shadow: 0 0 8px var(--cyan) }
    .hsc:hover.hsc-c1 { border-color: var(--cyan-glow); box-shadow: 0 0 16px var(--cyan-bg-active) }
    .hsc-c2::before { background: var(--teal); box-shadow: 0 0 8px var(--teal) }
    .hsc:hover.hsc-c2 { border-color: var(--teal-glow) }
    .hsc-c3::before { background: var(--green); box-shadow: 0 0 8px var(--green) }
    .hsc:hover.hsc-c3 { border-color: var(--green-glow) }
    .hsc-c4::before { background: var(--orange); box-shadow: 0 0 8px var(--orange) }
    .hsc:hover.hsc-c4 { border-color: #ff9f4355 }
    .hsc-c5::before { background: var(--red); box-shadow: 0 0 8px var(--red) }
    .hsc:hover.hsc-c5 { border-color: #ff465555 }
    .hsc-c6::before { background: var(--purple); box-shadow: 0 0 8px var(--purple) }
    .hsc:hover.hsc-c6 { border-color: var(--purple-glow) }
    .hsc-c7::before { background: #e0a0ff; box-shadow: 0 0 8px #e0a0ff }
    .hsc:hover.hsc-c7 { border-color: #e0a0ff55 }
    .hsc-c8::before { background: #7eb8ff; box-shadow: 0 0 8px #7eb8ff }
    .hsc:hover.hsc-c8 { border-color: #7eb8ff55 }

    .hscn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .hsc-c1 .hscn { color: var(--cyan) }
    .hsc-c2 .hscn { color: var(--teal) }
    .hsc-c3 .hscn { color: var(--green) }
    .hsc-c4 .hscn { color: var(--orange) }
    .hsc-c5 .hscn { color: var(--red) }
    .hsc-c6 .hscn { color: var(--purple) }
    .hsc-c7 .hscn { color: #e0a0ff }
    .hsc-c8 .hscn { color: #7eb8ff }
    .hsct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3
    }

    .hscd {
      font-size: 11px;
      color: var(--text2);
      font-family: var(--mono)
    }

    .hscls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .hscl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px 6px
    }

    /* COMMUNITY HUD */
    .commblock {
      margin-top: 16px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 0;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px))
    }

    .commblock-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--cyan-bg-faint)
    }

    .commblock-hdr-dot {
      width: 6px;
      height: 6px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    .commblock-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .commlinks {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      padding: 10px 12px;
      justify-content: stretch
    }

    .cl {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 8px 14px;
      transition: all .15s;
      text-align: center;
      flex: 1 1 150px;
      margin: 3px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .cl::before {
      content: '>';
      font-family: var(--mono);
      color: var(--cyan);
      opacity: .4;
      font-size: 10px
    }

    .cl:hover {
      background: var(--cyan-bg);
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow-faint)
    }

    .cl:hover::before {
      opacity: 1
    }

    /* LESSON */
    .lhdr {
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
      position: relative;
      padding-left: 16px;
      border-left: 2px solid var(--cyan);
      box-shadow: -4px 0 12px var(--cyan-bg)
    }

    .lhdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan)
    }

    .lmeta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: .8;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .lmeta::before {
      content: '>';
      color: var(--cyan);
      opacity: .5
    }

    .ltitle {
      font-family: var(--mono);
      font-size: clamp(18px, 2.8vw, 26px);
      font-weight: 700;
      color: var(--text1);
      line-height: 1.2
    }

    /* MARKDOWN */
    .lc h1 {
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 700;
      color: var(--text1);
      margin: 32px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2)
    }

    .lc h1::before {
      content: '// ';
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      opacity: .7
    }

    .lc h2 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--cyan);
      margin: 24px 0 10px;
      letter-spacing: .5px
    }

    .lc h2::before {
      content: '# ';
      opacity: .5;
      font-family: var(--mono)
    }

    .lc h3 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text4);
      margin: 18px 0 8px
    }

    .lc h3::before {
      content: '## ';
      color: var(--cyan2);
      font-family: var(--mono);
      font-size: 11px;
      opacity: .5
    }

    .lc h4 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin: 14px 0 6px
    }

    .lc p {
      font-size: 15px;
      color: var(--text3);
      line-height: 1.82;
      margin-bottom: 13px
    }

    .lc strong {
      color: var(--text1);
      font-weight: 700
    }

    .lc em {
      color: var(--orange);
      font-style: italic
    }

    .lc ul,
    .lc ol {
      margin: 10px 0 14px 22px
    }

    .lc li {
      font-size: 15px;
      color: var(--text3);
      line-height: 1.72;
      margin-bottom: 3px
    }

    .lc ul li::marker {
      color: var(--cyan2)
    }

    .lc ol li::marker {
      color: var(--cyan);
      font-family: var(--mono)
    }

    .lc blockquote {
      background: var(--cyan-bg-faint);
      border-left: 2px solid var(--cyan);
      padding: 12px 18px;
      margin: 18px 0;
      box-shadow: -4px 0 12px var(--cyan-bg)
    }

    .lc blockquote p {
      color: var(--text4);
      font-style: normal;
      font-family: var(--mono);
      font-size: 13px;
      margin: 0
    }

    .lc blockquote strong {
      color: var(--cyan)
    }

    code.ic {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      background: var(--green-bg-tint);
      border: 1px solid var(--green-border);
      padding: 1px 6px
    }

    .cb {
      background: #030a0d;
      border: 1px solid var(--border2);
      border-left: 2px solid var(--cyan);
      margin: 14px 0;
      overflow: hidden;
      position: relative;
      box-shadow: -4px 0 14px var(--cyan-bg-active)
    }

    .cb::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      opacity: .4
    }

    .cbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      background: var(--cyan-bg);
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .cbl::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      display: inline-block;
      flex-shrink: 0
    }

    .cb pre {
      padding: 16px;
      overflow-x: auto
    }

    .cb code {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--code-fg);
      line-height: 1.65;
      white-space: pre
    }

    .cb-copy {
      position: absolute;
      top: 7px;
      right: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      transition: .18s ease;
      z-index: 2
    }

    .cb-copy:hover {
      color: var(--cyan);
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow-soft);
      background: var(--cyan-bg)
    }

    .cb-copy.done {
      color: var(--green);
      border-color: var(--green-glow);
      background: var(--green-bg)
    }

    .tw {
      overflow-x: auto;
      margin: 14px 0
    }

    .lc table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    .lc th {
      background: var(--cyan-bg);
      color: var(--cyan);
      border: 1px solid var(--border2);
      padding: 8px 12px;
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .lc td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      color: var(--text3);
      vertical-align: top;
      font-size: 13px
    }

    .lc tr:nth-child(even) td {
      background: var(--cyan-bg-faint)
    }

    .lc td code,
    .lc th code {
      font-family: var(--mono);
      color: var(--green);
      font-size: 12px
    }

    .lc hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
      position: relative
    }

    .lc hr::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 50px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan)
    }

    a.nl {
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px solid var(--cyan-glow-soft);
      transition: all .15s
    }

    a.nl:hover {
      color: #fff;
      border-bottom-color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan)
    }

    /* PREV/NEXT */
    .lnav {
      display: flex;
      gap: 12px;
      margin-top: 44px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap
    }

    .nb {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 12px 18px;
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      flex: 1;
      min-width: 180px;
      font-family: var(--mono)
    }

    .nb:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: var(--cyan-bg-faint);
      box-shadow: 0 0 12px var(--cyan-glow-faint)
    }

    .nb.pr {
      justify-content: flex-start
    }

    .nb.nx {
      justify-content: flex-end
    }

    .nb-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 2px;
      display: block;
      text-transform: uppercase
    }

    .nb:hover .nb-lbl {
      color: var(--cyan2)
    }

    .nb-t {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      max-width: 200px
    }

    /* STATUS */
    .stbar {
      flex-shrink: 0;
      height: 22px;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 18px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      position: relative
    }

    .stbar::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 120px;
      height: 1px;
      background: var(--cyan);
      opacity: .3
    }

    .stitem {
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase
    }

    .stitem-ok {
      color: #2a6878
    }

    .stitem-hi {
      color: var(--cyan);
      opacity: .7
    }

    .stdot {
      width: 5px;
      height: 5px;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {
      0%, 100% { opacity: 1 }
      50% { opacity: .4 }
    }

    /* RESPONSIVE */
    @media(max-width:768px) {
      .mbtn {
        display: block
      }

      .srch {
        max-width: 200px
      }

      #sb {
        position: fixed;
        left: -100%;
        top: var(--hh);
        height: calc(100vh - var(--hh));
        width: 84%;
        max-width: 300px;
        z-index: 90
      }

      #sb.open {
        left: 0
      }

      #main::before {
        left: 0
      }

      .ci {
        padding: 20px 16px 56px
      }

      .htitle {
        font-size: 32px
      }

      .sb-srch {
        padding: 10px 10px 8px
      }

      .lnav {
        flex-direction: column
      }

      .nb {
        min-width: 0
      }

      .logo-sub {
        display: none
      }
    }

    @media(max-width:480px) {
      .logo-text {
        font-size: 13px
      }
    }

    @keyframes glitch {
      0%, 92%, 100% {
        text-shadow: 0 0 20px var(--cyan-glow), 0 0 50px var(--cyan-glow-soft);
        transform: none
      }
      93% {
        text-shadow: 2px 0 6px var(--red), -2px 0 6px var(--cyan);
        transform: translateX(1px) skewX(-1deg)
      }
      94% {
        text-shadow: -2px 0 6px var(--red), 2px 0 6px var(--cyan);
        transform: translateX(-1px) skewX(1deg)
      }
      95% {
        text-shadow: 0 0 20px var(--cyan-glow), 0 0 50px var(--cyan-glow-soft);
        transform: none
      }
    }

    @keyframes marq {
      0% {
        transform: translateX(0)
      }
      100% {
        transform: translateX(-50%)
      }
    }

    /* ═══════ RIGHT PANEL ═══════ */
    #rp {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg2);
      border-left: 1px solid var(--border2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .25s ease;
      position: relative
    }

    #rp.rp-hidden {
      width: 0;
      border-left: none;
      overflow: hidden
    }

    #rp::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,229,255,.012) 3px,
        rgba(0,229,255,.012) 4px
      );
      pointer-events: none;
      z-index: 0
    }

    .rp-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border2);
      background: var(--cyan-bg-faint);
      flex-shrink: 0;
      position: relative;
      z-index: 1
    }

    .rp-hdr-dot {
      width: 5px;
      height: 5px;
      background: var(--purple);
      box-shadow: 0 0 6px var(--purple);
      flex-shrink: 0
    }

    .rp-hdr-lbl {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--purple);
      text-transform: uppercase;
      flex: 1
    }

    .rp-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      transition: .15s
    }

    .rp-close:hover {
      border-color: var(--red);
      color: var(--red)
    }

    .rp-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 1
    }

    .rptab {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 7px;
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: .15s;
      background: none
    }

    .rptab:hover {
      border-color: var(--border2);
      color: var(--text)
    }

    .rptab.act {
      border-color: var(--purple);
      color: var(--purple);
      background: var(--purple-bg-hover)
    }

    .rp-list {
      flex: 1;
      overflow-y: auto;
      position: relative;
      z-index: 1
    }

    .rpi {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent
    }

    .rpi:hover {
      background: var(--cyan-bg-faint)
    }

    .rpi.act {
      background: var(--purple-bg);
      border-left-color: var(--purple)
    }

    .rpi-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px
    }

    .rpi-cat {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 1px 5px;
      border: 1px solid
    }

    .rpi-cat-mlcore { color: var(--cyan); border-color: var(--cyan-glow-soft); background: var(--cyan-bg) }
    .rpi-cat-learning { color: var(--teal); border-color: var(--teal-border); background: var(--teal-bg) }
    .rpi-cat-prompt { color: var(--purple); border-color: var(--purple-border); background: var(--purple-bg) }
    .rpi-cat-other { color: var(--text2); border-color: var(--border) }

    .rpi-t {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text4);
      line-height: 1.3;
      flex: 1;
      min-width: 0
    }

    .rpi.act .rpi-t {
      color: var(--text)
    }

    .rpi-sum {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.4;
      margin-top: 3px;
      font-family: var(--mono)
    }

    /* KB page header in central area */
    .kb-hdr {
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
      position: relative;
      padding-left: 16px;
      border-left: 2px solid var(--purple);
      box-shadow: -4px 0 12px var(--purple-bg)
    }

    .kb-hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 1px;
      background: var(--purple);
      box-shadow: 0 0 8px var(--purple)
    }

    .kb-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
      letter-spacing: .5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .kb-cat-badge {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid var(--purple-glow);
      color: var(--purple);
      background: var(--purple-bg-hover)
    }

    .kb-type-badge {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid var(--border);
      color: var(--text2)
    }

    .kb-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .5px;
      line-height: 1.25;
      margin-bottom: 10px
    }

    .kb-summary {
      font-size: 13px;
      color: #7aaccb;
      line-height: 1.7;
      margin-bottom: 12px
    }

    .kb-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px
    }

    .kb-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      letter-spacing: .5px
    }

    .kb-back {
      display: inline-flex;

      top: 0;

      border-bottom: 1px solid var(--mb-border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mb-inactive);
      user-select: none;
      flex-shrink: 0;
      overflow: hidden;

      opacity: 1;
      transition: max-height .4s ease, opacity .3s ease, padding .4s ease, border-width .4s ease;

      color: var(--mb-dark);
      letter-spacing: 1.5px;
      font-weight: 700;

      font-size: 9px;

    }
    .mb-dot.live   { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); animation: mb-pulse 1.4s ease-in-out infinite }
    .mb-dot.paused { color: var(--gold) }
    .mb-status { font-size: 10px; letter-spacing: .5px; color: #1e3a50; }
    .mb-status.live   { color: var(--cyan) }
    .mb-status.paused { color: var(--gold) }
    .mb-play {
      background: transparent;
      border: 1px solid #142d42;
      color: var(--mb-dark);
      font-family: var(--mono);
      font-size: 11px;
      padding: 0 10px;
      cursor: pointer;
      letter-spacing: .5px;
      height: 22px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      transition: border-color .2s, color .2s, box-shadow .2s;
    }
    .mb-play:hover:not(:disabled) {
      border-color: var(--cyan-glow);
      color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow-faint);
    }
    .mb-play.playing {
      border-color: var(--cyan-glow-vivid);
      color: var(--cyan);
      box-shadow: 0 0 6px var(--cyan-glow-soft);
    }
    .mb-play:disabled { opacity: .22; cursor: not-allowed }
    .mb-vol-wrap { display: flex; align-items: center; gap: 8px }
    .mb-vol-lbl  { color: #1a3245; font-size: 10px; letter-spacing: .5px }
    .mb-vol-val  { color: var(--mb-inactive); width: 30px; text-align: right; font-size: 10px }
    .mb-vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 88px;
      height: 3px;
      outline: none;
      cursor: pointer;
      border-radius: 0;
      background: linear-gradient(to right, var(--mb-inactive) 60%, #0c1e30 60%);
      transition: background .1s;
    }
    .mb-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 9px;
      height: 9px;
      background: var(--mb-inactive);

    .mb-channels { display: flex; align-items: center; gap: 4px; margin-left: auto }
    .mb-ch {

    #music-bar.is-offline {

  <!-- ═══════ INJECTED CONTENT PLACEHOLDERS ═══════ -->

  <!-- ═══════ MAIN SCRIPT ═══════ -->
  <script>
    const RIGHT_PANEL_DATA = [];

    /* ─── COURSE STRUCTURE ─── */
    const COURSE = {
      sections: []
    };

    const ALL = COURSE.sections.flatMap(s => s.lessons.map(l => ({ ...l, section: s })));

    function getReadSet(id) {
      return (typeof PYTHON_ALL !== 'undefined' && PYTHON_ALL.find(l => l.id === id))
        ? AppState.readLessonsPy
        : AppState.readLessons;
    }

    function markRead(id) {
      getReadSet(id).add(id);
      try {
        const isPy = !!PYTHON_ALL.find(l => l.id === id);
        localStorage.setItem(isPy ? 'mlroad-read-py' : 'mlroad-read',
          JSON.stringify([...(isPy ? AppState.readLessonsPy : AppState.readLessons)]));
      } catch(e) {}
      renderLesson(id);
      updateSb(id);
      updateProgressBar();
    }

    function markUnread(id) {
      getReadSet(id).delete(id);
      try {
        const isPy = !!PYTHON_ALL.find(l => l.id === id);
        localStorage.setItem(isPy ? 'mlroad-read-py' : 'mlroad-read',
          JSON.stringify([...(isPy ? AppState.readLessonsPy : AppState.readLessons)]));
      } catch(e) {}
      renderLesson(id);
      updateSb(id);
      updateProgressBar();
    }

    function updateProgressBar() {
      const isPy = AppState.curTab === 'python';
      const lessonList = isPy ? PYTHON_ALL : ALL;
      const readSet = isPy ? AppState.readLessonsPy : AppState.readLessons;
      const sections = isPy ? PYTHON_COURSE.sections : COURSE.sections;

      const total = lessonList.length;
      const done = [...readSet].filter(id => lessonList.find(l => l.id === id)).length;
      const pct = total > 0 ? Math.round(done / total * 100) : 0;

      const valEl = document.getElementById('gp-val');
      const fillEl = document.getElementById('gp-fill');
      if (valEl) valEl.textContent = done + ' / ' + total + ' (' + pct + '%)';
      if (fillEl) fillEl.style.width = pct + '%';

      const stEl = document.getElementById('st-p');
      if (stEl && AppState.cur !== 'home') {
        const base = stEl.textContent.split('//')[0].trim();
        stEl.textContent = base + ' // ' + pct + '% ПРОЙДЕНО';
      }

      sections.forEach(s => {
        const el = document.getElementById('sgp-' + s.id);
        if (!el) return;
        const sTotal = s.lessons.length;
        const sDone = s.lessons.filter(l => readSet.has(l.id)).length;
        el.textContent = sDone > 0 ? sDone + '/' + sTotal : '';
        el.style.color = sDone === sTotal ? 'var(--green)' : 'var(--text2)';
      });
    }

    /* ─── PYTHON TRACK ─── */
    const PYTHON_COURSE = {
      sections: []
    };

    const PYTHON_ALL = PYTHON_COURSE.sections.flatMap(s => s.lessons.map(l => ({ ...l, section: s })));

    const AppState = {
      cur:          null,
      curTab:       'mlbase',
      readLessons:    new Set(),
      readLessonsPy:  new Set(),
      searchIndex:  {},
      rpFilter:     'all',
      rpOpen:       false,
      music: {
        audio:       null,
        playing:     false,
        reconnTimer: null,
        streamIdx:   0,
        gen:         0,
      },
    };
    try { const s = JSON.parse(localStorage.getItem('mlroad-read') || '[]'); AppState.readLessons = new Set(s); } catch(e) {}
    try { const s = JSON.parse(localStorage.getItem('mlroad-read-py') || '[]'); AppState.readLessonsPy = new Set(s); } catch(e) {}
    try { const t = localStorage.getItem('mlroad-tab'); if (t === 'python' || t === 'mlbase') AppState.curTab = t; } catch(e) {}

    function findLessonEntry(id) {
      return ALL.find(l => l.id === id) || PYTHON_ALL.find(l => l.id === id) || null;
    }

    function resolveNavId(id) {
      if (id === 'home') return 'home';
      return findLessonEntry(id) ? id : 'home';
    }

    function switchTab(tab) {
      if (tab !== 'mlbase' && tab !== 'python') return;
      AppState.curTab = tab;
      try { localStorage.setItem('mlroad-tab', tab); } catch (e) { }
      document.querySelectorAll('.sb-tab').forEach(b => {
        b.classList.toggle('act', b.dataset.tab === tab);
      });
      buildSb();
      if (AppState.cur) updateSb(AppState.cur);
      updateProgressBar();
    }

    /* ─── NAV ─── */
    function nav(id) {
      id = resolveNavId(id);
      AppState.cur = id;
      try { localStorage.setItem('mlroad-cur', id); } catch (e) { }
      document.querySelectorAll('.rpi.act').forEach(el => el.classList.remove('act'));
      // Auto-switch sidebar tab based on lesson source
      const targetTab = PYTHON_ALL.find(l => l.id === id) ? 'python' : 'mlbase';
      if (targetTab !== AppState.curTab) {
        AppState.curTab = targetTab;
        try { localStorage.setItem('mlroad-tab', targetTab); } catch (e) { }
        document.querySelectorAll('.sb-tab').forEach(b => {
          b.classList.toggle('act', b.dataset.tab === targetTab);
        });
        buildSb();
      }
      renderPage(id);
      updateSb(id);
      document.getElementById('main').scrollTo(0, 0);
      closeSb(); closeSearch();
    }

    function renderPage(id) {
      if (id === 'home') renderHome(); else renderLesson(id);
    }

    /* ─── KB ROUTING ─── */
    function navKb(id) {
      document.querySelectorAll('.li,.hi').forEach(el => el.classList.remove('act'));
      document.querySelectorAll('.rpi.act').forEach(el => el.classList.remove('act'));
      const el = document.getElementById('rpi-' + id);
      if (el) el.classList.add('act');
      renderKb(id);
      document.getElementById('main').scrollTo(0, 0);
      closeSb(); closeSearch();
    }

    function renderKb(id) {
      const item = RIGHT_PANEL_DATA.find(i => i.id === id);
      if (!item) {
        document.getElementById('ca').innerHTML = '<p style="color:var(--red);font-family:var(--mono);padding:32px">// ERROR: KB item not found</p>';
        return;
      }
      const html = mdToHtml(item.content);
      const tagsHtml = (item.tags || []).map(t => `<span class="kb-tag">${esc(t)}</span>`).join('');
      document.getElementById('ca').innerHTML = `
    <div>
      <button class="kb-back" data-action="nav" data-id="home">◂ На главную</button>
      <div class="kb-hdr">
        <div class="kb-meta">
          <span class="kb-cat-badge">${esc(item.category)}</span>
          <span class="kb-type-badge">${esc(item.type || 'reference')}</span>
        </div>
        <div class="kb-title">${esc(item.title)}</div>
        ${item.summary ? `<div class="kb-summary">${esc(item.summary)}</div>` : ''}
        ${tagsHtml ? `<div class="kb-tags">${tagsHtml}</div>` : ''}
      </div>
      <div class="lc">${html}</div>
    </div>`;
      document.getElementById('st-l').textContent = `KB — ${item.title}`;
    }

    /* ─── HOME ─── */
    function renderHome() {
      document.getElementById('ca').innerHTML = `
    <div class="hero">
      <div class="hboot">
        <div class="hboot-bar">
          <div class="hboot-dot"></div>
          <div class="hboot-dot2"></div>
          <div class="hboot-dot3"></div>
          <span class="hboot-title">ML-ROAD-LOCAL // BOOT SEQUENCE COMPLETE</span>
        </div>
        <div class="hboot-body">
          <div>
            <div class="hascii">ML ROAD</div>
            <div class="hascii-sub">Machine Learning Offline System</div>
            <div class="hascii-tag">LEARN • PRACTICE • BUILD • THINK</div>
          </div>
          <div class="hsys">
            <div class="hsys-row"><span class="hsys-k">MODEL&nbsp;&nbsp;:</span><span class="hsys-v">ML-ROAD-LOCAL</span></div>
            <div class="hsys-row"><span class="hsys-k">MODE&nbsp;&nbsp;&nbsp;:</span><span class="hsys-v">OFFLINE</span></div>
            <div class="hsys-row"><span class="hsys-k">STATUS&nbsp;:</span><span class="hsys-v ok">ONLINE</span></div>
            <div class="hsys-row"><span class="hsys-k">УРОКОВ :</span><span class="hsys-v">${ALL.length}</span></div>
          </div>
        </div>
      </div>
      <div class="hmarq">
        <div class="hmarq-tr">
          <div class="hmarq-tx">Делай каждое дело так, будто оно последнее в твоей жизни // Образование — самое мощное оружие, с помощью которого можно изменить мир // Мы выбираем идти на Луну не потому, что это легко, а потому что это трудно // Твоё время ограничено. Не трать его, живя чужой жизнью // Оставайся голодным. Оставайся безрассудным // Бой выигрывается или проигрывается далеко от свидетелей — за кулисами, в зале, на дороге // Один ребёнок, один учитель, одна книга и одна ручка могут изменить мир // Тот, у кого есть зачем жить, выдержит почти любое как // Делай каждое дело так, будто оно последнее в твоей жизни // Образование — самое мощное оружие, с помощью которого можно изменить мир // Мы выбираем идти на Луну не потому, что это легко, а потому что это трудно // Твоё время ограничено. Не трать его, живя чужой жизнью // Оставайся голодным. Оставайся безрассудным // Бой выигрывается или проигрывается далеко от свидетелей — за кулисами, в зале, на дороге // Один ребёнок, один учитель, одна книга и одна ручка могут изменить мир // Тот, у кого есть зачем жить, выдержит почти любое как //</div>
        </div>
      </div>
      <div class="hdesc">
        <p>Офлайн-курс по Machine Learning от базовых понятий до работы с реальными данными. Всё в одном файле — без интернета, без регистрации.</p>
        <p>Открывай уроки по порядку, читай материалы в правой панели и возвращайся в любой момент — <span class="prog-joke">прогресс сохраняется.</span></p>
        <button class="hstart-btn" data-action="start-course">▶ Начать обучение</button>
      </div>
      <div class="commblock" style="margin-top:16px; padding-bottom:10px">
        <div class="commblock-hdr">
          <div class="commblock-hdr-dot"></div>
          <span class="commblock-hdr-lbl">Community &amp; Resources</span>
        </div>
        <div class="commlinks">
          <a class="cl" href="https://t.me/ML_Road" target="_blank">Telegram-канал</a>
          <a class="cl" href="https://t.me/ML_Road_Chat" target="_blank">Telegram-чат</a>
          <a class="cl" href="https://stepik.org/course/281722" target="_blank">Stepik-курс</a>
        </div>
      </div>
    </div>`;
      document.getElementById('st-l').textContent = 'ML ROAD v3';
      document.getElementById('st-p').textContent = `${COURSE.sections.length} МОДУЛЕЙ // ${ALL.length} УРОКОВ`;
    }

    /* ─── LESSON ─── */
    function _getLessonCtx(id) {
      let lesson = ALL.find(l => l.id === id);
      let list = ALL;
      if (!lesson) {
        lesson = PYTHON_ALL.find(l => l.id === id);
        list = PYTHON_ALL;
      }
      if (!lesson) return null;
      const idx = list.findIndex(l => l.id === id);
      return { lesson, list, prev: list[idx - 1] || null, next: list[idx + 1] || null };
    }

    function renderLesson(id) {
      const ctx = _getLessonCtx(id);
      if (!ctx) { document.getElementById('ca').innerHTML = '<p style="color:var(--red);font-family:var(--mono);padding:32px">// ERROR: lesson not found</p>'; return; }
      const { lesson, list: lessonList, prev, next } = ctx;

      const el = document.getElementById('cdata-' + id);
      if (!el) { document.getElementById('ca').innerHTML = '<p style="color:var(--red);font-family:var(--mono);padding:32px">// ERROR: lesson content not found</p>'; return; }

      const rawMd = el.textContent.trim().replace(/^#[^\n]*\n+/, '');
      const html = mdToHtml(rawMd);

      const isRead = getReadSet(id).has(id);
      document.getElementById('ca').innerHTML = `
    <div class="lhdr">
      <div class="lmeta">${esc(lesson.section.title)} // УРОК ${lesson.order} из ${lessonList.length}</div>
      <div class="ltitle">${esc(lesson.title)}</div>
    </div>
    <div class="lc">${html}</div>
    <div class="lnav">
      ${prev ? `<button class="nb pr" data-action="nav" data-id="${prev.id}"><span>←</span><div><span class="nb-lbl">ПРЕДЫДУЩИЙ</span><span class="nb-t">${esc(prev.title)}</span></div></button>` : '<div></div>'}
      <button class="read-btn${isRead ? ' is-read' : ''}" data-action="mark-toggle" data-id="${id}" data-read="${isRead}">
        ${isRead ? '↩ Снять отметку' : '✓ Отметить прочитанным'}
      </button>
      ${next ? `<button class="nb nx" data-action="nav" data-id="${next.id}"><div style="text-align:right"><span class="nb-lbl">СЛЕДУЮЩИЙ</span><span class="nb-t">${esc(next.title)}</span></div><span>→</span></button>` : '<div></div>'}
    </div>`;
      document.getElementById('st-l').textContent = `УРОК ${lesson.order}/${lessonList.length} — ${lesson.short}`;
    }

    /* ─── SIDEBAR ─── */
    function _tplLesson(l) {
      return `<div class="li" id="li-${l.id}" data-action="nav" data-id="${l.id}"><span class="li-prog"></span><span class="li-n">${l.num}</span><span class="li-t">${l.short}</span></div>`;
    }

    function _tplSection(s, si) {
      const cleanTitle = s.title.replace(/^Раздел\s+\d+\.\s*/i, '');
      const secNum = String(si + 1).padStart(2, '0');
      return `<div class="sg sec-${s.color}" id="sg-${s.id}"><div class="sgh" data-action="toggle-sec" data-id="${s.id}"><span class="sga">▶</span><span class="sgn sgn-${s.color}">${secNum}</span><span class="sgname">${cleanTitle}</span><span class="sg-prog" id="sgp-${s.id}"></span></div><div class="ll">${s.lessons.map(_tplLesson).join('')}</div></div>`;
    }

    function buildSb() {
      const sections = AppState.curTab === 'python' ? PYTHON_COURSE.sections : COURSE.sections;
      document.getElementById('sbnav').innerHTML = sections.map((s, si) => _tplSection(s, si)).join('');
    }

    function updateSb(id) {
      document.querySelectorAll('.li,.hi').forEach(el => el.classList.remove('act'));
      document.querySelectorAll('.sg.sg-act').forEach(el => el.classList.remove('sg-act'));
      const t = document.getElementById(id === 'home' ? 'hi-home' : 'li-' + id);
      if (t) {
        t.classList.add('act');
        const group = t.closest('.sg');
        if (group) { group.classList.add('open'); group.classList.add('sg-act'); }
        t.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
      document.querySelectorAll('.li').forEach(el => {
        const lid = el.id.replace('li-', '');
        const prog = el.querySelector('.li-prog');
        if (!prog) return;
        if (getReadSet(lid).has(lid)) {
          prog.textContent = '✓';
          prog.style.borderColor = 'var(--green)';
          prog.style.color = 'var(--green)';
          prog.style.background = 'rgba(0,255,157,.08)';
        } else {
          prog.textContent = '';
          prog.style.borderColor = 'var(--dim)';
          prog.style.color = '';
          prog.style.background = '';
        }
      });
    }

    function toggleSec(id) { document.getElementById('sg-' + id)?.classList.toggle('open'); }
    function toggleSb() { document.getElementById('sb').classList.toggle('open'); document.getElementById('sov').classList.toggle('vis'); }
    function closeSb() { document.getElementById('sb').classList.remove('open'); document.getElementById('sov').classList.remove('vis'); }

    /* ─── SEARCH ─── */
    function _buildSearchIndex() {
      const idx = new Map();
      [...ALL, ...PYTHON_ALL].forEach(l => {
        const raw = [
          l.title, l.short, l.section?.title || '',
          document.getElementById('cdata-' + l.id)?.textContent || ''
        ].join(' ');
        const tokens = raw.toLowerCase().replace(/[^a-zа-яё0-9\s]/gi, ' ').split(/\s+/).filter(t => t.length >= 2);
        tokens.forEach(tok => {
          if (!idx.has(tok)) idx.set(tok, new Set());
          idx.get(tok).add(l.id);
        });
      });
      AppState.searchIndex = idx;
    }

    function _queryIndex(q) {
      const terms = q.toLowerCase().replace(/[^a-zа-яё0-9\s]/gi, ' ').split(/\s+/).filter(t => t.length >= 2);
      if (!terms.length) return [];
      const allLessons = [...ALL, ...PYTHON_ALL];
      const idMap = new Map(allLessons.map(l => [l.id, l]));
      const firstSet = AppState.searchIndex.get(terms[0]) || new Set();
      let candidates = [...firstSet].map(id => idMap.get(id)).filter(Boolean);
      if (terms.length > 1) {
        candidates = candidates.filter(l =>
          terms.slice(1).every(t => AppState.searchIndex.get(t)?.has(l.id))
        );
      }
      return candidates.slice(0, 8);
    }

    function setupSearch() {
      const inp = document.getElementById('si'), res = document.getElementById('sr');
      inp.addEventListener('input', () => {
        const q = inp.value.trim().toLowerCase();
        if (!q) { res.classList.remove('vis'); return; }
        const hits = _queryIndex(q);
        res.innerHTML = hits.length
          ? hits.map(l => {
            const safeTitle = esc(l.title);
            const t = safeTitle.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<span class="srh">${m}</span>`);
            const inContent = !(l.title.toLowerCase().includes(q) || l.short.toLowerCase().includes(q) || l.section.title.toLowerCase().includes(q));
            return `<div class="sri" data-action="nav" data-id="${l.id}"><div class="sri-t">${t}</div><div class="sri-s">${esc(l.section.title)}${inContent ? ' <span style="opacity:.6">// найдено в тексте урока</span>' : ''}</div></div>`;
          }).join('')
          : '<div class="sr0">// нет результатов</div>';
        res.classList.add('vis');
      });
      document.addEventListener('click', e => { if (!e.target.closest('.srch')) closeSearch(); });
      inp.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
    }
    function closeSearch() { document.getElementById('sr').classList.remove('vis'); }

    /* ─── MARKDOWN PARSER ─── */
    function mdToHtml(md) {
      if (!md) return '';
      md = md.replace(/^---[\r\n][\s\S]*?[\r\n]---[\r\n]?/, '');
      const cbs = [];
      md = md.replace(/```(\w*)\r?\n([\s\S]*?)```/g, (_, lang, code) => { cbs.push({ lang: lang.trim(), code: code.trimEnd() }); return '\x01CB' + (cbs.length - 1) + '\x01'; });
      const lines = md.split(/\r?\n/), out = []; let i = 0;
      while (i < lines.length) {
        const raw = lines[i], line = raw.trim();
        if (!line) { i++; continue; }
        if (line.startsWith('\x01CB')) { out.push(line); i++; continue; }
        const hm = line.match(/^(#{1,6})\s+([\s\S]+)/);
        if (hm) { out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`); i++; continue; }
        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) { out.push('<hr>'); i++; continue; }
        if (line.startsWith('>')) {
          const qs = [];
          while (i < lines.length && lines[i].trim().startsWith('>')) { qs.push(lines[i].trim().replace(/^>\s?/, '')); i++; }
          out.push(`<blockquote><p>${inl(qs.join(' '))}</p></blockquote>`); continue;
        }
        if (/^[-*+]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*+]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^[-*+]\s/, ''))}</li>`); i++; }
          out.push(`<ul>${items.join('')}</ul>`); continue;
        }
        if (/^\d+[.)]\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+[.)]\s/.test(lines[i]) && lines[i].trim()) { items.push(`<li>${inl(lines[i].trim().replace(/^\d+[.)]\s/, ''))}</li>`); i++; }
          out.push(`<ol>${items.join('')}</ol>`); continue;
        }
        if (line.startsWith('|') && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
          const trows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) { trows.push(lines[i].trim()); i++; }
          if (trows.length >= 2) {
            const hdr = trows[0].split('|').slice(1, -1).map(c => c.trim());
            const body = trows.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
            let th = '<div class="tw"><table><thead><tr>' + hdr.map(h => `<th>${inl(h)}</th>`).join('') + '</tr></thead><tbody>';
            body.forEach(row => { th += '<tr>' + row.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>'; });
            out.push(th + '</tbody></table></div>');
          }
          continue;
        }
        out.push(`<p>${inl(line)}</p>`);
        i++;
      }
      let html = out.join('\n');
      html = html.replace(/\x01CB(\d+)\x01/g, (_, n) => {
        const { lang, code } = cbs[+n];
        return `<div class="cb">${lang ? `<div class="cbl">${esc(lang)}</div>` : ''}<button class="cb-copy" type="button">copy</button><pre><code>${esc(code)}</code></pre></div>`;
      });
      return html;
    }

    function inl(text) {
      if (!text) return '';
      const ics = [], links = [];
      text = text.replace(/`([^`]+)`/g, (_, c) => { ics.push(c); return '\x02IC' + (ics.length - 1) + '\x02'; });
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
        links.push({ label, href });
        return '\x02LK' + (links.length - 1) + '\x02';
      });
      text = esc(text);
      text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      text = text.replace(/\x02LK(\d+)\x02/g, (_, n) => {
        const { label, href } = links[+n];
        return `<a href="${safeHref(href)}" class="nl" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`;
      });
      text = text.replace(/\x02IC(\d+)\x02/g, (_, n) => `<code class="ic">${esc(ics[+n])}</code>`);
      return text;
    }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function escAttr(s) { return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function safeHref(href) {
      const raw = String(href || '').trim();
      if (/^(https?:|mailto:)/i.test(raw)) return escAttr(raw);
      return '#';
    }

    /* ─── INIT ─── */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.sb-tab').forEach(b => {
        b.classList.toggle('act', b.dataset.tab === AppState.curTab);
      });
      buildSb(); setupSearch();
      _buildSearchIndex();
      document.getElementById('st-p').textContent = `${COURSE.sections.length} МОДУЛЕЙ // ${ALL.length} УРОКОВ`;
      _mbBuildChannels(); _mbSync(); setMusicVolume(60);
      document.getElementById('mb-vol')?.addEventListener('input', e => setMusicVolume(e.target.value));

      document.addEventListener('click', e => {
        const el = e.target.closest('[data-action]');
        if (!el) return;
        const action = el.dataset.action;
        const id     = el.dataset.id;
        const tab    = el.dataset.tab;
        switch (action) {
          case 'nav':             nav(id); break;
          case 'toggle-rp':      toggleRp(); break;
          case 'toggle-sb':      toggleSb(); break;
          case 'close-sb':       closeSb(); break;
          case 'toggle-music':   toggleMusic(); break;
          case 'switch-tab':     switchTab(tab); break;
          case 'toggle-sec':     toggleSec(id); break;
          case 'mark-read':      markRead(id); break;
          case 'mark-unread':    markUnread(id); break;
          case 'filter-rp':      filterRp(el.dataset.cat); break;
          case 'open-rp-item':   openRpItem(id); break;
          case 'switch-channel': switchChannel(+el.dataset.idx); break;
          case 'start-course':   nav('l01'); break;
          case 'mark-toggle':
            el.dataset.read === 'true' ? markUnread(id) : markRead(id);
            break;
        }
      });

      document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.cb-copy');
        if (!btn) return;
        const codeEl = btn.closest('.cb')?.querySelector('pre code');
        if (!codeEl) return;
        const text = codeEl.textContent || '';
        let ok = false;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            ok = true;
          }
        } catch (err) { }
        if (!ok) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { ok = document.execCommand('copy'); } catch (err) { ok = false; }
          document.body.removeChild(ta);
        }
        const prev = btn.textContent;
        btn.textContent = ok ? 'copied' : 'error';
        if (ok) btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = prev;
          btn.classList.remove('done');
        }, 1200);
      });
      let saved = 'home';
      try { saved = localStorage.getItem('mlroad-cur') || 'home'; } catch (e) { }
      saved = resolveNavId(saved);
      initRp();
      nav(saved);
      updateProgressBar();
    });


    /* ─── RIGHT PANEL ─── */

    const CAT_CLASSES = {
      'ML Core': 'rpi-cat-mlcore',
      'Learning Resources': 'rpi-cat-learning',
      'Prompt Library': 'rpi-cat-prompt'
    };

    const CAT_LABELS = {
      'ML Core': 'ML Core',
      'Learning Resources': 'Learning',
      'Prompt Library': 'Prompts'
    };

    function catClass(cat) {
      return CAT_CLASSES[cat] || 'rpi-cat-other';
    }

    function buildRp() {
      const cats = ['all', ...new Set(RIGHT_PANEL_DATA.map(i => i.category))];
      const filter = document.getElementById('rp-filter');
      filter.innerHTML = cats.map(c =>
        `<button class="rptab${c === AppState.rpFilter ? ' act' : ''}" data-cat="${c}" data-action="filter-rp">${c === 'all' ? 'ALL' : CAT_LABELS[c] || c}</button>`
      ).join('');
      renderRpList();
    }

    function renderRpList() {
      const items = AppState.rpFilter === 'all'
        ? RIGHT_PANEL_DATA
        : RIGHT_PANEL_DATA.filter(i => i.category === AppState.rpFilter);
      const sorted = [...items].sort((a, b) => a.priority - b.priority);
      document.getElementById('rp-list').innerHTML = sorted.map(item =>
        `<div class="rpi" id="rpi-${item.id}" data-action="open-rp-item" data-id="${item.id}">
          <div class="rpi-top">
            <span class="rpi-cat ${catClass(item.category)}">${CAT_LABELS[item.category] || item.category}</span>
            <span class="rpi-t">${item.title}</span>
          </div>
          <div class="rpi-sum">${item.summary}</div>
        </div>`
      ).join('');
    }

    function filterRp(cat) {
      AppState.rpFilter = cat;
      document.querySelectorAll('.rptab').forEach(t => t.classList.toggle('act', t.dataset.cat === cat));
      renderRpList();
    }

    function openRpItem(id) {
      navKb(id);
    }

    function updateRpBtn() {
      const btn = document.getElementById('rp-btn');
      if (!btn) return;
      if (AppState.rpOpen) {
        btn.innerHTML = '◂ <span class="rp-toggle-lbl">Скрыть материалы</span>';
        btn.classList.add('act');
      } else {
        btn.innerHTML = '▸ <span class="rp-toggle-lbl">Показать материалы</span>';
        btn.classList.remove('act');
      }
    }

    function toggleRp() {
      AppState.rpOpen = !AppState.rpOpen;
      const panel = document.getElementById('rp');
      if (AppState.rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
      try { localStorage.setItem('mlroad-rp', AppState.rpOpen ? '1' : '0'); } catch(e) {}
    }

    function initRp() {
      buildRp();
      let saved = '1';
      try { saved = localStorage.getItem('mlroad-rp') ?? '1'; } catch(e) {}
      AppState.rpOpen = saved !== '0';
      const panel = document.getElementById('rp');
      if (AppState.rpOpen) {
        panel.classList.remove('rp-hidden');
        panel.classList.add('rp-open');
      } else {
        panel.classList.add('rp-hidden');
        panel.classList.remove('rp-open');
      }
      updateRpBtn();
    }

    /* ─── MUSIC BAR ─────────────────────────────────── */
    const MB_STREAMS = [
      { id: 'defcon',    label: 'DEF·CON',  url: 'https://ice1.somafm.com/defcon-128-mp3',     title: 'SomaFM DEF CON — хакерская конференция' },
      { id: 'nightwave', label: 'NWPLAZA',  url: 'https://radio.plaza.one/mp3',                 title: 'Nightwave Plaza — synthwave / vaporwave' },
      { id: 'digitalis', label: 'DGTLS',    url: 'https://ice1.somafm.com/digitalis-128-mp3',  title: 'SomaFM Digitalis — IDM / electro' },
      { id: 'drone',     label: 'DRONE·ZN', url: 'https://ice1.somafm.com/dronezone-128-mp3',  title: 'SomaFM Drone Zone — dark ambient' },
      { id: 'groovesal', label: 'GROOVE·SL',url: 'https://ice1.somafm.com/groovesalad-128-mp3',title: 'SomaFM Groove Salad — chill lofi' },
    ];
    function _mbSync() {
      const bar  = document.getElementById('music-bar');
      const dot  = document.getElementById('mb-dot');
      const sts  = document.getElementById('mb-status');
      const btn  = document.getElementById('mb-play');
      const sl   = document.getElementById('mb-vol');
      const online = navigator.onLine;
      if (!online) {
        bar.classList.add('is-offline');
        btn.disabled = true;
        dot.className = 'mb-dot';       dot.textContent = '◉';
        sts.className = 'mb-status';    sts.textContent = 'OFFLINE';
        if (AppState.music.playing && AppState.music.audio) {
          AppState.music.audio.pause(); AppState.music.playing = false;
          btn.classList.remove('playing'); btn.textContent = '▶ PLAY';
          sl && sl.classList.remove('active');
          _mbSliderColor(sl, false);
        }
        return;
      }
      bar.classList.remove('is-offline');
      btn.disabled = false;
      if (AppState.music.playing) {
        dot.className = 'mb-dot live';  dot.textContent = '◉';
        sts.className = 'mb-status live'; sts.textContent = 'LIVE';
      } else {
        dot.className = 'mb-dot paused'; dot.textContent = '○';
        sts.className = 'mb-status';    sts.textContent = 'READY';
      }
    }

    function _mbSliderColor(sl, active) {
      if (!sl) return;
      const pct = (sl.value / sl.max) * 100;
      const fill = active ? '#00e5ff' : '#2a5070';
      sl.style.background = `linear-gradient(to right, ${fill} ${pct}%, #0c1e30 ${pct}%)`;
    }

    function _mbBuildChannels() {
      const wrap = document.getElementById('mb-channels');
      if (!wrap) return;
      wrap.innerHTML = MB_STREAMS.map((s, i) =>
        `<button class="mb-ch${i === AppState.music.streamIdx ? ' act' : ''}" title="${s.title}"
           data-action="switch-channel" data-idx="${i}">${s.label}</button>`
      ).join('');
    }

    function switchChannel(idx) {
      if (idx === AppState.music.streamIdx && !AppState.music.playing) return;
      clearTimeout(AppState.music.reconnTimer); // всегда очищаем, не только при playing
      AppState.music.streamIdx = idx;
      _mbBuildChannels();
      if (AppState.music.playing) { _mStartStream(); }
    }

    /* Пересоздаёт Audio и запускает поток заново — fix для stalled/ended */
    function _mStartStream() {
      clearTimeout(AppState.music.reconnTimer);
      const gen = ++AppState.music.gen; // поколение: старые _reconnect с другим gen игнорируются
      if (AppState.music.audio) { AppState.music.audio.pause(); AppState.music.audio.src = ''; AppState.music.audio.load(); AppState.music.audio = null; }
      const sl = document.getElementById('mb-vol');
      const url = MB_STREAMS[AppState.music.streamIdx].url + '?_=' + Date.now();
      AppState.music.audio = new Audio(url);
      AppState.music.audio.volume = (sl ? sl.value : 60) / 100;

      const _reconnect = () => {
        if (!AppState.music.playing || !navigator.onLine || gen !== AppState.music.gen) return; // устаревший — пропускаем
        const sts = document.getElementById('mb-status');
        if (sts) { sts.className = 'mb-status'; sts.textContent = 'RECONNECT...'; }
        AppState.music.reconnTimer = setTimeout(_mStartStream, 1500);
      };

      AppState.music.audio.addEventListener('ended',   _reconnect);
      AppState.music.audio.addEventListener('stalled', _reconnect);
      AppState.music.audio.addEventListener('error',   _reconnect);
      AppState.music.audio.play().catch(() => {});
    }

    function toggleMusic() {
      if (!navigator.onLine) return;
      const btn = document.getElementById('mb-play');
      const sl  = document.getElementById('mb-vol');
      if (AppState.music.playing) {
        clearTimeout(AppState.music.reconnTimer);
        if (AppState.music.audio) { AppState.music.audio.pause(); AppState.music.audio.src = ''; AppState.music.audio.load(); AppState.music.audio = null; }
        AppState.music.playing = false;
        btn.classList.remove('playing'); btn.textContent = '▶ PLAY';
        sl && sl.classList.remove('active'); _mbSliderColor(sl, false);
      } else {
        AppState.music.playing = true;
        btn.classList.add('playing'); btn.textContent = '▐▐ PAUSE';
        sl && sl.classList.add('active'); _mbSliderColor(sl, true);
        _mStartStream();
      }
      _mbSync();
    }

    function setMusicVolume(val) {
      if (AppState.music.audio) AppState.music.audio.volume = val / 100;
      const valEl = document.getElementById('mb-vol-val');
      const sl    = document.getElementById('mb-vol');
      if (valEl) valEl.textContent = val + '%';
      _mbSliderColor(sl, AppState.music.playing);
    }

    window.addEventListener('online',  _mbSync);
    window.addEventListener('offline', _mbSync);

  </script>
